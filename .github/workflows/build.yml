name: Build and Lint

on:
  push:
    branches: [ Main, master, develop, 'claude/**' ]
  pull_request:
    branches: [ Main, master, develop ]

jobs:
  lint-and-build:
    name: Lint and Build Dashboard
    runs-on: ubuntu-latest

    steps:
      # TODO: Verify these SHAs match the latest release tags before merging.
      # Pin actions to commit SHAs to prevent supply-chain attacks on mutable tags.
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build individual files
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Run unit tests with coverage enforcement
        run: npm run coverage
        # Jest enforces coverageThreshold from jest.config.js (70% lines/funcs/stmts, 60% branches).
        # This step fails if coverage drops below thresholds.

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Verify build output
        run: |
          # Build produces individual .gs + .html files in dist/ (not a consolidated file).
          # Verify key files exist.
          GS_COUNT=$(find dist -name "*.gs" | wc -l)
          HTML_COUNT=$(find dist -name "*.html" | wc -l)
          if [ "$GS_COUNT" -eq 0 ]; then
            echo "ERROR: No .gs files found in dist/"
            exit 1
          fi
          echo "Build output verified: ${GS_COUNT} .gs files, ${HTML_COUNT} .html files"
          ls -la dist/

      - name: Report build size
        run: |
          TOTAL_SIZE=0
          TOTAL_LINES=0
          for f in dist/*.gs dist/*.html; do
            if [ -f "$f" ]; then
              FSIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
              FLINES=$(wc -l < "$f")
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
              TOTAL_LINES=$((TOTAL_LINES + FLINES))
            fi
          done
          SIZE_KB=$(echo "scale=1; $TOTAL_SIZE/1024" | bc)
          GS_COUNT=$(find dist -name "*.gs" | wc -l)
          HTML_COUNT=$(find dist -name "*.html" | wc -l)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Output**: dist/ (multi-file)" >> $GITHUB_STEP_SUMMARY
          echo "- **.gs files**: ${GS_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **.html files**: ${HTML_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total size**: ${SIZE_KB} KB ($TOTAL_SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total lines**: $TOTAL_LINES" >> $GITHUB_STEP_SUMMARY
          # Warn if build exceeds 3MB (Google Apps Script limit is ~6MB)
          if [ "$TOTAL_SIZE" -gt 3145728 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **WARNING**: Build size exceeds 3MB. Google Apps Script limit is ~6MB." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dashboard-dist
          path: dist/
          retention-days: 30

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Count source files and functions
        run: |
          echo "## Code Quality Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count .gs files
          GS_COUNT=$(find src -name "*.gs" | wc -l)
          echo "- **Source Files**: $GS_COUNT .gs files" >> $GITHUB_STEP_SUMMARY

          # Count functions
          FUNC_COUNT=$(grep -r "^function " src/*.gs | wc -l)
          echo "- **Functions**: $FUNC_COUNT total functions" >> $GITHUB_STEP_SUMMARY

          # Count lines per major module
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lines per Module" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in src/*.gs; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              NAME=$(basename "$f")
              echo "- $NAME: $LINES lines" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for duplicate functions
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Duplicate Function Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DUPES=$(grep -hE "^function [a-zA-Z_][a-zA-Z0-9_]*\(" src/*.gs | sort | uniq -d | wc -l)
          if [ "$DUPES" -gt 0 ]; then
            echo "- **WARNING**: $DUPES duplicate function definitions found!" >> $GITHUB_STEP_SUMMARY
            grep -hE "^function [a-zA-Z_][a-zA-Z0-9_]*\(" src/*.gs | sort | uniq -d >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "- **Status**: No duplicate functions found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for TODO/FIXME comments
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Technical Debt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TODO_COUNT=$(grep -r "TODO\|FIXME\|HACK\|XXX" src/*.gs | wc -l || echo "0")
          echo "- **TODO/FIXME/HACK/XXX comments**: $TODO_COUNT" >> $GITHUB_STEP_SUMMARY

          DEPRECATED_COUNT=$(grep -r "DEPRECATED" src/*.gs | wc -l || echo "0")
          echo "- **DEPRECATED markers**: $DEPRECATED_COUNT" >> $GITHUB_STEP_SUMMARY

  deploy-guards:
    name: Deploy Guards and SPA Integrity
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run deploy guards
        run: npm run test:guards

      - name: Summarize guard results
        if: always()
        run: |
          echo "## Deploy Guards Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ran \`deploy-guards.test.js\` and \`spa-integrity.test.js\`." >> $GITHUB_STEP_SUMMARY
          echo "These tests enforce structural invariants that prevent deploy-breaking regressions:" >> $GITHUB_STEP_SUMMARY
          echo "- Entry point error handling (A1-A8)" >> $GITHUB_STEP_SUMMARY
          echo "- Tab routing completeness (G8, G9, G18, G19)" >> $GITHUB_STEP_SUMMARY
          echo "- Navigation race condition guards (G23)" >> $GITHUB_STEP_SUMMARY
          echo "- SPA HTML/JS integrity" >> $GITHUB_STEP_SUMMARY

  dist-parity:
    name: Dist Parity Check
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild dist and check for uncommitted differences
        run: |
          npm run build:prod
          if git diff --exit-code dist/; then
            echo "## Dist Parity Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "dist/ is up to date with src/." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Dist Parity Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**FAIL**: dist/ is out of sync with src/. Run \`npm run build:prod\` and commit the result." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff --stat dist/ >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  scope-change-guard:
    name: OAuth Scope Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/Main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout current commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Detect appsscript.json scope changes
        run: |
          echo "## OAuth Scope Change Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CHANGED=$(git diff HEAD~1 HEAD --name-only | grep "appsscript.json" || true)

          if [ -z "$CHANGED" ]; then
            echo "✅ **appsscript.json was not modified** — no re-authorization required." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "⚠️ **appsscript.json WAS MODIFIED in this commit.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          OLD_SCOPES=$(git show HEAD~1:appsscript.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for s in data.get('oauthScopes', []):
            print(s)
          " 2>/dev/null || echo "(none)")

          NEW_SCOPES=$(cat appsscript.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for s in data.get('oauthScopes', []):
            print(s)
          " 2>/dev/null || echo "(none)")

          ADDED=$(comm -13 <(echo "$OLD_SCOPES" | sort) <(echo "$NEW_SCOPES" | sort))
          REMOVED=$(comm -23 <(echo "$OLD_SCOPES" | sort) <(echo "$NEW_SCOPES" | sort))

          if [ -n "$ADDED" ]; then
            echo "### 🔴 Scopes ADDED (require re-authorization of deployed web app):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$ADDED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚡ ACTION REQUIRED:" >> $GITHUB_STEP_SUMMARY
            echo "1. After deploying (\`clasp push\`), go to **Apps Script editor → Deploy → Manage Deployments**" >> $GITHUB_STEP_SUMMARY
            echo "2. Create a **new deployment version**" >> $GITHUB_STEP_SUMMARY
            echo "3. Click through the authorization prompt and **authorize all scopes**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Why:** GAS web app deployments cache authorized scopes at deploy time." >> $GITHUB_STEP_SUMMARY
            echo "Adding a scope to appsscript.json does NOT auto-authorize the live deployment." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Test after re-auth:** Run the \`emailsend\` suite in the TestRunner tab." >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "ERROR: OAuth scopes added — re-authorization of deployed web app required."
            exit 1
          fi

          if [ -n "$REMOVED" ]; then
            echo "### 🟡 Scopes REMOVED (no re-authorization needed):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$REMOVED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$ADDED" ] && [ -z "$REMOVED" ]; then
            echo "✅ appsscript.json changed but **oauthScopes list was not modified**." >> $GITHUB_STEP_SUMMARY
          fi
