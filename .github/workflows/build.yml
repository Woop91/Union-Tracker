name: Build and Lint

on:
  push:
    branches: [ Main, master, develop, 'claude/**' ]
  pull_request:
    branches: [ Main, master, develop ]

jobs:
  lint-and-build:
    name: Lint and Build Dashboard
    runs-on: ubuntu-latest

    steps:
      # TODO: Verify these SHAs match the latest release tags before merging.
      # Pin actions to commit SHAs to prevent supply-chain attacks on mutable tags.
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build individual files
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Verify build output
        run: |
          # Build produces individual .gs + .html files in dist/ (not a consolidated file).
          # Verify key files exist.
          GS_COUNT=$(find dist -name "*.gs" | wc -l)
          HTML_COUNT=$(find dist -name "*.html" | wc -l)
          if [ "$GS_COUNT" -eq 0 ]; then
            echo "ERROR: No .gs files found in dist/"
            exit 1
          fi
          echo "Build output verified: ${GS_COUNT} .gs files, ${HTML_COUNT} .html files"
          ls -la dist/

      - name: Report build size
        run: |
          TOTAL_SIZE=0
          TOTAL_LINES=0
          for f in dist/*.gs dist/*.html; do
            if [ -f "$f" ]; then
              FSIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
              FLINES=$(wc -l < "$f")
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
              TOTAL_LINES=$((TOTAL_LINES + FLINES))
            fi
          done
          SIZE_KB=$(echo "scale=1; $TOTAL_SIZE/1024" | bc)
          GS_COUNT=$(find dist -name "*.gs" | wc -l)
          HTML_COUNT=$(find dist -name "*.html" | wc -l)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Output**: dist/ (multi-file)" >> $GITHUB_STEP_SUMMARY
          echo "- **.gs files**: ${GS_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **.html files**: ${HTML_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total size**: ${SIZE_KB} KB ($TOTAL_SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total lines**: $TOTAL_LINES" >> $GITHUB_STEP_SUMMARY
          # Warn if build exceeds 3MB (Google Apps Script limit is ~6MB)
          if [ "$TOTAL_SIZE" -gt 3145728 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **WARNING**: Build size exceeds 3MB. Google Apps Script limit is ~6MB." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dashboard-dist
          path: dist/
          retention-days: 30

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Count source files and functions
        run: |
          echo "## Code Quality Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count .gs files
          GS_COUNT=$(find src -name "*.gs" | wc -l)
          echo "- **Source Files**: $GS_COUNT .gs files" >> $GITHUB_STEP_SUMMARY

          # Count functions
          FUNC_COUNT=$(grep -r "^function " src/*.gs | wc -l)
          echo "- **Functions**: $FUNC_COUNT total functions" >> $GITHUB_STEP_SUMMARY

          # Count lines per major module
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lines per Module" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in src/*.gs; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              NAME=$(basename "$f")
              echo "- $NAME: $LINES lines" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for duplicate functions
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Duplicate Function Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DUPES=$(grep -hE "^function [a-zA-Z_][a-zA-Z0-9_]*\(" src/*.gs | sort | uniq -d | wc -l)
          if [ "$DUPES" -gt 0 ]; then
            echo "- **WARNING**: $DUPES duplicate function definitions found!" >> $GITHUB_STEP_SUMMARY
            grep -hE "^function [a-zA-Z_][a-zA-Z0-9_]*\(" src/*.gs | sort | uniq -d >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "- **Status**: No duplicate functions found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for TODO/FIXME comments
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Technical Debt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TODO_COUNT=$(grep -r "TODO\|FIXME\|HACK\|XXX" src/*.gs | wc -l || echo "0")
          echo "- **TODO/FIXME/HACK/XXX comments**: $TODO_COUNT" >> $GITHUB_STEP_SUMMARY

          DEPRECATED_COUNT=$(grep -r "DEPRECATED" src/*.gs | wc -l || echo "0")
          echo "- **DEPRECATED markers**: $DEPRECATED_COUNT" >> $GITHUB_STEP_SUMMARY
