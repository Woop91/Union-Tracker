<script>

// ── Theme layout class constants (multi-class: only active theme's CSS fires) ──
var _TC = 'ds-card-editorial ga-card-glass ac-hud-panel';   
var _TL = 'ds-label ga-label ac-label';                      
var _TD = 'ds-display ga-display ac-display';                
var _TB = 'ds-gradient-btn ga-gradient-btn ac-gradient-btn'; 
var _TI = 'ds-input ga-input ac-input';                      
var _TG = 'ds-bento ga-bento ac-bento';                       

function renderKPIStrip(container, items, options) {
 options = options || {};
 var cols = options.columns || items.length;
 var style = { gridTemplateColumns: 'repeat(' + cols + ', 1fr)' };
 if (options.marginBottom) style.marginBottom = options.marginBottom;
 var strip = el('div', { className: 'kpi-grid ' + _TG, style: style });

 items.forEach(function(kpi) {
 var card = el('div', { className: 'kpi-card ' + _TC });
 card.appendChild(el('div', { className: 'kpi-label ' + _TL }, kpi.label));
 var val = el('div', { className: 'kpi-value' }, String(kpi.value));
 if (kpi.color) val.style.color = kpi.color;
 card.appendChild(val);
 strip.appendChild(card);
 });

 container.appendChild(strip);
 return strip;
}

function createSubTabs(tabDefs, options) {
 options = options || {};
 var activeTab = options.defaultTab || tabDefs[0].id;
 var bar = el('div', { className: 'sub-tabs', role: 'tablist' });
 var content = el('div');

 function refresh() {
 bar.innerHTML = '';
 tabDefs.forEach(function(tab) {
  bar.appendChild(el('button', {
  className: 'sub-tab' + (activeTab === tab.id ? ' active' : ''),
  role: 'tab',
  'aria-selected': String(activeTab === tab.id),
  onClick: function() { switchTo(tab.id); }
  }, tab.label));
 });
 }

 function switchTo(tabId) {
 activeTab = tabId;
 refresh();
 content.innerHTML = '';
 var tab = null;
 for (var i = 0; i < tabDefs.length; i++) {
  if (tabDefs[i].id === tabId) { tab = tabDefs[i]; break; }
 }
 if (tab && tab.render) tab.render(content);
 if (options.onSwitch) options.onSwitch(tabId);
 }

 refresh();
 
 var first = null;
 for (var i = 0; i < tabDefs.length; i++) {
 if (tabDefs[i].id === activeTab) { first = tabDefs[i]; break; }
 }
 if (first && first.render) first.render(content);

 return {
 bar: bar,
 content: content,
 switchTo: switchTo,
 getActiveTab: function() { return activeTab; }
 };
}

function createAutocomplete(options) {
 var maxResults = options.maxResults || 8;
 var debounceMs = options.debounceMs || 0;
 var minQuery = options.minQuery || 1;
 var selected = null;
 var _cache = null;
 var _timer = null;

 var wrapper = el('div', { className: 'form-group', style: { position: 'relative' } });
 var input = el('input', {
 className: 'form-input',
 placeholder: options.placeholder || 'Type to search...',
 autocomplete: 'off'
 });
 wrapper.appendChild(input);

 var dropdown = el('div', { className: 'ac-dropdown', style: {
 position: 'absolute', top: '100%', left: '0', right: '0', zIndex: '50',
 background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px',
 maxHeight: '200px', overflowY: 'auto', display: 'none',
 boxShadow: '0 4px 12px rgba(0,0,0,0.3)'
 }});
 wrapper.appendChild(dropdown);

 
 var filterFn = options.filterFn || function(item, q) {
 return (item.name || '').toLowerCase().indexOf(q) !== -1 ||
   (item.email || '').toLowerCase().indexOf(q) !== -1;
 };

 
 var renderItem = options.renderItem || function(item) {
 var row = el('div', { style: {
  padding: '8px 12px', cursor: 'pointer', fontSize: '12px', color: 'var(--text)',
  borderBottom: '1px solid var(--border)'
 }});
 row.appendChild(el('div', { style: { fontWeight: '600' } }, item.name || ''));
 row.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '11px' } }, item.email || ''));
 return row;
 };

 function loadAndFilter(q) {
 function doFilter(data) {
  dropdown.innerHTML = '';
  var matches = data.filter(function(item) { return filterFn(item, q); });
  if (maxResults) matches = matches.slice(0, maxResults);
  if (matches.length === 0) { dropdown.style.display = 'none'; return; }

  matches.forEach(function(item) {
  var row = renderItem(item);
  row.addEventListener('click', function() {
   selected = item;
   input.value = item.email || item.name || '';
   dropdown.style.display = 'none';
   if (options.onSelect) options.onSelect(item);
  });
  row.addEventListener('mouseenter', function() { row.style.background = 'var(--accentBg)'; });
  row.addEventListener('mouseleave', function() { row.style.background = 'transparent'; });
  dropdown.appendChild(row);
  });
  dropdown.style.display = 'block';
 }

 if (_cache) { doFilter(_cache); return; }
 options.loadData(function(data) {
  _cache = data || [];
  doFilter(_cache);
 });
 }

 input.addEventListener('input', function() {
 selected = null;
 var q = input.value.toLowerCase().trim();
 if (q.length < minQuery) { dropdown.style.display = 'none'; return; }
 if (debounceMs > 0) {
  clearTimeout(_timer);
  _timer = setTimeout(function() { loadAndFilter(q); }, debounceMs);
 } else {
  loadAndFilter(q);
 }
 });

 
 var DROPDOWN_BLUR_DELAY_MS = 200; 
 input.addEventListener('blur', function() {
 setTimeout(function() { dropdown.style.display = 'none'; }, DROPDOWN_BLUR_DELAY_MS);
 });

 return {
 wrapper: wrapper,
 input: input,
 getSelected: function() { return selected; },
 clear: function() { selected = null; input.value = ''; dropdown.style.display = 'none'; }
 };
}

function createPaginator(options) {
 var items = options.items || [];
 var pageSize = options.pageSize || 20;
 var currentPage = 0;
 var btnClass = 'btn ' + (options.buttonStyle || 'btn-ghost');

 var listArea = el('div');
 var pagerArea = el('div', { style: { marginTop: '12px' } });
 var container = el('div');
 container.appendChild(listArea);
 container.appendChild(pagerArea);

 function render() {
 listArea.innerHTML = '';
 var totalPages = Math.max(1, Math.ceil(items.length / pageSize));
 if (currentPage >= totalPages) currentPage = totalPages - 1;
 if (currentPage < 0) currentPage = 0;

 var start = currentPage * pageSize;
 var slice = items.slice(start, start + pageSize);

 if (slice.length === 0) {
  listArea.appendChild(el('div', {
  style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '13px' }
  }, options.emptyText || 'No items.'));
 } else {
  slice.forEach(function(item, i) {
  options.renderItem(listArea, item, start + i);
  });
 }

 
 pagerArea.innerHTML = '';
 if (totalPages <= 1) return;

 var pagerRow = el('div', { style: {
  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
  gap: '8px', marginBottom: '6px'
 }});

 var atFirst = currentPage === 0;
 var atLast = currentPage >= totalPages - 1;

 var prevBtn = el('button', {
  className: btnClass,
  'aria-label': 'Previous page',
  style: { fontSize: '12px', opacity: atFirst ? '0.3' : '1', pointerEvents: atFirst ? 'none' : 'auto' },
  onClick: function() { goToPage(currentPage - 1); }
 }, '\u2190 Prev');

 var pageLabel = el('span', {
  'aria-live': 'polite',
  className: 'text-xs-muted'
 }, 'Page ' + (currentPage + 1) + ' of ' + totalPages);

 var nextBtn = el('button', {
  className: btnClass,
  'aria-label': 'Next page',
  style: { fontSize: '12px', opacity: atLast ? '0.3' : '1', pointerEvents: atLast ? 'none' : 'auto' },
  onClick: function() { goToPage(currentPage + 1); }
 }, 'Next \u2192');

 pagerRow.appendChild(prevBtn);
 pagerRow.appendChild(pageLabel);
 pagerRow.appendChild(nextBtn);
 pagerArea.appendChild(pagerRow);
 }

 function goToPage(page) {
 currentPage = page;
 render();
 if (options.scrollOnNav && listArea.scrollIntoView) {
  listArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
 }
 }

 function setItems(newItems) {
 items = newItems || [];
 currentPage = 0;
 render();
 }

 render();

 return {
 container: container,
 listArea: listArea,
 pagerArea: pagerArea,
 setItems: setItems,
 goToPage: goToPage,
 getPage: function() { return currentPage; },
 render: render
 };
}

function createServerPaginator(options) {
 var pageSize = options.pageSize || 50;
 var listArea = el('div');
 var pagerArea = el('div');
 var container = el('div');
 container.appendChild(listArea);
 container.appendChild(pagerArea);

 function renderPager(page, totalPages, total) {
 pagerArea.innerHTML = '';
 if (totalPages <= 1) return;

 var pagerRow = el('div', { style: {
  display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '12px', padding: '12px 0'
 }});

 var atFirst = page <= 1;
 var atLast = page >= totalPages;

 pagerRow.appendChild(el('button', {
  className: 'btn', disabled: atFirst,
  'aria-label': 'Previous page',
  style: { fontSize: '12px', padding: '6px 14px', opacity: atFirst ? '0.4' : '1' },
  onClick: function() { loadPage(page - 1); }
 }, '\u2190 Prev'));

 var startItem = (page - 1) * pageSize + 1;
 var endItem = Math.min(page * pageSize, total);
 pagerRow.appendChild(el('span', {
  'aria-live': 'polite',
  className: 'text-sm-muted'
 }, startItem + '\u2013' + endItem + ' of ' + total + ' (page ' + page + '/' + totalPages + ')'));

 pagerRow.appendChild(el('button', {
  className: 'btn', disabled: atLast,
  'aria-label': 'Next page',
  style: { fontSize: '12px', padding: '6px 14px', opacity: atLast ? '0.4' : '1' },
  onClick: function() { loadPage(page + 1); }
 }, 'Next \u2192'));

 pagerArea.appendChild(pagerRow);
 }

 function loadPage(page) {
 listArea.innerHTML = '';
 showLoading(listArea, 'list');
 options.loadPage(page, pageSize, function(result) {
  listArea.innerHTML = '';
  if (!result || !result.items || result.items.length === 0) {
  listArea.appendChild(el('div', {
   style: { color: 'var(--muted)', padding: '16px 0', textAlign: 'center' }
  }, options.emptyText || 'No matches.'));
  renderPager(0, 0, 0);
  return;
  }
  options.renderItems(listArea, result.items);
  renderPager(result.page, result.totalPages, result.total);
 });
 }

 return {
 container: container,
 listArea: listArea,
 pagerArea: pagerArea,
 loadPage: loadPage
 };
}

function show2FAModal(onVerified, options) {
 options = options || {};
 var title = options.title || 'Verify Your Identity';
 var reason = options.reason || 'This action requires email verification for security.';

 
 var overlay = el('div', {
 style: { position: 'fixed', top: '0', left: '0', right: '0', bottom: '0', background: 'rgba(0,0,0,0.6)', zIndex: '9999', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }
 });

 var modal = el('div', {
 style: { background: 'var(--cardBg, #1e1e1e)', borderRadius: '16px', padding: '28px 24px', maxWidth: '380px', width: '100%', textAlign: 'center', boxShadow: '0 8px 32px rgba(0,0,0,0.3)' }
 });

 modal.appendChild(el('div', { style: { fontSize: '36px', marginBottom: '12px' } }, '\uD83D\uDD12'));
 modal.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '18px', fontWeight: '700', color: 'var(--text)', marginBottom: '8px' } }, title));
 modal.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '16px', lineHeight: '1.5' } }, reason));

 var statusArea = el('div', { style: { fontSize: '13px', color: 'var(--accent)', marginBottom: '12px', minHeight: '20px' } }, 'Sending verification code...');
 modal.appendChild(statusArea);

 var inputWrap = el('div', { style: { marginBottom: '16px' } });
 var codeInput = el('input', {
 type: 'text',
 className: 'form-input',
 placeholder: '000000',
 maxLength: '6',
 style: { textAlign: 'center', fontSize: '24px', letterSpacing: '6px', fontWeight: '700', padding: '12px', width: '100%', boxSizing: 'border-box' },
 inputMode: 'numeric',
 pattern: '[0-9]*',
 autocomplete: 'one-time-code'
 });
 inputWrap.appendChild(codeInput);
 modal.appendChild(inputWrap);

 var btnRow = el('div', { style: { display: 'flex', gap: '10px', justifyContent: 'center' } });

 var verifyBtn = el('button', {
 className: 'btn-primary',
 style: { flex: '1', padding: '10px 20px', fontSize: '14px', fontWeight: '600', borderRadius: '8px' },
 onClick: function() {
  var code = codeInput.value.trim();
  if (code.length !== 6 || !/^\d{6}$/.test(code)) {
  statusArea.textContent = 'Please enter a 6-digit code.';
  statusArea.style.color = 'var(--danger, #ef4444)';
  return;
  }
  verifyBtn.disabled = true;
  verifyBtn.textContent = 'Verifying...';
  statusArea.textContent = '';

  serverCall().withSuccessHandler(function(res) {
  if (res && res.success) {
   statusArea.textContent = 'Verified!';
   statusArea.style.color = 'var(--success, #22c55e)';
   setTimeout(function() {
   overlay.remove();
   if (typeof onVerified === 'function') onVerified();
   }, 500);
  } else {
   statusArea.textContent = (res && res.error) || 'Invalid code.';
   statusArea.style.color = 'var(--danger, #ef4444)';
   verifyBtn.disabled = false;
   verifyBtn.textContent = 'Verify';
   codeInput.value = '';
   codeInput.focus();
  }
  }).withFailureHandler(function() {
  statusArea.textContent = 'Verification failed. Try again.';
  statusArea.style.color = 'var(--danger, #ef4444)';
  verifyBtn.disabled = false;
  verifyBtn.textContent = 'Verify';
  }).dataVerify2FACode(SESSION_TOKEN, code);
 }
 }, 'Verify');

 var cancelBtn = el('button', {
 className: 'btn-outline',
 style: { flex: '1', padding: '10px 20px', fontSize: '14px', borderRadius: '8px' },
 onClick: function() { overlay.remove(); }
 }, 'Cancel');

 btnRow.appendChild(verifyBtn);
 btnRow.appendChild(cancelBtn);
 modal.appendChild(btnRow);

 
 var resendArea = el('div', { style: { marginTop: '12px' } });
 var resendLink = el('button', {
 style: { background: 'none', border: 'none', color: 'var(--accent)', fontSize: '12px', cursor: 'pointer', textDecoration: 'underline', padding: '0' },
 onClick: function() {
  resendLink.textContent = 'Sending...';
  resendLink.disabled = true;
  serverCall().withSuccessHandler(function(res) {
  if (res && res.success) {
   statusArea.textContent = 'New code sent!';
   statusArea.style.color = 'var(--accent)';
  } else {
   statusArea.textContent = (res && res.error) || 'Failed to resend.';
   statusArea.style.color = 'var(--danger, #ef4444)';
  }
  resendLink.textContent = 'Resend code';
  resendLink.disabled = false;
  }).withFailureHandler(function() {
  statusArea.textContent = 'Failed to resend.';
  statusArea.style.color = 'var(--danger, #ef4444)';
  resendLink.textContent = 'Resend code';
  resendLink.disabled = false;
  }).dataRequest2FACode(SESSION_TOKEN);
 }
 }, 'Resend code');
 resendArea.appendChild(resendLink);
 modal.appendChild(resendArea);

 overlay.appendChild(modal);
 document.body.appendChild(overlay);

 
 overlay.setAttribute('tabindex', '-1');
 overlay.addEventListener('keydown', function(e) {
 if (e.key === 'Escape') overlay.remove();
 });
 overlay.focus();

 
 serverCall().withSuccessHandler(function(res) {
 if (res && res.success) {
  statusArea.textContent = 'Code sent to your email.';
  statusArea.style.color = 'var(--accent)';
  codeInput.focus();
 } else {
  statusArea.textContent = (res && res.error) || 'Failed to send code.';
  statusArea.style.color = 'var(--danger, #ef4444)';
 }
 }).withFailureHandler(function() {
 statusArea.textContent = 'Failed to send verification code.';
 statusArea.style.color = 'var(--danger, #ef4444)';
 }).dataRequest2FACode(SESSION_TOKEN);

 
 codeInput.addEventListener('keydown', function(e) {
 if (e.key === 'Enter') verifyBtn.click();
 });
}

function withTwoFactor(serverFn, options) {
 function _handler(result) {
 if (result && result.requires2FA) {
  show2FAModal(function() {
  
  serverFn(_handler);
  }, options);
 }
 }
 serverFn(_handler);
}

</script>
