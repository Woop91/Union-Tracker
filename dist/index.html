        if (PAGE_DATA.error === 'loggedout') {
          // User just signed out — clear any stored session token
          localStorage.removeItem('dashboardSessionToken');
          localStorage.removeItem('dashboardSessionRedirectCount');
        } else if (PAGE_DATA.tokenChecked) {
          // Server already rejected this token — clear it and reset redirect counter
          localStorage.removeItem('dashboardSessionToken');
          localStorage.removeItem('dashboardSessionRedirectCount');
        } else {
          var storedToken = localStorage.getItem('dashboardSessionToken');
          if (storedToken) {
            // Redirect-loop guard: max 2 attempts before clearing stale token.
            // Without this, Chrome's aggressive caching + stale localStorage token
            // can cause an infinite redirect cycle (works in incognito because
            // localStorage starts empty).
            var redirectCount = parseInt(localStorage.getItem('dashboardSessionRedirectCount') || '0', 10);
            if (redirectCount >= 2) {
              // Too many redirects — token is likely expired/invalid, clear it
              localStorage.removeItem('dashboardSessionToken');
              localStorage.removeItem('dashboardSessionRedirectCount');
              console.warn('Session restore: cleared stale token after ' + redirectCount + ' failed attempts');
