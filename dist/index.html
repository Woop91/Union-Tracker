 function escapeHtml(t) {
  if (t == null) return '';
  return String(t)
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#x27;')
  .replace(/`/g, '&#x60;');
 }
 function safeText(t) { return escapeHtml(t); }

  safeLSSet('dashboardSessionToken', SESSION_TOKEN);

 // biometric "Sign in with Face ID / Touch ID" button appears on next visit.
 
 if (CURRENT_VIEW !== 'auth' && SESSION_TOKEN && !IS_PIN_SESSION) {
  try {
  var _bioAvail = localStorage.getItem('dds_biometric_available');

  if (!_bioAvail && !_bioPrompted && typeof PasswordCredential !== 'undefined' && navigator.credentials && navigator.credentials.store) {
   localStorage.setItem('dds_devicekey_prompted', 'true');
   google.script.run
   .withSuccessHandler(function(result) {
    if (result && result.success && result.deviceKey) {
    try {
     var cred = new PasswordCredential({
     id: result.displayName || 'Member',
     password: result.deviceKey,
     name: result.displayName || 'Member'
     });
     navigator.credentials.store(cred).then(function() {
     try {
      localStorage.setItem('dds_biometric_available', 'true');
      localStorage.setItem('dds_biometric_name', result.displayName || '');
      localStorage.setItem('dds_credential_type', 'device_key');

    } catch (_) {}
    }

 if (CURRENT_VIEW === 'auth' && WEB_APP_URL) {
  try {
  if (PAGE_DATA.error === 'loggedout') {
   
   localStorage.removeItem('dashboardSessionToken');
   localStorage.removeItem('dashboardSessionRedirectCount');
  } else if (PAGE_DATA.tokenChecked) {
   
   localStorage.removeItem('dashboardSessionToken');
   localStorage.removeItem('dashboardSessionRedirectCount');
  } else {
   var storedToken = localStorage.getItem('dashboardSessionToken');
   if (storedToken) {
   
   // Without this, Chrome's aggressive caching + stale localStorage token
   
   
   var redirectCount = parseInt(localStorage.getItem('dashboardSessionRedirectCount') || '0', 10);
   if (redirectCount >= 2) {
    
    localStorage.removeItem('dashboardSessionToken');
    localStorage.removeItem('dashboardSessionRedirectCount');
    console.warn('Session restore: cleared stale token after ' + redirectCount + ' failed attempts');
   } else {
    safeLSSet('dashboardSessionRedirectCount', String(redirectCount + 1));
    
    window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(storedToken);
   }
   }
  }
  } catch (_lsErr) {
  
  console.warn('Session restore skipped:', _lsErr.message);
  }

 var _batchRequestStart = Date.now();

    var oldData = JSON.parse(oldCache);

     var od = oldData.data;
     var lenMatch = Array.isArray(od) && Array.isArray(batch)
     ? od.length === batch.length
     : typeof od === 'object' && typeof batch === 'object'
      ? Object.keys(od).length === Object.keys(batch).length
      : true;
     if (lenMatch && JSON.stringify(od) === JSON.stringify(batch)) {
     return; 
     }
    }
    }

   safeLSSet('dds_batchData_' + CURRENT_VIEW, JSON.stringify({ ts: Date.now(), data: _preloadedBatch }));

   _preloadedBatch = null;
   _preloadReady = true;
   for (var i = 0; i < _preloadCallbacks.length; i++) _preloadCallbacks[i](null);
   _preloadCallbacks = [];
  })

 function el(tag, attrs, children) {
  var elem = document.createElement(tag);
  if (attrs) {
  for (var key in attrs) {
   if (key === 'style' && typeof attrs[key] === 'object') {
   for (var s in attrs[key]) {
    elem.style[s] = attrs[key][s];
   }
   } else if (key === 'className') {
   elem.className = attrs[key];
   } else if (key.indexOf('on') === 0) {
   elem.addEventListener(key.substring(2).toLowerCase(), attrs[key]);
   } else if (typeof attrs[key] === 'boolean') {
   
   // presence semantics — setAttribute('selected', false) still adds the
   // attribute (string "false" is truthy in DOM). Use property assignment instead.
   elem[key] = attrs[key];
   } else {
   elem.setAttribute(key, attrs[key]);
   }
  }
  }
  if (children) {
  if (typeof children === 'string') {
   elem.textContent = children;
  } else if (Array.isArray(children)) {
   children.forEach(function(child) {
   if (typeof child === 'string') {
    elem.appendChild(document.createTextNode(child));
   } else if (child instanceof Node) {
    elem.appendChild(child);
   } else if (child != null && child !== false) {
    elem.appendChild(document.createTextNode(String(child)));
   }
   });
  } else if (children instanceof Node) {
   elem.appendChild(children);
  } else {
   elem.appendChild(document.createTextNode(String(children)));
  }
  }
  return elem;

 var _memberViewLoaded = typeof initMemberView === 'function';
 var _memberViewLoading = false; 

 function _loadMemberViewThen(container, callback) {
  if (_memberViewLoaded) { callback(); return; }
  if (_memberViewLoading) return; 
  _memberViewLoading = true;
  showLoading(container, 'kpi');
  google.script.run
  .withSuccessHandler(function(html) {
   if (html) {
   var temp = document.createElement('div');
   temp.innerHTML = html;
   var scripts = temp.querySelectorAll('script');
   for (var i = 0; i < scripts.length; i++) {
    try {
    var s = document.createElement('script');
    s.textContent = scripts[i].textContent;
    document.head.appendChild(s);
    } catch (scriptErr) {
    console.error('Member view script load failed:', scriptErr);
    }
   }
   }
   
   if (typeof initMemberView !== 'function') {
   console.error('Member view scripts loaded but initMemberView not defined. html length:', (html || '').length);
   _memberViewLoading = false;
   container.innerHTML = '';
   var errCard = el('div', { style: { textAlign: 'center', padding: '40px' } });
   errCard.appendChild(el('div', { style: { fontSize: '24px', marginBottom: '12px' } }, '\u26A0\uFE0F'));
   errCard.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '8px', color: 'var(--text)' } }, 'Member view failed to load'));
   errCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '16px' } }, 'The server returned empty content. Please reload the page.'));
   errCard.appendChild(el('button', {
    style: { padding: '8px 16px', borderRadius: '6px', background: 'var(--accent)', color: '#fff', border: 'none', cursor: 'pointer' },
    onClick: function() { location.reload(); }
   }, 'Reload'));
   container.appendChild(errCard);
   return;
   }
   _memberViewLoaded = true;
   _memberViewLoading = false;
   try {
   callback();
   } catch (cbErr) {
   console.error('Member view render error:', cbErr);
   container.innerHTML = '';
   var cbErrCard = el('div', { style: { textAlign: 'center', padding: '40px' } });
   cbErrCard.appendChild(el('div', { style: { fontSize: '24px', marginBottom: '12px' } }, '\u26A0\uFE0F'));
   cbErrCard.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '8px', color: 'var(--text)' } }, 'Member view failed to render'));
   cbErrCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '16px', fontFamily: 'monospace', wordBreak: 'break-all' } }, String(cbErr.message || cbErr)));
   cbErrCard.appendChild(el('button', {
    style: { padding: '8px 16px', borderRadius: '6px', background: 'var(--accent)', color: '#fff', border: 'none', cursor: 'pointer' },
    onClick: function() { location.reload(); }
   }, 'Reload'));
   container.appendChild(cbErrCard);
   }
  })
  .withFailureHandler(function(err) {
   _memberViewLoading = false;
   console.error('Failed to load member view:', err);
   container.innerHTML = '';
   var errCard = el('div', { style: { textAlign: 'center', padding: '40px' } });
   errCard.appendChild(el('div', { style: { fontSize: '24px', marginBottom: '12px' } }, '\u26A0\uFE0F'));
   errCard.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '8px', color: 'var(--text)' } }, 'Failed to load member view'));
   errCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '16px' } }, String(err.message || err)));
   errCard.appendChild(el('button', {
   style: { padding: '8px 16px', borderRadius: '6px', background: 'var(--accent)', color: '#fff', border: 'none', cursor: 'pointer' },
   onClick: function() { _loadMemberViewThen(container, callback); }
   }, 'Retry'));
   container.appendChild(errCard);
  })
  .getMemberViewHtml();
 }
