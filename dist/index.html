 var SESSION_TOKEN = PAGE_DATA.sessionToken || localStorage.getItem('dashboardSessionToken') || null;
 var INITIAL_TAB = PAGE_DATA.initialTab || null;

 
 var WEB_APP_URL = PAGE_DATA.webAppUrl || '';

 
 if (SESSION_TOKEN) {
  safeLSSet('dashboardSessionToken', SESSION_TOKEN);
  try { localStorage.removeItem('dashboardSessionRedirectCount'); } catch (_lsErr) {}
 }

 
 if (CURRENT_VIEW === 'auth' && WEB_APP_URL) {
  try {
  if (PAGE_DATA.error === 'loggedout') {
   
   localStorage.removeItem('dashboardSessionToken');
   localStorage.removeItem('dashboardSessionRedirectCount');
  } else if (PAGE_DATA.tokenChecked) {
   
   localStorage.removeItem('dashboardSessionToken');
   localStorage.removeItem('dashboardSessionRedirectCount');
  } else {
   var storedToken = localStorage.getItem('dashboardSessionToken');
   if (storedToken) {
   
   // Without this, Chrome's aggressive caching + stale localStorage token
   
   
   var redirectCount = parseInt(localStorage.getItem('dashboardSessionRedirectCount') || '0', 10);
   if (redirectCount >= 2) {
    
    localStorage.removeItem('dashboardSessionToken');
    localStorage.removeItem('dashboardSessionRedirectCount');
    console.warn('Session restore: cleared stale token after ' + redirectCount + ' failed attempts');
   } else {
    safeLSSet('dashboardSessionRedirectCount', String(redirectCount + 1));
    
    window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(storedToken);
   }
   }
  }
  } catch (_lsErr) {
  
  console.warn('Session restore skipped:', _lsErr.message);
  }
 }

 
 
 
 
 var _preloadedBatch = null;
 var _preloadReady = false;
 var _preloadCallbacks = [];
 var _preloadViewId = CURRENT_VIEW; 

 if ((CURRENT_VIEW === 'steward' || CURRENT_VIEW === 'member') && CURRENT_USER && CURRENT_USER.email) {
  google.script.run
  .withSuccessHandler(function(batch) {
   
   if (CURRENT_VIEW !== _preloadViewId) return;
   _preloadedBatch = batch || {};
   _preloadReady = true;
   
   if (_swrApplied) {
   try {
    var oldCache = localStorage.getItem('dds_batchData_' + CURRENT_VIEW);
    if (oldCache) {
    var oldData = JSON.parse(oldCache);
    
    if (oldData && oldData.data) {
     var od = oldData.data;
     var lenMatch = Array.isArray(od) && Array.isArray(batch)
     ? od.length === batch.length
     : typeof od === 'object' && typeof batch === 'object'
      ? Object.keys(od).length === Object.keys(batch).length
      : true;
     if (lenMatch && JSON.stringify(od) === JSON.stringify(batch)) {
     return; 
     }
    }
    }
   } catch (_diffErr) {  }
   }
   
   safeLSSet('dds_batchData_' + CURRENT_VIEW, JSON.stringify({ ts: Date.now(), data: _preloadedBatch }));
   for (var i = 0; i < _preloadCallbacks.length; i++) _preloadCallbacks[i](_preloadedBatch);
   _preloadCallbacks = [];
  })
  .withFailureHandler(function() {
   
   if (CURRENT_VIEW !== _preloadViewId) return;
   _preloadedBatch = null;
   _preloadReady = true;
   for (var i = 0; i < _preloadCallbacks.length; i++) _preloadCallbacks[i](null);
   _preloadCallbacks = [];
  })
  .dataGetBatchData(SESSION_TOKEN);
 }

 
 function _onPreloadReady(cb) {
  if (_preloadReady) { cb(_preloadedBatch); return; }
  _preloadCallbacks.push(cb);
 }

  try {

  function getTheme(role, isDark) {
  var base = roleThemes[role] || roleThemes.member;
  var src = isDark ? base.dark : base.light;
  var t = {};
  for (var k in src) { if (src.hasOwnProperty(k)) t[k] = src[k]; }
  for (var key in palette) { t[key] = palette[key]; }
  return t;
  }

  function applyTheme(t) {
  var root = document.documentElement;
  for (var key in t) {
   if (typeof t[key] === 'string') {
   root.style.setProperty('--' + key, t[key]);
   }
  }
  document.body.style.background = t.bg;
  document.body.style.color = t.text;
  document.body.style.fontFamily = t.fontBody;
  root.dataset.themeMode = t.mode || 'light';
  if (typeof ChartHelper !== 'undefined' && ChartHelper.invalidateColorCache) {
   ChartHelper.invalidateColorCache();
  }
  }

  
  function apply() {
  var styleId = AppState.navTheme || 'default';
  _loadThemeFonts(styleId);
  var isCyber = styleId === 'cyberpunk';

  
  if (isCyber) {
   var neonKey = AppState.cyberNeon || 'red';
   var cyberPalette = _buildCyberPalette(neonKey);
   applyTheme(cyberPalette);
   
   var n = CYBER_NEONS[neonKey] || CYBER_NEONS.red;
   document.documentElement.style.setProperty('--neon-solid', n.isMulti ? CYBER_NEONS.red.solid : n.solid);
   document.documentElement.style.setProperty('--neon-rgb', n.isMulti ? CYBER_NEONS.red.rgb : n.rgb);
   
   if (n.isMulti) {
   for (var zk in MULTI_NEON_ZONES) {
    if (!MULTI_NEON_ZONES.hasOwnProperty(zk)) continue;
    document.documentElement.style.setProperty('--neon-' + zk, MULTI_NEON_ZONES[zk].solid);
    document.documentElement.style.setProperty('--neon-' + zk + '-rgb', MULTI_NEON_ZONES[zk].rgb);
   }
   document.body.classList.add('cyber-multi');
   } else {
   document.body.classList.remove('cyber-multi');
   }
  } else if (FORCED_PALETTES[styleId]) {
   var fp = FORCED_PALETTES[styleId];
   applyTheme(AppState.isDark ? fp.dark : fp.light);
   document.body.classList.remove('cyber-multi');
  } else {
   var t = getTheme(AppState.activeRole || 'member', AppState.isDark);
   applyTheme(t);
   document.body.classList.remove('cyber-multi');
  }

  
  document.body.className = document.body.className
   .replace(/\btheme-\S+/g, '')
   .replace(/\bnav-theme-\S+/g, '')
   .trim() + ' theme-' + styleId + ' nav-theme-' + styleId;

  function _manageCrtOverlay(show) {
  var crt = document.getElementById('crt-overlay');
  var beam = document.getElementById('crt-beam');
  var grid = document.getElementById('crt-grid');
  if (show) {
   if (!crt) {
   crt = document.createElement('div');
   crt.id = 'crt-overlay';
   crt.className = 'crt-overlay';
   document.body.appendChild(crt);
   }
   if (!beam) {
   beam = document.createElement('div');
   beam.id = 'crt-beam';
   beam.className = 'crt-scan-beam';
   document.body.appendChild(beam);
   }

   return; // Don't call preventDefault for unhandled keys
  }
  });

  
  var _origHandleTabNav = _handleTabNav;
  _handleTabNav = function() {
  _shortcutFocusIdx = -1;
  _clearKbFocus();
  return _origHandleTabNav.apply(this, arguments);
  };
 })();

 
 
 
 var ChartHelper = (function() {
  var _charts = {};
  var _chartJsLoaded = typeof Chart !== 'undefined';
  var _chartJsLoading = false;
  var _pendingCallbacks = [];
  var _cachedColors = null;

  var _chartJsFailed = false; 

  function _ensureChartJs(callback) {
  if (_chartJsLoaded) { callback(); return; }
  
  if (_chartJsFailed) { callback(true); return; }
  _pendingCallbacks.push(callback);
  if (_chartJsLoading) return;
  _chartJsLoading = true;
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js';
  script.crossOrigin = 'anonymous';
  script.onload = function() {
   _chartJsLoaded = true;
   _chartJsLoading = false;
   var cbs = _pendingCallbacks.slice();
   _pendingCallbacks = [];
   cbs.forEach(function(cb) { cb(); });
  };
  script.onerror = function() {
   
   _chartJsLoading = false;
   _chartJsFailed = true;
   var cbs = _pendingCallbacks.slice();
   _pendingCallbacks = [];
   cbs.forEach(function(cb) { cb(true); }); 
   console.warn('Chart.js CDN unavailable — charts will not render');
  };
  document.head.appendChild(script);
  }

  function _getColors() {
  if (_cachedColors) return _cachedColors;
  var cs = getComputedStyle(document.documentElement);
  _cachedColors = {
   accent:  cs.getPropertyValue('--accent').trim() || '#7c6ef6',
   success: cs.getPropertyValue('--success').trim() || '#4ade80',
   warning: cs.getPropertyValue('--warning').trim() || '#facc15',
   danger:  cs.getPropertyValue('--danger').trim() || '#ef4444',
   info:    cs.getPropertyValue('--info').trim() || '#60a5fa',
   text:    cs.getPropertyValue('--text').trim() || '#e0e0e0',
   muted:   cs.getPropertyValue('--muted').trim() || '#6b6b6b',
   border:  cs.getPropertyValue('--border').trim() || '#2a2a2a',
   surface: cs.getPropertyValue('--surface').trim() || '#1e1e1e',
  };
  return _cachedColors;
  }

  function invalidateColorCache() { _cachedColors = null; }

  function _palette(count) {
  var c = _getColors();
  var pool = [c.accent, c.success, c.warning, c.info, c.danger, '#a78bfa', '#f472b6', '#38bdf8'];
  var out = [];
  for (var i = 0; i < count; i++) out.push(pool[i % pool.length]);
  return out;
  }

  function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
  }

  
  function _showChartFallback(container) {
  container.insertAdjacentHTML('beforeend', '<div style="padding:20px;text-align:center;color:var(--text-secondary,#64748b);font-size:13px">' +
   'Charts unavailable &mdash; please check your connection and reload</div>');
  }

  function _create(container, id, cfg) {
  
  if (typeof Chart === 'undefined') { _showChartFallback(container); return null; }
  destroyChart(id);
  var wrap = el('div', { className: 'chart-container' });
  var canvas = document.createElement('canvas');
  canvas.id = id;
  wrap.appendChild(canvas);
  container.appendChild(wrap);
  var c = _getColors();
  Chart.defaults.color = c.muted;
  Chart.defaults.borderColor = c.border;
  Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
  _charts[id] = new Chart(canvas, cfg);
  return _charts[id];
  }

  function _lazyCreate(container, id, cfgFn) {
  _ensureChartJs(function(failed) { if (failed) return; cfgFn(); });
  }

  function createBarChart(container, id, labels, datasets, opts) {
  _ensureChartJs(function(failed) {
   if (failed) { _showChartFallback(container); return; }
   var c = _getColors();
   var dsList = datasets.map(function(ds, i) {
   return Object.assign({
    backgroundColor: ds.color || _palette(datasets.length)[i],
    borderRadius: 4,
    maxBarThickness: 40,
   }, ds);
   });
   _create(container, id, {
   type: 'bar',
   data: { labels: labels, datasets: dsList },
   options: Object.assign({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: datasets.length > 1, labels: { boxWidth: 12 } } },
    scales: { y: { beginAtZero: true, grid: { color: c.border } }, x: { grid: { display: false } } },
   }, opts || {}),
   });
  });
  }

  function createHorizontalBarChart(container, id, labels, data, colors) {
  _ensureChartJs(function(failed) {
   if (failed) { _showChartFallback(container); return; }
   var c = _getColors();
   _create(container, id, {
   type: 'bar',
   data: {
    labels: labels,
    datasets: [{ data: data, backgroundColor: colors || _palette(labels.length), borderRadius: 4, maxBarThickness: 28 }],
   },
   options: {
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { x: { beginAtZero: true, grid: { color: c.border } }, y: { grid: { display: false } } },
   },
   });
  });
  }

  function createDoughnutChart(container, id, labels, data, colors) {
  _ensureChartJs(function(failed) {
   if (failed) { _showChartFallback(container); return; }
   _create(container, id, {
   type: 'doughnut',
   data: {
    labels: labels,
    datasets: [{ data: data, backgroundColor: colors || _palette(labels.length), borderWidth: 0, spacing: 2 }],
   },
   options: {
    responsive: true, maintainAspectRatio: false, cutout: '65%',
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12 } } },
   },
   });
  });
  }

  function createLineChart(container, id, labels, datasets, opts) {
  _ensureChartJs(function(failed) {
   if (failed) { _showChartFallback(container); return; }
   var c = _getColors();
   var dsList = datasets.map(function(ds, i) {
   return Object.assign({
    borderColor: ds.color || _palette(datasets.length)[i],
    backgroundColor: (ds.color || _palette(datasets.length)[i]) + '20',
    fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2,
   }, ds);
   });
   _create(container, id, {
   type: 'line',
   data: { labels: labels, datasets: dsList },
   options: Object.assign({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: datasets.length > 1, labels: { boxWidth: 12 } } },
    scales: { y: { beginAtZero: true, grid: { color: c.border } }, x: { grid: { display: false } } },
   }, opts || {}),
   });
  });
  }

  return {
  createBarChart: createBarChart,
  createHorizontalBarChart: createHorizontalBarChart,
  createDoughnutChart: createDoughnutChart,
  createLineChart: createLineChart,
  destroyChart: destroyChart,
  invalidateColorCache: invalidateColorCache,
  };
 })();

 
 
 
 
 
 
 var IdleLogout = (function() {
  var IDLE_MS = 15 * 60 * 1000;   
  var WARN_SEC = 2 * 60;          
  var _idleTimer = null;
  var _countdownInterval = null;
  var _modalEl = null;

  function _resetTimer() {
  clearTimeout(_idleTimer);
  if (_modalEl) _dismissWarning();
  _idleTimer = setTimeout(_showWarning, IDLE_MS);
  }

  function _showWarning() {
  var remaining = WARN_SEC;
  _modalEl = document.createElement('div');
  _modalEl.setAttribute('role', 'alertdialog');
  _modalEl.setAttribute('aria-modal', 'true');
  _modalEl.setAttribute('aria-label', 'Session timeout warning');
  _modalEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  var card = document.createElement('div');
  card.style.cssText = 'background:var(--surface,#fff);border-radius:12px;padding:24px 32px;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)';
  card.innerHTML = '<div style="font-size:18px;font-weight:700;margin-bottom:12px;color:var(--text,#1e293b)">Session Expiring</div>' +
   '<div style="color:var(--text-secondary,#64748b);margin-bottom:16px">You will be logged out in <span id="idle-countdown" style="font-weight:700;color:var(--accent,#3b82f6)">' + remaining + '</span> seconds due to inactivity.</div>' +
   '<button id="idle-stay-btn" style="background:var(--accent,#3b82f6);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">Stay logged in</button>';
  _modalEl.appendChild(card);
  document.body.appendChild(_modalEl);

  document.getElementById('idle-stay-btn').addEventListener('click', function() {
   _dismissWarning();
   _resetTimer();
  });

  _modalEl.addEventListener('keydown', function(e) {
   if (e.key === 'Escape') { _dismissWarning(); _resetTimer(); }
  });
  document.getElementById('idle-stay-btn').focus();

  _countdownInterval = setInterval(function() {
   remaining--;
   var el = document.getElementById('idle-countdown');
   if (el) el.textContent = remaining;
   if (remaining <= 0) {
   clearInterval(_countdownInterval);
   _countdownInterval = null;
   _doLogout();
   }
  }, 1000);
  }

  function _dismissWarning() {
  if (_countdownInterval) { clearInterval(_countdownInterval); _countdownInterval = null; }
  if (_modalEl && _modalEl.parentNode) { _modalEl.parentNode.removeChild(_modalEl); _modalEl = null; }
  }

  function _doLogout() {
  _dismissWarning();
  
  var token = SESSION_TOKEN || '';
  function _redirect() {
   if (WEB_APP_URL) {
   try { window.top.location.href = WEB_APP_URL + '?loggedout=1'; } catch (_e) {
    window.location.href = WEB_APP_URL + '?loggedout=1';
   }
   } else {
   try { window.top.location.reload(); } catch (_e2) { window.location.reload(); }
   }
  }
  if (token) {
   try {
   google.script.run
    .withSuccessHandler(_redirect)
    .withFailureHandler(_redirect)
    .authLogout(token);
   } catch (_e) { _redirect(); }
  } else {
   _redirect();
  }
  }

  function init() {
  var events = ['click', 'keypress', 'scroll', 'touchstart'];
  for (var i = 0; i < events.length; i++) {
   document.addEventListener(events[i], _resetTimer, { passive: true, capture: true });
  }
  _resetTimer();
  }

  function destroy() {
  clearTimeout(_idleTimer);
  _dismissWarning();
  var events = ['click', 'keypress', 'scroll', 'touchstart'];
  for (var i = 0; i < events.length; i++) {
   document.removeEventListener(events[i], _resetTimer, { capture: true });
  }
  
  _cleanupAppTimers();
  }

  return { init: init, destroy: destroy, reset: _resetTimer };
 })();

  (function() {

    banner = el('div', {
     id: '_offline-banner',

     btn.dataset.offlineDisabled = 'true';
