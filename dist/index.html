  <script>
    // ═══════════════════════════════════════
    // BOOTSTRAP — Parse server-injected data
    // ═══════════════════════════════════════
    // H-50: pageData is JSON.stringify'd server-side before injection.
    // Safety depends on server-side serialization via JSON.stringify() which
    // escapes <\/script> sequences. Do not change to HTML-escaped output (double-escape).
    var PAGE_DATA = <?!= pageData ?>;
    var CONFIG = PAGE_DATA.config;
    var CURRENT_VIEW = PAGE_DATA.view;
    var CURRENT_USER = PAGE_DATA.user || null;
    var IS_DUAL_ROLE = PAGE_DATA.isDualRole || false;
    var SESSION_TOKEN = PAGE_DATA.sessionToken || localStorage.getItem('dashboardSessionToken') || null;
    var INITIAL_TAB = PAGE_DATA.initialTab || null;

    // Web app URL for redirects (injected server-side, avoids iframe URL issues)
    var WEB_APP_URL = PAGE_DATA.webAppUrl || '';

    // Store session token in localStorage if provided
    if (SESSION_TOKEN) {
      localStorage.setItem('dashboardSessionToken', SESSION_TOKEN);
    }

    // On auth page: try to restore session from localStorage
    if (CURRENT_VIEW === 'auth' && WEB_APP_URL) {
      try {
        if (PAGE_DATA.error === 'loggedout') {
          // User just signed out — clear any stored session token
          localStorage.removeItem('dashboardSessionToken');
        } else {
          var storedToken = localStorage.getItem('dashboardSessionToken');
          if (storedToken && !PAGE_DATA.tokenChecked) {
            // Redirect to web app URL with stored session token so server can validate
            window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(storedToken);
          } else if (PAGE_DATA.tokenChecked && storedToken) {
            // Server already rejected this token — clear it
            localStorage.removeItem('dashboardSessionToken');
          }
        }
      } catch (_lsErr) {
        // localStorage may be blocked (e.g. Safari privacy) — continue without session restore
        console.warn('Session restore skipped:', _lsErr.message);
      }
    }

    // ═══════════════════════════════════════
    // THEME ENGINE
    // ═══════════════════════════════════════
    var ThemeEngine = (function() {

      function generatePalette(hue) {
        return {
          accent:       'hsl(' + hue + ', 70%, 68%)',
          accentDim:    'hsl(' + hue + ', 50%, 45%)',
          accentGlow:   'hsla(' + hue + ', 70%, 68%, 0.3)',
          accentBg:     'hsla(' + hue + ', 70%, 68%, 0.1)',
          accentBorder: 'hsla(' + hue + ', 70%, 68%, 0.25)',
        };
      }

      var palette = generatePalette(CONFIG.accentHue || 250);

      var themes = {
        steward: {
          dark: {
            bg: '#141414', surface: '#1e1e1e', raised: '#262626',
            text: '#e0e0e0', muted: '#6b6b6b',
            success: '#4ade80', warning: '#facc15', danger: '#ef4444', info: '#60a5fa',
            border: '#2a2a2a', radius: '10px',
            fontBody: "'JetBrains Mono', monospace",
            fontDisplay: "'Space Grotesk', sans-serif",
            mode: 'dark',
          },
          light: {
            bg: '#f2f2f5', surface: '#ffffff', raised: '#f8f8fa',
            text: '#1a1a2e', muted: '#8888a0',
            success: '#16a34a', warning: '#d97706', danger: '#dc2626', info: '#2563eb',
            border: '#e2e2ea', radius: '10px',
            fontBody: "'JetBrains Mono', monospace",
            fontDisplay: "'Space Grotesk', sans-serif",
            mode: 'light',
          }
        },
        member: {
          dark: {
            bg: '#0c0c1d', surface: 'rgba(255,255,255,0.05)', raised: 'rgba(255,255,255,0.08)',
            text: '#eeedf5', muted: '#7d7b96',
            success: '#34d399', warning: '#fbbf24', danger: '#f87171', info: '#60a5fa',
            border: 'rgba(255,255,255,0.08)', radius: '20px',
            fontBody: "'Plus Jakarta Sans', sans-serif",
            fontDisplay: "'Sora', sans-serif",
            mode: 'dark',
          },
          light: {
            bg: '#f0f0f8', surface: 'rgba(255,255,255,0.85)', raised: 'rgba(255,255,255,0.95)',
            text: '#1a1a2e', muted: '#7d7b96',
            success: '#059669', warning: '#d97706', danger: '#dc2626', info: '#2563eb',
            border: 'rgba(0,0,0,0.08)', radius: '20px',
            fontBody: "'Plus Jakarta Sans', sans-serif",
            fontDisplay: "'Sora', sans-serif",
            mode: 'light',
          }
        }
      };

      function getTheme(role, isDark) {
        var base = themes[role] || themes.member;
        // H-5 fix: Shallow copy to avoid mutating shared theme objects
        var src = isDark ? base.dark : base.light;
        var t = {};
        for (var k in src) { if (src.hasOwnProperty(k)) t[k] = src[k]; }
        // Merge accent colors
        for (var key in palette) {
          t[key] = palette[key];
        }
        return t;
      }

      function applyTheme(t) {
        var root = document.documentElement;
        for (var key in t) {
          if (typeof t[key] === 'string') {
            root.style.setProperty('--' + key, t[key]);
          }
        }
        document.body.style.background = t.bg;
        document.body.style.color = t.text;
        document.body.style.fontFamily = t.fontBody;
        // Expose theme mode on root for CSS selectors (e.g. category badges)
        root.dataset.themeMode = t.mode || 'light';
        // Invalidate chart color cache on theme change
        if (typeof ChartHelper !== 'undefined' && ChartHelper.invalidateColorCache) {
          ChartHelper.invalidateColorCache();
        }
      }

      return {
        getTheme: getTheme,
        applyTheme: applyTheme,
        palette: palette,
      };
    })();

    // ═══════════════════════════════════════
    // NAV THEME ENGINE — 5 nav visual styles
    // ═══════════════════════════════════════
    var NavThemes = (function() {
      // Per-tab accent colors for color-coded themes
      var TAB_COLORS = {
        cases: '#ff3366', members: '#8b5cf6', insights: '#06d6a0', contactlog: '#3b82f6',
        tasks: '#f59e0b', workload: '#f97316', home: '#ff3366',
        more: '#ec4899', more_steward: '#ec4899', _steward_more: '#ec4899', _member_more: '#ec4899',
        poms: '#3b82f6', resources: '#8b5cf6', orgchart: '#06d6a0', qaforum: '#f59e0b',
        polls: '#ec4899', feedback: '#ff3366', broadcast: '#3b82f6', notifications: '#f59e0b',
        events: '#06d6a0', timeline: '#8b5cf6', surveytrack: '#ec4899', failsafe: '#f97316',
        testrunner: '#3b82f6', minutes: '#8b5cf6', profile: '#06d6a0', survey: '#ec4899',
        stewarddirectory: '#8b5cf6', mytasks: '#f59e0b', unionstats: '#3b82f6', meetings: '#06d6a0',

      var themes = {
        'default': {

          type: 'default',
        },
        'blobLava': {
          tid: 'blobLava', label: 'Blob Lava', emoji: '🌋',
          desc: 'Morphing lava blob tracks your active tab',
          type: 'default',
        },
        'cyberpunk': {
          tid: 'cyberpunk', label: 'Cyberpunk', emoji: '🔲',
          desc: 'Grid lines, scanlines, hard neon glow',
          type: 'extra',
        },
        'shatter': {
          tid: 'shatter', label: 'Shatter', emoji: '💎',
          desc: 'Color shards — tap to activate',
          type: 'extra',
        },
        'liquidPour': {
          tid: 'liquidPour', label: 'Liquid Pour', emoji: '🧪',
          desc: 'Floating bubble nav with color fill',
          type: 'extra',
        },
      };

      function getTabColor(tabId) {
        return TAB_COLORS[tabId] || '#8b5cf6';
      }

      function getTabGradient(tabId) {
        var c = getTabColor(tabId);
        // Shift hue slightly for gradient endpoint
        return 'linear-gradient(135deg, ' + c + ', ' + c + 'cc)';
      }

      function setNavTheme(themeId) {
        if (!themes[themeId]) themeId = 'default';
        AppState.navTheme = themeId;
        try { localStorage.setItem('dds_navTheme', themeId); } catch(e) {}
        // Apply nav theme class to body
        document.body.className = document.body.className
          .replace(/\bnav-theme-\S+/g, '')
          .trim() + ' nav-theme-' + themeId;
      }

      function getAll() { return themes; }
      function getCurrent() { return themes[AppState.navTheme] || themes['default']; }

      // Apply on load
      function init() { setNavTheme(AppState.navTheme); }

      return {
        themes: themes,
        getTabColor: getTabColor,
        getTabGradient: getTabGradient,
        setNavTheme: setNavTheme,
        getAll: getAll,
        getCurrent: getCurrent,
        init: init,
      };
    })();

    // ═══════════════════════════════════════
    // SAFE SERVER CALL — default failure handler for google.script.run
    // ═══════════════════════════════════════
    /**
     * Wraps google.script.run so every call automatically gets a
     * .withFailureHandler() if the caller doesn't supply one.
     * This prevents silent spinner-forever failures.
     *
     * Usage (drop-in replacement for google.script.run):
     *   serverCall()
     *     .withSuccessHandler(fn)
     *     .myServerFunction(args);
     *
     * The default failure handler logs the error and hides any
     * active loading state. Callers can still override with their
     * own .withFailureHandler() — it will replace the default.
     */
    function serverCall() {
      var runner = google.script.run;
      runner = runner.withFailureHandler(function(err) {
        var msg = (err && err.message) ? err.message : String(err || 'Unknown error');
        console.error('Server call failed:', msg, err);
        // Dismiss any loading spinners and show the ACTUAL error
        var spinners = document.querySelectorAll('.loading-spinner');
        spinners.forEach(function(s) {
          s.innerHTML = '<div class="empty-state" style="text-align:center;padding:20px;">'
            + '<div style="font-size:24px;margin-bottom:8px;">⚠️</div>'
            + '<div style="color:var(--text);font-weight:600;margin-bottom:6px;">Something went wrong</div>'
            + '<div style="color:var(--muted);font-size:12px;max-width:400px;margin:0 auto 12px;word-break:break-word;">' + msg + '</div>'
            + '<button onclick="location.reload()" style="padding:6px 16px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;">Reload</button>'
            + '</div>';
        });
      });
      return runner;
    }

    // ═══════════════════════════════════════
    // CLIENT-SIDE DATA CACHE — prevents redundant server calls on tab switches
    // ═══════════════════════════════════════
    var DataCache = (function() {
      var _cache = {};
      var DEFAULT_TTL = 120000; // 2 minutes

      function get(key) {
        var entry = _cache[key];
        if (!entry) return undefined;
        if (Date.now() > entry.expires) { delete _cache[key]; return undefined; }
        return entry.value;
      }

      function set(key, value, ttlMs) {
        _cache[key] = { value: value, expires: Date.now() + (ttlMs || DEFAULT_TTL) };
      }

      function invalidate(key) { if (key) delete _cache[key]; else _cache = {}; }

      /**
       * Wraps a google.script.run call with caching.
       * @param {string} cacheKey - Cache key
       * @param {string} fnName - server function name
       * @param {Array} args - arguments to pass
       * @param {Function} onSuccess - success callback
       * @param {Function} [onFailure] - failure callback
       * @param {number} [ttlMs] - cache TTL in ms
       */
      function cachedCall(cacheKey, fnName, args, onSuccess, onFailure, ttlMs) {
        var cached = get(cacheKey);
        if (cached !== undefined) {
          onSuccess(cached);
          return;
        }
        var runner = google.script.run
          .withSuccessHandler(function(result) {
            set(cacheKey, result, ttlMs);
            onSuccess(result);
          })
          .withFailureHandler(onFailure || function(err) {
            console.error('cachedCall(' + fnName + ') failed:', err);
          });
        runner[fnName].apply(runner, args || []);
      }

      return { get: get, set: set, invalidate: invalidate, cachedCall: cachedCall };
    })();

    // ═══════════════════════════════════════
    // APP STATE
    // ═══════════════════════════════════════
    var AppState = {
      view: CURRENT_VIEW,
      role: CURRENT_USER ? CURRENT_USER.role : null,
      activeRole: CURRENT_VIEW, // which view is shown (for dual-role toggle)
      isDark: true,
      navTheme: (function() { try { return localStorage.getItem('dds_navTheme') || 'default'; } catch(e) { return 'default'; } })(),
      user: CURRENT_USER,
      cases: [],
      kpis: null,
      grievances: [],
      loading: true,
      initialTab: INITIAL_TAB, // deep-link: ?page=xxx from URL
      notificationCount: 0,
    };

    // ═══════════════════════════════════════
    // ROUTER (with optional batch pre-fetch)
    // ═══════════════════════════════════════
    function initApp() {
      var app = document.getElementById('app');
      NavThemes.init();

      switch (CURRENT_VIEW) {
        case 'auth':
          renderAuth(app);
          break;
        case 'steward':
        case 'member':
          // Pre-fetch batch data in a single round-trip, then init the view.
          // Falls back to per-view init if batch fails.
          if (CURRENT_USER && CURRENT_USER.email) {
            google.script.run
              .withSuccessHandler(function(batch) {
                AppState.batchData = batch || {};
                if (CURRENT_VIEW === 'steward') initStewardView(app);
                else initMemberView(app);
              })
              .withFailureHandler(function() {
                // Batch unavailable — views will make individual calls
                AppState.batchData = null;
                if (CURRENT_VIEW === 'steward') initStewardView(app);
                else initMemberView(app);
              })
              .dataGetBatchData(SESSION_TOKEN);
          } else {
            if (CURRENT_VIEW === 'steward') initStewardView(app);
            else initMemberView(app);
          }
          break;
        case 'error':
          renderError(app, PAGE_DATA.error);
          break;
        default:
          renderAuth(app);
      }
    }

    // ═══════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════
    function el(tag, attrs, children) {
      var elem = document.createElement(tag);
      if (attrs) {
        for (var key in attrs) {
          if (key === 'style' && typeof attrs[key] === 'object') {
            for (var s in attrs[key]) {
              elem.style[s] = attrs[key][s];
            }
          } else if (key === 'className') {
            elem.className = attrs[key];
          } else if (key.indexOf('on') === 0) {
            elem.addEventListener(key.substring(2).toLowerCase(), attrs[key]);
          } else if (typeof attrs[key] === 'boolean') {
            // CR-XSS-18: Boolean attributes (selected, disabled, checked) must use
            // presence semantics — setAttribute('selected', false) still adds the
            // attribute (string "false" is truthy in DOM). Use property assignment instead.
            elem[key] = attrs[key];
          } else {
            elem.setAttribute(key, attrs[key]);
          }
        }
      }
      if (children) {
        if (typeof children === 'string') {
          elem.textContent = children;
        } else if (Array.isArray(children)) {
          children.forEach(function(child) {
            if (typeof child === 'string') {
              elem.appendChild(document.createTextNode(child));
            } else if (child) {
              elem.appendChild(child);
            }
          });
        } else {
          elem.appendChild(children);
        }
      }
      return elem;
    }

    /**
     * H-49: Parses an HTML string into a DOM element. WARNING: Only pass trusted/
     * pre-escaped HTML strings to this function. Never pass unsanitized user input
     * — use el() with textContent or escapeHtml() for dynamic data instead.
     */
    function html(str) {
      var div = document.createElement('div');
      div.innerHTML = str;
      return div.firstChild;
    }

    function showLoading(container) {
      container.innerHTML = '';
      var loader = el('div', { className: 'loading-spinner' });
      loader.innerHTML = '<div class="spinner"></div><div class="loading-text">Loading...</div>';
      container.appendChild(loader);
    }

    function handleLogout() {
      var token = localStorage.getItem('dashboardSessionToken');
      localStorage.removeItem('dashboardSessionToken');

      function _redirectToLogout() {
        // Redirect to web app URL with loggedout flag — bypasses SSO auto-re-auth
        if (WEB_APP_URL) {
          try { window.top.location.href = WEB_APP_URL + '?loggedout=1'; } catch (_e) {
            window.location.href = WEB_APP_URL + '?loggedout=1';
          }
        } else {
          try { window.top.location.reload(); } catch (_e2) { window.location.reload(); }
        }
      }

      if (token) {
        google.script.run
          .withSuccessHandler(function() { _redirectToLogout(); })
          .withFailureHandler(function() { _redirectToLogout(); })
          .authLogout(token);
      } else {
        _redirectToLogout();
      }
    }

    // ═══════════════════════════════════════
    // LAYOUT DETECTION
    // ═══════════════════════════════════════
    var LayoutState = { mode: 'mobile', width: 0 };

    function getLayoutMode() {
      var w = window.innerWidth || document.documentElement.clientWidth;
      LayoutState.width = w;
      if (w >= 1024) { LayoutState.mode = 'desktop'; }
      else if (w >= 640) { LayoutState.mode = 'tablet'; }
      else { LayoutState.mode = 'mobile'; }
      return LayoutState.mode;
    }

    function isSidebarLayout() {
      return LayoutState.mode !== 'mobile';
    }

    /**
     * Renders the page with sidebar nav on tablet+ or bottom nav on mobile.
     * @param {Element} container - The #app element
     * @param {string} role - 'member' or 'steward'
     * @param {string} activeTab - The currently active tab id
     * @param {Function} contentFn - Called with contentContainer to render page content
     */
    function renderPageLayout(container, role, activeTab, contentFn) {
      container.innerHTML = '';
      getLayoutMode();

      if (isSidebarLayout()) {
        var layout = el('div', { className: 'page-layout' });
        var sidebar = el('nav', { className: 'sidebar-nav' });
        renderSidebarItems(sidebar, role, activeTab);
        layout.appendChild(sidebar);

        var content = el('div', { className: 'page-layout-content' });
        contentFn(content);
        layout.appendChild(content);
        container.appendChild(layout);
      } else {
        contentFn(container);
        renderBottomNav(container, role, activeTab);
      }
    }

    function renderSidebarItems(sidebar, role, activeTab) {
      var header = el('div', { className: 'sidebar-header', style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' } });
      var headerText = el('div');
      headerText.appendChild(el('div', { className: 'sidebar-header-title' }, CONFIG.orgAbbrev || CONFIG.orgName));
      if (CURRENT_USER) {
        headerText.appendChild(el('div', { className: 'sidebar-header-sub' }, CURRENT_USER.name));
      }
      header.appendChild(headerText);
      var bellWrap = el('div', { className: 'notif-bell-wrap', onClick: function() {
        _handleTabNav(role, 'notifications');
      }});
      bellWrap.appendChild(el('span', { className: 'notif-bell-icon' }, '\uD83D\uDD14'));
      // For stewards, bell total includes unanswered Q&A questions
      var _bellTotal = (AppState.notificationCount || 0) + (role === 'steward' ? (AppState.qaUnansweredCount || 0) : 0);
      if (_bellTotal > 0) {
        bellWrap.appendChild(el('span', { className: 'notif-bell-badge' }, String(_bellTotal)));
      }
      header.appendChild(bellWrap);
      sidebar.appendChild(header);

      var tabs = _getSidebarTabs(role);
      tabs.forEach(function(tab) {
        if (tab.divider) {
          sidebar.appendChild(el('div', { className: 'sidebar-divider' }));
          return;
        }
        if (tab.group) {
          sidebar.appendChild(el('div', { className: 'sidebar-group-label' }, tab.group));
          return;
        }
        var item = el('div', {
          className: 'sidebar-item' + (tab.id === activeTab ? ' active' : ''),
          onClick: function() { _handleTabNav(role, tab.id); }
        }, [
          el('span', { className: 'sidebar-item-icon' }, tab.icon),
          el('span', null, tab.label)
        ]);
        // Set per-tab accent color for themed nav styles
        if (tab.id === activeTab && AppState.navTheme !== 'default') {
          var tabColor = NavThemes.getTabColor(tab.id);
          item.style.setProperty('--blob-color', tabColor);
          item.style.setProperty('--blob-glow', tabColor + '44');
        }
        sidebar.appendChild(item);
      });

      // Bottom utility items
      sidebar.appendChild(el('div', { className: 'sidebar-divider' }));
      if (IS_DUAL_ROLE) {
        var switchRole = role === 'steward' ? 'member' : 'steward';
        var switchLabel = role === 'steward' ? CONFIG.memberLabel : CONFIG.stewardLabel;
        sidebar.appendChild(el('div', {
          className: 'sidebar-item',
          onClick: function() {
            AppState.activeRole = switchRole;
            var app = document.getElementById('app');
            if (switchRole === 'steward') initStewardView(app);
            else initMemberView(app);
          }
        }, [
          el('span', { className: 'sidebar-item-icon' }, role === 'steward' ? '\uD83D\uDC64' : '\uD83D\uDD27'),
          el('span', null, 'Switch to ' + switchLabel)
        ]));
      }
      sidebar.appendChild(el('div', {
        className: 'sidebar-item',
        onClick: function() {
          AppState.isDark = !AppState.isDark;
          var t = ThemeEngine.getTheme(AppState.activeRole || 'member', AppState.isDark);
          ThemeEngine.applyTheme(t);
          _handleTabNav(role, activeTab);
        }
      }, [
        el('span', { className: 'sidebar-item-icon' }, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'),
        el('span', null, AppState.isDark ? 'Light Mode' : 'Dark Mode')
      ]));
      // Nav Theme Picker — expandable in sidebar
      (function() {
        var currentTheme = NavThemes.getCurrent();
        var pickerWrap = el('div');
        var pickerToggle = el('div', {
          className: 'sidebar-item',
          onClick: function() {
            var panel = pickerWrap.querySelector('.nav-theme-picker');
            if (panel) {
              panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
            }
          }
        }, [
          el('span', { className: 'sidebar-item-icon' }, '\uD83C\uDFA8'),
          el('span', null, 'Nav Style: ' + currentTheme.emoji)
        ]);
        pickerWrap.appendChild(pickerToggle);

        var pickerPanel = el('div', { className: 'nav-theme-picker', style: { display: 'none', padding: '4px 12px 8px' } });
        var allThemes = NavThemes.getAll();
        for (var tid in allThemes) {
          if (!allThemes.hasOwnProperty(tid)) continue;
          var th = allThemes[tid];
          (function(themeObj) {
            var isActive = AppState.navTheme === themeObj.tid;
            var item = el('div', {
              className: 'nav-theme-picker-item' + (isActive ? ' active' : ''),
              onClick: function() {
                NavThemes.setNavTheme(themeObj.tid);
                _handleTabNav(role, activeTab);
              }
            });
            item.appendChild(el('span', { className: 'ntp-emoji' }, themeObj.emoji));
            var info = el('div');
            info.appendChild(el('div', { className: 'ntp-label' }, themeObj.label));
            info.appendChild(el('div', { className: 'ntp-desc' }, themeObj.desc));
            item.appendChild(info);
            item.appendChild(el('span', {

    function renderOrgChart(appContainer, role) {
      renderPageLayout(appContainer, role, 'orgchart', function(container) {

          .withSuccessHandler(function(html) {
            container.innerHTML = '';
            var wrap = el('div');
            wrap.innerHTML = html;
            container.appendChild(wrap);
            // Re-execute any <script> tags from org_chart.html
            wrap.querySelectorAll('script').forEach(function(old) {
              var s = document.createElement('script');
              s.textContent = old.textContent;
              old.parentNode.replaceChild(s, old);
            });
          })
          .withFailureHandler(function(err) {
            container.innerHTML = '';

    function _handleTabNav(role, tabId) {
      var app = document.getElementById('app');
      AppState.activeTab = tabId; // track for badge refresh
      // Handle "More" menus for both roles (mobile bottom-nav)
      if (tabId === '_member_more') { renderMemberMore(app); return; }
      if (tabId === '_steward_more') { renderStewardMore(app); return; }
      // Shared tabs (available in both roles)
      if (tabId === 'orgchart') {
        // Block non-dues-paying members from org chart; stewards always have access
        if (role === 'member' && typeof _isDuesPaying === 'function' && !_isDuesPaying()) {
          if (typeof _renderDuesGate === 'function') {
            _renderDuesGate(app, 'Org Chart', function() { _handleTabNav(role, 'home'); });
          }
          return;
        }
        renderOrgChart(app, role);
        return;
      }
      // POMS Reference — shared across both roles
      if (tabId === 'poms') {
        renderPOMSReference(app, role);
        return;
      }

      if (role === 'member') {
        switch(tabId) {
          case 'home': renderMemberHome(app); break;
          case 'cases': renderMyCases(app); break;
          case 'profile': renderUpdateProfile(app); break;
          case 'resources': renderMemberResources(app); break;
          case 'workload': renderWorkloadTracker(app); break;
          case 'weeklyq': // legacy deep-link — redirect to polls
          case 'polls': renderPollsPage(app); break;
          case 'survey': renderSurveyResultsPage(app); break;
          case 'unionstats': renderUnionStatsPage(app); break;
          case 'events': renderEventsPage(app); break;
          case 'stewarddirectory': renderStewardContact(app); break;
          case 'notifications': renderMemberNotifications(app); break;
          case 'meetings': renderMeetingsPage(app); break;
          case 'minutes': renderMinutesPage(app); break;
          case 'feedback': renderFeedbackPage(app, 'member'); break;
          case 'mytasks': renderMemberTasks(app); break;
          case 'qaforum': renderQAForum(app, 'member'); break;
          case 'timeline': renderTimelinePage(app); break;
          default: renderMemberHome(app);
        }
      } else {
        switch(tabId) {
          case 'cases': renderStewardDashboard(app); break;
          case 'members': renderStewardMembers(app); break;
          case 'insights': renderInsightsPage(app); break;
          case 'stewarddirectory': renderStewardDirectoryPage(app); break;
          case 'broadcast': renderBroadcast(app); break;
          case 'notifications': renderStewardNotifications(app); break;
          case 'resources': renderStewardResources(app); break;
          case 'weeklyq': // legacy deep-link — redirect to polls
          case 'polls': renderManagePolls(app); break;
          case 'surveytrack': renderSurveyTracking(app); break;
          case 'contactlog': renderContactLog(app); break;
          case 'tasks': renderStewardTasks(app); break;
          case 'workload': renderWorkloadTracker(app); break;
          case 'events': renderEventsPage(app); break;
          case 'minutes': renderStewardMinutes(app); break;
          case 'feedback': renderFeedbackPage(app, 'steward'); break;
          case 'qaforum': renderQAForum(app, 'steward'); break;
          case 'timeline': renderTimelinePage(app); break;
          case 'failsafe': renderFailsafePage(app); break;
          case 'testrunner': renderTestRunnerPage(app); break;
          default: renderStewardDashboard(app);
        }
      }
    }

    // ═══════════════════════════════════════
    // CHART HELPER — lazy-loads Chart.js on first use
    // ═══════════════════════════════════════
    var ChartHelper = (function() {
      var _charts = {};
      var _chartJsLoaded = typeof Chart !== 'undefined';
      var _chartJsLoading = false;
      var _pendingCallbacks = [];
      var _cachedColors = null;

      function _ensureChartJs(callback) {
        if (_chartJsLoaded) { callback(); return; }
        _pendingCallbacks.push(callback);
        if (_chartJsLoading) return;
        _chartJsLoading = true;
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js';
        script.onload = function() {
          _chartJsLoaded = true;
          _chartJsLoading = false;
          var cbs = _pendingCallbacks.slice();
          _pendingCallbacks = [];
          cbs.forEach(function(cb) { cb(); });
        };
        script.onerror = function() {
          _chartJsLoading = false;
          _pendingCallbacks = [];
        };
        document.head.appendChild(script);
      }

      function _getColors() {
        if (_cachedColors) return _cachedColors;
        var cs = getComputedStyle(document.documentElement);
        _cachedColors = {
          accent:  cs.getPropertyValue('--accent').trim() || '#7c6ef6',
          success: cs.getPropertyValue('--success').trim() || '#4ade80',
          warning: cs.getPropertyValue('--warning').trim() || '#facc15',
          danger:  cs.getPropertyValue('--danger').trim() || '#ef4444',
          info:    cs.getPropertyValue('--info').trim() || '#60a5fa',
          text:    cs.getPropertyValue('--text').trim() || '#e0e0e0',
          muted:   cs.getPropertyValue('--muted').trim() || '#6b6b6b',
          border:  cs.getPropertyValue('--border').trim() || '#2a2a2a',
          surface: cs.getPropertyValue('--surface').trim() || '#1e1e1e',
        };
        return _cachedColors;
      }

      function invalidateColorCache() { _cachedColors = null; }

      function _palette(count) {
        var c = _getColors();
        var pool = [c.accent, c.success, c.warning, c.info, c.danger, '#a78bfa', '#f472b6', '#38bdf8'];
        var out = [];
        for (var i = 0; i < count; i++) out.push(pool[i % pool.length]);
        return out;
      }

      function destroyChart(id) {
        if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
      }

      function _create(container, id, cfg) {
        destroyChart(id);
        var wrap = el('div', { className: 'chart-container' });
        var canvas = document.createElement('canvas');
        canvas.id = id;
        wrap.appendChild(canvas);
        container.appendChild(wrap);
        var c = _getColors();
        Chart.defaults.color = c.muted;
        Chart.defaults.borderColor = c.border;
        Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
        _charts[id] = new Chart(canvas, cfg);
        return _charts[id];
      }

      function _lazyCreate(container, id, cfgFn) {
        _ensureChartJs(function() { cfgFn(); });
      }

      function createBarChart(container, id, labels, datasets, opts) {
        _ensureChartJs(function() {
          var c = _getColors();
          var dsList = datasets.map(function(ds, i) {
            return Object.assign({
              backgroundColor: ds.color || _palette(datasets.length)[i],
              borderRadius: 4,
              maxBarThickness: 40,
            }, ds);
          });
          _create(container, id, {
            type: 'bar',
            data: { labels: labels, datasets: dsList },
            options: Object.assign({
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { display: datasets.length > 1, labels: { boxWidth: 12 } } },
              scales: { y: { beginAtZero: true, grid: { color: c.border } }, x: { grid: { display: false } } },
            }, opts || {}),
          });
        });
      }

      function createHorizontalBarChart(container, id, labels, data, colors) {
        _ensureChartJs(function() {
          var c = _getColors();
          _create(container, id, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{ data: data, backgroundColor: colors || _palette(labels.length), borderRadius: 4, maxBarThickness: 28 }],
            },
            options: {
              indexAxis: 'y', responsive: true, maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: { x: { beginAtZero: true, grid: { color: c.border } }, y: { grid: { display: false } } },
            },
          });
        });
      }

      function createDoughnutChart(container, id, labels, data, colors) {
        _ensureChartJs(function() {
          _create(container, id, {
            type: 'doughnut',
            data: {
              labels: labels,
              datasets: [{ data: data, backgroundColor: colors || _palette(labels.length), borderWidth: 0, spacing: 2 }],
            },
            options: {
              responsive: true, maintainAspectRatio: false, cutout: '65%',
              plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12 } } },
            },
          });
        });
      }

      function createLineChart(container, id, labels, datasets, opts) {
        _ensureChartJs(function() {
          var c = _getColors();
          var dsList = datasets.map(function(ds, i) {
            return Object.assign({
              borderColor: ds.color || _palette(datasets.length)[i],
              backgroundColor: (ds.color || _palette(datasets.length)[i]) + '20',
              fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2,
            }, ds);
          });
          _create(container, id, {
            type: 'line',
            data: { labels: labels, datasets: dsList },
            options: Object.assign({
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { display: datasets.length > 1, labels: { boxWidth: 12 } } },
              scales: { y: { beginAtZero: true, grid: { color: c.border } }, x: { grid: { display: false } } },
            }, opts || {}),
          });
        });
      }

      return {
        createBarChart: createBarChart,
        createHorizontalBarChart: createHorizontalBarChart,
        createDoughnutChart: createDoughnutChart,
        createLineChart: createLineChart,
        destroyChart: destroyChart,
        invalidateColorCache: invalidateColorCache,
      };
    })();

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function() {
      try {
        getLayoutMode();
        _prevMode = LayoutState.mode;
        initApp();

        // Fire-and-forget: ensure all required sheets exist.
        // Runs AFTER initApp dispatches — never blocks initial render.
        // Version-keyed server-side flag prevents work on most loads.
        if (CURRENT_VIEW !== 'auth' && CURRENT_VIEW !== 'error') {
          google.script.run
            .withSuccessHandler(function() {})
            .withFailureHandler(function() {})
            .dataEnsureSheetsIfNeeded(SESSION_TOKEN);
        }
      } catch (bootErr) {
        console.error('Bootstrap error:', bootErr);
        var app = document.getElementById('app');
        if (app) {
          app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;background:#141414;color:#e0e0e0">'
            + '<div style="max-width:440px;padding:40px 32px;background:#1e1e1e;border-radius:16px;text-align:center">'
            + '<h1 style="font-size:20px;margin:0 0 12px">Something went wrong</h1>'
            + '<p style="color:#888;font-size:14px;line-height:1.6;margin:0 0 20px">The dashboard could not load. Try clearing your browser cache or opening in an incognito window.</p>'
            + '<a href="javascript:localStorage.removeItem(\'dashboardSessionToken\');location.reload()" style="display:inline-block;padding:10px 24px;background:hsl(250,70%,68%);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;margin-right:8px">Clear &amp; Reload</a>'
            + '</div></div>';
        }
      }
    });
  </script>
