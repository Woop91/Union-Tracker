<script>

// overlap or bunch up. One "hero" phrase fades in more prominently.

var _PHRASE_ZONES = [
 
 { xMin: 0.05, xMax: 0.90, yMin: 0.05, yMax: 0.28 },
 
 { xMin: 0.05, xMax: 0.42, yMin: 0.35, yMax: 0.65 },
 
 { xMin: 0.50, xMax: 0.92, yMin: 0.60, yMax: 0.88 }
];

var _PHRASE_ZONES_6 = [
 { xMin: 0.03, xMax: 0.45, yMin: 0.04, yMax: 0.25 },   
 { xMin: 0.52, xMax: 0.95, yMin: 0.04, yMax: 0.25 },   
 { xMin: 0.03, xMax: 0.40, yMin: 0.32, yMax: 0.58 },   
 { xMin: 0.55, xMax: 0.95, yMin: 0.32, yMax: 0.58 },   
 { xMin: 0.03, xMax: 0.45, yMin: 0.64, yMax: 0.90 },   
 { xMin: 0.52, xMax: 0.95, yMin: 0.64, yMax: 0.90 }    
];

var _activeZones = _PHRASE_ZONES;
var _phraseVisCount = 0;

function injectAuthManifesto(authContainer) {
 if (document.getElementById('auth-manifesto-layer')) return;

 var allPhrases = [
 "Work stress doesn\u2019t\nclock out at 5.",
 "The union is waiting for you.",
 "Your rights don't end when you leave.",
 "You are the change.",
 "Solidarity is not\na slogan. It's a practice.",
 "Together we bargain.\nAlone we beg.",
 "The future is\ncollective.",
 "Never fear\nto negotiate.",
 "Be hard on the problem,\nsoft on the people.",
 "Silence is\nstrength.",
 "You get what\nyou negotiate.",
 "Prepare\nrelentlessly.",
 "Know your\nwalk-away.",
 "Listen more\nthan you talk."
 ];

 
 var isDesktop = window.innerWidth > 768;
 var phraseCount = isDesktop ? 6 : 3;
 _activeZones = isDesktop ? _PHRASE_ZONES_6 : _PHRASE_ZONES;

 var shuffled = allPhrases.slice();
 for (var s = shuffled.length - 1; s > 0; s--) {
 var r = Math.floor(Math.random() * (s + 1));
 var tmp = shuffled[s]; shuffled[s] = shuffled[r]; shuffled[r] = tmp;
 }
 var picked = shuffled.slice(0, phraseCount);
 var fontSizes = ['2.25rem', '1.5rem', '1.875rem', '1.5rem', '1.625rem', '1.5rem'];

 var layer = document.createElement('div');
 layer.id = 'auth-manifesto-layer';
 layer.className = 'auth-manifesto-layer';
 layer.setAttribute('aria-hidden', 'true');
 picked.forEach(function(p, i) {
 var div = document.createElement('div');
 div.className = 'auth-manifesto-phrase';
 div.id = 'auth-phrase-' + i;
 div.style.fontSize = fontSizes[i] || '1.5rem';
 div.textContent = p;
 layer.appendChild(div);
 });
 document.body.insertBefore(layer, document.body.firstChild);

 // Stagger starts so they don't sync up — tighter spacing with more phrases
 var stagger = isDesktop ? 2500 : 3500;
 picked.forEach(function(_, i) {
 var delay = 1000 + Math.floor(Math.random() * 3000) + (i * stagger);
 setTimeout(function() { _animatePhrase(i); }, delay);
 });

 startAuthQuoteCycler();
}

function _animatePhrase(index) {
 var el = document.getElementById('auth-phrase-' + index);
 if (!el) return;

 var zone = _activeZones[index];
 if (!zone) return;
 var vw = window.innerWidth;
 var vh = window.innerHeight;

 // Random position within this phrase's dedicated zone
 var x = (zone.xMin + Math.random() * (zone.xMax - zone.xMin)) * vw;
 var y = (zone.yMin + Math.random() * (zone.yMax - zone.yMin)) * vh;

 // Clamp so text doesn't overflow
 x = Math.max(10, Math.min(x, vw - 290));
 y = Math.max(10, Math.min(y, vh - 80));

 var rotation = (Math.random() * 16) - 8;
 var scale = 0.85 + (Math.random() * 0.3);

 el.style.left = x + 'px';
 el.style.top = y + 'px';
 el.style.transform = 'rotate(' + rotation + 'deg) scale(' + scale + ')';

 
 setTimeout(function() {
 var isDark = document.documentElement.dataset.themeMode === 'dark';
 
 if (index === 0) {
  el.style.opacity = isDark ? '0.95' : '0.95';
 } else {
  el.style.opacity = isDark ? '0.55' : '0.50';
 }
 _phraseVisCount++;

 
 var hold = 12000 + Math.floor(Math.random() * 6000);
 setTimeout(function() { _fadeOutOrDefer(el, index); }, hold);
 }, 200);
}

function _fadeOutOrDefer(el, index) {
 if (_phraseVisCount <= 1) {
 
 setTimeout(function() { _fadeOutOrDefer(el, index); }, 800);
 return;
 }
 _phraseVisCount--;
 el.style.opacity = '0';
 
 var wait = 4000 + Math.floor(Math.random() * 4000);
 setTimeout(function() { _animatePhrase(index); }, wait);
}

var AUTH_QUOTES = [
 { text: "An injury to one is an injury to all.", attr: "IWW motto" },
 { text: "Don't mourn. Organize.", attr: "Joe Hill, 1915" },
 { text: "Strong unions mean strong communities.", attr: "Labor tradition" },
 { text: "Wages are not given. They are won.", attr: "Labor tradition" },
 { text: "We don't need to be saved. We need to be heard.", attr: "Labor tradition" },
 { text: "No work is insignificant. All labor that uplifts humanity has dignity.", attr: "Martin Luther King Jr." },
 { text: "Power concedes nothing without a demand.", attr: "Frederick Douglass, 1857" },
 { text: "The cause of labor is the cause of humanity.", attr: "Samuel Gompers" },
 { text: "Workers built this country. Workers will rebuild it.", attr: "Labor tradition" },
 { text: "The only answer to organized greed is organized labor.", attr: "Thomas Donahue" },
 { text: "What workers need is their full share of the wealth they create.", attr: "Samuel Gompers" },
 { text: "The contract is the floor, not the ceiling.", attr: "Labor tradition" },
 { text: "You are the union.", attr: "Labor tradition" },
 { text: "Collective action is individual protection.", attr: "Labor tradition" },
 { text: "The union is only as strong as its members.", attr: "Labor tradition" },
 { text: "Let us never negotiate out of fear. But let us never fear to negotiate.", attr: "John F. Kennedy" },
 { text: "By failing to prepare, you are preparing to fail.", attr: "Benjamin Franklin" },
 { text: "Be hard on the problem, soft on the people.", attr: "Fisher & Ury, Getting to Yes" },
 { text: "Silence is a source of great strength.", attr: "Lao Tzu" },
 { text: "You don't get what you deserve. You get what you negotiate.", attr: "Chester L. Karrass" },
 { text: "The cheap concession is to listen. The expensive one is to talk.", attr: "Chris Voss" },
 { text: "Courage is what it takes to stand up and speak; courage is also what it takes to sit down and listen.", attr: "Winston Churchill" },
 { text: "Everything is negotiable. Whether or not the negotiation is easy is another thing.", attr: "Carrie Fisher" },
 { text: "Know what you want, know what they want, and find where those two things meet.", attr: "Negotiation wisdom" },
 { text: "A bad deal is worse than no deal. Always know your BATNA.", attr: "Negotiation principle" },
 { text: "The best negotiators are the best listeners.", attr: "Negotiation wisdom" },
 { text: "Coming together is a beginning, staying together is progress, and working together is success.", attr: "Henry Ford" },
 { text: "The best defense against dirty tactics is to recognize them.", attr: "Fisher & Ury" },
 { text: "If you're not at the table, you're on the menu.", attr: "Labor tradition" },
 { text: "During a negotiation, it would be wise not to take anything personally.", attr: "Brian Koslow" },
 { text: "The most difficult thing in any negotiation is making sure that you strip it of the emotion and deal with the facts.", attr: "Howard Baker" },
 { text: "A negotiator should observe everything. You must be part Sherlock Holmes, part Sigmund Freud.", attr: "Victor Kiam" },
 { text: "When the deal is too good, think twice.", attr: "Negotiation wisdom" },
 { text: "The skilled negotiator knows that the other side's problem is your problem too.", attr: "Negotiation wisdom" },
 { text: "The moment someone asks you for something you have the power to give or withhold, you are negotiating.", attr: "Negotiation wisdom" },
 { text: "Hard bargainers count on you being unprepared, emotional, or afraid. Be none of those things.", attr: "Negotiation wisdom" },
 { text: "Never let someone else's emotions dictate your decisions.", attr: "Negotiation wisdom" },
 { text: "They want you to react. Refuse. Respond instead.", attr: "Negotiation wisdom" },
 { text: "The art of negotiation is not about being the loudest voice in the room. It is about being the most prepared.", attr: "Negotiation wisdom" },
 { text: "Negotiation is not a game. It is a process of finding solutions.", attr: "Negotiation wisdom" },
 { text: "If you don't know where you'll go if this deal falls apart, you're negotiating blind.", attr: "Negotiation wisdom" },
 { text: "Effective negotiators don't have one style \u2014 they adapt to the situation.", attr: "Negotiation wisdom" },
 { text: "Arbitration is justice delivered by the chosen, not the appointed.", attr: "Labor tradition" },
];

var _authQuoteTimer = null;

function _shuffleArray(arr) {
 var a = arr.slice();
 for (var i = a.length - 1; i > 0; i--) {
 var j = Math.floor(Math.random() * (i + 1));
 var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
 }
 return a;
}

function startAuthQuoteCycler() {
 var wrap = document.getElementById('auth-quote-wrap');
 if (!wrap) {
 setTimeout(function() {
  var card = document.querySelector('.auth-glass-card') || document.querySelector('.auth-container');
  if (!card) return;
  var w = document.createElement('div');
  w.id = 'auth-quote-wrap';
  w.className = 'auth-quote-wrap';
  card.parentNode.insertBefore(w, card.nextSibling);
  _buildQuoteCycler(w);
 }, 200);
 return;
 }
 _buildQuoteCycler(wrap);
}

function _buildQuoteCycler(wrap) {
 var pool = _shuffleArray(AUTH_QUOTES);
 wrap.innerHTML = '';
 pool.forEach(function(q, i) {
 var div = document.createElement('div');
 div.className = 'auth-quote-item' + (i === 0 ? ' aq-visible' : '');
 div.innerHTML =
  '<div class="aq-text">\u201C' + q.text + '\u201D</div>' +
  '<div class="aq-attr">\u2014 ' + q.attr + '</div>';
 wrap.appendChild(div);
 });

 var idx = 0;
 var nodes = wrap.querySelectorAll('.auth-quote-item');
 _authQuoteTimer = setInterval(function() {
 nodes[idx].classList.remove('aq-visible');
 idx = (idx + 1) % nodes.length;
 nodes[idx].classList.add('aq-visible');
 }, 8000);
}

function stopAuthQuoteCycler() {
 if (_authQuoteTimer) { clearInterval(_authQuoteTimer); _authQuoteTimer = null; }
}

function _pickHubQuotes(n) {
 var pool = _shuffleArray(AUTH_QUOTES);
 return pool.slice(0, n);
}

function renderHubInlineQuotes() {
 var ids = ['hub-quote-1', 'hub-quote-2', 'hub-quote-3', 'hub-quote-4'];
 var picks = _pickHubQuotes(ids.length);
 ids.forEach(function(id, i) {
 var el = document.getElementById(id);
 if (el && picks[i]) {
  el.className = 'hub-inline-quote';
  el.innerHTML =
  '<div class="hiq-text">\u201C' + picks[i].text + '\u201D</div>' +
  '<div class="hiq-attr">\u2014 ' + picks[i].attr + '</div>';
 }
 });
}
</script>
