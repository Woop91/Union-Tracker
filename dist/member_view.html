<script>
function initMemberView(container) {
var t = ThemeEngine.getTheme('member', AppState.isDark);
ThemeEngine.applyTheme(t);
AppState.activeRole = 'member';
showLoading(container, 'kpi');
var batch = AppState.batchData;
if (batch && batch.grievances) {
AppState.grievances = batch.grievances || [];
AppState.notificationCount = batch.notificationCount || 0;
AppState.memberTaskCount = batch.memberTaskCount || 0;
if (batch.history) DataCache.set('memberHistory_' + CURRENT_USER.email, batch.history);
if (batch.stewardInfo) DataCache.set('stewardInfo_' + CURRENT_USER.email, batch.stewardInfo);
if (batch.surveyStatus) DataCache.set('surveyStatus_' + CURRENT_USER.email, batch.surveyStatus);
if (batch.events && Array.isArray(batch.events)) DataCache.set('events', batch.events);
AppState.loading = false;
renderMemberHome(container);
_checkDeepLink('member');
return;
}
DataCache.cachedCall('memberBadgeCounts', 'dataGetBadgeCounts', [SESSION_TOKEN], function(counts) {
AppState.notificationCount = (counts && counts.notificationCount) || 0;
}, function() {
AppState.notificationCount = 0;
});
DataCache.cachedCall('memberGrievances', 'dataGetMemberGrievances', [SESSION_TOKEN], function(grievances) {
AppState.grievances = grievances || [];
AppState.loading = false;
renderMemberHome(container);
_checkDeepLink('member');
}, function() {
AppState.grievances = [];
AppState.loading = false;
renderMemberHome(container);
_checkDeepLink('member');
});
}
function _memberHeader(container, title, subtitle) {
var header = el('div', { className: 'page-header' });
var headerLeft = el('div', { className: 'page-header-left' });
headerLeft.appendChild(el('div', { className: 'page-title' }, title));
if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
header.appendChild(headerLeft);
var headerRight = el('div', { className: 'page-header-right' });
if (!isSidebarLayout()) {
if (IS_DUAL_ROLE) {
headerRight.appendChild(el('button', {
style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
onClick: function() { AppState.activeRole = 'steward'; initStewardView(document.getElementById('app')); }
}, '\uD83D\uDD27 ' + CONFIG.stewardLabel));
}
headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
AppState.isDark = !AppState.isDark;
try { localStorage.setItem('dds_isDark', AppState.isDark); } catch(e) {}
ThemeEngine.applyTheme(ThemeEngine.getTheme('member', AppState.isDark));
renderMemberHome(document.getElementById('app'));
}}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
}
header.appendChild(headerRight);
container.appendChild(header);
}
function _isDuesPaying() {
return CURRENT_USER.duesPaying !== false;
}
function _renderDuesGate(appContainer, featureName, backFn) {
renderPageLayout(appContainer, 'member', 'dues-gate', function(container) {
_memberHeader(container, featureName);
var content = el('div', { className: 'content' });
var card = el('div', { className: 'card', style: { textAlign: 'center', padding: '32px 24px' } });
card.appendChild(el('div', { style: { fontSize: '40px', marginBottom: '12px' } }, '\uD83D\uDD12'));
card.appendChild(el('h3', { style: { margin: '0 0 10px', fontSize: '17px' } }, 'Membership Dues Required'));
card.appendChild(el('p', { style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.6', margin: '0 0 20px' } },
'Access to ' + featureName + ' is available to dues-paying members. Please contact your steward if you believe this is an error.'));
if (typeof backFn === 'function') {
card.appendChild(el('button', { className: 'btn btn-secondary', onClick: backFn }, 'Back'));
}
content.appendChild(card);
container.appendChild(content);
});
}
function _getGreeting() {
var h = new Date().getHours();
if (h < 12) return 'Good morning';
if (h < 17) return 'Good afternoon';
return 'Good evening';
}
function renderMemberHome(appContainer) {
renderPageLayout(appContainer, 'member', 'home', function(container) {
var firstName = CURRENT_USER.firstName || CURRENT_USER.name.split(' ')[0] || 'there';
_memberHeader(container, _getGreeting() + ', ' + firstName, CURRENT_USER.unit);
var welcomeSlot = el('div');
container.appendChild(welcomeSlot);
_maybeShowMemberWelcome(welcomeSlot);
if (!_isDuesPaying()) {
var duesBanner = el('div', {
className: 'fade-in',
style: {
margin: '0 16px 12px',
padding: '12px 16px',
borderRadius: 'var(--radius)',
background: 'rgba(245,127,23,0.10)',
border: '1px solid rgba(245,127,23,0.35)',
display: 'flex',
alignItems: 'center',
gap: '10px'
}
});
duesBanner.appendChild(el('span', { style: { fontSize: '20px', flexShrink: '0' } }, '\uD83D\uDD12'));
var duesBannerText = el('div');
duesBannerText.appendChild(el('div', {
style: { fontSize: '13px', fontWeight: '600', color: 'var(--warning)', marginBottom: '2px' }
}, 'Some features require membership dues'));
duesBannerText.appendChild(el('div', {
style: { fontSize: '11px', color: 'var(--muted)', lineHeight: '1.5' }
}, 'Events, Resources, Polls, Survey, Org Chart, and Union Stats are only available to dues-paying members. Contact your steward if you believe this is an error.'));
duesBanner.appendChild(duesBannerText);
container.appendChild(duesBanner);
}
DataCache.cachedCall('surveyStatus_' + CURRENT_USER.email, 'dataGetSurveyStatus', [SESSION_TOKEN], function(status) {
if (status && !status.hasCompleted && _isDuesPaying()) {
var banner = el('div', { className: 'survey-banner fade-in' });
var bannerLeft = el('div');
bannerLeft.appendChild(el('span', { className: 'survey-banner-text' }, 'Quarterly survey is open!'));
bannerLeft.appendChild(el('div', { className: 'privacy-badge', style: { marginTop: '4px', fontSize: '10px', padding: '3px 8px' } }, '\uD83D\uDD12 Anonymous via one-way encryption'));
banner.appendChild(bannerLeft);
banner.appendChild(el('button', {
className: 'survey-banner-btn',
onClick: function() {
renderSurveyFormPage(document.getElementById('app'));
}
}, 'Take Survey'));
var firstContent = container.querySelector('.content, .card');
if (firstContent) container.insertBefore(banner, firstContent);
else container.appendChild(banner);
}
});
var activeG = AppState.grievances.find(function(g) { return g.status !== 'resolved'; });
if (activeG) {
renderGrievanceCard(container, activeG);
} else {
var noCase = el('div', { className: 'card card-glass', style: { margin: '0 16px 14px', padding: '16px', textAlign: 'center' } });
noCase.appendChild(el('div', { style: { fontSize: '20px', marginBottom: '6px' } }, '\u2705'));
noCase.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)' } }, 'No active cases'));
container.appendChild(noCase);
}
var pastPreview = el('div', { style: { margin: '0 16px 14px' } });
container.appendChild(pastPreview);
DataCache.cachedCall('memberHistory_' + CURRENT_USER.email, 'dataGetMemberGrievanceHistory', [SESSION_TOKEN], function(result) {
if (!result || !result.success || !result.history || result.history.length === 0) return;
var items = result.history.slice(0, 2);
var previewCard = el('div', { className: 'card card-glass', style: { padding: '14px 16px' } });
previewCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '8px' } }, 'Past Cases'));
items.forEach(function(h) {
var row = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0' } });
row.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text)' } }, (h.grievanceId || 'Case') + (h.issueCategory ? ' \u00B7 ' + h.issueCategory : '')));
row.appendChild(el('span', { style: { fontSize: '11px', fontWeight: '600', color: _getOutcomeColor(h.status) } }, h.status));
previewCard.appendChild(row);
});
if (result.history.length > 2) {
previewCard.appendChild(el('div', {
style: { fontSize: '11px', color: 'var(--accent)', fontWeight: '600', marginTop: '8px', cursor: 'pointer' },
onClick: function() { renderMyCases(document.getElementById('app')); }
}, 'View all ' + result.history.length + ' past cases \u2192'));
}
pastPreview.appendChild(previewCard);
});
var stewardCard = el('div', { className: 'card card-glass', style: { margin: '0 16px 14px', padding: '16px' } });
stewardCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '5px' } }, 'Your ' + CONFIG.stewardLabel));
var stewardName = el('div', { style: { fontSize: '13px', fontFamily: 'var(--fontDisplay)', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Loading...');
stewardCard.appendChild(stewardName);
var stewardActions = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
stewardCard.appendChild(stewardActions);
container.appendChild(stewardCard);
DataCache.cachedCall('stewardInfo_' + CURRENT_USER.email, 'dataGetAssignedSteward', [SESSION_TOKEN], function(info) {
if (info) {
stewardName.textContent = info.name || info.email;
stewardActions.appendChild(el('a', {
href: 'mailto:' + info.email,
style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
}, '\u2709\uFE0F ' + info.email));
if (info.phone) {
stewardActions.appendChild(el('a', {
href: 'tel:' + info.phone,
style: { background: 'rgba(52,211,153,0.1)', border: '1px solid rgba(52,211,153,0.25)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--success)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
}, '\uD83D\uDCDE ' + info.phone));
}
} else {
stewardName.textContent = 'Not assigned';
stewardActions.appendChild(el('button', {
style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
onClick: function() { renderStewardContact(document.getElementById('app')); }
}, 'Find a ' + CONFIG.stewardLabel));
}
});
var statsStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)' } });
var notifKpi = el('div', { className: 'kpi-card card-fade-in' });
notifKpi.appendChild(el('div', { className: 'kpi-label' }, 'Notifications'));
var notifVal = el('div', { className: 'kpi-value' }, '--');
notifKpi.appendChild(notifVal);
statsStrip.appendChild(notifKpi);
var surveyKpi = el('div', { className: 'kpi-card card-fade-in' });
surveyKpi.appendChild(el('div', { className: 'kpi-label' }, 'Survey'));
var surveyVal = el('div', { className: 'kpi-value' }, '--');
surveyKpi.appendChild(surveyVal);
statsStrip.appendChild(surveyKpi);
var eventsKpi = el('div', { className: 'kpi-card card-fade-in' });
eventsKpi.appendChild(el('div', { className: 'kpi-label' }, 'Upcoming Events'));
var eventsVal = el('div', { className: 'kpi-value' }, '--');
eventsKpi.appendChild(eventsVal);
statsStrip.appendChild(eventsKpi);
container.appendChild(statsStrip);
DataCache.cachedCall('surveyStatus_' + CURRENT_USER.email, 'dataGetSurveyStatus', [SESSION_TOKEN], function(status) {
if (status) {
surveyVal.textContent = status.hasCompleted ? 'Done' : 'Open';
surveyVal.style.color = status.hasCompleted ? 'var(--success)' : 'var(--warning)';
}
});
notifVal.textContent = String(AppState.notificationCount || 0);
var eventsSection = el('div', { className: 'content', style: { marginBottom: '14px' } });
eventsSection.appendChild(el('h3', { className: 'section-title' }, 'Upcoming Events'));
var eventsArea = el('div');
eventsSection.appendChild(eventsArea);
container.appendChild(eventsSection);
DataCache.cachedCall('events', 'dataGetUpcomingEvents', [SESSION_TOKEN, 10], function(events) {
if (!events || !Array.isArray(events)) {
eventsVal.textContent = '0';
eventsArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'Calendar not configured.'));
return;
}
eventsVal.textContent = String(events.length);
if (events.length === 0) {
eventsArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'No upcoming events.'));
return;
}
events.slice(0, 3).forEach(function(ev, i) {
var card = el('div', { className: 'card card-glass card-fade-in card-accent-border', style: { padding: '14px 16px', animationDelay: (i * 0.1) + 's' } });
card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, ev.title));
var startDate = new Date(ev.startTime);
var dateStr = startDate.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
var timeStr = startDate.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--accent)', marginTop: '4px' } }, dateStr + ' at ' + timeStr));
if (ev.location) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '2px' } }, '\uD83D\uDCCD ' + ev.location));
var calUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
'&text=' + encodeURIComponent(ev.title) +
'&dates=' + ev.startTime.replace(/[-:]/g, '').replace(/\.\d+Z$/, 'Z') + '/' + ev.endTime.replace(/[-:]/g, '').replace(/\.\d+Z$/, 'Z') +
(ev.location ? '&location=' + encodeURIComponent(ev.location) : '') +
(ev.description ? '&details=' + encodeURIComponent(ev.description) : '');
card.appendChild(el('a', {
href: calUrl, target: '_blank',
style: { display: 'inline-block', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', marginTop: '6px' }
}, '+ Add to My Calendar'));
eventsArea.appendChild(card);
});
if (events.length > 3) {
eventsArea.appendChild(el('button', {
className: 'btn btn-secondary', style: { marginTop: '8px', fontSize: '13px', padding: '8px' },
onClick: function() { renderEventsPage(document.getElementById('app')); }
}, 'View All Events'));
}
});
var res = el('div', { className: 'content' });
res.appendChild(el('h3', { className: 'section-title' }, 'Quick Links'));
var links = [
{ icon: '\uD83D\uDCD6', label: 'Know Your Rights', sub: 'Contract highlights', tab: 'resources' },
{ icon: '\uD83D\uDCDD', label: 'File a Grievance', sub: 'Start a new case', tab: 'cases' },
{ icon: '\u2753', label: 'FAQ', sub: 'Common questions', tab: 'resources' },
];
links.forEach(function(r) {
var item = el('div', {
className: 'card card-glass card-clickable card-fade-in',
style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '13px 16px', cursor: 'pointer' },
onClick: function() { _handleTabNav('member', r.tab); }
});
item.appendChild(el('span', { style: { fontSize: '18px' } }, r.icon));
var tg = el('div', { style: { flex: '1' } });
tg.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, r.label));
tg.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, r.sub));
item.appendChild(tg);
item.appendChild(el('span', { style: { color: 'var(--muted)', fontSize: '14px' } }, '\u203A'));
res.appendChild(item);
});
container.appendChild(res);
});
}
function renderGrievanceCard(parentContainer, g) {
var dl = g.deadlineDays;
var dc = dl !== null && dl < 0 ? 'var(--danger)' : dl !== null && dl <= 3 ? 'var(--warning)' : dl !== null && dl <= 7 ? 'var(--info)' : 'var(--success)';
var card = el('div', { className: 'card card-glass card-clickable', style: { margin: '0 16px 14px', padding: '22px', position: 'relative', overflow: 'hidden' },
onClick: function() { renderGrievanceDetail(document.getElementById('app'), g); }
});
var sc = g.status === 'overdue' ? 'danger' : g.status === 'active' ? 'warning' : 'info';
card.appendChild(el('div', { className: 'glow-bar ' + sc }));
card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '8px' } }, 'Your Active Grievance'));
card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, g.step || 'Grievance'));
card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '14px' } }, g.id + ' \u00B7 Filed ' + (g.filed || 'N/A')));
if (dl !== null) {
var cd = el('div', { style: { background: 'rgba(255,255,255,0.04)', borderRadius: '12px', padding: '11px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
cd.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text)' } }, 'Next deadline'));
var dg = el('div');
dg.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: dc } }, String(Math.abs(dl))));
dg.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', marginLeft: '3px' } }, dl < 0 ? 'days overdue' : 'days'));
cd.appendChild(dg);
card.appendChild(cd);
}
card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '10px', fontWeight: '600' } }, 'View timeline \u2192'));
parentContainer.appendChild(card);
}
function renderGrievanceDetail(appContainer, g) {
renderPageLayout(appContainer, 'member', 'cases', function(container) {
container.appendChild(el('div', { style: { padding: '12px 20px' } },
el('button', { style: { color: 'var(--accent)', fontSize: '13px', fontFamily: 'var(--fontBody)' },
onClick: function() { renderMyCases(document.getElementById('app')); }
}, '\u2190 Back')
));
var dl = g.deadlineDays;
var dc = dl !== null && dl < 0 ? 'var(--danger)' : dl !== null && dl <= 3 ? 'var(--warning)' : dl !== null && dl <= 7 ? 'var(--info)' : 'var(--success)';
var detailCard = el('div', { className: 'card card-glass', style: { margin: '0 16px 14px', padding: '20px', position: 'relative', overflow: 'hidden' } });
var sc = g.status === 'overdue' ? 'danger' : g.status === 'active' ? 'warning' : 'info';
detailCard.appendChild(el('div', { className: 'glow-bar ' + sc, style: { top: '0', bottom: 'auto' } }));
var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } });
topRow.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontWeight: '700', fontSize: '17px', color: 'var(--text)' } }, g.id));
var badge = el('span', { className: 'status-badge', style: { color: 'var(--' + sc + ')', background: 'rgba(255,255,255,0.06)' } });
badge.textContent = g.status.charAt(0).toUpperCase() + g.status.slice(1);
topRow.appendChild(badge);
detailCard.appendChild(topRow);
detailCard.appendChild(el('div', { style: { fontFamily: 'var(--fontBody)', fontSize: '13px', color: 'var(--text)', marginBottom: '12px' } }, g.step || ''));
var infoRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', padding: '12px 0', borderTop: '1px solid var(--border)' } });
var filed = el('div');
filed.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em' } }, 'Filed'));
filed.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)', marginTop: '2px' } }, g.filed || 'N/A'));
infoRow.appendChild(filed);
var deadline = el('div');
deadline.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em' } }, 'Deadline'));
deadline.appendChild(el('div', { style: { fontSize: '12px', color: dc, fontWeight: '600', marginTop: '2px' } }, g.deadline || 'N/A'));
infoRow.appendChild(deadline);
detailCard.appendChild(infoRow);
container.appendChild(detailCard);
var timelineSection = el('div', { style: { padding: '0 16px' } });
timelineSection.appendChild(el('h3', { className: 'section-title' }, 'Timeline'));
var steps = [];
if (g.filed) steps.push({ date: g.filed, event: 'Grievance filed', done: true });
if (g.step) {
var currentStepNum = parseInt(g.step.replace(/\D/g, '')) || 1;
for (var s = 1; s <= currentStepNum; s++) {
if (s < currentStepNum) steps.push({ date: '', event: 'Step ' + s + ' completed', done: true });
else steps.push({ date: g.deadline || '', event: g.step + ' \u2014 in progress', done: false });
}
}
steps.forEach(function(step, i) {
var item = el('div', { className: 'timeline-item' });
var track = el('div', { className: 'timeline-track' });
track.appendChild(el('div', { className: 'timeline-dot ' + (step.done ? 'done' : 'pending') }));
if (i < steps.length - 1) track.appendChild(el('div', { className: 'timeline-line ' + (step.done && steps[i + 1].done ? 'done' : 'pending') }));
item.appendChild(track);
var content = el('div', { className: 'timeline-content' });
content.appendChild(el('div', { className: 'timeline-event', style: { color: step.done ? 'var(--text)' : 'var(--muted)' } }, step.event));
if (step.date) content.appendChild(el('div', { className: 'timeline-date' }, step.date));
item.appendChild(content);
timelineSection.appendChild(item);
});
container.appendChild(timelineSection);
_renderMemberCaseChecklist(container, g.id);
if (g.steward) {
var contactSection = el('div', { style: { padding: '12px 16px' } });
var contactCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
contactCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '5px' } }, CONFIG.stewardLabel));
var cName = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Loading...');
contactCard.appendChild(cName);
var contactBtns = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
contactCard.appendChild(contactBtns);
contactSection.appendChild(contactCard);
container.appendChild(contactSection);
serverCall().withSuccessHandler(function(contact) {
if (!contact) { cName.textContent = 'Not available'; return; }
cName.textContent = contact.name || contact.email;
contactBtns.appendChild(el('a', {
href: 'mailto:' + contact.email,
style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
}, '\u2709\uFE0F ' + contact.email));
if (contact.phone) {
contactBtns.appendChild(el('a', {
href: 'tel:' + contact.phone,
style: { background: 'rgba(52,211,153,0.1)', border: '1px solid rgba(52,211,153,0.25)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--success)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
}, '\uD83D\uDCDE ' + contact.phone));
}
}).withFailureHandler(function() { cName.textContent = 'Not available'; }).dataGetStewardContact(SESSION_TOKEN, g.steward);
}
});
}

q.answers.forEach(function(a) {
if (a.status === 'deleted') return;

aMeta.appendChild(el('span', {}, a.authorName));

cont.appendChild(aCard);
});
}
if (isSteward) {
cont.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginTop: '16px', marginBottom: '8px' } }, 'Your Answer'));
var ansInput = el('textarea', { className: 'msg-textarea', placeholder: 'Write your answer...', style: { minHeight: '60px' } });
cont.appendChild(ansInput);
var ansStatus = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
cont.appendChild(ansStatus);
cont.appendChild(el('button', {
className: 'btn btn-primary', style: { marginTop: '8px' },
onClick: function() {
var text = ansInput.value.trim();
if (!text) { ansStatus.textContent = 'Write an answer first.'; ansStatus.style.color = 'var(--danger)'; return; }
ansStatus.textContent = 'Posting...'; ansStatus.style.color = 'var(--muted)';
serverCall().withSuccessHandler(function(r) {
if (r && r.success) {
DataCache.invalidatePrefix('qa_browse_');
_renderQuestionDetail(cont, questionId);
if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
} else { ansStatus.textContent = r ? r.message : 'Error.'; ansStatus.style.color = 'var(--danger)'; }
}).withFailureHandler(function(e) { console.error(e.message); }).qaSubmitAnswer(SESSION_TOKEN, CURRENT_USER.name || '', questionId, text, true);
}
}, 'Post Answer'));
}
}).qaGetQuestionDetail(SESSION_TOKEN, questionId);
}

var textGroup = el('div', { className: 'form-group' });

anonGroup.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, 'Post anonymously'));

className: 'btn btn-primary',
onClick: function() {

function _renderModQueue(cont) {
showLoading(cont);
serverCall().withSuccessHandler(function(flagged) {
cont.innerHTML = '';
if (!flagged || (flagged.questions.length === 0 && flagged.answers.length === 0)) {
cont.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No flagged content. All clear!'));
return;
}
if (flagged.questions.length > 0) {
cont.appendChild(el('h3', { className: 'section-title' }, 'Flagged Questions'));
flagged.questions.forEach(function(q) {
var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', borderLeft: '3px solid var(--warning)' } });
card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, q.questionText));
card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, q.authorName + ' \u00B7 ' + q.created));
var acts = el('div', { style: { display: 'flex', gap: '6px' } });
acts.appendChild(el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--successBg, #f0fdf4)', border: '1px solid var(--success)', color: 'var(--success)', fontWeight: '600' },
onClick: function() { serverCall().withSuccessHandler(function() { DataCache.invalidatePrefix('qa_browse_'); _renderModQueue(cont); }).withFailureHandler(function(e) { console.error(e.message); }).qaModerateQuestion(SESSION_TOKEN, q.id, 'approve'); }
}, 'Approve'));
acts.appendChild(el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
onClick: function() { serverCall().withSuccessHandler(function() { DataCache.invalidatePrefix('qa_browse_'); _renderModQueue(cont); }).withFailureHandler(function(e) { console.error(e.message); }).qaModerateQuestion(SESSION_TOKEN, q.id, 'delete'); }
}, 'Delete'));
card.appendChild(acts);
cont.appendChild(card);
});
}
if (flagged.answers.length > 0) {
cont.appendChild(el('h3', { className: 'section-title', style: { marginTop: '16px' } }, 'Flagged Answers'));
flagged.answers.forEach(function(a) {
var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', borderLeft: '3px solid var(--warning)' } });
card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginBottom: '4px' } }, a.answerText));
card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, a.authorName + ' \u00B7 ' + a.created));
var acts = el('div', { style: { display: 'flex', gap: '6px' } });
acts.appendChild(el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--successBg, #f0fdf4)', border: '1px solid var(--success)', color: 'var(--success)', fontWeight: '600' },
onClick: function() { serverCall().withSuccessHandler(function() { DataCache.invalidatePrefix('qa_browse_'); _renderModQueue(cont); }).withFailureHandler(function(e) { console.error(e.message); }).qaModerateAnswer(SESSION_TOKEN, a.id, 'approve'); }
}, 'Approve'));
acts.appendChild(el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
onClick: function() { serverCall().withSuccessHandler(function() { DataCache.invalidatePrefix('qa_browse_'); _renderModQueue(cont); }).withFailureHandler(function(e) { console.error(e.message); }).qaModerateAnswer(SESSION_TOKEN, a.id, 'delete'); }
}, 'Delete'));
card.appendChild(acts);
cont.appendChild(card);
});
}
}).qaGetFlaggedContent(SESSION_TOKEN);
}
refreshSubTabs();
renderQASubContent();
content.appendChild(subTabBar);
content.appendChild(subContent);
container.appendChild(content);
});
}
function renderMemberTimelinePage(appContainer) {
renderPageLayout(appContainer, 'member', 'timeline', function(container) {
_memberHeader(container, 'Timeline', 'Union events & milestones');
var content = el('div', { className: 'content' });
var filterYear = '';
var filterCategory = '';
var currentPage = 1;
var PAGE_SIZE = 25;
var cachedCategories = [];
var cachedYears = [];
var tlContainer = null;
var filterBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap', alignItems: 'center' } });
var yearSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '100px' } });
yearSelect.appendChild(el('option', { value: '' }, 'All Years'));
yearSelect.addEventListener('change', function() { filterYear = yearSelect.value; currentPage = 1; tlContainer = null; _loadEvents(); });
var catSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '120px' } });
catSelect.appendChild(el('option', { value: '' }, 'All Categories'));
catSelect.addEventListener('change', function() { filterCategory = catSelect.value; currentPage = 1; tlContainer = null; _loadEvents(); });
filterBar.appendChild(yearSelect);
filterBar.appendChild(catSelect);
var listArea = el('div');
content.appendChild(filterBar);
content.appendChild(listArea);
function _initFilters(cb) {
var pending = 2;
serverCall().withSuccessHandler(function(cats) {
cachedCategories = cats || [];
catSelect.innerHTML = '';
catSelect.appendChild(el('option', { value: '' }, 'All Categories'));
cachedCategories.forEach(function(c) {
catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1)));
});
if (--pending === 0) cb();
}).withFailureHandler(function() { if (--pending === 0) cb(); }).tlGetCategories(SESSION_TOKEN);
serverCall().withSuccessHandler(function(years) {
cachedYears = years || [];
yearSelect.innerHTML = '';
yearSelect.appendChild(el('option', { value: '' }, 'All Years'));
cachedYears.forEach(function(y) {
yearSelect.appendChild(el('option', { value: String(y) }, String(y)));
});
if (--pending === 0) cb();
}).withFailureHandler(function() { if (--pending === 0) cb(); }).tlGetTimelineYears(SESSION_TOKEN);
}
function _loadEvents() {
if (currentPage === 1) showLoading(listArea);
serverCall().withSuccessHandler(function(result) {
var oldBtn = listArea.querySelector('.tl-load-more');
if (oldBtn && oldBtn.parentNode) oldBtn.parentNode.removeChild(oldBtn);
if (currentPage === 1) {
listArea.innerHTML = '';
tlContainer = null;
}
if (!result || !result.events || result.events.length === 0) {
if (currentPage === 1) {
var empty = el('div', { style: { textAlign: 'center', padding: '40px 0' } });
empty.appendChild(el('div', { style: { fontSize: '32px', marginBottom: '10px' } }, '\uD83D\uDCDC'));
empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'No timeline events yet'));
empty.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)' } }, 'A steward will add events here to keep members informed.'));
listArea.appendChild(empty);
}
return;
}
if (!tlContainer) {
tlContainer = el('div', { className: 'timeline-container' });
tlContainer.appendChild(el('div', { className: 'timeline-line' }));
listArea.appendChild(tlContainer);
}
result.events.forEach(function(evt) {
var item = el('div', { className: 'timeline-event' });
item.appendChild(el('div', { className: 'timeline-dot' }));
item.appendChild(el('div', { className: 'timeline-date' }, evt.eventDate));
var card = el('div', { className: 'card', style: { padding: '12px 16px' } });
var titleRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
titleRow.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, evt.title));
titleRow.appendChild(el('span', { className: 'category-badge ' + (evt.category || 'other') }, evt.category || 'other'));
card.appendChild(titleRow);
if (evt.description) {
var TRUNCATE = 200;
var isLong = evt.description.length > TRUNCATE;
var descEl = el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '4px' } });
descEl.textContent = isLong ? evt.description.substring(0, TRUNCATE) + '\u2026' : evt.description;
card.appendChild(descEl);
if (isLong) {
var expanded = false;
var toggleBtn = el('button', {
style: { fontSize: '11px', color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', marginTop: '2px' },
onClick: function() {
expanded = !expanded;
descEl.textContent = expanded ? evt.description : evt.description.substring(0, TRUNCATE) + '\u2026';
toggleBtn.textContent = expanded ? 'Show less' : 'Show more';
}
}, 'Show more');
card.appendChild(toggleBtn);
}
}
if (evt.driveFiles && evt.driveFiles.length > 0) {
var filesDiv = el('div', { style: { marginTop: '8px', fontSize: '11px' } });
filesDiv.appendChild(el('span', { style: { color: 'var(--muted)' } }, '\uD83D\uDCCE Files: '));
evt.driveFiles.forEach(function(f, idx) {
if (idx > 0) filesDiv.appendChild(document.createTextNode(', '));
filesDiv.appendChild(el('a', { href: 'https://drive.google.com/file/d/' + f.id + '/view', target: '_blank', style: { color: 'var(--accent)' } }, f.name));
});
card.appendChild(filesDiv);
}
if (evt.meetingMinutesId) {
card.appendChild(el('div', { style: { marginTop: '6px', fontSize: '11px' } },
el('a', { href: 'https://docs.google.com/document/d/' + evt.meetingMinutesId + '/edit', target: '_blank', style: { color: 'var(--accent)' } }, '\uD83D\uDCC4 Meeting Minutes')
));
}
item.appendChild(card);
tlContainer.appendChild(item);
});
var total = result.total || 0;
var shown = (result.page || 1) * (result.pageSize || PAGE_SIZE);
if (shown < total) {
var moreBtn = el('button', {
className: 'btn tl-load-more',
style: { display: 'block', margin: '16px auto', fontSize: '13px' },
onClick: function() {
currentPage++;
moreBtn.textContent = 'Loading\u2026';
moreBtn.disabled = true;
_loadEvents();
}
}, 'Load More (' + (total - shown) + ' remaining)');
listArea.appendChild(moreBtn);
}
}).withFailureHandler(function() {
if (currentPage === 1) {
listArea.innerHTML = '';
listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load timeline.'));
}
}).tlGetTimelineEvents(SESSION_TOKEN, currentPage, PAGE_SIZE, filterYear || null, filterCategory || null);
}
showLoading(listArea);
_initFilters(function() { _loadEvents(); });
container.appendChild(content);
});
}
function _renderDigestSettings(container) {
var section = el('div', { style: { marginTop: '24px', paddingTop: '16px', borderTop: '1px solid var(--border)' } });
section.appendChild(el('h3', { className: 'section-title' }, 'Email Digest Settings'));
section.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Receive periodic email summaries of your union data.'));
var formArea = el('div');
showLoading(formArea);
section.appendChild(formArea);
serverCall().withSuccessHandler(function(config) {
formArea.innerHTML = '';
if (!config) config = { enabled: false, frequency: 'weekly', includeGrievances: true, includeWorkload: true, includeTasks: true };
var enableGroup = el('div', { className: 'form-group', style: { display: 'flex', alignItems: 'center', gap: '8px' } });
var enableCheck = el('input', { type: 'checkbox' });
enableCheck.checked = config.enabled;
enableGroup.appendChild(enableCheck);
enableGroup.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, 'Enable email digest'));
formArea.appendChild(enableGroup);
var freqGroup = el('div', { className: 'form-group' });
freqGroup.appendChild(el('label', { className: 'form-label' }, 'Frequency'));
var freqDiv = el('div', { style: { display: 'flex', gap: '16px' } });
var weeklyRadio = el('input', { type: 'radio', name: 'digestFreq', value: 'weekly' });
weeklyRadio.checked = config.frequency === 'weekly';
var monthlyRadio = el('input', { type: 'radio', name: 'digestFreq', value: 'monthly' });
monthlyRadio.checked = config.frequency === 'monthly';
freqDiv.appendChild(el('label', { style: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px' } }, [weeklyRadio, document.createTextNode(' Weekly')]));
freqDiv.appendChild(el('label', { style: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px' } }, [monthlyRadio, document.createTextNode(' Monthly')]));
freqGroup.appendChild(freqDiv);
formArea.appendChild(freqGroup);
var includeLabel = el('div', { className: 'form-label', style: { marginBottom: '6px' } }, 'Include in digest:');
formArea.appendChild(includeLabel);
var grievCheck = el('input', { type: 'checkbox' }); grievCheck.checked = config.includeGrievances;
var workCheck = el('input', { type: 'checkbox' }); workCheck.checked = config.includeWorkload;
var taskCheck = el('input', { type: 'checkbox' }); taskCheck.checked = config.includeTasks;
[{ check: grievCheck, label: 'Grievances' }, { check: workCheck, label: 'Workload' }, { check: taskCheck, label: 'Tasks' }].forEach(function(item) {
var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
row.appendChild(item.check);
row.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, item.label));
formArea.appendChild(row);
});
var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginTop: '8px' } });
formArea.appendChild(statusMsg);
formArea.appendChild(el('button', {
className: 'btn btn-primary', style: { marginTop: '8px' },
onClick: function() {
statusMsg.textContent = 'Saving...'; statusMsg.style.color = 'var(--muted)';
var digestConfig = {
enabled: enableCheck.checked,
frequency: monthlyRadio.checked ? 'monthly' : 'weekly',
includeGrievances: grievCheck.checked,
includeWorkload: workCheck.checked,
includeTasks: taskCheck.checked
};
serverCall().withSuccessHandler(function(r) {
statusMsg.textContent = r && r.success ? 'Digest settings saved!' : (r && r.message) || 'Error.';
statusMsg.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';
}).fsUpdateDigestConfig(SESSION_TOKEN, digestConfig);
}
}, 'Save Digest Settings'));
}).fsGetDigestConfig(SESSION_TOKEN);
container.appendChild(section);
}
</script>
