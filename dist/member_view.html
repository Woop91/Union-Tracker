<script>

function _validateContactFieldsClient(email, phone) {
 var blocked = CONFIG.blockedEmailDomains || ['.gov', '.us', '.ma'];
 if (typeof blocked === 'string') blocked = blocked.split(',').map(function(d) { return d.trim().toLowerCase(); });
 if (email && email.trim()) {
 var emailLower = email.trim().toLowerCase();
 var atIdx = emailLower.lastIndexOf('@');
 if (atIdx > -1) {
  var domain = emailLower.substring(atIdx + 1);
  for (var i = 0; i < blocked.length; i++) {
  var suffix = blocked[i].toLowerCase();
  if (domain === suffix.replace(/^\./, '') || domain.endsWith(suffix)) {
   return { valid: false, field: 'email', error: 'Government email addresses (' + blocked.join(', ') + ') cannot be used. Please enter a personal email.' };
  }
  }
 }
 }
 if (phone && phone.trim()) {
 var digits = phone.replace(/[\s\-\(\)\.]/g, '');
 if (digits.indexOf('617654') === 0) {
  return { valid: false, field: 'phone', error: 'This phone number cannot be used. Please enter a personal phone number.' };
 }
 }
 return { valid: true };
}

function _renderPINRestricted(appContainer, sectionLabel) {

 renderPageLayout(appContainer, 'member', AppState.activeTab || 'home', function(container) {

 var content = el('div', { className: 'content', style: { textAlign: 'center', padding: '40px 20px' } });

  'PIN login provides limited access. To view ' + sectionLabel.toLowerCase() + ', sign in with Google or use an email sign-in link.'));
 var loginBtn = el('button', { className: 'btn btn-primary ' + _TB, style: { marginTop: '8px' },
  onClick: function() { handleLogout(); }
 }, 'Sign In with Full Access');
 content.appendChild(loginBtn);
 container.appendChild(content);
 });
 return true;
}

 serverCall().withSuccessHandler(function(counts) {

}

function _generateVCard(name, email, phone, org, title) {
 var vcf = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + (name || '') + '\n';
 if (email) vcf += 'EMAIL:' + email + '\n';
 if (phone) vcf += 'TEL:' + phone + '\n';
 if (org) vcf += 'ORG:' + org + '\n';
 if (title) vcf += 'TITLE:' + title + '\n';
 vcf += 'END:VCARD';
 var blob = new Blob([vcf], { type: 'text/vcard' });
 var url = URL.createObjectURL(blob);
 var a = document.createElement('a'); a.href = url;
 a.download = (name || 'contact').replace(/\s+/g, '_') + '.vcf';
 document.body.appendChild(a); a.click();
 document.body.removeChild(a); URL.revokeObjectURL(url);
}

  style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
  onClick: function() { _invalidateTabCache(); _activePane = null; _layoutCache = {}; _tabPanesRole = null; AppState.batchData = null; AppState.activeRole = 'steward'; AppState.activeTab = 'cases'; var _app = document.getElementById('app'); try { initStewardView(_app); } catch(e) { console.error('Switch to steward error:', e); _app.innerHTML = ''; _app.appendChild(el('div', { style: { textAlign: 'center', padding: '40px' } }, [el('div', { style: { fontSize: '24px', marginBottom: '12px' } }, '\u26A0\uFE0F'), el('div', { style: { fontWeight: '600', marginBottom: '8px' } }, 'Failed to switch view'), el('button', { style: { padding: '8px 16px', borderRadius: '6px', background: 'var(--accent)', color: '#fff', border: 'none', cursor: 'pointer' }, onClick: function() { location.reload(); } }, 'Reload')])); } }
  }, '\uD83D\uDD27 ' + CONFIG.stewardLabel));
  
  var _mobileIsDefault = AppState.defaultView === 'member';
  var _mobileDefaultBtn = el('button', {
  style: { background: _mobileIsDefault ? 'transparent' : 'var(--accentBg)', border: '1px solid ' + (_mobileIsDefault ? 'var(--border)' : 'var(--accentBorder)'), borderRadius: '6px', padding: '4px 8px', fontSize: '10px', color: _mobileIsDefault ? 'var(--muted)' : 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
  onClick: function() {

   AppState.defaultView = 'member';
   _mobileDefaultBtn.textContent = '\u2713 Default';
   _mobileDefaultBtn.style.color = 'var(--muted)';
   _mobileDefaultBtn.style.background = 'transparent';
   _mobileDefaultBtn.style.borderColor = 'var(--border)';
   serverCall().withSuccessHandler(function() {}).withFailureHandler(function(err) { console.error('Failed to save default view:', err); }).dataSetDefaultView(SESSION_TOKEN, 'member');
  }
  }, _mobileIsDefault ? '\u2713 Default' : '\uD83D\uDCCC Set default');
  headerRight.appendChild(_mobileDefaultBtn);
 }
 headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
  AppState.isDark = !AppState.isDark;
  try { localStorage.setItem('dds_isDark', AppState.isDark); } catch(e) {}
  if (typeof UnifiedTheme !== 'undefined') UnifiedTheme.apply();
  else ThemeEngine.applyTheme(ThemeEngine.getTheme('member', AppState.isDark));
  _handleTabNav('member', AppState.activeTab || 'home');
 }}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
 headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
 }
 header.appendChild(headerRight);
 container.appendChild(header);
}

function _isDuesPaying() {
 return CURRENT_USER.duesPaying !== false;
}

function _renderDuesGate(appContainer, featureName, backFn) {
 renderPageLayout(appContainer, 'member', 'dues-gate', function(container) {
 _memberHeader(container, featureName);
 var content = el('div', { className: 'content' });
 var card = el('div', { className: 'card ' + _TC, style: { textAlign: 'center', padding: '32px 24px' } });
 card.appendChild(el('div', { style: { fontSize: '40px', marginBottom: '12px' } }, '\uD83D\uDD12'));
 card.appendChild(el('h3', { style: { margin: '0 0 10px', fontSize: '17px' } }, 'Membership Dues Required'));
 card.appendChild(el('p', { style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.6', margin: '0 0 20px' } },

 if (typeof backFn === 'function') {
  card.appendChild(el('button', { className: 'btn btn-secondary', onClick: backFn }, 'Back'));
 }
 content.appendChild(card);
 container.appendChild(content);
 });
}

function _renderOnboardingWizard(container) {
 
 try {
 if (localStorage.getItem('dds_onboarding_dismissed') === 'true') return;
 } catch (_e) {  }

 var STEPS = [
 { key: 'welcome', title: 'Welcome!', desc: 'Let\'s get your account set up in a few quick steps.' },
 { key: 'pin', title: 'Set Your PIN', desc: 'Create a 6-digit PIN for quick access to your account.' },
 { key: 'contact', title: 'Contact Info', desc: 'Add your phone number or address so your steward can reach you.' },
 { key: 'notifications', title: 'Notification Preferences', desc: 'Choose how often you\'d like to receive updates.' },
 { key: 'complete', title: 'You\'re All Set!', desc: 'Your account is ready. Welcome to the dashboard.' }
 ];

 var currentStep = 0;
 var stepData = {};

 
 var overlay = el('div', { className: 'onboarding-wizard fade-in' });
 var card = el('div', { className: 'wizard-card' });

 
 var dotsRow = el('div', { className: 'wizard-steps' });
 var dots = [];
 for (var d = 0; d < STEPS.length; d++) {
 var dot = el('div', { className: 'wizard-step-dot' });
 dots.push(dot);
 dotsRow.appendChild(dot);
 }
 card.appendChild(dotsRow);

 
 var stepContent = el('div', { className: 'wizard-step-content' });
 card.appendChild(stepContent);

 
 var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '18px', marginTop: '8px', textAlign: 'center' } });
 card.appendChild(statusMsg);

 
 var actionsRow = el('div', { className: 'wizard-actions' });
 var backBtn = el('button', { className: 'btn btn-secondary', onClick: function() { goToStep(currentStep - 1); } }, 'Back');
 var skipBtn = el('button', { className: 'btn', style: { background: 'transparent', color: 'var(--muted)', border: 'none', fontSize: '13px', cursor: 'pointer' }, onClick: function() {
 _dismissOnboarding();
 } }, 'Skip for now');
 var nextBtn = el('button', { className: 'btn btn-primary ' + _TB, onClick: function() { handleNext(); } }, 'Next');
 actionsRow.appendChild(backBtn);
 actionsRow.appendChild(skipBtn);
 actionsRow.appendChild(nextBtn);
 card.appendChild(actionsRow);

 overlay.appendChild(card);
 container.appendChild(overlay);

 function _dismissOnboarding() {
 try { localStorage.setItem('dds_onboarding_dismissed', 'true'); } catch (_e) {  }
 overlay.style.opacity = '0';
 overlay.style.transition = 'opacity 0.3s ease';
 setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 300);
 }

 function updateDots() {
 for (var i = 0; i < dots.length; i++) {
  dots[i].className = 'wizard-step-dot';
  if (i < currentStep) dots[i].className += ' completed';
  else if (i === currentStep) dots[i].className += ' active';
 }
 }

 function renderStep() {
 stepContent.innerHTML = '';
 statusMsg.textContent = '';
 statusMsg.style.color = 'var(--muted)';
 var step = STEPS[currentStep];

 
 stepContent.appendChild(el('div', { className: 'wizard-step-title' }, step.title));
 stepContent.appendChild(el('div', { className: 'wizard-step-desc' }, step.desc));

 if (step.key === 'welcome') {
  
  stepContent.appendChild(el('div', { style: { textAlign: 'center', fontSize: '48px', marginBottom: '12px' } }, '\uD83D\uDC4B'));
  var firstName = (CURRENT_USER.firstName || (CURRENT_USER.name || '').split(' ')[0] || 'there');
  stepContent.appendChild(el('div', { style: { textAlign: 'center', fontSize: '14px', color: 'var(--text)', lineHeight: '1.6' } },
  'Hi ' + escapeHtml(firstName) + ', this wizard will help you set up your PIN, update your contact info, and configure your notification preferences.'));
  backBtn.style.visibility = 'hidden';
  nextBtn.textContent = 'Get Started';
 }

 else if (step.key === 'pin') {
  backBtn.style.visibility = 'visible';
  nextBtn.textContent = 'Next';
  var pinGroup = el('div', { className: 'form-group' });
  pinGroup.appendChild(el('label', { className: 'form-label', htmlFor: 'onboard-pin' }, 'PIN (6 digits)'));
  var pinInput = el('input', { id: 'onboard-pin', className: 'form-input ' + _TI, type: 'password', placeholder: 'Enter PIN', maxLength: '6', inputMode: 'numeric', autocomplete: 'new-password' });
  pinGroup.appendChild(pinInput);
  stepContent.appendChild(pinGroup);

  var confirmGroup = el('div', { className: 'form-group' });
  confirmGroup.appendChild(el('label', { className: 'form-label', htmlFor: 'onboard-pin-confirm' }, 'Confirm PIN'));
  var confirmInput = el('input', { id: 'onboard-pin-confirm', className: 'form-input ' + _TI, type: 'password', placeholder: 'Re-enter PIN', maxLength: '6', inputMode: 'numeric', autocomplete: 'new-password' });
  confirmGroup.appendChild(confirmInput);
  stepContent.appendChild(confirmGroup);

  stepData._pinInput = pinInput;
  stepData._confirmInput = confirmInput;
 }

 else if (step.key === 'contact') {
  backBtn.style.visibility = 'visible';
  nextBtn.textContent = 'Next';
  var phoneGroup = el('div', { className: 'form-group' });
  phoneGroup.appendChild(el('label', { className: 'form-label', htmlFor: 'onboard-phone' }, 'Phone Number'));
  var phoneInput = el('input', { id: 'onboard-phone', className: 'form-input ' + _TI, type: 'tel', placeholder: '(555) 123-4567' });
  phoneGroup.appendChild(phoneInput);
  phoneGroup.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', fontStyle: 'italic', marginTop: '4px' } }, 'For internal chapter communication only. Will not be shared outside the chapter.'));
  var onboardPhoneError = el('div', { className: 'field-error', style: { color: 'var(--danger, #f44336)', fontSize: '11px', marginTop: '2px', display: 'none' } });
  phoneGroup.appendChild(onboardPhoneError);
  phoneInput.addEventListener('blur', function() {
  var check = _validateContactFieldsClient('', phoneInput.value);
  if (!check.valid && check.field === 'phone') {
   onboardPhoneError.textContent = check.error;
   onboardPhoneError.style.display = '';
   phoneInput.style.borderColor = 'var(--danger, #f44336)';
  } else {
   onboardPhoneError.style.display = 'none';
   phoneInput.style.borderColor = '';
  }
  });
  stepContent.appendChild(phoneGroup);

  var addrGroup = el('div', { className: 'form-group' });
  addrGroup.appendChild(el('label', { className: 'form-label', htmlFor: 'onboard-address' }, 'Street Address'));
  var addrInput = el('input', { id: 'onboard-address', className: 'form-input ' + _TI, type: 'text', placeholder: '123 Main St' });
  addrGroup.appendChild(addrInput);
  addrGroup.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', fontStyle: 'italic', marginTop: '4px' } }, 'Helps stewards understand membership distribution and commutes. Will not be exported or shared externally.'));
  stepContent.appendChild(addrGroup);

  stepData._phoneInput = phoneInput;
  stepData._addrInput = addrInput;
 }

 else if (step.key === 'notifications') {
  backBtn.style.visibility = 'visible';
  nextBtn.textContent = 'Next';
  stepContent.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Email Digest Frequency'));

  var radioGroup = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });
  var freqOptions = [
  { value: 'immediate', label: 'Immediate', desc: 'Get notified right away' },
  { value: 'weekly', label: 'Weekly', desc: 'One summary per week' },
  { value: 'monthly', label: 'Monthly', desc: 'One summary per month' }
  ];
  var selectedFreq = stepData._selectedFreq || 'immediate';
  freqOptions.forEach(function(opt) {
  var optRow = el('div', {
   style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 12px', borderRadius: '8px', border: '1px solid var(--border)', cursor: 'pointer', background: selectedFreq === opt.value ? 'var(--accentBg)' : 'transparent' },
   onClick: function() {
   selectedFreq = opt.value;
   stepData._selectedFreq = opt.value;
   
   renderStep();
   }
  });
  var radio = document.createElement('input');
  radio.type = 'radio';
  radio.name = 'onboard-freq';
  radio.value = opt.value;
  radio.checked = selectedFreq === opt.value;
  radio.style.cssText = 'accent-color:var(--accent);margin:0;';
  optRow.appendChild(radio);
  var labelWrap = el('div');
  labelWrap.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, opt.label));
  labelWrap.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, opt.desc));
  optRow.appendChild(labelWrap);
  radioGroup.appendChild(optRow);
  });
  stepContent.appendChild(radioGroup);
 }

 else if (step.key === 'complete') {
  backBtn.style.visibility = 'hidden';
  skipBtn.style.visibility = 'hidden';
  nextBtn.textContent = 'Go to Dashboard';
  stepContent.appendChild(el('div', { style: { textAlign: 'center', fontSize: '48px', marginBottom: '12px' } }, '\u2705'));
  stepContent.appendChild(el('div', { style: { textAlign: 'center', fontSize: '14px', color: 'var(--text)', lineHeight: '1.6' } },
  'Your account is configured and ready to go. You can always update these settings later from your profile.'));
 }

 updateDots();
 }

 function validateStep() {
 var step = STEPS[currentStep];
 statusMsg.textContent = '';

 if (step.key === 'pin') {
  var pin = stepData._pinInput ? stepData._pinInput.value.trim() : '';
  var confirm = stepData._confirmInput ? stepData._confirmInput.value.trim() : '';
  if (!pin) { statusMsg.textContent = 'Please enter a PIN.'; statusMsg.style.color = 'var(--danger)'; return false; }
  if (!/^\d{6}$/.test(pin)) { statusMsg.textContent = 'PIN must be exactly 6 digits.'; statusMsg.style.color = 'var(--danger)'; return false; }
  var weakPins = ['000000','111111','222222','333333','444444','555555','666666','777777','888888','999999','123456','654321','012345','234567','345678','456789','567890','098765','987654','876543','765432'];
  if (weakPins.indexOf(pin) !== -1) { statusMsg.textContent = 'PIN is too common. Please choose a less predictable PIN.'; statusMsg.style.color = 'var(--danger)'; return false; }
  if (pin !== confirm) { statusMsg.textContent = 'PINs do not match.'; statusMsg.style.color = 'var(--danger)'; return false; }
  stepData.pin = pin;
  return true;
 }

 if (step.key === 'contact') {
  var phone = stepData._phoneInput ? stepData._phoneInput.value.trim() : '';
  var addr = stepData._addrInput ? stepData._addrInput.value.trim() : '';
  if (!phone && !addr) { statusMsg.textContent = 'Please enter a phone number or address.'; statusMsg.style.color = 'var(--danger)'; return false; }
  if (phone && !/^[\d\s\-\(\)\+]{7,15}$/.test(phone)) { statusMsg.textContent = 'Please enter a valid phone number.'; statusMsg.style.color = 'var(--danger)'; return false; }
  var contactCheck = _validateContactFieldsClient('', phone);
  if (!contactCheck.valid) { statusMsg.textContent = contactCheck.error; statusMsg.style.color = 'var(--danger)'; return false; }
  stepData.phone = phone;
  stepData.street = addr;
  return true;
 }

 
 return true;
 }

 function submitStep(callback) {
 var step = STEPS[currentStep];

 if (step.key === 'pin' && stepData.pin) {
  nextBtn.textContent = 'Saving...';
  nextBtn.disabled = true;
  serverCall().withSuccessHandler(function(result) {
  nextBtn.disabled = false;
  if (result && result.success) {
   callback();
  } else {
   statusMsg.textContent = (result && result.message) || 'Error saving PIN.';
   statusMsg.style.color = 'var(--danger)';
   nextBtn.textContent = 'Next';
  }
  }).withFailureHandler(function() {
  nextBtn.disabled = false;
  statusMsg.textContent = 'Error saving PIN. Please try again.';
  statusMsg.style.color = 'var(--danger)';
  nextBtn.textContent = 'Next';
  }).dataCompleteOnboardingStep(SESSION_TOKEN, 'pin', { pin: stepData.pin });
  return;
 }

 if (step.key === 'contact' && (stepData.phone || stepData.street)) {
  nextBtn.textContent = 'Saving...';
  nextBtn.disabled = true;
  serverCall().withSuccessHandler(function(result) {
  nextBtn.disabled = false;
  if (result && result.success) {
   callback();
  } else {
   statusMsg.textContent = (result && result.message) || 'Error saving contact info.';
   statusMsg.style.color = 'var(--danger)';
   nextBtn.textContent = 'Next';
  }
  }).withFailureHandler(function() {
  nextBtn.disabled = false;
  statusMsg.textContent = 'Error saving. Please try again.';
  statusMsg.style.color = 'var(--danger)';
  nextBtn.textContent = 'Next';
  }).dataCompleteOnboardingStep(SESSION_TOKEN, 'contact', { phone: stepData.phone, street: stepData.street });
  return;
 }

 if (step.key === 'notifications') {
  var freq = stepData._selectedFreq || 'immediate';
  serverCall().withSuccessHandler(function() {
  callback();
  }).withFailureHandler(function() {
  callback(); // Don't block on notification pref failure
  }).dataCompleteOnboardingStep(SESSION_TOKEN, 'notifications', { frequency: freq });
  return;
 }

 
 callback();
 }

 function handleNext() {
 if (currentStep === STEPS.length - 1) {
  
  _dismissOnboarding();
  return;
 }
 if (!validateStep()) return;
 submitStep(function() {
  goToStep(currentStep + 1);
 });
 }

 function goToStep(idx) {
 if (idx < 0 || idx >= STEPS.length) return;
 currentStep = idx;
 renderStep();
 }

 
 renderStep();
}

function _getGreeting() {
 var h = new Date().getHours();
 if (h < 12) return 'Good morning';
 if (h < 17) return 'Good afternoon';
 return 'Good evening';
}

function renderMemberHome(appContainer) {
 renderPageLayout(appContainer, 'member', 'home', function(container) {
 var firstName = CURRENT_USER.firstName || (CURRENT_USER.name || '').split(' ')[0] || 'there';
 _memberHeader(container, _getGreeting() + ', ' + firstName, CURRENT_USER.unit);

 
 _renderMemberWelcome(container);

 
 if (!IS_PIN_SESSION) {
  serverCall().withSuccessHandler(function(status) {
  if (status && !status.isComplete) {
   _renderOnboardingWizard(container);
  }
  }).withFailureHandler(function() {
  
  }).dataGetOnboardingStatus(SESSION_TOKEN);
 }

 
 
 if (!_isDuesPaying()) {
  var duesBanner = el('div', {
  className: 'fade-in',
  style: {
   margin: '0 16px 12px',
   padding: '12px 16px',
   borderRadius: 'var(--radius)',
   background: 'rgba(245,127,23,0.10)',
   border: '1px solid rgba(245,127,23,0.35)',
   display: 'flex',
   alignItems: 'center',
   gap: '10px'
  }
  });
  duesBanner.appendChild(el('span', { style: { fontSize: '20px', flexShrink: '0' } }, '\uD83D\uDD12'));
  var duesBannerText = el('div');
  duesBannerText.appendChild(el('div', {
  style: { fontSize: '13px', fontWeight: '600', color: 'var(--warning)', marginBottom: '2px' }
  }, 'Some features require membership dues'));
  duesBannerText.appendChild(el('div', {
  style: { fontSize: '11px', color: 'var(--muted)', lineHeight: '1.5' }
  }, 'Events, Resources, Polls, Org Charts, and Union Stats are only available to dues-paying members. Contact your steward if you believe this is an error.'));

function _getOutcomeBg(status) {

 }}, 'All ' + CONFIG.stewardLabel + 's');
 target.appendChild(labelRow);
 showLoading(target, 'member-list');

 
 
 DataCache.cachedCall('stewardDirectory', 'dataGetStewardDirectory', [SESSION_TOKEN], function(stewards) {
 
 while (target.children.length > 1) target.removeChild(target.lastChild);

 if (!stewards || stewards.length === 0) {
  target.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', padding: '10px 0' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
  return;
 }

 
 var searchInput = el('input', {
  className: 'search-input mb-8',
  placeholder: 'Search by name or location\u2026',
  'aria-label': 'Search steward directory by name or location',
  role: 'searchbox',
 });
 target.appendChild(searchInput);

 
 var locs = {};
 stewards.forEach(function(s) { if (s.workLocation) locs[s.workLocation] = (locs[s.workLocation] || 0) + 1; });
 var topLocs = Object.keys(locs).sort(function(a, b) { return locs[b] - locs[a]; }).slice(0, 5);
 var activeLocFilter = '';

 var pillBar = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '10px' } });
 target.appendChild(pillBar);

 var listArea = el('div');
 target.appendChild(listArea);

 function renderPills() {
  pillBar.innerHTML = '';
  ['All'].concat(topLocs).forEach(function(loc) {
  var isActive = loc === 'All' ? !activeLocFilter : activeLocFilter === loc;
  var pill = el('button', {
   style: {
   fontSize: '11px', padding: '4px 12px', borderRadius: '16px',
   fontWeight: '600', fontFamily: 'var(--fontBody)',
   background: isActive ? 'var(--accent)' : 'var(--surface)',
   color: isActive ? '#fff' : 'var(--muted)',
   border: '1px solid ' + (isActive ? 'var(--accent)' : 'var(--border)'),
   cursor: 'pointer',
   },
   onClick: function() {
   activeLocFilter = loc === 'All' ? '' : loc;
   renderPills();
   renderList(searchInput.value.toLowerCase());
   },
  }, loc);
  pillBar.appendChild(pill);
  });
 }

 if (topLocs.length > 1) renderPills();
 else pillBar.style.display = 'none';

 
 var _searchTimer = null;
 searchInput.addEventListener('input', function() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(function() { renderList(searchInput.value.toLowerCase()); }, 200);
 });

 var PAGE_SIZE = 15;
 var _currentPage = 0;

 function renderList(query) {
  listArea.innerHTML = '';
  _currentPage = 0;

  
  var filtered = stewards.filter(function(s) {
  if (activeLocFilter && (s.workLocation || '') !== activeLocFilter) return false;
  if (!query) return true;
  return (s.name || '').toLowerCase().indexOf(query) !== -1
   || (s.workLocation || '').toLowerCase().indexOf(query) !== -1
   || (s.unit || '').toLowerCase().indexOf(query) !== -1;
  });

  if (filtered.length === 0) {
  listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No matches.'));
  return;
  }

  
  var myLoc = (CURRENT_USER && CURRENT_USER.workLocation) ? CURRENT_USER.workLocation.trim().toLowerCase() : '';
  var days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  var todayName = days[new Date().getDay()];
  function inOfficeToday(s) { return s.officeDays && s.officeDays.toLowerCase().indexOf(todayName) !== -1; }
  filtered.sort(function(a, b) {
  var aLoc = myLoc && (a.workLocation || '').trim().toLowerCase() === myLoc ? 0 : 1;
  var bLoc = myLoc && (b.workLocation || '').trim().toLowerCase() === myLoc ? 0 : 1;
  if (aLoc !== bLoc) return aLoc - bLoc;
  var aOff = inOfficeToday(a) ? 0 : 1;
  var bOff = inOfficeToday(b) ? 0 : 1;
  if (aOff !== bOff) return aOff - bOff;
  return (a.name || '').localeCompare(b.name || '');
  });

  
  var cardContainer = el('div');
  listArea.appendChild(cardContainer);

  
  var pagRow = el('div', { role: 'navigation', 'aria-label': 'Pagination', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', gap: '8px' } });
  listArea.appendChild(pagRow);

  function _renderPage() {
  cardContainer.innerHTML = '';
  var start = _currentPage * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, filtered.length);
  var pageItems = filtered.slice(start, end);

  pageItems.forEach(function(s, i) {
   cardContainer.appendChild(_renderStewardCard(s, i, myLoc, inOfficeToday));
  });

  
  pagRow.innerHTML = '';
  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) return;

  
  if (_currentPage > 0) {
   pagRow.appendChild(el('button', {
   className: 'btn btn-secondary', 'aria-label': 'Previous page', style: { fontSize: '12px', padding: '8px 16px' },
   onClick: function() { _currentPage--; _renderPage(); cardContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
   }, '\u2190 Previous'));
  } else {
   pagRow.appendChild(el('span'));
  }

  
  pagRow.appendChild(el('span', { 'aria-live': 'polite', className: 'text-sm-muted' },
   (start + 1) + '\u2013' + end + ' of ' + filtered.length));

  
  if (_currentPage < totalPages - 1) {
   pagRow.appendChild(el('button', {
   className: 'btn btn-secondary', 'aria-label': 'Next page', style: { fontSize: '12px', padding: '8px 16px' },
   onClick: function() { _currentPage++; _renderPage(); cardContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
   }, 'Next \u2192'));
  } else {
   pagRow.appendChild(el('span'));
  }
  }

  _renderPage();
 }

 renderList('');
 }, function() {
 while (target.children.length > 1) target.removeChild(target.lastChild);
 target.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '13px', padding: '10px 0' } }, 'Failed to load directory.'));
 }, 120000);
}

function renderWorkloadTracker(appContainer) {
 
 if (!CONFIG.hasWorkloadService) {
 var role0 = AppState.activeRole || 'member';
 renderPageLayout(appContainer, role0, 'workload', function(container) {
  container.appendChild(el('div', { className: 'empty-state' }, 'This feature is not available in this deployment.'));
 });
 return;
 }
 var role = AppState.activeRole || 'member';
 var headerFn = role === 'steward' ? _stewardHeader : _memberHeader;
 renderPageLayout(appContainer, role, 'workload', function(container) {
 try {
  headerFn(container, 'Workload Tracker');

  if (!CURRENT_USER || !CURRENT_USER.email) {
  container.appendChild(el('div', { className: 'empty-state' }, 'Authentication required. Please sign in again.'));
  return;
  }

  var content = el('div', { className: 'content' });

  
  
  if (role === 'steward' && typeof _renderWorkloadPredictions === 'function') {
  _renderWorkloadPredictions(content);
  }

  var activeSubTab = 'submit';
  var subTabBar = el('div', { className: 'sub-tabs' });
  var subContent = el('div');

  function refreshSubTabs() {
  subTabBar.innerHTML = '';
  ['submit', 'history', 'stats', 'reminders'].forEach(function(tab) {
   subTabBar.appendChild(el('button', {
   className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
   onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
   }, tab.charAt(0).toUpperCase() + tab.slice(1)));
  });
  }
  function renderSubContent() {
  subContent.innerHTML = '';
  try {
   if (activeSubTab === 'submit') _renderWTSubmit(subContent);
   else if (activeSubTab === 'history') _renderWTHistory(subContent);
   else if (activeSubTab === 'stats') _renderWTStats(subContent);
   else if (activeSubTab === 'reminders') _renderWTReminders(subContent);
  } catch (subErr) {
   console.error('Workload sub-tab render error:', subErr);
   subContent.appendChild(el('div', { className: 'empty-state' }, 'Something went wrong loading this tab. Please try again.'));
  }
  }

  refreshSubTabs();
  renderSubContent();
  content.appendChild(subTabBar);
  content.appendChild(subContent);
  container.appendChild(content);
 } catch (wtErr) {
  console.error('Workload Tracker render error:', wtErr);
  container.innerHTML = '';
  container.appendChild(el('div', { className: 'empty-state' }, 'Failed to load Workload Tracker. Please try again.'));
 }
 });
}

function _wtCollectFormData(inputs, subData, privacy) {
 var fd = {};
 for (var i = 1; i <= 8; i++) fd['t' + i] = parseInt(inputs['t' + i].value) || 0;
 fd.weekly_cases = inputs.weeklySelect.value === 'manual' ? inputs.weeklyManual.value : inputs.weeklySelect.value;
 fd.weekly_cases_option = inputs.weeklySelect.value;
 fd.weekly_cases_manual = inputs.weeklyManual.value;
 fd.employment_type = inputs.empSelect.value;
 fd.part_time_hours = inputs.ptInput.value;
 fd.on_plan = inputs.planCheck.checked;
 fd.overtime_enabled = inputs.otCheck.checked;
 fd.overtime_hours = inputs.otInput.value;
 fd.leave_type = inputs.leaveType.value;
 fd.leave_planned = inputs.leavePlanned.value;
 fd.leave_start = inputs.leaveStart.value;
 fd.leave_end = inputs.leaveEnd.value;
 fd.no_intake_choice = inputs.noIntake.value;
 fd.half_day = inputs.halfDay.checked;
 fd.privacy = privacy;
 
 for (var ci = 0; ci < WT_CAT_KEYS.length; ci++) {
 var catKey = WT_CAT_KEYS[ci];
 var subs = WT_SUB_CATS[catKey];
 for (var si = 0; si < subs.length; si++) {
  fd['sub_' + (ci + 1) + '_' + si] = (subData[catKey] && subData[catKey][si]) || 0;
 }
 }
 return fd;
}

function _wtClearForm(inputs, subData) {
 for (var i = 1; i <= 8; i++) { inputs['t' + i].value = '0'; inputs['t' + i].parentElement.parentElement.classList.remove('warn'); }

 inputs.otCheck.checked = false;
 inputs.otInput.value = '';

 inputs.leaveType.value = '';
 inputs.leavePlanned.value = '';
 inputs.leaveStart.value = '';
 inputs.leaveEnd.value = '';
 inputs.noIntake.value = '';
 inputs.halfDay.checked = false;
 for (var k in subData) delete subData[k];

function _wtRestoreForm(inputs, backup) {
 for (var i = 1; i <= 8; i++) inputs['t' + i].value = backup['t' + i] || 0;
 inputs.weeklySelect.value = backup.weekly_cases_option || '15';

 inputs.ptInput.value = backup.part_time_hours || '';
 inputs.ptInput.style.display = inputs.empSelect.value === 'Part-time' ? '' : 'none';
 inputs.planCheck.checked = !!backup.on_plan;
 inputs.otCheck.checked = !!backup.overtime_enabled;
 inputs.otInput.value = backup.overtime_hours || '';
 inputs.otInput.style.display = inputs.otCheck.checked ? '' : 'none';
 inputs.leaveType.value = backup.leave_type || '';
 inputs.leavePlanned.value = backup.leave_planned || '';
 inputs.leaveStart.value = backup.leave_start || '';
 inputs.leaveEnd.value = backup.leave_end || '';
 inputs.noIntake.value = backup.no_intake_choice || '';
 inputs.halfDay.checked = !!backup.half_day;
}

function _openSubModal(cat, catIdx, mainInput, subData) {

 var _prevFocus = document.activeElement;

 var subInputs = [];

 function updateTotal() {
 var sum = 0;
 for (var s = 0; s < subInputs.length; s++) sum += parseInt(subInputs[s].value) || 0;
 totalEl.textContent = String(sum);
 }

 subs.forEach(function(name, si) {

 });

 var totalRow = el('div', { className: 'wt-modal-total' });
 totalRow.appendChild(el('span', {}, 'Total'));
 totalRow.appendChild(totalEl);

 updateTotal();

 var btnRow = el('div', { style: { display: 'flex', gap: '8px', marginTop: '14px', justifyContent: 'flex-end' } });
 btnRow.appendChild(el('button', { className: 'btn btn-secondary',
 onClick: function() { overlay.remove(); if (_prevFocus && _prevFocus.focus) _prevFocus.focus(); }
 }, 'Cancel'));
 btnRow.appendChild(el('button', { className: 'btn btn-primary',
 onClick: function() {
  var sum = 0;
  for (var s = 0; s < subInputs.length; s++) {
  var v = parseInt(subInputs[s].value) || 0;
  subData[cat.key][s] = v;
  sum += v;
  }
  mainInput.value = String(sum);
  mainInput.dispatchEvent(new Event('input'));
  overlay.remove();
  if (_prevFocus && _prevFocus.focus) _prevFocus.focus();

 }, 'Apply'));

}

  if (entry.overtime !== '' && entry.overtime !== null && entry.overtime !== undefined) meta.push('OT: ' + entry.overtime + 'h');
  if (entry.privacy) meta.push(entry.privacy);
  if (entry.onPlan === 'Yes') meta.push('On Plan');

  if (entry.subCategories && Object.keys(entry.subCategories).length > 0) {

   }, '\u25BC Show details'));
   card.appendChild(subDiv);
  }
  }

  container.appendChild(card);
 });
 }).getWorkloadHistorySSO(SESSION_TOKEN);

function renderUnionStatsPage(appContainer) {

 renderPageLayout(appContainer, 'member', 'unionstats', function(container) {
 _memberHeader(container, 'Union Stats');
 var content = el('div', { className: 'content' });

 
 var activeSubTab = 'grievances';
 var subTabBar = el('div', { className: 'sub-tabs' });
 var subContent = el('div');

 
 var CACHE_TTL = ((CONFIG && CONFIG.insightsCacheTTLMin) || 5) * 60 * 1000;
 if (!AppState.unionStatsCache) AppState.unionStatsCache = {};
 var cache = AppState.unionStatsCache;

 var statTabs = ['grievances', 'hot spots', 'membership', 'engagement', 'resources', 'usage', 'workload'];
 function refreshSubTabs() {
  subTabBar.innerHTML = '';
  statTabs.forEach(function(tab) {
  subTabBar.appendChild(el('button', {
   className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
   onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
  }, tab.charAt(0).toUpperCase() + tab.slice(1)));
  });
 }

 function _getCached(key) {
  var entry = cache[key];
  if (entry && (Date.now() - entry.ts) < CACHE_TTL) return entry.data;
  return null;
 }
 function _setCache(key, data) {
  cache[key] = { ts: Date.now(), data: data };
 }

 function renderSubContent() {
  subContent.innerHTML = '';
  if (activeSubTab === 'grievances') _renderGrievanceStats(subContent, _getCached, _setCache);
  else if (activeSubTab === 'hot spots') _renderHotSpots(subContent, _getCached, _setCache);
  else if (activeSubTab === 'engagement') _renderEngagementStats(subContent, _getCached, _setCache);
  else if (activeSubTab === 'resources') _renderResourceStats(subContent, _getCached, _setCache);
  else if (activeSubTab === 'usage') _renderUsageStats(subContent, _getCached, _setCache);
  else if (activeSubTab === 'workload') _renderWorkloadSummaryStats(subContent, _getCached, _setCache);
  else _renderMembershipStats(subContent, _getCached, _setCache);
 }

 refreshSubTabs();
 renderSubContent();
 content.appendChild(subTabBar);
 content.appendChild(subContent);
 container.appendChild(content);
 });
}

function _buildOptionInputs(container, onChange) {
 var options = ['', ''];
 var rows = el('div', { className: 'mb-8' });

 function refresh() {
 rows.innerHTML = '';
 options.forEach(function(opt, i) {
  var row = el('div', { style: { display: 'flex', gap: '6px', alignItems: 'center', marginBottom: '6px' } });
  var input = el('input', { type: 'text', className: 'msg-textarea', placeholder: 'Option ' + (i + 1),
  style: { flex: '1', minHeight: '34px', marginBottom: '0' } });
  input.value = opt;
  input.addEventListener('input', function() { options[i] = input.value; if (onChange) onChange(options); });
  row.appendChild(input);
  if (options.length > 2) {
  var removeBtn = el('button', { className: 'btn btn-secondary', style: { width: 'auto', padding: '4px 10px', fontSize: '18px', lineHeight: '1', minHeight: '34px' },
   onClick: function() { options.splice(i, 1); refresh(); if (onChange) onChange(options); }
  }, '×');
  row.appendChild(removeBtn);
  }
  rows.appendChild(row);
 });
 if (options.length < 5) {
  var addBtn = el('button', { className: 'btn btn-secondary', style: { width: 'auto', padding: '6px 14px', fontSize: '12px', marginTop: '2px' },
  onClick: function() { options.push(''); refresh(); if (onChange) onChange(options); }
  }, '+ Add option');
  rows.appendChild(addBtn);
 }
 }

 refresh();
 container.appendChild(rows);
 return { getOptions: function() { return options.map(function(o) { return o.trim(); }).filter(Boolean); } };
}

function _renderPollResults(container, q) {
 var stats = q.stats || {};

 var counts = stats.counts || {};
 var options = q.options || [];

 container.appendChild(el('div', { className: 'privacy-badge mb-10' }, '🔒 Anonymous — votes are one-way encrypted'));

 if (total === 0) {
 container.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', textAlign: 'center', padding: '10px 0' } }, 'No votes yet — be the first!'));
 return;
 }

 var colors = ['var(--accent)', 'var(--success)', '#facc15', '#f97316', '#a78bfa'];
 options.forEach(function(opt, i) {
 var count = counts[opt] || 0;
 var pct = total > 0 ? Math.round((count / total) * 100) : 0;
 var row = el('div', { className: 'mb-8' });
 var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '3px' } });
 header.appendChild(el('span', { style: { color: 'var(--text)', fontWeight: '500' } }, opt));
 header.appendChild(el('span', { style: { color: 'var(--muted)' } }, pct + '%  (' + count + ')'));
 row.appendChild(header);
 var bar = el('div', { className: 'prog-track prog-track--md' });
 bar.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%', background: colors[i % colors.length] } }));
 row.appendChild(bar);
 container.appendChild(row);
 });
 
 var participationRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginTop: '6px', flexWrap: 'wrap' } });
 participationRow.appendChild(el('span', {
 style: { display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: '#fff', fontWeight: '600', background: 'var(--accent)', borderRadius: '10px', padding: '2px 8px' }
 }, '\uD83D\uDDF3\uFE0F ' + total + ' vote' + (total !== 1 ? 's' : '')));
 var estMembership = (typeof AppState !== 'undefined' && AppState.memberCount) ? AppState.memberCount : 0;
 if (estMembership > 0 && total > 0) {
 var pctParticipation = Math.round((total / estMembership) * 100);
 participationRow.appendChild(el('span', {
  style: { fontSize: '11px', color: pctParticipation >= 50 ? 'var(--success)' : pctParticipation >= 25 ? 'var(--warning, #eab308)' : 'var(--muted)', fontWeight: '500' }
 }, pctParticipation + '% participation'));
 }
 container.appendChild(participationRow);
}

 function _loadEvents() {
  if (currentPage === 1) showLoading(listArea);
  serverCall().withSuccessHandler(function(result) {
  
  var oldBtn = listArea.querySelector('.tl-load-more');
  if (oldBtn && oldBtn.parentNode) oldBtn.parentNode.removeChild(oldBtn);

  if (currentPage === 1) {
   listArea.innerHTML = '';

  }

  if (!result || !result.events || result.events.length === 0) {
   if (currentPage === 1) {
   var empty = el('div', { className: 'empty-state-lg' });

   empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'No timeline events yet'));

   tlContainer = el('div', { className: 'timeline-container' });
   tlContainer.appendChild(el('div', { className: 'timeline-line' }));
   listArea.appendChild(tlContainer);
  }

  result.events.forEach(function(evt) {
   var item = el('div', { className: 'timeline-event' });
   item.appendChild(el('div', { className: 'timeline-dot' }));
   item.appendChild(el('div', { className: 'timeline-date' }, evt.eventDate));

   var titleRow = el('div', { className: 'flex-between-center' });

   titleRow.appendChild(el('span', { className: 'category-badge ' + (evt.category || 'other') }, evt.category || 'other'));
   card.appendChild(titleRow);

   if (evt.description) {
   var TRUNCATE = 200;
   var isLong = evt.description.length > TRUNCATE;
   var descEl = el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '4px' } });
   descEl.textContent = isLong ? evt.description.substring(0, TRUNCATE) + '\u2026' : evt.description;
   card.appendChild(descEl);
   if (isLong) {
    var expanded = false;
    var toggleBtn = el('button', {
    style: { fontSize: '11px', color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', marginTop: '2px' },
    onClick: function() {
     expanded = !expanded;
     descEl.textContent = expanded ? evt.description : evt.description.substring(0, TRUNCATE) + '\u2026';
     toggleBtn.textContent = expanded ? 'Show less' : 'Show more';

    card.appendChild(toggleBtn);

   if (evt.driveFiles && evt.driveFiles.length > 0) {
   var filesDiv = el('div', { style: { marginTop: '8px', fontSize: '11px' } });
   filesDiv.appendChild(el('span', { style: { color: 'var(--muted)' } }, '\uD83D\uDCCE Files: '));
   evt.driveFiles.forEach(function(f, idx) {
    if (idx > 0) filesDiv.appendChild(document.createTextNode(', '));
    filesDiv.appendChild(el('a', { href: 'https://drive.google.com/file/d/' + f.id + '/view', target: '_blank', style: { color: 'var(--accent)' } }, f.name));
   });
   card.appendChild(filesDiv);
   }

   if (evt.meetingMinutesId) {
   card.appendChild(el('div', { style: { marginTop: '6px', fontSize: '11px' } },
    el('a', { href: 'https://docs.google.com/document/d/' + evt.meetingMinutesId + '/edit', target: '_blank', style: { color: 'var(--accent)' } }, '\uD83D\uDCC4 Meeting Minutes')
   ));

   item.appendChild(card);
   tlContainer.appendChild(item);

  var total = result.total || 0;

   var moreBtn = el('button', {
   className: 'btn tl-load-more',
   style: { display: 'block', margin: '16px auto', fontSize: '13px' },
   onClick: function() {

    moreBtn.disabled = true;
    _loadEvents();
   }
   }, 'Load More (' + (total - shown) + ' remaining)');
   listArea.appendChild(moreBtn);
  }

  }).withFailureHandler(function() {
  if (currentPage === 1) {
   listArea.innerHTML = '';
   listArea.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load timeline.'));
  }
  }).tlGetTimelineEvents(SESSION_TOKEN, currentPage, PAGE_SIZE, filterYear || null, filterCategory || null);

 showLoading(listArea);
 _initFilters(function() { _loadEvents(); });
 container.appendChild(content);

  var card = el('div', { className: 'card ' + _TC, style: { padding: '14px', textAlign: 'center' } });
  card.appendChild(el('div', { style: { fontSize: '22px', fontWeight: '700', color: kpi.color } }, String(kpi.value)));
  card.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.8px', color: 'var(--text-secondary)', marginTop: '4px' } }, kpi.label));
  kpis.appendChild(card);
 });
 tabContent.appendChild(kpis);

 
 if (!data.members || data.members.length === 0) {
  tabContent.appendChild(el('div', { className: 'card ' + _TC, style: { padding: '20px', color: 'var(--text-secondary)', textAlign: 'center', fontStyle: 'italic' } },
  'No members found in your unit.'));
  return;
 }

 var listHeader = el('div', { style: { fontSize: '13px', fontWeight: '700', marginBottom: '8px', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.8px' } }, 'Member Scores');
 tabContent.appendChild(listHeader);

 data.members.forEach(function(m) {
  var card = el('div', { className: 'card ' + _TC, style: { padding: '12px 16px', marginBottom: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });

  var left = el('div');
  left.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px' } }, escapeHtml(m.name || m.email)));
  if (m.email && m.name) left.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, escapeHtml(m.email)));
  card.appendChild(left);

  var right = el('div', { style: { textAlign: 'right' } });
  var scoreVal = m.composite != null ? Math.round(m.composite) : '--';
  right.appendChild(el('div', { style: { fontSize: '18px', fontWeight: '700', color: _engagementColor(m.composite) } }, String(scoreVal)));
  if (m.trend) right.appendChild(el('div', { style: { fontSize: '12px' } }, m.trend === 'increasing' ? '\u2191' : m.trend === 'decreasing' ? '\u2193' : '\u2192'));
  card.appendChild(right);

  tabContent.appendChild(card);
 });
 }).withFailureHandler(function(err) {
 tabContent.innerHTML = '';
 tabContent.appendChild(el('div', { className: 'card', style: { padding: '20px', color: 'var(--danger, #ef4444)', textAlign: 'center' } },
  'Failed to load engagement data: ' + (err && err.message || 'server error')));
 }).dataGetLeaderDashboard(SESSION_TOKEN);
}

function _engagementColor(score) {
 if (score == null) return 'var(--text-secondary)';
 if (score >= 70) return 'var(--success, #22c55e)';
 if (score >= 40) return 'hsl(40,80%,55%)';
 return 'var(--danger, #ef4444)';
}

function _renderLeaderBroadcast(tabContent) {
 var subjectInput = el('input', { className: 'form-input', type: 'text', placeholder: 'Subject (optional)', style: { width: '100%', marginBottom: '10px' } });
 var messageArea = el('textarea', { className: 'form-input', placeholder: 'Write your message to unit members...', style: { width: '100%', minHeight: '140px', resize: 'vertical', marginBottom: '10px' } });
 var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '8px' } });
 var charCount = el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', textAlign: 'right', marginBottom: '8px' } }, '0 characters');
 var sendBtn = el('button', { className: 'btn btn-primary ' + _TB, style: { width: '100%' },
 onClick: function() {
  var msg = messageArea.value.trim();
  if (!msg) { statusMsg.textContent = 'Please enter a message.'; statusMsg.style.color = 'var(--danger, #ef4444)'; return; }
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  statusMsg.textContent = '';
  serverCall().withSuccessHandler(function(r) {
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send to Unit';
  if (r && r.success) {
   statusMsg.textContent = r.message || ('Sent to ' + r.sentCount + ' member(s).');
   statusMsg.style.color = 'var(--success, #22c55e)';
   messageArea.value = '';
   subjectInput.value = '';
   charCount.textContent = '0 characters';
   if (r.failedCount > 0) statusMsg.textContent += ' (' + r.failedCount + ' failed)';
  } else {
   statusMsg.textContent = (r && r.message) || 'Failed to send.';
   statusMsg.style.color = 'var(--danger, #ef4444)';
  }
  }).withFailureHandler(function() {
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send to Unit';
  statusMsg.textContent = 'Server error.';
  statusMsg.style.color = 'var(--danger, #ef4444)';
  }).dataLeaderBroadcast(SESSION_TOKEN, messageArea.value.trim(), subjectInput.value.trim());
 }
 }, 'Send to Unit');

 messageArea.addEventListener('input', function() {
 charCount.textContent = messageArea.value.length + ' characters';
 });

 
 var previewBox = el('div', { className: 'card ' + _TC, style: { padding: '12px 16px', marginBottom: '16px', fontSize: '13px' } });
 previewBox.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '4px' } }, 'Recipients'));
 var previewText = el('div', { style: { color: 'var(--text-secondary)' } }, 'Loading unit members...');
 previewBox.appendChild(previewText);
 tabContent.appendChild(previewBox);

 serverCall().withSuccessHandler(function(members) {
 if (!Array.isArray(members) || members.length === 0) {
  previewText.textContent = 'No members found in your unit.';
  sendBtn.disabled = true;
 } else {
  previewText.textContent = members.length + ' member(s) in your unit will receive this message.';
 }
 }).withFailureHandler(function() {
 previewText.textContent = 'Unable to load recipients.';
 }).dataGetLeaderUnitMembers(SESSION_TOKEN);

 var formCard = el('div', { className: 'card ' + _TC, style: { padding: '16px' } });
 formCard.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px', marginBottom: '12px' } }, 'Compose Message'));
 formCard.appendChild(subjectInput);
 formCard.appendChild(messageArea);
 formCard.appendChild(charCount);
 formCard.appendChild(statusMsg);
 formCard.appendChild(sendBtn);
 tabContent.appendChild(formCard);
}

function _renderLeaderOutreach(tabContent) {
 
 var formCard = el('div', { className: 'card ' + _TC, style: { padding: '16px', marginBottom: '16px' } });
 formCard.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px', marginBottom: '12px' } }, 'Log Outreach'));

 
 var memberInput = el('input', { className: 'form-input', type: 'text', placeholder: 'Member name or email', style: { width: '100%', marginBottom: '8px' } });
 var memberSuggestions = el('div', { style: { position: 'relative' } });
 var memberDropdown = el('div', { style: { display: 'none', position: 'absolute', top: '0', left: '0', right: '0', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', maxHeight: '150px', overflowY: 'auto', zIndex: '10', boxShadow: '0 4px 12px rgba(0,0,0,0.15)' } });
 memberSuggestions.appendChild(memberDropdown);
 var _unitMembers = [];
 var _selectedMember = { email: '', name: '' };

 serverCall().withSuccessHandler(function(members) {
 if (!Array.isArray(members)) return;
 _unitMembers = members;
 }).withFailureHandler(function() {}).dataGetLeaderUnitMembers(SESSION_TOKEN);

 memberInput.addEventListener('input', function() {
 var q = memberInput.value.toLowerCase().trim();
 _selectedMember = { email: '', name: '' };
 if (!q || q.length < 2) { memberDropdown.style.display = 'none'; return; }
 memberDropdown.innerHTML = '';
 var matches = _unitMembers.filter(function(m) {
  return (m.name && m.name.toLowerCase().indexOf(q) >= 0) || (m.email && m.email.toLowerCase().indexOf(q) >= 0);
 }).slice(0, 8);
 if (matches.length === 0) { memberDropdown.style.display = 'none'; return; }
 matches.forEach(function(m) {
  var opt = el('div', {
  style: { padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border)' },
  onClick: function() {
   _selectedMember = { email: m.email, name: m.name };
   memberInput.value = m.name + ' (' + m.email + ')';
   memberDropdown.style.display = 'none';
  }
  });
  opt.appendChild(el('div', { style: { fontWeight: '600' } }, escapeHtml(m.name)));
  opt.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, escapeHtml(m.email)));
  memberDropdown.appendChild(opt);
 });
 memberDropdown.style.display = 'block';
 });

 formCard.appendChild(memberInput);
 formCard.appendChild(memberSuggestions);

 
 var typeLabel = el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', marginBottom: '6px' } }, 'Contact Type');
 formCard.appendChild(typeLabel);
 var typeRow = el('div', { style: { display: 'flex', gap: '6px', marginBottom: '10px', flexWrap: 'wrap' } });
 var _selectedType = '';
 var typeOptions = [
 { value: 'Phone', icon: '\uD83D\uDCDE' },
 { value: 'Email', icon: '\u2709\uFE0F' },
 { value: 'In Person', icon: '\uD83D\uDC64' },
 { value: 'Text', icon: '\uD83D\uDCAC' }
 ];
 var typeBtns = [];
 typeOptions.forEach(function(t) {
 var btn = el('button', {
  className: 'btn btn-secondary',
  style: { fontSize: '13px', padding: '6px 12px' },
  onClick: function() {
  _selectedType = t.value;
  typeBtns.forEach(function(b) {
   b.style.background = '';
   b.style.color = '';
  });
  btn.style.background = 'var(--accent)';
  btn.style.color = '#fff';
  }
 }, t.icon + ' ' + t.value);
 typeBtns.push(btn);
 typeRow.appendChild(btn);
 });
 formCard.appendChild(typeRow);

 
 var notesArea = el('textarea', { className: 'form-input', placeholder: 'Notes about the interaction...', style: { width: '100%', minHeight: '80px', resize: 'vertical', marginBottom: '10px' } });
 formCard.appendChild(notesArea);

 
 var formMsg = el('div', { style: { fontSize: '13px', minHeight: '18px', marginBottom: '8px' } });
 formCard.appendChild(formMsg);
 var logBtn = el('button', { className: 'btn btn-primary ' + _TB, style: { width: '100%' },
 onClick: function() {
  if (!_selectedMember.email) { formMsg.textContent = 'Select a member from the dropdown.'; formMsg.style.color = 'var(--danger, #ef4444)'; return; }
  if (!_selectedType) { formMsg.textContent = 'Choose a contact type.'; formMsg.style.color = 'var(--danger, #ef4444)'; return; }
  logBtn.disabled = true;
  logBtn.textContent = 'Logging...';
  formMsg.textContent = '';
  serverCall().withSuccessHandler(function(r) {
  logBtn.disabled = false;
  logBtn.textContent = 'Log Outreach';
  if (r && r.success) {
   formMsg.textContent = 'Logged!';
   formMsg.style.color = 'var(--success, #22c55e)';
   memberInput.value = '';
   notesArea.value = '';
   _selectedMember = { email: '', name: '' };
   _selectedType = '';
   typeBtns.forEach(function(b) { b.style.background = ''; b.style.color = ''; });
   
   _loadLeaderOutreachLog(logList);
   setTimeout(function() { formMsg.textContent = ''; }, 2000);
  } else {
   formMsg.textContent = (r && r.message) || 'Failed to log.';
   formMsg.style.color = 'var(--danger, #ef4444)';
  }
  }).withFailureHandler(function() {
  logBtn.disabled = false;
  logBtn.textContent = 'Log Outreach';
  formMsg.textContent = 'Server error.';
  formMsg.style.color = 'var(--danger, #ef4444)';
  }).dataLogLeaderOutreach(SESSION_TOKEN, _selectedMember.email, _selectedType, notesArea.value.trim(), _selectedMember.name);
 }
 }, 'Log Outreach');
 formCard.appendChild(logBtn);
 tabContent.appendChild(formCard);

 
 var logHeader = el('div', { style: { fontSize: '13px', fontWeight: '700', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px' } }, 'Recent Outreach');
 tabContent.appendChild(logHeader);
 var logList = el('div');
 logList.appendChild(el('div', { style: { padding: '16px', color: 'var(--text-secondary)' } }, 'Loading...'));
 tabContent.appendChild(logList);

 _loadLeaderOutreachLog(logList);
}

function _loadLeaderOutreachLog(logList) {
 serverCall().withSuccessHandler(function(entries) {
 logList.innerHTML = '';
 if (!entries || entries.length === 0) {
  logList.appendChild(el('div', { className: 'card ' + _TC, style: { padding: '16px', color: 'var(--text-secondary)', fontStyle: 'italic', textAlign: 'center' } },
  'No outreach logged yet. Use the form above to log your first contact.'));
  return;
 }
 entries.slice(0, 30).forEach(function(entry) {
  var card = el('div', { className: 'card ' + _TC, style: { padding: '12px 16px', marginBottom: '6px' } });
  var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
  var nameEl = el('div', { style: { fontWeight: '600', fontSize: '14px' } }, escapeHtml(entry.memberName || entry.memberEmail || 'Unknown'));
  top.appendChild(nameEl);
  var typeColors = { 'Phone': 'hsl(200,70%,55%)', 'Email': 'hsl(250,70%,68%)', 'In Person': 'hsl(150,60%,50%)', 'Text': 'hsl(40,80%,55%)' };
  var typeBadge = el('span', {
  style: { padding: '2px 8px', borderRadius: '12px', fontSize: '11px', fontWeight: '600', background: typeColors[entry.type] || 'var(--border)', color: '#fff' }
  }, escapeHtml(entry.type || ''));
  top.appendChild(typeBadge);
  card.appendChild(top);
  if (entry.notes) card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px', lineHeight: '1.4' } }, escapeHtml(entry.notes)));
  if (entry.date) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', marginTop: '4px' } }, escapeHtml(String(entry.date))));
  logList.appendChild(card);
 });
 }).withFailureHandler(function() {
 logList.innerHTML = '';
 logList.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--danger, #ef4444)' } }, 'Failed to load outreach log.'));
 }).dataGetLeaderOutreachLog(SESSION_TOKEN);
}

function _renderLeaderMentorships(tabContent) {
 showLoading(tabContent, 'list');
 serverCall().withSuccessHandler(function(data) {
 tabContent.innerHTML = '';
 if (!data || !data.success) {
  tabContent.appendChild(el('div', { className: 'card ' + _TC, style: { padding: '20px', color: 'var(--text-secondary)', textAlign: 'center' } },
  (data && data.message) || 'Unable to load mentorship data.'));
  return;
 }
 var pairings = data.pairings || [];
 if (pairings.length === 0) {
  tabContent.appendChild(el('div', { className: 'card ' + _TC, style: { padding: '20px', color: 'var(--text-secondary)', textAlign: 'center', fontStyle: 'italic' } },
  'No active mentorship pairings in your unit.'));
  return;
 }

 
 tabContent.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '12px' } },
  pairings.length + ' active pairing' + (pairings.length !== 1 ? 's' : '') + ' in your unit'));

 
 pairings.forEach(function(p) {
  var card = el('div', { className: 'card ' + _TC, style: { padding: '14px 16px', marginBottom: '8px' } });

  var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' } });

  
  var mentorEl = el('div', { style: { flex: '1', minWidth: '120px' } });
  mentorEl.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--text-secondary)', marginBottom: '2px' } }, 'Mentor'));
  mentorEl.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px' } }, escapeHtml(p.mentorName || p.mentorEmail)));
  if (p.mentorName && p.mentorName !== p.mentorEmail) {
  mentorEl.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, escapeHtml(p.mentorEmail)));
  }
  row.appendChild(mentorEl);

  
  row.appendChild(el('div', { style: { fontSize: '18px', color: 'var(--text-secondary)', flexShrink: '0' } }, '\u2192'));

  
  var menteeEl = el('div', { style: { flex: '1', minWidth: '120px' } });
  menteeEl.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.5px', color: 'var(--text-secondary)', marginBottom: '2px' } }, 'Mentee'));
  menteeEl.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px' } }, escapeHtml(p.menteeName || p.menteeEmail)));
  if (p.menteeName && p.menteeName !== p.menteeEmail) {
  menteeEl.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, escapeHtml(p.menteeEmail)));
  }
  row.appendChild(menteeEl);

  
  var statusColor = p.status === 'active' ? 'var(--success, #22c55e)' : 'var(--border-subtle)';
  row.appendChild(el('span', {
  style: { padding: '2px 10px', borderRadius: '12px', fontSize: '11px', fontWeight: '600', background: statusColor, color: '#fff', flexShrink: '0' }
  }, escapeHtml(p.status || 'active')));

  card.appendChild(row);

  
  var meta = el('div', { style: { display: 'flex', gap: '16px', marginTop: '8px', fontSize: '12px', color: 'var(--text-secondary)' } });
  if (p.caseTypes) meta.appendChild(el('span', {}, 'Focus: ' + escapeHtml(p.caseTypes)));
  if (p.started) meta.appendChild(el('span', {}, 'Since ' + escapeHtml(String(p.started))));
  if (meta.childNodes.length > 0) card.appendChild(meta);

  tabContent.appendChild(card);
 });
 }).withFailureHandler(function() {
 tabContent.innerHTML = '';
 tabContent.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--danger, #ef4444)' } }, 'Failed to load mentorship data.'));
 }).dataGetLeaderUnitMentorships(SESSION_TOKEN);
}
</script>
