<script>

var NEGOTIATION_SETS = [
 {
 title: 'What Is Negotiation?',
 quote: { text: 'Let us never negotiate out of fear. But let us never fear to negotiate.', attr: 'John F. Kennedy' },
 bullets: [
  'A dialogue between two or more parties seeking mutual agreement.',
  'It is not about winning or losing — it is about finding solutions.',
  'Every conversation where something of value is at stake is a negotiation.'
 ]
 },
 {
 title: 'Mediation vs. Arbitration',
 quote: { text: 'Mediation is not about who is right or wrong. It is about finding a path forward together.', attr: 'Labor tradition' },
 bullets: [
  'Mediation: neutral facilitator helps YOU decide. Non-binding.',
  'Arbitration: neutral decision-maker renders a binding ruling.',
  'Mediation preserves relationships. Arbitration delivers finality.',
  'Try mediation first. Arbitration is your credible fallback.'
 ]
 },
 {
 title: 'BATNA',
 quote: { text: 'Your BATNA is the standard against which any proposed agreement should be measured.', attr: 'Fisher & Ury, Getting to Yes' },
 bullets: [
  'Best Alternative To a Negotiated Agreement — your walk-away power.',
  'The stronger your BATNA, the stronger your position at the table.',
  'Never reveal a weak BATNA. Work to strengthen it first.',
  'Always assess the other side\u2019s BATNA too.'
 ]
 },
 {
 title: 'The Anchor Point',
 quote: { text: 'In any negotiation, the person who sets the anchor controls the range of discussion.', attr: 'Negotiation principle' },
 bullets: [
  'The first offer powerfully influences the final outcome.',
  'Set an ambitious but defensible anchor — back it with facts.',
  'If the other side anchors first, don\u2019t let it pull you.',
  'Counter-anchor with objective criteria: contract, precedent, law.'
 ]
 },
 {
 title: 'The Flinch',
 quote: { text: 'Your reaction to an offer is often more powerful than your counter-offer.', attr: 'Jim Camp' },
 bullets: [
  'When they make an offer, react visibly — even if it\u2019s reasonable.',
  'A sharp inhale, raised eyebrow, or pause sends a clear signal.',
  'Most people rush to close the gap when they see disapproval.',
  'The flinch works because people are uncomfortable with rejection.'
 ]
 },
 {
 title: 'Use Silence',
 quote: { text: 'Silence is a source of great strength.', attr: 'Lao Tzu' },
 bullets: [
  'After making a proposal, stop talking. Let the other side respond.',
  'Silence creates pressure and space for the other party to fill.',
  'Resist negotiating against yourself by speaking to fill the void.',
  'The first person to speak after a proposal usually concedes.'
 ]
 },
 {
 title: 'When a Conversation Becomes a Negotiation',
 quote: { text: 'If you\u2019re not at the table, you\u2019re on the menu.', attr: 'Labor tradition' },
 bullets: [
  'The moment someone makes a request that affects your rights — you\u2019re negotiating.',
  'Informal hallway chats with management often shape outcomes before formal meetings.',
  '"Just this once" is never just once — it sets a precedent.',
  'If you feel pressure to answer immediately, that IS the negotiation.'
 ]
 },
 {
 title: 'Dealing with Hard Bargainers',
 quote: { text: 'The best defense against dirty tactics is to recognize them. Once named, they lose their power.', attr: 'Fisher & Ury' },
 bullets: [
  'Take-it-or-leave-it: Almost always a bluff. Say "Let me take it back to the team."',
  'Good Cop / Bad Cop: Treat them as one unit. Don\u2019t trust the "reasonable" one.',
  'Intimidation: Stay calm. Don\u2019t match their energy. Suggest a break.',
  'Name the tactic out loud — "It sounds like a take-it-or-leave-it" — to neutralize it.'
 ]
 },
 {
 title: 'Hard Bargainer: The Nibble',
 quote: { text: 'Small concessions add up to big losses if you\u2019re not tracking them.', attr: 'Negotiation principle' },
 bullets: [
  'After the big issues are settled, they ask for "one small thing" — then another.',
  'Each seems minor, so refusing feels petty. But they add up fast.',
  'Counter: "We\u2019ve already reached agreement. Any changes reopen the whole discussion."',
  'Track every concession on paper. Make the pattern visible.'
 ]
 },
 {
 title: 'Interests vs. Positions',
 quote: { text: 'Behind opposed positions lie shared and compatible interests.', attr: 'Getting to Yes' },
 bullets: [
  'A position is what someone says they want. An interest is WHY they want it.',
  'Ask "why?" and "why not?" to uncover what really matters.',
  'Solutions that satisfy both sides\u2019 interests are the most durable.',
  'Two people fighting over an orange: one wants the juice, one wants the peel.'
 ]
 },
 {
 title: 'Prepare Relentlessly',
 quote: { text: 'By failing to prepare, you are preparing to fail.', attr: 'Benjamin Franklin' },
 bullets: [
  'Know the contract inside and out before you sit down.',
  'Research past grievance outcomes and precedents.',
  'Anticipate management\u2019s arguments and prepare rebuttals.',
  'Bring documentation — facts beat opinions every time.'
 ]
 },
 {
 title: 'The ZOPA',
 quote: { text: 'You don\u2019t get what you deserve. You get what you negotiate.', attr: 'Chester L. Karrass' },
 bullets: [
  'Zone of Possible Agreement: the overlap where a deal is possible.',
  'If the zones don\u2019t overlap, you\u2019re heading to impasse or arbitration.',
  'Your job: figure out where the ZOPA is and capture as much value as possible.',
  'A strong BATNA shifts the ZOPA in your favor.'
 ]
 },
 {
 title: 'Never Accept the First Offer',
 quote: { text: 'The first offer is never the best offer.', attr: 'Negotiation principle' },
 bullets: [
  'The first offer is almost always a test of where you stand.',
  'Countering shows you are prepared and engaged.',
  'Even if the offer seems fair, there is usually room to improve it.',
  'Accepting too fast can leave value on the table — and signal weakness.'
 ]
 },
 {
 title: 'False Authority Trap',
 quote: { text: 'Always ask: Do you have the authority to make a deal today?', attr: 'Negotiation principle' },
 bullets: [
  'They negotiate, reach agreement, then say "I need to check with my boss."',
  'The boss rejects it and demands more concessions.',
  'You\u2019ve invested time and energy — starting over feels worse than giving in.',
  'Counter: Ask upfront who has final authority. Negotiate with them.'
 ]
 },
 {
 title: 'Control the Pace',
 quote: { text: 'The person with the most patience almost always wins.', attr: 'Negotiation principle' },
 bullets: [
  'If they rush you, slow down. "Let me think about that."',
  'If they stall, set deadlines and escalate when timelines are violated.',
  'Never agree under pressure — a good deal today is still good tomorrow.',
  'You do not have to answer right now. That is always acceptable.'
 ]
 },
 {
 title: 'Document Everything',
 quote: { text: 'Hard bargainers rely on deniability. Written records eliminate that.', attr: 'Labor tradition' },
 bullets: [
  'Write down what was said, when, and by whom — immediately.',
  'Never negotiate alone. Always have a witness.',
  'Follow up verbal agreements with a written summary.',
  'If it\u2019s not documented, it didn\u2019t happen.'
 ]
 },
 {
 title: 'The Power of "We"',
 quote: { text: 'Coming together is a beginning, staying together is progress, and working together is success.', attr: 'Henry Ford' },
 bullets: [
  'Frame proposals in terms of mutual benefit: "How can we solve this?"',
  'Collaborative language reduces defensiveness.',
  'Even in adversarial settings, "we" language can shift dynamics.',
  'The goal is a solution, not a surrender.'
 ]
 },
 {
 title: 'Five Negotiation Styles',
 quote: { text: 'Effective negotiators don\u2019t have one style \u2014 they adapt to the situation.', attr: 'Negotiation wisdom' },
 bullets: [
  'Competing: Win-lose. Use when rights are clearly violated or urgency is high.',
  'Collaborating: Win-win. Use when the relationship matters and issues are complex.',
  'Compromising: Split the difference. Use when time is limited.',
  'Avoiding: Withdraw or delay. Use when emotions need to cool.',
  'Accommodating: Yield to preserve the relationship when building goodwill matters.'
 ]
 },
 {
 title: 'Use Objective Criteria',
 quote: { text: 'The more you bring standards of fairness to bear on your problem, the more likely you produce a wise and fair result.', attr: 'Getting to Yes' },
 bullets: [
  'Reference contract language, past practice, labor law, and industry standards.',
  'Objective criteria depersonalize the negotiation.',
  'They make your position harder to dismiss \u2014 facts beat opinions.',
  'Ask: "What standard should we use to decide this fairly?"'
 ]
 },
 {
 title: 'Know When to Walk Away',
 quote: { text: 'A bad deal is worse than no deal. Always know your BATNA.', attr: 'Negotiation principle' },
 bullets: [
  'Walking away is not failure \u2014 it is a strategic choice.',
  'A bad deal today sets a worse precedent for tomorrow.',
  'Always refer back to your BATNA before accepting.',
  'If it doesn\u2019t work today, it can work tomorrow.'
 ]
 },
 {
 title: 'Hard Bargainer: Lowball / Highball',
 quote: { text: 'He who speaks first sets the stage. He who speaks wisely sets the terms.', attr: 'Negotiation wisdom' },
 bullets: [
  'They open with an absurdly extreme position to shift the anchor.',
  'Even if you reject it, your counter-offer gets pulled toward their extreme.',
  'Don\u2019t counter immediately. Reframe: "That\u2019s not in any range we can discuss."',
  'Re-anchor with objective criteria: contract language, past practice, law.'
 ]
 },
 {
 title: 'Hard Bargainer: Stalling & Delay',
 quote: { text: 'The person with the most patience in a negotiation almost always wins.', attr: 'Negotiation principle' },
 bullets: [
  'They drag out the process, miss deadlines, cancel meetings.',
  'Delay favors whoever benefits from the status quo \u2014 usually management.',
  'Set deadlines. Document delays. Escalate when timelines are violated.',
  'Time pressure works both ways \u2014 apply it.'
 ]
 },
 {
 title: 'Hard Bargainer: Personal Attacks',
 quote: { text: 'Never let someone else\u2019s emotions dictate your decisions.', attr: 'Negotiation wisdom' },
 bullets: [
  'They attack your credibility, experience, or motives instead of the issue.',
  'It puts you on the defensive, shifting focus from the problem to you.',
  'Redirect: "Let\u2019s keep this focused on the issue and the contract language."',
  'Never take the bait \u2014 redirect every time.'
 ]
 },
 {
 title: 'Listen More Than You Talk',
 quote: { text: 'The cheap concession is to listen. The expensive one is to talk.', attr: 'Chris Voss' },
 bullets: [
  'Active listening reveals the other side\u2019s priorities, fears, and constraints.',
  'Ask open-ended questions: "Help me understand your concern here."',
  'Paraphrase back what you hear \u2014 it builds trust and ensures clarity.',
  'The best negotiators are the best listeners.'
 ]
 },
 {
 title: 'Strip the Emotion',
 quote: { text: 'During a negotiation, it would be wise not to take anything personally.', attr: 'Brian Koslow' },
 bullets: [
  'Emotion clouds judgment and leads to reactive concessions.',
  'If you feel emotional, take a break. Emotions are their weapon.',
  'Separate how you feel from what the facts say.',
  'Respond, don\u2019t react. They want you to react \u2014 refuse.'
 ]
 }
];

var _keEngineLoaded = false;

function _loadNegotiationSetsFromEngine() {
 if (_keEngineLoaded) return;
 _keEngineLoaded = true;

 if (typeof google === 'undefined' || !google.script || !google.script.run) return;

 google.script.run
 .withSuccessHandler(function(items) {
  if (!items || !items.length) return;
  var sets = items.map(function(item) {
  return {
   title: item.title || '',
   quote: item.content ? { text: item.content, attr: item.attribution || '' } : null,
   bullets: item.bullets || []
  };
  });
  if (sets.length > 0) {
  NEGOTIATION_SETS = sets;
  }
 })
 .withFailureHandler(function() {  })
 .getKnowledgeContent('Home Widget', null, 'Negotiation Set');
}

if (typeof document !== 'undefined') {
 if (document.readyState === 'loading') {
 document.addEventListener('DOMContentLoaded', _loadNegotiationSetsFromEngine);
 } else {
 _loadNegotiationSetsFromEngine();
 }
}

var _sidebarKnowledgeTimer = null;

function renderSidebarKnowledge(sidebarEl) {
 if (!sidebarEl) return;
 // Don't double-render
 if (sidebarEl.querySelector('.sidebar-knowledge')) return;

 var wrap = document.createElement('div');
 wrap.className = 'sidebar-knowledge';
 wrap.setAttribute('aria-label', 'Negotiation tip');

 var titleEl = document.createElement('div');
 titleEl.className = 'sk-title';
 wrap.appendChild(titleEl);

 var quoteEl = document.createElement('div');
 quoteEl.className = 'sk-quote';
 wrap.appendChild(quoteEl);

 sidebarEl.appendChild(wrap);

 
 var pool = _shuffleArray(NEGOTIATION_SETS.slice());
 var idx = 0;

 function showNext() {
 var set = pool[idx % pool.length];
 
 wrap.classList.remove('sk-visible');
 setTimeout(function() {
  titleEl.textContent = set.title;
  quoteEl.innerHTML = set.quote
  ? '\u201C' + escapeHtml(set.quote.text) + '\u201D'
  : '';
  
  wrap.classList.add('sk-visible');
  idx++;
 }, 600);
 }

 showNext();
 if (_sidebarKnowledgeTimer) clearInterval(_sidebarKnowledgeTimer);
 _sidebarKnowledgeTimer = setInterval(showNext, 12000);
}

function stopSidebarKnowledge() {
 if (_sidebarKnowledgeTimer) { clearInterval(_sidebarKnowledgeTimer); _sidebarKnowledgeTimer = null; }
}

var _inlineKnowledgeTimer = null;
var _inlineKnowledgeCleanups = [];

function renderNegotiationWidget(container) {
 if (!container) return;

 var wrap = document.createElement('div');
 wrap.className = 'neg-knowledge-widget card-fade-in';

 var header = document.createElement('div');
 header.className = 'nkw-header';
 header.innerHTML = '<span class="nkw-icon">\uD83E\uDD1D</span> <span class="nkw-label">Negotiation Knowledge</span>';
 wrap.appendChild(header);

 var stage = document.createElement('div');
 stage.className = 'nkw-stage';
 wrap.appendChild(stage);

 container.appendChild(wrap);

 
 var pool = _shuffleArray(NEGOTIATION_SETS.slice());
 var setIdx = 0;

 function presentSet() {
 var set = pool[setIdx % pool.length];
 var isWide = window.innerWidth >= 640;

 
 stage.innerHTML = '';
 stage.classList.remove('nkw-visible');

 
 var titleEl = document.createElement('div');
 titleEl.className = 'nkw-title';
 titleEl.textContent = set.title;
 stage.appendChild(titleEl);

 
 if (set.quote) {
  var quoteEl = document.createElement('div');
  quoteEl.className = 'nkw-quote';
  quoteEl.innerHTML = '\u201C' + escapeHtml(set.quote.text) + '\u201D';
  stage.appendChild(quoteEl);
  if (set.quote.attr) {
  var attrEl = document.createElement('div');
  attrEl.className = 'nkw-attr';
  attrEl.textContent = '\u2014 ' + set.quote.attr;
  stage.appendChild(attrEl);
  }
 }

 
 var bulletEls = [];
 if (isWide && set.bullets && set.bullets.length > 0) {
  var ul = document.createElement('ul');
  ul.className = 'nkw-bullets';
  set.bullets.forEach(function(b) {
  var li = document.createElement('li');
  li.className = 'nkw-bullet';
  li.textContent = b;
  ul.appendChild(li);
  bulletEls.push(li);
  });
  stage.appendChild(ul);
 }

 
 setTimeout(function() {
  stage.classList.add('nkw-visible');
 }, 100);

 
 var bulletDelay = 1200; 
 var bulletInterval = 900; 
 var cleanupTimers = [];

 bulletEls.forEach(function(bEl, i) {
  var timer = setTimeout(function() {
  bEl.classList.add('nkw-bullet-visible');
  }, bulletDelay + (i * bulletInterval));
  cleanupTimers.push(timer);
 });

 
 var totalBulletTime = bulletDelay + (bulletEls.length * bulletInterval);
 var holdTime = isWide ? 5000 : 6000; 

 var fadeTimer = setTimeout(function() {
  stage.classList.remove('nkw-visible');
  
  var nextTimer = setTimeout(function() {
  setIdx++;
  presentSet();
  }, 800);
  cleanupTimers.push(nextTimer);
 }, totalBulletTime + holdTime);
 cleanupTimers.push(fadeTimer);

 
 _inlineKnowledgeCleanups = cleanupTimers;
 }

 presentSet();

 
 return function() {
 _inlineKnowledgeCleanups.forEach(function(t) { clearTimeout(t); });
 _inlineKnowledgeCleanups = [];
 };
}

function renderKnowledgeStrip(container) {
 if (!container) return;

 var strip = document.createElement('div');
 strip.className = 'neg-knowledge-strip';

 var textEl = document.createElement('div');
 textEl.className = 'nks-text';
 strip.appendChild(textEl);

 container.appendChild(strip);

 var pool = _shuffleArray(NEGOTIATION_SETS.slice());
 var setIdx = 0;
 var bulletIdx = 0;

 function showNext() {
 var set = pool[setIdx % pool.length];
 var bullet = set.bullets ? set.bullets[bulletIdx % (set.bullets.length || 1)] : '';
 strip.classList.remove('nks-visible');

 setTimeout(function() {
  textEl.innerHTML = '<strong>' + escapeHtml(set.title) + '</strong> \u2014 ' + escapeHtml(bullet);
  strip.classList.add('nks-visible');

  bulletIdx++;
  if (!set.bullets || bulletIdx >= set.bullets.length) {
  bulletIdx = 0;
  setIdx++;
  }
 }, 500);
 }

 showNext();
 return setInterval(showNext, 8000);
}
</script>
