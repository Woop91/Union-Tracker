// STEWARD NOTIFICATIONS
// ═══════════════════════════════════════

function renderStewardNotifications(appContainer) {
  renderPageLayout(appContainer, 'steward', 'notifications', function(container) {
    _stewardHeader(container, 'Notifications', 'View, compose, and manage');
    var content = el('div', { className: 'content' });

    // v4.29.0: Mark notifications as read on tab open — zero notification count, keep Q&A count on badge
    AppState.notificationCount = 0;
    var _bellTotalAfterRead = AppState.qaUnansweredCount || 0;
    var badge = document.querySelector('.notif-bell-badge');
    if (_bellTotalAfterRead > 0) {
      if (badge) badge.textContent = String(_bellTotalAfterRead);
    } else {
      if (badge) badge.remove();
    }

    var activeSubTab = 'inbox';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['inbox', 'compose', 'manage'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'inbox') _renderNotifInbox(subContent);
      else if (activeSubTab === 'compose') _renderNotifCompose(subContent);
      else _renderNotifManage(subContent);
    }

    // --- Inbox: same as member notification list ---
    function _renderNotifInbox(target) {
      showLoading(target, 'list');
      serverCall().withSuccessHandler(function(notifications) {
        target.innerHTML = '';
        if (!notifications || notifications.length === 0) {
          var empty = el('div', { style: { textAlign: 'center', padding: '48px 16px' } });
          empty.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\uD83D\uDD14'));
          empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700' } }, 'All caught up!'));
          empty.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginTop: '6px' } }, 'No new notifications'));
          target.appendChild(empty);
          return;
        }
        var typeColors = { System: 'system', Announcement: 'announcement', 'Steward Message': 'steward', Deadline: 'deadline' };
        notifications.forEach(function(n, idx) {
          var card = el('div', {
            className: 'card card-glass notif-card card-fade-in' + (n.priority === 'Urgent' ? ' notif-urgent-border' : ''),
            style: { animationDelay: (idx * 60) + 'ms' }
          });
          var top = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' } });
          var typeClass = typeColors[n.type] || 'system';
          top.appendChild(el('span', { className: 'notif-type-badge notif-type-' + typeClass }, n.type));
          if (n.priority === 'Urgent') top.appendChild(el('span', { className: 'notif-type-badge notif-type-deadline' }, 'Urgent'));
          // v4.29.0: Show Auto-expires badge on Timed notifications (stewards can still dismiss)
          if (n.dismissMode === 'Timed') {
            top.appendChild(el('span', { className: 'notif-type-badge', style: { background: 'var(--border)', color: 'var(--muted)', fontSize: '10px' } }, 'Auto-expires'));
          }
          card.appendChild(top);
          card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '700', color: 'var(--text)', paddingRight: '28px' } }, n.title));
          card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginTop: '6px', lineHeight: '1.5' } }, n.message));
          var meta = el('div', { className: 'notif-meta' });
          if (n.sentBy) meta.appendChild(el('span', null, 'From: ' + n.sentBy + '  '));
          if (n.createdDate) meta.appendChild(el('span', null, n.createdDate));
          if (n.expiresDate) meta.appendChild(el('span', null, '  \u00B7 Expires: ' + n.expiresDate));
          card.appendChild(meta);
          var dismissBtn = el('button', { className: 'notif-dismiss', onClick: function() {
            dismissBtn.textContent = '...';
            serverCall().withSuccessHandler(function(r) {
              if (r && r.success) {
                card.style.opacity = '0';
                card.style.transition = 'opacity 0.3s';
                setTimeout(function() { card.remove(); }, 300);
                AppState.notificationCount = Math.max(0, AppState.notificationCount - 1);
                // Bell total = notifications + unanswered Q&A
                var _bellTotal = AppState.notificationCount + (AppState.qaUnansweredCount || 0);
                var badge = document.querySelector('.notif-bell-badge');
                if (_bellTotal > 0) {
                  if (badge) badge.textContent = String(_bellTotal);
                  else {
                    var bellWrap = document.querySelector('.notif-bell-wrap');
                    if (bellWrap) {
                      var nb = document.createElement('span');
                      nb.className = 'notif-bell-badge';
                      nb.textContent = String(_bellTotal);
                      bellWrap.appendChild(nb);
                    }
                  }
                } else {
                  if (badge) badge.remove();
                }
              }
            }).dismissWebAppNotification(SESSION_TOKEN, n.id);
          }}, '\u2715');
          card.appendChild(dismissBtn);
          target.appendChild(card);
        });
      }).withFailureHandler(function() {
        target.innerHTML = '';
        target.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--danger)' } }, 'Failed to load notifications.'));
      }).getWebAppNotifications(SESSION_TOKEN, 'steward');
    }

    // --- Compose: send new notification ---
    function _renderNotifCompose(target) {
      // Recipient mode
      var selectedRecipient = '';
      var recipientMode = 'group'; // 'group' or 'individual'

      var modeBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px' } });
      var groupBtn = el('button', { className: 'filter-tab active', onClick: function() {
        recipientMode = 'group'; groupBtn.className = 'filter-tab active'; indivBtn.className = 'filter-tab';
        recipientArea.innerHTML = ''; buildGroupPicker();
      }}, 'Groups');
      var indivBtn = el('button', { className: 'filter-tab', onClick: function() {
        recipientMode = 'individual'; indivBtn.className = 'filter-tab active'; groupBtn.className = 'filter-tab';
        recipientArea.innerHTML = ''; buildIndividualPicker();
      }}, 'Individual');
      modeBar.appendChild(groupBtn);
      modeBar.appendChild(indivBtn);

      var recipientArea = el('div');
      var selectedDisplay = el('div', { style: { fontSize: '12px', color: 'var(--accent)', fontWeight: '600', minHeight: '20px', marginBottom: '8px' } });

      function buildGroupPicker() {
        var groups = ['All Members', 'All Stewards', 'Everyone'];
        groups.forEach(function(g) {
          recipientArea.appendChild(el('button', {
            className: 'filter-tab' + (selectedRecipient === g ? ' active' : ''),
            style: { marginRight: '6px', marginBottom: '6px' },
            onClick: function() {
              selectedRecipient = g;
              selectedDisplay.textContent = 'To: ' + g;
              buildGroupPicker();
            }
          }, g));
        });
      }

      function buildIndividualPicker() {
        var searchInput = el('input', { className: 'form-input', placeholder: 'Search members...', style: { marginBottom: '8px' } });
        var listWrap = el('div', { style: { maxHeight: '180px', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: '8px' } });
        recipientArea.appendChild(searchInput);
        recipientArea.appendChild(listWrap);

        serverCall().withSuccessHandler(function(members) {
          var allMembers = members || [];
          function renderList(filter) {
            listWrap.innerHTML = '';
            var filtered = filter ? allMembers.filter(function(m) {
              return (m.name || '').toLowerCase().indexOf(filter) !== -1 || (m.email || '').toLowerCase().indexOf(filter) !== -1;
            }) : allMembers;
            filtered.slice(0, 50).forEach(function(m) {
              var row = el('div', {
                style: { padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border)', background: selectedRecipient === m.email ? 'var(--accentBg)' : 'transparent' },
                onClick: function() {
                  selectedRecipient = m.email;
                  selectedDisplay.textContent = 'To: ' + m.name + ' (' + m.email + ')';
                  renderList(searchInput.value.trim().toLowerCase());
                }
              }, m.name + ' — ' + m.email);
              listWrap.appendChild(row);
            });
          }
          renderList('');
          searchInput.addEventListener('input', function() { renderList(searchInput.value.trim().toLowerCase()); });
        }).getNotificationRecipientListFull(SESSION_TOKEN);
      }

      buildGroupPicker();

      // Type
      var typeGroup = el('div', { className: 'form-group' });
      typeGroup.appendChild(el('label', { className: 'form-label' }, 'Type'));
      var typeSelect = el('select', { className: 'form-input' });
      ['Steward Message', 'Announcement', 'Deadline', 'System'].forEach(function(t) {
        typeSelect.appendChild(el('option', { value: t }, t));
      });
      typeGroup.appendChild(typeSelect);

      // Priority
      var selectedPriority = 'Normal';
      var prioBar = el('div', { style: { display: 'flex', gap: '8px', margin: '8px 0' } });
      var normalBtn = el('button', { className: 'filter-tab active', onClick: function() {
        selectedPriority = 'Normal'; normalBtn.className = 'filter-tab active'; urgentBtn.className = 'filter-tab';
      }}, 'Normal');
      var urgentBtn = el('button', { className: 'filter-tab', onClick: function() {
        selectedPriority = 'Urgent'; urgentBtn.className = 'filter-tab active'; normalBtn.className = 'filter-tab';
      }}, 'Urgent');
      prioBar.appendChild(normalBtn);
      prioBar.appendChild(urgentBtn);

      // Title + Message
      var titleInput = el('input', { className: 'form-input', placeholder: 'Notification title' });
      var msgTextarea = el('textarea', { className: 'msg-textarea', placeholder: 'Write your message...' });

      // Expires
      var expiresGroup = el('div', { className: 'form-group' });
      expiresGroup.appendChild(el('label', { className: 'form-label' }, 'Expires (optional)'));
      var expiresInput = el('input', { className: 'form-input', type: 'date' });
      expiresGroup.appendChild(expiresInput);

      // Dismiss Mode (v4.22.0)
      var selectedDismissMode = 'Dismissible';
      var dismissModeGroup = el('div', { className: 'form-group' });
      dismissModeGroup.appendChild(el('label', { className: 'form-label' }, 'Dismiss Mode'));
      var dismissHint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } },
        'Dismissible: member can close it permanently. Timed: auto-expires on set date, no dismiss button shown.');
      dismissModeGroup.appendChild(dismissHint);
      var dmBar = el('div', { style: { display: 'flex', gap: '8px' } });
      var dismissibleBtn = el('button', { className: 'filter-tab active', onClick: function() {
        selectedDismissMode = 'Dismissible';
        dismissibleBtn.className = 'filter-tab active';
        timedBtn.className = 'filter-tab';
        expiresGroup.style.opacity = '1';
      }}, '\u2715 Dismissible');
      var timedBtn = el('button', { className: 'filter-tab', onClick: function() {
        selectedDismissMode = 'Timed';
        timedBtn.className = 'filter-tab active';
        dismissibleBtn.className = 'filter-tab';
        expiresGroup.style.opacity = '1'; // still needs a date
        expiresInput.focus();
      }}, '\u23F0 Timed');
      dmBar.appendChild(dismissibleBtn);
      dmBar.appendChild(timedBtn);
      dismissModeGroup.appendChild(dmBar);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '10px' } });

      var sendBtn = el('button', { className: 'btn btn-primary', onClick: function() {
        if (!selectedRecipient) { statusMsg.textContent = 'Please select a recipient.'; statusMsg.style.color = 'var(--danger)'; return; }
        if (!titleInput.value.trim()) { statusMsg.textContent = 'Please enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
        if (!msgTextarea.value.trim()) { statusMsg.textContent = 'Please enter a message.'; statusMsg.style.color = 'var(--danger)'; return; }

        sendBtn.textContent = 'Sending...';
        sendBtn.disabled = true;
        statusMsg.textContent = '';

        // Timed mode requires an expires date
        if (selectedDismissMode === 'Timed' && !expiresInput.value.trim()) {
          statusMsg.textContent = 'Timed mode requires an expiry date.';
          statusMsg.style.color = 'var(--danger)';
          sendBtn.textContent = 'Send Notification';
          sendBtn.disabled = false;
          return;
        }

        serverCall().withSuccessHandler(function(r) {
          sendBtn.textContent = 'Send Notification';
          sendBtn.disabled = false;
          if (r && r.success) {
            statusMsg.textContent = 'Notification sent! (' + r.notificationId + ')';
            statusMsg.style.color = 'var(--success)';
            titleInput.value = '';
            msgTextarea.value = '';
          } else {
            statusMsg.textContent = (r && r.message) || 'Error sending.';
            statusMsg.style.color = 'var(--danger)';
          }
        }).withFailureHandler(function() {
          sendBtn.textContent = 'Send Notification';
          sendBtn.disabled = false;
          statusMsg.textContent = 'Error sending. Try again.';
          statusMsg.style.color = 'var(--danger)';
        }).sendWebAppNotification(SESSION_TOKEN, {
          recipient: selectedRecipient,
          type: typeSelect.value,
          title: titleInput.value.trim(),
          message: msgTextarea.value.trim(),
          priority: selectedPriority,
          expiresDate: expiresInput.value || '',
          senderName: CURRENT_USER.name || '',
          dismissMode: selectedDismissMode
        });
      }}, 'Send Notification');

      // Assemble form
      target.appendChild(el('label', { className: 'form-label' }, 'Recipient'));
      target.appendChild(modeBar);
      target.appendChild(recipientArea);
      target.appendChild(selectedDisplay);
      target.appendChild(typeGroup);
      target.appendChild(el('label', { className: 'form-label' }, 'Priority'));
      target.appendChild(prioBar);
      target.appendChild(el('div', { className: 'form-group' }, [
        el('label', { className: 'form-label' }, 'Title'),
        titleInput
      ]));
      target.appendChild(el('div', { className: 'form-group' }, [
        el('label', { className: 'form-label' }, 'Message'),
        msgTextarea
      ]));
      target.appendChild(expiresGroup);
      target.appendChild(dismissModeGroup);
      target.appendChild(statusMsg);
      target.appendChild(sendBtn);
    }

    // --- Manage: view ALL notifications (full ledger for stewards) ---
    function _renderNotifManage(target) {
      showLoading(target, 'list');
      serverCall().withSuccessHandler(function(notifications) {
        target.innerHTML = '';
        if (!notifications || notifications.length === 0) {
          target.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'No notifications found.'));
          return;
        }
        var typeColors = { System: 'system', Announcement: 'announcement', 'Steward Message': 'steward', Deadline: 'deadline' };
        notifications.forEach(function(n) {
          var row = el('div', { className: 'res-manage-row', style: { flexWrap: 'wrap', gap: '6px', alignItems: 'center' } });
          var typeClass = typeColors[n.type] || 'system';
          row.appendChild(el('span', { className: 'notif-type-badge notif-type-' + typeClass, style: { fontSize: '10px' } }, n.type));
          // Status pill
          var statusColor = n.status === 'Active' ? 'var(--success)' : 'var(--muted)';
          row.appendChild(el('span', { className: 'notif-type-badge', style: { background: 'transparent', border: '1px solid ' + statusColor, color: statusColor, fontSize: '10px' } }, n.status));
          // Dismiss mode pill
          row.appendChild(el('span', { className: 'notif-type-badge', style: { background: 'transparent', border: '1px solid var(--border)', color: 'var(--muted)', fontSize: '10px' } }, n.dismissMode || 'Dismissible'));
          row.appendChild(el('span', { className: 'res-manage-title' }, n.title));
          row.appendChild(el('span', { className: 'res-manage-meta' }, 'To: ' + n.recipient));
          row.appendChild(el('span', { className: 'res-manage-meta' }, n.createdDate));
          if (n.dismissedCount > 0) {
            row.appendChild(el('span', { className: 'res-manage-meta', style: { color: 'var(--accent)' } }, n.dismissedCount + ' dismissed'));
          }
          if (n.expiresDate) row.appendChild(el('span', { className: 'res-manage-meta' }, 'Exp: ' + n.expiresDate));

          // Archive button — only shown for Active notifications
          if (n.status === 'Active') {
            var archiveBtn = el('button', {
              className: 'filter-tab',
              style: { marginLeft: 'auto', fontSize: '11px', padding: '3px 10px', color: 'var(--muted)' },
              onClick: function() {
                archiveBtn.textContent = '...';
                archiveBtn.disabled = true;
                serverCall().withSuccessHandler(function(r) {
                  if (r && r.success) {
                    // v4.29.0 fix: capture pill once to avoid null-chain silent no-op
                    var statusPill = row.querySelector('.notif-type-badge[style*="--success"]');
                    if (statusPill) {
                      statusPill.textContent = 'Archived';
                      statusPill.style.borderColor = 'var(--muted)';
                      statusPill.style.color = 'var(--muted)';
                    }
                    archiveBtn.remove();
                  } else {
                    archiveBtn.textContent = 'Archive';
                    archiveBtn.disabled = false;
                  }
                }).withFailureHandler(function() {
                  archiveBtn.textContent = 'Archive';
                  archiveBtn.disabled = false;
                }).archiveWebAppNotification(SESSION_TOKEN, n.id);
              }
            }, 'Archive');
            row.appendChild(archiveBtn);
          }

          target.appendChild(row);
        });
      }).withFailureHandler(function() {
        target.innerHTML = '';
        target.appendChild(el('div', { style: { padding: '24px', color: 'var(--danger)' } }, 'Failed to load.'));
      }).getAllWebAppNotifications(SESSION_TOKEN);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// STEWARD RESOURCES
// ═══════════════════════════════════════

function renderStewardResources(appContainer) {
  renderPageLayout(appContainer, 'steward', 'resources', function(container) {
    _stewardHeader(container, 'Resources', 'Browse and manage content');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'browse';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['browse', 'manage'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'browse') _renderResourceBrowse(subContent);
      else _renderResourceManage(subContent);
    }

    // --- Browse: same as member hub but steward audience ---
    function _renderResourceBrowse(target) {
      // Quick links
      var quickLinks = [
        { icon: '\uD83D\uDCC5', label: 'Calendar', sub: 'Upcoming meetings & events', url: CONFIG.calendarUrl },
        { icon: '\uD83D\uDCC2', label: 'Shared Drive', sub: 'Contracts, documents & templates', url: CONFIG.driveFolderUrl },
      ];
      if (CONFIG.orgWebsite) quickLinks.push({ icon: '\uD83C\uDF10', label: 'SEIU 509 Website', sub: CONFIG.orgWebsite, url: CONFIG.orgWebsite });

      quickLinks.forEach(function(r) {
        if (!r.url) return;
        var item = el('div', {
          className: 'card card-clickable',
          style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '13px 16px' },
          onClick: function() {
            window.open(r.url, '_blank');
            serverCall().dataLogResourceClick(SESSION_TOKEN, 'quick:' + r.label.toLowerCase().replace(/\s+/g, '-'), r.label);
          }
        });
        item.appendChild(el('span', { style: { fontSize: '18px' } }, r.icon));
        var tg = el('div', { style: { flex: '1' } });
        tg.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, r.label));
        tg.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, r.sub));
        item.appendChild(tg);
        item.appendChild(el('span', { style: { color: 'var(--muted)', fontSize: '14px' } }, '\u203A'));
        target.appendChild(item);
      });

      // Know Your Rights section
      var hubSection = el('div', { style: { marginTop: '20px' } });
      hubSection.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)', marginBottom: '12px' } }, 'Know Your Rights'));
      var searchInput = el('input', { className: 'search-input form-input', placeholder: 'Search resources...', style: { marginBottom: '8px' } });
      hubSection.appendChild(searchInput);
      var pillsWrap = el('div', { className: 'res-pills' });
      hubSection.appendChild(pillsWrap);
      var cardsWrap = el('div');
      hubSection.appendChild(cardsWrap);
      target.appendChild(hubSection);

      var allResources = [];
      var activeCategory = 'All';
      showLoading(cardsWrap);

      serverCall().withSuccessHandler(function(resources) {
        allResources = resources || [];
        var categories = ['All'];
        allResources.forEach(function(r) { if (r.category && categories.indexOf(r.category) === -1) categories.push(r.category); });
        renderPills(categories);
        renderCards();
      }).withFailureHandler(function() {
        cardsWrap.innerHTML = '';
        cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'Unable to load resources.'));
      }).getWebAppResourcesList('Stewards');

      function renderPills(categories) {
        pillsWrap.innerHTML = '';
        categories.forEach(function(cat) {
          pillsWrap.appendChild(el('button', {
            className: 'res-pill' + (activeCategory === cat ? ' active' : ''),
            onClick: function() { activeCategory = cat; renderPills(categories); renderCards(); }
          }, cat));
        });
      }

      function renderCards() {
        cardsWrap.innerHTML = '';
        var searchTerm = (searchInput.value || '').toLowerCase().trim();
        var filtered = allResources.filter(function(r) {
          if (activeCategory !== 'All' && r.category !== activeCategory) return false;
          if (searchTerm) {
            return (r.title || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                   (r.summary || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                   (r.content || '').toLowerCase().indexOf(searchTerm) !== -1;
          }
          return true;
        });
        if (filtered.length === 0) {
          cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '32px 16px', color: 'var(--muted)' } }, 'No resources match your search.'));
          return;
        }
        filtered.forEach(function(r, idx) {
          var card = el('div', { className: 'card card-glass res-card card-clickable card-fade-in', style: { animationDelay: (idx * 50) + 'ms' } });
          card.appendChild(el('div', { className: 'res-card-icon' }, r.icon || '\uD83D\uDCC4'));
          card.appendChild(el('span', { className: 'notif-type-badge notif-type-announcement', style: { fontSize: '10px', marginBottom: '6px' } }, r.category));
          card.appendChild(el('div', { className: 'res-card-title' }, r.title));
          card.appendChild(el('div', { className: 'res-card-summary' }, r.summary));
          var hint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Tap to read more \u25BE');
          card.appendChild(hint);
          var expandContent = el('div', { className: 'res-card-content' });
          if (r.content) expandContent.appendChild(el('div', null, r.content));
          // H-53: Validate URL protocol to prevent javascript: XSS
          if (r.url && /^https?:\/\//i.test(r.url)) {
            var resLink = el('a', { className: 'res-card-link', href: r.url, target: '_blank' }, '\uD83D\uDD17 Open Resource');
            resLink.addEventListener('click', function(ev) {
              ev.stopPropagation();
              serverCall().dataLogResourceClick(SESSION_TOKEN, r.id || r.title, r.title || '');
            });
            expandContent.appendChild(resLink);
          }
          if (r.dateAdded) expandContent.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Added: ' + r.dateAdded));
          card.appendChild(expandContent);
          card.addEventListener('click', function() {
            card.classList.toggle('expanded');
            hint.textContent = card.classList.contains('expanded') ? 'Tap to collapse \u25B4' : 'Tap to read more \u25BE';
          });
          cardsWrap.appendChild(card);
        });
      }
      searchInput.addEventListener('input', function() { renderCards(); });
    }

    // --- Manage: CRUD for all resources ---
    function _renderResourceManage(target) {
      var listWrap = el('div');
      var formWrap = el('div');
      target.appendChild(listWrap);
      target.appendChild(formWrap);

      // Drive upload banner — show Resources/ folder link if configured
      var driveBanner = el('div', { className: 'card', style: { background: 'rgba(59,130,246,0.12)', border: '1px solid rgba(59,130,246,0.3)', padding: '10px 14px', marginBottom: '12px', display: 'none' } });
      var bannerIcon = el('span', { style: { fontSize: '18px', marginRight: '8px' } }, '\uD83D\uDCC2');
      var bannerText = el('span', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.4' } }, 'Loading Drive folder...');
      var bannerLink = el('a', { style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginTop: '4px' }, target: '_blank' }, '\u2197 Open Resources/ Drive Folder');
      driveBanner.appendChild(bannerIcon);
      driveBanner.appendChild(bannerText);
      driveBanner.appendChild(bannerLink);
      listWrap.appendChild(driveBanner);

      // Load resource links to get resourcesFolderUrl
      serverCall().withSuccessHandler(function(links) {
        if (links && links.resourcesFolderUrl) {
          bannerText.textContent = 'Upload files to Drive, then add their URLs below as resources.';
          bannerLink.href = links.resourcesFolderUrl;
          driveBanner.style.display = 'block';
        }
      }).withFailureHandler(function() {}).getWebAppResourceLinks();

      var addBtn = el('button', { className: 'btn btn-primary', style: { marginBottom: '12px' }, onClick: function() {
        showResourceForm(null);
      }}, '+ Add Resource');
      listWrap.appendChild(addBtn);

      var tableWrap = el('div');
      listWrap.appendChild(tableWrap);
      loadResourceList();

      function loadResourceList() {
        showLoading(tableWrap, 'list');
        serverCall().withSuccessHandler(function(resources) {
          tableWrap.innerHTML = '';
          formWrap.innerHTML = '';
          if (!resources || resources.length === 0) {
            tableWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'No resources yet. Add one above!'));
            return;
          }
          // Sort by sortOrder so manage list matches what members see (v4.22.x)
          resources.sort(function(a, b) { return (a.sortOrder || 999) - (b.sortOrder || 999); });
          resources.forEach(function(r) {
            var row = el('div', { className: 'res-manage-row' + (r.visible ? '' : ' hidden-res') });
            row.appendChild(el('span', { style: { fontSize: '20px', flexShrink: '0' } }, r.icon || '\uD83D\uDCC4'));
            var info = el('div', { style: { flex: '1', minWidth: '0' } });
            info.appendChild(el('div', { className: 'res-manage-title' }, r.title));
            info.appendChild(el('div', { className: 'res-manage-meta' }, r.category + ' \u00B7 ' + r.audience + ' \u00B7 ' + (r.visible ? 'Visible' : 'Hidden')));
            row.appendChild(info);
            row.appendChild(el('span', { className: 'res-status-dot ' + (r.visible ? 'visible' : 'hidden') }));
            row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px' }, onClick: function() { showResourceForm(r); }}, '\u270E'));
            if (r.visible) {
              row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px', color: 'var(--danger)' }, onClick: function() {
                if (confirm('Hide "' + r.title + '"? It can be restored later.')) {
                  serverCall().withSuccessHandler(function() { loadResourceList(); }).deleteWebAppResource(SESSION_TOKEN, r.id);
                }
              }}, '\uD83D\uDDD1'));
            } else {
              row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px', color: 'var(--success)' }, onClick: function() {
                serverCall().withSuccessHandler(function() { loadResourceList(); }).restoreWebAppResource(SESSION_TOKEN, r.id);
              }}, '\u21A9'));
            }
            tableWrap.appendChild(row);
          });
        }).withFailureHandler(function() {
          tableWrap.innerHTML = '';
          tableWrap.appendChild(el('div', { style: { padding: '24px', color: 'var(--danger)' } }, 'Failed to load resources.'));
        }).getWebAppResourcesListAll();
      }

      function showResourceForm(existing) {
        formWrap.innerHTML = '';
        listWrap.style.display = 'none';

        var isEdit = !!existing;
        formWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', marginBottom: '14px' } }, isEdit ? 'Edit Resource' : 'Add Resource'));

        var fields = {};
        function addField(label, key, type, opts) {
          var group = el('div', { className: 'form-group' });
          group.appendChild(el('label', { className: 'form-label' }, label));
          var input;
          if (type === 'textarea') {
            input = el('textarea', { className: 'msg-textarea', style: opts && opts.style || {} });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          } else if (type === 'select') {
            input = el('select', { className: 'form-input' });
            (opts.options || []).forEach(function(o) { input.appendChild(el('option', { value: o }, o)); });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          } else {
            input = el('input', { className: 'form-input', type: type || 'text' });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          }
          fields[key] = input;
          group.appendChild(input);
          formWrap.appendChild(group);
        }

        addField('Title *', 'title', 'text');

        // Category: loaded dynamically from 📚 Resource Config sheet (v4.22.x)
        var catGroup = el('div', { className: 'form-group' });
        catGroup.appendChild(el('label', { className: 'form-label' }, 'Category'));
        var catSelect = el('select', { className: 'form-input' });
        var catPlaceholder = el('option', { value: '' }, 'Loading categories...');
        catSelect.appendChild(catPlaceholder);
        catSelect.disabled = true;
        fields['category'] = catSelect;
        catGroup.appendChild(catSelect);
        formWrap.appendChild(catGroup);

        serverCall().withSuccessHandler(function(cats) {
          catSelect.innerHTML = '';
          (cats && cats.length ? cats : ['General']).forEach(function(c) {
            catSelect.appendChild(el('option', { value: c }, c));
          });
          catSelect.value = (existing && existing.category) || cats[0] || 'General';
          catSelect.disabled = false;
        }).withFailureHandler(function() {
          catSelect.innerHTML = '';
          ['Contract Article','Know Your Rights','Grievance Process','Forms & Templates',
           'FAQ','Guide','Policy','Contact Info','Link','General'].forEach(function(c) {
            catSelect.appendChild(el('option', { value: c }, c));
          });
          catSelect.value = (existing && existing.category) || 'General';
          catSelect.disabled = false;
        }).getWebAppResourceCategories();

        addField('Summary', 'summary', 'textarea');
        addField('Content', 'content', 'textarea', { style: { minHeight: '120px' } });
        addField('URL (optional)', 'url', 'text');
        addField('Icon', 'icon', 'text', { defaultVal: '\uD83D\uDCC4' });
        addField('Sort Order', 'sortOrder', 'number', { defaultVal: '999' });

        // Visible toggle
        var visGroup = el('div', { className: 'form-group' });
        visGroup.appendChild(el('label', { className: 'form-label' }, 'Visible'));
        var visVal = existing ? (existing.visible ? 'Yes' : 'No') : 'Yes';
        var visBar = el('div', { style: { display: 'flex', gap: '8px' } });
        var visYes = el('button', { className: 'filter-tab' + (visVal === 'Yes' ? ' active' : ''), onClick: function() { visVal = 'Yes'; visYes.className = 'filter-tab active'; visNo.className = 'filter-tab'; }}, 'Yes');
        var visNo = el('button', { className: 'filter-tab' + (visVal === 'No' ? ' active' : ''), onClick: function() { visVal = 'No'; visNo.className = 'filter-tab active'; visYes.className = 'filter-tab'; }}, 'No');
        visBar.appendChild(visYes);
        visBar.appendChild(visNo);
        visGroup.appendChild(visBar);
        formWrap.appendChild(visGroup);

        // Audience toggle
        var audGroup = el('div', { className: 'form-group' });
        audGroup.appendChild(el('label', { className: 'form-label' }, 'Audience'));
        var audVal = (existing && existing.audience) || 'All';
        var audBar = el('div', { style: { display: 'flex', gap: '8px' } });
        var audBtns = {};
        ['All', 'Members', 'Stewards'].forEach(function(a) {
          audBtns[a] = el('button', { className: 'filter-tab' + (audVal === a ? ' active' : ''), onClick: function() {
            audVal = a;
            for (var k in audBtns) audBtns[k].className = 'filter-tab' + (k === a ? ' active' : '');
          }}, a);
          audBar.appendChild(audBtns[a]);
        });
        audGroup.appendChild(audBar);
        formWrap.appendChild(audGroup);

        var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '10px' } });
        formWrap.appendChild(statusMsg);

        var btnRow = el('div', { style: { display: 'flex', gap: '8px' } });
        var saveBtn = el('button', { className: 'btn btn-primary', onClick: function() {
          if (!fields.title.value.trim()) { statusMsg.textContent = 'Title is required.'; statusMsg.style.color = 'var(--danger)'; return; }
          saveBtn.textContent = 'Saving...';
          saveBtn.disabled = true;
          var payload = {
            title: fields.title.value.trim(),
            category: fields.category.value,
            summary: fields.summary.value.trim(),
            content: fields.content.value.trim(),
            url: fields.url.value.trim(),
            icon: fields.icon.value.trim() || '\uD83D\uDCC4',
            sortOrder: parseInt(fields.sortOrder.value, 10) || 999,
            visible: visVal,
            audience: audVal
          };
          if (isEdit) {
            serverCall().withSuccessHandler(function(r) {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              if (r && r.success) { listWrap.style.display = ''; formWrap.innerHTML = ''; loadResourceList(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              statusMsg.textContent = 'Error saving.'; statusMsg.style.color = 'var(--danger)';
            }).updateWebAppResource(SESSION_TOKEN, existing.id, payload);
          } else {
            serverCall().withSuccessHandler(function(r) {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              if (r && r.success) { listWrap.style.display = ''; formWrap.innerHTML = ''; loadResourceList(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              statusMsg.textContent = 'Error saving.'; statusMsg.style.color = 'var(--danger)';
            }).addWebAppResource(SESSION_TOKEN, payload);
          }
        }}, 'Save');
        var cancelBtn = el('button', { className: 'btn', style: { background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--text)' }, onClick: function() {
          listWrap.style.display = '';
          formWrap.innerHTML = '';
        }}, 'Cancel');
        btnRow.appendChild(saveBtn);
        btnRow.appendChild(cancelBtn);
        formWrap.appendChild(btnRow);
      }
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// SURVEY TRACKING (steward view)
// ═══════════════════════════════════════

function renderSurveyTracking(appContainer) {
  renderPageLayout(appContainer, 'steward', 'surveytrack', function(container) {
    _stewardHeader(container, 'Survey Tracking');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Period status bar
    var periodBar = el('div', { style: { marginBottom: '14px' } });
    content.appendChild(periodBar);

    // Scope filter tabs
    var scopeWrap = el('div', { style: { marginBottom: '14px' } });
    content.appendChild(scopeWrap);

    // KPI summary area
    var kpiWrap = el('div', { style: { marginBottom: '14px' } });
    content.appendChild(kpiWrap);

    // Stats area
    var statsWrap = el('div', { style: { marginBottom: '14px' } });
    content.appendChild(statsWrap);

    // Tracking list area
    var dataWrap = el('div');
    content.appendChild(dataWrap);

    var activeScope = 'location';

    function loadSurveyData(scope) {
      activeScope = scope;
      showLoading(dataWrap, 'kpi');
      kpiWrap.innerHTML = '';
      statsWrap.innerHTML = '';

      // Load steward-specific survey tracking with richer data
      serverCall().withSuccessHandler(function(trackingData) {
        dataWrap.innerHTML = '';

        var total = trackingData.total || 0;
        var completed = trackingData.completed || 0;
        var pending = total - completed;
        var rate = total > 0 ? Math.round((completed / total) * 100) : 0;
        var members = trackingData.members || [];
        var stewardInfo = trackingData.stewardInfo || {};

        // ── Overall progress bar ───────────────────────────────────────
        if (total > 0) {
          var progCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '10px' } });
          var progHeader = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' } });
          progHeader.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, 'Response Rate'));
          progHeader.appendChild(el('div', { style: { fontSize: '22px', fontWeight: '700', color: rate >= 80 ? 'var(--success)' : rate >= 50 ? 'var(--warning)' : 'var(--danger)' } }, rate + '%'));
          progCard.appendChild(progHeader);

          // Overall progress bar — hero size (.prog-track--lg = 10px)
          var barColor = rate >= 80 ? 'prog-fill--success' : rate >= 50 ? 'prog-fill--warning' : 'prog-fill--danger';
          var barBg = el('div', { className: 'prog-track prog-track--lg', style: { marginBottom: '8px' } });
          barBg.appendChild(el('div', { className: 'prog-fill ' + barColor, style: { width: rate + '%' } }));
          progCard.appendChild(barBg);

          progCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', textAlign: 'center' } }, completed + ' completed of ' + total + ' members'));
          dataWrap.appendChild(progCard);
        }

        // ── Participation statistics ─────────────────────────────────────
        statsWrap.innerHTML = '';
        if (members.length > 0) {
          var newMembers = 0;
          var decliningMembers = 0;
          var consistentMembers = 0;
          var firstTimers = 0;
          var now = new Date();
          members.forEach(function(m) {
            if (m.hireDate) {
              var hd = new Date(m.hireDate);
              if (!isNaN(hd.getTime()) && (now - hd) < 180 * 24 * 60 * 60 * 1000) newMembers++;
            }
            if (m.participationRate !== null) {
              if (m.participationRate < 30 && m.totalMissed > 1) decliningMembers++;
              else if (m.participationRate >= 70) consistentMembers++;
            }
            if (m.totalCompleted === 0 && m.totalMissed === 0) firstTimers++;
          });

          var sGrid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(100px, 1fr))', gap: '8px' } });
          // New member completion: of newMembers, how many completed this survey
          var newMemberCompleted = 0;
          members.forEach(function(m) {
            if (m.hireDate) {
              var hd = new Date(m.hireDate);
              if (!isNaN(hd.getTime()) && (now - hd) < 180 * 24 * 60 * 60 * 1000 && m.completed) newMemberCompleted++;
            }
          });
          // Average participation rate of declining members
          var decliningRateSum = 0, decliningRateCount = 0;
          members.forEach(function(m) {
            if (m.participationRate !== null && m.participationRate < 30 && m.totalMissed > 1) {
              decliningRateSum += m.participationRate;
              decliningRateCount++;
            }
          });
          var avgDecliningRate = decliningRateCount > 0 ? Math.round(decliningRateSum / decliningRateCount) : 0;

          var statItems = [
            { label: 'New Members', value: newMembers, color: 'var(--info)', icon: '\uD83C\uDD95' },
            { label: 'New Completed', value: newMemberCompleted + '/' + newMembers, color: newMembers > 0 && (newMemberCompleted / newMembers) > 0.5 ? 'var(--success)' : newMembers > 0 && (newMemberCompleted / newMembers) < 0.3 ? 'var(--danger)' : 'var(--warning)', icon: '\uD83C\uDF1F' },
            { label: 'First Survey', value: firstTimers, color: 'var(--accent)', icon: '\u2728' },
            { label: 'Consistent', value: consistentMembers, color: 'var(--success)', icon: '\u2705' },
            { label: 'Declining', value: decliningMembers, color: 'var(--danger)', icon: '\u26A0\uFE0F', sub: decliningMembers > 0 ? 'avg ' + avgDecliningRate + '%' : '' },
          ];
          statItems.forEach(function(s) {
            var card = el('div', { className: 'card', style: { padding: '10px 8px', textAlign: 'center', background: 'var(--surface)' } });
            card.appendChild(el('div', { style: { fontSize: '16px', marginBottom: '2px' } }, s.icon));
            card.appendChild(el('div', { style: { fontSize: '18px', fontWeight: '700', color: s.color } }, String(s.value)));
            card.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '2px' } }, s.label));
            if (s.sub) card.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '1px' } }, s.sub));
            sGrid.appendChild(card);
          });
          statsWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Participation Statistics'));
          statsWrap.appendChild(sGrid);
        }

        // ── Satisfaction section averages ────────────────────────────────
        serverCall().withSuccessHandler(function(summary) {
          kpiWrap.innerHTML = '';
          if (!summary || !summary.sections) return;
          var sections = summary.sections;
          var sectionKeys = Object.keys(sections);
          var hasAny = sectionKeys.some(function(k) { return sections[k] && sections[k].avg !== null; });
          if (!hasAny || summary.responseCount < 5) return;

          kpiWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Section Averages (1\u201310)'));
          var kpiRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
          sectionKeys.forEach(function(key) {
            var s = sections[key];
            if (!s || s.avg === null) return;
            var color = s.avg < 4 ? 'var(--danger)' : s.avg < 6 ? 'var(--warning)' : 'var(--success)';
            var kpi = el('div', { className: 'card', style: { flex: '1', minWidth: '80px', padding: '10px 8px', textAlign: 'center', background: 'var(--surface)' } });
            kpi.appendChild(el('div', { style: { fontSize: '18px', fontWeight: '700', color: color } }, s.avg.toFixed(1)));
            kpi.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '2px', lineHeight: '1.3' } }, s.name));
            kpiRow.appendChild(kpi);
          });
          kpiWrap.appendChild(kpiRow);
        }).withFailureHandler(function() {}).dataGetSatisfactionSummary(SESSION_TOKEN);

        // ── No data ───────────────────────────────────────────────────────
        if (!total) {
          dataWrap.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No survey tracking data. Open a period and populate tracking.'));
          return;
        }

        // ── Nearby members (same location/office days/cubicle proximity) ─
        var pendingMembers = members.filter(function(m) { return !m.completed; });
        var completedMembers = members.filter(function(m) { return m.completed; });

        // Calculate proximity scores for pending members
        if (stewardInfo.workLocation && pendingMembers.length > 0) {
          pendingMembers.forEach(function(m) {
            var score = 0;
            if (m.workLocation && m.workLocation.toLowerCase() === stewardInfo.workLocation.toLowerCase()) score += 3;
            if (m.officeDays && stewardInfo.officeDays) {
              var mDays = m.officeDays.toLowerCase().split(/[,;\s]+/);
              var sDays = stewardInfo.officeDays.toLowerCase().split(/[,;\s]+/);
              var overlap = mDays.filter(function(d) { return sDays.indexOf(d) !== -1; }).length;
              score += overlap;
            }
            if (m.cubicle && stewardInfo.cubicle) {
              // Basic cubicle proximity: same floor/section prefix
              var mPrefix = m.cubicle.replace(/[0-9]+$/, '');
              var sPrefix = stewardInfo.cubicle.replace(/[0-9]+$/, '');
              if (mPrefix && sPrefix && mPrefix.toLowerCase() === sPrefix.toLowerCase()) score += 2;
            }
            m._proximityScore = score;
          });
        }

        // Nearby = same location + high proximity score
        var nearbyMembers = pendingMembers.filter(function(m) { return (m._proximityScore || 0) >= 3; });
        nearbyMembers.sort(function(a, b) { return (b._proximityScore || 0) - (a._proximityScore || 0); });
        var otherPending = pendingMembers.filter(function(m) { return (m._proximityScore || 0) < 3; });

        // ── Render nearby members section ────
        if (nearbyMembers.length > 0) {
          dataWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', margin: '12px 0 6px' } }, '\uD83D\uDCCD Nearby \u2014 Pending (' + nearbyMembers.length + ')'));
          dataWrap.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, 'Members at your location with overlapping office days'));
          var nearbyContainer = el('div');
          _surveyPaginate(nearbyContainer, nearbyMembers, true);
          dataWrap.appendChild(nearbyContainer);
        }

        // ── Render other pending members (limited to 20 initially) ────
        if (otherPending.length > 0) {
          var otherHeader = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', margin: '12px 0 6px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' } });
          otherHeader.appendChild(el('span', { style: { transition: 'transform 0.2s' } }, '\u25BC'));
          otherHeader.appendChild(el('span', {}, 'Other Pending (' + otherPending.length + ')'));
          var otherContainer = el('div');
          otherHeader.onclick = function() {
            var isOpen = otherContainer.style.display !== 'none';
            otherContainer.style.display = isOpen ? 'none' : 'block';
            otherHeader.firstChild.textContent = isOpen ? '\u25B6' : '\u25BC';
          };
          dataWrap.appendChild(otherHeader);
          _surveyPaginate(otherContainer, otherPending, false);
          dataWrap.appendChild(otherContainer);
        }

        // ── Completed list (collapsed by default, limited to 20) ─────
        if (completedMembers.length > 0) {
          var compToggle = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--success)', margin: '16px 0 6px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' } });
          compToggle.appendChild(el('span', { style: { transition: 'transform 0.2s' } }, '\u25B6'));
          compToggle.appendChild(el('span', {}, 'Completed (' + completedMembers.length + ')'));
          var compList = el('div', { style: { display: 'none' } });
          compToggle.onclick = function() {
            var isOpen = compList.style.display !== 'none';
            compList.style.display = isOpen ? 'none' : 'block';
            compToggle.firstChild.textContent = isOpen ? '\u25B6' : '\u25BC';
          };
          dataWrap.appendChild(compToggle);
          _surveyPaginate(compList, completedMembers, false);
          dataWrap.appendChild(compList);
        }

      }).withFailureHandler(function() {
        dataWrap.innerHTML = '';
        dataWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load survey data.'));
      }).dataGetStewardSurveyTracking(SESSION_TOKEN, scope);
    }

    // ── Period status bar ──────────────────────────────────────────────
    serverCall().withSuccessHandler(function(pendingData) {
      periodBar.innerHTML = '';
      var period = pendingData.periodId
        ? { id: pendingData.periodId, name: pendingData.periodName, status: 'Active' }
        : null;

      if (period) {
        var pBar = el('div', { className: 'card', style: { padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0', background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.3)' } });
        pBar.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)' } }, '\uD83D\uDCCB ' + (period.name || period.id)));
        pBar.appendChild(el('span', { style: { fontSize: '11px', background: 'var(--success)', color: '#fff', padding: '2px 8px', borderRadius: '20px' } }, 'Active'));
        periodBar.appendChild(pBar);
      } else {
        var closedBar = el('div', { className: 'card', style: { padding: '10px 14px', textAlign: 'center', fontSize: '12px', color: 'var(--muted)', background: 'var(--surface)', marginBottom: '0' } });
        closedBar.appendChild(el('span', {}, 'No survey period is currently open. '));
        closedBar.appendChild(el('button', { className: 'btn btn-sm', style: { fontSize: '11px', padding: '3px 10px', marginLeft: '8px' }, onClick: function() {
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) renderSurveyTracking(appContainer);
            else alert('Error: ' + (r && r.message));
          }).dataOpenNewSurveyPeriod(SESSION_TOKEN);
        } }, 'Open New Period'));
        periodBar.appendChild(closedBar);
      }
    }).withFailureHandler(function() {}).dataGetPendingSurveyMembers(SESSION_TOKEN);

    // ── Scope filter tabs ──────────────────────────────────────────────
    var scopeRow = el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } });
    var scopes = [
      { id: 'assigned', label: 'My Members' },
      { id: 'location', label: 'My Location' },
      { id: 'all', label: 'All Members' },
    ];
    var scopeBtns = {};
    scopes.forEach(function(s) {
      var btn = el('button', {
        className: 'filter-tab' + (s.id === activeScope ? ' active' : ''),
        onClick: function() {
          Object.keys(scopeBtns).forEach(function(k) { scopeBtns[k].className = 'filter-tab' + (k === s.id ? ' active' : ''); });
          loadSurveyData(s.id);
        }
      }, s.label);
      scopeBtns[s.id] = btn;
      scopeRow.appendChild(btn);
    });
    scopeWrap.appendChild(scopeRow);

    // Initial load
    loadSurveyData('location');
  });
}

// Helper: paginated survey member list with Prev/Next controls
function _surveyPaginate(container, items, showProximity) {
  var PAGE_SIZE = 20;
  var page = 0;
  var totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));

  var listArea = el('div');
  var navRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', fontSize: '12px' } });
  var prevBtn = el('button', { className: 'btn btn-sm', style: { fontSize: '11px', padding: '4px 12px' } }, '\u2190 Prev');
  var pageLabel = el('span', { style: { color: 'var(--muted)', fontSize: '11px' } });
  var nextBtn = el('button', { className: 'btn btn-sm', style: { fontSize: '11px', padding: '4px 12px' } }, 'Next \u2192');

  function render() {
    listArea.innerHTML = '';
    var start = page * PAGE_SIZE;
    items.slice(start, start + PAGE_SIZE).forEach(function(m) { _renderSurveyMemberItem(listArea, m, showProximity); });
    pageLabel.textContent = 'Page ' + (page + 1) + ' of ' + totalPages + ' (' + items.length + ' total)';
    prevBtn.disabled = page === 0;
    nextBtn.disabled = page >= totalPages - 1;
    prevBtn.style.visibility = totalPages <= 1 ? 'hidden' : '';
    nextBtn.style.visibility = totalPages <= 1 ? 'hidden' : '';
    pageLabel.style.display = totalPages <= 1 ? 'none' : '';
  }
  prevBtn.onclick = function() { if (page > 0) { page--; render(); } };
  nextBtn.onclick = function() { if (page < totalPages - 1) { page++; render(); } };

  container.appendChild(listArea);
  navRow.appendChild(prevBtn);
  navRow.appendChild(pageLabel);
  navRow.appendChild(nextBtn);
  if (items.length > PAGE_SIZE) container.appendChild(navRow);
  render();
}

// Helper: render a survey member item with progress bar and details
function _renderSurveyMemberItem(parentEl, m, showProximity) {
  var item = el('div', { className: 'member-list-item', style: { cursor: 'pointer', flexDirection: 'column', alignItems: 'stretch', gap: '6px' } });

  var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } });
  topRow.appendChild(el('div', { className: 'member-list-avatar', style: { background: m.completed ? 'var(--success)' : 'var(--surface)' } }, (m.name || 'M').charAt(0).toUpperCase()));

  var info = el('div', { style: { flex: '1', minWidth: '0' } });
  info.appendChild(el('div', { className: 'member-list-name' }, m.name || m.email));

  // Meta line: location, office days, cubicle
  var metaParts = [];
  if (m.workLocation) metaParts.push(m.workLocation);
  if (m.officeDays) metaParts.push(m.officeDays);
  if (showProximity && m.cubicle) metaParts.push('Cube ' + m.cubicle);
  if (metaParts.length > 0) {
    info.appendChild(el('div', { className: 'member-list-meta' }, metaParts.join(' \u00B7 ')));
  }

  // Proximity badge pills (only for nearby members)
  if (showProximity && m._proximityScore > 0) {
    var badgeRow = el('div', { style: { display: 'flex', gap: '4px', flexWrap: 'wrap', marginTop: '3px' } });
    var badgeStyle = { fontSize: '9px', padding: '1px 6px', borderRadius: '8px', fontWeight: '600' };
    if (m._proximityScore >= 3) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(34,197,94,0.15)', color: 'var(--success)' }) }, 'Same Location'));
    }
    if (m.officeDays && m._proximityScore >= 4) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(59,130,246,0.15)', color: 'var(--info)' }) }, 'Day Overlap'));
    }
    if (m.cubicle && m._proximityScore >= 5) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(168,85,247,0.15)', color: 'var(--accent)' }) }, 'Same Floor'));
    }
    if (badgeRow.childNodes.length > 0) info.appendChild(badgeRow);
  }
  topRow.appendChild(info);

  // Status icon
  topRow.appendChild(el('span', { style: { fontSize: '14px', color: m.completed ? 'var(--success)' : 'var(--muted)', flexShrink: '0' } }, m.completed ? '\u2705' : '\u23F3'));
  item.appendChild(topRow);

  // Participation rate bar
  if (m.participationRate !== null) {
    var partRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', paddingLeft: '42px' } });
    var pRate = m.participationRate;
    var pColorClass = pRate >= 70 ? 'prog-fill--success' : pRate >= 40 ? 'prog-fill--warning' : 'prog-fill--danger';
    partRow.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', minWidth: '60px' } }, 'History: ' + pRate + '%'));
    var partBg = el('div', { className: 'prog-track prog-track--sm', style: { flex: '1' } });
    partBg.appendChild(el('div', { className: 'prog-fill ' + pColorClass, style: { width: pRate + '%' } }));
    partRow.appendChild(partBg);
    partRow.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', minWidth: '40px', textAlign: 'right' } }, m.totalCompleted + '/' + (m.totalCompleted + m.totalMissed)));
    item.appendChild(partRow);
  }

  if (m.email && typeof _toggleMemberDetail === 'function') {
    item.onclick = (function(member, itemEl) { return function() { _toggleMemberDetail(parentEl, itemEl, member); }; })(m, item);
  }
  parentEl.appendChild(item);
}

function renderContactLog(appContainer) {
  renderPageLayout(appContainer, 'steward', 'contactlog', function(container) {
    _stewardHeader(container, 'Contact Log');
    var content = el('div', { className: 'content' });

    // Sub-tabs — default to 'recent', order: Recent → By Member → Log
    var activeSubTab = 'recent';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['recent', 'by member', 'log'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'log') _renderContactForm(subContent);
      else if (activeSubTab === 'recent') _renderRecentContacts(subContent);
      else _renderContactByMember(subContent);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderContactForm(container) {
  var typeIcons = { 'Phone': '\uD83D\uDCDE', 'Email': '\u2709\uFE0F', 'In Person': '\uD83D\uDC64', 'Text': '\uD83D\uDCAC' };
  container.appendChild(el('h3', { className: 'section-title' }, 'Log a Contact'));

  var memberGroup = el('div', { className: 'form-group', style: { position: 'relative' } });
  memberGroup.appendChild(el('label', { className: 'form-label' }, 'Member Email'));
  var memberInput = el('input', { className: 'form-input', placeholder: 'Type name or email...' });
  memberGroup.appendChild(memberInput);
  var acDropdown = el('div', { className: 'contact-log-ac-dropdown', style: {
    position: 'absolute', top: '100%', left: '0', right: '0', zIndex: '50',
    background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px',
    maxHeight: '200px', overflowY: 'auto', display: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.3)'
  }});
  memberGroup.appendChild(acDropdown);
  container.appendChild(memberGroup);

  // Typeahead for member email + name
  var _acMembers = null;
  var _selectedMemberName = '';
  function _loadAcMembers(cb) {
    if (_acMembers) { cb(_acMembers); return; }
    serverCall()
      .withSuccessHandler(function(m) { _acMembers = m || []; cb(_acMembers); })
      .withFailureHandler(function() { _acMembers = []; cb(_acMembers); })
      .dataGetAllMembers(SESSION_TOKEN);
  }
  memberInput.addEventListener('input', function() {
    _selectedMemberName = ''; // reset on manual typing
    var q = memberInput.value.toLowerCase().trim();
    if (q.length < 1) { acDropdown.style.display = 'none'; return; }
    _loadAcMembers(function(members) {
      acDropdown.innerHTML = '';
      var matches = members.filter(function(m) {
        return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
               (m.email || '').toLowerCase().indexOf(q) !== -1;
      }).slice(0, 8);
      if (matches.length === 0) { acDropdown.style.display = 'none'; return; }
      matches.forEach(function(m) {
        var item = el('div', { style: {
          padding: '8px 12px', cursor: 'pointer', fontSize: '12px', color: 'var(--text)',
          borderBottom: '1px solid var(--border)'
        }, onClick: function() {
          memberInput.value = m.email;
          _selectedMemberName = m.name || '';
          acDropdown.style.display = 'none';
        }});
        item.appendChild(el('div', { style: { fontWeight: '600' } }, m.name || ''));
        item.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '11px' } }, m.email));
        item.addEventListener('mouseenter', function() { item.style.background = 'var(--accentBg)'; });
        item.addEventListener('mouseleave', function() { item.style.background = 'transparent'; });
        acDropdown.appendChild(item);
      });
      acDropdown.style.display = 'block';
    });
  });
  // Use a named handler so duplicate listeners are automatically deduped by the browser
  if (!window._contactLogAcDismiss) {
    window._contactLogAcDismiss = function(e) {
      var dd = document.querySelector('.contact-log-ac-dropdown');
      if (dd && dd.style.display !== 'none') {
        var grp = dd.parentNode;
        if (grp && !grp.contains(e.target)) dd.style.display = 'none';
      }
    };
    document.addEventListener('click', window._contactLogAcDismiss);
  }

  var typeGroup = el('div', { className: 'form-group' });
  typeGroup.appendChild(el('label', { className: 'form-label' }, 'Contact Type'));
  var typeRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
  var selectedType = 'Phone';
  Object.keys(typeIcons).forEach(function(t) {
    var btn = el('button', {
      className: 'filter-tab' + (t === selectedType ? ' active' : ''),
      onClick: function() {
        selectedType = t;
        typeRow.querySelectorAll('.filter-tab').forEach(function(b, i) {
          b.className = 'filter-tab' + (Object.keys(typeIcons)[i] === t ? ' active' : '');
        });
      }
    }, typeIcons[t] + ' ' + t);
    typeRow.appendChild(btn);
  });
  typeGroup.appendChild(typeRow);
  container.appendChild(typeGroup);

  var notesGroup = el('div', { className: 'form-group' });
  notesGroup.appendChild(el('label', { className: 'form-label' }, 'Notes (optional)'));
  var notesInput = el('textarea', { className: 'msg-textarea', placeholder: 'Brief notes about the interaction...', style: { minHeight: '60px' } });
  notesGroup.appendChild(notesInput);
  container.appendChild(notesGroup);

  var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
  container.appendChild(statusMsg);

  container.appendChild(el('button', {
    className: 'btn btn-primary',
    onClick: function() {
      var email = memberInput.value.trim();
      if (!email) { statusMsg.textContent = 'Enter a member email.'; statusMsg.style.color = 'var(--danger)'; return; }
      statusMsg.textContent = 'Logging...'; statusMsg.style.color = 'var(--muted)';
      serverCall().withSuccessHandler(function(r) {
        statusMsg.textContent = r && r.success ? 'Contact logged!' : 'Error logging contact.';
        statusMsg.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';
        if (r && r.success) { memberInput.value = ''; notesInput.value = ''; _selectedMemberName = ''; }
      }).dataLogMemberContact(SESSION_TOKEN, email, selectedType, notesInput.value.trim(), '', _selectedMemberName);
    }
  }, 'Log Contact'));
}

function renderStewardTasks(appContainer) {
  renderPageLayout(appContainer, 'steward', 'tasks', function(container) {
    _stewardHeader(container, 'Tasks');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'open';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['open', 'completed', 'new task', 'member tasks'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'new task') _renderNewTaskForm(subContent, function() { activeSubTab = 'open'; refreshSubTabs(); renderSubContent(); });
      else if (activeSubTab === 'member tasks') _renderStewardMemberTasks(subContent);

    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderTaskList(container, statusFilter) {
  showLoading(container, 'list');

      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, statusFilter === 'completed' ? 'No completed tasks.' : 'No open tasks. Create one!'));

    // KPI strip
    var highPri = filtered.filter(function(t) { return t.priority === 'high'; }).length;

      { label: 'Total', value: filtered.length },

      card.appendChild(top);
      if (task.memberEmail) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, task.memberEmail.split('@')[0]));
      if (task.description) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, task.description.substring(0, 100)));

      if (task.status !== 'completed') {
        var actions = el('div', { style: { display: 'flex', gap: '6px', marginTop: '8px', flexWrap: 'wrap' } });

        // Complete button
        (function(t) {

            onClick: function() {
              serverCall().withSuccessHandler(function() {
                if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
                _invalidateTabCache('tasks'); _handleTabNav('steward', 'tasks');
              }).withFailureHandler(function() { alert('Failed to complete task.'); }).dataCompleteTask(SESSION_TOKEN, t.id);
            }
          }, '\u2705 Complete'));

        // Edit button — toggles inline edit form

          }, '\u270F\uFE0F Edit');

// ─────────────────────────────────────────────────────────────────────────────
// _renderStewardMemberTasks — Steward's view of tasks they assigned to members
// ─────────────────────────────────────────────────────────────────────────────
//
// WHAT: Renders a list of member tasks that THIS steward created, with a
//       KPI strip (total/open/completed) and a "Complete for member" button
//       on each open task.
//
// DATA SOURCE: Calls dataGetStewardAssignedMemberTasks(SESSION_TOKEN) which
//       returns tasks where col 12 (Assigned By) = this steward's email.
//       The server verifies identity — SESSION_TOKEN is not the email itself.
//
// COMPLETE BUTTON FLOW:
//   1. User clicks "Complete for member"
//   2. confirm() dialog prevents accidental clicks
//   3. Calls dataStaffCompleteMemberTask(SESSION_TOKEN, taskId)
//   4. Server: _requireStewardAuth → withScriptLock_ → stewardCompleteMemberTask
//   5. On success: _refreshNavBadges() updates the nav badge counts, then
//      the entire task view re-renders to reflect the new state.
//
// IIFE PATTERN — (function(t) { ... })(task):
//   The button onClick handler captures `task` from the forEach loop.
//   Without the IIFE, all buttons would reference the last task in the
//   array due to JavaScript closure scoping. The IIFE creates a new scope
//   per iteration, binding `t` to the correct task object.
//
// IF THIS BREAKS:
// - dataGetStewardAssignedMemberTasks fails → withFailureHandler shows
//   "Failed to load member tasks" in red. No data leakage.
// - SESSION_TOKEN expired → server returns empty array (auth gate returns
//   false). UI shows "No member tasks assigned yet" — misleading but safe.
// - _refreshNavBadges missing → badge counts go stale until next page load.
//   Functional but confusing (task completed but badge still shows old count).
// - IIFE removed → all "Complete for member" buttons complete the LAST task
//   in the list, regardless of which button was clicked.
// ─────────────────────────────────────────────────────────────────────────────
function _renderStewardMemberTasks(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(tasks) {
    container.innerHTML = '';
    if (!tasks || tasks.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No member tasks assigned yet.'));
      return;
    }

    // KPI strip — summary counts at the top of the member tasks sub-tab
    var openTasks = tasks.filter(function(t) { return t.status !== 'completed'; });
    var completedTasks = tasks.filter(function(t) { return t.status === 'completed'; });
    var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)', marginBottom: '10px' } });
    [
      { label: 'Total Assigned', value: tasks.length },
      { label: 'Open', value: openTasks.length, color: openTasks.length > 0 ? 'var(--accent)' : null },
      { label: 'Completed', value: completedTasks.length, color: completedTasks.length > 0 ? 'var(--success)' : null }
    ].forEach(function(kpi) {
      var card = el('div', { className: 'kpi-card' });
      card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
      var val = el('div', { className: 'kpi-value' }, String(kpi.value));
      if (kpi.color) val.style.color = kpi.color;
      card.appendChild(val);
      kpiStrip.appendChild(card);
    });
    container.appendChild(kpiStrip);

    tasks.forEach(function(task) {
      var priColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--muted)' };
      var card = el('div', { className: 'card card-accent-border', style: { padding: '12px 16px', marginBottom: '6px', borderLeftColor: priColors[task.priority] || 'var(--accent)' } });
      var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
      top.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, task.title));
      var statusColor = task.status === 'completed' ? 'var(--success)' : 'var(--accent)';
      top.appendChild(el('span', { style: { fontSize: '10px', fontWeight: '600', color: statusColor, background: statusColor + '18', padding: '2px 8px', borderRadius: '8px' } }, task.status));
      card.appendChild(top);
      if (task.memberEmail) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Assigned to: ' + task.memberEmail.split('@')[0]));
      if (task.dueDate) card.appendChild(el('div', { style: { fontSize: '11px', color: task.dueDays !== null && task.dueDays < 0 ? 'var(--danger)' : 'var(--muted)' } }, 'Due: ' + task.dueDate));
      if (task.description) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, task.description.substring(0, 100)));
      if (task.status !== 'completed') {
        var mActions = el('div', { style: { marginTop: '8px' } });
        (function(t) {
          mActions.appendChild(el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
            onClick: function() {
              if (!confirm('Mark this member task as complete?')) return;
              serverCall().withSuccessHandler(function(r) {
                if (r && r.success) {
                  if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
                  _handleTabNav('steward', 'tasks');
                } else { alert('Failed to complete task.'); }
              }).withFailureHandler(function() { alert('Failed to complete task.'); }).dataStaffCompleteMemberTask(SESSION_TOKEN, t.id);
            }
          }, '\u2705 Complete for member'));
        })(task);
        card.appendChild(mActions);
      }
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load member tasks.'));
  }).dataGetStewardAssignedMemberTasks(SESSION_TOKEN);
}

        }).withFailureHandler(function(e) { statusMsg.textContent = 'Network error creating task.'; statusMsg.style.color = 'var(--danger)'; console.error(e.message); }).dataCreateMemberTask(SESSION_TOKEN, memEmail, title, descInput.value.trim(), priSelect.value, dueInput.value || '');

        }
      }
    }
  }, 'Create Task'));
}

// ═══════════════════════════════════════
// MEMBERS TAB — Sort, Filter & Stats (v4.12.0 enhancements)
