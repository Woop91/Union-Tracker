/**
 * Renders structured test results into the container.
 */
function _renderTestResults(container, results, statusEl) {
  container.innerHTML = '';
  if (!results) return;

  // Summary bar
  var pct = results.summary.total > 0
    ? Math.round((results.summary.passed / results.summary.total) * 100) : 0;
  var allPassed = results.summary.failed === 0;
  var icon = allPassed ? '✅' : '❌';

  statusEl.textContent = icon + ' ' + results.summary.passed + '/' + results.summary.total +
    ' passed (' + pct + '%) — ' + results.duration + 'ms' +
    (results.summary.skipped ? ' (' + results.summary.skipped + ' skipped)' : '');
  statusEl.style.color = allPassed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)';

  // Timeout warning banner
  if (results.timedOut) {
    var warnBanner = el('div', { style: {
      background: 'rgba(245,158,11,0.12)', border: '1px solid rgba(245,158,11,0.4)',
      borderRadius: '10px', padding: '12px 16px', marginBottom: '16px',
      fontSize: '13px', color: '#f59e0b'
    }}, '⚠️ Test run hit the 3.5-minute safety timeout (GAS 6-min limit). ' +
       results.summary.skipped + ' test(s) were skipped. Use the suite filter to run specific suites individually.');
    container.appendChild(warnBanner);
  }

  // Timestamp
  if (results.timestamp) {
    var ts = el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '16px' } },
      'Last run: ' + new Date(results.timestamp).toLocaleString());
    container.appendChild(ts);
  }

  // Summary cards row
  var summaryRow = el('div', { style: { display: 'flex', gap: '12px', marginBottom: '20px', flexWrap: 'wrap' } });
  var _card = function(label, val, color) {
    var c = el('div', { style: {
      padding: '12px 20px', borderRadius: '10px', background: 'var(--bg-secondary)',
      border: '1px solid var(--border-color)', minWidth: '100px', textAlign: 'center'
    }});
    c.appendChild(el('div', { style: { fontSize: '24px', fontWeight: '700', color: color } }, String(val)));
    c.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginTop: '2px' } }, label));
    return c;
  };
  summaryRow.appendChild(_card('Total', results.summary.total, 'var(--text-primary)'));
  summaryRow.appendChild(_card('Passed', results.summary.passed, 'var(--success, #10B981)'));
  summaryRow.appendChild(_card('Failed', results.summary.failed, results.summary.failed > 0 ? 'var(--danger, #EF4444)' : 'var(--text-secondary)'));
  if (results.summary.skipped > 0) {
    summaryRow.appendChild(_card('Skipped', results.summary.skipped, '#f59e0b'));
  }
  summaryRow.appendChild(_card('Duration', results.duration + 'ms', 'var(--text-secondary)'));
  container.appendChild(summaryRow);

  // Per-suite collapsible sections
  for (var si = 0; si < results.suites.length; si++) {
    var suite = results.suites[si];
    var suiteAllPassed = suite.failed === 0;
    var suiteCard = el('div', { className: 'card', style: { marginBottom: '12px', overflow: 'hidden' } });

    // Suite header (clickable)
    var suiteBody = el('div', { style: { display: 'none', padding: '0 16px 16px' } });
    var suiteHdr = el('div', {
      style: {
        padding: '14px 16px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', userSelect: 'none'
      },
      onClick: (function(body) {
        return function() {
          body.style.display = body.style.display === 'none' ? 'block' : 'none';
        };
      })(suiteBody)
    });
    suiteHdr.appendChild(el('span', { style: { fontWeight: '600', fontSize: '15px' } },
      (suiteAllPassed ? '✅' : '❌') + ' ' + suite.name.toUpperCase() +
      ' (' + suite.passed + '/' + (suite.passed + suite.failed + (suite.skipped || 0)) + ')' +
      (suite.skipped ? ' ⏭ ' + suite.skipped + ' skipped' : '')));
    suiteHdr.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } },
      suite.duration + 'ms ▾'));
    suiteCard.appendChild(suiteHdr);

    // Auto-expand failed suites
    if (!suiteAllPassed) {
      suiteBody.style.display = 'block';
    }

    // Individual tests
    for (var ti = 0; ti < suite.tests.length; ti++) {
      var t = suite.tests[ti];
      var tRow = el('div', {
        style: {
          padding: '6px 0', borderTop: '1px solid var(--border-color)',
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          fontSize: '13px'
        }
      });
      // Clean test name: test_suite_description → description
      var cleanName = t.name.replace(/^test_[a-z]+_/, '');
      tRow.appendChild(el('span', null, (t.passed ? '✓' : '✗') + ' ' + cleanName));
      tRow.appendChild(el('span', {
        style: { color: t.passed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)', whiteSpace: 'nowrap', marginLeft: '8px' }
      }, t.passed ? t.duration + 'ms' : 'FAIL'));

      if (!t.passed && t.error) {
        var errEl = el('div', { style: {
          fontSize: '12px', color: 'var(--danger, #EF4444)', background: 'var(--bg-tertiary, #1e1e1e)',
          padding: '6px 10px', borderRadius: '6px', marginTop: '4px', fontFamily: 'monospace',
          wordBreak: 'break-word'
        } }, t.error);
        var errWrap = el('div');
        errWrap.appendChild(tRow);
        errWrap.appendChild(errEl);
        suiteBody.appendChild(errWrap);
      } else {
        suiteBody.appendChild(tRow);
      }
    }

    suiteCard.appendChild(suiteBody);
    container.appendChild(suiteCard);
  }
}

// STEWARD TIMELINE PAGE (v4.26.0)
// Full write access: Add, Edit, Delete, Import, Category management
// ═══════════════════════════════════════
function renderStewardTimelinePage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'timeline', function(container) {
    container.appendChild(el('div', { className: 'page-header' }, el('div', { className: 'page-title' }, 'Timeline')));

    var content = el('div', { className: 'content' });
    var activeSubTab = 'timeline';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    var filterYear = '';
    var filterCategory = '';
    var currentPage = 1;
    var PAGE_SIZE = 25;
    var cachedCategories = [];
    var cachedYears = [];
    var tlContainer = null;
    function parseDriveIds(raw) {
      if (!raw) return [];
      var parts = raw.split(/[\n,]+/);
      var ids = [];
      parts.forEach(function(part) {
        var trimmed = part.trim();
        if (!trimmed) return;
        var match = trimmed.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
        if (match) ids.push(match[1]);
        else if (/^[a-zA-Z0-9_-]{20,}$/.test(trimmed)) ids.push(trimmed);
      });
      return ids;
    }

    function _formGroup(cont, labelText, inputEl) {
      var g = el('div', { className: 'form-group' });
      g.appendChild(el('label', { className: 'form-label' }, labelText));
      g.appendChild(inputEl);
      cont.appendChild(g);
    }

    // ── Sub-tab renderer ──────────────────────────────────────────────────
    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      [
        { id: 'timeline',   label: 'Timeline' },
        { id: 'add',        label: 'Add Event' },
        { id: 'import',     label: 'Import' },
        { id: 'categories', label: 'Categories' }
      ].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; currentPage = 1; refreshSubTabs(); renderTLSubContent(); }
        }, tab.label));
      });
    }

    function renderTLSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'add')        { _renderAddEventForm(subContent); return; }
      if (activeSubTab === 'import')     { _renderImportForm(subContent); return; }
      if (activeSubTab === 'categories') { _renderCategoriesTab(subContent); return; }
      _renderTimeline(subContent);
    }

    // ── Timeline list ─────────────────────────────────────────────────────
    function _renderTimeline(cont) {
      cont.innerHTML = '';
      var filterBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap', alignItems: 'center' } });

      var yearSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '100px' } });
      yearSelect.appendChild(el('option', { value: '' }, 'All Years'));
      cachedYears.forEach(function(y) {
        var opt = el('option', { value: String(y) }, String(y));
        if (String(y) === filterYear) opt.selected = true;
        yearSelect.appendChild(opt);
      });
      yearSelect.addEventListener('change', function() { filterYear = yearSelect.value; currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); });

      var catSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '120px' } });
      catSelect.appendChild(el('option', { value: '' }, 'All Categories'));
      cachedCategories.forEach(function(c) {
        var opt = el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1));
        if (c === filterCategory) opt.selected = true;
        catSelect.appendChild(opt);
      });
      catSelect.addEventListener('change', function() { filterCategory = catSelect.value; currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); });

      filterBar.appendChild(yearSelect);
      filterBar.appendChild(catSelect);
      cont.appendChild(filterBar);

      var listArea = el('div');
      cont.appendChild(listArea);

      function _ensureFiltersLoaded(cb) {
        var pending = 0;
        if (!cachedCategories.length) {
          pending++;
          serverCall().withSuccessHandler(function(cats) {
            cachedCategories = cats || [];
            catSelect.innerHTML = '';
            catSelect.appendChild(el('option', { value: '' }, 'All Categories'));
            cachedCategories.forEach(function(c) {
              catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1)));
            });
            catSelect.value = filterCategory;
            pending--; if (!pending) cb();
          }).withFailureHandler(function() { pending--; if (!pending) cb(); }).tlGetCategories(SESSION_TOKEN);
        }
        if (!cachedYears.length) {
          pending++;
          serverCall().withSuccessHandler(function(years) {
            cachedYears = years || [];
            yearSelect.innerHTML = '';
            yearSelect.appendChild(el('option', { value: '' }, 'All Years'));
            cachedYears.forEach(function(y) { yearSelect.appendChild(el('option', { value: String(y) }, String(y))); });
            yearSelect.value = filterYear;
            pending--; if (!pending) cb();
          }).withFailureHandler(function() { pending--; if (!pending) cb(); }).tlGetTimelineYears(SESSION_TOKEN);
        }
        if (!pending) cb();
      }

      showLoading(listArea);
      _ensureFiltersLoaded(function() { _loadEvents(cont, listArea); });
    }

    function _loadEvents(cont, listArea) {
      if (currentPage === 1) showLoading(listArea);
      serverCall().withSuccessHandler(function(result) {
        // Remove stale Load More button before rebuilding
        var oldBtn = listArea.querySelector('.tl-load-more');
        if (oldBtn && oldBtn.parentNode) oldBtn.parentNode.removeChild(oldBtn);

        if (currentPage === 1) {
          listArea.innerHTML = '';
          tlContainer = null;
        }

        if (!result || !result.events || result.events.length === 0) {
          if (currentPage === 1) {
            var empty = el('div', { style: { textAlign: 'center', padding: '40px 0' } });
            empty.appendChild(el('div', { style: { fontSize: '32px', marginBottom: '10px' } }, '\uD83D\uDCDC'));
            empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'No timeline events yet'));
            empty.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)' } }, 'Use \u201CAdd Event\u201D to create the first entry.'));
            listArea.appendChild(empty);
          }
          return;
        }

        if (!tlContainer) {
          tlContainer = el('div', { className: 'timeline-container' });
          tlContainer.appendChild(el('div', { className: 'timeline-line' }));
          listArea.appendChild(tlContainer);
        }

        result.events.forEach(function(evt) {
          var item = el('div', { className: 'timeline-event' });
          item.appendChild(el('div', { className: 'timeline-dot' }));
          item.appendChild(el('div', { className: 'timeline-date' }, evt.eventDate));

          var card = el('div', { className: 'card', style: { padding: '12px 16px' } });

          var titleRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
          titleRow.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, evt.title));
          titleRow.appendChild(el('span', { className: 'category-badge ' + (evt.category || 'other') }, evt.category || 'other'));
          card.appendChild(titleRow);

          if (evt.description) {
            var TRUNCATE = 200;
            var isLong = evt.description.length > TRUNCATE;
            var descEl = el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '4px' } });
            descEl.textContent = isLong ? evt.description.substring(0, TRUNCATE) + '\u2026' : evt.description;
            card.appendChild(descEl);
            if (isLong) {
              var expanded = false;
              var toggleBtn = el('button', {
                style: { fontSize: '11px', color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', marginTop: '2px' },
                onClick: function() {
                  expanded = !expanded;
                  descEl.textContent = expanded ? evt.description : evt.description.substring(0, TRUNCATE) + '\u2026';
                  toggleBtn.textContent = expanded ? 'Show less' : 'Show more';
                }
              }, 'Show more');
              card.appendChild(toggleBtn);
            }
          }

          if (evt.driveFiles && evt.driveFiles.length > 0) {
            var filesDiv = el('div', { style: { marginTop: '8px', fontSize: '11px' } });
            filesDiv.appendChild(el('span', { style: { color: 'var(--muted)' } }, '\uD83D\uDCCE Files: '));
            evt.driveFiles.forEach(function(f, idx) {
              if (idx > 0) filesDiv.appendChild(document.createTextNode(', '));

            });

          if (evt.meetingMinutesId) {
            card.appendChild(el('div', { style: { marginTop: '6px', fontSize: '11px' } },
              el('a', { href: 'https://docs.google.com/document/d/' + evt.meetingMinutesId + '/edit', target: '_blank', style: { color: 'var(--accent)' } }, '\uD83D\uDCC4 Meeting Minutes')
            ));
          }

          // ── Steward actions ──────────────────────────────────────────────
          var acts = el('div', { style: { display: 'flex', gap: '6px', marginTop: '10px' } });

          acts.appendChild(el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--surfaceAlt)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer' },
            onClick: function() { _openEditForm(card, acts, evt, function() { currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); }); }
          }, 'Edit'));

          var delBtn = el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600', cursor: 'pointer' },
            onClick: function() {
              if (!confirm('Delete \u201C' + evt.title + '\u201D? This cannot be undone.')) return;
              delBtn.disabled = true; delBtn.textContent = 'Deleting\u2026';
              serverCall().withSuccessHandler(function(r) {
                if (r && r.success) { currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); }
                else { delBtn.disabled = false; delBtn.textContent = 'Delete'; alert((r && r.message) || 'Delete failed.'); }
              }).withFailureHandler(function() {
                delBtn.disabled = false; delBtn.textContent = 'Delete';
              }).tlDeleteTimelineEvent(SESSION_TOKEN, evt.id);
            }
          }, 'Delete');

          acts.appendChild(delBtn);
          card.appendChild(acts);
          item.appendChild(card);
          tlContainer.appendChild(item);
        });

        var total = result.total || 0;
        var shown = (result.page || 1) * (result.pageSize || PAGE_SIZE);
        if (shown < total) {
          var moreBtn = el('button', {
            className: 'btn tl-load-more',
            style: { display: 'block', margin: '16px auto', fontSize: '13px' },
            onClick: function() {
              currentPage++;
              moreBtn.textContent = 'Loading\u2026';
              moreBtn.disabled = true;
              _loadEvents(cont, listArea);
            }
          }, 'Load More (' + (total - shown) + ' remaining)');
          listArea.appendChild(moreBtn);
        }

      }).withFailureHandler(function() {
        if (currentPage === 1) {
          listArea.innerHTML = '';
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load timeline.'));
        }
      }).tlGetTimelineEvents(SESSION_TOKEN, currentPage, PAGE_SIZE, filterYear || null, filterCategory || null);
    }

    // ── Inline edit form ──────────────────────────────────────────────────
    function _openEditForm(card, actsEl, evt, onSave) {
      if (actsEl.parentNode) actsEl.parentNode.removeChild(actsEl);
      var editForm = el('div', { style: { borderTop: '1px solid var(--border)', marginTop: '10px', paddingTop: '10px' } });

      var titleInput = el('input', { className: 'form-input', value: evt.title, style: { marginBottom: '6px' } });

      // UTC-safe date: use eventDateRaw ms but interpret in UTC to avoid timezone day-shift
      var dateInput = el('input', { className: 'form-input', type: 'date', style: { marginBottom: '6px' } });
      if (evt.eventDateRaw) {
        var d = new Date(evt.eventDateRaw);
        var yr = d.getUTCFullYear();
        var mo = String(d.getUTCMonth() + 1).padStart(2, '0');
        var dy = String(d.getUTCDate()).padStart(2, '0');
        dateInput.value = yr + '-' + mo + '-' + dy;
      }

      var descInput = el('textarea', { className: 'msg-textarea', style: { minHeight: '60px', marginBottom: '6px' } });
      descInput.value = evt.description || '';

      var catSelect = el('select', { className: 'form-select', style: { marginBottom: '8px' } });
      cachedCategories.forEach(function(c) {
        var opt = el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1));
        if (c === evt.category) opt.selected = true;
        catSelect.appendChild(opt);
      });

      // Meeting Minutes Doc ID / URL field
      var minutesInput = el('input', { className: 'form-input', placeholder: 'Doc ID or docs.google.com URL', style: { marginBottom: '8px' } });
      minutesInput.value = evt.meetingMinutesId || '';

      // Drive file attach (add-only)
      var driveHint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Add Drive URLs or file IDs (one per line). Existing files are kept.');
      var driveInput = el('textarea', { className: 'msg-textarea', placeholder: 'https://drive.google.com/file/d/... or raw ID', style: { minHeight: '44px', fontFamily: 'var(--fontMono, monospace)', fontSize: '11px', marginBottom: '8px' } });

      var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginBottom: '6px' } });
      var btnRow = el('div', { style: { display: 'flex', gap: '6px' } });

      btnRow.appendChild(el('button', {
        className: 'btn btn-primary', style: { fontSize: '12px' },
        onClick: function() {
          var t = titleInput.value.trim();
          if (!t) { statusMsg.textContent = 'Title required.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Saving\u2026'; statusMsg.style.color = 'var(--muted)';

          // Resolve meetingMinutesId from URL or raw ID
          var rawMinutes = minutesInput.value.trim();
          var minutesId = '';
          if (rawMinutes) {
            var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
            minutesId = mMatch ? mMatch[1] : rawMinutes;
          }

          var newDriveIds = parseDriveIds(driveInput.value);
          var pending = 1;

          function _finish() {
            serverCall().withSuccessHandler(function(r) {
              if (r && r.success) { onSave(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              statusMsg.textContent = 'Save failed.'; statusMsg.style.color = 'var(--danger)';
            }).tlUpdateTimelineEvent(SESSION_TOKEN, evt.id, {
              title: t, eventDate: dateInput.value,
              description: descInput.value.trim(), category: catSelect.value,
              meetingMinutesId: minutesId
            });
          }

          if (newDriveIds.length) {
            serverCall().withSuccessHandler(function() { _finish(); })
              .withFailureHandler(function() { _finish(); })
              .tlAttachDriveFiles(SESSION_TOKEN, evt.id, newDriveIds.join(','));
          } else {
            _finish();
          }
        }
      }, 'Save'));

      btnRow.appendChild(el('button', {
        className: 'btn', style: { fontSize: '12px' },
        onClick: function() { card.removeChild(editForm); card.appendChild(actsEl); }
      }, 'Cancel'));

      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Title'));
      editForm.appendChild(titleInput);
      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Date'));
      editForm.appendChild(dateInput);
      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Description'));
      editForm.appendChild(descInput);
      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Category'));
      editForm.appendChild(catSelect);
      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Meeting Minutes (optional)'));
      editForm.appendChild(minutesInput);
      editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Attach Drive Files (optional)'));
      editForm.appendChild(driveHint);
      editForm.appendChild(driveInput);
      editForm.appendChild(statusMsg);
      editForm.appendChild(btnRow);
      card.appendChild(editForm);
    }

    // ── Add Event form ────────────────────────────────────────────────────
    function _renderAddEventForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Add Event'));

      var titleInput = el('input', { className: 'form-input', placeholder: 'Event title' });
      _formGroup(cont, 'Title', titleInput);

      var dateInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'Event Date', dateInput);

      var descInput = el('textarea', { className: 'msg-textarea', placeholder: 'Event details...', style: { minHeight: '80px' } });
      _formGroup(cont, 'Description', descInput);

      var catSelect = el('select', { className: 'form-select' });
      if (cachedCategories.length) {
        cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
      } else {
        catSelect.appendChild(el('option', { value: '' }, 'Loading...'));
        serverCall().withSuccessHandler(function(cats) {
          cachedCategories = cats || [];
          catSelect.innerHTML = '';
          cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
        }).tlGetCategories(SESSION_TOKEN);
      }
      _formGroup(cont, 'Category', catSelect);

      var minutesInput = el('input', { className: 'form-input', placeholder: 'Doc ID or docs.google.com URL (optional)' });
      _formGroup(cont, 'Meeting Minutes (optional)', minutesInput);

      var driveHint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Paste Drive share URLs or file IDs, one per line.');
      var driveInput = el('textarea', { className: 'msg-textarea', placeholder: 'https://drive.google.com/file/d/... or raw ID', style: { minHeight: '50px', fontFamily: 'var(--fontMono, monospace)', fontSize: '11px' } });
      var driveGroup = el('div', { className: 'form-group' });
      driveGroup.appendChild(el('label', { className: 'form-label' }, 'Drive Files (optional)'));
      driveGroup.appendChild(driveHint);
      driveGroup.appendChild(driveInput);
      cont.appendChild(driveGroup);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          var title = titleInput.value.trim();
          if (!title) { statusMsg.textContent = 'Enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Creating\u2026'; statusMsg.style.color = 'var(--muted)';

          // Resolve meetingMinutesId from URL or raw ID
          var rawMinutes = minutesInput.value.trim();
          var minutesId = '';
          if (rawMinutes) {
            var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
            minutesId = mMatch ? mMatch[1] : rawMinutes;
          }

          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) {
              statusMsg.textContent = 'Event created!'; statusMsg.style.color = 'var(--success)';
              titleInput.value = ''; descInput.value = ''; dateInput.value = '';
              driveInput.value = ''; minutesInput.value = '';
              setTimeout(function() { activeSubTab = 'timeline'; refreshSubTabs(); renderTLSubContent(); }, 800);
            } else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlAddTimelineEvent(SESSION_TOKEN, {
            title: title, eventDate: dateInput.value || '',
            description: descInput.value.trim(), category: catSelect.value,
            driveFileIds: parseDriveIds(driveInput.value).join(','),
            meetingMinutesId: minutesId
          });
        }
      }, 'Create Event'));
    }

    // ── Import form ───────────────────────────────────────────────────────
    function _renderImportForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Import from Google Calendar'));
      cont.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Import events from your Google Calendar. Already-imported events are skipped.'));

      var startInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'Start Date', startInput);
      var endInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'End Date', endInput);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          if (!startInput.value || !endInput.value) { statusMsg.textContent = 'Select both dates.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Importing...'; statusMsg.style.color = 'var(--muted)';
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) { statusMsg.textContent = r.imported + ' events imported!'; statusMsg.style.color = 'var(--success)'; }
            else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlImportCalendarEvents(SESSION_TOKEN, startInput.value, endInput.value);
        }
      }, 'Import Events'));
    }

    // ── Categories management ─────────────────────────────────────────────
    function _renderCategoriesTab(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Manage Categories'));
      cont.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Add or remove event categories. Removing a category does not change existing events.'));

      var listArea = el('div', { style: { marginBottom: '16px' } });
      cont.appendChild(listArea);

      function _loadCats() {
        listArea.innerHTML = '';
        showLoading(listArea);
        serverCall().withSuccessHandler(function(cats) {
          listArea.innerHTML = '';
          cachedCategories = cats || [];
          if (!cats || !cats.length) { listArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'No categories found.')); return; }
          cats.forEach(function(cat) {
            var row = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 10px', borderRadius: '6px', background: 'var(--surfaceAlt)', marginBottom: '4px' } });
            row.appendChild(el('span', { className: 'category-badge ' + cat, style: { fontSize: '12px' } }, cat.charAt(0).toUpperCase() + cat.slice(1)));
            row.appendChild(el('button', {
              style: { fontSize: '11px', padding: '2px 8px', borderRadius: '4px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', cursor: 'pointer' },
              onClick: function() {
                if (!confirm('Remove category \u201C' + cat + '\u201D?')) return;
                serverCall().withSuccessHandler(function(r) {
                  if (r && r.success) _loadCats(); else alert((r && r.message) || 'Delete failed.');
                }).tlDeleteCategory(SESSION_TOKEN, cat);
              }
            }, 'Remove'));
            listArea.appendChild(row);
          });
        }).withFailureHandler(function() {
          listArea.innerHTML = '<div style="color:var(--danger);font-size:13px">Failed to load categories.</div>';
        }).tlGetCategories(SESSION_TOKEN);
      }

      _loadCats();

      var addRow = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
      var newCatInput = el('input', { className: 'form-input', placeholder: 'New category name', style: { flex: '1' } });
      var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginTop: '6px' } });
      addRow.appendChild(newCatInput);
      addRow.appendChild(el('button', {
        className: 'btn btn-primary', style: { whiteSpace: 'nowrap' },
        onClick: function() {
          var name = newCatInput.value.trim();
          if (!name) { statusMsg.textContent = 'Enter a name.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Adding...'; statusMsg.style.color = 'var(--muted)';
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) { newCatInput.value = ''; statusMsg.textContent = ''; _loadCats(); }
            else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlAddCategory(SESSION_TOKEN, name);
        }
      }, 'Add'));
      cont.appendChild(addRow);
      cont.appendChild(statusMsg);
    }

    refreshSubTabs();
    renderTLSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// NEW GRIEVANCE FORM  (v4.32.0)
// ═══════════════════════════════════════

/**
 * Renders the steward grievance intake form.
 * If _grievancePreselectedMember is set (from member profile "Start Grievance" button),
 * the member is pre-selected and their info is auto-populated.
 */
var _grievancePreselectedMember = null;

function renderNewGrievanceForm(appContainer) {
  renderPageLayout(appContainer, 'steward', 'newgrievance', function(container) {
    _stewardHeader(container, 'New Grievance Form');
    var content = el('div', { className: 'content' });

    // ── State ──
    var selectedMember = _grievancePreselectedMember || null;
    _grievancePreselectedMember = null; // consume
    var formOptions = null;
    var isDraft = true; // start in draft mode

    // ── Header card ──
    var headerCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    headerCard.appendChild(el('div', { style: { fontSize: '14px', fontWeight: '600', marginBottom: '6px', color: 'var(--text)' } }, '\uD83D\uDCDD Initiate a Grievance'));
    headerCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5' } },
      'Select a member, fill in grievance details, then preview before submitting. The system will auto-populate member info, generate a PDF, save it to the member\u2019s Drive folder, and notify them.'));
    content.appendChild(headerCard);

    // ── Member search section ──
    var searchCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    searchCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '8px', fontWeight: '600' } }, 'Member'));

    var searchWrapper = el('div', { style: { position: 'relative' } });
    var searchInput = el('input', {
      className: 'form-input',
      placeholder: 'Type to search members by name or email\u2026',
      style: { width: '100%', boxSizing: 'border-box' },
      autocomplete: 'off'
    });
    var resultsDropdown = el('div', {
      style: {
        position: 'absolute', top: '100%', left: '0', right: '0', maxHeight: '220px', overflowY: 'auto',
        background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '0 0 8px 8px',
        zIndex: '100', display: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.15)'
      }
    });

    var selectedMemberDisplay = el('div', { style: { display: 'none', marginTop: '10px', padding: '10px 14px', background: 'var(--accentBg)', borderRadius: '8px', border: '1px solid var(--accentBorder)' } });

    // Fetch all members for search
    var allMembersCache = [];
    serverCall().withSuccessHandler(function(result) {
      if (result && result.success !== false) {
        allMembersCache = Array.isArray(result) ? result : (result.members || []);
      }
      // If preselected, populate
      if (selectedMember) {
        _selectMember(selectedMember);
      }
    }).withFailureHandler(function() {
      searchCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)' } }, 'Failed to load members.'));
    }).dataGetAllMembers(SESSION_TOKEN);

    // Type-ahead search
    var _searchTimeout = null;
    searchInput.addEventListener('input', function() {
      clearTimeout(_searchTimeout);
      _searchTimeout = setTimeout(function() {
        var q = searchInput.value.trim().toLowerCase();
        resultsDropdown.innerHTML = '';
        if (q.length < 2) { resultsDropdown.style.display = 'none'; return; }

        var matches = allMembersCache.filter(function(m) {
          var name = (m.name || '').toLowerCase();
          var email = (m.email || '').toLowerCase();
          return name.indexOf(q) !== -1 || email.indexOf(q) !== -1;
        }).slice(0, 15);

        if (matches.length === 0) {
          resultsDropdown.style.display = 'none';
          return;
        }

        matches.forEach(function(m) {
          var item = el('div', {
            style: { padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border)' },
            onClick: function() {
              selectedMember = m;
              _selectMember(m);
              resultsDropdown.style.display = 'none';
              searchInput.value = '';
            }
          });
          item.appendChild(el('div', { style: { fontWeight: '500', color: 'var(--text)' } }, m.name || m.email));
          var meta = [m.workLocation, m.jobTitle].filter(Boolean).join(' \u00B7 ');
          if (meta) item.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, meta));
          item.addEventListener('mouseenter', function() { item.style.background = 'var(--raised)'; });
          item.addEventListener('mouseleave', function() { item.style.background = 'transparent'; });
          resultsDropdown.appendChild(item);
        });
        resultsDropdown.style.display = '';
      }, 200);
    });

    // Close dropdown on blur (with delay for click)
    searchInput.addEventListener('blur', function() {
      setTimeout(function() { resultsDropdown.style.display = 'none'; }, 200);
    });

    function _selectMember(m) {
      selectedMember = m;
      selectedMemberDisplay.innerHTML = '';
      selectedMemberDisplay.style.display = '';

      var nameRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
      nameRow.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px', color: 'var(--accent)' } }, m.name || m.email));
      var changeBtn = el('button', {
        className: 'btn', style: { fontSize: '11px', padding: '3px 10px' },
        onClick: function() {
          selectedMember = null;
          selectedMemberDisplay.style.display = 'none';
          searchInput.value = '';
          searchInput.focus();
        }
      }, 'Change');
      nameRow.appendChild(changeBtn);
      selectedMemberDisplay.appendChild(nameRow);

      var infoGrid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: '6px 16px', marginTop: '8px' } });
      var fields = [
        { label: 'Email', value: m.email },
        { label: 'Location', value: m.workLocation },
        { label: 'Job Title', value: m.jobTitle },
        { label: 'Unit', value: m.unit },
        { label: 'Hire Date', value: m.hireDate }
      ];
      fields.forEach(function(f) {
        if (!f.value) return;
        var cell = el('div');
        cell.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, f.label));
        cell.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)' } }, String(f.value)));
        infoGrid.appendChild(cell);
      });
      selectedMemberDisplay.appendChild(infoGrid);
    }

    searchWrapper.appendChild(searchInput);
    searchWrapper.appendChild(resultsDropdown);
    searchCard.appendChild(searchWrapper);
    searchCard.appendChild(selectedMemberDisplay);
    content.appendChild(searchCard);

    // ── Form fields ──
    var formCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    formCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '12px', fontWeight: '600' } }, 'Grievance Details'));

    // Load form options (articles, categories, steps, etc.)
    serverCall().withSuccessHandler(function(opts) {
      formOptions = opts || {};
      _buildFormFields();
    }).withFailureHandler(function() {
      formOptions = {};
      _buildFormFields();
    }).dataGetGrievanceFormOptions(SESSION_TOKEN);

    var formFieldsContainer = el('div');
    formCard.appendChild(formFieldsContainer);

    // Form field references
    var fld = {};

    function _buildFormFields() {
      formFieldsContainer.innerHTML = '';

      // Step
      var stepGroup = el('div', { className: 'form-group' });
      stepGroup.appendChild(el('label', { className: 'form-label' }, 'Current Step'));
      fld.step = el('select', { className: 'form-input' });
      var steps = (formOptions.steps && formOptions.steps.length) ? formOptions.steps : ['Informal', 'Step I', 'Step II', 'Step III', 'Mediation', 'Arbitration'];
      steps.forEach(function(s, idx) {
        fld.step.appendChild(el('option', { value: idx + 1 }, s));
      });
      stepGroup.appendChild(fld.step);
      formFieldsContainer.appendChild(stepGroup);

      // Incident Date
      var dateGroup = el('div', { className: 'form-group' });
      dateGroup.appendChild(el('label', { className: 'form-label' }, 'Incident Date'));
      fld.incidentDate = el('input', { type: 'date', className: 'form-input' });
      dateGroup.appendChild(fld.incidentDate);
      formFieldsContainer.appendChild(dateGroup);

      // Issue Category
      var catGroup = el('div', { className: 'form-group' });
      catGroup.appendChild(el('label', { className: 'form-label' }, 'Issue Category'));
      fld.issueCategory = el('select', { className: 'form-input' });
      fld.issueCategory.appendChild(el('option', { value: '' }, '— Select —'));
      var cats = (formOptions.issueCategories && formOptions.issueCategories.length)
        ? formOptions.issueCategories
        : ['Discipline', 'Workload', 'Scheduling', 'Pay', 'Benefits', 'Safety', 'Harassment', 'Discrimination', 'Contract Violation', 'Other'];
      cats.forEach(function(c) { fld.issueCategory.appendChild(el('option', { value: c }, c)); });
      catGroup.appendChild(fld.issueCategory);
      formFieldsContainer.appendChild(catGroup);

      // Articles Violated
      var artGroup = el('div', { className: 'form-group' });
      artGroup.appendChild(el('label', { className: 'form-label' }, 'Article(s) Violated'));
      fld.articles = el('input', { type: 'text', className: 'form-input', placeholder: 'e.g., Art. 13 - Discipline, Art. 6 - Hours of Work' });
      artGroup.appendChild(fld.articles);
      // Suggestion chips for articles
      if (formOptions.articles && formOptions.articles.length) {
        var chipRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px', marginTop: '4px' } });
        formOptions.articles.forEach(function(a) {
          var chip = el('button', {
            style: { fontSize: '10px', padding: '2px 8px', borderRadius: '12px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', cursor: 'pointer' },
            onClick: function() {
              var cur = fld.articles.value.trim();
              if (cur && cur.indexOf(a) === -1) fld.articles.value = cur + ', ' + a;
              else if (!cur) fld.articles.value = a;
            }
          }, a);
          chipRow.appendChild(chip);
        });
        artGroup.appendChild(chipRow);
      }
      formFieldsContainer.appendChild(artGroup);

      // Management Rep(s)
      var mgrGroup = el('div', { className: 'form-group' });
      mgrGroup.appendChild(el('label', { className: 'form-label' }, 'Management Representative(s)'));
      fld.managers = el('select', { className: 'form-input' });
      fld.managers.appendChild(el('option', { value: '' }, '— Select —'));
      var mgrs = (formOptions.managers && formOptions.managers.length) ? formOptions.managers : [];
      mgrs.forEach(function(m) { fld.managers.appendChild(el('option', { value: m }, m)); });
      mgrGroup.appendChild(fld.managers);
      formFieldsContainer.appendChild(mgrGroup);

      // Statement of Violation
      var stmtGroup = el('div', { className: 'form-group' });
      stmtGroup.appendChild(el('label', { className: 'form-label' }, 'Statement of Violation'));
      fld.description = el('textarea', { className: 'msg-textarea', placeholder: 'Describe the violation\u2026', style: { minHeight: '80px', width: '100%', boxSizing: 'border-box' } });
      stmtGroup.appendChild(fld.description);
      formFieldsContainer.appendChild(stmtGroup);

      // Remedy Sought
      var remGroup = el('div', { className: 'form-group' });
      remGroup.appendChild(el('label', { className: 'form-label' }, 'Relief / Remedy Sought'));
      fld.remedy = el('textarea', { className: 'msg-textarea', placeholder: 'Describe the relief or remedy sought\u2026', style: { minHeight: '60px', width: '100%', boxSizing: 'border-box' } });
      remGroup.appendChild(fld.remedy);
      formFieldsContainer.appendChild(remGroup);

      // ── Advanced overrides (collapsed by default) ──
      var advToggle = el('button', {
        className: 'btn', style: { fontSize: '11px', marginTop: '8px', color: 'var(--muted)' },
        onClick: function() {
          advSection.style.display = advSection.style.display === 'none' ? '' : 'none';
          advToggle.textContent = advSection.style.display === 'none' ? '\u25B6 Additional Form Fields' : '\u25BC Additional Form Fields';
        }
      }, '\u25B6 Additional Form Fields');
      formFieldsContainer.appendChild(advToggle);

      var advSection = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
      advSection.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, 'These fields override auto-populated values on the PDF form.'));

      // Job Title override
      var jtGroup = el('div', { className: 'form-group' });
      jtGroup.appendChild(el('label', { className: 'form-label' }, 'Job Title (override)'));
      fld.jobtitle = el('select', { className: 'form-input' });
      fld.jobtitle.appendChild(el('option', { value: '' }, '— Use member\u2019s job title —'));
      var jts = (formOptions.jobTitles && formOptions.jobTitles.length) ? formOptions.jobTitles : [];
      jts.forEach(function(j) { fld.jobtitle.appendChild(el('option', { value: j }, j)); });
      jtGroup.appendChild(fld.jobtitle);
      advSection.appendChild(jtGroup);

      // Region override
      var regGroup = el('div', { className: 'form-group' });
      regGroup.appendChild(el('label', { className: 'form-label' }, 'Region (override)'));
      fld.region = el('select', { className: 'form-input' });
      fld.region.appendChild(el('option', { value: '' }, '— Auto-detect —'));
      fld.region.appendChild(el('option', { value: 'Everett' }, 'Everett'));
      fld.region.appendChild(el('option', { value: 'Worcester' }, 'Worcester'));
      regGroup.appendChild(fld.region);
      advSection.appendChild(regGroup);

      // Agency Start Date override
      var sdGroup = el('div', { className: 'form-group' });
      sdGroup.appendChild(el('label', { className: 'form-label' }, 'Agency Start Date (override)'));
      fld.startdate = el('input', { type: 'date', className: 'form-input' });
      sdGroup.appendChild(fld.startdate);
      advSection.appendChild(sdGroup);

      // Second statement line
      var stmt2Group = el('div', { className: 'form-group' });
      stmt2Group.appendChild(el('label', { className: 'form-label' }, 'Additional Statement'));
      fld.statement2 = el('textarea', { className: 'msg-textarea', placeholder: 'Additional details (optional)\u2026', style: { minHeight: '50px', width: '100%', boxSizing: 'border-box' } });
      stmt2Group.appendChild(fld.statement2);
      advSection.appendChild(stmt2Group);

      // Second remedy line
      var rem2Group = el('div', { className: 'form-group' });
      rem2Group.appendChild(el('label', { className: 'form-label' }, 'Additional Remedy'));
      fld.remedy2 = el('textarea', { className: 'msg-textarea', placeholder: 'Additional remedy (optional)\u2026', style: { minHeight: '50px', width: '100%', boxSizing: 'border-box' } });
      rem2Group.appendChild(fld.remedy2);
      advSection.appendChild(rem2Group);

      formFieldsContainer.appendChild(advSection);
    }

    content.appendChild(formCard);

    // ── Email recipients section ──
    var emailCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    emailCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '8px', fontWeight: '600' } }, 'Email Recipients (optional)'));
    emailCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '10px' } },
      'After the grievance is created, you can email the form to selected recipients. Select who should receive a copy.'));

    var emailCheckboxes = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } });
    var emailRecipients = []; // { email, name, checked }

    // Build recipient list from form options
    function _buildEmailRecipients() {
      emailCheckboxes.innerHTML = '';
      emailRecipients = [];

      // Add member
      if (selectedMember && selectedMember.email) {
        emailRecipients.push({ email: selectedMember.email, name: (selectedMember.name || selectedMember.email) + ' (Member)', checked: false });
      }

      // Add stewards
      if (formOptions && formOptions.stewards) {
        formOptions.stewards.forEach(function(s) {
          if (s && s.indexOf('@') !== -1) {
            emailRecipients.push({ email: s, name: s + ' (Steward)', checked: false });
          } else if (s) {
            emailRecipients.push({ email: '', name: s + ' (Steward)', checked: false, nameOnly: true });
          }
        });
      }

      // Add coordinators
      if (formOptions && formOptions.coordinators) {
        formOptions.coordinators.forEach(function(c) {
          if (c) emailRecipients.push({ email: c, name: c + ' (Coordinator)', checked: false });
        });
      }

      emailRecipients.forEach(function(r, idx) {
        var row = el('label', { style: { display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', color: 'var(--text)', cursor: 'pointer' } });
        var cb = el('input', { type: 'checkbox' });
        cb.addEventListener('change', function() { emailRecipients[idx].checked = cb.checked; });
        row.appendChild(cb);
        row.appendChild(document.createTextNode(r.name));
        emailCheckboxes.appendChild(row);
      });

      if (emailRecipients.length === 0) {
        emailCheckboxes.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Select a member first to see email options.'));
      }
    }

    _buildEmailRecipients();
    emailCard.appendChild(emailCheckboxes);
    content.appendChild(emailCard);

    // ── Preview / Submit section ──
    var actionCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '20px', marginBottom: '8px' } });
    actionCard.appendChild(statusMsg);

    var btnRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });

    // Preview button
    var previewBtn = el('button', {
      className: 'btn', style: { fontSize: '13px', padding: '8px 20px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer', borderRadius: '8px' },
      onClick: function() {
        if (!selectedMember) {
          statusMsg.textContent = 'Please select a member first.';
          statusMsg.style.color = 'var(--danger)';
          return;
        }
        statusMsg.textContent = '';
        _showPreview();
      }
    }, '\uD83D\uDD0D Preview');

    // Submit button
    var submitBtn = el('button', {
      className: 'btn btn-primary', style: { fontSize: '13px', padding: '8px 20px', fontWeight: '600', borderRadius: '8px' },
      onClick: function() {
        _submitGrievance();
      }
    }, '\u2705 Submit Grievance');

    btnRow.appendChild(previewBtn);
    btnRow.appendChild(submitBtn);
    actionCard.appendChild(btnRow);

    // Preview area
    var previewArea = el('div', { style: { display: 'none', marginTop: '12px', padding: '12px', background: 'var(--raised)', borderRadius: '8px', border: '1px solid var(--border)' } });
    actionCard.appendChild(previewArea);
    content.appendChild(actionCard);

    // ── Preview function ──
    function _showPreview() {
      previewArea.innerHTML = '';
      previewArea.style.display = '';

      previewArea.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', marginBottom: '8px', color: 'var(--text)' } }, '\uD83D\uDCCB Grievance Preview'));

      var data = _collectFormData();
      var lines = [
        ['Grievant', (selectedMember.name || selectedMember.email)],
        ['Email', selectedMember.email],
        ['Job Title', data.formOverrides.jobtitle || selectedMember.jobTitle || '\u2014'],
        ['Work Location', selectedMember.workLocation || '\u2014'],
        ['Hire Date', selectedMember.hireDate || '\u2014'],
        ['Step', fld.step ? fld.step.options[fld.step.selectedIndex].text : data.step],
        ['Incident Date', data.incidentDate || '\u2014'],
        ['Issue Category', data.issueCategory || '\u2014'],
        ['Articles', data.articles || '\u2014'],
        ['Manager(s)', data.formOverrides.managers || '\u2014'],
        ['Statement', data.description || '\u2014'],
        ['Remedy', data.remedy || '\u2014']
      ];

      var grid = el('div', { style: { display: 'grid', gridTemplateColumns: '140px 1fr', gap: '4px 12px', fontSize: '12px' } });
      lines.forEach(function(pair) {
        grid.appendChild(el('div', { style: { color: 'var(--muted)', fontWeight: '500' } }, pair[0]));
        grid.appendChild(el('div', { style: { color: 'var(--text)', wordBreak: 'break-word' } }, pair[1]));
      });
      previewArea.appendChild(grid);

      // Email recipients summary
      var checked = emailRecipients.filter(function(r) { return r.checked; });
      if (checked.length > 0) {
        previewArea.appendChild(el('div', { style: { marginTop: '8px', fontSize: '11px', color: 'var(--muted)' } },
          '\u2709 Will email to: ' + checked.map(function(r) { return r.name; }).join(', ')));
      }
    }

    // ── Collect form data ──
    function _collectFormData() {
      return {
        memberEmail: selectedMember ? selectedMember.email : '',
        step: fld.step ? fld.step.value : '1',
        incidentDate: fld.incidentDate ? fld.incidentDate.value : '',
        issueCategory: fld.issueCategory ? fld.issueCategory.value : '',
        articles: fld.articles ? fld.articles.value.trim() : '',
        description: fld.description ? fld.description.value.trim() : '',
        remedy: fld.remedy ? fld.remedy.value.trim() : '',
        formOverrides: {
          jobtitle:   fld.jobtitle ? fld.jobtitle.value : '',
          region:     fld.region ? fld.region.value : '',
          startdate:  fld.startdate ? fld.startdate.value : '',
          managers:   fld.managers ? fld.managers.value : '',
          statement2: fld.statement2 ? fld.statement2.value.trim() : '',
          remedy2:    fld.remedy2 ? fld.remedy2.value.trim() : ''
        }
      };
    }

    // ── Submit ──
    function _submitGrievance() {
      if (!selectedMember) {
        statusMsg.textContent = 'Please select a member first.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }
      if (!fld.description || !fld.description.value.trim()) {
        statusMsg.textContent = 'Statement of violation is required.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting\u2026';
      statusMsg.textContent = 'Creating grievance, generating draft PDF, setting up Drive folder\u2026';
      statusMsg.style.color = 'var(--muted)';

      var data = _collectFormData();
      var idemKey = 'GRV_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

      serverCall()
        .withSuccessHandler(function(r) {
          submitBtn.disabled = false;
          submitBtn.textContent = '\u2705 Submit Grievance';
          if (r && r.success) {
            statusMsg.style.color = 'var(--success)';
            statusMsg.textContent = '\u2713 ' + r.message;

            // Show success details
            previewArea.innerHTML = '';
            previewArea.style.display = '';
            previewArea.appendChild(el('div', { style: { fontSize: '14px', fontWeight: '600', color: 'var(--success)', marginBottom: '8px' } }, '\u2705 Grievance Created'));
            previewArea.appendChild(el('div', { style: { fontSize: '13px', marginBottom: '4px' } }, 'ID: ' + (r.grievanceId || '')));
            previewArea.appendChild(el('div', { style: { fontSize: '13px', marginBottom: '4px' } }, 'Member: ' + (r.memberName || '')));
            if (r.driveFolderUrl) {
              var folderLink = el('a', { href: r.driveFolderUrl, target: '_blank', style: { fontSize: '13px', color: 'var(--accent)', textDecoration: 'none' } }, '\uD83D\uDCC2 Open Case Folder in Drive');
              previewArea.appendChild(folderLink);
            }
            previewArea.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'The member has been notified that their signature is needed. Once signed, you will be notified and can email the document.'));

            // Handle email sending if recipients were selected
            var checkedRecipients = emailRecipients.filter(function(r) { return r.checked && r.email; });
            if (checkedRecipients.length > 0) {
              var emailList = checkedRecipients.map(function(r) { return r.email; }).join(',');
              var subject = 'Grievance Form - ' + (r.grievanceId || '') + ' - ' + (r.memberName || '');
              var mailtoUrl = 'mailto:' + encodeURIComponent(emailList) +
                '?subject=' + encodeURIComponent(subject) +
                '&body=' + encodeURIComponent('A grievance (' + (r.grievanceId || '') + ') has been filed for ' + (r.memberName || '') + '.\n\nCase folder: ' + (r.driveFolderUrl || 'N/A') + '\n\nPlease review the attached grievance form in the case folder.');
              window.open(mailtoUrl, '_blank');
              previewArea.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '4px' } }, '\u2709 Email client opened for selected recipients.'));
            }

            // Refresh badges
            if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
          } else if (r && r.duplicate) {
            statusMsg.textContent = 'Duplicate submission detected.';
            statusMsg.style.color = 'var(--warning)';
          } else {
            statusMsg.textContent = (r && r.message) || 'Error creating grievance.';
            statusMsg.style.color = 'var(--danger)';
          }
        })
        .withFailureHandler(function(err) {
          submitBtn.disabled = false;
          submitBtn.textContent = '\u2705 Submit Grievance';
          statusMsg.textContent = 'Failed: ' + (err && err.message ? err.message : 'Unknown error');
          statusMsg.style.color = 'var(--danger)';
        })
        .dataInitiateGrievance(SESSION_TOKEN, data, idemKey);
    }

    // Re-build email recipients when member changes
    var _origSelectMember = _selectMember;
    _selectMember = function(m) {
      _origSelectMember(m);
      _buildEmailRecipients();
    };

    container.appendChild(content);
  });
}
</script>
