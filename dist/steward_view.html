function renderInsightsPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'insights', function(container) {
    _stewardHeader(container, 'Insights', 'Agency-wide analytics');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Cache: serve immediately on revisit, background-refresh after 5 min
    var CACHE_TTL = ((CONFIG && CONFIG.insightsCacheTTLMin) || 5) * 60 * 1000;
    var cache = AppState.insightsCache;
    var cacheAge = cache ? (Date.now() - (cache.ts || 0)) : Infinity;

    if (cache && cacheAge < CACHE_TTL) {
      _renderInsightsContent(content, cache.stats, cache.hotSpots, cache.perf, cache.sat, cache.memberStats, cache.workload);
      return;
    }
    if (cache) {
      // Stale: render stale immediately, refresh in background
      _renderInsightsContent(content, cache.stats, cache.hotSpots, cache.perf, cache.sat, cache.memberStats, cache.workload);
    } else {
      showLoading(content);
    }

    // v4.33.0 — Single batch call replaces 6 parallel server calls (saves ~5 round-trips of IPC overhead)
    serverCall().withSuccessHandler(function(batch) {
      if (!batch) batch = {};
      var statsData = batch.stats || (cache && cache.stats) || { available: false };
      var hotSpotsData = batch.hotSpots || (cache && cache.hotSpots) || [];
      var perfData = batch.perf || (cache && cache.perf) || [];
      var satData = batch.sat || (cache && cache.sat) || { categories: [] };
      var memberStatsData = batch.memberStats || (cache && cache.memberStats) || null;
      var workloadData = batch.workload || (cache && cache.workload) || { available: false };
      AppState.insightsCache = { ts: Date.now(), stats: statsData, hotSpots: hotSpotsData, perf: perfData, sat: satData, memberStats: memberStatsData, workload: workloadData };
      _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData);
    }).withFailureHandler(function() {
      var statsData = (cache && cache.stats) || { available: false };
      var hotSpotsData = (cache && cache.hotSpots) || [];
      var perfData = (cache && cache.perf) || [];
      var satData = (cache && cache.sat) || { categories: [] };
      var memberStatsData = (cache && cache.memberStats) || null;
      var workloadData = (cache && cache.workload) || { available: false };
      _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData);
    }).dataGetInsightsBatch(SESSION_TOKEN);
  });
}

function _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData) {
  content.innerHTML = '';
  // Detail panel for drill-down views
  var detailPanel = el('div', { style: { display: 'none', marginBottom: '16px' } });
  content.appendChild(detailPanel);

  var mainContent = el('div');
  content.appendChild(mainContent);

  // Track current detail render for hash-based navigation
  var _currentDetailTitle = null;
  var _currentDetailRenderFn = null;
  var _detailRegistry = {};

  function _closeDetail() {
    detailPanel.style.display = 'none';
    mainContent.style.display = 'block';
    _currentDetailTitle = null;
    _currentDetailRenderFn = null;
    if (location.hash.indexOf('#insight-') === 0) {
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  function showDetail(title, renderFn) {
    detailPanel.innerHTML = '';
    detailPanel.style.display = 'block';
    mainContent.style.display = 'none';
    _currentDetailTitle = title;
    _currentDetailRenderFn = renderFn;

    // Set hash for back-button support
    var slug = 'insight-' + title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
    _detailRegistry[slug] = { title: title, renderFn: renderFn };
    history.pushState(null, '', '#' + slug);

    // Scroll to top
    content.scrollIntoView({ behavior: 'smooth', block: 'start' });

    var backBtn = el('button', { className: 'btn btn-sm', style: { marginBottom: '12px', fontSize: '12px' }, onClick: _closeDetail }, '\u2190 Back to Insights');
    detailPanel.appendChild(backBtn);
    detailPanel.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)', marginBottom: '12px' } }, title));

    renderFn(detailPanel);
  }

  // Listen for browser back button — single global handler to prevent accumulation
  if (window._insightsHashHandler) {
    window.removeEventListener('hashchange', window._insightsHashHandler);
  }
  window._insightsHashHandler = function() {
    var hash = location.hash.replace('#', '');
    if (_detailRegistry[hash] && detailPanel.style.display === 'none') {
      showDetail(_detailRegistry[hash].title, _detailRegistry[hash].renderFn);
    } else if (!hash || hash.indexOf('insight-') !== 0) {
      if (detailPanel.style.display !== 'none') _closeDetail();
    }
  };
  window.addEventListener('hashchange', window._insightsHashHandler);

  if (!statsData || !statsData.available) {
    mainContent.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, 'Grievance stats not yet available (minimum 10 records needed).'));
  } else {
    _renderQuickInsights(mainContent, statsData, hotSpotsData, showDetail);
    _renderFiledVsResolved(mainContent, statsData);
  }
  if (memberStatsData && memberStatsData.available) _renderMembershipInsights(mainContent, memberStatsData, showDetail);
  if (workloadData && (workloadData.success || workloadData.data)) _renderWorkloadInsights(mainContent, workloadData, showDetail);
  if (perfData && perfData.length > 0) _renderPerformanceSection(mainContent, perfData, showDetail);
  if (satData && satData.categories && satData.categories.length > 0) _renderSatisfactionSection(mainContent, satData, showDetail);

  // Correlation Engine — fetch separately to avoid slowing the main batch
  var corrPlaceholder = el('div', { id: 'correlation-insights-section' });
  mainContent.appendChild(corrPlaceholder);
  serverCall().withSuccessHandler(function(res) {
    if (!res || !res.success) return;
    var summary = res.summary;
    if (!summary || summary.disabled || summary.total === 0) return;
    _renderCorrelationInsights(corrPlaceholder, summary, showDetail);
  }).withFailureHandler(function() { /* silent — optional section */ }).dataGetCorrelationSummary(SESSION_TOKEN);
}

function _renderMembershipInsights(container, ms, showDetail) {
  var section = el('div', { style: { marginBottom: '16px' } });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',

  }}, 'Membership Overview'));

  grid.appendChild(_insightCard('TOTAL MEMBERS', 'var(--info)', _fmtNum(ms.total), '', function() {
    if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'members');
  }));

  // New members (last 90 days)
  var newCount = ms.newMembersLast90 || 0;
  var newSub = '';
  if (ms.byHireMonth) {
    var hireMonths = Object.keys(ms.byHireMonth).sort().slice(-3);
    newSub = hireMonths.map(function(k) { return k.slice(5) + ': ' + ms.byHireMonth[k]; }).join(', ');
  }
  grid.appendChild(_insightCard('NEW MEMBERS', 'var(--success)', _fmtNum(newCount), newSub || 'Last 90 days', function() {
    if (showDetail && ms.byHireMonth) showDetail('New Hires by Month', function(panel) {
      var items = Object.keys(ms.byHireMonth).sort().map(function(k) { return { label: k, count: ms.byHireMonth[k] }; });
      _renderInsightDetailList(panel, items, 'var(--success)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'members');
  }));

  // Dues breakdown
  var duesEntries = [];
  if (ms.byDues) Object.keys(ms.byDues).forEach(function(k) { duesEntries.push({ label: k, count: ms.byDues[k] }); });
  duesEntries.sort(function(a, b) { return b.count - a.count; });
  var duesSub = duesEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('DUES STATUS', 'var(--success)', duesEntries.length > 0 ? duesEntries[0].label : 'N/A', duesSub, function() {
    if (showDetail) showDetail('Dues Status Breakdown', function(panel) {
      _renderInsightDetailList(panel, duesEntries, 'var(--success)');
    });
  }));

  // Location breakdown
  var locEntries = [];
  if (ms.byLocation) Object.keys(ms.byLocation).forEach(function(k) { locEntries.push({ label: k, count: ms.byLocation[k] }); });
  locEntries.sort(function(a, b) { return b.count - a.count; });
  var locSub = locEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('TOP LOCATION', 'var(--accent)', locEntries.length > 0 ? locEntries[0].label : 'N/A', locSub, function() {
    if (showDetail) showDetail('Members by Location', function(panel) {
      _renderInsightDetailList(panel, locEntries, 'var(--accent)');
    });
  }));

  // Unit breakdown
  var unitEntries = [];
  if (ms.byUnit) Object.keys(ms.byUnit).forEach(function(k) { unitEntries.push({ label: k, count: ms.byUnit[k] }); });
  unitEntries.sort(function(a, b) { return b.count - a.count; });
  var unitSub = unitEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('TOP UNIT', 'var(--warning)', unitEntries.length > 0 ? unitEntries[0].label : 'N/A', unitSub, function() {
    if (showDetail) showDetail('Members by Unit', function(panel) {
      _renderInsightDetailList(panel, unitEntries, 'var(--warning)');
    });
  }));

  section.appendChild(grid);
  container.appendChild(section);
}

function _renderWorkloadInsights(container, wl, showDetail) {
  // Workload data is nested: { success, data: { totalSubmissions, members, categories, averages } }
  var d = (wl && wl.data) || wl || {};
  if (!d || (!d.totalSubmissions && !d.categories)) return;

  var section = el('div', { style: { marginBottom: '16px' } });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Workload Overview'));

  var grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '10px', marginBottom: '12px' } });

  var totalSubmissions = d.totalSubmissions || 0;
  var memberCount = d.members || 0;
  grid.appendChild(_insightCard('SUBMISSIONS', 'var(--info)', _fmtNum(totalSubmissions), memberCount + ' stewards reporting', function() {
    if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'workload');
  }));

  // Extract averages from the data — averages keys are CATEGORY_LABELS values
  var avgs = d.averages || {};
  var avgPriority = parseFloat(avgs['Priority Cases']) || 0;
  var avgPending = parseFloat(avgs['Pending Cases']) || 0;
  var avgAged = parseFloat(avgs['Aged Cases']) || 0;

  grid.appendChild(_insightCard('AVG PRIORITY CASES', avgPriority > 5 ? 'var(--danger)' : 'var(--success)', String(avgPriority), 'Per steward average', function() {
    if (showDetail) showDetail('Workload Breakdown', function(panel) {
      // Build items from all category averages
      var items = [];
      for (var key in avgs) {
        items.push({ label: key + ' (avg)', count: parseFloat(avgs[key]) || 0 });
      }
      items.sort(function(a, b) { return b.count - a.count; });
      _renderInsightDetailList(panel, items, 'var(--info)');
      var navBtn = el('button', { className: 'btn btn-primary', style: { marginTop: '12px', fontSize: '12px' }, onClick: function() {
        if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'workload');
      }}, 'View Workload Tracker \u2192');
      panel.appendChild(navBtn);
    });
  }));

  grid.appendChild(_insightCard('AVG PENDING', avgPending > 10 ? 'var(--warning)' : 'var(--success)', String(avgPending), 'Cases awaiting action'));
  grid.appendChild(_insightCard('AVG AGED CASES', avgAged > 3 ? 'var(--danger)' : 'var(--success)', String(avgAged), 'Cases 60+ days old'));

  // Overtime and employment mix from workload data
  var avgOvertime = parseFloat(avgs['Overtime Hours']) || 0;
  if (avgOvertime > 0) {
    grid.appendChild(_insightCard('AVG OVERTIME', avgOvertime > 10 ? 'var(--danger)' : 'var(--warning)', String(avgOvertime) + 'h', 'Hours per steward'));
  }
  var avgFTE = parseFloat(avgs['Full-Time Employees']) || parseFloat(avgs['FTE Count']) || 0;
  var avgPTE = parseFloat(avgs['Part-Time Employees']) || parseFloat(avgs['PTE Count']) || 0;
  if (avgFTE > 0 || avgPTE > 0) {
    var mixRatio = avgFTE > 0 ? Math.round((avgFTE / (avgFTE + avgPTE)) * 100) : 0;
    grid.appendChild(_insightCard('EMPLOYMENT MIX', 'var(--accent)', mixRatio + '% FT', 'FT: ' + avgFTE + ' / PT: ' + avgPTE + ' avg'));
  }

  section.appendChild(grid);
  container.appendChild(section);
}

function _fmtNum(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function _insightCard(title, color, mainText, subText, onClick) {
  var card = el('div', { className: 'card card-glass', style: {
    padding: '16px 18px', borderLeft: '3px solid ' + color,
    background: color + '08',
    cursor: onClick ? 'pointer' : 'default',
    transition: 'transform 0.15s ease',
  }});
  if (onClick) {
    card.onclick = onClick;
    card.onmouseenter = function() { card.style.transform = 'translateY(-2px)'; };
    card.onmouseleave = function() { card.style.transform = ''; };
  }
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '11px', fontWeight: '600',
    color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px',
  }}, title));
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '24px', fontWeight: '700', color: color, lineHeight: '1.2',
  }}, mainText));
  if (subText) {
    card.appendChild(el('div', { style: {
      fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)', marginTop: '6px', lineHeight: '1.4',
    }}, subText));
  }
  return card;
}

function _renderQuickInsights(container, stats, hotSpots, showDetail) {
  var grid = el('div', { style: {
    display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
    gap: '10px', marginBottom: '16px',
  }});

  // Box 1: Grievance Status
  var activeCount = stats.openCount || 0;
  var statusSub = _fmtNum(stats.total) + ' total';
  var parts = [];
  if (stats.wonCount) parts.push(_fmtNum(stats.wonCount) + ' won');
  if (stats.deniedCount) parts.push(_fmtNum(stats.deniedCount) + ' denied');
  if (stats.settledCount) parts.push(_fmtNum(stats.settledCount) + ' settled');
  if (parts.length) statusSub += ' \u00B7 ' + parts.join(', ');
  grid.appendChild(_insightCard('GRIEVANCE STATUS', 'var(--info)', _fmtNum(activeCount) + ' Active', statusSub, function() {
    if (showDetail) showDetail('Grievance Status Details', function(panel) {
      var items = [{ label: 'Active / Open', count: activeCount }];
      if (stats.wonCount) items.push({ label: 'Won', count: stats.wonCount });
      if (stats.deniedCount) items.push({ label: 'Denied', count: stats.deniedCount });
      if (stats.settledCount) items.push({ label: 'Settled', count: stats.settledCount });
      if (stats.withdrawnCount) items.push({ label: 'Withdrawn', count: stats.withdrawnCount });
      _renderInsightDetailList(panel, items, 'var(--info)');
      // Add link to cases
      var navBtn = el('button', { className: 'btn btn-primary', style: { marginTop: '12px', fontSize: '12px' }, onClick: function() {
        if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
      }}, 'View All Cases \u2192');
      panel.appendChild(navBtn);
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 2: Hot Spots
  var hsCount = hotSpots ? hotSpots.length : 0;
  var hsColor = hsCount > 0 ? 'var(--danger)' : 'var(--success)';
  var hsSub = hsCount > 0
    ? hotSpots.slice(0, 3).map(function(h) { return h.location + ' (' + h.count + ')'; }).join(', ')
    : 'No concentration areas detected';
  grid.appendChild(_insightCard('HOT SPOTS', hsColor, hsCount > 0 ? hsCount + ' Location' + (hsCount > 1 ? 's' : '') : 'All Clear', hsSub, function() {
    if (showDetail && hotSpots && hotSpots.length > 0) showDetail('Grievance Hot Spots', function(panel) {
      var hsItems = hotSpots.map(function(h) { return { label: h.location, count: h.count }; });
      _renderInsightDetailList(panel, hsItems, 'var(--danger)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 3: Step Distribution
  var stepEntries = [];
  if (stats.byStep) {
    Object.keys(stats.byStep).forEach(function(k) { stepEntries.push({ step: k, count: stats.byStep[k] }); });
    stepEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var stepsWithCases = stepEntries.filter(function(e) { return e.count > 0; }).length;
  var stepSub = stepEntries.slice(0, 3).map(function(e) { return e.step + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('STEP DISTRIBUTION', 'var(--accent)', stepsWithCases + ' Step' + (stepsWithCases !== 1 ? 's' : ''), stepSub, function() {
    if (showDetail) showDetail('Grievance Step Distribution', function(panel) {
      var sItems = stepEntries.map(function(e) { return { label: e.step, count: e.count }; });
      _renderInsightDetailList(panel, sItems, 'var(--accent)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 4: Top Issue Category
  var catEntries = [];
  if (stats.byCategory) {
    Object.keys(stats.byCategory).forEach(function(k) { catEntries.push({ cat: k, count: stats.byCategory[k] }); });
    catEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var filteredCats = catEntries.filter(function(e) { return e.cat.toLowerCase() !== 'uncategorized'; });
  var topCat = filteredCats.length > 0 ? filteredCats[0] : (catEntries.length > 0 ? catEntries[0] : { cat: 'N/A', count: 0 });
  grid.appendChild(_insightCard('TOP ISSUE CATEGORY', 'var(--warning)', topCat.cat, topCat.count + ' cases', function() {
    if (showDetail) showDetail('Issue Categories', function(panel) {
      var cItems = catEntries.map(function(e) { return { label: e.cat, count: e.count }; });
      _renderInsightDetailList(panel, cItems, 'var(--warning)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 5: Overdue Cases
  var overdueVal = stats.overdueCount || 0;
  var dueSoonVal = stats.dueSoonCount || 0;
  var overdueColor = overdueVal > 0 ? 'var(--danger)' : 'var(--success)';
  var overdueSub = dueSoonVal > 0 ? dueSoonVal + ' due this week' : 'No upcoming deadlines';
  grid.appendChild(_insightCard('OVERDUE CASES', overdueColor, _fmtNum(overdueVal), overdueSub, function() {
    if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  container.appendChild(grid);
}

function _renderFiledVsResolved(container, stats) {
  if (typeof ChartHelper === 'undefined' || !stats.monthly || stats.monthly.length === 0) return;

  var chartCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '16px' } });
  chartCard.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Filed vs Resolved'));

  var labels = stats.monthly.map(function(m) { return m.month; });
  var filedData = stats.monthly.map(function(m) { return m.count; });
  var resolvedData = (stats.monthlyResolved || []).map(function(m) { return m.count; });

  ChartHelper.createLineChart(chartCard, 'insights-filed-resolved', labels, [
    { label: 'Filed', data: filedData, color: '#f59e0b' },
    { label: 'Resolved', data: resolvedData, color: '#22c55e' },
  ]);

  container.appendChild(chartCard);
}

// Helper: renders a detailed breakdown list for drill-down views
function _renderInsightDetailList(panel, items, color) {
  if (!items || items.length === 0) {
    panel.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No data available.'));
    return;
  }
  var maxCount = Math.max.apply(null, items.map(function(i) { return i.count || 0; }));
  items.forEach(function(item) {
    var row = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '12px' } });
    var labelEl = el('div', { style: { flex: '1', minWidth: '0' } });
    labelEl.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, item.label));
    // Progress bar — sm (4px) relative-to-max chart bar
    var pct = maxCount > 0 ? Math.round(((item.count || 0) / maxCount) * 100) : 0;
    var barBg = el('div', { className: 'prog-track prog-track--sm', style: { marginTop: '4px' } });
    barBg.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%', background: color } }));
    labelEl.appendChild(barBg);
    row.appendChild(labelEl);
    row.appendChild(el('div', { style: { fontSize: '16px', fontWeight: '700', color: color, minWidth: '40px', textAlign: 'right' } }, _fmtNum(item.count || 0)));
    panel.appendChild(row);
  });
}

function _renderPerformanceSection(container, perfData, showDetail) {
  var section = el('div', { style: { marginBottom: '16px' } });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, CONFIG.stewardLabel + ' Performance'));

  // Aggregate stats — weighted by case count for accuracy
  var totalWon = 0, totalClosed = 0, totalDaysWeighted = 0, totalDaysCount = 0, count = 0;
  perfData.forEach(function(p) {
    totalWon += p.won || 0;
    totalClosed += p.closed || 0;
    if (p.closed > 0) { totalDaysWeighted += (p.avgDays || 0) * p.closed; totalDaysCount += p.closed; }
    count++;
  });
  var avgWin = totalClosed > 0 ? Math.round((totalWon / totalClosed) * 100) : 0;
  // Fallback: average individual winRate values if no won/closed counts available
  if (avgWin === 0 && count > 0) {
    var sumRate = 0, rateCount = 0;
    perfData.forEach(function(p) { if (p.winRate > 0) { sumRate += p.winRate; rateCount++; } });
    if (rateCount > 0) avgWin = Math.round(sumRate / rateCount);
  }
  var avgDays = totalDaysCount > 0 ? Math.round(totalDaysWeighted / totalDaysCount) : 0;

  var statsRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '12px' } });
  statsRow.appendChild(_insightCard('AVG WIN RATE', 'var(--success)', avgWin + '%', count + ' ' + CONFIG.stewardLabel.toLowerCase() + 's', function() {
    if (showDetail) showDetail(CONFIG.stewardLabel + ' Win Rates', function(panel) {
      var items = perfData.map(function(p) { return { label: p.steward, count: p.winRate || 0 }; });
      items.sort(function(a, b) { return b.count - a.count; });
      items.forEach(function(item) { item.label = item.label + ' (' + item.count + '%)'; });
      _renderInsightDetailList(panel, items, 'var(--success)');
    });
  }));
  statsRow.appendChild(_insightCard('AVG RESOLUTION', 'var(--info)', avgDays + 'd', 'Days to close', function() {
    if (showDetail) showDetail('Resolution Time by ' + CONFIG.stewardLabel, function(panel) {
      var items = perfData.filter(function(p) { return p.avgDays > 0; }).map(function(p) { return { label: p.steward + ' (' + p.avgDays + ' days)', count: p.avgDays }; });
      items.sort(function(a, b) { return a.count - b.count; }); // fastest first
      _renderInsightDetailList(panel, items, 'var(--info)');
    });
  }));
  statsRow.appendChild(_insightCard('TEAM SIZE', 'var(--accent)', String(count), 'Active ' + CONFIG.stewardLabel.toLowerCase() + 's'));
  section.appendChild(statsRow);

  // Top performers table
  var tableCard = el('div', { className: 'card card-glass', style: { padding: '14px', overflow: 'auto' } });
  var table = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '12px', fontFamily: 'var(--fontBody)' } });
  var thead = el('tr');
  ['Name', 'Cases', 'Won', 'Win%', 'Avg Days', 'Score'].forEach(function(h) {
    thead.appendChild(el('th', { style: { textAlign: 'left', padding: '6px 8px', color: 'var(--muted)', fontSize: '10px', textTransform: 'uppercase', borderBottom: '1px solid var(--border)' } }, h));
  });
  table.appendChild(thead);

  perfData.slice(0, 10).forEach(function(p) {
    var row = el('tr');
    var scoreColor = p.performanceScore >= 80 ? 'var(--success)' : p.performanceScore >= 50 ? 'var(--warning)' : 'var(--danger)';
    [p.steward, p.totalCases, p.won, p.winRate + '%', p.avgDays, p.performanceScore].forEach(function(val, idx) {
      var style = { padding: '6px 8px', color: idx === 5 ? scoreColor : 'var(--text)', fontWeight: idx === 5 ? '700' : '400', borderBottom: '1px solid var(--border)' };
      row.appendChild(el('td', { style: style }, String(val)));
    });
    table.appendChild(row);
  });
  tableCard.appendChild(table);
  section.appendChild(tableCard);
  container.appendChild(section);
}

function _renderSatisfactionSection(container, trends, showDetail) {
  var section = el('div', { style: { marginBottom: '16px' } });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Member Satisfaction Trends'));

  // Overall score card — clickable for category drill-down
  var scoreColor = trends.overall >= 7 ? 'var(--success)' : trends.overall >= 5 ? 'var(--warning)' : 'var(--danger)';
  var overallCard = el('div', { className: 'card card-glass', style: {
    padding: '16px', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '16px',
    cursor: showDetail ? 'pointer' : 'default', transition: 'transform 0.15s ease',
  }});
  if (showDetail) {
    overallCard.onmouseenter = function() { overallCard.style.transform = 'translateY(-2px)'; };
    overallCard.onmouseleave = function() { overallCard.style.transform = ''; };
    overallCard.onclick = function() {
      showDetail('Satisfaction Category Breakdown', function(panel) {
        if (trends.categories && trends.categories.length > 0) {
          var items = trends.categories.map(function(c) { return { label: c.name + ' (avg: ' + c.avg + ')', count: Math.round(c.avg * 10) }; });
          _renderInsightDetailList(panel, items, scoreColor);
        }
        panel.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '12px' } }, trends.responseCount + ' total responses'));
      });
    };
  }
  overallCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '32px', fontWeight: '700', color: scoreColor } }, String(trends.overall)));
  var overallInfo = el('div');
  overallInfo.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', fontWeight: '600' } }, 'Overall Score'));
  overallInfo.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, trends.responseCount + ' responses'));
  if (showDetail) overallInfo.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--accent)', marginTop: '4px' } }, 'Tap for details \u2192'));
  overallCard.appendChild(overallInfo);
  section.appendChild(overallCard);

  // Horizontal bar chart of categories
  if (typeof ChartHelper !== 'undefined' && trends.categories.length > 0) {
    var chartCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
    var labels = trends.categories.map(function(c) { return c.name; });
    var data = trends.categories.map(function(c) { return c.avg; });
    ChartHelper.createHorizontalBarChart(chartCard, 'insights-satisfaction-chart', labels, data);
    section.appendChild(chartCard);
  } else if (trends.categories.length > 0) {
    // Fallback: simple bars
    var barsCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
    trends.categories.forEach(function(cat) {
      var row = el('div', { style: { marginBottom: '10px' } });
      var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '3px' } });
      header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text)' } }, cat.name));
      header.appendChild(el('span', { style: { fontSize: '11px', fontWeight: '600', color: cat.avg >= 7 ? 'var(--success)' : cat.avg >= 5 ? 'var(--warning)' : 'var(--danger)' } }, String(cat.avg)));
      row.appendChild(header);
      var satColorClass = cat.avg >= 7 ? 'prog-fill--success' : cat.avg >= 5 ? 'prog-fill--warning' : 'prog-fill--danger';
      var barBg = el('div', { className: 'prog-track prog-track--md' });
      barBg.appendChild(el('div', { className: 'prog-fill ' + satColorClass, style: { width: (cat.avg * 10) + '%' } }));
      row.appendChild(barBg);
      barsCard.appendChild(row);
    });
    section.appendChild(barsCard);
  }

  container.appendChild(section);
}

// ═══════════════════════════════════════
// SEARCH PAGE (v4.33.0 — both roles)
// ═══════════════════════════════════════

function renderSearchPage(appContainer) {
  var role = AppState.userRole || 'steward';
  renderPageLayout(appContainer, role, 'search', function(container) {
    _stewardHeader(container, 'Search', 'Find members and grievances');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Search input
    var searchRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '16px' } });
    var input = el('input', {
      type: 'text', placeholder: 'Search by name, email, ID, or status...',
      style: { flex: '1', padding: '10px 14px', borderRadius: '10px', border: '1px solid var(--border)', background: 'var(--card)', color: 'var(--text)', fontSize: '14px', boxSizing: 'border-box' },
      autofocus: true
    });
    searchRow.appendChild(input);

    // Tab filter
    var tabSelect = el('select', {
      style: { padding: '10px 12px', borderRadius: '10px', border: '1px solid var(--border)', background: 'var(--card)', color: 'var(--text)', fontSize: '13px' }
    });
    ['all', 'members', 'grievances'].forEach(function(t) {
      var opt = el('option', { value: t }, t.charAt(0).toUpperCase() + t.slice(1));
      tabSelect.appendChild(opt);
    });
    searchRow.appendChild(tabSelect);
    content.appendChild(searchRow);

    var resultsContainer = el('div');
    content.appendChild(resultsContainer);

    var _debounceTimer = null;

    function doSearch() {
      var q = (input.value || '').trim();
      if (q.length < 2) {
        resultsContainer.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px">Type at least 2 characters to search.</div>';
        return;
      }
      resultsContainer.innerHTML = '';
      showLoading(resultsContainer, 'search');
      serverCall().withSuccessHandler(function(res) {
        resultsContainer.innerHTML = '';
        if (!res || !res.success) {
          resultsContainer.appendChild(el('div', { style: { color: 'var(--danger)', padding: '20px', textAlign: 'center' } }, (res && res.message) || 'Search failed.'));
          return;
        }
        var results = res.results || [];
        if (results.length === 0) {
          resultsContainer.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No results found for "' + safeText(q) + '".'));
          return;
        }
        // Result count
        resultsContainer.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '10px' } }, results.length + ' result' + (results.length !== 1 ? 's' : '')));
        results.forEach(function(r) {
          var card = el('div', { className: 'card card-glass', style: {
            padding: '12px 14px', marginBottom: '8px', cursor: 'pointer',
            transition: 'transform 0.12s ease, box-shadow 0.12s ease',
          }});
          card.onmouseenter = function() { card.style.transform = 'translateY(-1px)'; card.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)'; };
          card.onmouseleave = function() { card.style.transform = ''; card.style.boxShadow = ''; };

          var header = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
          var typeColor = r.type === 'member' ? 'var(--info)' : 'var(--warning)';
          var typeLabel = r.type === 'member' ? 'MEMBER' : 'CASE';
          header.appendChild(el('span', { style: { fontSize: '9px', fontWeight: '700', padding: '2px 6px', borderRadius: '6px', background: typeColor, color: '#fff', textTransform: 'uppercase', letterSpacing: '0.5px' } }, typeLabel));
          header.appendChild(el('span', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, safeText(r.title || '')));
          card.appendChild(header);

          if (r.subtitle) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)' } }, safeText(r.subtitle)));
          if (r.detail) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '2px' } }, safeText(r.detail)));

          // Navigate on click
          card.onclick = function() {
            if (r.type === 'member' && typeof _handleTabNav === 'function') {
              _handleTabNav(role, 'members');
            } else if (r.type === 'grievance' && typeof _handleTabNav === 'function') {
              _handleTabNav(role, role === 'steward' ? 'cases' : 'cases');
            }
          };
          resultsContainer.appendChild(card);
        });
      }).withFailureHandler(function(err) {
        resultsContainer.innerHTML = '';
        resultsContainer.appendChild(el('div', { style: { color: 'var(--danger)', padding: '20px', textAlign: 'center' } }, 'Search failed: ' + safeText((err && err.message) || 'Unknown error')));
      }).dataGetWebAppSearchResults(SESSION_TOKEN, q, tabSelect.value);
    }

    input.addEventListener('input', function() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(doSearch, 300);
    });
    tabSelect.addEventListener('change', doSearch);

    // Initial state
    resultsContainer.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px">Type at least 2 characters to search.</div>';
  });
}

// CORRELATION INSIGHTS (v4.33.0 — no PII)

function _renderCorrelationInsights(container, summary, showDetail) {
  container.innerHTML = '';
  var section = el('div', { style: { marginBottom: '16px' } });

  // Section header
  var headerRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' } });

    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)',
  }}, 'Statistical Correlations'));
  if (summary.actionableCount > 0) {
    headerRow.appendChild(el('span', { style: {
      fontSize: '10px', fontWeight: '600', padding: '2px 8px', borderRadius: '10px',
      background: 'var(--accent)', color: '#fff',
    }}, summary.actionableCount + ' actionable'));
  }
  section.appendChild(headerRow);

  // Summary KPI grid
  var grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '8px', marginBottom: '12px' } });
  var items = [
    { label: 'STRONG', value: summary.strong, color: 'var(--danger)' },
    { label: 'MODERATE', value: summary.moderate, color: 'var(--warning)' },
    { label: 'WEAK', value: summary.weak, color: 'var(--muted)' },
    { label: 'TOTAL', value: summary.total, color: 'var(--info)' }
  ];
  items.forEach(function(item) {
    var card = el('div', { className: 'card card-glass', style: { padding: '12px', textAlign: 'center' } });
    card.appendChild(el('div', { style: { fontSize: '20px', fontWeight: '700', color: item.color } }, String(item.value)));
    card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, item.label));
    grid.appendChild(card);
  });
  section.appendChild(grid);

  // Top insights list
  if (summary.topInsights && summary.topInsights.length > 0) {
    var listCard = el('div', { className: 'card card-glass', style: { padding: '12px' } });
    listCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' } }, 'Top Insights'));
    summary.topInsights.forEach(function(ins) {
      var row = el('div', { style: { display: 'flex', alignItems: 'flex-start', gap: '10px', padding: '8px 0', borderBottom: '1px solid var(--border)' } });

      // Correlation badge
      var rAbs = Math.abs(ins.r || 0).toFixed(2);
      var badgeColor = ins.strength === 'strong' ? 'var(--danger)' : ins.strength === 'moderate' ? 'var(--warning)' : 'var(--muted)';
      row.appendChild(el('div', { style: {
        minWidth: '44px', textAlign: 'center', padding: '4px 6px', borderRadius: '6px',
        fontSize: '11px', fontWeight: '700', color: '#fff', background: badgeColor,
      }}, 'r=' + rAbs));

      var info = el('div', { style: { flex: '1' } });
      info.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, ins.title));
      if (ins.insight) {
        info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '2px' } }, ins.insight));
      }
      row.appendChild(info);
      listCard.appendChild(row);
    });
    section.appendChild(listCard);

    // Drill-down detail view
    if (showDetail) {
      var viewAll = el('button', { className: 'btn btn-sm', style: { marginTop: '8px', fontSize: '11px' }, onClick: function() {
        showDetail('All Correlations', function(panel) {
          // Fetch full alerts for the detail view
          serverCall().withSuccessHandler(function(res) {
            if (!res || !res.success || !res.alerts || res.alerts.length === 0) {
              panel.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px', textAlign: 'center' } }, 'No actionable alerts at this time.'));
              return;
            }
            res.alerts.forEach(function(alert) {
              var alertCard = el('div', { className: 'card card-glass', style: { padding: '12px', marginBottom: '8px' } });
              var alertHeader = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' } });
              var sevColor = alert.severity === 'high' ? 'var(--danger)' : 'var(--warning)';
              alertHeader.appendChild(el('span', { className: 'material-icons', style: { fontSize: '18px', color: sevColor } }, alert.icon || 'trending_up'));
              alertHeader.appendChild(el('span', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, alert.title));
              if (alert.actionable) {
                alertHeader.appendChild(el('span', { style: { fontSize: '9px', padding: '2px 6px', borderRadius: '8px', background: sevColor, color: '#fff', fontWeight: '600' } }, 'ACTION'));
              }
              alertCard.appendChild(alertHeader);
              alertCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.4' } }, alert.message));
              alertCard.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '6px' } }, 'r = ' + (alert.r || 0).toFixed(2) + ' | n = ' + (alert.sampleSize || 0)));
              panel.appendChild(alertCard);
            });
          }).withFailureHandler(function() {
            panel.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px' } }, 'Failed to load correlation alerts.'));
          }).dataGetCorrelationAlerts(SESSION_TOKEN);
        });
      }}, 'View All Correlations \u2192');
      section.appendChild(viewAll);
    }
  }

  container.appendChild(section);
}

// ═══════════════════════════════════════
// STEWARD DIRECTORY (steward role, v4.15.0)
// ═══════════════════════════════════════

function renderStewardDirectoryPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'stewarddirectory', function(container) {
    _stewardHeader(container, CONFIG.stewardLabel + ' Directory', 'Contact your fellow stewards');
    var content = el('div', { className: 'content' });
    showLoading(content, 'member-list');
    container.appendChild(content);

    serverCall().withSuccessHandler(function(stewards) {
      content.innerHTML = '';
      if (!stewards || stewards.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
        return;
      }

      // Search input
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search by name, location, or unit...',
        onInput: function() { renderList(searchInput.value.toLowerCase(), activeLocFilter); },
      });
      content.appendChild(searchInput);

      // Location quick-filter pills
      var locs = {};
      stewards.forEach(function(s) { if (s.workLocation) locs[s.workLocation] = (locs[s.workLocation] || 0) + 1; });
      var topLocs = Object.keys(locs).sort(function(a, b) { return locs[b] - locs[a]; }).slice(0, 5);
      var activeLocFilter = '';

      var pillBar = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' } });
      function renderPills() {
        pillBar.innerHTML = '';
        var clearPill = el('button', {
          style: {
            fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
            background: !activeLocFilter ? 'var(--accent)' : 'var(--surface)',
            color: !activeLocFilter ? '#fff' : 'var(--muted)',
            border: '1px solid ' + (!activeLocFilter ? 'var(--accent)' : 'var(--border)'),
          },
          onClick: function() { activeLocFilter = ''; renderPills(); renderList(searchInput.value.toLowerCase(), ''); },
        }, 'All');
        pillBar.appendChild(clearPill);
        topLocs.forEach(function(loc) {
          var pill = el('button', {
            style: {
              fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
              background: activeLocFilter === loc ? 'var(--accent)' : 'var(--surface)',
              color: activeLocFilter === loc ? '#fff' : 'var(--muted)',
              border: '1px solid ' + (activeLocFilter === loc ? 'var(--accent)' : 'var(--border)'),
            },
            onClick: function() { activeLocFilter = loc; renderPills(); renderList(searchInput.value.toLowerCase(), loc); },
          }, loc);
          pillBar.appendChild(pill);
        });
      }
      if (topLocs.length > 1) {
        renderPills();
        content.appendChild(pillBar);
      }

      var listArea = el('div');
      content.appendChild(listArea);

      function renderList(query, locFilter) {
        listArea.innerHTML = '';
        var filtered = stewards.filter(function(s) {
          if (locFilter && (s.workLocation || '') !== locFilter) return false;
          if (!query) return true;
          return (s.name || '').toLowerCase().indexOf(query) !== -1
            || (s.workLocation || '').toLowerCase().indexOf(query) !== -1
            || (s.unit || '').toLowerCase().indexOf(query) !== -1;
        });

        if (filtered.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)' } }, 'No matches.'));
          return;
        }

        // Smart sort: (1) same work location as current user, (2) in office today, (3) alphabetical
        var myLocation = (CURRENT_USER && CURRENT_USER.workLocation) ? CURRENT_USER.workLocation.trim().toLowerCase() : '';
        var days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        var todayName = days[new Date().getDay()];
        function isInOfficeToday(s) {
          if (!s.officeDays) return false;
          return s.officeDays.toLowerCase().indexOf(todayName) !== -1;
        }
        filtered.sort(function(a, b) {
          var aLoc = (a.workLocation || '').trim().toLowerCase();
          var bLoc = (b.workLocation || '').trim().toLowerCase();
          var aMatch = myLocation && aLoc === myLocation ? 0 : 1;
          var bMatch = myLocation && bLoc === myLocation ? 0 : 1;
          if (aMatch !== bMatch) return aMatch - bMatch;
          var aOffice = isInOfficeToday(a) ? 0 : 1;
          var bOffice = isInOfficeToday(b) ? 0 : 1;
          if (aOffice !== bOffice) return aOffice - bOffice;
          return (a.name || '').localeCompare(b.name || '');
        });

        filtered.forEach(function(s, i) {
          var card = el('div', {
            className: 'card card-glass card-fade-in',
            style: { padding: '14px 16px', marginBottom: '6px', cursor: 'pointer', animationDelay: (i * 0.04) + 's' },
          });
          var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
          topRow.appendChild(el('div', { className: 'member-list-avatar' }, (s.name || 'S').charAt(0).toUpperCase()));
          var info = el('div', { style: { flex: '1' } });
          info.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, s.name || s.email));
          var meta = [];
          if (s.workLocation) meta.push(s.workLocation);
          if (s.unit) meta.push(s.unit);
          info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, meta.join(' \u00B7 ')));
          topRow.appendChild(info);
          card.appendChild(topRow);

          // Expandable details
          var details = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          if (s.email) details.appendChild(el('a', { href: 'mailto:' + s.email, style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginBottom: '4px' } }, '\u2709\uFE0F ' + s.email));
          if (s.phone) details.appendChild(el('a', { href: 'tel:' + s.phone, style: { display: 'block', fontSize: '12px', color: 'var(--success)', marginBottom: '4px' } }, '\uD83D\uDCDE ' + s.phone));
          if (s.officeDays) details.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px' } }, '\uD83D\uDCC5 In-office: ' + s.officeDays));

          // vCard download button
          details.appendChild(el('button', {
            style: { fontSize: '11px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accent)', color: '#fff', fontWeight: '600', marginTop: '4px' },
            onClick: function(e) {
              e.stopPropagation();
              var vcf = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + (s.name || '') + '\n';
              if (s.email) vcf += 'EMAIL:' + s.email + '\n';
              if (s.phone) vcf += 'TEL:' + s.phone + '\n';
              if (s.workLocation) vcf += 'ORG:' + (CONFIG.orgName || '') + ';' + s.workLocation + '\n';
              if (s.unit) vcf += 'TITLE:' + CONFIG.stewardLabel + ' - ' + s.unit + '\n';
              vcf += 'END:VCARD';
              var blob = new Blob([vcf], { type: 'text/vcard' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url;
              a.download = (s.name || 'contact').replace(/\s+/g, '_') + '.vcf';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            },
          }, '\uD83D\uDCBE Save Contact'));
          card.appendChild(details);

          card.addEventListener('click', function() {
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
          });
          listArea.appendChild(card);
        });
      }
      renderList('', '');
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load directory.'));
    }).dataGetStewardDirectory(SESSION_TOKEN);
  });
}

// ═══════════════════════════════════════
// CASE CHECKLIST — Steward Case Detail (v4.16.0)
// ═══════════════════════════════════════

function _renderCaseChecklist(container, caseId) {
  var section = el('div', { style: { padding: '0 16px 12px' } });
  section.appendChild(el('h3', { className: 'section-title' }, 'Case Checklist'));
  var checklistContent = el('div');
  showLoading(checklistContent);
  section.appendChild(checklistContent);
  container.appendChild(section);

  serverCall().withSuccessHandler(function(items) {
    checklistContent.innerHTML = '';
    if (!items || items.length === 0) {
      checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', padding: '8px 0' } }, 'No checklist items for this case.'));
      return;
    }

    // Progress bar
    var completed = items.filter(function(i) { return i.completed; }).length;
    var pct = Math.round((completed / items.length) * 100);
    var progRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } });
    var progBar = el('div', { className: 'prog-track prog-track--md', style: { flex: '1' } });
    progBar.appendChild(el('div', { className: 'prog-fill' + (pct === 100 ? ' prog-fill--success' : ''), style: { width: pct + '%' } }));
    progRow.appendChild(progBar);
    progRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', whiteSpace: 'nowrap' } }, completed + '/' + items.length + ' (' + pct + '%)'));
    checklistContent.appendChild(progRow);

    // Group by category
    var grouped = {};
    items.forEach(function(item) {
      var cat = item.category || 'General';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(item);
    });

    Object.keys(grouped).forEach(function(cat) {
      checklistContent.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', margin: '10px 0 4px', fontWeight: '600' } }, cat));
      grouped[cat].forEach(function(item) {
        var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '5px 0', cursor: 'pointer' },
          onClick: function() {
            var newState = !item.completed;
            cb.style.opacity = '0.4';
            serverCall().withSuccessHandler(function(result) {
              if (result && result.success) {
                item.completed = newState;
                cb.textContent = newState ? '\u2611' : '\u2610';
                cb.style.color = newState ? 'var(--success)' : 'var(--muted)';
                label.style.textDecoration = newState ? 'line-through' : 'none';
                label.style.color = newState ? 'var(--muted)' : 'var(--text)';
                // Refresh progress
                var newCompleted = items.filter(function(i) { return i.completed; }).length;
                var newPct = Math.round((newCompleted / items.length) * 100);
                progBar.firstChild.style.width = newPct + '%';
                progBar.firstChild.style.background = newPct === 100 ? 'var(--success)' : 'var(--accent)';
                progRow.lastChild.textContent = newCompleted + '/' + items.length + ' (' + newPct + '%)';
              }
              cb.style.opacity = '1';
            }).withFailureHandler(function() { cb.style.opacity = '1'; }).dataToggleChecklistItem(SESSION_TOKEN, item.checklistId, !item.completed);
          }
        });
        var cb = el('span', { style: { fontSize: '16px', color: item.completed ? 'var(--success)' : 'var(--muted)', cursor: 'pointer' } }, item.completed ? '\u2611' : '\u2610');
        row.appendChild(cb);
        var label = el('span', { style: { fontSize: '12px', color: item.completed ? 'var(--muted)' : 'var(--text)', textDecoration: item.completed ? 'line-through' : 'none', flex: '1' } }, item.itemText);
        row.appendChild(label);
        if (item.required) row.appendChild(el('span', { style: { fontSize: '9px', color: 'var(--danger)', fontWeight: '600' } }, 'REQ'));
        checklistContent.appendChild(row);
      });
    });
  }).withFailureHandler(function() {
    checklistContent.innerHTML = '';
    checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', padding: '8px 0' } }, 'Failed to load checklist.'));
  }).dataGetCaseChecklist(SESSION_TOKEN, caseId);
}

// POLLS MANAGEMENT (steward, v4.23.0 — merged Weekly Questions + Polls)
// ═══════════════════════════════════════
// Steward can:
//   • See this week's live poll results
//   • Create/replace the steward poll for this week (with guide)

//   • View past poll history
// Community pool is drawn automatically every Monday — stewards cannot
// pick from it or approve submissions.

function renderManagePolls(appContainer) {
  renderPageLayout(appContainer, 'steward', 'polls', function(container) {
    _stewardHeader(container, 'Polls', 'Create polls · view community results');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'live';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      [
        { id: 'live',   label: 'This Week' },
        { id: 'create', label: 'Create Poll' },
        { id: 'past',   label: 'History' },
      ].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; refreshSubTabs(); renderSub(); }
        }, tab.label));
      });
    }

    function renderSub() {
      subContent.innerHTML = '';
      if (activeSubTab === 'live')   _renderLivePollsSteward(subContent);
      if (activeSubTab === 'create') _renderCreateStewardPoll(subContent);
      if (activeSubTab === 'past')   _renderPollHistorySteward(subContent);

    renderSub();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });

function _renderLivePollsSteward(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(data) {
    container.innerHTML = '';
    if (!data || !data.questions || data.questions.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No active polls this week. Create one in the "Create Poll" tab.'));
      return;
    }
    container.appendChild(el('div', { className: 'privacy-badge', style: { marginBottom: '14px' } }, '🔒 Votes are anonymous — individual responses are never stored'));
    data.questions.forEach(function(q) {
      var card = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '10px' } });
      var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' } });
      var titleCol = el('div');
      titleCol.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, q.text));
      titleCol.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '2px' } },
        q.source === 'community' ? '🌐 Community poll (random draw)' : '🗳️ ' + (CONFIG.stewardLabel || 'Steward') + ' poll'));
      topRow.appendChild(titleCol);
      var closeBtn = el('button', { className: 'btn btn-secondary', style: { width: 'auto', padding: '4px 10px', fontSize: '11px', flexShrink: '0', marginLeft: '8px' },
        onClick: function() {
          closeBtn.textContent = 'Closing…'; closeBtn.disabled = true;
          serverCall().withSuccessHandler(function(result) {
            if (result && result.success) { _renderLivePollsSteward(container); }
            else { closeBtn.textContent = 'Close'; closeBtn.disabled = false; }
          }).wqClosePoll(SESSION_TOKEN, q.id);
        }
      }, 'Close');
      topRow.appendChild(closeBtn);
      card.appendChild(topRow);

      // Results
      var stats = q.stats || {};
      var total = stats.total || 0;
      var counts = stats.counts || {};
      var colors = ['var(--accent)', 'var(--success)', '#facc15', '#f97316', '#a78bfa'];
      (q.options || []).forEach(function(opt, i) {
        var count = counts[opt] || 0;
        var pct = total > 0 ? Math.round((count / total) * 100) : 0;
        var row = el('div', { style: { marginBottom: '6px' } });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '2px' } });
        header.appendChild(el('span', { style: { color: 'var(--text)' } }, opt));
        header.appendChild(el('span', { style: { color: 'var(--muted)' } }, pct + '%  (' + count + ')'));
        row.appendChild(header);
        var bar = el('div', { className: 'prog-track prog-track--md' });
        bar.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%', background: colors[i % colors.length] } }));
        row.appendChild(bar);
        card.appendChild(row);
      });
      card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, total + ' anonymous vote' + (total !== 1 ? 's' : '')));
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load polls.'));
  }).wqGetActiveQuestions(SESSION_TOKEN);
}

function _renderCreateStewardPoll(container) {
  // Guide
  if (typeof _renderPollGuide === 'function') _renderPollGuide(container);
  else {
    container.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px', padding: '10px', border: '1px solid var(--border)', borderRadius: '8px' } },
      '📋 Good polls: neutral framing, one concept, balanced options, 2–5 choices. Avoid leading questions.'));
  }

  var formCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
  formCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, "Create This Week's " + (CONFIG.stewardLabel || 'Steward') + ' Poll'));
  formCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Replaces any existing steward poll for this week. The community poll is drawn automatically from the member pool each Monday.'));

  var questionInput = el('textarea', { className: 'msg-textarea', placeholder: 'Poll question…', style: { minHeight: '70px', marginBottom: '10px' } });
  formCard.appendChild(questionInput);
  formCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px' } }, 'Answer options (2–5):'));
  var optBuilder = typeof _buildOptionInputs === 'function' ? _buildOptionInputs(formCard, null) : null;

  var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '18px', marginBottom: '8px' } });
  formCard.appendChild(statusMsg);
  formCard.appendChild(el('button', { className: 'btn btn-primary', style: { marginTop: '6px' },
    onClick: function() {
      var text = questionInput.value.trim();
      var opts = optBuilder ? optBuilder.getOptions() : [];
      if (!text) { statusMsg.textContent = 'Please enter a question.'; statusMsg.style.color = 'var(--danger)'; return; }
      if (opts.length < 2) { statusMsg.textContent = 'Add at least 2 answer options.'; statusMsg.style.color = 'var(--danger)'; return; }
      statusMsg.textContent = 'Creating…'; statusMsg.style.color = 'var(--muted)';
      serverCall().withSuccessHandler(function(result) {
        statusMsg.textContent = result && result.success ? '✅ ' + result.message : (result && result.message) || 'Error creating poll.';
        statusMsg.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
        if (result && result.success) questionInput.value = '';
      }).withFailureHandler(function() {
        statusMsg.textContent = 'Failed to create poll.'; statusMsg.style.color = 'var(--danger)';
      }).wqSetStewardQuestion(SESSION_TOKEN, text, opts);
    }
  }, 'Post Poll'));
  container.appendChild(formCard);

  // Frequency setting
  var freqCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '14px' } });
  freqCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, '⏱️ Poll Frequency'));
  freqCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '10px' } }, 'How often should new polls be posted? Affects both the steward poll and community pool draw.'));

  var freqStatus = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '6px' } });
  var freqBtns = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });

  serverCall().withSuccessHandler(function(currentFreq) {
    ['weekly', 'biweekly', 'monthly'].forEach(function(freq) {
      var labels = { weekly: '📅 Weekly', biweekly: '📆 Bi-weekly', monthly: '🗓️ Monthly' };
      var btn = el('button', {
        className: 'btn freq-btn' + (currentFreq === freq ? ' btn-primary' : ' btn-secondary'),
        style: { width: 'auto', padding: '8px 16px', fontSize: '12px' },
        onClick: function() {
          freqStatus.textContent = 'Saving…'; freqStatus.style.color = 'var(--muted)';
          freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
          serverCall().withSuccessHandler(function(result) {
            freqStatus.textContent = result && result.success ? '✅ ' + result.message : (result && result.message) || 'Error.';
            freqStatus.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
            if (result && result.success) {
              freqBtns.querySelectorAll('button').forEach(function(b) {
                b.className = (b.getAttribute('data-freq') === freq ? 'btn btn-primary' : 'btn btn-secondary') + ' freq-btn';
              });
            }
          }).withFailureHandler(function() {
            freqStatus.textContent = 'Failed to save.'; freqStatus.style.color = 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
          }).wqSetPollFrequency(SESSION_TOKEN, freq);
        }
      }, labels[freq]);
      btn.setAttribute('data-freq', freq);
      freqBtns.appendChild(btn);
    });
  }).withFailureHandler(function() {
    freqBtns.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Could not load frequency setting.'));
  }).wqGetPollFrequency();

  freqCard.appendChild(freqBtns);
  freqCard.appendChild(freqStatus);
  container.appendChild(freqCard);

  // Community pool card — pool count + manual draw trigger
  serverCall().withSuccessHandler(function(count) {
    var poolCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '14px' } });
    poolCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, '🌐 Community Poll Pool'));
    poolCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } },
      (count || 0) + ' question' + (count !== 1 ? 's' : '') + ' in the pool. One is drawn randomly each period — you cannot select which one. Use this to release the community poll now without waiting for the Monday trigger.'));

    var drawStatus = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '6px' } });
    var drawBtn = el('button', {
      className: 'btn btn-secondary',
      style: { width: 'auto', padding: '8px 18px', fontSize: '12px' },
      onClick: function() {
        if (count === 0) {
          drawStatus.textContent = 'Pool is empty — members must submit poll questions first.';
          drawStatus.style.color = 'var(--danger)';
          return;
        }
        if (!confirm('Draw a random community poll now? This replaces any existing community poll for this period.')) return;
        drawBtn.textContent = 'Drawing…';
        drawBtn.disabled = true;
        drawStatus.textContent = '';
        serverCall().withSuccessHandler(function(result) {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          if (result && result.success) {
            drawStatus.textContent = '✅ Community poll released: "' + (result.text || '').substring(0, 60) + (result.text && result.text.length > 60 ? '…' : '') + '"';
            drawStatus.style.color = 'var(--success)';
          } else {
            drawStatus.textContent = (result && result.message) || 'Draw failed.';
            drawStatus.style.color = 'var(--danger)';
          }
        }).withFailureHandler(function() {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          drawStatus.textContent = 'Request failed.';
          drawStatus.style.color = 'var(--danger)';
        }).wqManualDrawCommunityPoll(SESSION_TOKEN);
      }
    }, 'Draw Community Poll');

    if (count === 0) {
      drawBtn.disabled = true;
      drawBtn.title = 'No questions in pool yet';
    }

    poolCard.appendChild(drawBtn);
    poolCard.appendChild(drawStatus);
    container.appendChild(poolCard);
  }).wqGetPoolCount();
}

function _renderPollHistorySteward(container) {
  showLoading(container, 'list');
  function loadPage(p) {
    showLoading(container);
    serverCall().withSuccessHandler(function(data) {
      container.innerHTML = '';
      if (!data || !data.questions || data.questions.length === 0) {
        container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, p > 1 ? 'No more history.' : 'No past polls.'));
        return;
      }
      data.questions.forEach(function(q) {
        var card = el('div', { className: 'card card-glass', style: { padding: '13px', marginBottom: '8px' } });

            row.appendChild(el('div', { style: { width: '120px', fontSize: '11px', color: 'var(--muted)', flexShrink: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, opt));
            var bar = el('div', { className: 'prog-track prog-track--md', style: { flex: '1' } });
            bar.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%' } }));
            row.appendChild(bar);
            row.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text)', width: '36px', textAlign: 'right' } }, pct + '%'));
            card.appendChild(row);
          });
          card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '4px' } }, total + ' votes'));
        } else {
          card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'No votes'));
        }
        container.appendChild(card);
      });
      if (data.hasMore || p > 1) {
        var nav = el('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '14px' } });
        if (p > 1) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { loadPage(p - 1); } }, '← Previous'));
        if (data.hasMore) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { loadPage(p + 1); } }, 'Next →'));
        container.appendChild(nav);
      }
    }).withFailureHandler(function() {
      container.innerHTML = '';
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load history.'));
    }).wqGetHistory(SESSION_TOKEN, p, 15);
  }
  loadPage(1);
}

function renderStewardMinutes(appContainer) {

// Pagination: 10 per page, load 100 records (v4.20.18)
var _MINUTES_PAGE_SIZE = 10;

function _renderMinutesList(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(minutes) {
    container.innerHTML = '';
    if (!minutes || minutes.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No meeting minutes yet.'));
      return;
    }

    var filtered = minutes;
    var currentPage = 0;

    var filterInput = el('input', { type: 'text', className: 'msg-textarea', placeholder: 'Search minutes...', style: { marginBottom: '10px', minHeight: '36px' } });
    container.appendChild(filterInput);

    var listArea = el('div');
    var pagerArea = el('div', { style: { marginTop: '12px' } });
    container.appendChild(listArea);
    container.appendChild(pagerArea);

    filterInput.addEventListener('input', function() {
      var q = filterInput.value.toLowerCase();
      filtered = q ? minutes.filter(function(m) {
        return (m.title || '').toLowerCase().indexOf(q) !== -1 ||
               (m.meetingDate || '').toLowerCase().indexOf(q) !== -1 ||
               (m.bullets || '').toLowerCase().indexOf(q) !== -1;
      }) : minutes;
      renderPage(0);
    });

    function renderPage(page) {
      currentPage = page;
      listArea.innerHTML = '';
      var totalPages = Math.ceil(filtered.length / _MINUTES_PAGE_SIZE) || 1;
      var start = page * _MINUTES_PAGE_SIZE;
      var slice = filtered.slice(start, start + _MINUTES_PAGE_SIZE);

      if (slice.length === 0) {
        listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No matching minutes.'));
      }

      slice.forEach(function(m) {
        var card = el('div', { className: 'card card-glass card-clickable', style: { padding: '14px', marginBottom: '8px' } });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '6px' } });
        header.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, m.title));
        header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, m.meetingDate));
        card.appendChild(header);
        if (m.bullets) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5', whiteSpace: 'pre-wrap' } }, m.bullets));

        var expanded = false;
        var fullDiv = el('div', { style: { display: 'none', fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap' } }, m.fullMinutes || '');
        card.appendChild(fullDiv);
        if (m.driveDocUrl && /^https?:\/\//i.test(m.driveDocUrl)) {
          card.appendChild(el('a', { href: m.driveDocUrl, target: '_blank', style: { display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: 'var(--accent)', marginTop: '6px', textDecoration: 'none' } }, '\uD83D\uDCC4 Open Google Doc'));
        }
        if (m.fullMinutes) {
          card.addEventListener('click', function() { expanded = !expanded; fullDiv.style.display = expanded ? 'block' : 'none'; });
        }
        listArea.appendChild(card);
      });

      // Pagination controls
      pagerArea.innerHTML = '';
      var pagerRow = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px', marginBottom: '6px' } });
      var prevBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page === 0 ? '0.3' : '1', pointerEvents: page === 0 ? 'none' : 'auto' },
        onClick: function() { renderPage(page - 1); }
      }, '← Prev');
      var pageLabel = el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Page ' + (page + 1) + ' of ' + totalPages);
      var nextBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page >= totalPages - 1 ? '0.3' : '1', pointerEvents: page >= totalPages - 1 ? 'none' : 'auto' },
        onClick: function() { renderPage(page + 1); }
      }, 'Next →');
      pagerRow.appendChild(prevBtn);
      pagerRow.appendChild(pageLabel);
      pagerRow.appendChild(nextBtn);
      pagerArea.appendChild(pagerRow);

function renderFeedbackPage(appContainer, role) {
  var pageRole = role || 'steward';
  renderPageLayout(appContainer, pageRole, 'feedback', function(container) {
    if (pageRole === 'steward') _stewardHeader(container, 'Feedback', 'Report bugs or suggest features');
    else _memberHeader(container, 'Feedback', 'Report bugs or suggest features');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'submit';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['submit', 'my submissions'].forEach(function(tab) {
        var key = tab === 'my submissions' ? 'history' : tab;
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === key ? ' active' : ''),
          onClick: function() { activeSubTab = key; refreshSubTabs(); renderSub(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSub() {
      subContent.innerHTML = '';
      if (activeSubTab === 'submit') _renderFeedbackForm(subContent);
      else _renderMyFeedback(subContent);
    }

    refreshSubTabs();
    renderSub();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);

function _renderFeedbackForm(container) {
  var formCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });

  var categorySelect = el('select', { className: 'msg-textarea', style: { marginBottom: '8px', minHeight: '36px' } });

    var btn = el('button', { className: 'sub-tab' + (p === 'Medium' ? ' active' : ''), style: { flex: '1' },

      statusMsg.textContent = 'Submitting...'; statusMsg.style.color = 'var(--muted)';
      serverCall().withSuccessHandler(function(result) {
        if (result && result.success) {
          statusMsg.textContent = 'Feedback submitted! Thank you.'; statusMsg.style.color = 'var(--success)';
          titleInput.value = ''; descInput.value = '';
        } else {
          statusMsg.textContent = (result && result.message) || 'Error submitting.'; statusMsg.style.color = 'var(--danger)';

  }, 'Submit Feedback'));

  container.appendChild(formCard);

  showLoading(container, 'list');

    container.innerHTML = '';

      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No feedback submitted yet.'));

      topRow.appendChild(el('span', { style: { fontSize: '10px', fontWeight: '600', color: statusColor, background: statusColor + '18', padding: '2px 8px', borderRadius: '8px' } }, item.status));

        restoreStatus.innerHTML = '<div style="color:var(--muted)">Restoring...</div>';
        serverCall().withSuccessHandler(function(r) {
          if (r && r.success) {
            restoreStatus.innerHTML = '<div style="color:var(--success);font-weight:600">\u2705 ' + safeText(r.message || 'Restore complete.') + '</div>';
          } else {
            restoreStatus.innerHTML = '<div style="color:var(--danger)">' + safeText((r && r.message) || 'Restore failed.') + '</div>';
          }
        }).withFailureHandler(function(err) {
          restoreStatus.innerHTML = '<div style="color:var(--danger)">Restore failed: ' + safeText((err && err.message) || err) + '</div>';
        }).fsRestoreFromBackup(SESSION_TOKEN, fId, sName, true);
      }
    }, 'Restore from Backup'));
    content.appendChild(restoreCard);

    container.appendChild(content);
  });
}
