  overallCard.appendChild(overallInfo);
  section.appendChild(overallCard);

  // Horizontal bar chart of categories
  if (typeof ChartHelper !== 'undefined' && trends.categories.length > 0) {
    var chartCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
    var labels = trends.categories.map(function(c) { return c.name; });
    var data = trends.categories.map(function(c) { return c.avg; });
    ChartHelper.createHorizontalBarChart(chartCard, 'insights-satisfaction-chart', labels, data);
    section.appendChild(chartCard);
  } else if (trends.categories.length > 0) {
    // Fallback: simple bars
    var barsCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
    trends.categories.forEach(function(cat) {
      var row = el('div', { style: { marginBottom: '10px' } });
      var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '3px' } });
      header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text)' } }, cat.name));
      header.appendChild(el('span', { style: { fontSize: '11px', fontWeight: '600', color: cat.avg >= 7 ? 'var(--success)' : cat.avg >= 5 ? 'var(--warning)' : 'var(--danger)' } }, String(cat.avg)));
      row.appendChild(header);
      var barBg = el('div', { style: { height: '8px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden' } });
      barBg.appendChild(el('div', { style: { height: '100%', width: (cat.avg * 10) + '%', background: cat.avg >= 7 ? 'var(--success)' : cat.avg >= 5 ? 'var(--warning)' : 'var(--danger)', borderRadius: '4px', transition: 'width 0.6s ease' } }));
      row.appendChild(barBg);
      barsCard.appendChild(row);
    });
    section.appendChild(barsCard);
  }

  container.appendChild(section);
}

// ═══════════════════════════════════════
// STEWARD DIRECTORY (steward role, v4.15.0)
// ═══════════════════════════════════════

function renderStewardDirectoryPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'stewarddirectory', function(container) {
    _stewardHeader(container, CONFIG.stewardLabel + ' Directory', 'Contact your fellow stewards');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    serverCall().withSuccessHandler(function(stewards) {
      content.innerHTML = '';
      if (!stewards || stewards.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
        return;
      }

      // Search input
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search by name, location, or unit...',
        onInput: function() { renderList(searchInput.value.toLowerCase(), activeLocFilter); },
      });
      content.appendChild(searchInput);

      // Location quick-filter pills
      var locs = {};
      stewards.forEach(function(s) { if (s.workLocation) locs[s.workLocation] = (locs[s.workLocation] || 0) + 1; });
      var topLocs = Object.keys(locs).sort(function(a, b) { return locs[b] - locs[a]; }).slice(0, 5);
      var activeLocFilter = '';

      var pillBar = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' } });
      function renderPills() {
        pillBar.innerHTML = '';
        var clearPill = el('button', {
          style: {
            fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
            background: !activeLocFilter ? 'var(--accent)' : 'var(--surface)',
            color: !activeLocFilter ? '#fff' : 'var(--muted)',
            border: '1px solid ' + (!activeLocFilter ? 'var(--accent)' : 'var(--border)'),
          },
          onClick: function() { activeLocFilter = ''; renderPills(); renderList(searchInput.value.toLowerCase(), ''); },
        }, 'All');
        pillBar.appendChild(clearPill);
        topLocs.forEach(function(loc) {
          var pill = el('button', {
            style: {
              fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
              background: activeLocFilter === loc ? 'var(--accent)' : 'var(--surface)',
              color: activeLocFilter === loc ? '#fff' : 'var(--muted)',
              border: '1px solid ' + (activeLocFilter === loc ? 'var(--accent)' : 'var(--border)'),
            },
            onClick: function() { activeLocFilter = loc; renderPills(); renderList(searchInput.value.toLowerCase(), loc); },
          }, loc);
          pillBar.appendChild(pill);
        });
      }
      if (topLocs.length > 1) {
        renderPills();
        content.appendChild(pillBar);
      }

      var listArea = el('div');
      content.appendChild(listArea);

      function renderList(query, locFilter) {
        listArea.innerHTML = '';
        var filtered = stewards.filter(function(s) {
          if (locFilter && (s.workLocation || '') !== locFilter) return false;
          if (!query) return true;
          return (s.name || '').toLowerCase().indexOf(query) !== -1
            || (s.workLocation || '').toLowerCase().indexOf(query) !== -1
            || (s.unit || '').toLowerCase().indexOf(query) !== -1;
        });

        if (filtered.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)' } }, 'No matches.'));
          return;
        }

        // Smart sort: (1) same work location as current user, (2) in office today, (3) alphabetical
        var myLocation = (CURRENT_USER && CURRENT_USER.workLocation) ? CURRENT_USER.workLocation.trim().toLowerCase() : '';
        var days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        var todayName = days[new Date().getDay()];
        function isInOfficeToday(s) {
          if (!s.officeDays) return false;
          return s.officeDays.toLowerCase().indexOf(todayName) !== -1;
        }
        filtered.sort(function(a, b) {
          var aLoc = (a.workLocation || '').trim().toLowerCase();
          var bLoc = (b.workLocation || '').trim().toLowerCase();
          var aMatch = myLocation && aLoc === myLocation ? 0 : 1;
          var bMatch = myLocation && bLoc === myLocation ? 0 : 1;
          if (aMatch !== bMatch) return aMatch - bMatch;
          var aOffice = isInOfficeToday(a) ? 0 : 1;
          var bOffice = isInOfficeToday(b) ? 0 : 1;
          if (aOffice !== bOffice) return aOffice - bOffice;
          return (a.name || '').localeCompare(b.name || '');
        });

        filtered.forEach(function(s, i) {
          var card = el('div', {
            className: 'card card-glass card-fade-in',
            style: { padding: '14px 16px', marginBottom: '6px', cursor: 'pointer', animationDelay: (i * 0.04) + 's' },
          });
          var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
          topRow.appendChild(el('div', { className: 'member-list-avatar' }, (s.name || 'S').charAt(0).toUpperCase()));
          var info = el('div', { style: { flex: '1' } });
          info.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, s.name || s.email));
          var meta = [];
          if (s.workLocation) meta.push(s.workLocation);
          if (s.unit) meta.push(s.unit);
          info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, meta.join(' \u00B7 ')));
          topRow.appendChild(info);
          card.appendChild(topRow);

          // Expandable details
          var details = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          if (s.email) details.appendChild(el('a', { href: 'mailto:' + s.email, style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginBottom: '4px' } }, '\u2709\uFE0F ' + s.email));
          if (s.phone) details.appendChild(el('a', { href: 'tel:' + s.phone, style: { display: 'block', fontSize: '12px', color: 'var(--success)', marginBottom: '4px' } }, '\uD83D\uDCDE ' + s.phone));
          if (s.officeDays) details.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px' } }, '\uD83D\uDCC5 In-office: ' + s.officeDays));

          // vCard download button
          details.appendChild(el('button', {
            style: { fontSize: '11px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accent)', color: '#fff', fontWeight: '600', marginTop: '4px' },
            onClick: function(e) {
              e.stopPropagation();
              var vcf = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + (s.name || '') + '\n';
              if (s.email) vcf += 'EMAIL:' + s.email + '\n';
              if (s.phone) vcf += 'TEL:' + s.phone + '\n';
              if (s.workLocation) vcf += 'ORG:' + (CONFIG.orgName || '') + ';' + s.workLocation + '\n';
              if (s.unit) vcf += 'TITLE:' + CONFIG.stewardLabel + ' - ' + s.unit + '\n';
              vcf += 'END:VCARD';
              var blob = new Blob([vcf], { type: 'text/vcard' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url;
              a.download = (s.name || 'contact').replace(/\s+/g, '_') + '.vcf';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            },
          }, '\uD83D\uDCBE Save Contact'));
          card.appendChild(details);

          card.addEventListener('click', function() {
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
          });
          listArea.appendChild(card);
        });
      }
      renderList('', '');
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load directory.'));
    }).dataGetStewardDirectory(SESSION_TOKEN);
  });
}

// ═══════════════════════════════════════
// CASE CHECKLIST — Steward Case Detail (v4.16.0)
// ═══════════════════════════════════════

function _renderCaseChecklist(container, caseId) {
  var section = el('div', { style: { padding: '0 16px 12px' } });
  section.appendChild(el('h3', { className: 'section-title' }, 'Case Checklist'));
  var checklistContent = el('div');
  showLoading(checklistContent);
  section.appendChild(checklistContent);
  container.appendChild(section);

  serverCall().withSuccessHandler(function(items) {
    checklistContent.innerHTML = '';
    if (!items || items.length === 0) {
      checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', padding: '8px 0' } }, 'No checklist items for this case.'));
      return;
    }

    // Progress bar
    var completed = items.filter(function(i) { return i.completed; }).length;
    var pct = Math.round((completed / items.length) * 100);
    var progRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } });
    var progBar = el('div', { style: { flex: '1', height: '8px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden' } });
    progBar.appendChild(el('div', { style: { height: '100%', width: pct + '%', background: pct === 100 ? 'var(--success)' : 'var(--accent)', transition: 'width 0.4s ease', borderRadius: '4px' } }));
    progRow.appendChild(progBar);
    progRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', whiteSpace: 'nowrap' } }, completed + '/' + items.length + ' (' + pct + '%)'));
    checklistContent.appendChild(progRow);

    // Group by category
    var grouped = {};
    items.forEach(function(item) {
      var cat = item.category || 'General';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(item);
    });

    Object.keys(grouped).forEach(function(cat) {
      checklistContent.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', margin: '10px 0 4px', fontWeight: '600' } }, cat));
      grouped[cat].forEach(function(item) {
        var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '5px 0', cursor: 'pointer' },
          onClick: function() {
            var newState = !item.completed;
            cb.style.opacity = '0.4';
            serverCall().withSuccessHandler(function(result) {
              if (result && result.success) {
                item.completed = newState;
                cb.textContent = newState ? '\u2611' : '\u2610';
                cb.style.color = newState ? 'var(--success)' : 'var(--muted)';
                label.style.textDecoration = newState ? 'line-through' : 'none';
                label.style.color = newState ? 'var(--muted)' : 'var(--text)';
                // Refresh progress
                var newCompleted = items.filter(function(i) { return i.completed; }).length;
                var newPct = Math.round((newCompleted / items.length) * 100);
                progBar.firstChild.style.width = newPct + '%';
                progBar.firstChild.style.background = newPct === 100 ? 'var(--success)' : 'var(--accent)';
                progRow.lastChild.textContent = newCompleted + '/' + items.length + ' (' + newPct + '%)';
              }
              cb.style.opacity = '1';
            }).withFailureHandler(function() { cb.style.opacity = '1'; }).dataToggleChecklistItem(SESSION_TOKEN, item.checklistId, !item.completed);
          }
        });
        var cb = el('span', { style: { fontSize: '16px', color: item.completed ? 'var(--success)' : 'var(--muted)', cursor: 'pointer' } }, item.completed ? '\u2611' : '\u2610');
        row.appendChild(cb);
        var label = el('span', { style: { fontSize: '12px', color: item.completed ? 'var(--muted)' : 'var(--text)', textDecoration: item.completed ? 'line-through' : 'none', flex: '1' } }, item.itemText);
        row.appendChild(label);
        if (item.required) row.appendChild(el('span', { style: { fontSize: '9px', color: 'var(--danger)', fontWeight: '600' } }, 'REQ'));
        checklistContent.appendChild(row);
      });
    });
  }).withFailureHandler(function() {
    checklistContent.innerHTML = '';
    checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', padding: '8px 0' } }, 'Failed to load checklist.'));
  }).dataGetCaseChecklist(SESSION_TOKEN, caseId);
}

// ═══════════════════════════════════════
// POLLS MANAGEMENT (steward, v4.16.0)
// ═══════════════════════════════════════

// POLLS MANAGEMENT (steward, v4.23.0 — merged Weekly Questions + Polls)
// ═══════════════════════════════════════
// Steward can:
//   • See this week's live poll results
//   • Create/replace the steward poll for this week (with guide)
//   • Close any active poll manually
//   • View past poll history
// Community pool is drawn automatically every Monday — stewards cannot
// pick from it or approve submissions.

function renderManagePolls(appContainer) {
  renderPageLayout(appContainer, 'steward', 'polls', function(container) {
    _stewardHeader(container, 'Polls', 'Create polls · view community results');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'live';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      [
        { id: 'live',   label: 'This Week' },
        { id: 'create', label: 'Create Poll' },
        { id: 'past',   label: 'History' },
      ].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; refreshSubTabs(); renderSub(); }
        }, tab.label));
      });
    }

    function renderSub() {
      subContent.innerHTML = '';
      if (activeSubTab === 'live')   _renderLivePollsSteward(subContent);
      if (activeSubTab === 'create') _renderCreateStewardPoll(subContent);
      if (activeSubTab === 'past')   _renderPollHistorySteward(subContent);
    }

    refreshSubTabs();
    renderSub();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderLivePollsSteward(container) {
  showLoading(container);
  serverCall().withSuccessHandler(function(data) {
    container.innerHTML = '';
    if (!data || !data.questions || data.questions.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No active polls this week. Create one in the "Create Poll" tab.'));
      return;
    }
    container.appendChild(el('div', { className: 'privacy-badge', style: { marginBottom: '14px' } }, '🔒 Votes are anonymous — individual responses are never stored'));
    data.questions.forEach(function(q) {
      var card = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '10px' } });
      var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' } });
      var titleCol = el('div');
      titleCol.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, q.text));
      titleCol.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '2px' } },
        q.source === 'community' ? '🌐 Community poll (random draw)' : '🗳️ ' + (CONFIG.stewardLabel || 'Steward') + ' poll'));
      topRow.appendChild(titleCol);
      var closeBtn = el('button', { className: 'btn btn-secondary', style: { width: 'auto', padding: '4px 10px', fontSize: '11px', flexShrink: '0', marginLeft: '8px' },
        onClick: function() {
          closeBtn.textContent = 'Closing…'; closeBtn.disabled = true;
          serverCall().withSuccessHandler(function(result) {
            if (result && result.success) { _renderLivePollsSteward(container); }
            else { closeBtn.textContent = 'Close'; closeBtn.disabled = false; }
          }).wqClosePoll(null, q.id);
        }
      }, 'Close');
      topRow.appendChild(closeBtn);
      card.appendChild(topRow);

      // Results
      var stats = q.stats || {};
      var total = stats.total || 0;
      var counts = stats.counts || {};
      var colors = ['var(--accent)', 'var(--success)', '#facc15', '#f97316', '#a78bfa'];
      (q.options || []).forEach(function(opt, i) {
        var count = counts[opt] || 0;
        var pct = total > 0 ? Math.round((count / total) * 100) : 0;
        var row = el('div', { style: { marginBottom: '6px' } });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '2px' } });
        header.appendChild(el('span', { style: { color: 'var(--text)' } }, opt));
        header.appendChild(el('span', { style: { color: 'var(--muted)' } }, pct + '%  (' + count + ')'));
        row.appendChild(header);
        var bar = el('div', { style: { height: '7px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden' } });
        bar.appendChild(el('div', { style: { height: '100%', width: pct + '%', background: colors[i % colors.length], borderRadius: '4px' } }));
        row.appendChild(bar);
        card.appendChild(row);
      });
      card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, total + ' anonymous vote' + (total !== 1 ? 's' : '')));
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load polls.'));
  }).wqGetActiveQuestions(SESSION_TOKEN);
}

function _renderCreateStewardPoll(container) {
  // Guide
  if (typeof _renderPollGuide === 'function') _renderPollGuide(container);
  else {
    container.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px', padding: '10px', border: '1px solid var(--border)', borderRadius: '8px' } },
      '📋 Good polls: neutral framing, one concept, balanced options, 2–5 choices. Avoid leading questions.'));
  }

  var formCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
  formCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, "Create This Week's " + (CONFIG.stewardLabel || 'Steward') + ' Poll'));
  formCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Replaces any existing steward poll for this week. The community poll is drawn automatically from the member pool each Monday.'));

  var questionInput = el('textarea', { className: 'msg-textarea', placeholder: 'Poll question…', style: { minHeight: '70px', marginBottom: '10px' } });
  formCard.appendChild(questionInput);

            freqStatus.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
            if (result && result.success) {
              // Update active state
              freqBtns.querySelectorAll('button').forEach(function(b) {
                b.className = b.getAttribute('data-freq') === freq ? 'btn btn-primary' : 'btn btn-secondary';
                b.style.width = 'auto'; b.style.padding = '8px 16px'; b.style.fontSize = '12px';
              });
            }
          }).withFailureHandler(function() {
            freqStatus.textContent = 'Failed to save.'; freqStatus.style.color = 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
          }).wqSetPollFrequency(null, freq);

    poolCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } },
      (count || 0) + ' question' + (count !== 1 ? 's' : '') + ' in the pool. One is drawn randomly each period — you cannot select which one. Use this to release the community poll now without waiting for the Monday trigger.'));

    var drawStatus = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '6px' } });
    var drawBtn = el('button', {
      className: 'btn btn-secondary',
      style: { width: 'auto', padding: '8px 18px', fontSize: '12px' },
      onClick: function() {
        if (count === 0) {
          drawStatus.textContent = 'Pool is empty — members must submit poll questions first.';
          drawStatus.style.color = 'var(--danger)';
          return;
        }
        drawBtn.textContent = 'Drawing…';
        drawBtn.disabled = true;
        drawStatus.textContent = '';
        serverCall().withSuccessHandler(function(result) {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          if (result && result.success) {
            drawStatus.textContent = '✅ Community poll released: "' + (result.text || '').substring(0, 60) + (result.text && result.text.length > 60 ? '…' : '') + '"';
            drawStatus.style.color = 'var(--success)';
          } else {
            drawStatus.textContent = (result && result.message) || 'Draw failed.';
            drawStatus.style.color = 'var(--danger)';
          }
        }).withFailureHandler(function() {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          drawStatus.textContent = 'Request failed.';
          drawStatus.style.color = 'var(--danger)';
        }).wqManualDrawCommunityPoll(SESSION_TOKEN);
      }
    }, 'Draw Community Poll');

    if (count === 0) {
      drawBtn.disabled = true;
      drawBtn.title = 'No questions in pool yet';
    }

    poolCard.appendChild(drawBtn);
    poolCard.appendChild(drawStatus);
    container.appendChild(poolCard);
  }).wqGetPoolCount();
}

function _renderPollHistorySteward(container) {
  showLoading(container);
  var page = 1;
  function loadPage(p) {
    showLoading(container);
    serverCall().withSuccessHandler(function(data) {
      container.innerHTML = '';
      if (!data || !data.questions || data.questions.length === 0) {
        container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, p > 1 ? 'No more history.' : 'No past polls.'));
        return;
      }
      data.questions.forEach(function(q) {
        var card = el('div', { className: 'card card-glass', style: { padding: '13px', marginBottom: '8px' } });
        card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginBottom: '3px' } },
          'Week of ' + q.weekStr + ' · ' + (q.source === 'community' ? '🌐 Community' : '🗳️ ' + (CONFIG.stewardLabel || 'Steward'))));
        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, q.text));
        var stats = q.stats || {};
        var total = stats.total || 0;
        var counts = stats.counts || {};
        if (total > 0) {
          (q.options || []).forEach(function(opt) {
            var count = counts[opt] || 0;
            var pct = Math.round((count / total) * 100);
            var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
            row.appendChild(el('div', { style: { width: '120px', fontSize: '11px', color: 'var(--muted)', flexShrink: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, opt));
            var bar = el('div', { style: { flex: '1', height: '7px', background: 'rgba(255,255,255,0.06)', borderRadius: '3px', overflow: 'hidden' } });
            bar.appendChild(el('div', { style: { height: '100%', width: pct + '%', background: 'var(--accent)', borderRadius: '3px' } }));
            row.appendChild(bar);
            row.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text)', width: '36px', textAlign: 'right' } }, pct + '%'));
            card.appendChild(row);
          });
          card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '4px' } }, total + ' votes'));
        } else {
          card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'No votes'));
        }
        container.appendChild(card);
      });
      if (data.hasMore || p > 1) {
        var nav = el('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '14px' } });
        if (p > 1) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { page = p - 1; loadPage(page); } }, '← Previous'));
        if (data.hasMore) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { page = p + 1; loadPage(page); } }, 'Next →'));
        container.appendChild(nav);
      }
    }).withFailureHandler(function() {
      container.innerHTML = '';
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load history.'));
    }).wqGetHistory(null, p, 15);
  }
  loadPage(page);
}

function renderStewardMinutes(appContainer) {

// Pagination: 10 per page, load 100 records (v4.20.18)
var _MINUTES_PAGE_SIZE = 10;

function _renderMinutesList(container) {
  showLoading(container);
  serverCall().withSuccessHandler(function(minutes) {
    container.innerHTML = '';
    if (!minutes || minutes.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No meeting minutes yet.'));
      return;
    }

    var currentPage = 0;
    var totalPages = Math.ceil(minutes.length / _MINUTES_PAGE_SIZE);
    var listArea = el('div');
    var pagerArea = el('div', { style: { marginTop: '12px' } });
    container.appendChild(listArea);
    container.appendChild(pagerArea);

    function renderPage(page) {
      currentPage = page;
      listArea.innerHTML = '';
      var start = page * _MINUTES_PAGE_SIZE;
      var slice = minutes.slice(start, start + _MINUTES_PAGE_SIZE);

      slice.forEach(function(m) {
        var card = el('div', { className: 'card card-glass card-clickable', style: { padding: '14px', marginBottom: '8px' } });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '6px' } });
        header.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, m.title));
        header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, m.meetingDate));
        card.appendChild(header);
        if (m.bullets) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5', whiteSpace: 'pre-wrap' } }, m.bullets));

        var expanded = false;
        var fullDiv = el('div', { style: { display: 'none', fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap' } }, m.fullMinutes || '');
        card.appendChild(fullDiv);
        if (m.driveDocUrl && /^https?:\/\//i.test(m.driveDocUrl)) {
          card.appendChild(el('a', { href: m.driveDocUrl, target: '_blank', style: { display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: 'var(--accent)', marginTop: '6px', textDecoration: 'none' } }, '\uD83D\uDCC4 Open Google Doc'));
        }
        if (m.fullMinutes) {
          card.addEventListener('click', function() { expanded = !expanded; fullDiv.style.display = expanded ? 'block' : 'none'; });
        }
        listArea.appendChild(card);
      });

      // Pagination controls
      pagerArea.innerHTML = '';
      var pagerRow = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px', marginBottom: '6px' } });
      var prevBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page === 0 ? '0.3' : '1', pointerEvents: page === 0 ? 'none' : 'auto' },
        onClick: function() { renderPage(page - 1); }
      }, '← Prev');
      var pageLabel = el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Page ' + (page + 1) + ' of ' + totalPages);
      var nextBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page >= totalPages - 1 ? '0.3' : '1', pointerEvents: page >= totalPages - 1 ? 'none' : 'auto' },
        onClick: function() { renderPage(page + 1); }
      }, 'Next →');
      pagerRow.appendChild(prevBtn);
      pagerRow.appendChild(pageLabel);
      pagerRow.appendChild(nextBtn);
      pagerArea.appendChild(pagerRow);

      // Last page: show Drive folder link
      if (page >= totalPages - 1 && CONFIG && CONFIG.minutesFolderId) {
        var folderUrl = 'https://drive.google.com/drive/folders/' + CONFIG.minutesFolderId;
        pagerArea.appendChild(el('div', { style: { textAlign: 'center', marginTop: '8px' } },
          el('a', { href: folderUrl, target: '_blank', style: { fontSize: '11px', color: 'var(--accent)', textDecoration: 'none' } }, '\uD83D\uDCC2 View all minutes in Drive folder')
        ));
      }
    }

    renderPage(0);
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load minutes.'));
  }).dataGetMeetingMinutes(SESSION_TOKEN, 100);
}

      var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } });
      topRow.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, item.title));
      var statusColor = item.status === 'New' ? 'var(--info)' : item.status === 'In Progress' ? 'var(--warning)' : item.status === 'Resolved' ? 'var(--success)' : 'var(--muted)';
      topRow.appendChild(el('span', { style: { fontSize: '10px', fontWeight: '600', color: statusColor, background: statusColor + '18', padding: '2px 8px', borderRadius: '8px' } }, item.status));
      card.appendChild(topRow);
      var meta = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } });
      meta.textContent = item.category + ' \u00B7 ' + item.priority + ' \u00B7 ' + item.date;
      card.appendChild(meta);
      if (item.description) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.4' } }, item.description.substring(0, 200)));
      if (item.resolution) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--success)', marginTop: '6px', fontStyle: 'italic' } }, 'Resolution: ' + item.resolution));
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load feedback.'));
  }).dataGetMyFeedback(SESSION_TOKEN); // email resolved server-side (v4.24.1)
}

// DATA FAILSAFE PAGE (v4.17.0 — steward only)

function renderFailsafePage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'failsafe', function(container) {
    _stewardHeader(container, 'Data Failsafe', 'Backups & member data recovery');
    var content = el('div', { className: 'content' });

    // Card 1: Bulk Member Export
    var exportCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '12px' } });
    exportCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Bulk Member Export'));
    exportCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Send every member their personal data summary via email. Includes grievances, workload, and assigned tasks.'));
    var exportStatus = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
    exportCard.appendChild(exportStatus);
    exportCard.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        exportStatus.textContent = 'Sending emails... this may take a minute.'; exportStatus.style.color = 'var(--muted)';
        serverCall().withSuccessHandler(function(r) {
          if (r && r.success) { exportStatus.textContent = r.sent + ' member summaries emailed!'; exportStatus.style.color = 'var(--success)'; }
          else { exportStatus.textContent = r ? r.message : 'Error.'; exportStatus.style.color = 'var(--danger)'; }
        }).withFailureHandler(function() {
          exportStatus.textContent = 'Failed to send exports.'; exportStatus.style.color = 'var(--danger)';
        }).fsTriggerBulkExport(SESSION_TOKEN);
      }
    }, 'Send Data to All Members'));
    content.appendChild(exportCard);

    // Card 2: Manual Backup
    var backupCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '12px' } });
    backupCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Manual CSV Backup'));
    backupCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Create CSV backups of critical sheets (Member Directory, Grievances, Tasks, etc.) in your Google Drive.'));
    var backupStatus = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
    backupCard.appendChild(backupStatus);
    backupCard.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        backupStatus.textContent = 'Creating backup...'; backupStatus.style.color = 'var(--muted)';
        serverCall().withSuccessHandler(function(r) {
          if (r && r.success) { backupStatus.textContent = r.backedUp + ' sheets backed up to Drive folder: ' + r.folderName; backupStatus.style.color = 'var(--success)'; }
          else { backupStatus.textContent = 'Backup failed.'; backupStatus.style.color = 'var(--danger)'; }
        }).withFailureHandler(function() {
          backupStatus.textContent = 'Backup failed.'; backupStatus.style.color = 'var(--danger)';
        }).fsBackupCriticalSheets(SESSION_TOKEN);
      }
    }, 'Backup Now'));
    content.appendChild(backupCard);

    // Card 3: Trigger Management
    var triggerCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '12px' } });
    triggerCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Automated Triggers'));
    triggerCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Install or remove automated triggers for daily digest checks and weekly Drive backups.'));
    var triggerStatus = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
    triggerCard.appendChild(triggerStatus);
    var triggerBtns = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
    triggerBtns.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        triggerStatus.textContent = 'Installing...'; triggerStatus.style.color = 'var(--muted)';
        serverCall().withSuccessHandler(function(r) {
          triggerStatus.textContent = r && r.success ? r.message : 'Error.';
          triggerStatus.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';
        }).fsSetupTriggers(SESSION_TOKEN);
      }
    }, 'Install Triggers'));
    triggerBtns.appendChild(el('button', {
      style: { fontSize: '12px', padding: '6px 14px', borderRadius: '8px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
      onClick: function() {
        triggerStatus.textContent = 'Removing...'; triggerStatus.style.color = 'var(--muted)';
        serverCall().withSuccessHandler(function(r) {
          triggerStatus.textContent = r && r.success ? r.removed + ' triggers removed.' : 'Error.';
          triggerStatus.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';

    initCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, '🔧 Initialize Missing Sheets'));
    initCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Creates any missing sheets that newer features depend on (Timeline, Q&A Forum, Tasks, Notifications, etc.). Non-destructive — existing sheets with data are never touched. Run this if tabs show errors.'));
    var initStatus = el('div', { style: { fontSize: '12px', minHeight: '20px' } });
    initCard.appendChild(initStatus);
    initCard.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        initStatus.innerHTML = '<div style="color:var(--muted)">Creating missing sheets... this may take a moment.</div>';

          if (!r || !r.success) { initStatus.innerHTML = '<div style="color:var(--danger)">' + ((r && r.message) || 'Failed.') + '</div>'; return; }
          var html = '<div style="color:var(--success);font-weight:600;margin-bottom:8px">✅ ' + r.message + '</div>';
          if (r.created.length > 0) {
            html += '<div style="color:var(--text);font-size:11px;margin-bottom:4px">Initialized:</div>';
            r.created.forEach(function(c) { html += '<div style="color:var(--muted);font-size:11px;padding:1px 0">• ' + c + '</div>'; });
          }
          if (r.failed.length > 0) {
            html += '<div style="color:var(--danger);font-size:11px;margin-top:6px">Failed:</div>';
            r.failed.forEach(function(f) { html += '<div style="color:var(--danger);font-size:11px;padding:1px 0">• ' + f + '</div>'; });
          }
          initStatus.innerHTML = html;
        }).withFailureHandler(function(err) {
          initStatus.innerHTML = '<div style="color:var(--danger)">Failed: ' + ((err && err.message) || err) + '</div>';
        }).fsEnsureAllSheets(SESSION_TOKEN);
      }
    }, 'Initialize Missing Sheets'));
    content.appendChild(initCard);

    // Card 5: System Diagnostic
    var diagCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '12px' } });
    diagCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, '🔍 System Diagnostic'));
    diagCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Check which sheets exist, auth status, and identify missing dependencies that cause "Something went wrong" errors.'));
    var diagResult = el('div', { style: { fontSize: '12px', minHeight: '20px' } });
    diagCard.appendChild(diagResult);
    diagCard.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        diagResult.innerHTML = '<div style="color:var(--muted)">Running diagnostic...</div>';
        serverCall().withSuccessHandler(function(r) {
          if (!r || !r.success) { diagResult.innerHTML = '<div style="color:var(--danger)">' + ((r && r.message) || 'Diagnostic failed.') + '</div>'; return; }
          var html = '<div style="margin-bottom:8px;color:var(--text);font-weight:600">Sheets: ' + r.totalSheets + ' total | Auth: ' + (r.authOk ? '✅' : '❌') + ' | Email: ' + r.email + '</div>';
          if (r.missing.length === 0) {
            html += '<div style="color:var(--success);font-weight:600">✅ All required sheets present!</div>';
          } else {
            html += '<div style="color:var(--warning);font-weight:600;margin-bottom:6px">⚠️ Missing ' + r.missing.length + ' sheet(s):</div>';
            r.missing.forEach(function(m) {
              html += '<div style="color:var(--muted);padding:2px 0;font-family:var(--fontBody)">' + m + '</div>';
            });
          }
          // Show all results
          html += '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">';
          r.results.forEach(function(item) {
            html += '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:11px">'
              + '<span style="color:var(--text)">' + item.label + '</span>'
              + '<span style="color:' + (item.exists ? 'var(--success)' : item.critical ? 'var(--danger)' : 'var(--warning)') + '">' + (item.exists ? '✅' : '❌') + '</span>'
              + '</div>';
          });
          html += '</div>';
          diagResult.innerHTML = html;
        }).withFailureHandler(function(err) {
          diagResult.innerHTML = '<div style="color:var(--danger)">Diagnostic failed: ' + ((err && err.message) || err) + '</div>';
        }).fsDiagnostic(SESSION_TOKEN);
      }
    }, 'Run Diagnostic'));
    content.appendChild(diagCard);

    container.appendChild(content);
  });
}

/**
 * Renders structured test results into the container.
 */
function _renderTestResults(container, results, statusEl) {
  container.innerHTML = '';
  if (!results) return;

  // Summary bar
  var pct = results.summary.total > 0
    ? Math.round((results.summary.passed / results.summary.total) * 100) : 0;
  var allPassed = results.summary.failed === 0;
  var icon = allPassed ? '✅' : '❌';

  statusEl.textContent = icon + ' ' + results.summary.passed + '/' + results.summary.total +
    ' passed (' + pct + '%) — ' + results.duration + 'ms';
  statusEl.style.color = allPassed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)';

  // Timestamp
  if (results.timestamp) {
    var ts = el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '16px' } },
      'Last run: ' + new Date(results.timestamp).toLocaleString());
    container.appendChild(ts);
  }

  // Summary cards row
  var summaryRow = el('div', { style: { display: 'flex', gap: '12px', marginBottom: '20px', flexWrap: 'wrap' } });
  var _card = function(label, val, color) {
    var c = el('div', { style: {
      padding: '12px 20px', borderRadius: '10px', background: 'var(--bg-secondary)',
      border: '1px solid var(--border-color)', minWidth: '100px', textAlign: 'center'
    }});
    c.appendChild(el('div', { style: { fontSize: '24px', fontWeight: '700', color: color } }, String(val)));
    c.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginTop: '2px' } }, label));
    return c;
  };
  summaryRow.appendChild(_card('Total', results.summary.total, 'var(--text-primary)'));
  summaryRow.appendChild(_card('Passed', results.summary.passed, 'var(--success, #10B981)'));
  summaryRow.appendChild(_card('Failed', results.summary.failed, results.summary.failed > 0 ? 'var(--danger, #EF4444)' : 'var(--text-secondary)'));
  summaryRow.appendChild(_card('Duration', results.duration + 'ms', 'var(--text-secondary)'));
  container.appendChild(summaryRow);

  // Per-suite collapsible sections
  for (var si = 0; si < results.suites.length; si++) {
    var suite = results.suites[si];
    var suiteAllPassed = suite.failed === 0;
    var suiteCard = el('div', { className: 'card', style: { marginBottom: '12px', overflow: 'hidden' } });

    // Suite header (clickable)
    var suiteBody = el('div', { style: { display: 'none', padding: '0 16px 16px' } });
    var suiteHdr = el('div', {
      style: {
        padding: '14px 16px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', userSelect: 'none'
      },
      onClick: (function(body) {
        return function() {
          body.style.display = body.style.display === 'none' ? 'block' : 'none';
        };
      })(suiteBody)
    });
    suiteHdr.appendChild(el('span', { style: { fontWeight: '600', fontSize: '15px' } },
      (suiteAllPassed ? '✅' : '❌') + ' ' + suite.name.toUpperCase() +
      ' (' + suite.passed + '/' + (suite.passed + suite.failed) + ')'));
    suiteHdr.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } },
      suite.duration + 'ms ▾'));
    suiteCard.appendChild(suiteHdr);

    // Auto-expand failed suites
    if (!suiteAllPassed) {
      suiteBody.style.display = 'block';
    }

    // Individual tests
    for (var ti = 0; ti < suite.tests.length; ti++) {
      var t = suite.tests[ti];
      var tRow = el('div', {
        style: {
          padding: '6px 0', borderTop: '1px solid var(--border-color)',
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          fontSize: '13px'
        }
      });
      // Clean test name: test_suite_description → description
      var cleanName = t.name.replace(/^test_[a-z]+_/, '');
      tRow.appendChild(el('span', null, (t.passed ? '✓' : '✗') + ' ' + cleanName));
      tRow.appendChild(el('span', {
        style: { color: t.passed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)', whiteSpace: 'nowrap', marginLeft: '8px' }
      }, t.passed ? t.duration + 'ms' : 'FAIL'));

      if (!t.passed && t.error) {
        var errEl = el('div', { style: {
          fontSize: '12px', color: 'var(--danger, #EF4444)', background: 'var(--bg-tertiary, #1e1e1e)',
          padding: '6px 10px', borderRadius: '6px', marginTop: '4px', fontFamily: 'monospace',
          wordBreak: 'break-word'
        } }, t.error);
        var errWrap = el('div');
        errWrap.appendChild(tRow);
        errWrap.appendChild(errEl);
        suiteBody.appendChild(errWrap);
      } else {
        suiteBody.appendChild(tRow);
      }
    }

    suiteCard.appendChild(suiteBody);
    container.appendChild(suiteCard);
  }
}
</script>
