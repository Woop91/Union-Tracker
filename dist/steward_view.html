<script>
/**
 * Steward View — "Mono Signal"
 * Dense, monospace, dot-status, filterable case list + Command Suite tabs
 */

var STEWARD_ACTIVE_TAB = 'cases';

function renderStewardMain(container, tab) {
  STEWARD_ACTIVE_TAB = tab || 'cases';
  if (tab === 'clipboard') {
    renderDigitalClipboard(container);
  } else if (tab === 'leaderboard') {
    renderLeaderboard(container);
  } else if (tab === 'tools') {
    renderToolsPanel(container);
  } else {
    renderStewardDashboard(container);
  }
}

function initStewardView(container) {
  var t = ThemeEngine.getTheme('steward', AppState.isDark);
  ThemeEngine.applyTheme(t);
  showLoading(container);

  google.script.run
    .withSuccessHandler(function(cases) {
      AppState.cases = cases || [];
      google.script.run
        .withSuccessHandler(function(kpis) {
          AppState.kpis = kpis;
          AppState.loading = false;
          renderStewardMain(container, STEWARD_ACTIVE_TAB);
        })
        .withFailureHandler(function() {
          AppState.kpis = { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
          AppState.loading = false;
          renderStewardMain(container, STEWARD_ACTIVE_TAB);
        })
        .dataGetStewardKPIs(CURRENT_USER.email);
    })
    .withFailureHandler(function() {
      AppState.cases = [];
      AppState.loading = false;
      renderStewardMain(container, STEWARD_ACTIVE_TAB);
    })
    .dataGetStewardCases(CURRENT_USER.email);
}

// ── Shared header builder ─────────────────────────────────────────────────────
function buildStewardHeader(container, title) {
  var header = el('div', { className: 'page-header' });
  var headerLeft = el('div', { className: 'page-header-left' });
  headerLeft.appendChild(el('div', { className: 'page-title' }, title));
  headerLeft.appendChild(el('div', { className: 'page-subtitle' }, CURRENT_USER.name + ' \u00B7 ' + CURRENT_USER.unit));
  header.appendChild(headerLeft);

  var headerRight = el('div', { className: 'page-header-right' });

  if (IS_DUAL_ROLE) {
    var switchBtn = el('button', {
      style: {
        background: 'var(--accentBg)', border: '1px solid var(--accentBorder)',
        borderRadius: '6px', padding: '4px 10px', fontSize: '10px',
        color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)',
      },
      onClick: function() {
        AppState.activeRole = 'member';
        ThemeEngine.applyTheme(ThemeEngine.getTheme('member', AppState.isDark));
        initMemberView(container);
      }
    }, '\uD83D\uDC64 ' + CONFIG.memberLabel);
    headerRight.appendChild(switchBtn);
  }

  headerRight.appendChild(el('button', {
    className: 'icon-btn',
    onClick: function() {
      AppState.isDark = !AppState.isDark;
      ThemeEngine.applyTheme(ThemeEngine.getTheme('steward', AppState.isDark));
      renderStewardMain(container, STEWARD_ACTIVE_TAB);
    }
  }, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));

  headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
  header.appendChild(headerRight);
  container.appendChild(header);
}

// ── Cases Tab ─────────────────────────────────────────────────────────────────
function renderStewardDashboard(container) {
  container.innerHTML = '';
  var filter = 'all';

  buildStewardHeader(container, 'Cases');

  // KPIs
  var kpis = AppState.kpis || {};
  var kpiGrid = el('div', { className: 'kpi-grid' });
  var kpiItems = [
    { label: 'My Cases', value: kpis.totalCases || 0 },
    { label: 'Overdue', value: kpis.overdue || 0, color: kpis.overdue > 0 ? 'var(--danger)' : null },
    { label: 'Due <7d', value: kpis.dueSoon || 0, color: kpis.dueSoon > 0 ? 'var(--warning)' : null },
    { label: 'Resolved', value: kpis.resolved || 0, color: 'var(--success)' },
  ];
  kpiItems.forEach(function(kpi) {
    var card = el('div', { className: 'kpi-card' });
    card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
    var val = el('div', { className: 'kpi-value' }, String(kpi.value));
    if (kpi.color) val.style.color = kpi.color;
    card.appendChild(val);
    kpiGrid.appendChild(card);
  });
  container.appendChild(kpiGrid);

  // Filter bar
  var filterBar = el('div', { className: 'filter-bar' });
  var overdueCount = AppState.cases.filter(function(c) { return c.status === 'overdue'; }).length;
  var filters = [
    { key: 'all', label: 'All ' + AppState.cases.length },
    { key: 'overdue', label: 'Overdue ' + overdueCount },
    { key: 'active', label: 'Active' },
  ];

  filters.forEach(function(f) {
    var tab = el('button', {
      className: 'filter-tab' + (filter === f.key ? ' active' : ''),
      onClick: function() {
        filter = f.key;
        renderCaseList(caseListContainer, filter);
        filterBar.querySelectorAll('.filter-tab').forEach(function(t, i) {
          t.className = 'filter-tab' + (filters[i].key === filter ? ' active' : '');
        });
      }
    }, f.label);
    filterBar.appendChild(tab);
  });
  container.appendChild(filterBar);

  var caseListContainer = el('div', { className: 'content' });
  renderCaseList(caseListContainer, filter);
  container.appendChild(caseListContainer);

  var fab = el('button', { className: 'fab' }, '+');
  container.appendChild(fab);

  renderStewardBottomNav(container, 'cases');
}

function renderCaseList(container, filter) {
  container.innerHTML = '';

  var cases = AppState.cases;
  if (filter === 'overdue') cases = cases.filter(function(c) { return c.status === 'overdue'; });
  if (filter === 'active') cases = cases.filter(function(c) { return c.status === 'active' || c.status === 'new'; });

  if (cases.length === 0) {
    container.appendChild(el('div', {
      style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' }
    }, filter === 'all' ? 'No cases assigned.' : 'No ' + filter + ' cases.'));
    return;
  }

  cases.forEach(function(c) {
    var isOverdue = c.status === 'overdue';
    var card = el('div', {
      className: 'card card-clickable',
      style: { padding: '11px 14px', marginBottom: '6px', borderLeftColor: isOverdue ? 'var(--danger)' : undefined }
    });

    var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
    var leftGroup = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
    leftGroup.appendChild(el('div', { className: 'status-dot ' + (c.status || 'active') }));
    leftGroup.appendChild(el('span', {
      style: { fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '600', color: 'var(--text)' }
    }, c.id));
    topRow.appendChild(leftGroup);

    var deadlineSpan = el('span', {
      style: {
        fontFamily: 'var(--fontBody)', fontSize: '11px',
        color: isOverdue ? 'var(--danger)' : 'var(--muted)',
        fontWeight: isOverdue ? '700' : '400',
      }
    });
    deadlineSpan.textContent = c.deadlineDays !== null ? c.deadlineDays + 'd' : '\u2014';
    topRow.appendChild(deadlineSpan);
    card.appendChild(topRow);

    var bottomRow = el('div', { style: { paddingLeft: '15px', display: 'flex', justifyContent: 'space-between' } });
    var memberDisplay = c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown';
    bottomRow.appendChild(el('span', {
      style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)' }
    }, memberDisplay + ' \u00B7 ' + (c.step || '')));
    bottomRow.appendChild(el('span', {
      style: { fontFamily: 'var(--fontBody)', fontSize: '10px', color: 'var(--muted)' }
    }, c.unit || ''));

    card.appendChild(bottomRow);
    container.appendChild(card);
  });
}

// ── Digital Clipboard Tab ─────────────────────────────────────────────────────
function renderDigitalClipboard(container) {
  container.innerHTML = '';
  buildStewardHeader(container, 'Clipboard');

  var content = el('div', { className: 'content' });
  content.appendChild(el('div', {
    style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' }
  }, 'Loading members\u2026'));
  container.appendChild(content);
  renderStewardBottomNav(container, 'clipboard');

  google.script.run
    .withSuccessHandler(function(members) {
      content.innerHTML = '';
      if (!members || members.length === 0) {
        content.appendChild(el('div', {
          style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' }
        }, 'No members found.'));
        return;
      }

      var searchInput = el('input', {
        style: {
          width: '100%', boxSizing: 'border-box', padding: '8px 12px',
          borderRadius: '8px', border: '1px solid var(--border)',
          background: 'var(--surface)', color: 'var(--text)',
          fontSize: '13px', marginBottom: '10px', fontFamily: 'var(--fontBody)'
        }
      });
      searchInput.setAttribute('placeholder', 'Search members\u2026');
      content.appendChild(searchInput);

      var listContainer = el('div');
      content.appendChild(listContainer);

      var clipActions = [
        { label: 'Signed Petition', value: 'signed_petition' },
        { label: 'Needs Follow-up', value: 'needs_followup' },
        { label: 'In-Person Contact', value: 'in_person_contact' },
        { label: 'Contact Info Updated', value: 'contact_info_updated' },
      ];

      function renderClipboardList(query) {
        listContainer.innerHTML = '';
        var filtered = members;
        if (query) {
          var q = query.toLowerCase();
          filtered = members.filter(function(m) {
            return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
                   (m.workLocation || '').toLowerCase().indexOf(q) !== -1;
          });
        }

        if (filtered.length === 0) {
          listContainer.appendChild(el('div', {
            style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '12px' }
          }, 'No results.'));
          return;
        }

        filtered.forEach(function(m) {
          var card = el('div', {
            className: 'card',
            style: { padding: '10px 14px', marginBottom: '6px' }
          });

          var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
          topRow.appendChild(el('span', {
            style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontBody)' }
          }, m.name || m.email || 'Unknown'));
          topRow.appendChild(el('span', {
            style: { fontSize: '11px', color: 'var(--muted)', fontFamily: 'var(--fontBody)' }
          }, m.workLocation || ''));
          card.appendChild(topRow);

          if (m.daysSinceContact !== null && m.daysSinceContact !== undefined) {
            card.appendChild(el('div', {
              style: {
                fontSize: '10px', marginBottom: '8px', fontFamily: 'var(--fontBody)',
                color: m.daysSinceContact > 90 ? 'var(--danger)' : 'var(--muted)'
              }
            }, 'Last contact: ' + (m.daysSinceContact === 0 ? 'Today' : m.daysSinceContact + ' days ago')));
          }

          var btnRow = el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } });
          clipActions.forEach(function(action) {
            var btn = el('button', {
              style: {
                padding: '4px 8px', borderRadius: '5px', fontSize: '10px',
                border: '1px solid var(--border)', background: 'var(--surface)',
                color: 'var(--text)', cursor: 'pointer', fontFamily: 'var(--fontBody)'
              }
            }, action.label);
            btn.addEventListener('click', function() {
              btn.textContent = '\u2713';
              btn.style.background = 'var(--accentBg)';
              btn.style.borderColor = 'var(--accent)';
              btn.style.color = 'var(--accent)';
              btn.disabled = true;
              google.script.run
                .withSuccessHandler(function() {})
                .withFailureHandler(function() {
                  btn.textContent = action.label;
                  btn.style.background = 'var(--surface)';
                  btn.style.borderColor = 'var(--border)';
                  btn.style.color = 'var(--text)';
                  btn.disabled = false;
                })
                .dataLogClipboardAction(m.memberId || m.email, action.label, '');
            });
            btnRow.appendChild(btn);
          });
          card.appendChild(btnRow);
          listContainer.appendChild(card);
        });
      }

      renderClipboardList('');
      searchInput.addEventListener('input', function() {
        renderClipboardList(searchInput.value);
      });
    })
    .withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', {
        style: { textAlign: 'center', padding: '40px 0', color: 'var(--danger)', fontSize: '13px' }
      }, 'Failed to load members.'));
    })
    .dataGetMembersForClipboard();
}

// ── Leaderboard Tab ───────────────────────────────────────────────────────────
function renderLeaderboard(container) {
  container.innerHTML = '';
  buildStewardHeader(container, 'Rankings');

  var content = el('div', { className: 'content' });
  content.appendChild(el('div', {
    style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' }
  }, 'Loading office rankings\u2026'));
  container.appendChild(content);
  renderStewardBottomNav(container, 'leaderboard');

  google.script.run
    .withSuccessHandler(function(offices) {
      content.innerHTML = '';

      if (!offices || offices.length === 0) {
        content.appendChild(el('div', {
          style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' }
        }, 'No office data available.'));
        return;
      }

      content.appendChild(el('div', {
        style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '12px', fontFamily: 'var(--fontBody)' }
      }, 'Ranked by survey completion, active interests, and recent contact.'));

      offices.forEach(function(office, idx) {
        var statusColor = office.status === 'green' ? 'var(--success)' :
                          office.status === 'yellow' ? 'var(--warning)' : 'var(--danger)';

        var card = el('div', { className: 'card', style: { padding: '12px 14px', marginBottom: '8px' } });

        // Rank + name row
        var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' } });
        var rankName = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } });
        rankName.appendChild(el('span', {
          style: { fontFamily: 'var(--fontBody)', fontSize: '16px', fontWeight: '700', color: 'var(--muted)', minWidth: '24px' }
        }, String(idx + 1)));
        rankName.appendChild(el('span', {
          style: { fontFamily: 'var(--fontBody)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' }
        }, office.name || 'Unknown'));
        topRow.appendChild(rankName);

        var scoreChip = el('span', {
          style: {
            fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '700',
            color: statusColor, border: '1px solid ' + statusColor,
            borderRadius: '20px', padding: '2px 8px'
          }
        }, String(office.score || 0) + '%');
        topRow.appendChild(scoreChip);
        card.appendChild(topRow);

        // Progress bar
        var barTrack = el('div', {
          style: { height: '4px', background: 'var(--border)', borderRadius: '2px', marginBottom: '8px', overflow: 'hidden' }
        });
        var barFill = el('div', {
          style: {
            height: '100%', width: String(Math.min(office.score || 0, 100)) + '%',
            background: statusColor, borderRadius: '2px'
          }
        });
        barTrack.appendChild(barFill);
        card.appendChild(barTrack);

        // Stats
        var statsRow = el('div', { style: { display: 'flex', gap: '16px' } });
        [
          { label: 'Members', value: String(office.memberCount || 0) },
          { label: 'Active', value: String(office.activeCount || 0) },
          { label: 'Status', value: office.status ? office.status.charAt(0).toUpperCase() + office.status.slice(1) : '\u2014', color: statusColor },
        ].forEach(function(s) {
          var stat = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '1px' } });
          stat.appendChild(el('span', {
            style: { fontSize: '9px', color: 'var(--muted)', fontFamily: 'var(--fontBody)', textTransform: 'uppercase', letterSpacing: '0.5px' }
          }, s.label));
          var valEl = el('span', {
            style: { fontSize: '12px', fontWeight: '600', fontFamily: 'var(--fontBody)', color: s.color || 'var(--text)' }
          }, s.value);
          stat.appendChild(valEl);
          statsRow.appendChild(stat);
        });
        card.appendChild(statsRow);
        content.appendChild(card);
      });
    })
    .withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', {
        style: { textAlign: 'center', padding: '40px 0', color: 'var(--danger)', fontSize: '13px' }
      }, 'Failed to load leaderboard.'));
    })
    .dataGetEngagementLeaderboard();
}

// ── Tools Tab ─────────────────────────────────────────────────────────────────
function renderToolsPanel(container) {
  container.innerHTML = '';
  buildStewardHeader(container, 'Tools');

  var content = el('div', { className: 'content' });
  container.appendChild(content);
  renderStewardBottomNav(container, 'tools');

  var toolDefs = [
    { id: 'shield',   icon: '\uD83D\uDEE1\uFE0F', label: 'Weingarten Shield',  desc: 'Legal script for investigation meetings' },
    { id: 'archive',  icon: '\uD83D\uDCC1',        label: 'Precedent Archive',  desc: 'Search resolved grievances by article' },
    { id: 'nudge',    icon: '\uD83D\uDCEC',        label: 'Survey Nudge',       desc: 'Email non-responders to complete the survey' },
    { id: 'injector', icon: '\uD83D\uDD17',        label: 'Meeting Injector',   desc: 'Push virtual hearing URL to a grievance' },
  ];

  var activeToolId = null;
  var toolContentArea = el('div', { style: { marginTop: '4px' } });

  toolDefs.forEach(function(tool) {
    var card = el('div', {
      className: 'card card-clickable',
      style: { padding: '14px', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '14px' }
    });

    card.appendChild(el('span', { style: { fontSize: '22px', lineHeight: '1' } }, tool.icon));

    var textCol = el('div', { style: { flex: '1' } });
    textCol.appendChild(el('div', {
      style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontBody)' }
    }, tool.label));
    textCol.appendChild(el('div', {
      style: { fontSize: '11px', color: 'var(--muted)', fontFamily: 'var(--fontBody)', marginTop: '2px' }
    }, tool.desc));
    card.appendChild(textCol);

    var chevron = el('span', { style: { color: 'var(--muted)', fontSize: '14px', transition: 'transform 0.2s' } }, '\u203A');
    card.appendChild(chevron);

    card.addEventListener('click', function() {
      if (activeToolId === tool.id) {
        activeToolId = null;
        toolContentArea.innerHTML = '';
        chevron.style.transform = '';
      } else {
        activeToolId = tool.id;
        toolContentArea.innerHTML = '';
        chevron.style.transform = 'rotate(90deg)';
        if (tool.id === 'shield')   renderWeingartenShield(toolContentArea);
        if (tool.id === 'archive')  renderPrecedentArchive(toolContentArea);
        if (tool.id === 'nudge')    renderNudgeEngine(toolContentArea);
        if (tool.id === 'injector') renderMeetingInjector(toolContentArea);
      }
    });

    content.appendChild(card);
  });

  content.appendChild(toolContentArea);
}

// ── Weingarten Shield ─────────────────────────────────────────────────────────
function renderWeingartenShield(container) {
  container.innerHTML = '';

  var shield = el('div', {
    style: {
      background: '#1a1a2e', borderRadius: '10px', padding: '20px',
      border: '2px solid #e63946', marginBottom: '12px', marginTop: '8px'
    }
  });

  shield.appendChild(el('div', {
    style: {
      fontSize: '11px', fontWeight: '700', color: '#e63946', marginBottom: '14px',
      fontFamily: 'var(--fontBody)', textTransform: 'uppercase', letterSpacing: '1px'
    }
  }, '\uD83D\uDEE1\uFE0F  Weingarten Rights \u2014 Read Aloud'));

  [
    'If this discussion could in any way lead to my being disciplined',
    'or terminated, or affect my personal working conditions,',
    'I respectfully request that my union representative',
    'be present at this meeting.',
    '',
    'Until my representative arrives, I choose not to',
    'answer any questions or make any statements.',
  ].forEach(function(line) {
    if (line === '') {
      shield.appendChild(el('div', { style: { height: '12px' } }, ''));
    } else {
      shield.appendChild(el('div', {
        style: { fontSize: '14px', color: '#ffffff', fontFamily: 'var(--fontBody)', lineHeight: '1.6' }
      }, line));
    }
  });

  shield.appendChild(el('div', {
    style: { fontSize: '10px', color: '#666', marginTop: '16px', fontFamily: 'var(--fontBody)' }
  }, 'NLRB v. J. Weingarten, Inc., 420 U.S. 251 (1975)'));

  container.appendChild(shield);
}

// ── Precedent Archive ─────────────────────────────────────────────────────────
function renderPrecedentArchive(container) {
  container.innerHTML = '';

  var row = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '8px', marginTop: '8px' } });

  var articleInput = el('input', {
    style: {
      flex: '1', padding: '8px 12px', borderRadius: '8px',
      border: '1px solid var(--border)', background: 'var(--surface)',
      color: 'var(--text)', fontSize: '12px', fontFamily: 'var(--fontBody)'
    }
  });
  articleInput.setAttribute('placeholder', 'Filter by article (e.g. Article 7)\u2026');

  var searchBtn = el('button', {
    style: {
      padding: '8px 14px', borderRadius: '8px', fontSize: '12px',
      background: 'var(--accent)', color: '#fff', border: 'none',
      cursor: 'pointer', fontFamily: 'var(--fontBody)', fontWeight: '600'
    }
  }, 'Search');

  row.appendChild(articleInput);
  row.appendChild(searchBtn);
  container.appendChild(row);

  var resultsArea = el('div');
  container.appendChild(resultsArea);

  function doSearch() {
    resultsArea.innerHTML = '';
    resultsArea.appendChild(el('div', {
      style: { textAlign: 'center', padding: '16px 0', color: 'var(--muted)', fontSize: '12px' }
    }, 'Searching\u2026'));

    google.script.run
      .withSuccessHandler(function(records) {
        resultsArea.innerHTML = '';
        if (!records || records.length === 0) {
          resultsArea.appendChild(el('div', {
            style: { textAlign: 'center', padding: '16px 0', color: 'var(--muted)', fontSize: '12px' }
          }, 'No resolved grievances found.'));
          return;
        }
        records.forEach(function(r) {
          var card = el('div', { className: 'card', style: { padding: '10px 14px', marginBottom: '6px' } });

          var idRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
          idRow.appendChild(el('span', {
            style: { fontSize: '11px', fontWeight: '600', color: 'var(--accent)', fontFamily: 'var(--fontBody)' }
          }, r.id || ''));
          idRow.appendChild(el('span', {
            style: { fontSize: '10px', color: 'var(--muted)', fontFamily: 'var(--fontBody)' }
          }, r.article || ''));
          card.appendChild(idRow);

          if (r.description) {
            card.appendChild(el('div', {
              style: { fontSize: '11px', color: 'var(--text)', fontFamily: 'var(--fontBody)', marginBottom: '6px' }
            }, r.description));
          }
          if (r.resolution) {
            var resBadge = el('div', {
              style: {
                fontSize: '10px', color: 'var(--success)', border: '1px solid var(--success)',
                borderRadius: '4px', padding: '3px 6px', display: 'inline-block',
                fontFamily: 'var(--fontBody)'
              }
            }, 'Resolution: ' + r.resolution);
            card.appendChild(resBadge);
          }
          resultsArea.appendChild(card);
        });
      })
      .withFailureHandler(function() {
        resultsArea.innerHTML = '';
        resultsArea.appendChild(el('div', {
          style: { textAlign: 'center', padding: '16px 0', color: 'var(--danger)', fontSize: '12px' }
        }, 'Failed to load archive.'));
      })
      .dataGetPrecedentArchive(articleInput.value.trim());
  }

  searchBtn.addEventListener('click', doSearch);
  doSearch(); // Load all on open
}

// ── Nudge Engine ──────────────────────────────────────────────────────────────
function renderNudgeEngine(container) {
  container.innerHTML = '';

  var loadDiv = el('div', {
    style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '12px', marginTop: '8px' }
  }, 'Loading non-responders\u2026');
  container.appendChild(loadDiv);

  google.script.run
    .withSuccessHandler(function(members) {
      container.innerHTML = '';

      if (!members || members.length === 0) {
        container.appendChild(el('div', {
          style: {
            textAlign: 'center', padding: '16px', color: 'var(--success)',
            fontSize: '12px', fontFamily: 'var(--fontBody)', marginTop: '8px',
            border: '1px solid var(--success)', borderRadius: '8px'
          }
        }, '\u2713 All members are engaged \u2014 no nudges needed.'));
        return;
      }

      container.appendChild(el('div', {
        style: {
          fontSize: '12px', color: 'var(--muted)', fontFamily: 'var(--fontBody)',
          marginBottom: '8px', marginTop: '8px', padding: '6px 10px',
          background: 'var(--surface)', borderRadius: '6px', border: '1px solid var(--border)'
        }
      }, members.length + ' member' + (members.length !== 1 ? 's' : '') + ' need engagement. Select to nudge.'));

      var msgInput = el('textarea', {
        style: {
          width: '100%', boxSizing: 'border-box', padding: '8px', borderRadius: '6px',
          border: '1px solid var(--border)', background: 'var(--surface)',
          color: 'var(--text)', fontSize: '12px', fontFamily: 'var(--fontBody)',
          resize: 'vertical', marginBottom: '8px'
        }
      });
      msgInput.setAttribute('placeholder', 'Custom message (optional)\u2026');
      msgInput.setAttribute('rows', '3');
      container.appendChild(msgInput);

      var selectedIds = [];

      var sendBtn = el('button', {
        style: {
          width: '100%', padding: '10px', borderRadius: '8px', fontSize: '12px',
          background: 'var(--accent)', color: '#fff', border: 'none',
          cursor: 'pointer', fontFamily: 'var(--fontBody)', fontWeight: '600', marginBottom: '10px'
        }
      }, 'Send Nudge to Selected');
      sendBtn.addEventListener('click', function() {
        if (selectedIds.length === 0) {
          sendBtn.textContent = 'Select at least one member';
          setTimeout(function() { sendBtn.textContent = 'Send Nudge to ' + selectedIds.length + ' Member' + (selectedIds.length !== 1 ? 's' : ''); }, 1500);
          return;
        }
        sendBtn.textContent = 'Sending\u2026';
        sendBtn.disabled = true;
        google.script.run
          .withSuccessHandler(function(result) {
            var sent = result && result.sent ? result.sent : selectedIds.length;
            sendBtn.textContent = '\u2713 Sent to ' + sent + ' member' + (sent !== 1 ? 's' : '');
            sendBtn.style.background = 'var(--success)';
          })
          .withFailureHandler(function() {
            sendBtn.textContent = 'Send failed \u2014 retry';
            sendBtn.disabled = false;
            sendBtn.style.background = 'var(--danger)';
          })
          .dataSendSurveyNudge(selectedIds, msgInput.value.trim());
      });
      container.appendChild(sendBtn);

      var listDiv = el('div');
      container.appendChild(listDiv);

      members.forEach(function(m) {
        var row = el('div', {
          style: {
            display: 'flex', alignItems: 'center', gap: '10px',
            padding: '8px 10px', borderRadius: '6px', marginBottom: '4px',
            border: '1px solid var(--border)', background: 'var(--surface)', cursor: 'pointer'
          }
        });

        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.style.width = '15px';
        checkbox.style.height = '15px';
        checkbox.style.cursor = 'pointer';
        checkbox.style.flexShrink = '0';

        var nameCol = el('div', { style: { flex: '1' } });
        nameCol.appendChild(el('div', {
          style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontBody)' }
        }, m.name || m.email || 'Unknown'));
        nameCol.appendChild(el('div', {
          style: { fontSize: '10px', color: 'var(--muted)', fontFamily: 'var(--fontBody)' }
        }, (m.workLocation || '') + (m.daysSinceContact ? ' \u00B7 ' + m.daysSinceContact + 'd ago' : '')));

        var memberId = m.memberId || m.email;
        checkbox.addEventListener('change', function() {
          if (checkbox.checked) {
            if (selectedIds.indexOf(memberId) === -1) selectedIds.push(memberId);
            row.style.background = 'var(--accentBg)';
            row.style.borderColor = 'var(--accent)';
          } else {
            selectedIds = selectedIds.filter(function(id) { return id !== memberId; });
            row.style.background = 'var(--surface)';
            row.style.borderColor = 'var(--border)';
          }
          sendBtn.textContent = selectedIds.length > 0
            ? 'Send Nudge to ' + selectedIds.length + ' Member' + (selectedIds.length !== 1 ? 's' : '')
            : 'Send Nudge to Selected';
        });

        row.addEventListener('click', function(e) {
          if (e.target !== checkbox) checkbox.click();
        });

        row.appendChild(checkbox);
        row.appendChild(nameCol);
        listDiv.appendChild(row);
      });
    })
    .withFailureHandler(function() {
      container.innerHTML = '';
      container.appendChild(el('div', {
        style: { textAlign: 'center', padding: '20px 0', color: 'var(--danger)', fontSize: '12px', marginTop: '8px' }
      }, 'Failed to load non-responders.'));
    })
    .dataGetSurveyNonResponders();
}

// ── Meeting Injector ──────────────────────────────────────────────────────────
function renderMeetingInjector(container) {
  container.innerHTML = '';

  container.appendChild(el('div', {
    style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px', marginTop: '8px', fontFamily: 'var(--fontBody)', lineHeight: '1.5' }
  }, 'Paste a Zoom or Teams URL to push it to a grievance. Members will see a "Join Virtual Hearing" button on their dashboard.'));

  var caseIdInput = el('input', {
    style: {
      width: '100%', boxSizing: 'border-box', padding: '8px 12px', borderRadius: '8px',
      border: '1px solid var(--border)', background: 'var(--surface)',
      color: 'var(--text)', fontSize: '12px', fontFamily: 'var(--fontBody)', marginBottom: '8px'
    }
  });
  caseIdInput.setAttribute('placeholder', 'Grievance ID (e.g. GR-2025-042)\u2026');
  container.appendChild(caseIdInput);

  // Case dropdown when cases are loaded
  if (AppState.cases && AppState.cases.length > 0) {
    container.appendChild(el('div', {
      style: { fontSize: '10px', color: 'var(--muted)', fontFamily: 'var(--fontBody)', marginBottom: '4px' }
    }, 'Or select from your active cases:'));

    var caseSelect = document.createElement('select');
    caseSelect.style.cssText = 'width:100%;box-sizing:border-box;padding:8px 12px;border-radius:8px;' +
      'border:1px solid var(--border);background:var(--surface);color:var(--text);' +
      'font-size:12px;font-family:var(--fontBody);margin-bottom:8px;';

    var defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = '\u2014 Select a case \u2014';
    caseSelect.appendChild(defaultOpt);

    AppState.cases.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.id + ' (' + (c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown') + ')';
      caseSelect.appendChild(opt);
    });

    caseSelect.addEventListener('change', function() {
      if (caseSelect.value) caseIdInput.value = caseSelect.value;
    });
    container.appendChild(caseSelect);
  }

  var urlInput = el('input', {
    style: {
      width: '100%', boxSizing: 'border-box', padding: '8px 12px', borderRadius: '8px',
      border: '1px solid var(--border)', background: 'var(--surface)',
      color: 'var(--text)', fontSize: '12px', fontFamily: 'var(--fontBody)', marginBottom: '8px'
    }
  });
  urlInput.setAttribute('placeholder', 'https://zoom.us/j/\u2026 or https://teams.microsoft.com/\u2026');
  urlInput.setAttribute('type', 'url');
  container.appendChild(urlInput);

  var statusMsg = el('div', {
    style: { fontSize: '11px', fontFamily: 'var(--fontBody)', marginBottom: '6px', minHeight: '18px' }
  }, '');
  container.appendChild(statusMsg);

  var injectBtn = el('button', {
    style: {
      width: '100%', padding: '10px', borderRadius: '8px', fontSize: '12px',
      background: 'var(--accent)', color: '#fff', border: 'none',
      cursor: 'pointer', fontFamily: 'var(--fontBody)', fontWeight: '600'
    }
  }, 'Inject Hearing URL');
  injectBtn.addEventListener('click', function() {
    var gId = caseIdInput.value.trim();
    var url = urlInput.value.trim();

    if (!gId) {
      statusMsg.textContent = 'Please enter a Grievance ID.';
      statusMsg.style.color = 'var(--danger)';
      return;
    }
    if (!/^https?:\/\//i.test(url)) {
      statusMsg.textContent = 'URL must start with https://';
      statusMsg.style.color = 'var(--danger)';
      return;
    }

    statusMsg.textContent = 'Saving\u2026';
    statusMsg.style.color = 'var(--muted)';
    injectBtn.disabled = true;

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          statusMsg.textContent = '\u2713 Hearing URL set for ' + gId;
          statusMsg.style.color = 'var(--success)';
          urlInput.value = '';
          caseIdInput.value = '';
        } else {
          statusMsg.textContent = (result && result.error) ? result.error : 'Grievance not found.';
          statusMsg.style.color = 'var(--danger)';
        }
        injectBtn.disabled = false;
      })
      .withFailureHandler(function(err) {
        statusMsg.textContent = 'Error: ' + (err && err.message ? err.message : 'Unknown error');
        statusMsg.style.color = 'var(--danger)';
        injectBtn.disabled = false;
      })
      .dataSetHearingUrl(gId, url);
  });
  container.appendChild(injectBtn);
}

// ── Steward Bottom Nav ────────────────────────────────────────────────────────
function renderStewardBottomNav(container, activeTab) {
  var nav = el('div', { className: 'bottom-nav' });

  var tabs = [
    { id: 'cases',       icon: '\uD83D\uDCCB', label: 'Cases' },
    { id: 'clipboard',   icon: '\uD83D\uDCDD', label: 'Clipboard' },
    { id: 'leaderboard', icon: '\uD83C\uDFC6', label: 'Rankings' },
    { id: 'tools',       icon: '\uD83D\uDEE0\uFE0F', label: 'Tools' },
  ];

  tabs.forEach(function(tab) {
    var item = el('div', {
      className: 'nav-item' + (tab.id === activeTab ? ' active' : ''),
      style: { cursor: 'pointer' }
    });
    item.appendChild(el('span', { className: 'nav-icon' }, tab.icon));
    var label = el('span', { className: 'nav-label' }, tab.label);
    if (tab.id === activeTab) label.style.color = 'var(--accent)';
    item.appendChild(label);

    item.addEventListener('click', function() {
      STEWARD_ACTIVE_TAB = tab.id;
      renderStewardMain(container, tab.id);
    });

    nav.appendChild(item);
  });

  container.appendChild(nav);
}

// ── Legacy shim (backwards-compat for any callers) ────────────────────────────
function renderBottomNav(container, role, activeTab) {
  if (role === 'steward') {
    renderStewardBottomNav(container, activeTab);
  }
  // member nav is handled by renderMemberBottomNav in member_view.html
}
</script>
