<script>
function initStewardView(container) {
var t = ThemeEngine.getTheme('steward', AppState.isDark);
ThemeEngine.applyTheme(t);
AppState.activeRole = 'steward';
showLoading(container, 'kpi');
var batch = AppState.batchData;
if (batch && batch.cases) {
AppState.cases = batch.cases || [];
AppState.kpis = batch.kpis || { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
AppState.notificationCount = batch.notificationCount || 0;
AppState.memberCount = batch.memberCount || 0;
AppState.taskCount = batch.taskCount || 0;
AppState.overdueTaskCount = batch.overdueTaskCount || 0;
AppState.qaUnansweredCount = batch.qaUnansweredCount || 0;
AppState.loading = false;
renderStewardDashboard(container);
_checkDeepLink('steward');
return;
}
serverCall()
.withSuccessHandler(function(result) {
AppState.cases = result.cases || [];
AppState.kpis = result.kpis || { totalCases: 0, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
AppState.notificationCount = (result.badges && result.badges.notificationCount) || 0;
AppState.taskCount = (result.badges && result.badges.taskCount) || 0;
AppState.overdueTaskCount = (result.badges && result.badges.overdueTaskCount) || 0;
AppState.qaUnansweredCount = (result.badges && result.badges.qaUnansweredCount) || 0;
AppState.memberCount = result.memberCount || 0;
AppState.loading = false;
renderStewardDashboard(container);
_checkDeepLink('steward');
})
.withFailureHandler(function() {
AppState.cases = [];
AppState.kpis = { totalCases: 0, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
AppState.loading = false;
renderStewardDashboard(container);
})
.dataGetStewardDashboardInit(SESSION_TOKEN);
}
function _stewardHeader(container, title, subtitle) {
var header = el('div', { className: 'page-header' });
var headerLeft = el('div', { className: 'page-header-left' });
headerLeft.appendChild(el('div', { className: 'page-title' }, title));
if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
header.appendChild(headerLeft);
var headerRight = el('div', { className: 'page-header-right' });
if (!isSidebarLayout()) {
headerRight.appendChild(el('button', {
style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
onClick: function() { AppState.activeRole = 'member'; initMemberView(document.getElementById('app')); }
}, '\uD83D\uDC64 ' + CONFIG.memberLabel));
headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
AppState.isDark = !AppState.isDark;
try { localStorage.setItem('dds_isDark', AppState.isDark); } catch(e) {}
ThemeEngine.applyTheme(ThemeEngine.getTheme('steward', AppState.isDark));
renderStewardDashboard(document.getElementById('app'));
}}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
}
header.appendChild(headerRight);
container.appendChild(header);
}
function renderStewardDashboard(appContainer) {
renderPageLayout(appContainer, 'steward', 'cases', function(container) {
_stewardHeader(container, 'Cases', CURRENT_USER.name + ' \u00B7 ' + CURRENT_USER.unit);
var welcomeSlot = el('div');
container.appendChild(welcomeSlot);
_maybeShowWelcome(welcomeSlot, 'steward');
var kpis = AppState.kpis || {};
var kpiGrid = el('div', { className: 'kpi-grid' });
var isOrgFallback = (kpis.totalCases || 0) === 0;
if (isOrgFallback) {
var kpiItems = [
{ label: 'Org Cases', value: '...', color: null },
{ label: 'Org Overdue', value: '...', color: null },
{ label: 'Org Due <7d', value: '...', color: null },
{ label: 'Org Resolved', value: '...', color: 'var(--success)' },
];
kpiItems.forEach(function(kpi) {
var card = el('div', { className: 'kpi-card' });
card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
var val = el('div', { className: 'kpi-value' }, kpi.value);
if (kpi.color) val.style.color = kpi.color;
card.appendChild(val);
kpiGrid.appendChild(card);
});
container.appendChild(kpiGrid);
var orgNote = el('div', { style: { textAlign: 'center', fontSize: '11px', color: 'var(--muted)', marginTop: '-6px', marginBottom: '10px' } }, '(no cases assigned to you — showing org-wide)');
container.appendChild(orgNote);
serverCall().withSuccessHandler(function(stats) {
var cards = kpiGrid.querySelectorAll('.kpi-value');
if (!stats || !stats.available) {
if (cards[0]) cards[0].textContent = '0';
if (cards[1]) cards[1].textContent = '0';
if (cards[2]) cards[2].textContent = '0';
if (cards[3]) cards[3].textContent = '0';
return;
}
if (cards[0]) cards[0].textContent = String(stats.total || 0);
if (cards[1]) { cards[1].textContent = String(stats.overdueCount || 0); if (stats.overdueCount > 0) cards[1].style.color = 'var(--danger)'; }
if (cards[2]) { cards[2].textContent = String(stats.dueSoonCount || 0); if (stats.dueSoonCount > 0) cards[2].style.color = 'var(--warning)'; }
if (cards[3]) cards[3].textContent = String(stats.settledCount || stats.wonCount || 0);
}).withFailureHandler(function(err) {
console.error('Org KPI stats failed:', err && err.message);
var cards = kpiGrid.querySelectorAll('.kpi-value');
if (cards[0]) cards[0].textContent = '\u2014';
if (cards[1]) cards[1].textContent = '\u2014';
if (cards[2]) cards[2].textContent = '\u2014';
if (cards[3]) cards[3].textContent = '\u2014';
}).dataGetGrievanceStats(SESSION_TOKEN);
} else {
var kpiItems = [
{ label: 'My Cases', value: kpis.totalCases || 0 },
{ label: 'Overdue', value: kpis.overdue || 0, color: kpis.overdue > 0 ? 'var(--danger)' : null },
{ label: 'Due <7d', value: kpis.dueSoon || 0, color: kpis.dueSoon > 0 ? 'var(--warning)' : null },
{ label: 'Resolved', value: kpis.resolved || 0, color: 'var(--success)' },
];
kpiItems.forEach(function(kpi) {
var card = el('div', { className: 'kpi-card' });
card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
var val = el('div', { className: 'kpi-value' }, String(kpi.value));
if (kpi.color) val.style.color = kpi.color;
card.appendChild(val);
kpiGrid.appendChild(card);
});
container.appendChild(kpiGrid);
}
var filter = 'all';
var filterBar = el('div', { className: 'filter-bar' });
var overdueCount = AppState.cases.filter(function(c) { return c.status === 'overdue'; }).length;
var filters = [
{ key: 'all', label: 'All ' + AppState.cases.length },
{ key: 'overdue', label: 'Overdue ' + overdueCount },
{ key: 'active', label: 'Active' },
];
filters.forEach(function(f) {
var tab = el('button', {
className: 'filter-tab' + (filter === f.key ? ' active' : ''),
onClick: function() {
filter = f.key;
renderCaseList(caseListContainer, filter);
filterBar.querySelectorAll('.filter-tab').forEach(function(t, i) {
t.className = 'filter-tab' + (filters[i].key === filter ? ' active' : '');
});
}
}, f.label);
filterBar.appendChild(tab);
});
container.appendChild(filterBar);
var caseListContainer = el('div', { className: 'content' });
renderCaseList(caseListContainer, filter);
container.appendChild(caseListContainer);
var fab = el('button', { className: 'fab', onClick: function() { renderBroadcast(document.getElementById('app')); } }, '\uD83D\uDCE2');
container.appendChild(fab);
});
}
function _maybeShowWelcome(slot, viewRole) {
if (AppState._welcomeDismissed) return;
serverCall().withSuccessHandler(function(data) {
if (!data || !data.isFirstVisit) return;
var card = el('div', {
className: 'card card-glass card-fade-in',
style: {
padding: '24px 20px',
margin: '0 0 14px',
background: 'linear-gradient(135deg, var(--accentBg), rgba(255,255,255,0.03))',
border: '1px solid var(--accentBorder)',
position: 'relative'
}
});
var safeName = (data.userName || 'there').replace(/[<>&"']/g, '');
card.appendChild(el('div', {
style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: 'var(--text)', marginBottom: '8px' }
}, 'Welcome, ' + safeName + '!'));
card.appendChild(el('div', {
style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.5', marginBottom: '16px' }
}, 'This is your ' + CONFIG.stewardLabel + ' dashboard. Track grievance cases, manage member communications, monitor deadlines, and access all your tools in one place.'));
var grid = el('div', {
style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '16px' }
});
(data.quickActions || []).forEach(function(qa) {
var actionCard = el('div', {
className: 'card card-clickable',
style: {
padding: '12px',
textAlign: 'center',
cursor: 'pointer',
background: 'var(--surface)',
border: '1px solid var(--border)',
borderRadius: '10px'
},
onClick: function() {
_dismissWelcome(card);
_handleTabNav('steward', qa.action);
}
});
actionCard.appendChild(el('div', { style: { fontSize: '22px', marginBottom: '4px' } }, qa.icon));
actionCard.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontDisplay)' } }, qa.label));
grid.appendChild(actionCard);
});
card.appendChild(grid);
card.appendChild(el('button', {
className: 'btn',
style: {
width: '100%',
background: 'var(--accent)',
color: '#fff',
border: 'none',
borderRadius: '8px',
padding: '10px',
fontSize: '13px',
fontWeight: '600',
cursor: 'pointer'
},
onClick: function() { _dismissWelcome(card); }
}, 'Got it!'));
slot.appendChild(card);
}).dataGetWelcomeData(SESSION_TOKEN);
}
function _dismissWelcome(cardEl) {
AppState._welcomeDismissed = true;
if (cardEl) {
cardEl.style.opacity = '0';
cardEl.style.transition = 'opacity 0.3s ease';
setTimeout(function() { cardEl.remove(); }, 300);
}
serverCall().withFailureHandler(function(e) { console.error(e.message); }).dataMarkWelcomeDismissed(SESSION_TOKEN);
}
function renderCaseList(container, filter) {
container.innerHTML = '';
var TERMINAL = ['resolved', 'won', 'denied', 'settled', 'withdrawn', 'closed'];
var cases = AppState.cases;
if (filter === 'overdue') {
cases = cases.filter(function(c) { return c.status === 'overdue'; });
} else if (filter === 'active') {
cases = cases.filter(function(c) {
return c.status !== 'overdue' && TERMINAL.indexOf(c.status) === -1;
});
}
if (cases.length === 0) {
if (filter === 'all' && AppState.cases.length === 0) {
var agencySlot = el('div', { style: { textAlign: 'center', padding: '20px 0' } });
agencySlot.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '14px' } }, 'No cases currently assigned to you.'));
agencySlot.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Agency-Wide Overview'));
var agencyCharts = el('div');
agencySlot.appendChild(agencyCharts);
container.appendChild(agencySlot);
serverCall().withSuccessHandler(function(data) {
if (!data || !data.available) {
agencyCharts.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, 'Grievance stats not yet available.'));
return;
}
agencyCharts.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '8px' } }, data.total + ' total grievances agency-wide'));
if (typeof ChartHelper !== 'undefined') {
var sLabels = Object.keys(data.byStatus);
var sData = sLabels.map(function(k) { return data.byStatus[k]; });
var sCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '8px', textAlign: 'left' } });
sCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Status Breakdown'));
ChartHelper.createDoughnutChart(sCard, 'agency-status-chart', sLabels, sData);
agencyCharts.appendChild(sCard);
if (data.byStep) {
var stLabels = Object.keys(data.byStep);
var stData = stLabels.map(function(k) { return data.byStep[k]; });
var stCard = el('div', { className: 'card card-glass', style: { padding: '14px', textAlign: 'left' } });
stCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Step'));
ChartHelper.createBarChart(stCard, 'agency-step-chart', stLabels, [{ label: 'Count', data: stData }]);
agencyCharts.appendChild(stCard);
}
}
}).withFailureHandler(function() {
agencyCharts.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load agency stats.'));
}).dataGetGrievanceStats(SESSION_TOKEN);
} else {
container.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' } },
'No ' + filter + ' cases.'));
}
return;
}
var CASE_PAGE_SIZE = 25;
var _caseRenderCount = CASE_PAGE_SIZE;
function _renderCasePage() {
var frag = document.createDocumentFragment();
var slice = cases.slice(0, _caseRenderCount);
slice.forEach(function(c) {
var isOverdue = c.status === 'overdue';
var statusClass = c.status || 'active';
var card = el('div', { className: 'card card-clickable', style: { padding: '11px 14px', marginBottom: '6px' } });
var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
var leftGroup = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
leftGroup.appendChild(el('div', { className: 'status-dot ' + statusClass }));
leftGroup.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, c.id));
topRow.appendChild(leftGroup);
var deadlineSpan = el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: isOverdue ? 'var(--danger)' : 'var(--muted)', fontWeight: isOverdue ? '700' : '400' } });
deadlineSpan.textContent = c.deadlineDays !== null ? c.deadlineDays + 'd' : '\u2014';
topRow.appendChild(deadlineSpan);
card.appendChild(topRow);
var bottomRow = el('div', { style: { paddingLeft: '15px', display: 'flex', justifyContent: 'space-between' } });
var memberDisplay = c.memberName || (c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown');
bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)' } }, memberDisplay + ' \u00B7 ' + (c.step || '')));
bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '10px', color: 'var(--muted)' } }, c.unit || ''));
card.appendChild(bottomRow);
var checklistArea = el('div', { style: { display: 'none', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' } });
var checklistLoaded = false;
card.appendChild(checklistArea);
card.addEventListener('click', function(ev) {
ev.stopPropagation();
var showing = checklistArea.style.display !== 'none';
checklistArea.style.display = showing ? 'none' : 'block';
if (!showing && !checklistLoaded) {
checklistLoaded = true;
_renderCaseChecklist(checklistArea, c.id);
}
});
frag.appendChild(card);
});
container.innerHTML = '';
container.appendChild(frag);
if (_caseRenderCount < cases.length) {
var remaining = cases.length - _caseRenderCount;
var showMoreBtn = el('button', {
className: 'btn btn-secondary',
style: { width: '100%', margin: '8px 0', fontSize: '12px' },
onClick: function() {
_caseRenderCount += CASE_PAGE_SIZE;
_renderCasePage();
}
}, 'Show more (' + remaining + ' remaining)');
container.appendChild(showMoreBtn);
}
}
_renderCasePage();
}
var _refreshNavBadgesTimer = null;
function _refreshNavBadges() {
if (_refreshNavBadgesTimer) clearTimeout(_refreshNavBadgesTimer);
_refreshNavBadgesTimer = setTimeout(function() {
_refreshNavBadgesTimer = null;
var guard = typeof _tabGuard === 'function' ? _tabGuard() : { stale: function() { return false; } };
if (typeof _invalidateTabCache === 'function') _invalidateTabCache();
serverCall().withSuccessHandler(function(kpis) {
if (guard.stale()) return;
if (kpis) AppState.kpis = kpis;
}).withFailureHandler(function() {}).dataGetStewardKPIs(SESSION_TOKEN);
serverCall().withSuccessHandler(function(tasks) {
if (guard.stale()) return;
var open = (tasks || []).filter(function(t) { return t.status !== 'completed'; });
AppState.taskCount = open.length;
AppState.overdueTaskCount = open.filter(function(t) { return t.dueDays !== null && t.dueDays < 0; }).length;
serverCall().withSuccessHandler(function(count) {
if (guard.stale()) return;
AppState.qaUnansweredCount = count || 0;
_swapBottomNav();
}).withFailureHandler(function() {
_swapBottomNav();
}).qaGetUnansweredCount(SESSION_TOKEN);
}).withFailureHandler(function() {}).dataGetTasks(SESSION_TOKEN, null);
}, 600);
}
function _swapBottomNav() {
var appRoot = document.getElementById('app') || document;
var existingNav = appRoot.querySelector('.bottom-nav');
if (existingNav && existingNav.parentNode) {
var parent = existingNav.parentNode;
var replacement = document.createElement('div');
parent.replaceChild(replacement, existingNav);
renderBottomNav(replacement, 'steward', AppState.activeTab || 'cases');
var newNav = replacement.querySelector('.bottom-nav');
if (newNav) parent.replaceChild(newNav, replacement);
}
}
function renderStewardMembers(appContainer) {
renderPageLayout(appContainer, 'steward', 'members', function(container) {
_stewardHeader(container, 'Members');
var content = el('div', { className: 'content' });
var hasCachedMembers = typeof DataCache !== 'undefined' && DataCache.has('stewardMembers_' + (CURRENT_USER && CURRENT_USER.email || ''));
if (!hasCachedMembers) {
showLoading(content, 'member-list');
}
container.appendChild(content);
var _prefetchedStats = null;
var _statsCacheKey = 'stewardMemberStats_' + (CURRENT_USER && CURRENT_USER.email || '');
function _onStatsLoaded(stats) {
_prefetchedStats = stats;
var searchEl = content.querySelector('.search-input');
if (searchEl && stats && stats.byLocation && typeof ChartHelper !== 'undefined') {
var locCard = el('div', { className: 'card', style: { padding: '12px', marginBottom: '14px' } });
var locLabel = stats.scope === 'all' ? 'All Members by Location' : 'By Location';
locCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '12px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, locLabel));
var lLabels = Object.keys(stats.byLocation);
var lData = lLabels.map(function(k) { return stats.byLocation[k]; });
ChartHelper.createHorizontalBarChart(locCard, 'members-loc-chart', lLabels, lData);
content.insertBefore(locCard, searchEl);
}
}
if (typeof DataCache !== 'undefined') {
DataCache.cachedCall(_statsCacheKey, 'dataGetStewardMemberStats', [SESSION_TOKEN],
_onStatsLoaded, function() { /* chart optional */ }, DataCache.STABLE_TTL);
} else if (typeof ChartHelper !== 'undefined') {
serverCall().withSuccessHandler(_onStatsLoaded).withFailureHandler(function() { /* chart optional */ }).dataGetStewardMemberStats(SESSION_TOKEN);
}
function _onMembersLoaded(members) {
content.innerHTML = '';
if (!members || members.length === 0) {
var msg = (members && members.length === 0)
? 'No members found. If this is unexpected, your session may have expired — try refreshing the page.'
: 'Failed to load members. Please refresh and try again.';
content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, msg));
return;
}
var myCount = members.filter(function(m) { return m.assignedSteward && m.assignedSteward.toLowerCase() === CURRENT_USER.email.toLowerCase(); }).length;
var activeGrievances = members.filter(function(m) { return m.hasOpenGrievance; }).length;
var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)' } });
[
{ label: 'Total', value: members.length },
{ label: 'Active Cases', value: activeGrievances, color: activeGrievances > 0 ? 'var(--warning)' : null },
{ label: 'My Assigned', value: myCount, color: 'var(--accent)' },
].forEach(function(kpi) {
var card = el('div', { className: 'kpi-card' });
card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
var val = el('div', { className: 'kpi-value' }, String(kpi.value));
if (kpi.color) val.style.color = kpi.color;
card.appendChild(val);
kpiStrip.appendChild(card);
});
content.appendChild(kpiStrip);
if (_prefetchedStats && _prefetchedStats.byLocation && typeof ChartHelper !== 'undefined') {
var locCard = el('div', { className: 'card', style: { padding: '12px', marginBottom: '14px' } });
var locLabel = _prefetchedStats.scope === 'all' ? 'All Members by Location' : 'By Location';
locCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '12px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, locLabel));
var lLabels = Object.keys(_prefetchedStats.byLocation);
var lData = lLabels.map(function(k) { return _prefetchedStats.byLocation[k]; });
ChartHelper.createHorizontalBarChart(locCard, 'members-loc-chart', lLabels, lData);
content.appendChild(locCard);
}
var controlRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px', flexWrap: 'wrap' } });
var sortSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
[{ v: 'name-az', l: 'Name A-Z' }, { v: 'name-za', l: 'Name Z-A' }, { v: 'location', l: 'Location' }].forEach(function(o) {
sortSelect.appendChild(el('option', { value: o.v }, o.l));
});
controlRow.appendChild(sortSelect);
var filterSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
filterSelect.appendChild(el('option', { value: 'nearby' }, 'My Location'));
filterSelect.appendChild(el('option', { value: 'all' }, 'All Members'));
filterSelect.appendChild(el('option', { value: 'assigned' }, 'Assigned to Me'));
filterSelect.appendChild(el('option', { value: 'grievance' }, 'Has Open Case'));
var locs = {};
members.forEach(function(m) { if (m.workLocation) locs[m.workLocation] = true; });
Object.keys(locs).sort().forEach(function(loc) {
filterSelect.appendChild(el('option', { value: 'loc:' + loc }, loc));
});
controlRow.appendChild(filterSelect);
content.appendChild(controlRow);
var _memberFilterTimer = null;
function debouncedRerender() {
clearTimeout(_memberFilterTimer);
_memberFilterTimer = setTimeout(rerender, 150);
}
var searchInput = el('input', {
className: 'search-input',
placeholder: 'Search members...',
onInput: debouncedRerender
});
content.appendChild(searchInput);
var listArea = el('div');
content.appendChild(listArea);
sortSelect.addEventListener('change', debouncedRerender);
filterSelect.addEventListener('change', debouncedRerender);
function rerender() {
_memberListPage = 0;
var q = searchInput.value.toLowerCase();
var sortKey = sortSelect.value;
var filterKey = filterSelect.value;
var filtered = members.slice();
if (q) {
filtered = filtered.filter(function(m) {
return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
(m.email || '').toLowerCase().indexOf(q) !== -1 ||
(m.workLocation || '').toLowerCase().indexOf(q) !== -1;
});
}
if (filterKey === 'nearby') {
var myLoc = (CURRENT_USER && CURRENT_USER.workLocation || '').toLowerCase();
var myDays = (CURRENT_USER && CURRENT_USER.officeDays || '').toLowerCase().split(/[,;\s]+/).filter(Boolean);
filtered = filtered.filter(function(m) {
if (!myLoc) return true; // No location info — show all
return (m.workLocation || '').toLowerCase() === myLoc;
});
filtered.sort(function(a, b) {
var aDays = (a.officeDays || '').toLowerCase().split(/[,;\s]+/);

function _surveyPaginate(container, items, showProximity) {

var totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
var listArea = el('div');

function render() {

pageLabel.textContent = 'Page ' + (page + 1) + ' of ' + totalPages + ' (' + items.length + ' total)';
prevBtn.disabled = page === 0;
nextBtn.disabled = page >= totalPages - 1;
prevBtn.style.visibility = totalPages <= 1 ? 'hidden' : '';
nextBtn.style.visibility = totalPages <= 1 ? 'hidden' : '';
pageLabel.style.display = totalPages <= 1 ? 'none' : '';
}
prevBtn.onclick = function() { if (page > 0) { page--; render(); } };
nextBtn.onclick = function() { if (page < totalPages - 1) { page++; render(); } };
container.appendChild(listArea);
navRow.appendChild(prevBtn);
navRow.appendChild(pageLabel);
navRow.appendChild(nextBtn);
if (items.length > PAGE_SIZE) container.appendChild(navRow);
render();
}

var descEl = el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '4px' } });
descEl.textContent = isLong ? evt.description.substring(0, TRUNCATE) + '\u2026' : evt.description;
card.appendChild(descEl);
if (isLong) {
var expanded = false;
var toggleBtn = el('button', {
style: { fontSize: '11px', color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', marginTop: '2px' },
onClick: function() {
expanded = !expanded;
descEl.textContent = expanded ? evt.description : evt.description.substring(0, TRUNCATE) + '\u2026';
toggleBtn.textContent = expanded ? 'Show less' : 'Show more';
}
}, 'Show more');
card.appendChild(toggleBtn);
}
}
if (evt.driveFiles && evt.driveFiles.length > 0) {
var filesDiv = el('div', { style: { marginTop: '8px', fontSize: '11px' } });
filesDiv.appendChild(el('span', { style: { color: 'var(--muted)' } }, '\uD83D\uDCCE Files: '));
evt.driveFiles.forEach(function(f, idx) {
if (idx > 0) filesDiv.appendChild(document.createTextNode(', '));
filesDiv.appendChild(el('a', { href: 'https://drive.google.com/file/d/' + f.id + '/view', target: '_blank', style: { color: 'var(--accent)' } }, f.name));
});
card.appendChild(filesDiv);
}
if (evt.meetingMinutesId) {
card.appendChild(el('div', { style: { marginTop: '6px', fontSize: '11px' } },
el('a', { href: 'https://docs.google.com/document/d/' + evt.meetingMinutesId + '/edit', target: '_blank', style: { color: 'var(--accent)' } }, '\uD83D\uDCC4 Meeting Minutes')
));
}
var acts = el('div', { style: { display: 'flex', gap: '6px', marginTop: '10px' } });
acts.appendChild(el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--surfaceAlt)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer' },
onClick: function() { _openEditForm(card, acts, evt, function() { currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); }); }
}, 'Edit'));
var delBtn = el('button', {
style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600', cursor: 'pointer' },
onClick: function() {
if (!confirm('Delete \u201C' + evt.title + '\u201D? This cannot be undone.')) return;
delBtn.disabled = true; delBtn.textContent = 'Deleting\u2026';
serverCall().withSuccessHandler(function(r) {
if (r && r.success) { currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); }
else { delBtn.disabled = false; delBtn.textContent = 'Delete'; alert((r && r.message) || 'Delete failed.'); }
}).withFailureHandler(function() {
delBtn.disabled = false; delBtn.textContent = 'Delete';
}).tlDeleteTimelineEvent(SESSION_TOKEN, evt.id);
}
}, 'Delete');
acts.appendChild(delBtn);
card.appendChild(acts);
item.appendChild(card);
tlContainer.appendChild(item);
});
var total = result.total || 0;
var shown = (result.page || 1) * (result.pageSize || PAGE_SIZE);
if (shown < total) {
var moreBtn = el('button', {
className: 'btn tl-load-more',
style: { display: 'block', margin: '16px auto', fontSize: '13px' },
onClick: function() {
currentPage++;
moreBtn.textContent = 'Loading\u2026';
moreBtn.disabled = true;
_loadEvents(cont, listArea);
}
}, 'Load More (' + (total - shown) + ' remaining)');
listArea.appendChild(moreBtn);
}
}).withFailureHandler(function() {
if (currentPage === 1) {
listArea.innerHTML = '';
listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load timeline.'));
}
}).tlGetTimelineEvents(SESSION_TOKEN, currentPage, PAGE_SIZE, filterYear || null, filterCategory || null);
}
function _openEditForm(card, actsEl, evt, onSave) {
if (actsEl.parentNode) actsEl.parentNode.removeChild(actsEl);
var editForm = el('div', { style: { borderTop: '1px solid var(--border)', marginTop: '10px', paddingTop: '10px' } });
var titleInput = el('input', { className: 'form-input', value: evt.title, style: { marginBottom: '6px' } });
var dateInput = el('input', { className: 'form-input', type: 'date', style: { marginBottom: '6px' } });
if (evt.eventDateRaw) {
var d = new Date(evt.eventDateRaw);
var yr = d.getUTCFullYear();
var mo = String(d.getUTCMonth() + 1).padStart(2, '0');
var dy = String(d.getUTCDate()).padStart(2, '0');
dateInput.value = yr + '-' + mo + '-' + dy;
}
var descInput = el('textarea', { className: 'msg-textarea', style: { minHeight: '60px', marginBottom: '6px' } });
descInput.value = evt.description || '';
var catSelect = el('select', { className: 'form-select', style: { marginBottom: '8px' } });
cachedCategories.forEach(function(c) {
var opt = el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1));
if (c === evt.category) opt.selected = true;
catSelect.appendChild(opt);
});
var minutesInput = el('input', { className: 'form-input', placeholder: 'Doc ID or docs.google.com URL', style: { marginBottom: '8px' } });
minutesInput.value = evt.meetingMinutesId || '';
var driveHint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Add Drive URLs or file IDs (one per line). Existing files are kept.');
var driveInput = el('textarea', { className: 'msg-textarea', placeholder: 'https://drive.google.com/file/d/... or raw ID', style: { minHeight: '44px', fontFamily: 'var(--fontMono, monospace)', fontSize: '11px', marginBottom: '8px' } });
var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginBottom: '6px' } });
var btnRow = el('div', { style: { display: 'flex', gap: '6px' } });
btnRow.appendChild(el('button', {
className: 'btn btn-primary', style: { fontSize: '12px' },
onClick: function() {
var t = titleInput.value.trim();
if (!t) { statusMsg.textContent = 'Title required.'; statusMsg.style.color = 'var(--danger)'; return; }
statusMsg.textContent = 'Saving\u2026'; statusMsg.style.color = 'var(--muted)';
var rawMinutes = minutesInput.value.trim();
var minutesId = '';
if (rawMinutes) {
var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
minutesId = mMatch ? mMatch[1] : rawMinutes;
}
var newDriveIds = parseDriveIds(driveInput.value);
var pending = 1;
function _finish() {
serverCall().withSuccessHandler(function(r) {
if (r && r.success) { onSave(); }
else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
}).withFailureHandler(function() {
statusMsg.textContent = 'Save failed.'; statusMsg.style.color = 'var(--danger)';
}).tlUpdateTimelineEvent(SESSION_TOKEN, evt.id, {
title: t, eventDate: dateInput.value,
description: descInput.value.trim(), category: catSelect.value,
meetingMinutesId: minutesId
});
}
if (newDriveIds.length) {
serverCall().withSuccessHandler(function() { _finish(); })
.withFailureHandler(function() { _finish(); })
.tlAttachDriveFiles(SESSION_TOKEN, evt.id, newDriveIds.join(','));
} else {
_finish();
}
}
}, 'Save'));
btnRow.appendChild(el('button', {
className: 'btn', style: { fontSize: '12px' },
onClick: function() { card.removeChild(editForm); card.appendChild(actsEl); }
}, 'Cancel'));
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Title'));
editForm.appendChild(titleInput);
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Date'));
editForm.appendChild(dateInput);
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Description'));
editForm.appendChild(descInput);
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Category'));
editForm.appendChild(catSelect);
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Meeting Minutes (optional)'));
editForm.appendChild(minutesInput);
editForm.appendChild(el('div', { className: 'form-label', style: { marginBottom: '4px' } }, 'Attach Drive Files (optional)'));
editForm.appendChild(driveHint);
editForm.appendChild(driveInput);
editForm.appendChild(statusMsg);
editForm.appendChild(btnRow);
card.appendChild(editForm);
}
function _renderAddEventForm(cont) {
cont.appendChild(el('h3', { className: 'section-title' }, 'Add Event'));
var titleInput = el('input', { className: 'form-input', placeholder: 'Event title' });
_formGroup(cont, 'Title', titleInput);
var dateInput = el('input', { className: 'form-input', type: 'date' });
_formGroup(cont, 'Event Date', dateInput);
var descInput = el('textarea', { className: 'msg-textarea', placeholder: 'Event details...', style: { minHeight: '80px' } });
_formGroup(cont, 'Description', descInput);
var catSelect = el('select', { className: 'form-select' });
if (cachedCategories.length) {
cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
} else {
catSelect.appendChild(el('option', { value: '' }, 'Loading...'));
serverCall().withSuccessHandler(function(cats) {
cachedCategories = cats || [];
catSelect.innerHTML = '';
cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
}).tlGetCategories(SESSION_TOKEN);
}
_formGroup(cont, 'Category', catSelect);
var minutesInput = el('input', { className: 'form-input', placeholder: 'Doc ID or docs.google.com URL (optional)' });
_formGroup(cont, 'Meeting Minutes (optional)', minutesInput);
var driveHint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Paste Drive share URLs or file IDs, one per line.');
var driveInput = el('textarea', { className: 'msg-textarea', placeholder: 'https://drive.google.com/file/d/... or raw ID', style: { minHeight: '50px', fontFamily: 'var(--fontMono, monospace)', fontSize: '11px' } });
var driveGroup = el('div', { className: 'form-group' });
driveGroup.appendChild(el('label', { className: 'form-label' }, 'Drive Files (optional)'));
driveGroup.appendChild(driveHint);
driveGroup.appendChild(driveInput);
cont.appendChild(driveGroup);
var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
cont.appendChild(statusMsg);
cont.appendChild(el('button', {
className: 'btn btn-primary',
onClick: function() {
var title = titleInput.value.trim();
if (!title) { statusMsg.textContent = 'Enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
statusMsg.textContent = 'Creating\u2026'; statusMsg.style.color = 'var(--muted)';
var rawMinutes = minutesInput.value.trim();
var minutesId = '';
if (rawMinutes) {
var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
minutesId = mMatch ? mMatch[1] : rawMinutes;
}
serverCall().withSuccessHandler(function(r) {
if (r && r.success) {
statusMsg.textContent = 'Event created!'; statusMsg.style.color = 'var(--success)';
titleInput.value = ''; descInput.value = ''; dateInput.value = '';
driveInput.value = ''; minutesInput.value = '';
setTimeout(function() { activeSubTab = 'timeline'; refreshSubTabs(); renderTLSubContent(); }, 800);
} else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
}).tlAddTimelineEvent(SESSION_TOKEN, {
title: title, eventDate: dateInput.value || '',
description: descInput.value.trim(), category: catSelect.value,
driveFileIds: parseDriveIds(driveInput.value).join(','),
meetingMinutesId: minutesId
});
}
}, 'Create Event'));
}
function _renderImportForm(cont) {
cont.appendChild(el('h3', { className: 'section-title' }, 'Import from Google Calendar'));
cont.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Import events from your Google Calendar. Already-imported events are skipped.'));
var startInput = el('input', { className: 'form-input', type: 'date' });
_formGroup(cont, 'Start Date', startInput);
var endInput = el('input', { className: 'form-input', type: 'date' });
_formGroup(cont, 'End Date', endInput);
var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
cont.appendChild(statusMsg);
cont.appendChild(el('button', {
className: 'btn btn-primary',
onClick: function() {
if (!startInput.value || !endInput.value) { statusMsg.textContent = 'Select both dates.'; statusMsg.style.color = 'var(--danger)'; return; }
statusMsg.textContent = 'Importing...'; statusMsg.style.color = 'var(--muted)';
serverCall().withSuccessHandler(function(r) {
if (r && r.success) { statusMsg.textContent = r.imported + ' events imported!'; statusMsg.style.color = 'var(--success)'; }
else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
}).tlImportCalendarEvents(SESSION_TOKEN, startInput.value, endInput.value);
}
}, 'Import Events'));
}
function _renderCategoriesTab(cont) {
cont.appendChild(el('h3', { className: 'section-title' }, 'Manage Categories'));
cont.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Add or remove event categories. Removing a category does not change existing events.'));
var listArea = el('div', { style: { marginBottom: '16px' } });
cont.appendChild(listArea);
function _loadCats() {
listArea.innerHTML = '';
showLoading(listArea);
serverCall().withSuccessHandler(function(cats) {
listArea.innerHTML = '';
cachedCategories = cats || [];
if (!cats || !cats.length) { listArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'No categories found.')); return; }
cats.forEach(function(cat) {
var row = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 10px', borderRadius: '6px', background: 'var(--surfaceAlt)', marginBottom: '4px' } });
row.appendChild(el('span', { className: 'category-badge ' + cat, style: { fontSize: '12px' } }, cat.charAt(0).toUpperCase() + cat.slice(1)));
row.appendChild(el('button', {
style: { fontSize: '11px', padding: '2px 8px', borderRadius: '4px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', cursor: 'pointer' },
onClick: function() {
if (!confirm('Remove category \u201C' + cat + '\u201D?')) return;
serverCall().withSuccessHandler(function(r) {
if (r && r.success) _loadCats(); else alert((r && r.message) || 'Delete failed.');
}).tlDeleteCategory(SESSION_TOKEN, cat);
}
}, 'Remove'));
listArea.appendChild(row);
});
}).withFailureHandler(function() {
listArea.innerHTML = '<div style="color:var(--danger);font-size:13px">Failed to load categories.</div>';
}).tlGetCategories(SESSION_TOKEN);
}
_loadCats();
var addRow = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
var newCatInput = el('input', { className: 'form-input', placeholder: 'New category name', style: { flex: '1' } });
var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginTop: '6px' } });
addRow.appendChild(newCatInput);
addRow.appendChild(el('button', {
className: 'btn btn-primary', style: { whiteSpace: 'nowrap' },
onClick: function() {
var name = newCatInput.value.trim();
if (!name) { statusMsg.textContent = 'Enter a name.'; statusMsg.style.color = 'var(--danger)'; return; }
statusMsg.textContent = 'Adding...'; statusMsg.style.color = 'var(--muted)';
serverCall().withSuccessHandler(function(r) {
if (r && r.success) { newCatInput.value = ''; statusMsg.textContent = ''; _loadCats(); }
else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
}).tlAddCategory(SESSION_TOKEN, name);
}
}, 'Add'));
cont.appendChild(addRow);
cont.appendChild(statusMsg);
}
refreshSubTabs();
renderTLSubContent();
content.appendChild(subTabBar);
content.appendChild(subContent);
container.appendChild(content);
});
}
</script>
