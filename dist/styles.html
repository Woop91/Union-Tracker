<style>
/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0; padding: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font: inherit; }
input { font: inherit; }

/* ═══════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════ */
#app {
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: 72px; /* space for bottom nav on mobile */
}

/* Page layout: sidebar + content on tablet+ */
.page-layout {
  display: flex;
  min-height: 100vh;
}
.page-layout-content {
  flex: 1;
  min-width: 0;
  padding-bottom: 72px;
}

/* ═══════════════════════════════════════
   SIDEBAR NAV (tablet+ only, hidden on mobile)
   ═══════════════════════════════════════ */
.sidebar-nav {
  display: none;
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-header {
  padding: 12px 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-header-title {
  font-family: var(--fontDisplay);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.sidebar-header-sub {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover {
  background: var(--accentBg);
  color: var(--text);
}
.sidebar-item.active {
  color: var(--accent);
  background: var(--accentBg);
  border-left-color: var(--accent);
  font-weight: 600;
}
.sidebar-item-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 20px;
}
.sidebar-group-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-secondary, #888);
  padding: 12px 24px 4px;
  margin-top: 4px;
  user-select: none;
}

.page-header {
  padding: 12px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.page-header-left {}
.page-header-right {
  display: flex;
  gap: 6px;
  align-items: center;
}
.page-title {
  font-family: var(--fontDisplay);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.page-subtitle {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.content { padding: 0 16px; }
.section-title {
  font-family: var(--fontDisplay);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 12px;
}

/* ═══════════════════════════════════════
   CARDS
   ═══════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.card-glass {
  /* OPT-8: removed backdrop-filter from cards for GPU performance — kept on modals/nav only */
  background: var(--surface);
}
.card-clickable { cursor: pointer; }
.card-clickable:active { opacity: 0.85; }

/* ═══════════════════════════════════════
   KPI GRID
   ═══════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 16px 14px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 8px;
  text-align: center;
}
.kpi-label {
  font-family: var(--fontBody);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.kpi-value {
  font-family: var(--fontBody);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.kpi-change {
  font-size: 10px;
  font-family: var(--fontBody);
  margin-top: 3px;
}

/* ═══════════════════════════════════════
   STATUS INDICATORS
   ═══════════════════════════════════════ */
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.overdue { background: var(--danger); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
.status-dot.active { background: var(--warning); box-shadow: 0 0 8px rgba(250,204,21,0.4); }
.status-dot.new { background: var(--info); box-shadow: 0 0 8px rgba(96,165,250,0.4); }
.status-dot.resolved { background: var(--success); box-shadow: 0 0 8px rgba(74,222,128,0.4); }

.status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  font-family: var(--fontBody);
}

/* Glow-bar — decorative status stripe on grievance cards.
   Sweep animation: bright peak travels left→right, matching skeleton shimmer language. */
@keyframes glowSweep {
  0%   { background-position: -300px 0; }
  100% { background-position:  300px 0; }
}
.glow-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background-size: 300px 100%;
  animation: glowSweep 2.5s linear 1;
}
/* 3-stop gradient: sweep animation creates the moving bright-peak effect without color-mix().
   Compatible with all browsers (Chrome 49+, Safari 10+, Firefox 52+). */
.glow-bar.warning { background: linear-gradient(90deg, transparent 20%, var(--warning) 50%, transparent 80%); background-size: 300px 100%; }
.glow-bar.danger  { background: linear-gradient(90deg, transparent 20%, var(--danger)  50%, transparent 80%); background-size: 300px 100%; }
.glow-bar.success { background: linear-gradient(90deg, transparent 20%, var(--success) 50%, transparent 80%); background-size: 300px 100%; }
.glow-bar.info    { background: linear-gradient(90deg, transparent 20%, var(--info)    50%, transparent 80%); background-size: 300px 100%; }

/* ═══════════════════════════════════════
   FILTER TABS
   ═══════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 0 16px 10px;
}
.filter-tab {
  font-family: var(--fontBody);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}
.filter-tab.active {
  color: var(--accent);
  background: var(--accentBg);
  border-color: var(--accentBorder);
}

/* ═══════════════════════════════════════
   NAV PROGRESS BAR
   Thin top-of-screen bar shown on tab navigation (YouTube-style).
   Controlled by _navProgressStart() / _navProgressDone() in index.html.
   ═══════════════════════════════════════ */
#nav-progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: var(--accent);
  z-index: 300;
  opacity: 0;
  /* two transitions: width (fast expand) and opacity (fade out at end) */
  transition: width 0.35s cubic-bezier(0.1, 0.6, 0.4, 1), opacity 0.3s ease;
  pointer-events: none;
  border-radius: 0 1px 1px 0;
  /* Glow: brightens bar against both dark and light surfaces */
  box-shadow: 0 0 8px var(--accent), 0 0 2px var(--accent);
}
#nav-progress.np-active {
  opacity: 1;
}
/* prefers-reduced-motion: skip animation, still show brief flash */
@media (prefers-reduced-motion: reduce) {
  #nav-progress { transition: opacity 0.15s ease; }
}

/* ═══════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 max(14px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  opacity: 0.4;
  transition: opacity 0.15s;
  padding: 4px 12px;
}
.nav-item.active { opacity: 1; }
.nav-icon { font-size: 18px; }
.nav-label {
  font-size: 9px;
  font-family: var(--fontBody);
}

/* ═══════════════════════════════════════
   NAV THEMES — 5 visual styles for navigation
   ═══════════════════════════════════════ */

/* --- BLOB LAVA: Morphing animated indicator --- */
@keyframes blobMorph {
  0%, 100% { border-radius: 35% 65% 55% 45% / 55% 35% 65% 45%; }
  25% { border-radius: 55% 45% 35% 65% / 40% 55% 45% 60%; }
  50% { border-radius: 45% 55% 65% 35% / 60% 45% 55% 40%; }
  75% { border-radius: 65% 35% 45% 55% / 45% 65% 35% 55%; }
}
@keyframes blobPulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

.nav-theme-blobLava .bottom-nav {
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  overflow: visible;
}
.nav-theme-blobLava .bottom-nav .nav-blob-indicator {
  position: absolute;
  top: 4px; bottom: 4px;
  background: var(--blob-color, var(--accent));
  animation: blobMorph 5s ease-in-out infinite, blobPulse 2s ease-in-out infinite;
  box-shadow: 0 0 20px var(--blob-glow, rgba(139,92,246,0.3));
  transition: left 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease, box-shadow 0.3s ease;
  z-index: 0;
  pointer-events: none;
  will-change: transform, opacity; /* PERF-05: GPU compositing hint */
}
.nav-theme-blobLava .bottom-nav .nav-item {
  position: relative;
  z-index: 1;
  opacity: 0.5;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.nav-theme-blobLava .bottom-nav .nav-item.active {
  opacity: 1;
}
.nav-theme-blobLava .bottom-nav .nav-item.active .nav-icon,
.nav-theme-blobLava .bottom-nav .nav-item.active .nav-label {
  color: #fff;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
}
/* Sidebar blob lava */
.nav-theme-blobLava .sidebar-item.active {
  position: relative;
  overflow: hidden;
  color: #fff !important;
  border-left-color: transparent !important;
}
.nav-theme-blobLava .sidebar-item.active::before {
  content: '';
  position: absolute;
  inset: 2px;
  background: var(--blob-color, var(--accent));
  animation: blobMorph 5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.9;
}

/* --- CYBERPUNK: Grid lines, scanline, neon glow --- */
@keyframes cpGridMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 30px; }
}
@keyframes cpScanline {
  0% { top: 0; }
  100% { top: 100%; }
}
@keyframes cpFlicker {
  0%, 92%, 94%, 100% { opacity: 1; }
  93% { opacity: 0.6; }
}

.nav-theme-cyberpunk .bottom-nav {
  background: rgba(10, 0, 16, 0.95);
  border-top: 2px solid var(--blob-color, #8b5cf6);
  box-shadow: 0 0 20px var(--blob-glow, rgba(139,92,246,0.15));
  position: relative;
  overflow: hidden;
}
.nav-theme-cyberpunk .bottom-nav::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--blob-color, #8b5cf6) 1px, transparent 1px),
    linear-gradient(90deg, var(--blob-color, #8b5cf6) 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0.06;
  animation: cpGridMove 4s linear infinite;
  pointer-events: none;
}
.nav-theme-cyberpunk .bottom-nav::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blob-color, #8b5cf6), transparent);
  opacity: 0.3;
  animation: cpScanline 3s linear infinite;
  pointer-events: none;
  z-index: 5;
}
.nav-theme-cyberpunk .bottom-nav .nav-blob-indicator {
  position: absolute;
  top: 3px; bottom: 3px;
  background: var(--blob-color, var(--accent));
  animation: blobMorph 4s ease-in-out infinite;
  box-shadow: 0 0 16px var(--blob-glow, rgba(139,92,246,0.5)), 0 0 40px var(--blob-glow, rgba(139,92,246,0.25));
  transition: left 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease;
  z-index: 0;
  pointer-events: none;
  border-radius: 4px !important;
}
.nav-theme-cyberpunk .bottom-nav .nav-item {
  position: relative;
  z-index: 1;
  opacity: 0.3;
}
.nav-theme-cyberpunk .bottom-nav .nav-item.active {
  opacity: 1;
  animation: cpFlicker 4s ease-in-out infinite;
}
.nav-theme-cyberpunk .bottom-nav .nav-item.active .nav-icon,
.nav-theme-cyberpunk .bottom-nav .nav-item.active .nav-label {
  color: #fff;
  filter: drop-shadow(0 0 6px #fff);
}
.nav-theme-cyberpunk .bottom-nav .nav-label {
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-size: 7px;
}
/* Sidebar cyberpunk */
.nav-theme-cyberpunk .sidebar-nav {
  background: rgba(10, 0, 16, 0.95);
  border-right: 2px solid var(--blob-color, #8b5cf6);
}
.nav-theme-cyberpunk .sidebar-item {
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}
.nav-theme-cyberpunk .sidebar-item.active {
  background: var(--blob-color, var(--accent));
  color: #fff !important;
  box-shadow: 0 0 12px var(--blob-glow, rgba(139,92,246,0.4));
  border-left-color: #fff !important;
}

/* --- SHATTER: Color shard visual treatment --- */
@keyframes shatterGlow {
  0%, 100% { box-shadow: 0 0 4px var(--blob-glow); }
  50% { box-shadow: 0 0 12px var(--blob-glow), 0 0 24px var(--blob-glow); }
}

.nav-theme-shatter .bottom-nav {
  background: #06060c;
  border-top: none;
  gap: 3px;
  padding: 0 3px max(8px, env(safe-area-inset-bottom));
}
.nav-theme-shatter .bottom-nav .nav-item {
  opacity: 1;
  background: #0f0f18;
  border-radius: 3px;
  border: 2px solid transparent;
  padding: 10px 4px;
  flex: 1;
  transition: all 0.15s ease;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.nav-theme-shatter .bottom-nav .nav-item.active {
  background: var(--blob-color, var(--accent));
  border-color: #fff;
  box-shadow: 0 0 14px var(--blob-glow), inset 0 -3px 0 rgba(0,0,0,0.3);
  animation: shatterGlow 2s ease-in-out infinite;
}
.nav-theme-shatter .bottom-nav .nav-item.active .nav-icon,
.nav-theme-shatter .bottom-nav .nav-item.active .nav-label {
  color: #fff;
  filter: brightness(10);
}
.nav-theme-shatter .bottom-nav .nav-item .nav-icon {
  color: var(--blob-color, var(--accent));
  opacity: 0.5;
}
.nav-theme-shatter .bottom-nav .nav-item .nav-label {
  color: var(--blob-color, var(--accent));
  opacity: 0.5;
  font-size: 7px;
  text-transform: uppercase;
  font-weight: 700;
}
/* Sidebar shatter — angular, hard edges */
.nav-theme-shatter .sidebar-nav {
  background: #06060c;
}
.nav-theme-shatter .sidebar-item {
  border-radius: 2px;
  margin: 1px 8px;
}
.nav-theme-shatter .sidebar-item.active {
  background: var(--blob-color, var(--accent)) !important;
  color: #fff !important;
  border-left-color: #fff !important;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
}

/* --- LIQUID POUR: Floating bubble nav --- */
@keyframes bubbleFloat1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes bubbleFloat2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
@keyframes bubblePop { 0% { transform: scale(0.85); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

.nav-theme-liquidPour .bottom-nav {
  background: rgba(6, 6, 14, 0.9);
  backdrop-filter: blur(20px);
  border-top: none;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px max(16px, env(safe-area-inset-bottom));
  flex-wrap: wrap;
}
.nav-theme-liquidPour .bottom-nav .nav-item {
  opacity: 1;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--blob-color-dim, rgba(139,92,246,0.12));
  border: 2px solid var(--blob-color-border, rgba(139,92,246,0.2));
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
  transition: all 0.3s ease;
  animation: bubbleFloat1 4s ease-in-out infinite;
}
.nav-theme-liquidPour .bottom-nav .nav-item:nth-child(even) {
  animation: bubbleFloat2 5s ease-in-out 0.3s infinite;
}
.nav-theme-liquidPour .bottom-nav .nav-item.active {
  width: 52px; height: 52px;
  background: var(--blob-color, var(--accent));
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 4px 20px var(--blob-glow);
  animation: bubblePop 0.35s ease;
}
.nav-theme-liquidPour .bottom-nav .nav-item .nav-label {
  display: none;
}
.nav-theme-liquidPour .bottom-nav .nav-item.active .nav-label {
  display: none;
}
.nav-theme-liquidPour .bottom-nav .nav-item.active .nav-icon {
  color: #fff;
  font-size: 22px;
}
/* Sidebar liquid pour */
.nav-theme-liquidPour .sidebar-item {
  border-radius: 20px;
  margin: 2px 12px;
}
.nav-theme-liquidPour .sidebar-item.active {
  background: var(--blob-color, var(--accent)) !important;
  color: #fff !important;
  border-left-color: transparent !important;
  border-radius: 20px;
  box-shadow: 0 4px 16px var(--blob-glow);
}

/* --- Nav Theme Picker (Settings modal) --- */
.nav-theme-picker {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.nav-theme-picker-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.nav-theme-picker-item:hover {
  background: var(--accentBg);
}
.nav-theme-picker-item.active {
  border-color: var(--accent);
  background: var(--accentBg);
}
.nav-theme-picker-item .ntp-emoji { font-size: 20px; }
.nav-theme-picker-item .ntp-label {
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
}
.nav-theme-picker-item .ntp-desc {
  font-size: 9px;
  color: var(--muted);
}
.nav-theme-picker-item .ntp-badge {
  font-size: 8px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.nav-theme-picker-item .ntp-badge.default {
  background: rgba(6,214,160,0.12);
  color: #06d6a0;
}
.nav-theme-picker-item .ntp-badge.extra {
  background: rgba(139,92,246,0.12);
  color: #8b5cf6;
}
.nav-theme-picker-item .ntp-check {
  margin-left: auto;
  color: var(--accent);
  font-size: 16px;
}

/* ═══════════════════════════════════════
   SURVEY ANIMATIONS — lively survey experience
   ═══════════════════════════════════════ */
@keyframes surveySlideUp {
  0% { transform: translateY(25px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes surveyPopIn {
  0% { transform: scale(0.85); opacity: 0; }
  60% { transform: scale(1.03); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes surveyBounce {
  0% { transform: scale(1); }
  30% { transform: scale(0.92); }
  60% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes surveyFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes surveyGlowBar {
  0%, 100% { box-shadow: 0 0 6px var(--accent); }
  50% { box-shadow: 0 0 14px var(--accent), 0 0 28px var(--accentGlow); }
}
@keyframes surveyShimmer {
  0% { left: -30%; }
  100% { left: 130%; }
}
@keyframes surveyCelebSpin {
  0% { transform: rotate(0deg) scale(0); }
  60% { transform: rotate(360deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
@keyframes surveyPulseRing {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(2); opacity: 0; }
}
@keyframes surveyConfetti {
  0% { transform: translateY(-10px) translateX(0) rotate(0); opacity: 1; }
  100% { transform: translateY(500px) translateX(var(--drift, 0px)) rotate(720deg); opacity: 0; }
}
@keyframes surveyCountUp {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes surveyEmojiWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}
.survey-anim-slide { animation: surveySlideUp 0.4s ease both; }
.survey-anim-pop { animation: surveyPopIn 0.35s ease both; }
.survey-anim-bounce { animation: surveyBounce 0.35s ease; }
.survey-anim-float { animation: surveyFloat 3s ease-in-out infinite; }

/* Chapter intro card */
.survey-chapter-intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 28px 20px;
  min-height: 300px;
}
.survey-chapter-emoji {
  font-size: 52px;
  margin-bottom: 12px;
  animation: surveyFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 16px var(--accentGlow));
}
.survey-chapter-tag {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.survey-chapter-title {
  font-family: var(--fontDisplay);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.survey-chapter-desc {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.5;
}
.survey-chapter-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.survey-chapter-stat {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 99px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

/* Animated progress bar */
.survey-progress-bar {
  height: 6px;
  border-radius: 99px;
  background: var(--border);
  overflow: hidden;
  position: relative;
}
.survey-progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accentDim, var(--accent)));
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: surveyGlowBar 2s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.survey-progress-fill::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: surveyShimmer 2s ease-in-out infinite;
}
.survey-step-dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 8px;
}
.survey-step-dot {
  height: 6px;
  border-radius: 99px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: var(--border);
}
.survey-step-dot.done {
  background: var(--accent);
  width: 6px;
}
.survey-step-dot.active {
  background: var(--accent);
  width: 18px;
  box-shadow: 0 0 8px var(--accentGlow);
}
.survey-step-dot.pending {
  width: 6px;
  opacity: 0.4;
}

/* ═══════════════════════════════════════
   SHARED PROGRESS BAR SYSTEM
   Use .prog-track + .prog-fill everywhere instead of inline styles.
   Size modifiers: --sm (4px), default (6px), --md (8px), --lg (10px)
   Color modifiers on .prog-fill: --success, --warning, --danger, --accent (default)
   Light mode handled automatically via CSS vars.
   ═══════════════════════════════════════ */
.prog-track {
  height: 6px;
  border-radius: 99px;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
}
[data-theme-mode="light"] .prog-track {
  background: rgba(0,0,0,0.07);
}
.prog-track--sm  { height: 4px; }
.prog-track--md  { height: 8px; }
.prog-track--lg  { height: 10px; }

.prog-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
}
.prog-fill--success { background: var(--success); }
.prog-fill--warning { background: var(--warning); }
.prog-fill--danger  { background: var(--danger); }

/* Semantic shorthand: auto-color fill based on a data-rate attribute on .prog-track
   Usage: <div class="prog-track prog-track--semantic" data-rate="73">
          <div class="prog-fill" style="width:73%"></div>
   The JS sets the color on the fill via the helper — this just documents the pattern. */

/* Celebration between chapters */
.survey-celeb {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  min-height: 300px;
}
.survey-celeb-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  animation: surveyCelebSpin 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 24px var(--accentGlow);
  margin-bottom: 14px;
  position: relative;
}
.survey-celeb-icon::before,
.survey-celeb-icon::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--accentBorder);
  animation: surveyPulseRing 1.5s ease-out infinite;
}
.survey-celeb-icon::after {
  animation-delay: 0.5s;
}
.survey-celeb-stats {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.survey-celeb-stat {
  flex: 1;
  text-align: center;
  padding: 10px 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}

/* Confetti container */
.survey-confetti {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}
.survey-confetti-particle {
  position: absolute;
  top: -8px;
  animation: surveyConfetti var(--dur, 2s) ease-in var(--delay, 0s) forwards;
  opacity: 0;
}

/* Enhanced question row — answered state */
.survey-q-answered {
  border-left: 3px solid var(--accent);
  background: var(--accentBg);
  border-radius: 8px;
}

/* Slider bounce on select */
.survey-slider-selected .survey-slider-option.active {
  animation: surveyBounce 0.3s ease;
}

/* ═══════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  border-radius: 12px;
  font-family: var(--fontDisplay);
  font-size: 15px;
  font-weight: 600;
  transition: all 0.2s;
  width: 100%;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-google {
  background: #fff;
  color: #333;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.btn:active { transform: scale(0.98); }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--raised, var(--surface));
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* ═══════════════════════════════════════
   FAB
   ═══════════════════════════════════════ */
.fab {
  position: fixed;
  bottom: 80px;
  right: calc((100vw - min(480px, 100vw)) / 2 + 16px);
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--accent);
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px var(--accentGlow);
  z-index: 50;
}

/* ═══════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════ */
.timeline { padding: 0 16px; }
.timeline-item { display: flex; gap: 12px; }
.timeline-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 20px;
  flex-shrink: 0;
}
.timeline-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-top: 3px;
}
.timeline-dot.done {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accentGlow);
}
.timeline-dot.pending {
  background: transparent;
  border: 2px solid var(--muted);
  opacity: 0.4;
}
.timeline-line {
  width: 2px;
  flex: 1;
  min-height: 24px;
}
.timeline-line.done { background: var(--accentBorder); }
.timeline-line.pending { background: var(--border); }
.timeline-content { padding-bottom: 10px; }
.timeline-event {
  font-family: var(--fontBody);
  font-size: 13px;
}
.timeline-date {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* ═══════════════════════════════════════
   LOADING & ANIMATIONS — Cohesive loading indicator system
   ═══════════════════════════════════════ */

/* --- Shimmer sweep — replaces opacity pulse for skeleton elements --- */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}

/* --- Loading container (used by showLoading()) --- */
.loading-spinner {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px 0;
}

/* --- Skeleton row placeholders --- */
.loading-spinner .skeleton-row {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.20) 50%, rgba(255,255,255,0.06) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s linear infinite;
}
[data-theme-mode="light"] .loading-spinner .skeleton-row {
  background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.11) 50%, rgba(0,0,0,0.04) 75%);
  background-size: 600px 100%;
}
.loading-spinner .skeleton-row:nth-child(2) { width: 60%; }
.loading-spinner .skeleton-row:nth-child(3) { width: 85%; }
.loading-spinner .skeleton-row:nth-child(5) { width: 45%; }

/* --- Skeleton card placeholders --- */
.loading-spinner .skeleton-card {
  height: 64px;
  border-radius: 12px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.14) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s linear infinite;
}
[data-theme-mode="light"] .loading-spinner .skeleton-card {
  background: linear-gradient(90deg, rgba(0,0,0,0.03) 25%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.03) 75%);
  background-size: 600px 100%;
}
.loading-spinner .skeleton-card:nth-child(odd) { animation-delay: 0.3s; }

/* --- Contextual loading variants --- */
.loading-spinner.loading-list .skeleton-row { height: 44px; border-radius: 10px; margin-bottom: 2px; }
.loading-spinner.loading-list .skeleton-row:nth-child(2) { width: 100%; }
.loading-spinner.loading-list .skeleton-row:nth-child(3) { width: 100%; }
.loading-spinner.loading-list .skeleton-row:nth-child(5) { width: 100%; }

.loading-spinner.loading-form .skeleton-row { height: 36px; border-radius: 8px; }
.loading-spinner.loading-form .skeleton-row:nth-child(odd) { width: 30%; height: 12px; }

.loading-spinner.loading-kpi {
  flex-direction: row;
  flex-wrap: wrap;
}
.loading-spinner.loading-kpi .skeleton-card {
  flex: 1 1 140px;
  height: 72px;
}

/* --- member-list skeleton: matches .member-list-item (avatar circle + 2 text lines + chevron) --- */
.loading-spinner.loading-member-list { gap: 0; }
.loading-member-list .sk-member-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.loading-member-list .sk-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.20) 50%, rgba(255,255,255,0.06) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite;
}
[data-theme-mode="light"] .loading-member-list .sk-avatar {
  background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.06) 75%);
  background-size: 600px 100%;
}
.loading-member-list .sk-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.loading-member-list .sk-name {
  height: 12px; width: 55%; border-radius: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.20) 50%, rgba(255,255,255,0.06) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite;
}
.loading-member-list .sk-meta {
  height: 9px; width: 38%; border-radius: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.1s;
}
[data-theme-mode="light"] .loading-member-list .sk-name {
  background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.06) 75%);
  background-size: 600px 100%;
}
[data-theme-mode="light"] .loading-member-list .sk-meta {
  background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.10) 50%, rgba(0,0,0,0.04) 75%);
  background-size: 600px 100%;
}
.loading-member-list .sk-chevron {
  width: 7px; height: 12px; border-radius: 2px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
}
[data-theme-mode="light"] .loading-member-list .sk-chevron { background: rgba(0,0,0,0.06); }
/* stagger shimmer across rows */
.loading-member-list .sk-member-row:nth-child(2) .sk-avatar,
.loading-member-list .sk-member-row:nth-child(2) .sk-name,
.loading-member-list .sk-member-row:nth-child(2) .sk-meta { animation-delay: 0.15s; }
.loading-member-list .sk-member-row:nth-child(3) .sk-avatar,
.loading-member-list .sk-member-row:nth-child(3) .sk-name,
.loading-member-list .sk-member-row:nth-child(3) .sk-meta { animation-delay: 0.3s; }
.loading-member-list .sk-member-row:nth-child(4) .sk-avatar,
.loading-member-list .sk-member-row:nth-child(4) .sk-name,
.loading-member-list .sk-member-row:nth-child(4) .sk-meta { animation-delay: 0.45s; }
.loading-member-list .sk-member-row:nth-child(5) .sk-avatar,
.loading-member-list .sk-member-row:nth-child(5) .sk-name,
.loading-member-list .sk-member-row:nth-child(5) .sk-meta { animation-delay: 0.6s; }
/* vary name widths so it doesn't look robotic */
.loading-member-list .sk-member-row:nth-child(2) .sk-name { width: 42%; }
.loading-member-list .sk-member-row:nth-child(3) .sk-name { width: 61%; }
.loading-member-list .sk-member-row:nth-child(4) .sk-name { width: 35%; }
.loading-member-list .sk-member-row:nth-child(5) .sk-name { width: 50%; }
.loading-member-list .sk-member-row:nth-child(2) .sk-meta { width: 28%; }
.loading-member-list .sk-member-row:nth-child(3) .sk-meta { width: 45%; }
.loading-member-list .sk-member-row:nth-child(5) .sk-meta { width: 33%; }

/* --- grievance skeleton: matches grievance card (glow-bar + label + title + meta + deadline box) --- */
.loading-spinner.loading-grievance { gap: 14px; }
.loading-grievance .sk-grievance-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  position: relative;
  overflow: hidden;
}
.loading-grievance .sk-glow {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.06) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite;
}
[data-theme-mode="light"] .loading-grievance .sk-glow {
  background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.06) 75%);
  background-size: 600px 100%;
}
.loading-grievance .sk-g-label {
  height: 9px; width: 30%; border-radius: 4px; margin-bottom: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.05s;
}
.loading-grievance .sk-g-title {
  height: 16px; width: 70%; border-radius: 6px; margin-bottom: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.07) 25%, rgba(255,255,255,0.22) 50%, rgba(255,255,255,0.07) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.1s;
}
.loading-grievance .sk-g-id {
  height: 9px; width: 45%; border-radius: 4px; margin-bottom: 14px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.15s;
}
.loading-grievance .sk-g-deadline {
  height: 44px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
}
.loading-grievance .sk-g-dl-label {
  height: 10px; width: 80px; border-radius: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.14) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.2s;
}
.loading-grievance .sk-g-dl-num {
  height: 22px; width: 36px; border-radius: 5px;
  background: linear-gradient(90deg, rgba(255,255,255,0.07) 25%, rgba(255,255,255,0.22) 50%, rgba(255,255,255,0.07) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s linear infinite 0.25s;
}
[data-theme-mode="light"] .loading-grievance .sk-g-label,
[data-theme-mode="light"] .loading-grievance .sk-g-id,
[data-theme-mode="light"] .loading-grievance .sk-g-dl-label {
  background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.10) 50%, rgba(0,0,0,0.04) 75%);
  background-size: 600px 100%;
}
[data-theme-mode="light"] .loading-grievance .sk-g-title,
[data-theme-mode="light"] .loading-grievance .sk-g-dl-num {
  background: linear-gradient(90deg, rgba(0,0,0,0.07) 25%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.07) 75%);
  background-size: 600px 100%;
}
[data-theme-mode="light"] .loading-grievance .sk-g-deadline { background: rgba(0,0,0,0.04); }
/* second card slightly delayed so they don't shimmer in lockstep */
.loading-grievance .sk-grievance-card:nth-child(2) .sk-glow,
.loading-grievance .sk-grievance-card:nth-child(2) .sk-g-title { animation-delay: 0.3s; }

/* --- Inline spinner (three dots) — auth, survey submit, inline actions --- */
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
  40%           { transform: scale(1);    opacity: 1; }
}
.spinner {
  display: inline-block;
  position: relative;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent, #7c6ef6);
  animation: dotPulse 1.2s ease-in-out infinite;
  vertical-align: middle;
  flex-shrink: 0;
}
.spinner::before,
.spinner::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent, #7c6ef6);
  top: 0;
  animation: dotPulse 1.2s ease-in-out infinite;
}
.spinner::before { left: -13px; animation-delay: -0.24s; }
.spinner::after  { left:  13px; animation-delay:  0.24s; }

/* --- Loading timeout error state --- */
.loading-timeout {
  text-align: center;
  padding: 24px 16px;
  color: var(--muted);
  font-size: 13px;
}
.loading-timeout button {
  margin-top: 10px;
  padding: 6px 16px;
  border-radius: 6px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 12px;
}

/* Legacy compat */
.loading-text { display: none; }

.fade-in {
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════ */
.auth-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.auth-logo {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.auth-title {
  font-family: var(--fontDisplay);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
}
.auth-subtitle {
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin-top: 4px;
}
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
}
.auth-divider-line { flex: 1; height: 1px; background: var(--border); }
.auth-divider-text {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
}

.auth-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: var(--fontBody);
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus { border-color: var(--accent); }
.auth-input::placeholder { color: var(--muted); }

.auth-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 8px 0;
}
.auth-toggle-track {
  width: 36px; height: 20px;
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
}
.auth-toggle-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px;
  transition: left 0.2s;
}

/* ═══════════════════════════════════════
   ERROR PAGE
   ═══════════════════════════════════════ */
.error-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}
.error-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.error-title {
  font-family: var(--fontDisplay);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.error-message {
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 320px;
}

/* ═══════════════════════════════════════
   FORM INPUTS
   ═══════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}
.form-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}

/* ═══════════════════════════════════════
   SURVEY BANNER
   ═══════════════════════════════════════ */
.survey-banner {
  margin: 0 16px 12px;
  padding: 12px 16px;
  border-radius: var(--radius);
  background: var(--accentBg);
  border: 1px solid var(--accentBorder);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.survey-banner-text {
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
.survey-banner-btn {
  padding: 6px 14px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-family: var(--fontBody);
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

/* ═══════════════════════════════════════
   BAR CHART (CSS-only)
   ═══════════════════════════════════════ */
.bar-chart-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.bar-chart-label {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
  width: 120px;
  flex-shrink: 0;
  text-align: right;
}
.bar-chart-track {
  flex: 1;
  height: 22px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.bar-chart-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease;
  min-width: 2px;
}
.bar-chart-value {
  font-family: var(--fontBody);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   BROADCAST / MESSAGE AREA
   ═══════════════════════════════════════ */
.msg-textarea {
  width: 100%;
  min-height: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
  resize: vertical;
  outline: none;
}
.msg-textarea:focus { border-color: var(--accent); }
.recipient-count {
  font-family: var(--fontBody);
  font-size: 12px;
  color: var(--muted);
  margin: 6px 0 12px;
}

/* ═══════════════════════════════════════
   WEEKLY QUESTIONS
   ═══════════════════════════════════════ */
.wq-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.wq-question {
  font-family: var(--fontDisplay);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}
.wq-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--text);
}
.wq-option:hover { border-color: var(--accent); background: var(--accentBg); }
.wq-option.selected {
  border-color: var(--accent);
  background: var(--accentBg);
  color: var(--accent);
  font-weight: 600;
}
.wq-results-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  flex: 1;
}
.wq-results-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.wq-stats {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
}

/* ═══════════════════════════════════════
   MEMBER LIST (steward view)
   ═══════════════════════════════════════ */
.member-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s ease, transform 0.1s ease;
}
.member-list-item:hover {
  background: var(--accentBg, rgba(99,102,241,0.06));
}
.member-list-item:active {
  transform: scale(0.99);
  opacity: 0.85;
}
.member-list-chevron {
  flex-shrink: 0;
  font-size: 12px;
  color: var(--muted);
  transition: transform 0.2s ease;
}
.member-list-item.expanded .member-list-chevron {
  transform: rotate(90deg);
  color: var(--accent);
}
.member-detail-panel {
  animation: panelSlide 0.2s ease;
}
@keyframes panelSlide {
  from { opacity: 0; max-height: 0; }
  to { opacity: 1; max-height: 500px; }
}
.member-list-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accentBg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--fontDisplay);
  flex-shrink: 0;
}
.member-list-info { flex: 1; min-width: 0; }
.member-list-name {
  font-family: var(--fontDisplay);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.member-list-meta {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
}
.member-list-badges {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   SEARCH INPUT
   ═══════════════════════════════════════ */
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 36px;
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--text);
  outline: none;
  margin-bottom: 12px;
}
.search-input:focus { border-color: var(--accent); }
.search-wrap {
  position: relative;
}
.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   WORKLOAD TRACKER EMBED
   ═══════════════════════════════════════ */

/* Category grid: 2-col desktop, 1-col mobile */
.wt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 640px) { .wt-grid { grid-template-columns: 1fr; } }

.wt-grid-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius, 10px);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.wt-grid-item.warn { border-color: var(--warning, #f59e0b); }
.wt-grid-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.wt-grid-label {
  font-family: var(--fontBody);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.wt-grid-input {
  width: 70px;
  text-align: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.wt-grid-input:focus { border-color: var(--accent); }
.wt-warn-label { font-size: 11px; color: var(--warning, #f59e0b); display: none; }
.wt-grid-item.warn .wt-warn-label { display: block; }

/* Detail / sub-category expand button */
.wt-detail-btn {
  font-size: 11px;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--fontBody);
}
.wt-detail-btn:hover { background: var(--accentBg); }

/* Sub-category modal overlay */
.wt-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.wt-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius, 10px);
  padding: 20px;
  width: 100%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
}
.wt-modal-title {
  font-family: var(--fontBody);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
}
.wt-sub-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--text);
}
.wt-sub-row input {
  width: 60px;
  text-align: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px;
  font-size: 13px;
  color: var(--text);
  outline: none;
}
.wt-sub-row input:focus { border-color: var(--accent); }
.wt-modal-total {
  display: flex;
  justify-content: space-between;
  font-weight: 600;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 2px solid var(--accent);
  color: var(--accent);
  font-family: var(--fontBody);
  font-size: 14px;
}

/* Form sections */
.wt-section { margin-top: 18px; }
.wt-section-title {
  font-family: var(--fontBody);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Privacy selector cards */
.wt-privacy-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius, 10px);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.wt-privacy-option:hover { background: var(--accentBg); }
.wt-privacy-option.selected {
  border-color: var(--accent);
  background: var(--accentBg);
}
.wt-privacy-name { font-weight: 600; font-size: 13px; color: var(--text); }
.wt-privacy-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.wt-privacy-warn {
  font-size: 11px;
  color: var(--danger, #ef4444);
  margin-top: 6px;
  display: none;
}
.wt-privacy-warn.visible { display: block; }

/* Leave section */
.wt-leave-section { margin-top: 10px; }
.wt-leave-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.wt-leave-row label { font-size: 12px; color: var(--muted); min-width: 80px; }
.wt-leave-row select, .wt-leave-row input[type="date"] {
  flex: 1;
  min-width: 120px;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
}

/* Clear / Restore button */
.wt-clear-btn {
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.wt-clear-btn:hover { color: var(--danger, #ef4444); border-color: var(--danger, #ef4444); }

/* History entry cards */
.wt-history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius, 10px);
  padding: 14px;
  margin-bottom: 8px;
}
.wt-history-date { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.wt-history-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.wt-history-cell { text-align: center; }
.wt-history-cell-label { font-size: 9px; color: var(--muted); }
.wt-history-cell-val { font-size: 14px; font-weight: 600; color: var(--text); }
.wt-history-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }
.wt-history-expand-btn {
  font-size: 11px; color: var(--accent); background: none; border: none;
  cursor: pointer; padding: 4px 0; margin-top: 4px;
}

/* Stats breakdown cards */
.wt-stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius, 10px);
  padding: 12px;
  text-align: center;
}
.wt-stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
.wt-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.wt-last-submitted {
  font-size: 12px; color: var(--muted); margin-bottom: 12px;
  padding: 6px 10px; background: var(--accentBg); border-radius: 6px;
  border-left: 3px solid var(--accent);
}

/* Legacy single-row category (kept for compatibility) */
.wt-category {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.wt-category-label {
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--text);
}
.wt-category-input {
  width: 70px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.wt-category-input:focus { border-color: var(--accent); }

/* Sub-tabs (workload, weekly questions) */
.sub-tabs {
  display: flex;
  gap: 4px;
  padding: 0 0 14px;
}
.sub-tab {
  font-family: var(--fontBody);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}
.sub-tab.active {
  color: var(--accent);
  background: var(--accentBg);
  border-color: var(--accentBorder);
}

/* ═══════════════════════════════════════
   MORE MENU
   ═══════════════════════════════════════ */
.more-menu-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.more-menu-item:hover { background: var(--accentBg); }
.more-menu-item:active { opacity: 0.85; }
.more-menu-icon { font-size: 18px; width: 24px; text-align: center; }
.more-menu-label {
  font-family: var(--fontBody);
  font-size: 14px;
  color: var(--text);
}
.more-menu-desc {
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--muted);
}

/* ═══════════════════════════════════════
   CHART.JS CONTAINERS
   ═══════════════════════════════════════ */
.chart-container {
  position: relative;
  height: 260px;
  width: 100%;
  margin-bottom: 14px;
}
.chart-container-sm {
  position: relative;
  height: 180px;
  width: 100%;
  margin-bottom: 14px;
}

/* ═══════════════════════════════════════
   CARD ANIMATIONS (fade-in stagger)
   ═══════════════════════════════════════ */
.card-fade-in {
  animation: cardFadeIn 0.4s ease-out both;
}
@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Gradient accent border on cards */
.card-accent-border {
  border-left: 3px solid var(--accent);
}

/* Privacy badge */
.privacy-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 8px;
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.25);
  font-family: var(--fontBody);
  font-size: 11px;
  color: var(--success);
  font-weight: 600;
}

/* Confirmation card */
.confirm-card {
  text-align: center;
  padding: 30px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
}
.confirm-icon { font-size: 48px; margin-bottom: 12px; }
.confirm-title {
  font-family: var(--fontDisplay);
  font-size: 18px;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 6px;
}
.confirm-text {
  font-family: var(--fontBody);
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* ═══════════════════════════════════════
   NOTIFICATION BELL + BADGES
   ═══════════════════════════════════════ */
.notif-bell-wrap { position: relative; cursor: pointer; padding: 4px; display: inline-block; }
.notif-bell-icon { font-size: 18px; }
.notif-bell-badge {
  position: absolute; top: -2px; right: -6px;
  background: var(--danger); color: #fff;
  font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; line-height: 16px;
  border-radius: 8px; text-align: center; padding: 0 4px;
}
.notif-type-badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px; text-transform: uppercase;
  letter-spacing: 0.03em;
}
.notif-type-system { background: #faf5ff; color: #7c3aed; }
.notif-type-announcement { background: #f0fdf4; color: #16a34a; }
.notif-type-steward { background: #eff6ff; color: #2563eb; }
.notif-type-deadline { background: #fef2f2; color: #dc2626; }
.notif-urgent-border { border-left: 3px solid var(--danger); }
.notif-card { padding: 14px 16px; margin-bottom: 8px; position: relative; }
.notif-dismiss {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; font-size: 16px;
  color: var(--muted); cursor: pointer; padding: 2px 6px;
  border-radius: 4px; transition: color 0.2s;
}
.notif-dismiss:hover { color: var(--danger); }
.notif-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }

/* ═══════════════════════════════════════
   RESOURCE CATEGORY PILLS + CARDS
   ═══════════════════════════════════════ */
.res-pills { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
.res-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  transition: all 0.2s;
