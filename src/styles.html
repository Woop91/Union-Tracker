<style>
/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; overscroll-behavior-y: contain; }
body {
  margin: 0; padding: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font: inherit; }
input { font: inherit; }

/* Accessible focus indicators — visible on keyboard navigation only */
:focus-visible {
  outline: 2px solid var(--accent, #7C3AED);
  outline-offset: 2px;
}
button:focus-visible, [role="button"]:focus-visible {
  outline: 2px solid var(--accent, #7C3AED);
  outline-offset: 2px;
}

/* ═══════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════ */
#app {
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: 72px; /* space for bottom nav on mobile */
}

/* Page layout: sidebar + content on tablet+ */
.page-layout {
  display: flex;
  min-height: 100vh;
}
.page-layout-content {
  flex: 1;
  min-width: 0;
  padding-bottom: 72px;
}

/* ═══════════════════════════════════════
   SIDEBAR NAV (tablet+ only, hidden on mobile)
   ═══════════════════════════════════════ */
.sidebar-nav {
  display: none;
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-header {
  padding: 12px 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-header-title {
  font-family: var(--fontDisplay);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}
.sidebar-header-sub {
  font-family: var(--fontBody);
  font-size: 0.6875rem;
  color: var(--muted);
  margin-top: 2px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  font-family: var(--fontBody);
  font-size: 0.8125rem;
  color: var(--muted);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover {
  background: var(--accentBg);
  color: var(--text);
}
.sidebar-item.active {
  color: var(--accent);
  background: var(--accentBg);
  border-left-color: var(--accent);
  font-weight: 600;
}
.sidebar-item-icon { font-size: 1rem; width: 20px; text-align: center; }
.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 20px;
}
.sidebar-group-label {
  font-size: 0.625rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-secondary, #888);
  padding: 12px 24px 4px;
  margin-top: 4px;
  user-select: none;
}

.page-header {
  padding: 12px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.page-header-right {
  display: flex;
  gap: 6px;
  align-items: center;
}
.page-title {
  font-family: var(--fontDisplay);
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
}
.page-subtitle {
  font-family: var(--fontBody);
  font-size: 0.6875rem;
  color: var(--muted);
  margin-top: 2px;
}

.content { padding: 0 16px; }
.section-title {
  font-family: var(--fontDisplay);
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 12px;
}

/* ═══════════════════════════════════════
   CARDS
   ═══════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.card-glass {
  /* OPT-8: removed backdrop-filter from cards for GPU performance — kept on modals/nav only */
  background: var(--surface);
}
.card-clickable { cursor: pointer; }
.card-clickable:active { opacity: 0.85; }
.card-clickable.kb-focus { outline: 2px solid var(--accent, #7C3AED); outline-offset: 2px; }
#shortcut-help { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9998; display: flex; align-items: center; justify-content: center; }
#shortcut-help .shortcut-card { background: var(--surface, #1e1e1e); border-radius: 14px; padding: 28px 32px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); color: var(--text, #e0e0e0); }
#shortcut-help .shortcut-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border, rgba(255,255,255,0.06)); }
#shortcut-help .shortcut-row:last-child { border-bottom: none; }
#shortcut-help kbd { display: inline-block; min-width: 24px; text-align: center; padding: 2px 8px; background: var(--raised, #2a2a2a); border: 1px solid var(--border, rgba(255,255,255,0.1)); border-radius: 5px; font-family: monospace; font-size: 13px; font-weight: 600; color: var(--accent, #7C3AED); }

/* ═══════════════════════════════════════
   KPI GRID
   ═══════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 16px 14px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 8px;
  text-align: center;
}
.kpi-label {
  font-family: var(--fontBody);
  font-size: 0.5625rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.kpi-value {
  font-family: var(--fontBody);
  font-size: 1.375rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.kpi-change {
  font-size: 0.625rem;
  font-family: var(--fontBody);
  margin-top: 3px;
}

/* ═══════════════════════════════════════
   STATUS INDICATORS
   ═══════════════════════════════════════ */
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.overdue { background: var(--danger); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
.status-dot.active { background: var(--warning); box-shadow: 0 0 8px rgba(250,204,21,0.4); }
.status-dot.new { background: var(--info); box-shadow: 0 0 8px rgba(96,165,250,0.4); }
.status-dot.resolved { background: var(--success); box-shadow: 0 0 8px rgba(74,222,128,0.4); }

.status-badge {
  font-size: 0.625rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  font-family: var(--fontBody);
}

/* M4: Glow-bar — decorative status stripe on grievance cards.
   Sweep animation uses transform (GPU-composited) instead of background-position.
   A ::after pseudo-element carries the bright peak across via translateX. */
@keyframes glowSweep {
  0%   { transform: translateX(-100%); opacity: 1; }
  100% { transform: translateX(200%);  opacity: 0; }
}
.glow-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  overflow: hidden;
}
.glow-bar::after {
  content: '';
  position: absolute;
  inset: 0;
  width: 50%;
  background: inherit;
  filter: brightness(1.6);
  animation: glowSweep 2.5s linear 1;
  will-change: transform, opacity;
}
/* Solid status colors — the ::after pseudo inherits and brightens for the sweep peak.
   Compatible with all browsers (Chrome 49+, Safari 10+, Firefox 52+). */
.glow-bar.warning { background: var(--warning); }
.glow-bar.danger  { background: var(--danger); }
.glow-bar.success { background: var(--success); }
.glow-bar.info    { background: var(--info); }

/* ═══════════════════════════════════════
   FILTER TABS
   ═══════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 0 16px 10px;
}
.filter-tab {
  font-family: var(--fontBody);
  font-size: 0.6875rem;
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}
.filter-tab.active {
  color: var(--accent);
  background: var(--accentBg);
  border-color: var(--accentBorder);
}

/* ═══════════════════════════════════════
   NAV PROGRESS BAR
   Thin top-of-screen bar shown on tab navigation (YouTube-style).
   Controlled by _navProgressStart() / _navProgressDone() in index.html.
   ═══════════════════════════════════════ */
#nav-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #ff003c, #ff2d2d, #ff003c);
  z-index: 300;
  opacity: 0;
  /* opacity transition only — width animated by JS for smooth 4s fill */
  transition: opacity 0.3s ease;
  pointer-events: none;
  border-radius: 0 1px 1px 0;
  /* Neon glow: vivid red against both dark and light surfaces */
  box-shadow: 0 0 6px #ff003c, 0 0 14px rgba(255,0,60,0.5), 0 0 28px rgba(255,0,60,0.25);
}
#nav-progress.np-active {
  opacity: 1;
}
/* prefers-reduced-motion: skip animation, still show brief flash */
@media (prefers-reduced-motion: reduce) {
  #nav-progress { transition: opacity 0.15s ease; }
}

/* ── Nav cats — three tiny cats that chase the progress bar ── */
#nav-cats {
  position: fixed; bottom: 30px; left: 8px; z-index: 299;
  display: flex; align-items: flex-end; gap: 3px;
  pointer-events: none;
  color: var(--text, #1a1a1a);
  opacity: 0.3;
  transition: opacity 0.3s ease;
}
#nav-cats.chasing { opacity: 0.6; }
.cat-lazy  { animation: cat-idle-lazy 4s ease-in-out infinite; }
.cat-play1 { animation: cat-idle-play 2.2s ease-in-out infinite; }
.cat-play2 { animation: cat-idle-play 2.8s ease-in-out infinite 0.4s; }
@keyframes cat-idle-lazy {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-0.5px); }
}
@keyframes cat-idle-play {
  0%,100% { transform: translateY(0)    rotate(0deg); }
  30%     { transform: translateY(-2px)  rotate(-4deg); }
  70%     { transform: translateY(-1px)  rotate(4deg); }
}
#nav-cats.chasing .cat-play1,
#nav-cats.chasing .cat-play2 {
  animation: cat-run 0.18s ease-in-out infinite alternate;
}
#nav-cats.chasing .cat-lazy {
  animation: cat-wake 0.3s ease forwards;
}
@keyframes cat-run {
  from { transform: translateY(0)    rotate(-6deg); }
  to   { transform: translateY(-3px) rotate(6deg); }
}
@keyframes cat-wake {
  to { transform: translateY(-2px) scaleY(1.2); }
}
#nav-cats.pouncing .nav-cat {
  animation: cat-pounce 0.4s ease forwards !important;
}
@keyframes cat-pounce {
  0%  { transform: translateY(0); }
  45% { transform: translateY(-10px) scale(1.2); }
  100%{ transform: translateY(0)     scale(1); }
}
/* ── Cat walk-back: independent return to start ── */
.cat-wrap { display: inline-flex; }
#nav-cats.returning { opacity: 0.4; }
#nav-cats.returning .nav-cat { transform: scaleX(-1); }
#nav-cats.returning .cat-play1,
#nav-cats.returning .cat-play2 {
  animation: cat-walk 0.5s ease-in-out infinite alternate;
}
#nav-cats.returning .cat-lazy {
  animation: cat-saunter 0.8s ease-in-out infinite;
}
@keyframes cat-walk {
  from { transform: scaleX(-1) translateY(0) rotate(-3deg); }
  to   { transform: scaleX(-1) translateY(-2px) rotate(3deg); }
}
@keyframes cat-saunter {
  0%,100% { transform: scaleX(-1) translateY(0); }
  50%     { transform: scaleX(-1) translateY(-1px); }
}
@media(max-width:768px) { #nav-cats { display:none; } }
@media(prefers-reduced-motion:reduce) { #nav-cats { display:none; } }

/* ── Scatter cats — 4 extra cats at screen edges that chase the bar ── */
.scatter-cat {
  position: fixed; z-index: 298;
  pointer-events: none;
  color: var(--text, #1a1a1a);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.scatter-cat.sc-active { opacity: 0.35; }
.scatter-cat.sc-active .nav-cat { animation: cat-idle-play 2.5s ease-in-out infinite; }
.scatter-cat.sc-chasing { opacity: 0.5; }
.scatter-cat.sc-chasing .nav-cat { animation: cat-run 0.22s ease-in-out infinite alternate; }
.scatter-cat.sc-settling { opacity: 0.25; }
.scatter-cat.sc-settling .nav-cat { animation: cat-idle-lazy 3s ease-in-out infinite; }
@media(max-width:768px) { .scatter-cat { display:none; } }
@media(prefers-reduced-motion:reduce) { .scatter-cat { display:none; } }

/* ── Logout overlay animation ── */
#logout-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
  transition: background 0.5s ease;
}
#logout-overlay.active { background: rgba(0,0,0,0.65); pointer-events: all; }
.logout-ring {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #ff003c;
  border-radius: 50%;
  animation: logoutSpin 0.7s linear infinite;
}
@keyframes logoutSpin { to { transform: rotate(360deg); } }
.logout-text {
  color: #fff; font-size: 15px; font-weight: 500;
  letter-spacing: 0.06em; margin-top: 14px; opacity: 0;
  animation: logoutFadeIn 0.6s ease 0.2s forwards;
}
@keyframes logoutFadeIn { to { opacity: 1; } }

/* ═══════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 max(14px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  opacity: 0.5;
  transition: opacity 0.15s;
  padding: 4px 12px;
}
.nav-item.active { opacity: 1; }
.nav-icon { font-size: 1.125rem; }
.nav-label {
  font-size: 0.5625rem;
  font-family: var(--fontBody);
}

/* ═══════════════════════════════════════
   FULL-PAGE THEMES (v4.26.0)
   Each theme applies via .theme-{name} on <body>.
   Affects sidebar, cards, tables, buttons, badges — everything.
   ═══════════════════════════════════════ */

/* ── BLOB LAVA ── molten, organic, alive */
@keyframes blobMorph {
  0%, 100% { border-radius: 30% 70% 52% 48% / 52% 28% 72% 48%; }
  25% { border-radius: 58% 42% 32% 68% / 42% 58% 42% 58%; }
  50% { border-radius: 42% 58% 68% 32% / 62% 38% 62% 38%; }
  75% { border-radius: 68% 32% 42% 58% / 38% 68% 32% 62%; }
}
@keyframes lavaFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-8px) rotate(1deg); }
  66% { transform: translateY(4px) rotate(-0.5deg); }
}
@keyframes lavaPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255,60,30,0.3), 0 0 60px rgba(255,120,0,0.15); }
  50% { box-shadow: 0 0 40px rgba(255,60,30,0.5), 0 0 80px rgba(255,120,0,0.3); }
}
@keyframes heatWave {
  0%, 100% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(15deg); }
}
@keyframes blobPulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }

.theme-blobLava .page-layout::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 80%, rgba(255,60,30,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 20%, rgba(255,120,0,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0; animation: heatWave 8s ease-in-out infinite;
  will-change: filter; contain: strict;
}
.theme-blobLava .sidebar-nav { background: linear-gradient(180deg, var(--surface) 0%, rgba(255,60,30,0.03) 100%); }
.theme-blobLava .sidebar-item.active {
  color: #fff !important; border-left-color: transparent !important;
  background: transparent !important; overflow: hidden;
}
.theme-blobLava .sidebar-item.active::before {
  content: ''; position: absolute; inset: 2px;
  background: linear-gradient(135deg, #ff3c1e, #ff7800, var(--accent));
  animation: blobMorph 5s ease-in-out infinite;
  z-index: -1; opacity: 0.92; box-shadow: 0 0 24px rgba(255,60,30,0.5);
}
.theme-blobLava .sidebar-item:hover { background: rgba(255,60,30,0.08); }
.theme-blobLava .kpi-value { text-shadow: 0 0 40px rgba(255,60,30,0.3); }
.theme-blobLava .kpi-card { animation: lavaFloat 6s ease-in-out infinite; will-change: transform; }
.theme-blobLava .kpi-card:nth-child(2) { animation-delay: -1.5s; }
.theme-blobLava .kpi-card:nth-child(3) { animation-delay: -3s; }
.theme-blobLava .kpi-card:nth-child(4) { animation-delay: -4.5s; }
.theme-blobLava .kpi-card { position: relative; }
.theme-blobLava .kpi-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  box-shadow: 0 0 20px rgba(255, 107, 53, 0.4), 0 0 60px rgba(255, 107, 53, 0.15);
  opacity: 0;
  pointer-events: none;
  will-change: opacity;
  transition: opacity 0.3s ease;
}
.theme-blobLava .kpi-card:hover::after {
  animation: glowFade 2s ease-in-out infinite;
}
.theme-blobLava .kpi-card:hover {
  transform: translateY(-4px) scale(1.02); border-color: rgba(255,60,30,0.3);
}
.theme-blobLava .btn-primary {
  background: linear-gradient(135deg, #ff3c1e, #ff7800) !important;
  border-color: transparent !important; box-shadow: 0 4px 20px rgba(255,60,30,0.4);
}
.theme-blobLava .data-table tr:hover,
.theme-blobLava .case-row:hover {
  background: rgba(255,60,30,0.06); box-shadow: inset 4px 0 0 #ff5030;
}
.theme-blobLava .info-card:hover,
.theme-blobLava .card:hover {
  border-color: rgba(255,60,30,0.3); box-shadow: 0 8px 32px rgba(255,60,30,0.15);
}
/* Bottom nav blob */
.theme-blobLava .bottom-nav { overflow: visible; }
.theme-blobLava .bottom-nav .nav-blob-indicator {
  position: absolute; top: 4px; bottom: 4px;
  background: var(--blob-color, var(--accent));
  animation: blobMorph 5s ease-in-out infinite, blobPulse 2s ease-in-out infinite;
  box-shadow: 0 0 20px var(--blob-glow, rgba(139,92,246,0.3));
  transition: left 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s; z-index: 0; pointer-events: none;
}
.theme-blobLava .bottom-nav .nav-item { position: relative; z-index: 1; }
.theme-blobLava .bottom-nav .nav-item.active .nav-icon,
.theme-blobLava .bottom-nav .nav-item.active .nav-label { color: #fff; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3)); }


@keyframes glowFade {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── CYBERPUNK ── pixel terminal, CRT, neon red */
@keyframes cpBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
@keyframes cpFlicker { 0%, 89%, 92%, 100% { opacity: 1; } 90% { opacity: 0.3; } 91% { opacity: 0.7; } }
@keyframes cpScanBeam { 0% { transform: translateY(-4px); } 100% { transform: translateY(100vh); } }
@keyframes cpBorderPulse {
  0%, 100% { box-shadow: 0 0 0 2px var(--neon-solid), 0 0 10px rgba(var(--neon-rgb),0.4), inset 0 0 10px rgba(var(--neon-rgb),0.05); }
  50% { box-shadow: 0 0 0 2px var(--neon-solid), 0 0 25px rgba(var(--neon-rgb),0.6), 0 0 50px rgba(var(--neon-rgb),0.2), inset 0 0 15px rgba(var(--neon-rgb),0.08); }
}
@keyframes cpTextGlow {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* CRT overlay elements (injected by UnifiedTheme._manageCrtOverlay) */
.crt-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 900; contain: layout style; }
.crt-overlay::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}
.crt-overlay::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
}
.crt-scan-beam {
  position: fixed; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent 5%, rgba(var(--neon-rgb),0.25) 30%, rgba(var(--neon-rgb),0.5) 50%, rgba(var(--neon-rgb),0.25) 70%, transparent 95%);
  z-index: 800; pointer-events: none; animation: cpScanBeam 3s linear infinite;
  will-change: transform; contain: strict;
}
.crt-pixel-grid {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
  background-image: linear-gradient(rgba(var(--neon-rgb),0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(var(--neon-rgb),0.04) 1px, transparent 1px);
  background-size: 8px 8px;
  contain: strict;
}

.theme-cyberpunk { -webkit-font-smoothing: none !important; image-rendering: pixelated; }
.theme-cyberpunk .sidebar-nav {
  background: #0a0a12 !important; border-right: 3px solid var(--neon-solid) !important;
  box-shadow: 6px 0 40px rgba(var(--neon-rgb),0.15);
}
.theme-cyberpunk .sidebar-header { border-bottom: 2px solid var(--neon-solid); background: linear-gradient(180deg, rgba(var(--neon-rgb),0.08), transparent); }
.theme-cyberpunk .sidebar-header-title {
  font-family: 'Press Start 2P', monospace !important; font-size: 0.625rem !important;
  color: var(--neon-solid) !important; text-shadow: 0 0 15px rgba(var(--neon-rgb),0.6);
  animation: cpTextGlow 3s ease-in-out infinite; letter-spacing: 1px;
}
.theme-cyberpunk .sidebar-header-sub { font-family: 'Share Tech Mono', monospace !important; color: rgba(var(--neon-rgb),0.55) !important; }
.theme-cyberpunk .sidebar-group-label {
  font-family: 'Press Start 2P', monospace !important; font-size: 0.4375rem !important;
  color: rgba(var(--neon-rgb),0.55) !important; border-top: 1px dashed rgba(var(--neon-rgb),0.12);
}
.theme-cyberpunk .sidebar-divider {
  background: repeating-linear-gradient(90deg, var(--neon-solid) 0px, var(--neon-solid) 4px, transparent 4px, transparent 8px) !important;
  opacity: 0.2; height: 2px;
}
.theme-cyberpunk .sidebar-item {
  font-family: 'Silkscreen', monospace !important; font-size: 0.6875rem !important;
  color: rgba(var(--neon-rgb),0.6) !important; text-transform: uppercase; letter-spacing: 0.5px;
  border-left: 4px solid transparent; transition: all 0.1s steps(3);
}
.theme-cyberpunk .sidebar-item:hover {
  color: var(--neon-solid) !important; background: rgba(var(--neon-rgb),0.06);
  text-shadow: 0 0 8px rgba(var(--neon-rgb),0.4);
}
.theme-cyberpunk .sidebar-item.active {
  color: #000 !important; background: var(--neon-solid) !important;
  border-left-color: #fff !important; font-weight: 700;
  box-shadow: 0 0 20px rgba(var(--neon-rgb),0.5); animation: cpFlicker 5s steps(1) infinite;
}
.theme-cyberpunk .sidebar-item.active::after {
  content: '\25BA'; position: absolute; right: 12px; font-size: 0.625rem; color: #000;
}

/* Cyberpunk content overrides */
.theme-cyberpunk .page-title,
.theme-cyberpunk .page-header-left h2 {
  font-family: 'Press Start 2P', monospace !important; color: var(--neon-solid) !important;
  text-transform: uppercase; letter-spacing: 2px; font-size: 0.875rem !important;
  text-shadow: 0 0 10px rgba(var(--neon-rgb),0.7), 0 0 30px rgba(var(--neon-rgb),0.4);
  animation: cpTextGlow 3s ease-in-out infinite; line-height: 1.8;
}
.theme-cyberpunk .kpi-card,
.theme-cyberpunk .card {
  background: #0a0a12 !important; border: 2px solid rgba(var(--neon-rgb),0.25) !important;
  border-radius: 0 !important; position: relative; overflow: visible;
}
.theme-cyberpunk .kpi-card::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: inherit;
  box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.5), 0 0 25px rgba(var(--neon-rgb), 0.3), 0 0 50px rgba(var(--neon-rgb), 0.15);
  opacity: 0;
  pointer-events: none;
  will-change: opacity;
  animation: glowFade 4s ease-in-out infinite;
}
.theme-cyberpunk .kpi-card:nth-child(2)::after { animation-delay: -1s; }
.theme-cyberpunk .kpi-card:nth-child(3)::after { animation-delay: -2s; }
.theme-cyberpunk .kpi-card:nth-child(4)::after { animation-delay: -3s; }
.theme-cyberpunk .kpi-card:hover { border-color: var(--neon-solid) !important; box-shadow: 0 0 0 2px var(--neon-solid), 0 0 40px rgba(var(--neon-rgb),0.4) !important; }
.theme-cyberpunk .kpi-label {
  font-family: 'Silkscreen', monospace !important; font-size: 0.5625rem !important;
  color: rgba(var(--neon-rgb),0.6) !important; letter-spacing: 2px;
}
.theme-cyberpunk .kpi-value {
  font-family: 'Press Start 2P', monospace !important;
  color: var(--neon-solid) !important; text-shadow: 0 0 15px rgba(var(--neon-rgb),0.5);
  animation: cpFlicker 6s steps(1) infinite;
}
.theme-cyberpunk .btn {
  font-family: 'Silkscreen', monospace !important;
  border: 2px solid rgba(var(--neon-rgb),0.3) !important; border-radius: 0 !important;
  background: #0a0a12 !important; color: var(--neon-solid) !important;
  text-transform: uppercase; letter-spacing: 1px;
}
.theme-cyberpunk .btn:hover { border-color: var(--neon-solid) !important; box-shadow: 0 0 15px rgba(var(--neon-rgb),0.3); }
.theme-cyberpunk .btn-primary {
  background: var(--neon-solid) !important; color: #000 !important; border-color: var(--neon-solid) !important;
  box-shadow: 0 0 20px rgba(var(--neon-rgb),0.4), 4px 4px 0 rgba(var(--neon-rgb),0.3);
}
.theme-cyberpunk .data-table-wrap,
.theme-cyberpunk .case-list-wrap {
  background: #0a0a12 !important; border: 2px solid rgba(var(--neon-rgb),0.2) !important;
  border-radius: 0 !important; box-shadow: 0 0 20px rgba(var(--neon-rgb),0.1);
}
.theme-cyberpunk .data-table th,
.theme-cyberpunk .case-list-header {
  font-family: 'Silkscreen', monospace !important; color: rgba(var(--neon-rgb),0.6) !important;
  border-bottom: 1px dashed rgba(var(--neon-rgb),0.15) !important;
}
.theme-cyberpunk .data-table td {
  font-family: 'Share Tech Mono', monospace !important; color: rgba(var(--neon-rgb),0.6) !important;
}
.theme-cyberpunk .data-table tr:hover,
.theme-cyberpunk .case-row:hover {
  background: rgba(var(--neon-rgb),0.06); box-shadow: inset 4px 0 0 var(--neon-solid);
}
.theme-cyberpunk .badge,
.theme-cyberpunk .status-badge {
  font-family: 'Silkscreen', monospace !important; border-radius: 0 !important; border: 1px solid currentColor;
}
.theme-cyberpunk .info-card { background: #0a0a12 !important; border: 2px solid rgba(var(--neon-rgb),0.15) !important; border-radius: 0 !important; }
.theme-cyberpunk .info-card:hover { border-color: var(--neon-solid) !important; box-shadow: 0 0 25px rgba(var(--neon-rgb),0.2); }
.theme-cyberpunk .notif-bell-icon { color: var(--neon-solid) !important; }
/* Bottom nav */
.theme-cyberpunk .bottom-nav {
  background: #0a0a12 !important; border-top: 3px solid var(--neon-solid) !important;
  box-shadow: 0 -4px 30px rgba(var(--neon-rgb),0.15);
}
.theme-cyberpunk .bottom-nav .nav-item { opacity: 0.35; }
.theme-cyberpunk .bottom-nav .nav-item.active {
  opacity: 1; background: var(--neon-solid); border-radius: 0;
  box-shadow: 0 0 15px rgba(var(--neon-rgb),0.5);
}
.theme-cyberpunk .bottom-nav .nav-item.active .nav-icon,
.theme-cyberpunk .bottom-nav .nav-item.active .nav-label { color: #000; }
.theme-cyberpunk .bottom-nav .nav-label {
  font-family: 'Silkscreen', monospace !important; font-size: 0.5rem !important;
  text-transform: uppercase; letter-spacing: 1px;
}


/* ── SHATTER ── angular crystalline, fractured geometry */
@keyframes shatterGlow {
  0%, 100% { box-shadow: 0 0 6px var(--accentGlow); }
  50% { box-shadow: 0 0 20px var(--accentGlow), 0 0 40px var(--accentGlow); }
}

.theme-shatter .page-layout::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(135deg, transparent 40%, rgba(139,92,246,0.03) 40.5%, transparent 41%),
    linear-gradient(225deg, transparent 60%, rgba(236,72,153,0.03) 60.5%, transparent 61%);
  pointer-events: none; z-index: 0;
}
.theme-shatter .sidebar-nav { border-right: 3px solid var(--accent) !important;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 24px), calc(100% - 24px) 100%, 0 100%);
}
.theme-shatter .sidebar-item { clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%); }
.theme-shatter .sidebar-item:hover { clip-path: polygon(0 0, 96% 0, 100% 50%, 96% 100%, 0 100%); }
.theme-shatter .sidebar-item.active {
  background: var(--accent) !important; color: #fff !important;
  clip-path: polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%);
  border-left-color: transparent !important;
  animation: shatterGlow 2.5s ease-in-out infinite; font-weight: 700;
}
.theme-shatter .sidebar-header { border-bottom: 2px solid var(--accent) !important; }
.theme-shatter .sidebar-divider { background: var(--accent) !important; opacity: 0.2; height: 2px; }
.theme-shatter .sidebar-group-label { color: var(--accent) !important; border-bottom: 1px solid var(--accentBorder); padding-bottom: 4px; }
.theme-shatter .page-title { letter-spacing: 4px; text-transform: uppercase; }
.theme-shatter .kpi-card, .theme-shatter .card {
  border-radius: 0 !important;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
}
.theme-shatter .kpi-card:hover { box-shadow: 0 0 0 2px var(--accent), 0 0 24px var(--accentGlow); }
.theme-shatter .btn { border-radius: 0 !important; clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%); padding-left: 20px; padding-right: 20px; }
.theme-shatter .data-table-wrap { border-radius: 0 !important; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); }
.theme-shatter .data-table-header { border-bottom: 2px solid var(--accent) !important; text-transform: uppercase; letter-spacing: 2px; }
.theme-shatter .data-table tr:hover { clip-path: polygon(0 0, 99% 0, 100% 50%, 99% 100%, 0 100%); }
.theme-shatter .badge, .theme-shatter .status-badge { border-radius: 0 !important; clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%); padding: 4px 16px; }
.theme-shatter .info-card { border-radius: 0 !important; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); }
.theme-shatter .info-card:hover { box-shadow: 0 0 0 2px var(--accent), 0 0 20px var(--accentGlow); }
/* Bottom nav */
.theme-shatter .bottom-nav { border-top: 3px solid var(--accent) !important; }
.theme-shatter .bottom-nav .nav-item.active {
  background: var(--accent); color: #fff; border-radius: 0;
  clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%);
}
.theme-shatter .bottom-nav .nav-item.active .nav-icon,
.theme-shatter .bottom-nav .nav-item.active .nav-label { color: #fff; }


/* ── LIQUID POUR ── bubbly, fluid, bouncy, everything rounds */
@keyframes lpFloat1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes lpFloat2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px) rotate(1deg); } }
@keyframes lpBubble { 0% { transform: scale(0.95); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
@keyframes lpBlobBg {
  0%, 100% { border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%; transform: translate(0,0); }
  33% { border-radius: 55% 45% 40% 60% / 45% 55% 45% 55%; transform: translate(10px, -10px); }
  66% { border-radius: 45% 55% 60% 40% / 60% 45% 55% 40%; transform: translate(-5px, 5px); }
}
@keyframes bubbleFloat1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes bubbleFloat2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
@keyframes bubblePop { 0% { transform: scale(0.85); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

.theme-liquidPour .page-layout::before {
  content: ''; position: fixed; top: 0; left: -10%; width: 500px; height: 500px;
  background: radial-gradient(circle, var(--accentGlow), transparent 70%);
  animation: lpBlobBg 12s ease-in-out infinite; pointer-events: none; z-index: 0; opacity: 0.5;
  will-change: transform; contain: strict;
}
.theme-liquidPour .page-layout::after {
  content: ''; position: fixed; bottom: 10%; right: -5%; width: 400px; height: 400px;
  background: radial-gradient(circle, hsla(320, 70%, 68%, 0.15), transparent 70%);
  animation: lpBlobBg 15s ease-in-out 2s infinite; pointer-events: none; z-index: 0; opacity: 0.5;
  will-change: transform; contain: strict;
}
.theme-liquidPour .sidebar-nav {
  border-right: none !important; border-radius: 0 32px 32px 0;
  box-shadow: 4px 0 24px rgba(0,0,0,0.06);
}
.theme-liquidPour .sidebar-item {
  border-radius: 24px; margin: 3px 14px; border-left: none !important;
  font-family: 'Righteous', sans-serif !important;
}
.theme-liquidPour .sidebar-item:hover { transform: scale(1.02); }
.theme-liquidPour .sidebar-item.active {
  background: linear-gradient(135deg, var(--accent), var(--accentDim)) !important;
  color: #fff !important; border-left-color: transparent !important;
  border-radius: 24px; box-shadow: 0 6px 24px var(--accentGlow);
  animation: lpBubble 0.4s ease; transform: scale(1.03);
}
.theme-liquidPour .sidebar-divider { display: none; }
.theme-liquidPour .sidebar-header { border-bottom: none !important; }
.theme-liquidPour .sidebar-header-title { font-family: 'Righteous', sans-serif !important; font-size: 1.125rem !important; }
.theme-liquidPour .sidebar-group-label { font-family: 'Righteous', sans-serif !important; color: var(--accent) !important; }
.theme-liquidPour .page-title { font-family: 'Righteous', sans-serif !important; }
.theme-liquidPour .kpi-card, .theme-liquidPour .card { border-radius: 28px !important; animation: lpFloat1 5s ease-in-out infinite; will-change: transform; }
.theme-liquidPour .kpi-card:nth-child(2) { animation: lpFloat2 6s ease-in-out 0.5s infinite; }
.theme-liquidPour .kpi-card:nth-child(3) { animation: lpFloat1 7s ease-in-out 1s infinite; }
.theme-liquidPour .kpi-card:nth-child(4) { animation: lpFloat2 5.5s ease-in-out 1.5s infinite; }
.theme-liquidPour .kpi-card:hover {
  transform: translateY(-8px) scale(1.04) !important;
  box-shadow: 0 12px 40px var(--accentGlow); border-color: var(--accent);
}
.theme-liquidPour .kpi-value { font-family: 'Righteous', sans-serif !important; }
.theme-liquidPour .btn { border-radius: 99px !important; padding-left: 24px; padding-right: 24px; font-family: 'Righteous', sans-serif !important; }
.theme-liquidPour .btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px var(--accentGlow); }
.theme-liquidPour .btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accentDim)) !important;
  border-color: transparent !important; box-shadow: 0 6px 24px var(--accentGlow);
}
.theme-liquidPour .data-table-wrap { border-radius: 28px !important; }
.theme-liquidPour .badge, .theme-liquidPour .status-badge { border-radius: 99px !important; }
.theme-liquidPour .info-card { border-radius: 28px !important; animation: lpFloat2 8s ease-in-out infinite; }
.theme-liquidPour .info-card:hover {
  transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 32px var(--accentGlow); border-color: var(--accent);
}
/* Bottom nav */
.theme-liquidPour .bottom-nav { border-radius: 24px 24px 0 0; margin: 0 8px; border-top: none; }
.theme-liquidPour .bottom-nav .nav-item {
  border-radius: 50%; width: 42px; height: 42px; padding: 0;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0;
  animation: bubbleFloat1 4s ease-in-out infinite;
}
.theme-liquidPour .bottom-nav .nav-item:nth-child(even) { animation: bubbleFloat2 5s ease-in-out 0.3s infinite; }
.theme-liquidPour .bottom-nav .nav-item.active {
  width: 52px; height: 52px; background: var(--accent);
  border: 2px solid rgba(255,255,255,0.25);
  box-shadow: 0 4px 20px var(--accentGlow); animation: bubblePop 0.35s ease;
}
.theme-liquidPour .bottom-nav .nav-item .nav-label { display: none; }
.theme-liquidPour .bottom-nav .nav-item.active .nav-icon { color: #fff; font-size: 1.375rem; }

.cyber-multi .sidebar-group-label { color: rgba(var(--neon-sidebar-rgb),0.55) !important; border-top-color: rgba(var(--neon-sidebar-rgb),0.12); }
.cyber-multi .sidebar-divider { background: repeating-linear-gradient(90deg, var(--neon-sidebar) 0px, var(--neon-sidebar) 4px, transparent 4px, transparent 8px) !important; }

.cyber-multi .btn { border-color: rgba(var(--neon-buttons-rgb),0.3) !important; color: var(--neon-buttons) !important; }
.cyber-multi .btn:hover { border-color: var(--neon-buttons) !important; box-shadow: 0 0 15px rgba(var(--neon-buttons-rgb),0.3); }
.cyber-multi .btn-primary { background: var(--neon-title) !important; border-color: var(--neon-title) !important; box-shadow: 0 0 20px rgba(var(--neon-title-rgb),0.4), 4px 4px 0 rgba(var(--neon-title-rgb),0.3); }

.cyber-multi .data-table th { color: rgba(var(--neon-table-rgb),0.4) !important; border-bottom-color: rgba(var(--neon-table-rgb),0.15) !important; }
.cyber-multi .data-table td { color: rgba(var(--neon-table-rgb),0.6) !important; }
.cyber-multi .data-table tr:hover { background: rgba(var(--neon-table-rgb),0.06); box-shadow: inset 4px 0 0 var(--neon-table); }

.cyber-multi .kpi-card:nth-child(1) { border-color: var(--neon-kpi1) !important; box-shadow: 0 0 0 2px var(--neon-kpi1), 0 0 10px rgba(var(--neon-kpi1-rgb),0.4); }
.cyber-multi .kpi-card:nth-child(1) .kpi-label,
.cyber-multi .kpi-card:nth-child(1) .kpi-value { color: var(--neon-kpi1) !important; text-shadow: 0 0 15px rgba(var(--neon-kpi1-rgb),0.5); }
.cyber-multi .kpi-card:nth-child(2) { border-color: var(--neon-kpi2) !important; box-shadow: 0 0 0 2px var(--neon-kpi2), 0 0 10px rgba(var(--neon-kpi2-rgb),0.4); }
.cyber-multi .kpi-card:nth-child(2) .kpi-label,
.cyber-multi .kpi-card:nth-child(2) .kpi-value { color: var(--neon-kpi2) !important; text-shadow: 0 0 15px rgba(var(--neon-kpi2-rgb),0.5); }
.cyber-multi .kpi-card:nth-child(3) { border-color: var(--neon-kpi3) !important; box-shadow: 0 0 0 2px var(--neon-kpi3), 0 0 10px rgba(var(--neon-kpi3-rgb),0.4); }
.cyber-multi .kpi-card:nth-child(3) .kpi-label,
.cyber-multi .kpi-card:nth-child(3) .kpi-value { color: var(--neon-kpi3) !important; text-shadow: 0 0 15px rgba(var(--neon-kpi3-rgb),0.5); }

.cyber-multi .kpi-card:nth-child(4) .kpi-label,
.cyber-multi .kpi-card:nth-child(4) .kpi-value { color: var(--neon-kpi4) !important; text-shadow: 0 0 15px rgba(var(--neon-kpi4-rgb),0.5); }

/* Multi-neon info cards — rainbow cycling border */
@keyframes multiRainbowBorder {

  50% { border-color: var(--neon-buttons); box-shadow: 0 0 15px rgba(var(--neon-buttons-rgb),0.3); }
