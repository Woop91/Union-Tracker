<style>
.madds-embed *, .madds-embed *::before, .madds-embed *::after { box-sizing: border-box; margin: 0; padding: 0; }
.madds-embed {
  --bg:      #0c0e14;
  --surf:    #13161e;
  --surf2:   #191d27;
  --bdr:     rgba(255,255,255,0.07);
  --txt:     #e4e8f0;
  --mute:    #7a8399;
  --dim:     #49526a;
  --blue:    #4f8ef7;
  --teal:    #3ecfb2;
  --gold:    #f0c040;
  --ff-disp: 'DM Serif Display', Georgia, serif;
  --ff-body: 'DM Sans', system-ui, sans-serif;
}
.madds-embed {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--ff-body);
  font-size: 16px;
  line-height: 1.5;
  min-height: auto;
  max-width: 100%;
  padding: 32px 18px;
  text-align: center;
}
.madds-embed.light {
  --bg: #f5f6f8; --surf: #fff; --surf2: #f0f1f3;
  --bdr: rgba(0,0,0,0.08); --txt: #1a1a2e; --mute: #6b7280; --dim: #9ca3af;
}
.madds-embed h2 {
  font-family: var(--ff-disp);
  font-size: 1.6rem;
  color: var(--gold);
  margin-bottom: 16px;
}
.madds-embed p {
  color: var(--mute);
  font-size: 0.9rem;
  max-width: 480px;
  margin: 0 auto 12px;
}
</style>

<div class="madds-embed">
  <h2>Union Organization Chart</h2>
  <p>This is a generic placeholder for the union org chart. Configure your organization's structure in the Config sheet to populate this view.</p>
  <p style="font-size:0.75rem;color:var(--dim);">SolidBase — Organization Chart</p>
</div>

<script>
// Org chart placeholder — SolidBase generic version
// The DDS version contains org-specific data; this placeholder is shown instead.
(function() {
  if (!document.querySelector('link[href*="DM+Serif"]')) {
    var lnk = document.createElement('link');
    lnk.rel = 'stylesheet';
    lnk.href = 'https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap';
    lnk.onerror = function() { console.warn('Org chart: Google Fonts failed to load, using fallback fonts'); };
    document.head.appendChild(lnk);
  }
})();
</script>
