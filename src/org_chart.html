<style>
.madds-embed *, .madds-embed *::before, .madds-embed *::after { box-sizing: border-box; margin: 0; padding: 0; }
.madds-embed {
  --bg:      #0c0e14;
  --surf:    #13161e;
  --surf2:   #191d27;
  --bdr:     rgba(255,255,255,0.07);
  --txt:     #e4e8f0;
  --mute:    #7a8399;
  --dim:     #49526a;
  --blue:    #4f8ef7;
  --purple:  #a17cf7;
  --teal:    #3ecfb2;
  --gold:    #f0c040;
  --ff-disp: 'DM Serif Display', Georgia, serif;
  --ff-body: 'DM Sans', system-ui, sans-serif;
}
.madds-embed {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--ff-body);
  font-size: 16px;
  line-height: 1.5;
  min-height: auto;
  max-width: 100%;
  padding: 24px 16px 40px;
  overflow-x: hidden;
}
.madds-embed.light {
  --bg:    #f5f6fa;
  --surf:  #ffffff;
  --surf2: #eef0f6;
  --bdr:   rgba(0,0,0,0.08);
  --txt:   #1a1d29;
  --mute:  #5a6377;
  --dim:   #9aa0b0;
}
.madds-embed .oc-placeholder {
  text-align: center;
  padding: 60px 20px;
  max-width: 600px;
  margin: 0 auto;
}
.madds-embed .oc-placeholder h2 {
  font-family: var(--ff-disp);
  font-size: 1.5rem;
  color: var(--gold);
  margin-bottom: 16px;
}
.madds-embed .oc-placeholder p {
  color: var(--mute);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 12px;
}
.madds-embed .oc-toggle {
  position: absolute;
  top: 12px;
  right: 16px;
  background: var(--surf2);
  border: 1px solid var(--bdr);
  color: var(--mute);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.7rem;
}
</style>

<div class="madds-embed" style="position:relative;">
  <button id="madds-mode-toggle" class="oc-toggle" onclick="maddstoggleMode()">☀️ Light</button>
  <div class="oc-placeholder">
    <h2>Union Organization Chart</h2>
    <p>This is a placeholder for your union's organization chart.</p>
    <p>To customize this page, replace the contents of <code>org_chart.html</code> with your union's leadership structure, chapter breakdown, and contact information.</p>
    <p style="color:var(--dim);font-size:0.78rem;margin-top:24px;">SolidBase — Generic template. Customize for your local.</p>
  </div>
</div>

<script>
function maddstoggleMode() {
  var el = document.querySelector('.madds-embed');
  if (!el) return;
  el.classList.toggle('light');
  var btn = document.getElementById('madds-mode-toggle');
  if (btn) btn.textContent = el.classList.contains('light') ? '🌙 Dark' : '☀️ Light';
}

(function() {
  var isLight = false;
  try {
    if (typeof AppState !== 'undefined') { isLight = !AppState.isDark; }
    else { var v = localStorage.getItem('dds_isDark'); isLight = v === 'false'; }
  } catch(e) {
    isLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  }
  if (isLight) {
    var _me = document.querySelector('.madds-embed');
    if (_me) _me.classList.add('light');
    var btn = document.getElementById('madds-mode-toggle');
    if (btn) btn.textContent = '🌙 Dark';
  }
})();
</script>
