  <!-- H-50: Server data injected as inert JSON (not executable). Parsed client-side. -->

  <script>
    // ═══════════════════════════════════════
    // BOOTSTRAP — Parse server-injected data
    // ═══════════════════════════════════════
    var PAGE_DATA = JSON.parse(document.getElementById('page-data').textContent);
    var CONFIG = PAGE_DATA.config;
    var CURRENT_VIEW = PAGE_DATA.view;
    var CURRENT_USER = PAGE_DATA.user || null;
    var IS_DUAL_ROLE = PAGE_DATA.isDualRole || false;
    var IS_DEV_MODE = PAGE_DATA.isDevMode || false;
    var AUTH_METHOD = PAGE_DATA.authMethod || 'sso';
    var IS_PIN_SESSION = AUTH_METHOD === 'pin';
    var IS_ADMIN = PAGE_DATA.isAdmin || false;
    var IS_LEADER = PAGE_DATA.isLeader || false;
    var APP_VERSION = PAGE_DATA.appVersion || '';
    // v4.51.1: Fragment-based session token transport — extract #sessionToken= from URL hash.
    // URL fragments are never sent to the server in HTTP requests, never logged in server
    // access logs, and never leaked via Referer headers. This is the primary transport.
    // Falls back to server-injected pageData.sessionToken for backward compatibility
    // (e.g. old bookmarks or cached redirects still using ?sessionToken=).
    var _fragSessionToken = null;
    try {
      var _hash = window.top.location.hash || window.location.hash || '';
      if (_hash && _hash.indexOf('sessionToken=') !== -1) {
        var _token = _hash.split('sessionToken=')[1];
        if (_token) {
          _token = _token.split('&')[0];
          _fragSessionToken = decodeURIComponent(_token);
        }
      }
    } catch (_fragErr) { /* cross-origin iframe — skip */ }

    var SESSION_TOKEN = _fragSessionToken || PAGE_DATA.sessionToken || localStorage.getItem('dashboardSessionToken') || null;
    var INITIAL_TAB = PAGE_DATA.initialTab || null;

    // Web app URL for redirects (injected server-side, avoids iframe URL issues)
    var WEB_APP_URL = PAGE_DATA.webAppUrl || '';

    // Strip sessionToken from URL bar / fragment after page loads
    // (security: prevent token lingering in browser history or address bar)
    try {
      var _loc = window.top.location;
      var _needsClean = (_loc.search && _loc.search.indexOf('sessionToken') > -1) ||
                        (_loc.hash && _loc.hash.indexOf('sessionToken') > -1);
      if (window.top === window && _needsClean) {
        var cleanUrl = _loc.pathname;
        if (window.top.history && window.top.history.replaceState) {
          window.top.history.replaceState(null, '', cleanUrl);
        }
      }
    } catch (_) { /* cross-origin iframe — skip */ }

    // Client-side HTML escaping — used by steward_view.html and member_view.html
    function escapeHtml(t) {
      if (t == null) return '';
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;')
        .replace(/`/g, '&#x60;');
    }
    function safeText(t) { return escapeHtml(t); }

    // Store session token in localStorage if provided
    if (SESSION_TOKEN) {
      safeLSSet('dashboardSessionToken', SESSION_TOKEN);
      try { localStorage.removeItem('dashboardSessionRedirectCount'); } catch (_lsErr) {}
    }

    // ── Device key registration for biometric quick sign-in ──
    // After any login (SSO, magic link), silently register a device key so the
    // biometric "Sign in with Face ID / Touch ID" button appears on next visit.
    // Only attempts once per device. PIN users already have biometric via PIN save.
    if (CURRENT_VIEW !== 'auth' && SESSION_TOKEN && !IS_PIN_SESSION) {
      try {
        var _bioAvail = localStorage.getItem('dds_biometric_available');
        var _bioPrompted = localStorage.getItem('dds_devicekey_prompted');
        if (!_bioAvail && !_bioPrompted && typeof PasswordCredential !== 'undefined' && navigator.credentials && navigator.credentials.store) {
          localStorage.setItem('dds_devicekey_prompted', 'true');
          google.script.run
            .withSuccessHandler(function(result) {
              if (result && result.success && result.deviceKey) {
                try {
                  var cred = new PasswordCredential({
                    id: result.displayName || 'Member',
                    password: result.deviceKey,
                    name: result.displayName || 'Member'
                  });
                  navigator.credentials.store(cred).then(function() {
                    try {
                      localStorage.setItem('dds_biometric_available', 'true');
                      localStorage.setItem('dds_biometric_name', result.displayName || '');
                      localStorage.setItem('dds_credential_type', 'device_key');
                    } catch (_) {}
                  }).catch(function() {});
                } catch (_) {}
              }
            })
            .withFailureHandler(function() {})
            .authRegisterDeviceKey(SESSION_TOKEN);
        }
      } catch (_dkErr) {}
    }

    // v4.55.1 D03-BUG-01: on auth view, hide body immediately until we know whether we're
    // redirecting via a stored session token. This prevents the brief auth-form flash
    // that the user saw before the session restore redirect kicked in.
    if (CURRENT_VIEW === 'auth' && WEB_APP_URL) {
      try {
        var _storedTokPeek = null;
        try { _storedTokPeek = localStorage.getItem('dashboardSessionToken'); } catch (_pErr) {}
        if (_storedTokPeek && !PAGE_DATA.error && !PAGE_DATA.tokenChecked) {
          // We're about to redirect — hide body to avoid the flash
          document.documentElement.style.visibility = 'hidden';
          // Failsafe: if redirect doesn't happen within 2s, show the page anyway
          setTimeout(function() { document.documentElement.style.visibility = ''; }, 2000);
        }
      } catch (_hideErr) {}
    }

    // On auth page: try to restore session from localStorage
    if (CURRENT_VIEW === 'auth' && WEB_APP_URL) {
      try {
        if (PAGE_DATA.error === 'loggedout') {
          // User just signed out — clear any stored session token
          localStorage.removeItem('dashboardSessionToken');
          localStorage.removeItem('dashboardSessionRedirectCount');
        } else if (PAGE_DATA.tokenChecked) {
          // Server already rejected this token — clear it and reset redirect counter
          localStorage.removeItem('dashboardSessionToken');
          localStorage.removeItem('dashboardSessionRedirectCount');
        } else {
          var storedToken = localStorage.getItem('dashboardSessionToken');
          if (storedToken) {
            // Redirect-loop guard: max 5 attempts before clearing stale token.
            // v4.55.1 Bug 1: Bumped from 2 → 5. The original guard was so tight it
            // could clear a perfectly valid token after a couple of transient
            // server errors (CacheService blip, PropertiesService rate limit, cold
            // start). At 5 attempts, we still bound the loop but tolerate flakes.
            var redirectCount = parseInt(localStorage.getItem('dashboardSessionRedirectCount') || '0', 10);
            if (redirectCount >= 5) {
              // Too many redirects — token is likely expired/invalid, clear it
              localStorage.removeItem('dashboardSessionToken');
              localStorage.removeItem('dashboardSessionRedirectCount');
              console.warn('Session restore: cleared stale token after ' + redirectCount + ' failed attempts');
            } else {
              safeLSSet('dashboardSessionRedirectCount', String(redirectCount + 1));
              // Redirect to server with session token in query string — server needs it for
              // server-side rendering (role lookup, data injection). The token is stripped
              // from the URL bar immediately after the dashboard page loads.
              // Note: fragment-based (#) transport cannot be used here because the server
              // must validate the session to determine which view to render.
              window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(storedToken);
            }
          }
        }
      } catch (_lsErr) {
        // localStorage may be blocked (e.g. Safari privacy) — continue without session restore
        console.warn('Session restore skipped:', _lsErr.message);
      }
    }

    // ═══════════════════════════════════════
    // N3: PRELOAD — Fire batch data call IMMEDIATELY, before module definitions parse.
    // This overlaps the server round-trip with JS parsing time.
    // ═══════════════════════════════════════
    var _preloadedBatch = null;
    var _preloadReady = false;
    var _preloadCallbacks = [];
    var _preloadViewId = CURRENT_VIEW; // stamp the view at preload request time

    // T2-3: Skip preload for member-default dual-role users — the boot logic at line 1530
    // will ignore the preloaded batch anyway because _bootRole !== CURRENT_VIEW.
    var _skipPreload = IS_DUAL_ROLE && CURRENT_VIEW === 'steward' && PAGE_DATA.defaultView === 'member';

    var _batchRequestStart = Date.now();
    if (!_skipPreload && (CURRENT_VIEW === 'steward' || CURRENT_VIEW === 'member') && CURRENT_USER && CURRENT_USER.email) {
      google.script.run
        .withSuccessHandler(function(batch) {
          // H4: Discard stale preload data if the view changed while the request was in flight
          if (CURRENT_VIEW !== _preloadViewId) return;
          _preloadedBatch = batch || {};
          // v4.40.0: Track batch fetch duration for performance analytics
          if (typeof UsageTracker !== 'undefined') UsageTracker.trackPerf('perf_batch', { ms: Date.now() - _batchRequestStart });
          _preloadReady = true;
          // Skip re-render if SWR already showed identical data
          if (_swrApplied) {
            try {
              var oldCache = localStorage.getItem('dds_batchData_' + CURRENT_VIEW);
              if (oldCache) {
                var oldData = JSON.parse(oldCache);
                // OPT-SWR: Short-circuit diff — skip stringify for obvious mismatches
                if (oldData && oldData.data) {
                  var od = oldData.data;
                  var lenMatch = Array.isArray(od) && Array.isArray(batch)
                    ? od.length === batch.length
                    : typeof od === 'object' && typeof batch === 'object'
                      ? Object.keys(od).length === Object.keys(batch).length
                      : true;
                  if (lenMatch && JSON.stringify(od) === JSON.stringify(batch)) {
                    return; // Data unchanged — SWR render is still valid
                  }
                }
              }
            } catch (_diffErr) { /* proceed with re-render */ }
          }
          // C3: Stale-while-revalidate — persist batch data for instant return visits
          safeLSSet('dds_batchData_' + CURRENT_VIEW, JSON.stringify({ ts: Date.now(), data: _preloadedBatch }));
          for (var i = 0; i < _preloadCallbacks.length; i++) _preloadCallbacks[i](_preloadedBatch);
          _preloadCallbacks = [];
        })
        .withFailureHandler(function() {
          // H4: Discard stale preload failure if the view changed while the request was in flight
          if (CURRENT_VIEW !== _preloadViewId) return;
          _preloadedBatch = null;
          _preloadReady = true;
          for (var i = 0; i < _preloadCallbacks.length; i++) _preloadCallbacks[i](null);
          _preloadCallbacks = [];
        })
        .dataGetBatchData(SESSION_TOKEN);
    }

    /**
     * Returns preloaded batch data. If not ready yet, queues the callback.
     * @param {Function} cb - Called with batch data (or null on failure)
     */
    function _onPreloadReady(cb) {
      if (_preloadReady) { cb(_preloadedBatch); return; }
      _preloadCallbacks.push(cb);
    }

    // ═══════════════════════════════════════
    // C1: SKELETON UI — Show layout skeleton immediately instead of blank screen.
    // Renders placeholder boxes that match the final layout, replaced when data arrives.
    // ═══════════════════════════════════════
    (function _renderSkeleton() {
      if (CURRENT_VIEW !== 'steward' && CURRENT_VIEW !== 'member') return;
      var app = document.getElementById('app');
      if (!app) return;
      var skeletonHtml =
        '<div class="skeleton-wrap">' +
          '<div class="skeleton-header">' +
            '<div class="skeleton-box" style="width:120px;height:18px;"></div>' +
            '<div class="skeleton-box" style="width:80px;height:14px;margin-top:4px;"></div>' +
          '</div>' +
          '<div class="skeleton-kpis">' +
            '<div class="skeleton-box skeleton-kpi"></div>' +
            '<div class="skeleton-box skeleton-kpi"></div>' +
            '<div class="skeleton-box skeleton-kpi"></div>' +
            '<div class="skeleton-box skeleton-kpi"></div>' +
          '</div>' +
          '<div class="skeleton-cards">' +
            '<div class="skeleton-box skeleton-card"></div>' +

            '<div class="skeleton-box skeleton-card"></div>' +
          '</div>' +
        '</div>';
      app.innerHTML = skeletonHtml;
    })();

    // C3: Stale-while-revalidate — render from cached batch data instantly on return visits
    var _swrApplied = false;
    (function _trySWR() {
      if (CURRENT_VIEW !== 'steward' && CURRENT_VIEW !== 'member') return;
      try {
        var raw = localStorage.getItem('dds_batchData_' + CURRENT_VIEW);
        if (!raw) return;
        var parsed = JSON.parse(raw);
        // v4.44.0: SWR TTL increased to 2 hours — returning users get instant
        // render from cached data while fresh batch loads in background.
        // Fresh data always overwrites SWR render when it arrives (line 147).
        if (Date.now() - parsed.ts > 7200000) return;
        if (parsed.data) {
          _preloadedBatch = parsed.data;
          // Don't set _preloadReady — let the fresh server call complete and overwrite
          _swrApplied = true;
          // v4.40.0: Track SWR hit for analytics
          if (typeof UsageTracker !== 'undefined') UsageTracker.trackPerf('perf_swr', { hit: true, age: Date.now() - parsed.ts });
        }
      } catch (_) {}
    })();

        title:   { solid: '#ff2a6d', rgb: '255,42,109' },  // red

    function _navProgressStart() {

    /** Smooth ease-back from 100% then damped sine-wave oscillation while waiting */

      var easeStart = performance.now();
      var easeDur = 1200;
      var fromPct = 100;
      var toPct = 90;

        var eased = t * t * (3 - 2 * t); // smoothstep
        _barCurrentPct = fromPct - (fromPct - toPct) * eased;

        _updateCatsToBarPos();
        if (t < 1) {
          _barAnimFrame = requestAnimationFrame(easeBack);
        } else {
          // Phase 2: oscillate from 90% onward
          _startBarOscPhase2(bar, performance.now());
        }
      }
      _barAnimFrame = requestAnimationFrame(easeBack);
    }

    function _startBarOscPhase2(bar, oscStart) {
      function oscillate(now) {
        if (!_navProgressPending) return;
        var t = (now - oscStart) / 1000; // seconds elapsed
        // Slowly progress 90%→99% over 20s, with damped sine oscillation
        var progress = Math.min(t / 20, 1);
        var base = 90 + progress * 9;
        var amplitude = 3 * (1 - progress); // oscillation shrinks over time
        var wave = Math.sin(t * 1.2) * amplitude;
        _barCurrentPct = Math.min(base + wave, 99.5);
        bar.style.width = _barCurrentPct.toFixed(1) + '%';
        _updateCatsToBarPos();
        _barAnimFrame = requestAnimationFrame(oscillate);
      }
      _barAnimFrame = requestAnimationFrame(oscillate);
    }

    /** Move nav cats (3 main) to follow the bar's current X position */
    function _updateCatsToBarPos() {
      var cats = document.getElementById('nav-cats');
      if (!cats || !cats.classList.contains('chasing')) return;
      var wraps = cats.querySelectorAll('.cat-wrap');
      if (!wraps.length) return;
      // Bar position in px = % of viewport width
      var barX = (_barCurrentPct / 100) * window.innerWidth;
      // Cats should be slightly behind the leading edge of the bar
      var catsRect = cats.getBoundingClientRect();
      var riseY = -(catsRect.top - 4);
      var offsets = [-40, -15, -28]; // stagger: lazy behind, play1 closest, play2 mid
      for (var i = 0; i < wraps.length; i++) {
        var targetX = Math.max(0, barX + (offsets[i] || -20));
        wraps[i].style.transition = 'none';
        wraps[i].style.transform = 'translate(' + Math.round(targetX) + 'px,' + Math.round(riseY) + 'px)';
      }
    }

    function _navProgressDone() {
      _navProgressPending = false;
      _barOscillating = false;
      _barCurrentPct = 100;

      if (_barAnimFrame) { cancelAnimationFrame(_barAnimFrame); _barAnimFrame = null; }
      var bar = document.getElementById('nav-progress');

          bar.style.width = '0%';

        }, 320);

    // LAZY-LOAD MEMBER VIEW
    // For steward/both users, member_view.html is NOT in the initial
    // template (would exceed GAS ~820KB HtmlOutput limit). It's fetched
    // on-demand when the user switches to member view.
    // Member-only users get it in the template; _memberViewLoaded starts
    // true for them so _loadMemberViewThen is a synchronous pass-through.
    // ══════════════════════════════════════════════════════════════════════
    var _memberViewLoaded = typeof initMemberView === 'function';
    var _memberViewLoading = false; // loading fence: prevents concurrent fetches
    var _memberViewPendingCallbacks = []; // v4.55.1: queue of callbacks that arrive during load
    var _memberViewLoadSwitchId = -1; // v4.55.1: nav switch id captured at load start (stale-guard)

    function _loadMemberViewThen(container, callback) {
      if (_memberViewLoaded) { callback(); return; }
      // v4.55.1 G13-BUG-01 / N14-BUG-11: queue subsequent callbacks instead of silently dropping them
      if (_memberViewLoading) { _memberViewPendingCallbacks.push(callback); return; }
