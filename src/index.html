<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <?!= include('styles') ?>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // ═══════════════════════════════════════
    // BOOTSTRAP — Parse server-injected data
    // ═══════════════════════════════════════
    var PAGE_DATA = <?!= pageData ?>;
    var CONFIG = PAGE_DATA.config;
    var CURRENT_VIEW = PAGE_DATA.view;
    var CURRENT_USER = PAGE_DATA.user || null;
    var IS_DUAL_ROLE = PAGE_DATA.isDualRole || false;
    var SESSION_TOKEN = PAGE_DATA.sessionToken || null;
    
    // Store session token in localStorage if provided
    if (SESSION_TOKEN) {
      localStorage.setItem('dashboardSessionToken', SESSION_TOKEN);
    }
    
    // Check for existing session token
    var storedToken = localStorage.getItem('dashboardSessionToken');
    
    // ═══════════════════════════════════════
    // THEME ENGINE
    // ═══════════════════════════════════════
    var ThemeEngine = (function() {
      
      function generatePalette(hue) {
        return {
          accent:       'hsl(' + hue + ', 70%, 68%)',
          accentDim:    'hsl(' + hue + ', 50%, 45%)',
          accentGlow:   'hsla(' + hue + ', 70%, 68%, 0.3)',
          accentBg:     'hsla(' + hue + ', 70%, 68%, 0.1)',
          accentBorder: 'hsla(' + hue + ', 70%, 68%, 0.25)',
        };
      }
      
      var palette = generatePalette(CONFIG.accentHue || 250);
      
      var themes = {
        steward: {
          dark: {
            bg: '#141414', surface: '#1e1e1e', raised: '#262626',
            text: '#e0e0e0', muted: '#6b6b6b',
            success: '#4ade80', warning: '#facc15', danger: '#ef4444', info: '#60a5fa',
            border: '#2a2a2a', radius: '10px',
            fontBody: "'JetBrains Mono', monospace",
            fontDisplay: "'Space Grotesk', sans-serif",
            mode: 'dark',
          },
          light: {
            bg: '#f2f2f5', surface: '#ffffff', raised: '#f8f8fa',
            text: '#1a1a2e', muted: '#8888a0',
            success: '#16a34a', warning: '#d97706', danger: '#dc2626', info: '#2563eb',
            border: '#e2e2ea', radius: '10px',
            fontBody: "'JetBrains Mono', monospace",
            fontDisplay: "'Space Grotesk', sans-serif",
            mode: 'light',
          }
        },
        member: {
          dark: {
            bg: '#0c0c1d', surface: 'rgba(255,255,255,0.05)', raised: 'rgba(255,255,255,0.08)',
            text: '#eeedf5', muted: '#7d7b96',
            success: '#34d399', warning: '#fbbf24', danger: '#f87171', info: '#60a5fa',
            border: 'rgba(255,255,255,0.08)', radius: '20px',
            fontBody: "'Plus Jakarta Sans', sans-serif",
            fontDisplay: "'Sora', sans-serif",
            mode: 'dark',
          },
          light: {
            bg: '#f0f0f8', surface: 'rgba(255,255,255,0.85)', raised: 'rgba(255,255,255,0.95)',
            text: '#1a1a2e', muted: '#7d7b96',
            success: '#059669', warning: '#d97706', danger: '#dc2626', info: '#2563eb',
            border: 'rgba(0,0,0,0.08)', radius: '20px',
            fontBody: "'Plus Jakarta Sans', sans-serif",
            fontDisplay: "'Sora', sans-serif",
            mode: 'light',
          }
        }
      };
      
      function getTheme(role, isDark) {
        var base = themes[role] || themes.member;
        var t = isDark ? base.dark : base.light;
        // Merge accent colors
        for (var key in palette) {
          t[key] = palette[key];
        }
        return t;
      }
      
      function applyTheme(t) {
        var root = document.documentElement;
        for (var key in t) {
          if (typeof t[key] === 'string') {
            root.style.setProperty('--' + key, t[key]);
          }
        }
        document.body.style.background = t.bg;
        document.body.style.color = t.text;
        document.body.style.fontFamily = t.fontBody;
      }
      
      return {
        getTheme: getTheme,
        applyTheme: applyTheme,
        palette: palette,
      };
    })();
    
    // ═══════════════════════════════════════
    // APP STATE
    // ═══════════════════════════════════════
    var AppState = {
      view: CURRENT_VIEW,
      role: CURRENT_USER ? CURRENT_USER.role : null,
      activeRole: CURRENT_VIEW, // which view is shown (for dual-role toggle)
      isDark: true,
      user: CURRENT_USER,
      cases: [],
      kpis: null,
      grievances: [],
      loading: true,
    };
    
    // ═══════════════════════════════════════
    // ROUTER
    // ═══════════════════════════════════════
    function initApp() {
      var app = document.getElementById('app');
      
      switch (CURRENT_VIEW) {
        case 'auth':
          renderAuth(app);
          break;
        case 'steward':
          initStewardView(app);
          break;
        case 'member':
          initMemberView(app);
          break;
        case 'error':
          renderError(app, PAGE_DATA.error);
          break;
        default:
          renderAuth(app);
      }
    }
    
    // ═══════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════
    function el(tag, attrs, children) {
      var elem = document.createElement(tag);
      if (attrs) {
        for (var key in attrs) {
          if (key === 'style' && typeof attrs[key] === 'object') {
            for (var s in attrs[key]) {
              elem.style[s] = attrs[key][s];
            }
          } else if (key === 'className') {
            elem.className = attrs[key];
          } else if (key.indexOf('on') === 0) {
            elem.addEventListener(key.substring(2).toLowerCase(), attrs[key]);
          } else {
            elem.setAttribute(key, attrs[key]);
          }
        }
      }
      if (children) {
        if (typeof children === 'string') {
          elem.textContent = children;
        } else if (Array.isArray(children)) {
          children.forEach(function(child) {
            if (typeof child === 'string') {
              elem.appendChild(document.createTextNode(child));
            } else if (child) {
              elem.appendChild(child);
            }
          });
        } else {
          elem.appendChild(children);
        }
      }
      return elem;
    }
    
    function html(str) {
      var div = document.createElement('div');
      div.innerHTML = str;
      return div.firstChild;
    }
    
    function showLoading(container) {
      container.innerHTML = '';
      var loader = el('div', { className: 'loading-spinner' });
      loader.innerHTML = '<div class="spinner"></div><div class="loading-text">Loading...</div>';
      container.appendChild(loader);
    }
    
    function handleLogout() {
      var token = localStorage.getItem('dashboardSessionToken');
      if (token) {
        google.script.run.authLogout(token);
        localStorage.removeItem('dashboardSessionToken');
      }
      // Reload the page — will show auth screen since no valid session
      google.script.run
        .withSuccessHandler(function() { window.top.location.reload(); })
        .withFailureHandler(function() { window.top.location.reload(); })
        .authLogout(token || '');
      // Fallback reload
      setTimeout(function() { window.top.location.reload(); }, 1000);
    }
    
    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
  
  <?!= include('auth_view') ?>
  <?!= include('steward_view') ?>
  <?!= include('member_view') ?>
  <?!= include('error_view') ?>
  
</body>
</html>
