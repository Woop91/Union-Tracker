<script>
/**
 * Steward View — "Mono Signal"
 * v4.12.0 — Cases, Members tab, Broadcast, Survey tracking, Weekly Q manager,
 * Resources tab, responsive sidebar layout.
 */

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

function initStewardView(container) {
  var t = ThemeEngine.getTheme('steward', AppState.isDark);
  ThemeEngine.applyTheme(t);
  AppState.activeRole = 'steward';
  showLoading(container, 'kpi');

  // Use batch data if available from initApp pre-fetch
  var batch = AppState.batchData;
  if (batch && batch.cases) {
    AppState.cases = batch.cases || [];
    AppState.kpis = batch.kpis || { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
    AppState.notificationCount = batch.notificationCount || 0;
    AppState.memberCount = batch.memberCount || 0;
    AppState.taskCount = batch.taskCount || 0;
    AppState.overdueTaskCount = batch.overdueTaskCount || 0;
    AppState.qaUnansweredCount = batch.qaUnansweredCount || 0;
    AppState.loading = false;
    renderStewardDashboard(container);
    _checkDeepLink('steward');
    return;
  }

  // Fallback: load individually (batch unavailable)
  // C4/S2: Single badge count call replaces 3 serial calls
  serverCall().withSuccessHandler(function(counts) {
    AppState.notificationCount = (counts && counts.notificationCount) || 0;
    AppState.taskCount = (counts && counts.taskCount) || 0;
    AppState.overdueTaskCount = (counts && counts.overdueTaskCount) || 0;
    AppState.qaUnansweredCount = (counts && counts.qaUnansweredCount) || 0;
  }).withFailureHandler(function() {
    AppState.notificationCount = 0;
    AppState.taskCount = 0;
    AppState.overdueTaskCount = 0;
    AppState.qaUnansweredCount = 0;
  }).dataGetBadgeCounts(SESSION_TOKEN);

  // Member count still needed for display
  serverCall().withSuccessHandler(function(members) {
    AppState.memberCount = (members || []).length;
  }).withFailureHandler(function() { AppState.memberCount = 0; }).dataGetAllMembers(SESSION_TOKEN);

  serverCall()
    .withSuccessHandler(function(cases) {
      AppState.cases = cases || [];
      serverCall()
        .withSuccessHandler(function(kpis) {
          AppState.kpis = kpis;
          AppState.loading = false;
          renderStewardDashboard(container);
          _checkDeepLink('steward');
        })
        .withFailureHandler(function() {
          AppState.kpis = { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
          AppState.loading = false;
          renderStewardDashboard(container);
          _checkDeepLink('steward');
        })
        .dataGetStewardKPIs(SESSION_TOKEN);
    })
    .withFailureHandler(function() {
      AppState.cases = [];
      AppState.loading = false;
      renderStewardDashboard(container);
    })
    .dataGetStewardCases(SESSION_TOKEN);
}

// ═══════════════════════════════════════
// STEWARD HEADER (shared)
// ═══════════════════════════════════════

function _stewardHeader(container, title, subtitle) {
  var header = el('div', { className: 'page-header' });
  var headerLeft = el('div', { className: 'page-header-left' });
  headerLeft.appendChild(el('div', { className: 'page-title' }, title));
  if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
  header.appendChild(headerLeft);

  var headerRight = el('div', { className: 'page-header-right' });
  if (!isSidebarLayout()) {
    // All stewards can switch to member view (every steward is also a member)
    headerRight.appendChild(el('button', {
      style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
      onClick: function() { AppState.activeRole = 'member'; initMemberView(document.getElementById('app')); }
    }, '\uD83D\uDC64 ' + CONFIG.memberLabel));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
      AppState.isDark = !AppState.isDark;
      ThemeEngine.applyTheme(ThemeEngine.getTheme('steward', AppState.isDark));
      renderStewardDashboard(document.getElementById('app'));
    }}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
  }
  header.appendChild(headerRight);
  container.appendChild(header);
}

// ═══════════════════════════════════════
// CASES DASHBOARD (main steward tab)
// ═══════════════════════════════════════

function renderStewardDashboard(appContainer) {
  renderPageLayout(appContainer, 'steward', 'cases', function(container) {
    _stewardHeader(container, 'Cases', CURRENT_USER.name + ' \u00B7 ' + CURRENT_USER.unit);

    // Welcome card placeholder — inserted before KPIs if first visit
    var welcomeSlot = el('div');
    container.appendChild(welcomeSlot);
    _maybeShowWelcome(welcomeSlot, 'steward');

    // KPIs — show org-wide fallback if steward has 0 assigned cases
    var kpis = AppState.kpis || {};
    var kpiGrid = el('div', { className: 'kpi-grid' });
    var isOrgFallback = (kpis.totalCases || 0) === 0;

    if (isOrgFallback) {
      // Fetch org-wide stats asynchronously, update KPIs when ready
      var kpiItems = [
        { label: 'Org Cases', value: '...', color: null },
        { label: 'Org Overdue', value: '...', color: null },
        { label: 'Org Due <7d', value: '...', color: null },
        { label: 'Org Resolved', value: '...', color: 'var(--success)' },
      ];
      kpiItems.forEach(function(kpi) {
        var card = el('div', { className: 'kpi-card' });
        card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
        var val = el('div', { className: 'kpi-value' }, kpi.value);
        if (kpi.color) val.style.color = kpi.color;
        card.appendChild(val);
        kpiGrid.appendChild(card);
      });
      container.appendChild(kpiGrid);

      // Subtext
      var orgNote = el('div', { style: { textAlign: 'center', fontSize: '11px', color: 'var(--muted)', marginTop: '-6px', marginBottom: '10px' } }, '(no cases assigned to you — showing org-wide)');
      container.appendChild(orgNote);

      // Fill in org-wide stats
      serverCall().withSuccessHandler(function(stats) {
        var cards = kpiGrid.querySelectorAll('.kpi-value');
        if (!stats || !stats.available) {
          // Graceful fallback — show 0 instead of leaving "..." placeholder
          if (cards[0]) cards[0].textContent = '0';
          if (cards[1]) cards[1].textContent = '0';
          if (cards[2]) cards[2].textContent = '0';
          if (cards[3]) cards[3].textContent = '0';
          return;
        }
        if (cards[0]) cards[0].textContent = String(stats.total || 0);
        if (cards[1]) { cards[1].textContent = String(stats.overdueCount || 0); if (stats.overdueCount > 0) cards[1].style.color = 'var(--danger)'; }
        if (cards[2]) { cards[2].textContent = String(stats.dueSoonCount || 0); if (stats.dueSoonCount > 0) cards[2].style.color = 'var(--warning)'; }
        if (cards[3]) cards[3].textContent = String(stats.settledCount || stats.wonCount || 0);
      }).withFailureHandler(function(err) {
        console.error('Org KPI stats failed:', err && err.message);
        var cards = kpiGrid.querySelectorAll('.kpi-value');
        if (cards[0]) cards[0].textContent = '\u2014';
        if (cards[1]) cards[1].textContent = '\u2014';
        if (cards[2]) cards[2].textContent = '\u2014';
        if (cards[3]) cards[3].textContent = '\u2014';
      }).dataGetGrievanceStats(SESSION_TOKEN);
    } else {
      var kpiItems = [
        { label: 'My Cases', value: kpis.totalCases || 0 },
        { label: 'Overdue', value: kpis.overdue || 0, color: kpis.overdue > 0 ? 'var(--danger)' : null },
        { label: 'Due <7d', value: kpis.dueSoon || 0, color: kpis.dueSoon > 0 ? 'var(--warning)' : null },
        { label: 'Resolved', value: kpis.resolved || 0, color: 'var(--success)' },
      ];
      kpiItems.forEach(function(kpi) {
        var card = el('div', { className: 'kpi-card' });
        card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
        var val = el('div', { className: 'kpi-value' }, String(kpi.value));
        if (kpi.color) val.style.color = kpi.color;
        card.appendChild(val);
        kpiGrid.appendChild(card);
      });
      container.appendChild(kpiGrid);
    }

    // Filter bar
    var filter = 'all';
    var filterBar = el('div', { className: 'filter-bar' });
    var overdueCount = AppState.cases.filter(function(c) { return c.status === 'overdue'; }).length;
    var filters = [
      { key: 'all', label: 'All ' + AppState.cases.length },
      { key: 'overdue', label: 'Overdue ' + overdueCount },
      { key: 'active', label: 'Active' },
    ];

    filters.forEach(function(f) {
      var tab = el('button', {
        className: 'filter-tab' + (filter === f.key ? ' active' : ''),
        onClick: function() {
          filter = f.key;
          renderCaseList(caseListContainer, filter);
          filterBar.querySelectorAll('.filter-tab').forEach(function(t, i) {
            t.className = 'filter-tab' + (filters[i].key === filter ? ' active' : '');
          });
        }
      }, f.label);
      filterBar.appendChild(tab);
    });
    container.appendChild(filterBar);

    var caseListContainer = el('div', { className: 'content' });
    renderCaseList(caseListContainer, filter);
    container.appendChild(caseListContainer);

    // FAB — opens broadcast
    var fab = el('button', { className: 'fab', onClick: function() { renderBroadcast(document.getElementById('app')); } }, '\uD83D\uDCE2');
    container.appendChild(fab);
  });
}

// ═══════════════════════════════════════
// WELCOME EXPERIENCE (steward)
// ═══════════════════════════════════════

/**
 * Shows a welcome/onboarding card if it's the user's first visit.
 * Fetches welcome data from backend, renders card if isFirstVisit.
 * @param {Element} slot - Container element to insert the welcome card into
 * @param {string} viewRole - 'steward' or 'member'
 */
function _maybeShowWelcome(slot, viewRole) {
  // Skip if already dismissed in this session
  if (AppState._welcomeDismissed) return;

  serverCall().withSuccessHandler(function(data) {
    if (!data || !data.isFirstVisit) return;

    var card = el('div', {
      className: 'card card-glass card-fade-in',
      style: {
        padding: '24px 20px',
        margin: '0 0 14px',
        background: 'linear-gradient(135deg, var(--accentBg), rgba(255,255,255,0.03))',
        border: '1px solid var(--accentBorder)',
        position: 'relative'
      }
    });

    // Header
    var safeName = (data.userName || 'there').replace(/[<>&"']/g, '');
    card.appendChild(el('div', {
      style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: 'var(--text)', marginBottom: '8px' }
    }, 'Welcome, ' + safeName + '!'));

    card.appendChild(el('div', {
      style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.5', marginBottom: '16px' }
    }, 'This is your ' + CONFIG.stewardLabel + ' dashboard. Track grievance cases, manage member communications, monitor deadlines, and access all your tools in one place.'));

    // Quick-start action cards grid
    var grid = el('div', {
      style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '16px' }
    });

    (data.quickActions || []).forEach(function(qa) {
      var actionCard = el('div', {
        className: 'card card-clickable',
        style: {
          padding: '12px',
          textAlign: 'center',
          cursor: 'pointer',
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: '10px'
        },
        onClick: function() {
          _dismissWelcome(card);
          _handleTabNav('steward', qa.action);
        }
      });
      actionCard.appendChild(el('div', { style: { fontSize: '22px', marginBottom: '4px' } }, qa.icon));
      actionCard.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontDisplay)' } }, qa.label));
      grid.appendChild(actionCard);
    });
    card.appendChild(grid);

    // Dismiss button
    card.appendChild(el('button', {
      className: 'btn',
      style: {
        width: '100%',
        background: 'var(--accent)',
        color: '#fff',
        border: 'none',
        borderRadius: '8px',
        padding: '10px',
        fontSize: '13px',
        fontWeight: '600',
        cursor: 'pointer'
      },
      onClick: function() { _dismissWelcome(card); }
    }, 'Got it!'));

    slot.appendChild(card);
  }).dataGetWelcomeData(SESSION_TOKEN);
}

/**
 * Dismisses the welcome card and saves preference.
 */
function _dismissWelcome(cardEl) {
  AppState._welcomeDismissed = true;
  if (cardEl) {
    cardEl.style.opacity = '0';
    cardEl.style.transition = 'opacity 0.3s ease';
    setTimeout(function() { cardEl.remove(); }, 300);
  }
  serverCall().withFailureHandler(function(e) { console.error(e.message); }).dataMarkWelcomeDismissed(SESSION_TOKEN);
}

function renderCaseList(container, filter) {
  container.innerHTML = '';
  var TERMINAL = ['resolved', 'won', 'denied', 'settled', 'withdrawn', 'closed'];
  var cases = AppState.cases;
  if (filter === 'overdue') {
    cases = cases.filter(function(c) { return c.status === 'overdue'; });
  } else if (filter === 'active') {
    // Active = not terminal AND not overdue (catches open/new/pending/step-i/in-progress etc.)
    cases = cases.filter(function(c) {
      return c.status !== 'overdue' && TERMINAL.indexOf(c.status) === -1;
    });
  }

  if (cases.length === 0) {
    if (filter === 'all' && AppState.cases.length === 0) {
      // No cases at all — show agency-wide stats as fallback
      var agencySlot = el('div', { style: { textAlign: 'center', padding: '20px 0' } });
      agencySlot.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '14px' } }, 'No cases currently assigned to you.'));
      agencySlot.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Agency-Wide Overview'));
      var agencyCharts = el('div');
      agencySlot.appendChild(agencyCharts);
      container.appendChild(agencySlot);
      serverCall().withSuccessHandler(function(data) {
        if (!data || !data.available) {
          agencyCharts.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, 'Grievance stats not yet available.'));
          return;
        }
        agencyCharts.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '8px' } }, data.total + ' total grievances agency-wide'));
        if (typeof ChartHelper !== 'undefined') {
          var sLabels = Object.keys(data.byStatus);
          var sData = sLabels.map(function(k) { return data.byStatus[k]; });
          var sCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '8px', textAlign: 'left' } });
          sCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Status Breakdown'));
          ChartHelper.createDoughnutChart(sCard, 'agency-status-chart', sLabels, sData);
          agencyCharts.appendChild(sCard);
          if (data.byStep) {
            var stLabels = Object.keys(data.byStep);
            var stData = stLabels.map(function(k) { return data.byStep[k]; });
            var stCard = el('div', { className: 'card card-glass', style: { padding: '14px', textAlign: 'left' } });
            stCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Step'));
            ChartHelper.createBarChart(stCard, 'agency-step-chart', stLabels, [{ label: 'Count', data: stData }]);
            agencyCharts.appendChild(stCard);
          }
        }
      }).withFailureHandler(function() {
        agencyCharts.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load agency stats.'));
      }).dataGetGrievanceStats(SESSION_TOKEN);
    } else {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' } },
        'No ' + filter + ' cases.'));
    }
    return;
  }

  cases.forEach(function(c) {
    var isOverdue = c.status === 'overdue';
    var statusClass = c.status || 'active';
    var card = el('div', { className: 'card card-clickable', style: { padding: '11px 14px', marginBottom: '6px' } });

    var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
    var leftGroup = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
    leftGroup.appendChild(el('div', { className: 'status-dot ' + statusClass }));
    leftGroup.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, c.id));
    topRow.appendChild(leftGroup);

    var deadlineSpan = el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: isOverdue ? 'var(--danger)' : 'var(--muted)', fontWeight: isOverdue ? '700' : '400' } });
    deadlineSpan.textContent = c.deadlineDays !== null ? c.deadlineDays + 'd' : '\u2014';
    topRow.appendChild(deadlineSpan);
    card.appendChild(topRow);

    var bottomRow = el('div', { style: { paddingLeft: '15px', display: 'flex', justifyContent: 'space-between' } });
    var memberDisplay = c.memberName || (c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown');
    bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)' } }, memberDisplay + ' \u00B7 ' + (c.step || '')));
    bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '10px', color: 'var(--muted)' } }, c.unit || ''));
    card.appendChild(bottomRow);

    // Expandable checklist (v4.16.0)
    var checklistArea = el('div', { style: { display: 'none', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' } });
    var checklistLoaded = false;
    card.appendChild(checklistArea);
    card.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var showing = checklistArea.style.display !== 'none';
      checklistArea.style.display = showing ? 'none' : 'block';
      if (!showing && !checklistLoaded) {
        checklistLoaded = true;
        _renderCaseChecklist(checklistArea, c.id);
      }
    });

    container.appendChild(card);
  });
}

// ═══════════════════════════════════════
// BOTTOM NAV (shared by both views)
// ═══════════════════════════════════════

// ═══════════════════════════════════════
// BADGE REFRESH
// Call after any mutation that changes task or case counts.
// Debounced 600ms — rapid mutations collapse into one server round-trip.
// Re-fetches counts and swaps the bottom nav DOM node in place.
// ═══════════════════════════════════════

var _refreshNavBadgesTimer = null;
function _refreshNavBadges() {
  if (_refreshNavBadgesTimer) clearTimeout(_refreshNavBadgesTimer);
  _refreshNavBadgesTimer = setTimeout(function() {
    _refreshNavBadgesTimer = null;

    // Re-fetch KPIs (case overdue count may have changed)
    serverCall().withSuccessHandler(function(kpis) {
      if (kpis) AppState.kpis = kpis;
    }).withFailureHandler(function() {}).dataGetStewardKPIs(SESSION_TOKEN);

    // Re-fetch open tasks, then swap nav
    serverCall().withSuccessHandler(function(tasks) {
      var open = (tasks || []).filter(function(t) { return t.status !== 'completed'; });
      AppState.taskCount = open.length;
      AppState.overdueTaskCount = open.filter(function(t) { return t.dueDays !== null && t.dueDays < 0; }).length;

      // Re-fetch unanswered Q&A count in same callback chain to avoid extra round-trip
      serverCall().withSuccessHandler(function(qaResult) {
        var count = 0;
        if (qaResult && qaResult.questions) {
          for (var i = 0; i < qaResult.questions.length; i++) {
            var q = qaResult.questions[i];
            if (q.answerCount === 0 && q.status !== 'resolved' && q.status !== 'deleted') count++;
          }
        }
        AppState.qaUnansweredCount = count;
        var appRoot = document.getElementById('app') || document;
        var existingNav = appRoot.querySelector('.bottom-nav');
        if (existingNav && existingNav.parentNode) {
          var parent = existingNav.parentNode;
          var replacement = document.createElement('div');
          parent.replaceChild(replacement, existingNav);
          renderBottomNav(replacement, 'steward', AppState.activeTab || 'cases');
          var newNav = replacement.querySelector('.bottom-nav');
          if (newNav) parent.replaceChild(newNav, replacement);
        }
      }).withFailureHandler(function() {
        var appRoot = document.getElementById('app') || document;
        var existingNav = appRoot.querySelector('.bottom-nav');
        if (existingNav && existingNav.parentNode) {
          var parent = existingNav.parentNode;
          var replacement = document.createElement('div');
          parent.replaceChild(replacement, existingNav);
          renderBottomNav(replacement, 'steward', AppState.activeTab || 'cases');
          var newNav = replacement.querySelector('.bottom-nav');
          if (newNav) parent.replaceChild(newNav, replacement);
        }
      }).qaGetQuestions(SESSION_TOKEN, 1, 999, 'recent');
    }).withFailureHandler(function() {}).dataGetTasks(SESSION_TOKEN, null);
  }, 600);
}

function renderBottomNav(container, role, activeTab) {
  var nav = el('div', { className: 'bottom-nav' });
  var tabs = role === 'steward' ? [
    { id: 'cases', icon: '\uD83D\uDCCB', label: 'Cases' },
    { id: 'members', icon: '\uD83D\uDC65', label: 'Members' },
    { id: 'insights', icon: '\uD83D\uDCCA', label: 'Insights' },
    { id: 'more_steward', icon: '\u2630', label: 'More' },
  ] : [
    { id: 'home', icon: '\uD83C\uDFE0', label: 'Home' },
    { id: 'cases', icon: '\uD83D\uDCCB', label: 'My Cases' },
    { id: 'stewarddirectory', icon: '\uD83D\uDCAC', label: 'Contact' },
    { id: 'more', icon: '\u2630', label: 'More' },
  ];

  var navTheme = AppState.navTheme || 'default';
  var activeColor = NavThemes.getTabColor(activeTab);
  var hasBlobIndicator = (navTheme === 'blobLava' || navTheme === 'cyberpunk');

  // Set per-tab color CSS custom properties on the nav
  nav.style.setProperty('--blob-color', activeColor);
  nav.style.setProperty('--blob-glow', activeColor + '44');
  nav.style.setProperty('--blob-color-dim', activeColor + '18');
  nav.style.setProperty('--blob-color-border', activeColor + '33');

  // Add blob indicator element for blobLava and cyberpunk themes
  var blobEl = null;
  if (hasBlobIndicator) {
    blobEl = el('div', { className: 'nav-blob-indicator' });
    nav.appendChild(blobEl);
  }

  var activeIndex = -1;
  tabs.forEach(function(tab, idx) {
    if (tab.id === activeTab) activeIndex = idx;

    var item = el('div', {
      className: 'nav-item' + (tab.id === activeTab ? ' active' : ''),
      onClick: function() { _handleTabNav(role, tab.id === 'more_steward' ? '_steward_more' : tab.id === 'more' ? '_member_more' : tab.id); }
    });

    // For shatter theme, set per-item color
    if (navTheme === 'shatter') {
      var tabColor = NavThemes.getTabColor(tab.id);
      item.style.setProperty('--blob-color', tabColor);
      item.style.setProperty('--blob-glow', tabColor + '55');
      if (tab.id !== activeTab) {
        item.style.borderColor = tabColor + '33';
      }
    }

    // For liquid pour, set per-item color
    if (navTheme === 'liquidPour') {
      var lpColor = NavThemes.getTabColor(tab.id);
      item.style.setProperty('--blob-color', lpColor);
      item.style.setProperty('--blob-glow', lpColor + '44');
      item.style.setProperty('--blob-color-dim', lpColor + '18');
      item.style.setProperty('--blob-color-border', lpColor + '33');
    }

    // Icon wrapper — allows badge positioning
    var iconWrap = el('div', { style: { position: 'relative', display: 'inline-block' } });
    iconWrap.appendChild(el('span', { className: 'nav-icon' }, tab.icon));

    // Badge: overdue cases count on Cases tab
    if (tab.id === 'cases' && role === 'steward') {
      var overdueNav = (AppState.kpis && AppState.kpis.overdue) || 0;
      if (overdueNav > 0) {
        iconWrap.appendChild(el('span', {
          style: {
            position: 'absolute', top: '-4px', right: '-6px',
            background: 'var(--danger)', color: '#fff',
            fontSize: '9px', fontWeight: '700', borderRadius: '8px',
            padding: '1px 4px', lineHeight: '1.4', minWidth: '14px', textAlign: 'center',
          }
        }, overdueNav > 9 ? '9+' : String(overdueNav)));
      }
    }

    // Badge: member count on Members tab (just a count, no urgency color)
    if (tab.id === 'members' && role === 'steward') {
      var mc = AppState.memberCount || 0;
      if (mc > 0) {
        iconWrap.appendChild(el('span', {
          style: {
            position: 'absolute', top: '-4px', right: '-6px',
            background: 'var(--accent)', color: '#000',
            fontSize: '9px', fontWeight: '700', borderRadius: '8px',
            padding: '1px 4px', lineHeight: '1.4', minWidth: '14px', textAlign: 'center',
          }
        }, mc > 99 ? '99+' : String(mc)));
      }
    }

    // Badge: unanswered Q&A count on More tab
    if (tab.id === 'more_steward' && role === 'steward') {
      var qaUnans = AppState.qaUnansweredCount || 0;
      if (qaUnans > 0) {
        iconWrap.appendChild(el('span', {
          style: {
            position: 'absolute', top: '-4px', right: '-6px',
            background: 'var(--warning, #f59e0b)', color: '#000',
            fontSize: '9px', fontWeight: '700', borderRadius: '8px',
            padding: '1px 4px', lineHeight: '1.4', minWidth: '14px', textAlign: 'center',
          }
        }, qaUnans > 9 ? '9+' : String(qaUnans)));
      }
    }

    item.appendChild(iconWrap);
    var label = el('span', { className: 'nav-label' }, tab.label);
    if (tab.id === activeTab && navTheme === 'default') label.style.color = 'var(--accent)';
    item.appendChild(label);
    nav.appendChild(item);
  });

  container.appendChild(nav);

  // Position blob indicator after DOM render
  if (hasBlobIndicator && blobEl && activeIndex >= 0) {
    requestAnimationFrame(function() {
      var navItems = nav.querySelectorAll('.nav-item');
      if (navItems[activeIndex]) {
        var navRect = nav.getBoundingClientRect();
        var itemRect = navItems[activeIndex].getBoundingClientRect();
        var left = itemRect.left - navRect.left;
        var width = itemRect.width;
        blobEl.style.left = (left + 4) + 'px';
        blobEl.style.width = (width - 8) + 'px';
      }
    });
  }
}

function renderStewardMembers(appContainer) {
  renderPageLayout(appContainer, 'steward', 'members', function(container) {
    _stewardHeader(container, 'Members');
    var content = el('div', { className: 'content' });
    showLoading(content, 'member-list');
    container.appendChild(content);

    serverCall().withSuccessHandler(function(members) {
      content.innerHTML = '';
      if (!members || members.length === 0) {
        // If members is exactly [] (not null/undefined), auth may have failed silently
        var msg = (members && members.length === 0) 
          ? 'No members found. If this is unexpected, your session may have expired — try refreshing the page.'
          : 'Failed to load members. Please refresh and try again.';
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, msg));
        return;
      }

      // KPI strip
      var myCount = members.filter(function(m) { return m.assignedSteward && m.assignedSteward.toLowerCase() === CURRENT_USER.email.toLowerCase(); }).length;
      var activeGrievances = members.filter(function(m) { return m.hasOpenGrievance; }).length;
      var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)' } });
      [
        { label: 'Total', value: members.length },
        { label: 'Active Cases', value: activeGrievances, color: activeGrievances > 0 ? 'var(--warning)' : null },
        { label: 'My Assigned', value: myCount, color: 'var(--accent)' },
      ].forEach(function(kpi) {
        var card = el('div', { className: 'kpi-card' });
        card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
        var val = el('div', { className: 'kpi-value' }, String(kpi.value));
        if (kpi.color) val.style.color = kpi.color;
        card.appendChild(val);
        kpiStrip.appendChild(card);
      });
      content.appendChild(kpiStrip);

      // Chart.js stats
      if (typeof ChartHelper !== 'undefined') {
        serverCall().withSuccessHandler(function(stats) {
          if (!stats || !stats.byLocation) return;
          // Location bar
          var locCard = el('div', { className: 'card', style: { padding: '12px', marginBottom: '14px' } });
          var locLabel = stats.scope === 'all' ? 'All Members by Location' : 'By Location';
          locCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '12px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, locLabel));
          var lLabels = Object.keys(stats.byLocation);
          var lData = lLabels.map(function(k) { return stats.byLocation[k]; });
          ChartHelper.createHorizontalBarChart(locCard, 'members-loc-chart', lLabels, lData);
          // Insert after KPI strip
          var searchEl = content.querySelector('.search-input');
          if (searchEl) content.insertBefore(locCard, searchEl);
          else content.appendChild(locCard);
        }).withFailureHandler(function() { /* chart optional — skip on error */ }).dataGetStewardMemberStats(SESSION_TOKEN);
      }

      // Sort & Filter controls
      var controlRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px', flexWrap: 'wrap' } });
      var sortSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
      [{ v: 'name-az', l: 'Name A-Z' }, { v: 'name-za', l: 'Name Z-A' }, { v: 'location', l: 'Location' }].forEach(function(o) {
        sortSelect.appendChild(el('option', { value: o.v }, o.l));
      });
      controlRow.appendChild(sortSelect);

      var filterSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
      filterSelect.appendChild(el('option', { value: 'nearby' }, 'My Location'));
      filterSelect.appendChild(el('option', { value: 'all' }, 'All Members'));
      filterSelect.appendChild(el('option', { value: 'assigned' }, 'Assigned to Me'));
      filterSelect.appendChild(el('option', { value: 'grievance' }, 'Has Open Case'));
      var locs = {};
      members.forEach(function(m) { if (m.workLocation) locs[m.workLocation] = true; });
      Object.keys(locs).sort().forEach(function(loc) {
        filterSelect.appendChild(el('option', { value: 'loc:' + loc }, loc));
      });
      controlRow.appendChild(filterSelect);
      content.appendChild(controlRow);

      // Search
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search members...',
        onInput: rerender
      });
      content.appendChild(searchInput);

      var listArea = el('div');
      content.appendChild(listArea);

      sortSelect.addEventListener('change', rerender);
      filterSelect.addEventListener('change', rerender);

      function rerender() {
        _memberListPage = 0;
        var q = searchInput.value.toLowerCase();
        var sortKey = sortSelect.value;
        var filterKey = filterSelect.value;
        var filtered = members.slice();
        if (q) {
          filtered = filtered.filter(function(m) {
            return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
                   (m.email || '').toLowerCase().indexOf(q) !== -1 ||
                   (m.workLocation || '').toLowerCase().indexOf(q) !== -1;
          });
        }
        if (filterKey === 'nearby') {
          // Filter to same work location and overlapping office days
          var myLoc = (CURRENT_USER && CURRENT_USER.workLocation || '').toLowerCase();
          var myDays = (CURRENT_USER && CURRENT_USER.officeDays || '').toLowerCase().split(/[,;\s]+/).filter(Boolean);
          filtered = filtered.filter(function(m) {
            if (!myLoc) return true; // No location info — show all
            return (m.workLocation || '').toLowerCase() === myLoc;
          });
          // Sort by office day overlap (most overlap first)
          filtered.sort(function(a, b) {
            var aDays = (a.officeDays || '').toLowerCase().split(/[,;\s]+/);
            var bDays = (b.officeDays || '').toLowerCase().split(/[,;\s]+/);
            var aOverlap = myDays.length > 0 ? aDays.filter(function(d) { return myDays.indexOf(d) !== -1; }).length : 0;
            var bOverlap = myDays.length > 0 ? bDays.filter(function(d) { return myDays.indexOf(d) !== -1; }).length : 0;
            return bOverlap - aOverlap || (a.name || '').localeCompare(b.name || '');
          });
        } else if (filterKey === 'assigned') {
          filtered = filtered.filter(function(m) { return m.assignedSteward && m.assignedSteward.toLowerCase() === CURRENT_USER.email.toLowerCase(); });
        } else if (filterKey === 'grievance') {
          filtered = filtered.filter(function(m) { return m.hasOpenGrievance; });
        } else if (filterKey.indexOf('loc:') === 0) {
          var loc = filterKey.substring(4);
          filtered = filtered.filter(function(m) { return m.workLocation === loc; });
        }
        if (filterKey !== 'nearby') {
          filtered.sort(function(a, b) {
            if (sortKey === 'name-za') return (b.name || '').localeCompare(a.name || '');
            if (sortKey === 'location') return (a.workLocation || '').localeCompare(b.workLocation || '');
            return (a.name || '').localeCompare(b.name || '');
          });
        }
        renderFilteredMembers(listArea, filtered, '');
      }
      rerender();
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--danger)' } }, 'Failed to load members. Try refreshing.'));
    }).dataGetAllMembers(SESSION_TOKEN);
  });
}

var _memberListPage = 0;
var _memberPageSize = 20;
var _expandedMemberEmail = null;

function renderFilteredMembers(container, members, query) {
  container.innerHTML = '';
  var filtered = query ? members.filter(function(m) {
    return (m.name || '').toLowerCase().indexOf(query) !== -1 ||
           (m.email || '').toLowerCase().indexOf(query) !== -1 ||
           (m.workLocation || '').toLowerCase().indexOf(query) !== -1;
  }) : members;

  if (filtered.length === 0) {
    container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '16px 0', textAlign: 'center' } }, 'No matches.'));
    return;
  }

  // Reset to page 0 when query changes
  if (query) _memberListPage = 0;

  var totalPages = Math.ceil(filtered.length / _memberPageSize);
  if (_memberListPage >= totalPages) _memberListPage = totalPages - 1;
  if (_memberListPage < 0) _memberListPage = 0;
  var start = _memberListPage * _memberPageSize;
  var pageItems = filtered.slice(start, start + _memberPageSize);

  pageItems.forEach(function(m) {
    var item = el('div', { className: 'member-list-item', style: { cursor: 'pointer' } });
    item.appendChild(el('div', { className: 'member-list-avatar' }, (m.name || 'M').charAt(0).toUpperCase()));
    var info = el('div', { className: 'member-list-info' });
    info.appendChild(el('div', { className: 'member-list-name' }, m.name || m.email));
    var meta = m.workLocation || '';
    if (m.officeDays) meta += (meta ? ' \u00B7 ' : '') + m.officeDays;
    info.appendChild(el('div', { className: 'member-list-meta' }, meta));
    item.appendChild(info);

    var badges = el('div', { className: 'member-list-badges' });
    if (m.hasOpenGrievance) badges.appendChild(el('div', { className: 'status-dot active', title: 'Has open grievance' }));
    item.appendChild(badges);
    item.appendChild(el('span', { className: 'member-list-chevron' }, '\u25B6'));
    container.appendChild(item);

    // Click handler — toggle inline detail panel
    item.addEventListener('click', function() {
      try {
        var wasExpanded = item.classList.contains('expanded');
        var siblings = container.querySelectorAll('.member-list-item.expanded');
        for (var s = 0; s < siblings.length; s++) siblings[s].classList.remove('expanded');
        if (!wasExpanded) item.classList.add('expanded');
        _toggleMemberDetail(container, item, m);
      } catch (err) {
        console.error('Member click error:', err);
      }
    });

    // If this member was previously expanded, re-expand
    if (_expandedMemberEmail === (m.email || '').toLowerCase()) {
      _showMemberDetail(container, item, m);
    }
  });

  // Pagination controls
  if (totalPages > 1) {
    var pager = el('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '12px', padding: '12px 0' } });
    var prevBtn = el('button', {
      className: 'btn', disabled: _memberListPage === 0,
      style: { fontSize: '12px', padding: '6px 14px', opacity: _memberListPage === 0 ? '0.4' : '1' },
      onClick: function() { _memberListPage--; renderFilteredMembers(container, members, query); },
    }, '\u2190 Prev');
    pager.appendChild(prevBtn);
    pager.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--muted)' } },
      (start + 1) + '\u2013' + Math.min(start + _memberPageSize, filtered.length) + ' of ' + filtered.length));
    var nextBtn = el('button', {
      className: 'btn', disabled: _memberListPage >= totalPages - 1,
      style: { fontSize: '12px', padding: '6px 14px', opacity: _memberListPage >= totalPages - 1 ? '0.4' : '1' },
      onClick: function() { _memberListPage++; renderFilteredMembers(container, members, query); },
    }, 'Next \u2192');
    pager.appendChild(nextBtn);
    container.appendChild(pager);
  }
}

// ═══════════════════════════════════════

function _toggleMemberDetail(container, itemEl, member) {
  var email = (member.email || '').toLowerCase();
  var existing = container.querySelector('.member-detail-panel');
  if (existing && _expandedMemberEmail === email) {
    existing.remove();
    _expandedMemberEmail = null;
    return;
  }
  if (existing) existing.remove();
  _expandedMemberEmail = email;
  _showMemberDetail(container, itemEl, member);
}

function _showMemberDetail(container, itemEl, member) {
  var panel = el('div', { className: 'member-detail-panel', style: { background: 'var(--raised)', padding: '12px 16px', borderRadius: '8px', marginBottom: '8px', borderLeft: '3px solid var(--accent)' } });

  // Info row — label+value pairs
  var infoRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '12px 20px', marginBottom: '12px' } });
  var infoFields = [
    { label: 'Email', value: member.email || '—' },
    { label: 'Location', value: member.workLocation || '—' },
    { label: 'Office Days', value: member.officeDays || '—' },
    { label: 'Dues', value: member.duesStatus || '—' }
  ];
  infoFields.forEach(function(f) {
    var pair = el('div', { style: { minWidth: '100px' } });
    pair.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, f.label));
    pair.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', fontWeight: '500' } }, f.value));
    infoRow.appendChild(pair);
  });
  panel.appendChild(infoRow);

  // Action buttons
  var btnRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
  var actionArea = el('div', { style: { marginTop: '8px' } });

  // ── Full Profile ──────────────────────────────────────────────────────────
  var profileBtn = el('button', {
    style: { fontSize: '12px', padding: '6px 14px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600', cursor: 'pointer' },
    onClick: function() {
      profileBtn.disabled = true;
      profileBtn.textContent = 'Loading...';
      serverCall()
        .withSuccessHandler(function(profile) {
          profileBtn.remove();
          actionArea.innerHTML = '';
          if (!profile) {
            actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', marginTop: '8px' } }, 'Profile not found.'));
            return;
          }
          var extraRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '12px 20px', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          var extraFields = [
            { label: 'Job Title', value: profile.jobTitle || '—' },
            { label: 'Supervisor', value: profile.supervisor || '—' },
            { label: 'Joined', value: profile.joined || '—' },
            { label: 'City/State', value: ((profile.city || '') + (profile.city && profile.state ? ', ' : '') + (profile.state || '')) || '—' }
          ];
          extraFields.forEach(function(f) {
            var pair = el('div', { style: { minWidth: '100px' } });
            pair.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, f.label));
            pair.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', fontWeight: '500' } }, f.value));
            extraRow.appendChild(pair);
          });
          // Member admin folder link — shown only if URL exists (set on first contact or grievance)
          // Links to Members/LastName, FirstName/ — steward-only workspace, never shared with member
          if (profile.memberAdminFolderUrl) {
            var folderPair = el('div', { style: { minWidth: '100px' } });
            folderPair.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, 'Member Folder'));
            var folderLink = el('a', {
              href: profile.memberAdminFolderUrl,
              target: '_blank',
              style: { fontSize: '13px', color: 'var(--accent)', fontWeight: '500', textDecoration: 'none' }
            }, '\uD83D\uDCC2 Open in Drive');
            folderPair.appendChild(folderLink);
            extraRow.appendChild(folderPair);
          }
          actionArea.appendChild(extraRow);
        })
        .withFailureHandler(function() {
          profileBtn.disabled = false;
          profileBtn.textContent = 'Full Profile';
          actionArea.innerHTML = '';
          actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', marginTop: '4px' } }, 'Failed to load profile.'));
        })
        .dataGetFullProfile(SESSION_TOKEN, member.email);
    }
  }, 'Full Profile');

  // ── Log Contact ───────────────────────────────────────────────────────────
  var logContactBtn = el('button', {
    style: { fontSize: '12px', padding: '6px 14px', borderRadius: '6px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer' },
    onClick: function() {
      actionArea.innerHTML = '';
      var typeIcons = { 'Phone': '\uD83D\uDCDE', 'Email': '\u2709\uFE0F', 'In Person': '\uD83D\uDC64', 'Text': '\uD83D\uDCAC' };
      var selectedType = 'Phone';

      var form = el('div', { style: { borderTop: '1px solid var(--border)', paddingTop: '10px', marginTop: '4px' } });
      form.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' } }, '\uD83D\uDCDE Log Contact — ' + (member.name || member.email)));

      // Contact type pills
      var typeRow = el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', marginBottom: '8px' } });
      var typeBtns = {};
      Object.keys(typeIcons).forEach(function(t) {
        var btn = el('button', {
          className: 'filter-tab' + (t === selectedType ? ' active' : ''),
          onClick: function() {
            selectedType = t;
            Object.keys(typeBtns).forEach(function(k) { typeBtns[k].className = 'filter-tab' + (k === t ? ' active' : ''); });
          }
        }, typeIcons[t] + ' ' + t);
        typeBtns[t] = btn;
        typeRow.appendChild(btn);
      });
      form.appendChild(typeRow);

      // Notes
      var notesInput = el('textarea', { className: 'msg-textarea', placeholder: 'Notes (optional)...', style: { minHeight: '50px', marginBottom: '8px', width: '100%', boxSizing: 'border-box' } });
      form.appendChild(notesInput);

      var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginBottom: '4px' } });
      form.appendChild(statusMsg);

      var btnRowInner = el('div', { style: { display: 'flex', gap: '6px' } });
      var submitBtn = el('button', { className: 'btn btn-primary', style: { fontSize: '12px' },
        onClick: function() {
          submitBtn.disabled = true;
          statusMsg.textContent = 'Logging...';
          statusMsg.style.color = 'var(--muted)';
          serverCall()
            .withSuccessHandler(function(r) {
              if (r && r.success) {
                actionArea.innerHTML = '';
                actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--success)', marginTop: '6px' } }, '\u2713 Contact logged.'));
              } else {
                statusMsg.textContent = (r && r.message) || 'Error.';
                statusMsg.style.color = 'var(--danger)';
                submitBtn.disabled = false;
              }
            })
            .withFailureHandler(function() {
              statusMsg.textContent = 'Failed. Try again.';
              statusMsg.style.color = 'var(--danger)';
              submitBtn.disabled = false;
            })
            .dataLogMemberContact(SESSION_TOKEN, member.email, selectedType, notesInput.value.trim(), '');
        }
      }, 'Log');
      var cancelBtn = el('button', { className: 'btn', style: { fontSize: '12px' }, onClick: function() { actionArea.innerHTML = ''; } }, 'Cancel');
      btnRowInner.appendChild(submitBtn);
      btnRowInner.appendChild(cancelBtn);
      form.appendChild(btnRowInner);
      actionArea.appendChild(form);
    }
  }, '\uD83D\uDCDE Log Contact');

  // ── Send Notification ─────────────────────────────────────────────────────
  var notifBtn = el('button', {
    style: { fontSize: '12px', padding: '6px 14px', borderRadius: '6px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer' },
    onClick: function() {
      actionArea.innerHTML = '';
      var form = el('div', { style: { borderTop: '1px solid var(--border)', paddingTop: '10px', marginTop: '4px' } });
      form.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' } }, '\uD83D\uDD14 Send Notification — ' + (member.name || member.email)));

      var subjectInput = el('input', { className: 'form-input', placeholder: 'Subject...', style: { marginBottom: '6px' } });
      var bodyInput = el('textarea', { className: 'msg-textarea', placeholder: 'Message body...', style: { minHeight: '70px', marginBottom: '8px', width: '100%', boxSizing: 'border-box' } });
      form.appendChild(subjectInput);
      form.appendChild(bodyInput);

      var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginBottom: '4px' } });
      form.appendChild(statusMsg);

      var btnRowInner = el('div', { style: { display: 'flex', gap: '6px' } });
      var sendBtn = el('button', { className: 'btn btn-primary', style: { fontSize: '12px' },
        onClick: function() {
          if (!subjectInput.value.trim() || !bodyInput.value.trim()) {
            statusMsg.textContent = 'Subject and body required.';
            statusMsg.style.color = 'var(--danger)';
            return;
          }
          sendBtn.disabled = true;
          statusMsg.textContent = 'Sending...';
          statusMsg.style.color = 'var(--muted)';
          serverCall()
            .withSuccessHandler(function(r) {
              if (r && r.success) {
                actionArea.innerHTML = '';
                actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--success)', marginTop: '6px' } }, '\u2713 Message sent to ' + member.email));
              } else {
                statusMsg.textContent = (r && r.message) || 'Error.';
                statusMsg.style.color = 'var(--danger)';
                sendBtn.disabled = false;
              }
            })
            .withFailureHandler(function() {
              statusMsg.textContent = 'Failed. Try again.';
              statusMsg.style.color = 'var(--danger)';
              sendBtn.disabled = false;
            })
            .dataSendDirectMessage(SESSION_TOKEN, member.email, subjectInput.value.trim(), bodyInput.value.trim());
        }
      }, 'Send');
      var cancelBtn = el('button', { className: 'btn', style: { fontSize: '12px' }, onClick: function() { actionArea.innerHTML = ''; } }, 'Cancel');
      btnRowInner.appendChild(sendBtn);
      btnRowInner.appendChild(cancelBtn);
      form.appendChild(btnRowInner);
      actionArea.appendChild(form);
    }
  }, '\uD83D\uDD14 Send Notification');

  // ── Case Folder ───────────────────────────────────────────────────────────
  var caseFolderBtn = el('button', {
    style: { fontSize: '12px', padding: '6px 14px', borderRadius: '6px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer' },
    onClick: function() {
      actionArea.innerHTML = '';
      caseFolderBtn.disabled = true;
      caseFolderBtn.textContent = 'Loading...';
      serverCall()
        .withSuccessHandler(function(r) {
          caseFolderBtn.disabled = false;
          caseFolderBtn.textContent = '\uD83D\uDCC2 Case Folder';
          if (r && r.success && r.url) {
            window.open(r.url, '_blank');
          } else {
            actionArea.innerHTML = '';
            actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '6px' } },
              (r && r.message) || 'No Drive folder found for this member\u2019s case.'));
          }
        })
        .withFailureHandler(function() {
          caseFolderBtn.disabled = false;
          caseFolderBtn.textContent = '\uD83D\uDCC2 Case Folder';
          actionArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', marginTop: '6px' } }, 'Failed to fetch case folder.'));
        })
        .dataGetMemberCaseFolderUrl(SESSION_TOKEN, member.email);
    }
  }, '\uD83D\uDCC2 Case Folder');

  btnRow.appendChild(profileBtn);
  btnRow.appendChild(logContactBtn);
  btnRow.appendChild(notifBtn);
  btnRow.appendChild(caseFolderBtn);
  panel.appendChild(btnRow);
  panel.appendChild(actionArea);

  itemEl.parentNode.insertBefore(panel, itemEl.nextSibling);
}
