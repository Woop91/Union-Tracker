<script>
/**
 * Steward View — "Mono Signal"
 * v4.36.0 — Cases, Members tab, Broadcast, Survey tracking, Polls manager,
 * Resources tab, responsive sidebar layout, Insights, Engagement, Mentorship,
 * Contact Log, Access Log, Timeline, Failsafe, deadline calendar, trend alerts.
 */

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

function initStewardView(container) {
  _insideRoleInit = true;
  var t = ThemeEngine.getTheme('steward', AppState.isDark);
  ThemeEngine.applyTheme(t);
  AppState.activeRole = 'steward';
  showLoading(container, 'kpi');

  // Use batch data if available from initApp pre-fetch
  var batch = AppState.batchData;
  if (batch && batch.cases) {
    AppState.cases = batch.cases || [];
    AppState.kpis = batch.kpis || { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
    AppState.notificationCount = batch.notificationCount || 0;
    AppState.memberCount = batch.memberCount || 0;
    AppState.taskCount = batch.taskCount || 0;
    AppState.overdueTaskCount = batch.overdueTaskCount || 0;
    AppState.qaUnansweredCount = batch.qaUnansweredCount || 0;
    AppState.loading = false;
    renderStewardDashboard(container);
    _insideRoleInit = false;
    _checkDeepLink('steward');
    _prefetchInsights();
    if (IS_DEV_MODE && typeof _validateTabIntegrity === 'function') _validateTabIntegrity();
    return;
  }

  // OPT-1: Single batch endpoint replaces 3+ sequential server calls
  _insideRoleInit = false; // async path — render happens inside _handleTabNav via _checkDeepLink
  serverCall()
    .withSuccessHandler(function(result) {
      AppState.cases = result.cases || [];
      AppState.kpis = result.kpis || { totalCases: 0, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
      AppState.notificationCount = (result.badges && result.badges.notificationCount) || 0;
      AppState.taskCount = (result.badges && result.badges.taskCount) || 0;
      AppState.overdueTaskCount = (result.badges && result.badges.overdueTaskCount) || 0;
      AppState.qaUnansweredCount = (result.badges && result.badges.qaUnansweredCount) || 0;
      AppState.memberCount = result.memberCount || 0;
      AppState.loading = false;
      _insideRoleInit = true;
      renderStewardDashboard(container);
      _insideRoleInit = false;
      _checkDeepLink('steward');
      _prefetchInsights();
      if (IS_DEV_MODE && typeof _validateTabIntegrity === 'function') _validateTabIntegrity();
    })
    .withFailureHandler(function() {
      AppState.cases = [];
      AppState.kpis = { totalCases: 0, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
      AppState.loading = false;
      _insideRoleInit = true;
      renderStewardDashboard(container);
      _insideRoleInit = false;
    })
    .dataGetStewardDashboardInit(SESSION_TOKEN);
}

// ═══════════════════════════════════════
// v4.33.0 — BACKGROUND PREFETCH: warm Insights cache after dashboard renders.
// Fires once, 3s after initial render so it doesn't compete with the batch call.
// ═══════════════════════════════════════
var _insightsPrefetched = false;
function _prefetchInsights() {
  if (_insightsPrefetched) return;
  _insightsPrefetched = true;
  setTimeout(function() {
    // Skip if user already navigated to Insights (cache will be populated by the tab itself)
    if (AppState.insightsCache && (Date.now() - (AppState.insightsCache.ts || 0)) < 300000) return;
    serverCall().withSuccessHandler(function(batch) {
      if (!batch) return;
      AppState.insightsCache = {
        ts: Date.now(),
        stats: batch.stats || { available: false },
        hotSpots: batch.hotSpots || [],
        perf: batch.perf || [],
        sat: batch.sat || { categories: [] },
        memberStats: batch.memberStats || null,
        workload: batch.workload || { available: false }
      };
    }).withFailureHandler(function() { /* optional prefetch — ignore errors */ }).dataGetInsightsBatch(SESSION_TOKEN);
  }, 3000);
}

// ═══════════════════════════════════════
// STEWARD HEADER (shared)
// ═══════════════════════════════════════

function _stewardHeader(container, title, subtitle) {
  var header = el('div', { className: 'page-header' });
  var headerLeft = el('div', { className: 'page-header-left' });
  headerLeft.appendChild(el('div', { className: 'page-title' }, title));
  if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
  header.appendChild(headerLeft);

  var headerRight = el('div', { className: 'page-header-right' });
  if (!isSidebarLayout()) {
    // All stewards can switch to member view (every steward is also a member)
    headerRight.appendChild(el('button', {
      style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '8px 14px', fontSize: '12px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)', minHeight: '36px' },
      onClick: function() { _invalidateTabCache(); _activePane = null; _layoutCache = {}; _tabPanesRole = null; AppState.activeRole = 'member'; AppState.activeTab = 'home'; initMemberView(document.getElementById('app')); }
    }, '\uD83D\uDC64 ' + CONFIG.memberLabel));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
      AppState.isDark = !AppState.isDark;
      try { localStorage.setItem('dds_isDark', AppState.isDark); } catch(e) {}
      if (typeof UnifiedTheme !== 'undefined') UnifiedTheme.apply();
      else ThemeEngine.applyTheme(ThemeEngine.getTheme('steward', AppState.isDark));
      _handleTabNav('steward', AppState.activeTab || 'cases');
    }}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
  }
  header.appendChild(headerRight);
  container.appendChild(header);
}

// ═══════════════════════════════════════
// MOBILE QUICK-ACCESS TOOLBAR (v4.39.0 — Feature 15)
// ═══════════════════════════════════════

/**
 * Renders a horizontally-scrollable quick-action toolbar on mobile (<= 640px).
 * Hidden on desktop. Uses el() for safe DOM construction.
 * @param {HTMLElement} container - Parent container to append toolbar to.
 */
function _renderMobileQuickToolbar(container) {
  if (window.innerWidth > 640) return; // Desktop: skip

  var toolbar = el('div', { className: 'mobile-quick-toolbar' });

  var actions = [
    { icon: '\uD83D\uDD0D', label: 'Search', action: function() { _handleTabNav('steward', 'members'); } },
    { icon: '\uD83D\uDCDE', label: 'Call', action: function() { _handleTabNav('steward', 'members'); } },
    { icon: '\uD83D\uDCCB', label: 'New Case', action: function() { _handleTabNav('steward', 'cases'); } },
    { icon: '\uD83D\uDCE2', label: 'Broadcast', action: function() { _handleTabNav('steward', 'broadcast'); } }
  ];

  actions.forEach(function(a) {
    var btn = el('button', { className: 'mobile-quick-btn', onclick: a.action });
    btn.appendChild(el('span', { className: 'quick-icon' }, a.icon));
    btn.appendChild(el('span', {}, a.label));
    toolbar.appendChild(btn);
  });

  container.appendChild(toolbar);
}

// ═══════════════════════════════════════
// STEWARD FEEDBACK CARD (v4.32.0)
// ═══════════════════════════════════════

function _renderStewardFeedbackCard(container, fb) {
  var card = el('div', { className: 'card card-glass card-fade-in', style: { margin: '0 0 14px', padding: '16px' } });

  // Header row
  var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' } });
  header.appendChild(el('div', { className: 'display-title-sm' }, 'Your Feedback Scores'));
  header.appendChild(el('div', { className: 'text-xs-muted' }, fb.totalFeedback + ' rating' + (fb.totalFeedback !== 1 ? 's' : '')));
  card.appendChild(header);

  // Score bars
  var categories = [
    { label: 'Overall', value: fb.avgOverall },
    { label: 'Satisfaction', value: fb.avgSatisfaction },
    { label: 'Communication', value: fb.avgCommunication },
    { label: 'Timeliness', value: fb.avgTimeliness },
    { label: 'Fairness', value: fb.avgFairness }
  ];

  categories.forEach(function(cat) {
    var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' } });
    row.appendChild(el('div', { style: { width: '90px', fontSize: '11px', color: 'var(--muted)', flexShrink: '0' } }, cat.label));
    var barBg = el('div', { style: { flex: '1', height: '8px', borderRadius: '4px', background: 'rgba(255,255,255,0.08)', overflow: 'hidden' } });
    var pct = Math.round((cat.value / 5) * 100);
    var barColor = cat.value >= 4 ? 'var(--success)' : cat.value >= 3 ? 'var(--warning)' : 'var(--danger)';
    barBg.appendChild(el('div', { style: { width: pct + '%', height: '100%', borderRadius: '4px', background: barColor, transition: 'width 0.5s' } }));
    row.appendChild(barBg);
    row.appendChild(el('div', { style: { width: '35px', textAlign: 'right', fontSize: '12px', fontWeight: '600', color: barColor } }, cat.value + '/5'));
    card.appendChild(row);
  });

  // Recent comments
  if (fb.recentComments && fb.recentComments.length > 0) {
    card.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '600', color: 'var(--text)', marginTop: '12px', marginBottom: '6px' } }, 'Recent Comments'));
    fb.recentComments.forEach(function(c) {
      var cRow = el('div', { style: { padding: '6px 8px', marginBottom: '4px', background: 'rgba(255,255,255,0.03)', borderRadius: '6px', borderLeft: '3px solid var(--accent)' } });
      cRow.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text)', lineHeight: '1.4' } }, '"' + c.comment + '"'));
      var meta = [];
      if (c.grievanceId) meta.push(c.grievanceId);
      if (c.date) meta.push(c.date);
      if (meta.length) cRow.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '3px' } }, meta.join(' \u00B7 ')));
      card.appendChild(cRow);
    });
  }

  container.appendChild(card);
}

// ═══════════════════════════════════════
// CASES DASHBOARD (main steward tab)
// ═══════════════════════════════════════

function renderStewardDashboard(appContainer) {
  renderPageLayout(appContainer, 'steward', 'cases', function(container) {
    _stewardHeader(container, 'Cases', CURRENT_USER.name + ' \u00B7 ' + CURRENT_USER.unit);

    // v4.39.0 — Mobile quick-access toolbar (Feature 15)
    _renderMobileQuickToolbar(container);

    // Welcome card — localStorage-based, shows until user dismisses
    _renderStewardWelcome(container);

    // KPIs — show org-wide fallback if steward has 0 assigned cases
    var kpis = AppState.kpis || {};
    var isOrgFallback = (kpis.totalCases || 0) === 0;

    if (isOrgFallback) {
      // Fetch org-wide stats asynchronously, update KPIs when ready
      var kpiGrid = renderKPIStrip(container, [
        { label: 'Org Cases', value: '...' },
        { label: 'Org Overdue', value: '...' },
        { label: 'Org Due <7d', value: '...' },
        { label: 'Org Resolved', value: '...', color: 'var(--success)' },
      ]);

      // Subtext
      container.appendChild(el('div', { style: { textAlign: 'center', fontSize: '11px', color: 'var(--muted)', marginTop: '-6px', marginBottom: '10px' } }, '(no cases assigned to you \u2014 showing org-wide)'));

      // Fill in org-wide stats
      serverCall().withSuccessHandler(function(stats) {
        var cards = kpiGrid.querySelectorAll('.kpi-value');
        if (!stats || !stats.available) {
          if (cards[0]) cards[0].textContent = '0';
          if (cards[1]) cards[1].textContent = '0';
          if (cards[2]) cards[2].textContent = '0';
          if (cards[3]) cards[3].textContent = '0';
          return;
        }
        if (cards[0]) cards[0].textContent = String(stats.total || 0);
        if (cards[1]) { cards[1].textContent = String(stats.overdueCount || 0); if (stats.overdueCount > 0) cards[1].style.color = 'var(--danger)'; }
        if (cards[2]) { cards[2].textContent = String(stats.dueSoonCount || 0); if (stats.dueSoonCount > 0) cards[2].style.color = 'var(--warning)'; }
        if (cards[3]) cards[3].textContent = String(stats.settledCount || stats.wonCount || 0);
      }).withFailureHandler(function(err) {
        console.error('Org KPI stats failed:', err && err.message);
        var cards = kpiGrid.querySelectorAll('.kpi-value');
        if (cards[0]) cards[0].textContent = '\u2014';
        if (cards[1]) cards[1].textContent = '\u2014';
        if (cards[2]) cards[2].textContent = '\u2014';
        if (cards[3]) cards[3].textContent = '\u2014';
      }).dataGetGrievanceStats(SESSION_TOKEN);
    } else {
      renderKPIStrip(container, [
        { label: 'My Cases', value: kpis.totalCases || 0 },
        { label: 'Overdue', value: kpis.overdue || 0, color: kpis.overdue > 0 ? 'var(--danger)' : null },
        { label: 'Due <7d', value: kpis.dueSoon || 0, color: kpis.dueSoon > 0 ? 'var(--warning)' : null },
        { label: 'Resolved', value: kpis.resolved || 0, color: 'var(--success)' },
      ]);
    }

    // Trend Alert Banner (v4.36.0)
    var alertSlot = el('div');
    container.appendChild(alertSlot);
    serverCall().withSuccessHandler(function(alerts) {
      if (!alerts || alerts.length === 0) return;
      var alertCard = el('div', { className: 'card', style: { padding: '12px', marginBottom: '12px', border: '1px solid var(--warning, #eab308)', background: 'rgba(234, 179, 8, 0.05)' } });
      alertCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '700', color: 'var(--warning, #eab308)', marginBottom: '8px' } }, 'Trend Alerts (' + alerts.length + ')'));
      alerts.forEach(function(alert) {
        var row = el('div', { style: { padding: '8px 0', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '8px' } });
        var info = el('div', { style: { flex: '1' } });
        var severityColor = alert.severity === 'HIGH' ? 'var(--danger, #ef4444)' : alert.severity === 'CRITICAL' ? 'var(--danger, #ef4444)' : 'var(--warning, #eab308)';
        info.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, alert.title));
        info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '2px', lineHeight: '1.4' } }, alert.message));
        info.appendChild(el('span', { style: { display: 'inline-block', fontSize: '10px', fontWeight: '600', padding: '1px 6px', borderRadius: '8px', background: severityColor + '22', color: severityColor, marginTop: '4px' } }, alert.severity));
        row.appendChild(info);
        var actions = el('div', { style: { display: 'flex', gap: '4px', flexShrink: '0' } });
        if (alert.status === 'Active') {
          var ackBtn = el('button', { className: 'btn-sm btn-outline', style: { fontSize: '10px', padding: '3px 8px' }, onClick: function() {
            serverCall().withSuccessHandler(function(res) {
              if (res && res.success) { ackBtn.textContent = 'Acked'; ackBtn.disabled = true; ackBtn.style.color = 'var(--success, #22c55e)'; }
            }).dataAcknowledgeTrendAlert(SESSION_TOKEN, alert.id);
          } }, 'Ack');
          actions.appendChild(ackBtn);
        }
        var resolveBtn = el('button', { className: 'btn-sm btn-outline', style: { fontSize: '10px', padding: '3px 8px' }, onClick: function() {
          serverCall().withSuccessHandler(function(res) {
            if (res && res.success) { row.style.opacity = '0.4'; resolveBtn.textContent = 'Resolved'; resolveBtn.disabled = true; }
          }).dataResolveTrendAlert(SESSION_TOKEN, alert.id);
        } }, 'Resolve');
        actions.appendChild(resolveBtn);
        row.appendChild(actions);
        alertCard.appendChild(row);
      });
      alertSlot.appendChild(alertCard);
    }).withFailureHandler(function() {
      // Silent fail — alerts are non-critical
    }).dataGetTrendAlerts(SESSION_TOKEN);

    // Grievance feedback summary (v4.32.0)
    var fbSlot = el('div');
    container.appendChild(fbSlot);
    serverCall().withSuccessHandler(function(fb) {
      if (!fb || !fb.totalFeedback || fb.totalFeedback === 0) return;
      _renderStewardFeedbackCard(fbSlot, fb);
    }).withFailureHandler(function() { /* non-critical */ }).dataGetStewardFeedbackSummary(SESSION_TOKEN);

    // Sub-tabs: List (default) + Calendar (v4.34.0 — Feature 6)
    var _st = createSubTabs([
      { id: 'list', label: 'List', render: function(c) { _renderCasesListSubTab(c); } },
      { id: 'calendar', label: 'Calendar', render: function(c) { _renderDeadlineCalendar(c); } }
    ]);
    container.appendChild(_st.bar);
    container.appendChild(_st.content);

    // FAB — opens broadcast
    var fab = el('button', { className: 'fab', 'aria-label': 'Quick broadcast', onClick: function() { _handleTabNav('steward', 'broadcast'); } }, '\uD83D\uDCE2');
    container.appendChild(fab);
  });
}

// ═══════════════════════════════════════
// CASES LIST SUB-TAB (extracted for sub-tab pattern, v4.34.0)
// ═══════════════════════════════════════

/**
 * Renders the case list sub-tab content (finder panel + case list).
 * Extracted from renderStewardDashboard so it can live inside a sub-tab.
 * @param {HTMLElement} target - Sub-tab content container
 */
function _renderCasesListSubTab(target) {
  var finderSlot = el('div', { className: 'content' });
  var caseListContainer = el('div', { className: 'content' });
  _renderCasesFinderPanel(finderSlot, AppState.cases, function(filtered) {
    renderCaseList(caseListContainer, filtered, true);
  });
  target.appendChild(finderSlot);

  // Initial render with all cases
  renderCaseList(caseListContainer, AppState.cases, true);
  target.appendChild(caseListContainer);
}

// ═══════════════════════════════════════
// DEADLINE CALENDAR VIEW (v4.34.0 — Feature 6)
// ═══════════════════════════════════════

/**
 * Renders a month-view calendar showing case deadlines.
 * Uses AppState.cases (already loaded) to plot deadline dots by color.
 * @param {HTMLElement} container - Sub-tab content container
 */
function _renderDeadlineCalendar(container) {
  var today = new Date();
  var currentMonth = today.getMonth();
  var currentYear = today.getFullYear();

  var navBar = el('div', { className: 'calendar-nav' });
  var monthLabel = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)' } });
  var prevBtn = el('button', { className: 'btn btn-secondary', style: { padding: '4px 12px', fontSize: '14px' }, onclick: function() { changeMonth(-1); } }, '\u25C0');
  var nextBtn = el('button', { className: 'btn btn-secondary', style: { padding: '4px 12px', fontSize: '14px' }, onclick: function() { changeMonth(1); } }, '\u25B6');
  var todayBtn = el('button', { className: 'btn btn-secondary', style: { padding: '4px 10px', fontSize: '12px', marginLeft: '8px' }, onclick: function() { currentMonth = today.getMonth(); currentYear = today.getFullYear(); renderMonth(); } }, 'Today');

  var leftNav = el('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } });
  leftNav.appendChild(prevBtn);
  leftNav.appendChild(monthLabel);
  leftNav.appendChild(todayBtn);
  navBar.appendChild(leftNav);
  navBar.appendChild(nextBtn);
  container.appendChild(navBar);

  var grid = el('div', { className: 'calendar-grid' });
  container.appendChild(grid);

  // Legend
  var legend = el('div', { style: { display: 'flex', gap: '12px', justifyContent: 'center', marginTop: '8px', fontSize: '11px', color: 'var(--muted)' } });
  var legendItems = [
    { cls: 'overdue', label: 'Overdue' },
    { cls: 'urgent', label: '\u22643 days' },
    { cls: 'soon', label: '\u22647 days' },
    { cls: 'safe', label: '>7 days' }
  ];
  legendItems.forEach(function(item) {
    var lItem = el('div', { style: { display: 'flex', alignItems: 'center', gap: '4px' } });
    lItem.appendChild(el('span', { className: 'deadline-dot ' + item.cls }));
    lItem.appendChild(el('span', {}, item.label));
    legend.appendChild(lItem);
  });
  container.appendChild(legend);

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderMonth();
  }

  /**
   * Parses deadline from case data. Returns a Date or null.
   * Handles both formatted date strings and deadlineDays offset.
   */
  function _parseDeadlineDate(c) {
    if (c.deadline && c.deadline !== '\u2014' && c.deadline !== 'Overdue') {
      var d = new Date(c.deadline);
      if (!isNaN(d.getTime())) return d;
    }
    // Fallback: compute from deadlineDays relative to today
    if (c.deadlineDays !== null && c.deadlineDays !== undefined) {
      var computed = new Date();
      computed.setDate(computed.getDate() + c.deadlineDays);
      return computed;
    }
    return null;
  }

  function renderMonth() {
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    monthLabel.textContent = MONTHS[currentMonth] + ' ' + currentYear;

    grid.innerHTML = '';

    // Header row
    DAYS.forEach(function(d) {
      grid.appendChild(el('div', { className: 'calendar-header-cell' }, d));
    });

    // Compute month boundaries
    var firstDay = new Date(currentYear, currentMonth, 1);
    var lastDay = new Date(currentYear, currentMonth + 1, 0);
    var startDayOfWeek = firstDay.getDay();
    var daysInMonth = lastDay.getDate();

    // Previous month fill
    var prevMonthLast = new Date(currentYear, currentMonth, 0).getDate();

    // Build deadline map: dateKey -> [{case, deadlineDays}]
    var deadlineMap = {};
    var cases = AppState.cases || [];
    cases.forEach(function(c) {
      var dlDate = _parseDeadlineDate(c);
      if (!dlDate) return;
      var key = dlDate.getFullYear() + '-' + (dlDate.getMonth() + 1) + '-' + dlDate.getDate();
      if (!deadlineMap[key]) deadlineMap[key] = [];
      deadlineMap[key].push(c);
    });

    // Total cells = startDayOfWeek + daysInMonth, rounded up to full weeks
    var totalCells = startDayOfWeek + daysInMonth;
    var rows = Math.ceil(totalCells / 7);
    var totalGridCells = rows * 7;

    for (var i = 0; i < totalGridCells; i++) {
      var cell = el('div', { className: 'calendar-cell' });
      var dateNum, isOtherMonth = false, cellDate;

      if (i < startDayOfWeek) {
        // Previous month
        dateNum = prevMonthLast - startDayOfWeek + i + 1;
        isOtherMonth = true;
        cellDate = new Date(currentYear, currentMonth - 1, dateNum);
      } else if (i >= startDayOfWeek + daysInMonth) {
        // Next month
        dateNum = i - startDayOfWeek - daysInMonth + 1;
        isOtherMonth = true;
        cellDate = new Date(currentYear, currentMonth + 1, dateNum);
      } else {
        // Current month
        dateNum = i - startDayOfWeek + 1;
        cellDate = new Date(currentYear, currentMonth, dateNum);
      }

      if (isOtherMonth) cell.className += ' other-month';

      // Highlight today
      if (cellDate.getFullYear() === today.getFullYear() &&
          cellDate.getMonth() === today.getMonth() &&
          cellDate.getDate() === today.getDate()) {
        cell.className += ' today';
      }

      cell.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '2px' } }, String(dateNum)));

      // Add deadline dots
      var key = cellDate.getFullYear() + '-' + (cellDate.getMonth() + 1) + '-' + cellDate.getDate();
      if (deadlineMap[key]) {
        var dotsWrap = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '1px' } });
        deadlineMap[key].forEach(function(c) {
          var dotClass = 'safe';
          if (c.deadlineDays !== null && c.deadlineDays !== undefined) {
            if (c.deadlineDays < 0) dotClass = 'overdue';
            else if (c.deadlineDays <= 3) dotClass = 'urgent';
            else if (c.deadlineDays <= 7) dotClass = 'soon';
          }
          var dot = el('span', {
            className: 'deadline-dot ' + dotClass,
            title: c.id + ' \u2014 ' + (c.memberName || 'Unknown') + ' (' + (c.status || '') + ')'
          });
          dot.addEventListener('click', function(ev) {
            ev.stopPropagation();
            _showCalendarTooltip(dot, c);
          });
          dotsWrap.appendChild(dot);
        });
        cell.appendChild(dotsWrap);
      }

      grid.appendChild(cell);
    }
  }

  renderMonth();
}

/**
 * Shows a tooltip/popover for a deadline dot on the calendar.
 * @param {HTMLElement} dotEl - The deadline dot element
 * @param {Object} caseData - The case data object
 */
function _showCalendarTooltip(dotEl, caseData) {
  // Remove any existing tooltip
  var existing = document.querySelector('.calendar-tooltip');
  if (existing) existing.remove();

  var tooltip = el('div', { className: 'calendar-tooltip card-glass', style: {
    position: 'fixed', zIndex: '9999', padding: '10px 14px', borderRadius: '8px',
    boxShadow: '0 4px 16px rgba(0,0,0,0.2)', maxWidth: '220px', fontSize: '12px'
  }});

  tooltip.appendChild(el('div', { style: { fontWeight: '700', fontSize: '13px', color: 'var(--text)', marginBottom: '4px' } }, caseData.id));
  tooltip.appendChild(el('div', { style: { color: 'var(--text)' } }, caseData.memberName || 'Unknown'));
  tooltip.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '11px', marginTop: '2px' } },
    (caseData.step || '') + (caseData.status ? ' \u00B7 ' + caseData.status : '')));
  if (caseData.deadline && caseData.deadline !== '\u2014') {
    tooltip.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '11px' } }, 'Deadline: ' + caseData.deadline));
  }

  document.body.appendChild(tooltip);

  // Position near the dot
  var rect = dotEl.getBoundingClientRect();
  tooltip.style.top = (rect.bottom + 6) + 'px';
  tooltip.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 230)) + 'px';

  // Close on click outside
  function closeTooltip(ev) {
    if (!tooltip.contains(ev.target)) {
      tooltip.remove();
      document.removeEventListener('click', closeTooltip, true);
    }
  }
  // Defer listener attachment so the current click doesn't immediately close it
  setTimeout(function() {
    document.addEventListener('click', closeTooltip, true);
  }, 10);
}

/**

/**
 * Dismisses the welcome card and saves preference.
 */
function _dismissWelcome(cardEl) {
  AppState._welcomeDismissed = true;
  if (cardEl) {
    cardEl.style.opacity = '0';
    cardEl.style.transition = 'opacity 0.3s ease';
    setTimeout(function() { cardEl.remove(); }, 300);
  }
  serverCall().withFailureHandler(function(e) { console.error(e.message); }).dataMarkWelcomeDismissed(SESSION_TOKEN);
}

// ═══════════════════════════════════════
// CASES FINDER PANEL (permanently open filter modal)
// ═══════════════════════════════════════

function _renderCasesFinderPanel(container, cases, onFilterChange) {
  var TERMINAL = ['resolved', 'won', 'denied', 'settled', 'withdrawn', 'closed'];
  var filterState = { search: '', status: 'all', step: '', unit: '' };

  var panel = el('div', { className: 'finder-panel', role: 'region', 'aria-label': 'Case filter controls' });

  // Header
  var header = el('div', { className: 'finder-panel-header' });
  header.appendChild(el('div', { className: 'finder-panel-title' }, 'Case Finder'));
  var badge = el('div', { className: 'finder-panel-badge', 'aria-live': 'polite' }, cases.length + ' cases');
  header.appendChild(badge);
  panel.appendChild(header);

  // Body
  var body = el('div', { className: 'finder-panel-body' });

  // Search input
  var searchInput = el('input', {
    className: 'search-input',
    placeholder: 'Search by case ID or member name\u2026',
    'aria-label': 'Search cases',
    role: 'searchbox'
  });
  body.appendChild(searchInput);

  // Status pills
  var overdueCount = cases.filter(function(c) { return c.status === 'overdue'; }).length;
  var activeCount = cases.filter(function(c) { return c.status !== 'overdue' && TERMINAL.indexOf(c.status) === -1; }).length;
  var resolvedCount = cases.filter(function(c) { return TERMINAL.indexOf(c.status) !== -1; }).length;
  var statusDefs = [
    { key: 'all', label: 'All ' + cases.length },
    { key: 'overdue', label: 'Overdue ' + overdueCount },
    { key: 'active', label: 'Active ' + activeCount },
    { key: 'resolved', label: 'Resolved ' + resolvedCount },
  ];
  var pillBar = el('div', { className: 'filter-bar', style: { padding: '0', marginBottom: '10px' } });
  function _renderStatusPills() {
    pillBar.innerHTML = '';
    statusDefs.forEach(function(s) {
      pillBar.appendChild(el('button', {
        className: 'filter-tab' + (filterState.status === s.key ? ' active' : ''),
        onClick: function() { filterState.status = s.key; _renderStatusPills(); _fireChange(); }
      }, s.label));
    });
  }
  _renderStatusPills();
  body.appendChild(pillBar);

  // Filter dropdowns row
  var filterRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '6px' } });

  // Step dropdown
  var steps = {};
  cases.forEach(function(c) { if (c.step) steps[c.step] = true; });
  var stepKeys = Object.keys(steps).sort();
  if (stepKeys.length > 1) {
    var stepSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '5px 8px' }, 'aria-label': 'Filter by step' });
    stepSelect.appendChild(el('option', { value: '' }, 'All Steps'));
    stepKeys.forEach(function(s) { stepSelect.appendChild(el('option', { value: s }, s)); });
    stepSelect.addEventListener('change', function() { filterState.step = stepSelect.value; _fireChange(); });
    filterRow.appendChild(stepSelect);
  }

  // Unit dropdown
  var units = {};
  cases.forEach(function(c) { if (c.unit) units[c.unit] = true; });
  var unitKeys = Object.keys(units).sort();
  if (unitKeys.length > 1) {
    var unitSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '5px 8px' }, 'aria-label': 'Filter by unit' });
    unitSelect.appendChild(el('option', { value: '' }, 'All Units'));
    unitKeys.forEach(function(u) { unitSelect.appendChild(el('option', { value: u }, u)); });
    unitSelect.addEventListener('change', function() { filterState.unit = unitSelect.value; _fireChange(); });
    filterRow.appendChild(unitSelect);
  }

  if (filterRow.children.length > 0) body.appendChild(filterRow);

  panel.appendChild(body);
  container.appendChild(panel);

  // Debounced search
  var _searchTimer = null;
  searchInput.addEventListener('input', function() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(function() { filterState.search = searchInput.value.trim().toLowerCase(); _fireChange(); }, 150);
  });

  function _fireChange() {
    var filtered = _applyCaseFilters(cases, filterState);
    badge.textContent = filtered.length + ' of ' + cases.length + ' cases';
    onFilterChange(filtered, filterState);
  }
}

function _applyCaseFilters(cases, state) {
  var TERMINAL = ['resolved', 'won', 'denied', 'settled', 'withdrawn', 'closed'];
  var result = cases;

  // Status filter
  if (state.status === 'overdue') {
    result = result.filter(function(c) { return c.status === 'overdue'; });
  } else if (state.status === 'active') {
    result = result.filter(function(c) { return c.status !== 'overdue' && TERMINAL.indexOf(c.status) === -1; });
  } else if (state.status === 'resolved') {
    result = result.filter(function(c) { return TERMINAL.indexOf(c.status) !== -1; });
  }

  // Step filter
  if (state.step) {
    result = result.filter(function(c) { return c.step === state.step; });
  }

  // Unit filter
  if (state.unit) {
    result = result.filter(function(c) { return c.unit === state.unit; });
  }

  // Search
  if (state.search) {
    var q = state.search;
    result = result.filter(function(c) {
      return (c.id || '').toLowerCase().indexOf(q) !== -1
        || (c.memberName || '').toLowerCase().indexOf(q) !== -1
        || (c.memberEmail || '').toLowerCase().indexOf(q) !== -1;
    });
  }

  return result;
}

function renderCaseList(container, filterOrCases, isFiltered) {
  container.innerHTML = '';
  var TERMINAL = ['resolved', 'won', 'denied', 'settled', 'withdrawn', 'closed'];

  // Support both legacy string filter and pre-filtered array
  var cases;
  if (isFiltered) {
    cases = filterOrCases;
  } else {
    var filter = filterOrCases;
    cases = AppState.cases;
    if (filter === 'overdue') {
      cases = cases.filter(function(c) { return c.status === 'overdue'; });
    } else if (filter === 'active') {
      cases = cases.filter(function(c) {
        return c.status !== 'overdue' && TERMINAL.indexOf(c.status) === -1;
      });
    }
  }

  if (cases.length === 0) {
    if (filter === 'all' && AppState.cases.length === 0) {
      // No cases at all — show agency-wide stats as fallback
      var agencySlot = el('div', { style: { textAlign: 'center', padding: '20px 0' } });
      agencySlot.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '14px' } }, 'No cases currently assigned to you.'));
      agencySlot.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Agency-Wide Overview'));
      var agencyCharts = el('div');
      agencySlot.appendChild(agencyCharts);
      container.appendChild(agencySlot);
      serverCall().withSuccessHandler(function(data) {
        if (!data || !data.available) {
          agencyCharts.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, 'Grievance stats not yet available.'));
          return;
        }
        agencyCharts.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '8px' } }, data.total + ' total grievances agency-wide'));
        if (typeof ChartHelper !== 'undefined') {
          var sLabels = Object.keys(data.byStatus);
          var sData = sLabels.map(function(k) { return data.byStatus[k]; });
          var sCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '8px', textAlign: 'left' } });
          sCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Status Breakdown'));
          ChartHelper.createDoughnutChart(sCard, 'agency-status-chart', sLabels, sData);
          agencyCharts.appendChild(sCard);
          if (data.byStep) {
            var stLabels = Object.keys(data.byStep);
            var stData = stLabels.map(function(k) { return data.byStep[k]; });
            var stCard = el('div', { className: 'card card-glass', style: { padding: '14px', textAlign: 'left' } });
            stCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Step'));
            ChartHelper.createBarChart(stCard, 'agency-step-chart', stLabels, [{ label: 'Count', data: stData }]);
            agencyCharts.appendChild(stCard);
          }
        }
      }).withFailureHandler(function() {
        agencyCharts.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load agency stats.'));
      }).dataGetGrievanceStats(SESSION_TOKEN);
    } else {
      container.appendChild(el('div', { className: 'empty-state-lg' },
        'No ' + filter + ' cases.'));
    }
    return;
  }

  // OPT-5: Paginate case list + OPT-9: Use DocumentFragment for batch DOM insertion
  var CASE_PAGE_SIZE = 25;
  var _caseRenderCount = CASE_PAGE_SIZE;

  function _renderCasePage() {
    var frag = document.createDocumentFragment();
    var slice = cases.slice(0, _caseRenderCount);

    slice.forEach(function(c) {
      var isOverdue = c.status === 'overdue';
      var statusClass = c.status || 'active';
      var card = el('div', { className: 'card card-clickable', style: { padding: '11px 14px', marginBottom: '6px' } });

      var topRow = el('div', { className: 'flex-between-center' });
      var leftGroup = el('div', { className: 'flex-row' });

      // Bulk-select checkbox (v4.32.0 — Feature 3)
      var checkbox = el('input', {
        type: 'checkbox',
        className: 'bulk-select-cb',
        'aria-label': 'Select case ' + c.id,
        onclick: function(ev) {
          ev.stopPropagation();
          _updateBulkToolbar();
        }
      });
      checkbox.dataset.caseId = c.id;
      checkbox.dataset.memberEmail = c.memberEmail || '';
      leftGroup.appendChild(checkbox);
      leftGroup.appendChild(el('div', { className: 'status-dot ' + statusClass }));
      leftGroup.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, c.id));
      topRow.appendChild(leftGroup);

      var rightGroup = el('div', { className: 'flex-row', style: { gap: '6px', alignItems: 'center' } });
      var deadlineSpan = el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: isOverdue ? 'var(--danger)' : 'var(--muted)', fontWeight: isOverdue ? '700' : '400' } });
      deadlineSpan.textContent = c.deadlineDays !== null ? c.deadlineDays + 'd' : '\u2014';
      rightGroup.appendChild(deadlineSpan);
      // Handoff notes button (v4.35.0)
      var handoffBtn = el('button', {
        className: 'icon-btn handoff-btn',
        title: 'Handoff Notes',
        'aria-label': 'Handoff notes for case ' + c.id,
        onclick: function(ev) { ev.stopPropagation(); _toggleHandoffPanel(card, c.id); }
      }, '\uD83D\uDCDD');
      rightGroup.appendChild(handoffBtn);
      // Case activity button (v4.34.0 — Feature 5)
      var activityBtn = el('button', {
        className: 'icon-btn handoff-btn',
        title: 'Case Activity',
        'aria-label': 'Activity log for case ' + c.id,
        onclick: function(ev) { ev.stopPropagation(); _toggleActivityPanel(card, c.id); }
      }, '\uD83D\uDCCA');
      rightGroup.appendChild(activityBtn);
      // Document checklist button (v4.36.0 — Feature 11)
      var docBtn = el('button', {
        className: 'icon-btn handoff-btn',
        title: 'Document Checklist',
        'aria-label': 'Document checklist for case ' + c.id,
        onclick: function(ev) {
          ev.stopPropagation();
          _toggleDocChecklist(card, c.id, c.step, c.driveFolderId);
        }
      }, '\uD83D\uDCCB');
      rightGroup.appendChild(docBtn);
      topRow.appendChild(rightGroup);
      card.appendChild(topRow);

      var bottomRow = el('div', { style: { paddingLeft: '15px', display: 'flex', justifyContent: 'space-between' } });
      var memberDisplay = c.memberName || (c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown');
      bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)' } }, memberDisplay + ' \u00B7 ' + (c.step || '')));
      bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '10px', color: 'var(--muted)' } }, c.unit || ''));
      card.appendChild(bottomRow);

      // Expandable checklist (v4.16.0)
      var checklistArea = el('div', { style: { display: 'none', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' } });
      var checklistLoaded = false;
      card.setAttribute('aria-expanded', 'false');
      card.appendChild(checklistArea);
      card.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var showing = checklistArea.style.display !== 'none';
        checklistArea.style.display = showing ? 'none' : 'block';
        card.setAttribute('aria-expanded', String(!showing));
        if (!showing && !checklistLoaded) {
          checklistLoaded = true;
          _renderCaseChecklist(checklistArea, c.id);
        }
        // Check for escalation recommendation when expanding (v4.36.0 — Feature 14)
        if (!showing) {
          _checkEscalationRecommendation(card, c.id);
        }
      });

      frag.appendChild(card);
    });

    container.innerHTML = '';
    container.appendChild(frag);

    // "Show more" button if there are remaining cases
    if (_caseRenderCount < cases.length) {
      var remaining = cases.length - _caseRenderCount;
      var showMoreBtn = el('button', {
        className: 'btn btn-secondary',
        style: { width: '100%', margin: '8px 0', fontSize: '12px' },
        onClick: function() {
          _caseRenderCount += CASE_PAGE_SIZE;
          _renderCasePage();
        }
      }, 'Show more (' + remaining + ' remaining)');
      container.appendChild(showMoreBtn);
    }
  }

  _renderCasePage();
}

// ═══════════════════════════════════════
// BOTTOM NAV (shared by both views)
// ═══════════════════════════════════════

// ═══════════════════════════════════════
// BADGE REFRESH
// Call after any mutation that changes task or case counts.
// Debounced 600ms — rapid mutations collapse into one server round-trip.
// Re-fetches counts and swaps the bottom nav DOM node in place.
// ═══════════════════════════════════════

var _refreshNavBadgesTimer = null;
function _refreshNavBadges() {
  if (_refreshNavBadgesTimer) clearTimeout(_refreshNavBadgesTimer);
  _refreshNavBadgesTimer = setTimeout(function() {
    _refreshNavBadgesTimer = null;
    var guard = typeof _tabGuard === 'function' ? _tabGuard() : { stale: function() { return false; } };

    // Flush tab DOM cache so stale content isn't shown on next tab switch
    if (typeof _invalidateTabCache === 'function') _invalidateTabCache();
    // v4.33.0 — Single batch call replaces 3 sequential server calls (KPIs + tasks + QA count)
    serverCall().withSuccessHandler(function(result) {
      if (guard.stale()) return;
      if (result && result.kpis) AppState.kpis = result.kpis;
      if (result && result.badges) {
        AppState.taskCount = result.badges.taskCount || 0;
        AppState.overdueTaskCount = result.badges.overdueTaskCount || 0;
        AppState.qaUnansweredCount = result.badges.qaUnansweredCount || 0;
        AppState.notificationCount = result.badges.notificationCount || 0;
      }
      _swapBottomNav();
    }).withFailureHandler(function() {
      _swapBottomNav();
    }).dataRefreshNavData(SESSION_TOKEN);
  }, 600);
}

/** Replaces the bottom nav in place — extracted to avoid duplication */
function _swapBottomNav() {
  var appRoot = document.getElementById('app') || document;
  var existingNav = appRoot.querySelector('.bottom-nav');
  if (existingNav && existingNav.parentNode) {
    var parent = existingNav.parentNode;
    var replacement = document.createElement('div');
    parent.replaceChild(replacement, existingNav);
    renderBottomNav(replacement, 'steward', AppState.activeTab || 'cases');
    var newNav = replacement.querySelector('.bottom-nav');
    if (newNav) parent.replaceChild(newNav, replacement);
  }
}

// MEMBERS FINDER PANEL (permanently open filter modal)
// ═══════════════════════════════════════

var _MEMBER_FILTER_DEFS = [
  { id: 'location', label: 'Work Location', type: 'select', field: 'workLocation' },
  { id: 'officeDays', label: 'Office Days', type: 'text', field: 'officeDays' },
  { id: 'unit', label: 'Unit', type: 'select', field: 'unit' },
  { id: 'steward', label: 'Assigned Steward', type: 'select', field: 'assignedSteward' },
  { id: 'dues', label: 'Dues Status', type: 'select', field: 'duesPaying', options: [{ v: 'true', l: 'Dues Paying' }, { v: 'false', l: 'Not Paying' }] },
  { id: 'grievance', label: 'Has Open Case', type: 'select', field: 'hasOpenGrievance', options: [{ v: 'true', l: 'Yes' }, { v: 'false', l: 'No' }] },
];

function _renderMemberFinderPanel(container, members, onFilterChange) {
  var filterState = { search: '', criteria: [] }; // criteria: [{id, value}]

  var panel = el('div', { className: 'finder-panel', role: 'region', 'aria-label': 'Member filter controls' });

  // Header
  var header = el('div', { className: 'finder-panel-header' });
  header.appendChild(el('div', { className: 'finder-panel-title' }, 'Member Finder'));
  var badge = el('div', { className: 'finder-panel-badge', 'aria-live': 'polite' }, members.length + ' members');
  header.appendChild(badge);
  panel.appendChild(header);

  // Body
  var body = el('div', { className: 'finder-panel-body' });

  // Search input
  var searchInput = el('input', {
    className: 'search-input',
    placeholder: 'Search by name, email, or location\u2026',
    'aria-label': 'Search members',
    role: 'searchbox'
  });
  body.appendChild(searchInput);

  // Criteria list
  var criteriaList = el('div', { className: 'filter-criteria-list' });
  body.appendChild(criteriaList);

  // Add filter button area
  var addRow = el('div');
  body.appendChild(addRow);

  // Distinct values cache
  var _distinctValues = {};
  function _getDistinct(field) {
    if (_distinctValues[field]) return _distinctValues[field];
    var vals = {};
    members.forEach(function(m) {
      var v = m[field];
      if (v !== undefined && v !== null && v !== '') vals[String(v)] = true;
    });
    _distinctValues[field] = Object.keys(vals).sort();
    return _distinctValues[field];
  }

  function _renderCriteriaRows() {
    criteriaList.innerHTML = '';
    filterState.criteria.forEach(function(crit, idx) {
      var def = null;
      for (var d = 0; d < _MEMBER_FILTER_DEFS.length; d++) {
        if (_MEMBER_FILTER_DEFS[d].id === crit.id) { def = _MEMBER_FILTER_DEFS[d]; break; }
      }
      if (!def) return;

      var row = el('div', { className: 'filter-criterion-row' });

      // Priority arrows
      var arrows = el('div', { className: 'filter-priority-arrows' });
      var upBtn = el('button', {
        className: 'filter-arrow-btn', disabled: idx === 0,
        'aria-label': 'Move ' + def.label + ' filter up',
        onClick: function() {
          if (idx > 0) { var tmp = filterState.criteria[idx - 1]; filterState.criteria[idx - 1] = filterState.criteria[idx]; filterState.criteria[idx] = tmp; _renderCriteriaRows(); _fireChange(); }
        }
      }, '\u25B2');
      var downBtn = el('button', {
        className: 'filter-arrow-btn', disabled: idx === filterState.criteria.length - 1,
        'aria-label': 'Move ' + def.label + ' filter down',
        onClick: function() {
          if (idx < filterState.criteria.length - 1) { var tmp = filterState.criteria[idx + 1]; filterState.criteria[idx + 1] = filterState.criteria[idx]; filterState.criteria[idx] = tmp; _renderCriteriaRows(); _fireChange(); }
        }
      }, '\u25BC');
      arrows.appendChild(upBtn);
      arrows.appendChild(downBtn);
      row.appendChild(arrows);

      // Label
      row.appendChild(el('div', { className: 'filter-criterion-label' }, def.label));

      // Control
      var ctrlWrap = el('div', { className: 'filter-criterion-control' });
      if (def.type === 'select') {
        var sel = el('select', { 'aria-label': 'Filter value for ' + def.label });
        sel.appendChild(el('option', { value: '' }, 'All'));
        var opts = def.options || _getDistinct(def.field).map(function(v) { return { v: v, l: v }; });
        opts.forEach(function(o) {
          var opt = el('option', { value: o.v || o }, o.l || o);
          if (crit.value === (o.v || o)) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', function() { crit.value = sel.value; _fireChange(); });
        ctrlWrap.appendChild(sel);
      } else {
        var inp = el('input', { type: 'text', value: crit.value || '', placeholder: 'e.g. Monday, Tuesday', 'aria-label': 'Filter value for ' + def.label });
        var _inpTimer = null;
        inp.addEventListener('input', function() { clearTimeout(_inpTimer); _inpTimer = setTimeout(function() { crit.value = inp.value.trim(); _fireChange(); }, 150); });
        ctrlWrap.appendChild(inp);
      }
      row.appendChild(ctrlWrap);

      // Remove button
      row.appendChild(el('button', {
        className: 'filter-remove-btn', 'aria-label': 'Remove ' + def.label + ' filter',
        onClick: function() { filterState.criteria.splice(idx, 1); _renderCriteriaRows(); _renderAddButton(); _fireChange(); }
      }, '\u2715'));

      criteriaList.appendChild(row);
    });
  }

  function _renderAddButton() {
    addRow.innerHTML = '';
    var usedIds = {};
    filterState.criteria.forEach(function(c) { usedIds[c.id] = true; });
    var available = _MEMBER_FILTER_DEFS.filter(function(d) { return !usedIds[d.id]; });
    if (available.length === 0) return;

    var addBtn = el('button', { className: 'filter-add-btn' }, '+ Add Filter');
    addBtn.addEventListener('click', function() {
      // Replace button with a select
      addRow.innerHTML = '';
      var addSel = el('select', { className: 'form-select', style: { fontSize: '12px', padding: '5px 8px', width: 'auto' } });
      addSel.appendChild(el('option', { value: '' }, '-- Choose filter --'));
      available.forEach(function(d) { addSel.appendChild(el('option', { value: d.id }, d.label)); });
      addSel.addEventListener('change', function() {
        if (addSel.value) {
          filterState.criteria.push({ id: addSel.value, value: '' });
          _renderCriteriaRows();
          _renderAddButton();
          _fireChange();
        }
      });
      addRow.appendChild(addSel);
      // Cancel link
      addRow.appendChild(el('button', {
        style: { fontSize: '11px', color: 'var(--muted)', background: 'none', border: 'none', marginLeft: '8px', cursor: 'pointer' },
        onClick: function() { _renderAddButton(); }
      }, 'Cancel'));
    });
    addRow.appendChild(addBtn);
  }

  _renderAddButton();
  panel.appendChild(body);
  container.appendChild(panel);

  // Debounced search
  var _searchTimer = null;
  searchInput.addEventListener('input', function() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(function() { filterState.search = searchInput.value.trim().toLowerCase(); _fireChange(); }, 150);
  });

  function _fireChange() {
    var filtered = _applyMemberFilters(members, filterState);
    badge.textContent = filtered.length + ' of ' + members.length + ' members';
    onFilterChange(filtered);
  }

  return { panel: panel, getState: function() { return filterState; }, getFiltered: function() { return _applyMemberFilters(members, filterState); } };
}

function _applyMemberFilters(members, state) {
  var result = members.slice();

  // Text search
  if (state.search) {
    var q = state.search;
    result = result.filter(function(m) {
      return (m.name || '').toLowerCase().indexOf(q) !== -1
        || (m.email || '').toLowerCase().indexOf(q) !== -1
        || (m.workLocation || '').toLowerCase().indexOf(q) !== -1;
    });
  }

  // Apply each criterion as AND filter
  state.criteria.forEach(function(crit) {
    if (!crit.value) return;
    var def = null;
    for (var d = 0; d < _MEMBER_FILTER_DEFS.length; d++) {
      if (_MEMBER_FILTER_DEFS[d].id === crit.id) { def = _MEMBER_FILTER_DEFS[d]; break; }
    }
    if (!def) return;

    if (def.id === 'dues') {
      var wantPaying = crit.value === 'true';
      result = result.filter(function(m) { return wantPaying ? m.duesPaying !== false : m.duesPaying === false; });
    } else if (def.id === 'grievance') {
      var wantCase = crit.value === 'true';
      result = result.filter(function(m) { return wantCase ? !!m.hasOpenGrievance : !m.hasOpenGrievance; });
    } else if (def.type === 'text') {
      var terms = crit.value.toLowerCase().split(/[,;\s]+/).filter(Boolean);
      result = result.filter(function(m) {
        var val = (m[def.field] || '').toLowerCase();
        return terms.some(function(t) { return val.indexOf(t) !== -1; });
      });
    } else {
      result = result.filter(function(m) { return String(m[def.field] || '') === crit.value; });
    }
  });

  // Sort by criteria priority order (first criterion = primary sort key)
  if (state.criteria.length > 0) {
    var sortCriteria = state.criteria.filter(function(c) { return c.value; });
    if (sortCriteria.length > 0) {
      result.sort(function(a, b) {
        for (var i = 0; i < sortCriteria.length; i++) {
          var def = null;
          for (var d = 0; d < _MEMBER_FILTER_DEFS.length; d++) {
            if (_MEMBER_FILTER_DEFS[d].id === sortCriteria[i].id) { def = _MEMBER_FILTER_DEFS[d]; break; }
          }
          if (!def) continue;
          var aVal = String(a[def.field] || '');
          var bVal = String(b[def.field] || '');
          var cmp = aVal.localeCompare(bVal);
          if (cmp !== 0) return cmp;
        }
        return (a.name || '').localeCompare(b.name || '');
      });
    } else {
      result.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    }
  } else {
    result.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
  }

  return result;
}

// SMART CHECKLIST — generate, assign, save as tasks
// ═══════════════════════════════════════

function _renderSmartChecklist(container, finderRef) {
  var section = el('div', { className: 'checklist-section' });

  // Collapsible header
  var expanded = false;
  var toggle = el('span', { className: 'text-sm-muted' }, '\u25BE');
  var headerRow = el('div', {
    className: 'checklist-section-header',
    onClick: function() { expanded = !expanded; bodyWrap.style.display = expanded ? 'block' : 'none'; toggle.textContent = expanded ? '\u25B4' : '\u25BE'; }
  });
  var titleWrap = el('div', { className: 'flex-row' });
  titleWrap.appendChild(el('div', { className: 'checklist-section-title' }, 'Smart Checklist'));
  titleWrap.appendChild(toggle);
  headerRow.appendChild(titleWrap);
  section.appendChild(headerRow);

  var bodyWrap = el('div', { style: { display: 'none' } });

  // Generate button
  var genBtn = el('button', { className: 'btn btn-primary', style: { width: '100%', fontSize: '12px', padding: '9px', marginBottom: '10px' }, onClick: _generateChecklist }, 'Generate Checklist from Filters');
  bodyWrap.appendChild(genBtn);

  var checklistArea = el('div');
  bodyWrap.appendChild(checklistArea);

  section.appendChild(bodyWrap);
  container.appendChild(section);

  var _stewardList = null;
  var _checklistMembers = [];

  function _generateChecklist() {
    var filtered = finderRef.getFiltered();
    if (filtered.length === 0) {
      checklistArea.innerHTML = '';
      checklistArea.appendChild(el('div', { className: 'empty-state-sm', style: { fontSize: '12px' } }, 'No members match current filters. Adjust filters and try again.'));
      return;
    }

    _checklistMembers = filtered.map(function(m) { return { member: m, checked: true, assignedTo: '' }; });
    genBtn.textContent = 'Regenerate (' + filtered.length + ' members)';

    // Load stewards for assignment
    if (!_stewardList) {
      DataCache.cachedCall('stewardDirectory', 'dataGetStewardDirectory', [SESSION_TOKEN], function(stewards) {
        _stewardList = stewards || [];
        _renderChecklistUI();
      }, function() { _stewardList = []; _renderChecklistUI(); }, 120000);
    } else {
      _renderChecklistUI();
    }
  }

  function _renderChecklistUI() {
    checklistArea.innerHTML = '';

    // Actions bar
    var actionsTop = el('div', { style: { display: 'flex', gap: '6px', marginBottom: '8px', flexWrap: 'wrap' } });
    actionsTop.appendChild(el('button', {
      className: 'filter-add-btn', style: { fontSize: '11px' },
      onClick: function() { _checklistMembers.forEach(function(c) { c.checked = true; }); _renderChecklistUI(); }
    }, 'Select All'));
    actionsTop.appendChild(el('button', {
      className: 'filter-add-btn', style: { fontSize: '11px' },
      onClick: function() { _checklistMembers.forEach(function(c) { c.checked = false; }); _renderChecklistUI(); }
    }, 'Deselect All'));
    if (_stewardList && _stewardList.length > 1) {
      actionsTop.appendChild(el('button', {
        className: 'filter-add-btn', style: { fontSize: '11px' },
        onClick: function() { _autoDistribute(); _renderChecklistUI(); }
      }, 'Auto-Distribute'));
    }
    checklistArea.appendChild(actionsTop);

    // Member rows (paginated to 50 max visible)
    var visibleMax = 50;
    var showing = Math.min(_checklistMembers.length, visibleMax);
    for (var i = 0; i < showing; i++) {
      (function(idx) {
        var item = _checklistMembers[idx];
        var row = el('div', { className: 'checklist-member-row' });

        // Checkbox
        var cb = el('input', { type: 'checkbox' });
        cb.checked = item.checked;
        cb.addEventListener('change', function() { item.checked = cb.checked; });
        row.appendChild(cb);

        // Info
        var info = el('div', { className: 'checklist-member-info' });
        info.appendChild(el('div', { className: 'checklist-member-name' }, item.member.name || item.member.email));
        var metaParts = [];
        if (item.member.workLocation) metaParts.push(item.member.workLocation);
        if (item.member.officeDays) metaParts.push(item.member.officeDays);
        if (metaParts.length) info.appendChild(el('div', { className: 'checklist-member-meta' }, metaParts.join(' \xB7 ')));
        row.appendChild(info);

        // Steward assignment select
        if (_stewardList && _stewardList.length > 0) {
          var assignSel = el('select', { className: 'checklist-assign-select', 'aria-label': 'Assign to steward' });
          assignSel.appendChild(el('option', { value: '' }, 'Unassigned'));
          _stewardList.forEach(function(s) {
            var opt = el('option', { value: s.email }, s.name || s.email.split('@')[0]);
            if (item.assignedTo === s.email) opt.selected = true;
            assignSel.appendChild(opt);
          });
          assignSel.addEventListener('change', function() { item.assignedTo = assignSel.value; });
          row.appendChild(assignSel);
        }

        checklistArea.appendChild(row);
      })(i);
    }

    if (_checklistMembers.length > visibleMax) {
      checklistArea.appendChild(el('div', { className: 'text-xs-muted', style: { textAlign: 'center', padding: '6px 0' } },
        'Showing ' + visibleMax + ' of ' + _checklistMembers.length + '. Save to create tasks for all.'));
    }

    // Summary + save
    var checkedCount = _checklistMembers.filter(function(c) { return c.checked; }).length;
    var summary = el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '8px' } },
      checkedCount + ' of ' + _checklistMembers.length + ' members selected');
    checklistArea.appendChild(summary);

    var saveActions = el('div', { className: 'checklist-actions' });
    var taskTitleInput = el('input', {
      type: 'text', value: 'Contact', placeholder: 'Task title prefix\u2026',
      style: { flex: '1', fontSize: '12px', padding: '8px 10px', borderRadius: '8px', border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', minWidth: '120px' },
      'aria-label': 'Task title prefix'
    });
    saveActions.appendChild(taskTitleInput);
    var saveBtn = el('button', { className: 'btn btn-primary', style: { fontSize: '12px', padding: '8px 16px' }, onClick: function() { _saveAsTasks(taskTitleInput.value.trim()); } }, 'Save as Tasks');
    saveActions.appendChild(saveBtn);
    checklistArea.appendChild(saveActions);

    // Status area
    var statusArea = el('div', { style: { fontSize: '12px', minHeight: '20px', marginTop: '6px' } });
    checklistArea.appendChild(statusArea);
    checklistArea._statusArea = statusArea;
  }

  // Balanced hybrid: location-match first, then round-robin leftovers.
  // If any steward exceeds 150% of fair share, redistribute overflow.
  function _autoDistribute() {
    if (!_stewardList || _stewardList.length === 0) return;
    var checked = _checklistMembers.filter(function(c) { return c.checked; });
    if (checked.length === 0) return;

    var stewards = _stewardList.slice();
    var fairShare = Math.ceil(checked.length / stewards.length);
    var maxCap = Math.ceil(fairShare * 1.5);

    // Build steward location index
    var stewardByLoc = {};
    stewards.forEach(function(s) {
      var loc = (s.workLocation || '').trim().toLowerCase();
      if (loc) {
        if (!stewardByLoc[loc]) stewardByLoc[loc] = [];
        stewardByLoc[loc].push(s.email);
      }
    });

    // Track assignment counts
    var counts = {};
    stewards.forEach(function(s) { counts[s.email] = 0; });

    var unmatched = [];

    // Pass 1: location-match (assign member to a steward at same location if under cap)
    checked.forEach(function(item) {
      var loc = (item.member.workLocation || '').trim().toLowerCase();
      var candidates = loc ? stewardByLoc[loc] : null;
      var assigned = false;
      if (candidates) {
        // Pick the least-loaded steward at this location
        var best = null;
        var bestCount = Infinity;
        candidates.forEach(function(email) {
          if (counts[email] < maxCap && counts[email] < bestCount) {
            best = email;
            bestCount = counts[email];
          }
        });
        if (best) {
          item.assignedTo = best;
          counts[best]++;
          assigned = true;
        }
      }
      if (!assigned) unmatched.push(item);
    });

    // Pass 2: round-robin unmatched members to least-loaded stewards
    unmatched.forEach(function(item) {
      var minEmail = stewards[0].email;
      var minCount = counts[minEmail];
      stewards.forEach(function(s) {
        if (counts[s.email] < minCount) { minEmail = s.email; minCount = counts[s.email]; }
      });
      item.assignedTo = minEmail;
      counts[minEmail]++;
    });
  }

  function _saveAsTasks(titlePrefix) {
    var toSave = _checklistMembers.filter(function(c) { return c.checked; });
    if (toSave.length === 0) return;
    if (!titlePrefix) titlePrefix = 'Contact';

    var statusArea = checklistArea._statusArea;
    statusArea.style.color = 'var(--accent)';
    statusArea.textContent = 'Saving 0 of ' + toSave.length + ' tasks\u2026';

    var saved = 0;
    var errors = 0;

    function _saveNext(idx) {
      if (idx >= toSave.length) {
        statusArea.style.color = errors > 0 ? 'var(--warning)' : 'var(--success)';
        statusArea.textContent = saved + ' task' + (saved !== 1 ? 's' : '') + ' created' + (errors > 0 ? ' (' + errors + ' failed)' : '') + '.';
        if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
        return;
      }

      var item = toSave[idx];
      var title = '[Checklist] ' + titlePrefix + ' ' + (item.member.name || item.member.email);
      var desc = 'Auto-generated from Smart Checklist.';
      if (item.member.workLocation) desc += ' Location: ' + item.member.workLocation + '.';
      if (item.member.officeDays) desc += ' Office days: ' + item.member.officeDays + '.';
      var idemKey = _genIdemKey();

      serverCall()
        .withSuccessHandler(function(r) {
          if (r && r.success) saved++;
          else errors++;
          statusArea.textContent = 'Saving ' + (idx + 1) + ' of ' + toSave.length + ' tasks\u2026';
          _saveNext(idx + 1);
        })
        .withFailureHandler(function() {
          errors++;
          statusArea.textContent = 'Saving ' + (idx + 1) + ' of ' + toSave.length + ' tasks\u2026';
          _saveNext(idx + 1);
        })
        .dataCreateTask(SESSION_TOKEN, title, desc, item.member.email || '', 'normal', '', item.assignedTo || '', idemKey);
    }

    _saveNext(0);
  }
}
