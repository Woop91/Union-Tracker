function renderAccessLogPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'accesslog', function(container) {
    _stewardHeader(container, 'Access Log', 'Who accessed what and when');

    // ── Filter bar ──
    var filterBar = el('div', { className: 'card card-glass', style: { padding: '12px', marginBottom: '12px', display: 'flex', flexWrap: 'wrap', gap: '8px', alignItems: 'flex-end' } });

    // Date from
    var dateFromGroup = el('div', { style: { flex: '1', minWidth: '120px' } });
    dateFromGroup.appendChild(el('label', { className: 'form-label-sm' }, 'From'));
    var dateFromInput = el('input', { type: 'date', className: 'form-input form-input-sm' });
    dateFromGroup.appendChild(dateFromInput);
    filterBar.appendChild(dateFromGroup);

    // Date to
    var dateToGroup = el('div', { style: { flex: '1', minWidth: '120px' } });
    dateToGroup.appendChild(el('label', { className: 'form-label-sm' }, 'To'));
    var dateToInput = el('input', { type: 'date', className: 'form-input form-input-sm' });
    dateToGroup.appendChild(dateToInput);
    filterBar.appendChild(dateToGroup);

    // Event type dropdown
    var typeGroup = el('div', { style: { flex: '1', minWidth: '140px' } });
    typeGroup.appendChild(el('label', { className: 'form-label-sm' }, 'Event Type'));
    var typeSelect = el('select', { className: 'form-input form-input-sm' });
    typeSelect.appendChild(el('option', { value: '' }, 'All'));
    typeGroup.appendChild(typeSelect);
    filterBar.appendChild(typeGroup);

    // Search
    var searchGroup = el('div', { style: { flex: '2', minWidth: '160px' } });
    searchGroup.appendChild(el('label', { className: 'form-label-sm' }, 'Search'));
    var searchInput = el('input', { type: 'text', className: 'form-input form-input-sm', placeholder: 'Search events...' });
    searchGroup.appendChild(searchInput);
    filterBar.appendChild(searchGroup);

    // Filter button
    var filterBtn = el('button', { className: 'btn-sm btn-primary', style: { alignSelf: 'flex-end' }, onClick: function() { loadPage(0); } }, 'Filter');
    filterBar.appendChild(filterBtn);

    container.appendChild(filterBar);

    // ── Results area ──
    var content = el('div', { className: 'content' });
    showLoading(content, 'list');
    container.appendChild(content);

    var pagerArea = el('div', { style: { padding: '8px 0' } });
    container.appendChild(pagerArea);

    var currentPage = 0;

    function loadPage(page) {
      currentPage = page;
      showLoading(content, 'list');
      pagerArea.innerHTML = '';

      var opts = {
        page: page,
        pageSize: 20,
        dateFrom: dateFromInput.value || undefined,
        dateTo: dateToInput.value || undefined,
        eventTypeFilter: typeSelect.value || undefined,
        searchTerm: searchInput.value || undefined
      };

      serverCall().withSuccessHandler(function(result) {
        content.innerHTML = '';
        if (!result || !result.items || result.items.length === 0) {
          content.appendChild(el('div', { className: 'empty-state-lg' }, 'No audit log entries found.'));
          return;
        }

        // Populate event type dropdown on first load
        if (typeSelect.options.length <= 1 && result.eventTypes) {
          result.eventTypes.forEach(function(t) {
            typeSelect.appendChild(el('option', { value: t }, t));
          });
        }

        // Render table
        var table = el('div', { style: { overflowX: 'auto' } });
        var tbl = el('table', { className: 'data-table', style: { width: '100%', fontSize: '12px', borderCollapse: 'collapse' } });

        // Header row
        var thead = el('thead');
        var hrow = el('tr');
        ['Time', 'Event', 'User', 'Sheet', 'Field', 'Details'].forEach(function(h) {
          hrow.appendChild(el('th', { style: { padding: '8px 6px', textAlign: 'left', borderBottom: '2px solid var(--border)', fontSize: '11px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, h));
        });
        thead.appendChild(hrow);
        tbl.appendChild(thead);

        var tbody = el('tbody');
        result.items.forEach(function(item) {
          var row = el('tr', { style: { cursor: 'pointer', borderBottom: '1px solid var(--border)' } });

          // Time
          var ts = item.timestamp ? new Date(item.timestamp) : null;
          var timeStr = ts ? ts.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + ts.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '--';
          row.appendChild(el('td', { style: { padding: '6px', whiteSpace: 'nowrap', fontSize: '11px', color: 'var(--muted)' } }, timeStr));

          // Event type
          var typeBadge = el('td', { style: { padding: '6px' } });
          typeBadge.appendChild(el('span', { style: { display: 'inline-block', padding: '2px 8px', borderRadius: '10px', fontSize: '10px', fontWeight: '600', background: 'var(--accentBg)', color: 'var(--accent)' } }, item.eventType || item.actionType || '--'));
          row.appendChild(typeBadge);

          // User
          row.appendChild(el('td', { style: { padding: '6px', fontSize: '11px', color: 'var(--text)' } }, item.user || '--'));

          // Sheet
          row.appendChild(el('td', { style: { padding: '6px', fontSize: '11px', color: 'var(--muted)' } }, item.sheet || '--'));

          // Field
          row.appendChild(el('td', { style: { padding: '6px', fontSize: '11px', color: 'var(--muted)' } }, item.fieldName || '--'));

          // Details (truncated, expandable)
          var detailsTd = el('td', { style: { padding: '6px', fontSize: '11px', color: 'var(--muted)', maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, item.newValue || '--');
          row.appendChild(detailsTd);

          // Click to expand details
          var expanded = false;
          row.addEventListener('click', function() {
            expanded = !expanded;
            if (expanded) {
              detailsTd.style.whiteSpace = 'normal';
              detailsTd.style.maxWidth = 'none';
              detailsTd.style.wordBreak = 'break-all';
              if (item.oldValue && item.oldValue !== '--') {
                detailsTd.textContent = 'Old: ' + item.oldValue + '\nNew: ' + (item.newValue || '--');
              }
            } else {
              detailsTd.style.whiteSpace = 'nowrap';
              detailsTd.style.maxWidth = '200px';
              detailsTd.textContent = item.newValue || '--';
            }
          });

          tbody.appendChild(row);
        });
        tbl.appendChild(tbody);
        table.appendChild(tbl);
        content.appendChild(table);

        // Pager
        pagerArea.innerHTML = '';
        var totalPages = Math.ceil(result.totalRows / result.pageSize);
        if (totalPages > 1) {
          var pager = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0' } });
          var prevBtn = el('button', { className: 'btn-sm btn-outline', disabled: page === 0, onClick: function() { loadPage(page - 1); } }, 'Prev');
          var pageInfo = el('span', { className: 'text-xs-muted' }, 'Page ' + (page + 1) + ' of ' + totalPages + ' (' + result.totalRows + ' entries)');
          var nextBtn = el('button', { className: 'btn-sm btn-outline', disabled: page >= totalPages - 1, onClick: function() { loadPage(page + 1); } }, 'Next');
          pager.appendChild(prevBtn);
          pager.appendChild(pageInfo);
          pager.appendChild(nextBtn);
          pagerArea.appendChild(pager);
        }

        // Export CSV button
        var exportBtn = el('button', {
          className: 'btn-sm btn-outline', style: { marginTop: '8px' },
          onClick: function() {
            var csv = 'Timestamp,Event Type,User,Sheet,Field,Old Value,New Value,Record ID\n';
            result.items.forEach(function(item) {
              csv += [item.timestamp, item.eventType, item.user, item.sheet, item.fieldName, item.oldValue, item.newValue, item.recordId]
                .map(function(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(',') + '\n';
            });
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = el('a', { href: url, download: 'access-log-export.csv', style: { display: 'none' } });
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          }
        }, 'Export Page as CSV');
        pagerArea.appendChild(exportBtn);

      }).withFailureHandler(function() {
        content.innerHTML = '';
        content.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load audit log.'));
      }).dataGetAuditLog(SESSION_TOKEN, opts);
    }

    // Allow Enter key in search to trigger filter
    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadPage(0);
    });

    // Initial load
    loadPage(0);
  });
}

    var restoreSheetName = el('input', { type: 'text', placeholder: 'Sheet name (e.g. Member Directory)', style: { width: '100%', padding: '8px 10px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--card)', color: 'var(--text)', fontSize: '12px', marginBottom: '8px', boxSizing: 'border-box' } });

    restoreCard.appendChild(el('button', {
      style: { fontSize: '12px', padding: '8px 16px', borderRadius: '8px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600', cursor: 'pointer' },
      onClick: function() {
        var fId = (restoreFileId.value || '').trim();
        var sName = (restoreSheetName.value || '').trim();
        if (!fId || !sName) { restoreStatus.innerHTML = '<div style="color:var(--danger)">Both File ID and Sheet Name are required.</div>'; return; }

        serverCall().withSuccessHandler(function(r) {
          if (r && r.success) {
            restoreStatus.innerHTML = '<div style="color:var(--success);font-weight:600">\u2705 ' + safeText(r.message || 'Restore complete.') + '</div>';
          } else {

          }
        }).withFailureHandler(function(err) {
          restoreStatus.innerHTML = '<div style="color:var(--danger)">Restore failed: ' + safeText((err && err.message) || err) + '</div>';
        }).fsRestoreFromBackup(SESSION_TOKEN, fId, sName, true);
      }
    }, 'Restore from Backup'));
    content.appendChild(restoreCard);

    container.appendChild(content);
  });
}

/* ======================================================================
 * TEST RUNNER PAGE — Steward-only dashboard panel for GAS-native tests

function renderTestRunnerPage(appContainer) {
  var role = PAGE_DATA.isDualRole ? 'steward' : PAGE_DATA.view;
  renderPageLayout(appContainer, role, 'testrunner', function(container) {
    var content = el('div', { style: { maxWidth: '960px', margin: '0 auto', padding: '20px' } });

    // Header
    var hdr = el('div', { style: { marginBottom: '24px' } });
    hdr.appendChild(el('h2', { style: { margin: '0 0 4px', fontSize: '22px', fontWeight: '700' } }, '🧪 Test Runner'));
    hdr.appendChild(el('p', { style: { margin: 0, color: 'var(--text-secondary)', fontSize: '14px' } },
      'GAS-native integration tests — verifies Config, Auth, Grievance logic, Column Mapping, and all Web App modules in the live environment.'));
    content.appendChild(hdr);

    // Controls card — high-contrast background for visibility
    var ctrlCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '20px', display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'center', background: 'var(--card)', border: '2px solid var(--accent)', boxShadow: '0 2px 12px rgba(0,0,0,0.4)' } });

    // Run All sequentially — runs each suite one at a time to avoid GAS 6-min limit
    var _allSuiteIds = ['config', 'colmap', 'auth', 'grievance', 'security', 'system', 'dataservice', 'authsweep', 'configlive', 'survey', 'emailsend', 'loginlink', 'contacts', 'emailtypes', 'webapp', 'configrd', 'portal', 'weeklyq', 'workload', 'qaforum', 'timeline', 'failsafe', 'endpoints'];
    var runAllBtn = el('button', {
      className: 'btn btn-primary',
      style: { padding: '8px 20px', fontWeight: '600', cursor: 'pointer' },
      onClick: function() {
        runAllBtn.disabled = true;
        runFilterBtn.disabled = true;
        resultsContainer.innerHTML = '';
        var mergedResults = {
          timestamp: new Date().toISOString(),
          duration: 0,
          suites: [],
          summary: { total: 0, passed: 0, failed: 0, skipped: 0 },
          timedOut: false
        };
        var idx = 0;
        function runNextSuite() {
          if (idx >= _allSuiteIds.length) {
            runAllBtn.disabled = false;
            runFilterBtn.disabled = false;
            runAllBtn.textContent = '\u25B6 Run All Tests';
            _renderTestResults(resultsContainer, mergedResults, statusEl);
            return;
          }
          var sid = _allSuiteIds[idx];
          statusEl.textContent = '\u23F3 Running suite ' + (idx + 1) + '/' + _allSuiteIds.length + ' (' + sid + ')...';
          statusEl.style.color = 'var(--text-secondary)';
          serverCall().withSuccessHandler(function(resp) {
              if (resp && resp.success && resp.results) {
                var r = resp.results;
                mergedResults.duration += r.duration || 0;
                mergedResults.summary.total += r.summary.total;
                mergedResults.summary.passed += r.summary.passed;
                mergedResults.summary.failed += r.summary.failed;
                mergedResults.summary.skipped += r.summary.skipped;
                if (r.timedOut) mergedResults.timedOut = true;
                for (var s = 0; s < (r.suites || []).length; s++) mergedResults.suites.push(r.suites[s]);
              }
              idx++;
              runNextSuite();
            }).withFailureHandler(function(err) {

/**
 * Renders structured test results into the container.
 */
function _renderTestResults(container, results, statusEl) {
  container.innerHTML = '';
  if (!results) return;

  // Summary bar
  var pct = results.summary.total > 0
    ? Math.round((results.summary.passed / results.summary.total) * 100) : 0;
  var allPassed = results.summary.failed === 0;
  var icon = allPassed ? '✅' : '❌';

  statusEl.textContent = icon + ' ' + results.summary.passed + '/' + results.summary.total +
    ' passed (' + pct + '%) — ' + results.duration + 'ms' +
    (results.summary.skipped ? ' (' + results.summary.skipped + ' skipped)' : '');
  statusEl.style.color = allPassed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)';

  // Timeout warning banner
  if (results.timedOut) {
    var warnBanner = el('div', { style: {
      background: 'rgba(245,158,11,0.12)', border: '1px solid rgba(245,158,11,0.4)',
      borderRadius: '10px', padding: '12px 16px', marginBottom: '16px',
      fontSize: '13px', color: '#f59e0b'
    }}, '⚠️ Test run hit the 3.5-minute safety timeout (GAS 6-min limit). ' +
       results.summary.skipped + ' test(s) were skipped. Use the suite filter to run specific suites individually.');
    container.appendChild(warnBanner);
  }

  // Timestamp
  if (results.timestamp) {
    var ts = el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '16px' } },
      'Last run: ' + new Date(results.timestamp).toLocaleString());
    container.appendChild(ts);
  }

  // Summary cards row
  var summaryRow = el('div', { style: { display: 'flex', gap: '12px', marginBottom: '20px', flexWrap: 'wrap' } });
  var _card = function(label, val, color) {
    var c = el('div', { style: {
      padding: '12px 20px', borderRadius: '10px', background: 'var(--bg-secondary)',
      border: '1px solid var(--border-color)', minWidth: '100px', textAlign: 'center'
    }});
    c.appendChild(el('div', { style: { fontSize: '24px', fontWeight: '700', color: color } }, String(val)));
    c.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginTop: '2px' } }, label));
    return c;
  };
  summaryRow.appendChild(_card('Total', results.summary.total, 'var(--text-primary)'));
  summaryRow.appendChild(_card('Passed', results.summary.passed, 'var(--success, #10B981)'));
  summaryRow.appendChild(_card('Failed', results.summary.failed, results.summary.failed > 0 ? 'var(--danger, #EF4444)' : 'var(--text-secondary)'));
  if (results.summary.skipped > 0) {
    summaryRow.appendChild(_card('Skipped', results.summary.skipped, '#f59e0b'));
  }
  summaryRow.appendChild(_card('Duration', results.duration + 'ms', 'var(--text-secondary)'));
  container.appendChild(summaryRow);

  // Per-suite collapsible sections
  for (var si = 0; si < results.suites.length; si++) {
    var suite = results.suites[si];
    var suiteAllPassed = suite.failed === 0;
    var suiteCard = el('div', { className: 'card', style: { marginBottom: '12px', overflow: 'hidden' } });

    // Suite header (clickable)
    var suiteBody = el('div', { style: { display: 'none', padding: '0 16px 16px' } });
    var suiteHdr = el('div', {
      style: {
        padding: '14px 16px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', userSelect: 'none'
      },
      onClick: (function(body) {
        return function() {
          body.style.display = body.style.display === 'none' ? 'block' : 'none';
        };
      })(suiteBody)
    });
    suiteHdr.appendChild(el('span', { style: { fontWeight: '600', fontSize: '15px' } },
      (suiteAllPassed ? '✅' : '❌') + ' ' + suite.name.toUpperCase() +
      ' (' + suite.passed + '/' + (suite.passed + suite.failed + (suite.skipped || 0)) + ')' +
      (suite.skipped ? ' ⏭ ' + suite.skipped + ' skipped' : '')));
    suiteHdr.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } },
      suite.duration + 'ms ▾'));
    suiteCard.appendChild(suiteHdr);

    // Auto-expand failed suites
    if (!suiteAllPassed) {
      suiteBody.style.display = 'block';
    }

    // Individual tests
    for (var ti = 0; ti < suite.tests.length; ti++) {
      var t = suite.tests[ti];
      var tRow = el('div', {
        style: {
          padding: '6px 0', borderTop: '1px solid var(--border-color)',
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          fontSize: '13px'
        }
      });
      // Clean test name: test_suite_description → description
      var cleanName = t.name.replace(/^test_[a-z]+_/, '');
      tRow.appendChild(el('span', null, (t.passed ? '✓' : '✗') + ' ' + cleanName));
      tRow.appendChild(el('span', {
        style: { color: t.passed ? 'var(--success, #10B981)' : 'var(--danger, #EF4444)', whiteSpace: 'nowrap', marginLeft: '8px' }
      }, t.passed ? t.duration + 'ms' : 'FAIL'));

      if (!t.passed && t.error) {
        var errEl = el('div', { style: {
          fontSize: '12px', color: 'var(--danger, #EF4444)', background: 'var(--bg-tertiary, #1e1e1e)',
          padding: '6px 10px', borderRadius: '6px', marginTop: '4px', fontFamily: 'monospace',
          wordBreak: 'break-word'
        } }, t.error);
        var errWrap = el('div');
        errWrap.appendChild(tRow);
        errWrap.appendChild(errEl);
        suiteBody.appendChild(errWrap);
      } else {
        suiteBody.appendChild(tRow);
      }
    }

    suiteCard.appendChild(suiteBody);
    container.appendChild(suiteCard);
  }
}

function renderStewardTimelinePage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'timeline', function(container) {

      parts.forEach(function(part) {
        var trimmed = part.trim();
        if (!trimmed) return;
        var match = trimmed.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
        if (match) ids.push(match[1]);

    // ── Timeline list ─────────────────────────────────────────────────────
    function _renderTimeline(cont) {

        yearSelect.appendChild(opt);
      });
      yearSelect.addEventListener('change', function() { filterYear = yearSelect.value; currentPage = 1; tlContainer = null; _loadEvents(cont, listArea); });

      var catSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '120px' } });

      cachedCategories.forEach(function(c) {

      function _ensureFiltersLoaded(cb) {
        var pending = 0;

          pending++;
          serverCall().withSuccessHandler(function(cats) {
            cachedCategories = cats || [];
            catSelect.innerHTML = '';
            catSelect.appendChild(el('option', { value: '' }, 'All Categories'));

            pending--; if (!pending) cb();
          }).withFailureHandler(function() { pending--; if (!pending) cb(); }).tlGetCategories(SESSION_TOKEN);
        }
        if (!cachedYears.length) {
          pending++;
          serverCall().withSuccessHandler(function(years) {

      var btnRow = el('div', { className: 'flex-gap-6' });

      btnRow.appendChild(el('button', {
        className: 'btn btn-primary text-sm',
        onClick: function() {
          var t = titleInput.value.trim();
          if (!t) { statusMsg.textContent = 'Title required.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Saving\u2026'; statusMsg.style.color = 'var(--muted)';

          // Resolve meetingMinutesId from URL or raw ID
          var rawMinutes = minutesInput.value.trim();
          var minutesId = '';
          if (rawMinutes) {
            var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
            minutesId = mMatch ? mMatch[1] : rawMinutes;
          }

          var newDriveIds = parseDriveIds(driveInput.value);
          var pending = 1;

          function _finish() {
            serverCall().withSuccessHandler(function(r) {
              if (r && r.success) { onSave(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              statusMsg.textContent = 'Save failed.'; statusMsg.style.color = 'var(--danger)';
            }).tlUpdateTimelineEvent(SESSION_TOKEN, evt.id, {
              title: t, eventDate: dateInput.value,
              description: descInput.value.trim(), category: catSelect.value,
              meetingMinutesId: minutesId
            });
          }

          if (newDriveIds.length) {
            serverCall().withSuccessHandler(function() { _finish(); })
              .withFailureHandler(function() { _finish(); })
              .tlAttachDriveFiles(SESSION_TOKEN, evt.id, newDriveIds.join(','));
          } else {
            _finish();
          }
        }
      }, 'Save'));

      btnRow.appendChild(el('button', {
        className: 'btn text-sm',
        onClick: function() { card.removeChild(editForm); card.appendChild(actsEl); }
      }, 'Cancel'));

      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Title'));
      editForm.appendChild(titleInput);
      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Date'));
      editForm.appendChild(dateInput);
      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Description'));
      editForm.appendChild(descInput);
      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Category'));
      editForm.appendChild(catSelect);
      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Meeting Minutes (optional)'));
      editForm.appendChild(minutesInput);
      editForm.appendChild(el('div', { className: 'form-label mb-4' }, 'Attach Drive Files (optional)'));
      editForm.appendChild(driveHint);
      editForm.appendChild(driveInput);
      editForm.appendChild(statusMsg);
      editForm.appendChild(btnRow);
      card.appendChild(editForm);
    }

    // ── Add Event form ────────────────────────────────────────────────────
    function _renderAddEventForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Add Event'));

      var titleInput = el('input', { className: 'form-input', placeholder: 'Event title' });
      _formGroup(cont, 'Title', titleInput);

      var dateInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'Event Date', dateInput);

      var descInput = el('textarea', { className: 'msg-textarea', placeholder: 'Event details...', style: { minHeight: '80px' } });
      _formGroup(cont, 'Description', descInput);

      var catSelect = el('select', { className: 'form-select' });
      if (cachedCategories.length) {
        cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
      } else {
        catSelect.appendChild(el('option', { value: '' }, 'Loading...'));
        serverCall().withSuccessHandler(function(cats) {
          cachedCategories = cats || [];
          catSelect.innerHTML = '';
          cachedCategories.forEach(function(c) { catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1))); });
        }).tlGetCategories(SESSION_TOKEN);
      }
      _formGroup(cont, 'Category', catSelect);

      var minutesInput = el('input', { className: 'form-input', placeholder: 'Doc ID or docs.google.com URL (optional)' });
      _formGroup(cont, 'Meeting Minutes (optional)', minutesInput);

      var driveHint = el('div', { className: 'text-xs-muted-mb-4' }, 'Paste Drive share URLs or file IDs, one per line.');
      var driveInput = el('textarea', { className: 'msg-textarea', placeholder: 'https://drive.google.com/file/d/... or raw ID', style: { minHeight: '50px', fontFamily: 'var(--fontMono, monospace)', fontSize: '11px' } });
      var driveGroup = el('div', { className: 'form-group' });
      driveGroup.appendChild(el('label', { className: 'form-label' }, 'Drive Files (optional)'));
      driveGroup.appendChild(driveHint);
      driveGroup.appendChild(driveInput);
      cont.appendChild(driveGroup);

      var statusMsg = el('div', { className: 'status-msg' });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          var title = titleInput.value.trim();
          if (!title) { statusMsg.textContent = 'Enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Creating\u2026'; statusMsg.style.color = 'var(--muted)';

          // Resolve meetingMinutesId from URL or raw ID
          var rawMinutes = minutesInput.value.trim();
          var minutesId = '';
          if (rawMinutes) {
            var mMatch = rawMinutes.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
            minutesId = mMatch ? mMatch[1] : rawMinutes;
          }

          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) {
              statusMsg.textContent = 'Event created!'; statusMsg.style.color = 'var(--success)';
              titleInput.value = ''; descInput.value = ''; dateInput.value = '';
              driveInput.value = ''; minutesInput.value = '';
              setTimeout(function() { _st.switchTo('timeline'); }, 800);
            } else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlAddTimelineEvent(SESSION_TOKEN, {
            title: title, eventDate: dateInput.value || '',
            description: descInput.value.trim(), category: catSelect.value,
            driveFileIds: parseDriveIds(driveInput.value).join(','),
            meetingMinutesId: minutesId
          });
        }
      }, 'Create Event'));
    }

    // ── Import form ───────────────────────────────────────────────────────
    function _renderImportForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Import from Google Calendar'));
      cont.appendChild(el('div', { className: 'text-sm-muted-mb-12' }, 'Import events from your Google Calendar. Already-imported events are skipped.'));

      var startInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'Start Date', startInput);
      var endInput = el('input', { className: 'form-input', type: 'date' });
      _formGroup(cont, 'End Date', endInput);

      var statusMsg = el('div', { className: 'status-msg' });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          if (!startInput.value || !endInput.value) { statusMsg.textContent = 'Select both dates.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Importing...'; statusMsg.style.color = 'var(--muted)';
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) { statusMsg.textContent = r.imported + ' events imported!'; statusMsg.style.color = 'var(--success)'; }
            else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlImportCalendarEvents(SESSION_TOKEN, startInput.value, endInput.value);
        }
      }, 'Import Events'));
    }

    // ── Categories management ─────────────────────────────────────────────
    function _renderCategoriesTab(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Manage Categories'));
      cont.appendChild(el('div', { className: 'text-sm-muted-mb-12' }, 'Add or remove event categories. Removing a category does not change existing events.'));

      var listArea = el('div', { className: 'mb-16' });
      cont.appendChild(listArea);

      function _loadCats() {
        listArea.innerHTML = '';
        showLoading(listArea);
        serverCall().withSuccessHandler(function(cats) {
          listArea.innerHTML = '';
          cachedCategories = cats || [];
          if (!cats || !cats.length) { listArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'No categories found.')); return; }
          cats.forEach(function(cat) {
            var row = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 10px', borderRadius: '6px', background: 'var(--surfaceAlt)', marginBottom: '4px' } });
            row.appendChild(el('span', { className: 'category-badge text-sm ' + cat }, cat.charAt(0).toUpperCase() + cat.slice(1)));
            row.appendChild(el('button', {
              style: { fontSize: '11px', padding: '2px 8px', borderRadius: '4px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', cursor: 'pointer' },
              onClick: function() {
                if (!confirm('Remove category \u201C' + cat + '\u201D?')) return;
                serverCall().withSuccessHandler(function(r) {
                  if (r && r.success) _loadCats(); else { row.appendChild(el('span',{style:{fontSize:'11px',color:'var(--danger)',marginLeft:'6px'}},((r && r.message) || 'Delete failed.'))); }
                }).tlDeleteCategory(SESSION_TOKEN, cat);
              }
            }, 'Remove'));
            listArea.appendChild(row);
          });
        }).withFailureHandler(function() {
          listArea.innerHTML = '<div style="color:var(--danger);font-size:13px">Failed to load categories.</div>';
        }).tlGetCategories(SESSION_TOKEN);
      }

      _loadCats();

      var addRow = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
      var newCatInput = el('input', { className: 'form-input flex-1', placeholder: 'New category name' });
      var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '16px', marginTop: '6px' } });
      addRow.appendChild(newCatInput);
      addRow.appendChild(el('button', {
        className: 'btn btn-primary', style: { whiteSpace: 'nowrap' },
        onClick: function() {
          var name = newCatInput.value.trim();
          if (!name) { statusMsg.textContent = 'Enter a name.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Adding...'; statusMsg.style.color = 'var(--muted)';
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) { newCatInput.value = ''; statusMsg.textContent = ''; _loadCats(); }
            else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlAddCategory(SESSION_TOKEN, name);
        }
      }, 'Add'));
      cont.appendChild(addRow);
      cont.appendChild(statusMsg);
    }

    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// NEW GRIEVANCE FORM  (v4.32.0)

/**
 * Renders the steward grievance intake form.
 * If _grievancePreselectedMember is set (from member profile "Start Grievance" button),
 * the member is pre-selected and their info is auto-populated.
 */
var _grievancePreselectedMember = null;

function renderNewGrievanceForm(appContainer) {
  renderPageLayout(appContainer, 'steward', 'newgrievance', function(container) {
    _stewardHeader(container, 'New Grievance Form');
    var content = el('div', { className: 'content' });

    // ── State ──
    var selectedMember = _grievancePreselectedMember || null;
    _grievancePreselectedMember = null; // consume
    var formOptions = null;
    var isDraft = true; // start in draft mode

    // ── Header card ──
    var headerCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    headerCard.appendChild(el('div', { style: { fontSize: '14px', fontWeight: '600', marginBottom: '6px', color: 'var(--text)' } }, '\uD83D\uDCDD Initiate a Grievance'));
    headerCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5' } },
      'Select a member, fill in grievance details, then preview before submitting. The system will auto-populate member info, generate a PDF, save it to the member\u2019s Drive folder, and notify them.'));
    content.appendChild(headerCard);

    // ── Member search section ──
    var searchCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    searchCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '8px', fontWeight: '600' } }, 'Member'));

    // Eager-load members for preselection + autocomplete
    var _grMemberCache = null;
    function _grLoadMembers(cb) {
      if (_grMemberCache) { cb(_grMemberCache); return; }
      serverCall().withSuccessHandler(function(result) {
        _grMemberCache = result && result.success !== false
          ? (Array.isArray(result) ? result : (result.members || []))
          : [];
        cb(_grMemberCache);
      }).withFailureHandler(function() {
        _grMemberCache = [];
        searchCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)' } }, 'Failed to load members.'));
        cb(_grMemberCache);
      }).dataGetAllMembers(SESSION_TOKEN);
    }
    // Pre-fetch for preselection
    _grLoadMembers(function() { if (selectedMember) _selectMember(selectedMember); });

    var _grAc = createAutocomplete({
      placeholder: 'Type to search members by name or email\u2026',
      debounceMs: 200,
      minQuery: 2,
      maxResults: 15,
      loadData: _grLoadMembers,
      renderItem: function(m) {
        var row = el('div', { style: { padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border)' } });
        row.appendChild(el('div', { style: { fontWeight: '500', color: 'var(--text)' } }, m.name || m.email));
        var meta = [m.workLocation, m.jobTitle].filter(Boolean).join(' \u00B7 ');
        if (meta) row.appendChild(el('div', { className: 'text-xs-muted' }, meta));
        return row;
      },
      onSelect: function(m) {
        selectedMember = m;
        _selectMember(m);
        _grAc.input.value = '';
      }
    });
    var searchInput = _grAc.input;

    var selectedMemberDisplay = el('div', { style: { display: 'none', marginTop: '10px', padding: '10px 14px', background: 'var(--accentBg)', borderRadius: '8px', border: '1px solid var(--accentBorder)' } });

    function _selectMember(m) {
      selectedMember = m;
      selectedMemberDisplay.innerHTML = '';
      selectedMemberDisplay.style.display = '';

      var nameRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
      nameRow.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px', color: 'var(--accent)' } }, m.name || m.email));
      var changeBtn = el('button', {
        className: 'btn', style: { fontSize: '11px', padding: '3px 10px' },
        onClick: function() {
          selectedMember = null;
          selectedMemberDisplay.style.display = 'none';
          searchInput.value = '';
          searchInput.focus();
        }
      }, 'Change');
      nameRow.appendChild(changeBtn);
      selectedMemberDisplay.appendChild(nameRow);

      var infoGrid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: '6px 16px', marginTop: '8px' } });
      var fields = [
        { label: 'Email', value: m.email },
        { label: 'Location', value: m.workLocation },
        { label: 'Job Title', value: m.jobTitle },
        { label: 'Unit', value: m.unit },
        { label: 'Hire Date', value: m.hireDate }
      ];
      fields.forEach(function(f) {
        if (!f.value) return;
        var cell = el('div');
        cell.appendChild(el('div', { className: 'text-label' }, f.label));
        cell.appendChild(el('div', { className: 'text-sm-text' }, String(f.value)));
        infoGrid.appendChild(cell);
      });
      selectedMemberDisplay.appendChild(infoGrid);
      _buildEmailRecipients();
    }

    searchCard.appendChild(_grAc.wrapper);
    searchCard.appendChild(selectedMemberDisplay);
    content.appendChild(searchCard);

    // ── Form fields ──
    var formCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    formCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '12px', fontWeight: '600' } }, 'Grievance Details'));

    // Load form options (articles, categories, steps, etc.)
    serverCall().withSuccessHandler(function(opts) {
      formOptions = opts || {};
      _buildFormFields();
    }).withFailureHandler(function() {
      formOptions = {};
      _buildFormFields();
    }).dataGetGrievanceFormOptions(SESSION_TOKEN);

    var formFieldsContainer = el('div');
    formCard.appendChild(formFieldsContainer);

    // Form field references
    var fld = {};

    function _buildFormFields() {
      formFieldsContainer.innerHTML = '';

      // Step — only Step 1 and Step 2 are valid on the grievance form
      var stepGroup = el('div', { className: 'form-group' });
      stepGroup.appendChild(el('label', { className: 'form-label' }, 'Current Step'));
      fld.step = el('select', { className: 'form-input' });
      [['1', 'Step I'], ['2', 'Step II']].forEach(function(pair) {
        fld.step.appendChild(el('option', { value: pair[0] }, pair[1]));
      });
      stepGroup.appendChild(fld.step);
      formFieldsContainer.appendChild(stepGroup);

      // Incident Date
      var dateGroup = el('div', { className: 'form-group' });
      dateGroup.appendChild(el('label', { className: 'form-label' }, 'Incident Date'));
      fld.incidentDate = el('input', { type: 'date', className: 'form-input' });
      dateGroup.appendChild(fld.incidentDate);
      formFieldsContainer.appendChild(dateGroup);

      // Issue Category
      var catGroup = el('div', { className: 'form-group' });
      catGroup.appendChild(el('label', { className: 'form-label' }, 'Issue Category'));
      fld.issueCategory = el('select', { className: 'form-input' });
      fld.issueCategory.appendChild(el('option', { value: '' }, '— Select —'));
      var cats = (formOptions.issueCategories && formOptions.issueCategories.length)
        ? formOptions.issueCategories
        : ['Discipline', 'Workload', 'Scheduling', 'Pay', 'Benefits', 'Safety', 'Harassment', 'Discrimination', 'Contract Violation', 'Other'];
      cats.forEach(function(c) { fld.issueCategory.appendChild(el('option', { value: c }, c)); });
      catGroup.appendChild(fld.issueCategory);
      formFieldsContainer.appendChild(catGroup);

      // Articles Violated
      var artGroup = el('div', { className: 'form-group' });
      artGroup.appendChild(el('label', { className: 'form-label' }, 'Article(s) Violated'));
      fld.articles = el('input', { type: 'text', className: 'form-input', placeholder: 'e.g., Art. 13 - Discipline, Art. 6 - Hours of Work' });
      artGroup.appendChild(fld.articles);
      // Suggestion chips for articles
      if (formOptions.articles && formOptions.articles.length) {
        var chipRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px', marginTop: '4px' } });
        formOptions.articles.forEach(function(a) {
          var chip = el('button', {
            style: { fontSize: '10px', padding: '2px 8px', borderRadius: '12px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', cursor: 'pointer' },
            onClick: function() {
              var cur = fld.articles.value.trim();
              if (cur && cur.indexOf(a) === -1) fld.articles.value = cur + ', ' + a;
              else if (!cur) fld.articles.value = a;
            }
          }, a);
          chipRow.appendChild(chip);
        });
        artGroup.appendChild(chipRow);
      }
      formFieldsContainer.appendChild(artGroup);

      // Management Rep(s) — primary + optional 2nd to match both PDF slots
      var mgrGroup = el('div', { className: 'form-group' });
      mgrGroup.appendChild(el('label', { className: 'form-label' }, 'Management Representative(s)'));
      var mgrs = (formOptions.managers && formOptions.managers.length) ? formOptions.managers : [];

      fld.managers = el('select', { className: 'form-input', style: { marginBottom: '6px' } });
      fld.managers.appendChild(el('option', { value: '' }, '— Primary —'));
      mgrs.forEach(function(m) { fld.managers.appendChild(el('option', { value: m }, m)); });
      mgrGroup.appendChild(fld.managers);

      fld.managers2 = el('select', { className: 'form-input' });
      fld.managers2.appendChild(el('option', { value: '' }, '— 2nd (optional) —'));
      mgrs.forEach(function(m) { fld.managers2.appendChild(el('option', { value: m }, m)); });
      mgrGroup.appendChild(fld.managers2);

      // Sync: exclude primary selection from 2nd dropdown
      function _syncMgr2() {
        var cur1 = fld.managers.value, cur2 = fld.managers2.value;
        fld.managers2.innerHTML = '';
        fld.managers2.appendChild(el('option', { value: '' }, '— 2nd (optional) —'));
        mgrs.forEach(function(m) {
          if (m !== cur1) fld.managers2.appendChild(el('option', { value: m }, m));
        });
        if (cur2 && cur2 !== cur1) fld.managers2.value = cur2;
      }
      fld.managers.addEventListener('change', _syncMgr2);

      formFieldsContainer.appendChild(mgrGroup);

      // Statement of Violation
      var stmtGroup = el('div', { className: 'form-group' });
      stmtGroup.appendChild(el('label', { className: 'form-label' }, 'Statement of Violation'));
      fld.description = el('textarea', { className: 'msg-textarea', placeholder: 'Describe the violation\u2026', style: { minHeight: '80px', width: '100%', boxSizing: 'border-box' } });
      stmtGroup.appendChild(fld.description);
      formFieldsContainer.appendChild(stmtGroup);

      // Remedy Sought
      var remGroup = el('div', { className: 'form-group' });
      remGroup.appendChild(el('label', { className: 'form-label' }, 'Relief / Remedy Sought'));
      fld.remedy = el('textarea', { className: 'msg-textarea', placeholder: 'Describe the relief or remedy sought\u2026', style: { minHeight: '60px', width: '100%', boxSizing: 'border-box' } });
      remGroup.appendChild(fld.remedy);
      formFieldsContainer.appendChild(remGroup);

      // ── Advanced overrides (collapsed by default) ──
      var advToggle = el('button', {
        className: 'btn', style: { fontSize: '11px', marginTop: '8px', color: 'var(--muted)' },
        onClick: function() {
          advSection.style.display = advSection.style.display === 'none' ? '' : 'none';
          advToggle.textContent = advSection.style.display === 'none' ? '\u25B6 Additional Form Fields' : '\u25BC Additional Form Fields';
        }
      }, '\u25B6 Additional Form Fields');
      formFieldsContainer.appendChild(advToggle);

      var advSection = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
      advSection.appendChild(el('div', { className: 'text-xs-muted-mb-8' }, 'These fields override auto-populated values on the PDF form.'));

      // Job Title override
      var jtGroup = el('div', { className: 'form-group' });
      jtGroup.appendChild(el('label', { className: 'form-label' }, 'Job Title (override)'));
      fld.jobtitle = el('select', { className: 'form-input' });
      fld.jobtitle.appendChild(el('option', { value: '' }, '— Use member\u2019s job title —'));
      var jts = (formOptions.jobTitles && formOptions.jobTitles.length) ? formOptions.jobTitles : [];
      jts.forEach(function(j) { fld.jobtitle.appendChild(el('option', { value: j }, j)); });
      jtGroup.appendChild(fld.jobtitle);
      advSection.appendChild(jtGroup);

      // Region override
      var regGroup = el('div', { className: 'form-group' });
      regGroup.appendChild(el('label', { className: 'form-label' }, 'Region (override)'));
      fld.region = el('select', { className: 'form-input' });
      fld.region.appendChild(el('option', { value: '' }, '— Auto-detect —'));
      fld.region.appendChild(el('option', { value: 'Everett' }, 'Everett'));
      fld.region.appendChild(el('option', { value: 'Worcester' }, 'Worcester'));
      regGroup.appendChild(fld.region);
      advSection.appendChild(regGroup);

      // Agency Start Date override
      var sdGroup = el('div', { className: 'form-group' });
      sdGroup.appendChild(el('label', { className: 'form-label' }, 'Agency Start Date (override)'));
      fld.startdate = el('input', { type: 'date', className: 'form-input' });
      sdGroup.appendChild(fld.startdate);
      advSection.appendChild(sdGroup);

      // Second statement line
      var stmt2Group = el('div', { className: 'form-group' });
      stmt2Group.appendChild(el('label', { className: 'form-label' }, 'Additional Statement'));
      fld.statement2 = el('textarea', { className: 'msg-textarea', placeholder: 'Additional details (optional)\u2026', style: { minHeight: '50px', width: '100%', boxSizing: 'border-box' } });
      stmt2Group.appendChild(fld.statement2);
      advSection.appendChild(stmt2Group);

      // Second remedy line
      var rem2Group = el('div', { className: 'form-group' });
      rem2Group.appendChild(el('label', { className: 'form-label' }, 'Additional Remedy'));
      fld.remedy2 = el('textarea', { className: 'msg-textarea', placeholder: 'Additional remedy (optional)\u2026', style: { minHeight: '50px', width: '100%', boxSizing: 'border-box' } });
      rem2Group.appendChild(fld.remedy2);
      advSection.appendChild(rem2Group);

      formFieldsContainer.appendChild(advSection);
    }

    content.appendChild(formCard);

    // ── Email recipients section ──
    var emailCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    emailCard.appendChild(el('div', { className: 'form-label', style: { marginBottom: '8px', fontWeight: '600' } }, 'Email Recipients (optional)'));
    emailCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '10px' } },
      'After the grievance is created, you can email the form to selected recipients. Select who should receive a copy.'));

    var emailCheckboxes = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } });
    var emailRecipients = []; // { email, name, checked }

    // Build recipient list from form options
    function _buildEmailRecipients() {
      emailCheckboxes.innerHTML = '';
      emailRecipients = [];

      // Add member
      if (selectedMember && selectedMember.email) {
        emailRecipients.push({ email: selectedMember.email, name: (selectedMember.name || selectedMember.email) + ' (Member)', checked: false });
      }

      // Add stewards
      if (formOptions && formOptions.stewards) {
        formOptions.stewards.forEach(function(s) {
          if (s && s.indexOf('@') !== -1) {
            emailRecipients.push({ email: s, name: s + ' (Steward)', checked: false });
          } else if (s) {
            emailRecipients.push({ email: '', name: s + ' (Steward)', checked: false, nameOnly: true });
          }
        });
      }

      // Add coordinators
      if (formOptions && formOptions.coordinators) {
        formOptions.coordinators.forEach(function(c) {
          if (c) emailRecipients.push({ email: c, name: c + ' (Coordinator)', checked: false });
        });
      }

      emailRecipients.forEach(function(r, idx) {
        var row = el('label', { style: { display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', color: 'var(--text)', cursor: 'pointer' } });
        var cb = el('input', { type: 'checkbox' });
        cb.addEventListener('change', function() { emailRecipients[idx].checked = cb.checked; });
        row.appendChild(cb);
        row.appendChild(document.createTextNode(r.name));
        emailCheckboxes.appendChild(row);
      });

      if (emailRecipients.length === 0) {
        emailCheckboxes.appendChild(el('div', { className: 'text-xs-muted' }, 'Select a member first to see email options.'));
      }
    }

    _buildEmailRecipients();
    emailCard.appendChild(emailCheckboxes);
    content.appendChild(emailCard);

    // ── Preview / Submit section ──
    var actionCard = el('div', { className: 'card', style: { marginBottom: '16px', padding: '16px' } });
    var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '20px', marginBottom: '8px' } });
    actionCard.appendChild(statusMsg);

    var btnRow = el('div', { className: 'flex-wrap-gap' });

    // Preview button
    var previewBtn = el('button', {
      className: 'btn', style: { fontSize: '13px', padding: '8px 20px', background: 'var(--raised)', border: '1px solid var(--border)', color: 'var(--text)', fontWeight: '600', cursor: 'pointer', borderRadius: '8px' },
      onClick: function() {
        if (!selectedMember) {
          statusMsg.textContent = 'Please select a member first.';
          statusMsg.style.color = 'var(--danger)';
          return;
        }
        statusMsg.textContent = '';
        _showPreview();
      }
    }, '\uD83D\uDD0D Preview');

    // Submit button
    var submitBtn = el('button', {
      className: 'btn btn-primary', style: { fontSize: '13px', padding: '8px 20px', fontWeight: '600', borderRadius: '8px' },
      onClick: function() {
        _submitGrievance();
      }
    }, '\u2705 Submit Grievance');

    btnRow.appendChild(previewBtn);
    btnRow.appendChild(submitBtn);
    actionCard.appendChild(btnRow);

    // Preview area
    var previewArea = el('div', { style: { display: 'none', marginTop: '12px', padding: '12px', background: 'var(--raised)', borderRadius: '8px', border: '1px solid var(--border)' } });
    actionCard.appendChild(previewArea);
    content.appendChild(actionCard);

    // ── Preview function ──
    function _showPreview() {
      previewArea.innerHTML = '';
      previewArea.style.display = '';

      previewArea.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', marginBottom: '8px', color: 'var(--text)' } }, '\uD83D\uDCCB Grievance Preview'));

      var data = _collectFormData();
      var lines = [
        ['Grievant', (selectedMember.name || selectedMember.email)],
        ['Email', selectedMember.email],
        ['Job Title', data.formOverrides.jobtitle || selectedMember.jobTitle || '\u2014'],
        ['Work Location', selectedMember.workLocation || '\u2014'],
        ['Hire Date', selectedMember.hireDate || '\u2014'],
        ['Step', fld.step ? fld.step.options[fld.step.selectedIndex].text : data.step],
        ['Incident Date', data.incidentDate || '\u2014'],
        ['Issue Category', data.issueCategory || '\u2014'],
        ['Articles', data.articles || '\u2014'],
        ['Manager(s)', [data.formOverrides.managers, data.formOverrides.managers2].filter(Boolean).join(', ') || '\u2014'],
        ['Statement', data.description || '\u2014'],
        ['Remedy', data.remedy || '\u2014']
      ];

      var grid = el('div', { style: { display: 'grid', gridTemplateColumns: '140px 1fr', gap: '4px 12px', fontSize: '12px' } });
      lines.forEach(function(pair) {
        grid.appendChild(el('div', { style: { color: 'var(--muted)', fontWeight: '500' } }, pair[0]));
        grid.appendChild(el('div', { style: { color: 'var(--text)', wordBreak: 'break-word' } }, pair[1]));
      });
      previewArea.appendChild(grid);

      // Email recipients summary
      var checked = emailRecipients.filter(function(r) { return r.checked; });
      if (checked.length > 0) {
        previewArea.appendChild(el('div', { style: { marginTop: '8px', fontSize: '11px', color: 'var(--muted)' } },
          '\u2709 Will email to: ' + checked.map(function(r) { return r.name; }).join(', ')));
      }
    }

    // ── Collect form data ──
    function _collectFormData() {
      return {
        memberEmail: selectedMember ? selectedMember.email : '',
        step: fld.step ? fld.step.value : '1',
        incidentDate: fld.incidentDate ? fld.incidentDate.value : '',
        issueCategory: fld.issueCategory ? fld.issueCategory.value : '',
        articles: fld.articles ? fld.articles.value.trim() : '',
        description: fld.description ? fld.description.value.trim() : '',
        remedy: fld.remedy ? fld.remedy.value.trim() : '',
        formOverrides: {
          jobtitle:   fld.jobtitle ? fld.jobtitle.value : '',
          region:     fld.region ? fld.region.value : '',
          startdate:  fld.startdate ? fld.startdate.value : '',
          managers:   fld.managers ? fld.managers.value : '',
          managers2:  fld.managers2 ? fld.managers2.value : '',
          statement2: fld.statement2 ? fld.statement2.value.trim() : '',
          remedy2:    fld.remedy2 ? fld.remedy2.value.trim() : ''
        }
      };
    }

    // ── Submit ──
    function _submitGrievance() {
      if (!selectedMember) {
        statusMsg.textContent = 'Please select a member first.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }
      if (!fld.incidentDate || !fld.incidentDate.value) {
        statusMsg.textContent = 'Incident date is required.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }
      if (!fld.issueCategory || !fld.issueCategory.value) {
        statusMsg.textContent = 'Issue category is required.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }
      if (!fld.description || !fld.description.value.trim()) {
        statusMsg.textContent = 'Statement of violation is required.';
        statusMsg.style.color = 'var(--danger)';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting\u2026';
      statusMsg.textContent = 'Creating grievance, generating draft PDF, setting up Drive folder\u2026';
      statusMsg.style.color = 'var(--muted)';

      var data = _collectFormData();
      var idemKey = 'GRV_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

      serverCall()
        .withSuccessHandler(function(r) {
          submitBtn.disabled = false;
          submitBtn.textContent = '\u2705 Submit Grievance';
          if (r && r.success) {
            statusMsg.style.color = 'var(--success)';
            statusMsg.textContent = '\u2713 ' + r.message;

            // Show success details
            previewArea.innerHTML = '';
            previewArea.style.display = '';
            previewArea.appendChild(el('div', { style: { fontSize: '14px', fontWeight: '600', color: 'var(--success)', marginBottom: '8px' } }, '\u2705 Grievance Created'));
            previewArea.appendChild(el('div', { style: { fontSize: '13px', marginBottom: '4px' } }, 'ID: ' + (r.grievanceId || '')));
            previewArea.appendChild(el('div', { style: { fontSize: '13px', marginBottom: '4px' } }, 'Member: ' + (r.memberName || '')));
            if (r.driveFolderUrl) {
              var folderLink = el('a', { href: r.driveFolderUrl, target: '_blank', style: { fontSize: '13px', color: 'var(--accent)', textDecoration: 'none' } }, '\uD83D\uDCC2 Open Case Folder in Drive');
              previewArea.appendChild(folderLink);
            }
            if (r.pdfSaved === false) {
              previewArea.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--warning)', marginTop: '6px', fontWeight: '500' } }, '\u26A0\uFE0F Draft PDF could not be saved to the case folder. Please generate it manually from the grievance detail view.'));
            }
            previewArea.appendChild(el('div', { className: 'text-xs-muted-mt-8' }, 'The member has been notified that their signature is needed. Once signed, you will be notified and can email the document.'));

            // Handle email sending if recipients were selected
            var checkedRecipients = emailRecipients.filter(function(r) { return r.checked && r.email; });
            if (checkedRecipients.length > 0) {
              var emailList = checkedRecipients.map(function(r) { return r.email; }).join(',');
              var subject = 'Grievance Form - ' + (r.grievanceId || '') + ' - ' + (r.memberName || '');
              var mailtoUrl = 'mailto:' + encodeURIComponent(emailList) +
                '?subject=' + encodeURIComponent(subject) +
                '&body=' + encodeURIComponent('A grievance (' + (r.grievanceId || '') + ') has been filed for ' + (r.memberName || '') + '.\n\nCase folder: ' + (r.driveFolderUrl || 'N/A') + '\n\nPlease review the attached grievance form in the case folder.');
              window.open(mailtoUrl, '_blank');
              previewArea.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '4px' } }, '\u2709 Email client opened for selected recipients.'));
            }

            // Refresh badges
            if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
          } else if (r && r.duplicate) {
            statusMsg.textContent = 'Duplicate submission detected.';
            statusMsg.style.color = 'var(--warning)';
          } else {
            statusMsg.textContent = (r && r.message) || 'Error creating grievance.';
            statusMsg.style.color = 'var(--danger)';
          }
        })
        .withFailureHandler(function(err) {
          submitBtn.disabled = false;
          submitBtn.textContent = '\u2705 Submit Grievance';
          statusMsg.textContent = 'Failed: ' + (err && err.message ? err.message : 'Unknown error');
          statusMsg.style.color = 'var(--danger)';
        })
        .dataInitiateGrievance(SESSION_TOKEN, data, idemKey);
    }

    // Email recipients are now rebuilt inside _selectMember directly

    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// BULK ACTIONS TOOLBAR (v4.32.0 — Feature 3)
// ═══════════════════════════════════════

function _updateBulkToolbar() {
  var existing = document.getElementById('bulk-toolbar');
  var selected = document.querySelectorAll('.bulk-select-cb:checked');

  if (selected.length === 0) {
    if (existing) existing.remove();
    return;
  }

  if (!existing) {
    existing = el('div', { id: 'bulk-toolbar', className: 'bulk-toolbar', role: 'toolbar', 'aria-label': 'Bulk actions' });
    document.body.appendChild(existing);
  }
  existing.innerHTML = ''; // Clear to rebuild

  var countLabel = el('span', { style: { fontWeight: '600', fontSize: '13px' } }, selected.length + ' selected');

  // Select All / Deselect All
  var allCbs = document.querySelectorAll('.bulk-select-cb');
  var toggleBtn = el('button', { className: 'btn btn-ghost', onclick: function() {
    var allChecked = selected.length === allCbs.length;
    allCbs.forEach(function(cb) { cb.checked = !allChecked; });
    _updateBulkToolbar();
  }}, selected.length === allCbs.length ? 'Deselect All' : 'Select All');

  var statusBtn = el('button', { className: 'btn btn-primary', onclick: function() { _bulkStatusChange(selected); }}, 'Change Status');
  var exportBtn = el('button', { className: 'btn btn-secondary', onclick: function() { _bulkExport(selected); }}, 'Export CSV');
  var emailBtn = el('button', { className: 'btn btn-secondary', onclick: function() { _bulkEmail(selected); }}, 'Email');
  var folderBtn = el('button', { className: 'btn btn-secondary', onclick: function() { _bulkCreateFolders(selected); }}, 'Create Folders');
  var closeBtn = el('button', { className: 'btn btn-ghost', 'aria-label': 'Clear selection', onclick: function() {
    document.querySelectorAll('.bulk-select-cb').forEach(function(cb) { cb.checked = false; });
    _updateBulkToolbar();
  }}, '\u2715');

  [countLabel, toggleBtn, statusBtn, exportBtn, emailBtn, folderBtn, closeBtn].forEach(function(b) { existing.appendChild(b); });
}

function _getSelectedCaseIds(selected) {
  var ids = [];
  selected.forEach(function(cb) { if (cb.dataset.caseId) ids.push(cb.dataset.caseId); });
  return ids;
}

function _getSelectedEmails(selected) {
  var emails = [];
  var seen = {};
  selected.forEach(function(cb) {
    var em = cb.dataset.memberEmail;
    if (em && !seen[em]) { emails.push(em); seen[em] = true; }
  });
  return emails;
}

function _bulkStatusChange(selected) {
  var newStatus = prompt('Enter new status for ' + selected.length + ' case(s):');
  if (!newStatus) return;
  var caseIds = _getSelectedCaseIds(selected);
  function _doBulkUpdate() {
    serverCall().withSuccessHandler(function(result) {
      if (result && result.requires2FA) {
        show2FAModal(function() { _doBulkUpdate(); }, { reason: 'Bulk status changes require email verification.' });
        return;
      }
      if (result && result.success) {
        alert('Updated ' + result.updated + ' case(s) to "' + newStatus + '".');
        document.querySelectorAll('.bulk-select-cb').forEach(function(cb) { cb.checked = false; });
        _updateBulkToolbar();
        if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
        if (typeof _reloadStewardCases === 'function') _reloadStewardCases();
      } else {
        alert((result && result.message) || 'Bulk status update failed.');
      }
    }).withFailureHandler(function(err) {
      alert('Error: ' + (err && err.message ? err.message : 'Unknown error'));
    }).dataBulkUpdateStatus(SESSION_TOKEN, caseIds, newStatus);
  }
  _doBulkUpdate();
}

function _bulkExport(selected) {
  var caseIds = _getSelectedCaseIds(selected);
  function _doBulkExport() {
    serverCall().withSuccessHandler(function(result) {
      if (result && result.requires2FA) {
        show2FAModal(function() { _doBulkExport(); }, { reason: 'Data exports require email verification for PII protection.' });
        return;
      }
      if (result && result.success && result.csv) {
        var blob = new Blob([result.csv], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = el('a', { href: url, download: 'cases-export.csv', style: { display: 'none' } });
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } else {
        alert('Export failed — no data returned.');
      }
    }).withFailureHandler(function(err) {
      alert('Export error: ' + (err && err.message ? err.message : 'Unknown error'));
    }).dataBulkExportCsv(SESSION_TOKEN, caseIds);
  }
  _doBulkExport();
}

function _bulkEmail(selected) {
  var emails = _getSelectedEmails(selected);
  if (!emails.length) { alert('No member emails found for selected cases.'); return; }
  var subject = prompt('Email subject:');
  if (!subject) return;
  var body = prompt('Email body:');
  if (body === null) return; // cancelled

  serverCall().withSuccessHandler(function(result) {
    if (result && result.success) {
      alert('Sent ' + result.sent + ' email(s).');
    } else {
      alert((result && result.message) || 'Bulk email failed.');
    }
  }).withFailureHandler(function(err) {
    alert('Email error: ' + (err && err.message ? err.message : 'Unknown error'));
  }).dataBulkSendEmail(SESSION_TOKEN, emails, subject, body || '');
}

function _bulkCreateFolders(selected) {
  var caseIds = _getSelectedCaseIds(selected);
  if (!confirm('Create Drive folders for ' + caseIds.length + ' case(s)?')) return;

  serverCall().withSuccessHandler(function(result) {
    if (result && result.success) {
      var msg = 'Created folders for ' + result.created + ' case(s).';
      if (result.errors && result.errors.length) {
        msg += '\nErrors:\n' + result.errors.join('\n');
      }
      alert(msg);
    } else {
      alert((result && result.message) || 'Bulk folder creation failed.');
    }
  }).withFailureHandler(function(err) {
    alert('Folder error: ' + (err && err.message ? err.message : 'Unknown error'));
  }).dataBulkCreateFolders(SESSION_TOKEN, caseIds);
}

// Helper: reload steward cases after bulk operations
function _reloadStewardCases() {
  serverCall().withSuccessHandler(function(result) {
    if (result && result.success !== false) {
      AppState.cases = result.cases || result || [];
      // Re-render cases tab via tab nav
      if (typeof _handleTabNav === 'function') {
        _handleTabNav('steward', 'cases');
      }
    }
  }).withFailureHandler(function() {}).dataGetStewardCases(SESSION_TOKEN);
}

// MENTORSHIP PAIRING PAGE (v4.35.0)
// Pair experienced stewards with new members
// ═══════════════════════════════════════
function renderMentorshipPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'mentorship', function(container) {
    _stewardHeader(container, 'Mentorship', 'Pair experienced stewards with new members');

    var content = el('div', { className: 'content' });

    // Manual pairing form
    var formSection = el('div', { style: { marginBottom: '24px' } });
    formSection.appendChild(el('h3', { style: { fontSize: '16px', marginBottom: '12px' } }, 'Create Pairing'));
    var form = el('div', { className: 'card', style: { padding: '16px', display: 'flex', gap: '8px', alignItems: 'flex-end', flexWrap: 'wrap' } });
    var mentorInput = el('input', { className: 'form-input', type: 'email', placeholder: 'Mentor email', style: { flex: '1', minWidth: '160px' } });
    var menteeInput = el('input', { className: 'form-input', type: 'email', placeholder: 'Mentee email', style: { flex: '1', minWidth: '160px' } });
    var caseInput = el('input', { className: 'form-input', placeholder: 'Case types (optional)', style: { flex: '1', minWidth: '140px' } });
    var formMsg = el('span', { style: { fontSize: '13px', minWidth: '80px' } });
    var createBtn = el('button', {
      className: 'btn btn-primary', style: { fontSize: '13px' },
      onClick: function() {
        if (!mentorInput.value || !menteeInput.value) { formMsg.textContent = 'Both emails required.'; formMsg.style.color = 'var(--danger, #ef4444)'; return; }
        createBtn.disabled = true;
        createBtn.textContent = 'Creating...';
        formMsg.textContent = '';
        serverCall().withSuccessHandler(function(r) {
          createBtn.disabled = false;
          createBtn.textContent = 'Create';
          if (r && r.success) {
            formMsg.textContent = 'Created!'; formMsg.style.color = 'var(--success, #22c55e)';
            mentorInput.value = ''; menteeInput.value = ''; caseInput.value = '';
            _loadMentorshipPairings(activeList);
            setTimeout(function() { formMsg.textContent = ''; }, 2000);
          } else {
            formMsg.textContent = (r && r.message) || 'Failed.'; formMsg.style.color = 'var(--danger, #ef4444)';
          }
        }).withFailureHandler(function() {
          createBtn.disabled = false; createBtn.textContent = 'Create';
          formMsg.textContent = 'Server error.'; formMsg.style.color = 'var(--danger, #ef4444)';
        }).dataCreateMentorshipPairing(SESSION_TOKEN, mentorInput.value.trim(), menteeInput.value.trim(), caseInput.value.trim());
      }
    }, 'Create');
    form.appendChild(mentorInput); form.appendChild(menteeInput); form.appendChild(caseInput); form.appendChild(createBtn); form.appendChild(formMsg);
    formSection.appendChild(form);
    content.appendChild(formSection);

    // Active Pairings section
    var activeSection = el('div', { style: { marginBottom: '24px' } });
    activeSection.appendChild(el('h3', { style: { fontSize: '16px', marginBottom: '12px' } }, 'Active Pairings'));
    var activeList = el('div', { id: 'mentorship-active' });
    activeList.appendChild(el('div', { style: { padding: '16px', color: 'var(--text-secondary)' } }, 'Loading...'));
    activeSection.appendChild(activeList);
    content.appendChild(activeSection);

    // Suggestions section
    var suggestSection = el('div');
    suggestSection.appendChild(el('h3', { style: { fontSize: '16px', marginBottom: '12px' } }, 'Suggested Pairings'));
    var suggestList = el('div', { id: 'mentorship-suggestions' });
    suggestList.appendChild(el('div', { style: { padding: '16px', color: 'var(--text-secondary)' } }, 'Loading...'));
    suggestSection.appendChild(suggestList);
    content.appendChild(suggestSection);

    container.appendChild(content);

    // Load data
    _loadMentorshipPairings(activeList);
    _loadMentorshipSuggestions(suggestList);
  });
}

function _loadMentorshipPairings(activeList) {
  serverCall().withSuccessHandler(function(pairings) {
    activeList.innerHTML = '';
    if (!pairings || pairings.length === 0) {
      activeList.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--text-secondary)', fontStyle: 'italic' } }, 'No active mentorship pairings.'));
      return;
    }
    pairings.forEach(function(p) {
      activeList.appendChild(_buildMentorshipCard(p));
    });
  }).withFailureHandler(function() {
    activeList.innerHTML = '';
    activeList.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--danger, #ef4444)' } }, 'Failed to load mentorship pairings.'));
  }).dataGetMentorshipPairings(SESSION_TOKEN);
}

function _buildMentorshipCard(p) {
  var card = el('div', { className: 'card', style: { padding: '16px', marginBottom: '8px' } });

  var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
  var info = el('div');
  info.appendChild(el('div', { style: { fontWeight: '600' } }, '\uD83C\uDF93 ' + escapeHtml(p.mentorEmail)));
  info.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, 'mentoring \u2192 ' + escapeHtml(p.menteeEmail)));
  header.appendChild(info);

  var statusColor = p.status === 'active' ? 'var(--success, #22c55e)' : 'var(--border-subtle)';
  var statusTextColor = p.status === 'active' ? '#fff' : 'var(--text)';
  header.appendChild(el('span', {
    style: { padding: '2px 8px', borderRadius: '12px', fontSize: '12px', background: statusColor, color: statusTextColor }
  }, escapeHtml(p.status)));
  card.appendChild(header);

  if (p.caseTypes) {
    card.appendChild(el('div', { style: { fontSize: '13px', marginTop: '6px', color: 'var(--text-secondary)' } }, 'Focus: ' + escapeHtml(p.caseTypes)));
  }

  // Notes textarea
  var notesArea = el('textarea', {
    className: 'form-input',
    placeholder: 'Add mentorship notes...',
    value: p.notes || '',
    style: { width: '100%', minHeight: '50px', marginTop: '8px', resize: 'vertical', fontSize: '13px' }
  });
  card.appendChild(notesArea);

  var actions = el('div', { style: { display: 'flex', gap: '8px', marginTop: '8px' } });
  actions.appendChild(el('button', {
    className: 'btn btn-secondary',
    style: { fontSize: '12px' },
    onClick: function(ev) {
      var btn = ev.currentTarget;
      btn.disabled = true;
      btn.textContent = 'Saving...';
      serverCall().withSuccessHandler(function(r) {
        if (r && r.success) {
          notesArea.style.borderColor = 'var(--success, #22c55e)';
          btn.textContent = 'Saved!';
        } else {
          notesArea.style.borderColor = 'var(--danger, #ef4444)';
          btn.textContent = 'Save Notes';
        }
        btn.disabled = false;
        setTimeout(function() { btn.textContent = 'Save Notes'; notesArea.style.borderColor = ''; }, 2000);
      }).withFailureHandler(function() {
        notesArea.style.borderColor = 'var(--danger, #ef4444)';
        btn.textContent = 'Save Notes';
        btn.disabled = false;
      }).dataUpdateMentorshipNotes(SESSION_TOKEN, p.id, notesArea.value);
    }
  }, 'Save Notes'));
  actions.appendChild(el('button', {
    className: 'btn btn-ghost',
    style: { fontSize: '12px' },
    onClick: function() {
      if (confirm('Close this mentorship pairing?')) {
        serverCall().withSuccessHandler(function(r) {
          if (r && r.success) card.remove();
        }).dataCloseMentorshipPairing(SESSION_TOKEN, p.id);
      }
    }
  }, 'Close Pairing'));
  card.appendChild(actions);

  return card;
}

function _loadMentorshipSuggestions(suggestList) {
  serverCall().withSuccessHandler(function(suggestions) {
    suggestList.innerHTML = '';
    if (!suggestions || suggestions.length === 0) {
      suggestList.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--text-secondary)', fontStyle: 'italic' } }, 'No suggestions available \u2014 all new stewards are already paired.'));
      return;
    }
    suggestions.forEach(function(s) {
      var card = el('div', { className: 'card', style: { padding: '16px', marginBottom: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
      var info = el('div');
      info.appendChild(el('div', { style: { fontWeight: '500' } }, escapeHtml(s.mentorEmail) + ' \u2192 ' + escapeHtml(s.menteeEmail)));
      info.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, escapeHtml(s.reason)));
      card.appendChild(info);
      card.appendChild(el('button', {
        className: 'btn btn-primary',
        style: { fontSize: '13px' },
        onClick: function() {
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) {
              card.style.opacity = '0.5';
              var btn = card.querySelector('button');
              if (btn) {
                btn.textContent = 'Created!';
                btn.disabled = true;
              }
              var activeList = document.getElementById('mentorship-active');
              if (activeList) _loadMentorshipPairings(activeList);
            }
          }).dataCreateMentorshipPairing(SESSION_TOKEN, s.mentorEmail, s.menteeEmail, '');
        }
      }, 'Create Pairing'));
      suggestList.appendChild(card);
    });
  }).withFailureHandler(function() {
    suggestList.innerHTML = '';
    suggestList.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--danger, #ef4444)' } }, 'Failed to load suggestions.'));
  }).dataGetMentorshipSuggestions(SESSION_TOKEN);
}
</script>
