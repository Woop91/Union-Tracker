<script>
/**
 * Steward View — "Mono Signal"
 * v4.12.0 — Cases, Members tab, Broadcast, Survey tracking, Weekly Q manager,
 * Resources tab, responsive sidebar layout.
 */

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

function initStewardView(container) {
  var t = ThemeEngine.getTheme('steward', AppState.isDark);
  ThemeEngine.applyTheme(t);
  AppState.activeRole = 'steward';
  showLoading(container);

  // Load notification count in parallel (for bell badge)
  google.script.run.withSuccessHandler(function(r) {
    AppState.notificationCount = (r && r.count) || 0;
  }).getWebAppNotificationCount(CURRENT_USER.email, 'steward');

  google.script.run
    .withSuccessHandler(function(cases) {
      AppState.cases = cases || [];
      google.script.run
        .withSuccessHandler(function(kpis) {
          AppState.kpis = kpis;
          AppState.loading = false;
          renderStewardDashboard(container);
          _checkDeepLink('steward');
        })
        .withFailureHandler(function() {
          AppState.kpis = { totalCases: AppState.cases.length, overdue: 0, dueSoon: 0, resolved: 0, activeCases: 0 };
          AppState.loading = false;
          renderStewardDashboard(container);
          _checkDeepLink('steward');
        })
        .dataGetStewardKPIs(CURRENT_USER.email);
    })
    .withFailureHandler(function() {
      AppState.cases = [];
      AppState.loading = false;
      renderStewardDashboard(container);
    })
    .dataGetStewardCases(CURRENT_USER.email);
}

// ═══════════════════════════════════════
// STEWARD HEADER (shared)
// ═══════════════════════════════════════

function _stewardHeader(container, title, subtitle) {
  var header = el('div', { className: 'page-header' });
  var headerLeft = el('div', { className: 'page-header-left' });
  headerLeft.appendChild(el('div', { className: 'page-title' }, title));
  if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
  header.appendChild(headerLeft);

  var headerRight = el('div', { className: 'page-header-right' });
  if (!isSidebarLayout()) {
    if (IS_DUAL_ROLE) {
      headerRight.appendChild(el('button', {
        style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
        onClick: function() { AppState.activeRole = 'member'; initMemberView(document.getElementById('app')); }
      }, '\uD83D\uDC64 ' + CONFIG.memberLabel));
    }
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
      AppState.isDark = !AppState.isDark;
      ThemeEngine.applyTheme(ThemeEngine.getTheme('steward', AppState.isDark));
      renderStewardDashboard(document.getElementById('app'));
    }}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
  }
  header.appendChild(headerRight);
  container.appendChild(header);
}

// ═══════════════════════════════════════
// CASES DASHBOARD (main steward tab)
// ═══════════════════════════════════════

function renderStewardDashboard(appContainer) {
  renderPageLayout(appContainer, 'steward', 'cases', function(container) {
    _stewardHeader(container, 'Cases', CURRENT_USER.name + ' \u00B7 ' + CURRENT_USER.unit);

    // Welcome card placeholder — inserted before KPIs if first visit
    var welcomeSlot = el('div');
    container.appendChild(welcomeSlot);
    _maybeShowWelcome(welcomeSlot, 'steward');

    // KPIs
    var kpis = AppState.kpis || {};
    var kpiGrid = el('div', { className: 'kpi-grid' });
    var kpiItems = [
      { label: 'My Cases', value: kpis.totalCases || 0 },
      { label: 'Overdue', value: kpis.overdue || 0, color: kpis.overdue > 0 ? 'var(--danger)' : null },
      { label: 'Due <7d', value: kpis.dueSoon || 0, color: kpis.dueSoon > 0 ? 'var(--warning)' : null },
      { label: 'Resolved', value: kpis.resolved || 0, color: 'var(--success)' },
    ];
    kpiItems.forEach(function(kpi) {
      var card = el('div', { className: 'kpi-card' });
      card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
      var val = el('div', { className: 'kpi-value' }, String(kpi.value));
      if (kpi.color) val.style.color = kpi.color;
      card.appendChild(val);
      kpiGrid.appendChild(card);
    });
    container.appendChild(kpiGrid);

    // Filter bar
    var filter = 'all';
    var filterBar = el('div', { className: 'filter-bar' });
    var overdueCount = AppState.cases.filter(function(c) { return c.status === 'overdue'; }).length;
    var filters = [
      { key: 'all', label: 'All ' + AppState.cases.length },
      { key: 'overdue', label: 'Overdue ' + overdueCount },
      { key: 'active', label: 'Active' },
    ];

    filters.forEach(function(f) {
      var tab = el('button', {
        className: 'filter-tab' + (filter === f.key ? ' active' : ''),
        onClick: function() {
          filter = f.key;
          renderCaseList(caseListContainer, filter);
          filterBar.querySelectorAll('.filter-tab').forEach(function(t, i) {
            t.className = 'filter-tab' + (filters[i].key === filter ? ' active' : '');
          });
        }
      }, f.label);
      filterBar.appendChild(tab);
    });
    container.appendChild(filterBar);

    var caseListContainer = el('div', { className: 'content' });
    renderCaseList(caseListContainer, filter);
    container.appendChild(caseListContainer);

    // FAB — opens broadcast
    var fab = el('button', { className: 'fab', onClick: function() { renderBroadcast(document.getElementById('app')); } }, '\uD83D\uDCE2');
    container.appendChild(fab);
  });
}

// ═══════════════════════════════════════
// WELCOME EXPERIENCE (steward)
// ═══════════════════════════════════════

/**
 * Shows a welcome/onboarding card if it's the user's first visit.
 * Fetches welcome data from backend, renders card if isFirstVisit.
 * @param {Element} slot - Container element to insert the welcome card into
 * @param {string} viewRole - 'steward' or 'member'
 */
function _maybeShowWelcome(slot, viewRole) {
  // Skip if already dismissed in this session
  if (AppState._welcomeDismissed) return;

  google.script.run.withSuccessHandler(function(data) {
    if (!data || !data.isFirstVisit) return;

    var card = el('div', {
      className: 'card card-glass card-fade-in',
      style: {
        padding: '24px 20px',
        margin: '0 0 14px',
        background: 'linear-gradient(135deg, var(--accentBg), rgba(255,255,255,0.03))',
        border: '1px solid var(--accentBorder)',
        position: 'relative'
      }
    });

    // Header
    var safeName = (data.userName || 'there').replace(/[<>&"']/g, '');
    card.appendChild(el('div', {
      style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: 'var(--text)', marginBottom: '8px' }
    }, 'Welcome, ' + safeName + '!'));

    card.appendChild(el('div', {
      style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.5', marginBottom: '16px' }
    }, 'This is your ' + CONFIG.stewardLabel + ' dashboard. Track grievance cases, manage member communications, monitor deadlines, and access all your tools in one place.'));

    // Quick-start action cards grid
    var grid = el('div', {
      style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '16px' }
    });

    (data.quickActions || []).forEach(function(qa) {
      var actionCard = el('div', {
        className: 'card card-clickable',
        style: {
          padding: '12px',
          textAlign: 'center',
          cursor: 'pointer',
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: '10px'
        },
        onClick: function() {
          _dismissWelcome(card);
          _handleTabNav('steward', qa.action);
        }
      });
      actionCard.appendChild(el('div', { style: { fontSize: '22px', marginBottom: '4px' } }, qa.icon));
      actionCard.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontDisplay)' } }, qa.label));
      grid.appendChild(actionCard);
    });
    card.appendChild(grid);

    // Dismiss button
    card.appendChild(el('button', {
      className: 'btn',
      style: {
        width: '100%',
        background: 'var(--accent)',
        color: '#fff',
        border: 'none',
        borderRadius: '8px',
        padding: '10px',
        fontSize: '13px',
        fontWeight: '600',
        cursor: 'pointer'
      },
      onClick: function() { _dismissWelcome(card); }
    }, 'Got it!'));

    slot.appendChild(card);
  }).dataGetWelcomeData(CURRENT_USER.email);
}

/**
 * Dismisses the welcome card and saves preference.
 */
function _dismissWelcome(cardEl) {
  AppState._welcomeDismissed = true;
  if (cardEl) {
    cardEl.style.opacity = '0';
    cardEl.style.transition = 'opacity 0.3s ease';
    setTimeout(function() { cardEl.remove(); }, 300);
  }
  google.script.run.dataMarkWelcomeDismissed(CURRENT_USER.email);
}

function renderCaseList(container, filter) {
  container.innerHTML = '';
  var cases = AppState.cases;
  if (filter === 'overdue') cases = cases.filter(function(c) { return c.status === 'overdue'; });
  if (filter === 'active') cases = cases.filter(function(c) { return c.status === 'active' || c.status === 'new'; });

  if (cases.length === 0) {
    if (filter === 'all' && AppState.cases.length === 0) {
      // No cases at all — show agency-wide stats as fallback
      var agencySlot = el('div', { style: { textAlign: 'center', padding: '20px 0' } });
      agencySlot.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', marginBottom: '14px' } }, 'No cases currently assigned to you.'));
      agencySlot.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Agency-Wide Overview'));
      var agencyCharts = el('div');
      agencySlot.appendChild(agencyCharts);
      container.appendChild(agencySlot);
      google.script.run.withSuccessHandler(function(data) {
        if (!data || !data.available) {
          agencyCharts.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, 'Grievance stats not yet available.'));
          return;
        }
        agencyCharts.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '8px' } }, data.total + ' total grievances agency-wide'));
        if (typeof ChartHelper !== 'undefined') {
          var sLabels = Object.keys(data.byStatus);
          var sData = sLabels.map(function(k) { return data.byStatus[k]; });
          var sCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '8px', textAlign: 'left' } });
          sCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Status Breakdown'));
          ChartHelper.createDoughnutChart(sCard, 'agency-status-chart', sLabels, sData);
          agencyCharts.appendChild(sCard);
          if (data.byStep) {
            var stLabels = Object.keys(data.byStep);
            var stData = stLabels.map(function(k) { return data.byStep[k]; });
            var stCard = el('div', { className: 'card card-glass', style: { padding: '14px', textAlign: 'left' } });
            stCard.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Step'));
            ChartHelper.createBarChart(stCard, 'agency-step-chart', stLabels, [{ label: 'Count', data: stData }]);
            agencyCharts.appendChild(stCard);
          }
        }
      }).dataGetAgencyGrievanceStats();
    } else {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' } },
        'No ' + filter + ' cases.'));
    }
    return;
  }

  cases.forEach(function(c) {
    var isOverdue = c.status === 'overdue';
    var statusClass = c.status || 'active';
    var card = el('div', { className: 'card card-clickable', style: { padding: '11px 14px', marginBottom: '6px' } });

    var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
    var leftGroup = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
    leftGroup.appendChild(el('div', { className: 'status-dot ' + statusClass }));
    leftGroup.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, c.id));
    topRow.appendChild(leftGroup);

    var deadlineSpan = el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: isOverdue ? 'var(--danger)' : 'var(--muted)', fontWeight: isOverdue ? '700' : '400' } });
    deadlineSpan.textContent = c.deadlineDays !== null ? c.deadlineDays + 'd' : '\u2014';
    topRow.appendChild(deadlineSpan);
    card.appendChild(topRow);

    var bottomRow = el('div', { style: { paddingLeft: '15px', display: 'flex', justifyContent: 'space-between' } });
    var memberDisplay = c.memberEmail ? c.memberEmail.split('@')[0] : 'Unknown';
    bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)' } }, memberDisplay + ' \u00B7 ' + (c.step || '')));
    bottomRow.appendChild(el('span', { style: { fontFamily: 'var(--fontBody)', fontSize: '10px', color: 'var(--muted)' } }, c.unit || ''));
    card.appendChild(bottomRow);
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════
// BOTTOM NAV (shared by both views)
// ═══════════════════════════════════════

function renderBottomNav(container, role, activeTab) {
  var nav = el('div', { className: 'bottom-nav' });
  var tabs = role === 'steward' ? [
    { id: 'cases', icon: '\uD83D\uDCCB', label: 'Cases' },
    { id: 'members', icon: '\uD83D\uDC65', label: 'Members' },
    { id: 'insights', icon: '\uD83D\uDCCA', label: 'Insights' },
    { id: 'more_steward', icon: '\u2630', label: 'More' },
  ] : [
    { id: 'home', icon: '\uD83C\uDFE0', label: 'Home' },
    { id: 'cases', icon: '\uD83D\uDCCB', label: 'My Cases' },
    { id: 'contact', icon: '\uD83D\uDCAC', label: 'Contact' },
    { id: 'more', icon: '\u2630', label: 'More' },
  ];

  tabs.forEach(function(tab) {
    var item = el('div', {
      className: 'nav-item' + (tab.id === activeTab ? ' active' : ''),
      onClick: function() { _handleTabNav(role, tab.id === 'more_steward' ? '_steward_more' : tab.id === 'more' ? '_member_more' : tab.id); }
    });
    item.appendChild(el('span', { className: 'nav-icon' }, tab.icon));
    var label = el('span', { className: 'nav-label' }, tab.label);
    if (tab.id === activeTab) label.style.color = 'var(--accent)';
    item.appendChild(label);
    nav.appendChild(item);
  });

  container.appendChild(nav);
}

// ═══════════════════════════════════════
// MEMBERS TAB
// ═══════════════════════════════════════

function renderStewardMembers(appContainer) {
  renderPageLayout(appContainer, 'steward', 'members', function(container) {
    _stewardHeader(container, 'Members');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(members) {
      content.innerHTML = '';
      if (!members || members.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, 'No members assigned.'));
        return;
      }

      // KPI strip
      var activeGrievances = members.filter(function(m) { return m.hasOpenGrievance; }).length;
      var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)' } });
      [
        { label: 'Assigned', value: members.length },
        { label: 'Active Cases', value: activeGrievances, color: activeGrievances > 0 ? 'var(--warning)' : null },
        { label: 'Members', value: members.length, color: 'var(--accent)' },
      ].forEach(function(kpi) {
        var card = el('div', { className: 'kpi-card' });
        card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
        var val = el('div', { className: 'kpi-value' }, String(kpi.value));
        if (kpi.color) val.style.color = kpi.color;
        card.appendChild(val);
        kpiStrip.appendChild(card);
      });
      content.appendChild(kpiStrip);

      // Chart.js stats
      if (typeof ChartHelper !== 'undefined') {
        google.script.run.withSuccessHandler(function(stats) {
          if (!stats || !stats.byLocation) return;
          // Location bar
          var locCard = el('div', { className: 'card', style: { padding: '12px', marginBottom: '14px' } });
          locCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '12px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Location'));
          var lLabels = Object.keys(stats.byLocation);
          var lData = lLabels.map(function(k) { return stats.byLocation[k]; });
          ChartHelper.createHorizontalBarChart(locCard, 'members-loc-chart', lLabels, lData);
          // Insert after KPI strip
          var searchEl = content.querySelector('.search-input');
          if (searchEl) content.insertBefore(locCard, searchEl);
          else content.appendChild(locCard);
        }).dataGetStewardMemberStats(CURRENT_USER.email);
      }

      // Sort & Filter controls
      var controlRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px', flexWrap: 'wrap' } });
      var sortSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
      [{ v: 'name-az', l: 'Name A-Z' }, { v: 'name-za', l: 'Name Z-A' }, { v: 'location', l: 'Location' }].forEach(function(o) {
        sortSelect.appendChild(el('option', { value: o.v }, o.l));
      });
      controlRow.appendChild(sortSelect);

      var filterSelect = el('select', { className: 'form-select', style: { width: 'auto', fontSize: '12px', padding: '6px 10px' } });
      filterSelect.appendChild(el('option', { value: 'all' }, 'All'));
      filterSelect.appendChild(el('option', { value: 'grievance' }, 'Has Open Case'));
      var locs = {};
      members.forEach(function(m) { if (m.workLocation) locs[m.workLocation] = true; });
      Object.keys(locs).sort().forEach(function(loc) {
        filterSelect.appendChild(el('option', { value: 'loc:' + loc }, loc));
      });
      controlRow.appendChild(filterSelect);
      content.appendChild(controlRow);

      // Search
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search members...',
        onInput: rerender
      });
      content.appendChild(searchInput);

      var listArea = el('div');
      content.appendChild(listArea);

      sortSelect.addEventListener('change', rerender);
      filterSelect.addEventListener('change', rerender);

      function rerender() {
        _memberListPage = 0;
        var q = searchInput.value.toLowerCase();
        var sortKey = sortSelect.value;
        var filterKey = filterSelect.value;
        var filtered = members.slice();
        if (q) {
          filtered = filtered.filter(function(m) {
            return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
                   (m.email || '').toLowerCase().indexOf(q) !== -1 ||
                   (m.workLocation || '').toLowerCase().indexOf(q) !== -1;
          });
        }
        if (filterKey === 'grievance') {
          filtered = filtered.filter(function(m) { return m.hasOpenGrievance; });
        } else if (filterKey.indexOf('loc:') === 0) {
          var loc = filterKey.substring(4);
          filtered = filtered.filter(function(m) { return m.workLocation === loc; });
        }
        filtered.sort(function(a, b) {
          if (sortKey === 'name-za') return (b.name || '').localeCompare(a.name || '');
          if (sortKey === 'location') return (a.workLocation || '').localeCompare(b.workLocation || '');

          return (a.name || '').localeCompare(b.name || '');
        });
        renderFilteredMembers(listArea, filtered, '');
      }
      rerender();
    }).dataGetStewardMembers(CURRENT_USER.email);
  });
}

var _memberListPage = 0;
var _memberPageSize = 25;

function renderFilteredMembers(container, members, query) {
  container.innerHTML = '';
  var filtered = query ? members.filter(function(m) {
    return (m.name || '').toLowerCase().indexOf(query) !== -1 ||
           (m.email || '').toLowerCase().indexOf(query) !== -1 ||
           (m.workLocation || '').toLowerCase().indexOf(query) !== -1;
  }) : members;

  if (filtered.length === 0) {
    container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '16px 0', textAlign: 'center' } }, 'No matches.'));
    return;
  }

  // Reset to page 0 when query changes
  if (query) _memberListPage = 0;

  var totalPages = Math.ceil(filtered.length / _memberPageSize);
  if (_memberListPage >= totalPages) _memberListPage = totalPages - 1;
  if (_memberListPage < 0) _memberListPage = 0;
  var start = _memberListPage * _memberPageSize;
  var pageItems = filtered.slice(start, start + _memberPageSize);

  pageItems.forEach(function(m) {
    var item = el('div', { className: 'member-list-item' });
    item.appendChild(el('div', { className: 'member-list-avatar' }, (m.name || 'M').charAt(0).toUpperCase()));
    var info = el('div', { className: 'member-list-info' });
    info.appendChild(el('div', { className: 'member-list-name' }, m.name || m.email));
    var meta = m.workLocation || '';
    if (m.officeDays) meta += (meta ? ' \u00B7 ' : '') + m.officeDays;
    info.appendChild(el('div', { className: 'member-list-meta' }, meta));
    item.appendChild(info);

    var badges = el('div', { className: 'member-list-badges' });
    if (m.hasOpenGrievance) badges.appendChild(el('div', { className: 'status-dot active', title: 'Has open grievance' }));
    item.appendChild(badges);
    container.appendChild(item);
  });

  // Pagination controls
  if (totalPages > 1) {
    var pager = el('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '12px', padding: '12px 0' } });
    var prevBtn = el('button', {
      className: 'btn', disabled: _memberListPage === 0,
      style: { fontSize: '12px', padding: '6px 14px', opacity: _memberListPage === 0 ? '0.4' : '1' },
      onClick: function() { _memberListPage--; renderFilteredMembers(container, members, query); },
    }, '\u2190 Prev');
    pager.appendChild(prevBtn);
    pager.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--muted)' } },
      (start + 1) + '\u2013' + Math.min(start + _memberPageSize, filtered.length) + ' of ' + filtered.length));
    var nextBtn = el('button', {
      className: 'btn', disabled: _memberListPage >= totalPages - 1,
      style: { fontSize: '12px', padding: '6px 14px', opacity: _memberListPage >= totalPages - 1 ? '0.4' : '1' },
      onClick: function() { _memberListPage++; renderFilteredMembers(container, members, query); },
    }, 'Next \u2192');
    pager.appendChild(nextBtn);
    container.appendChild(pager);
  }
}

// ═══════════════════════════════════════
// BROADCAST
// ═══════════════════════════════════════

function renderBroadcast(appContainer) {
  renderPageLayout(appContainer, 'steward', 'broadcast', function(container) {
    _stewardHeader(container, 'Broadcast Message');
    var content = el('div', { className: 'content' });

    // State for selected checkboxes
    var selectedLocations = {};
    var selectedDays = {};

    // Recipient preview
    var recipientPreview = el('div', { style: { fontSize: '12px', color: 'var(--accent)', fontWeight: '600', marginBottom: '12px' } }, 'Loading filters...');
    content.appendChild(recipientPreview);

    // Location filter (checkboxes)
    var locationGroup = el('div', { className: 'form-group' });
    locationGroup.appendChild(el('label', { className: 'form-label' }, 'Filter by Location'));
    var locationCheckboxes = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginTop: '4px' } });
    locationGroup.appendChild(locationCheckboxes);
    content.appendChild(locationGroup);

    // Office days filter (checkboxes)
    var daysGroup = el('div', { className: 'form-group' });
    daysGroup.appendChild(el('label', { className: 'form-label' }, 'Filter by Office Days'));
    var daysCheckboxes = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginTop: '4px' } });
    daysGroup.appendChild(daysCheckboxes);
    content.appendChild(daysGroup);

    // Build checkbox pill helper
    function buildCheckboxPill(parentEl, label, stateObj) {
      var pill = el('button', {
        className: 'filter-tab',
        style: { fontSize: '12px', padding: '5px 12px' },
        onClick: function() {
          stateObj[label] = !stateObj[label];
          pill.className = 'filter-tab' + (stateObj[label] ? ' active' : '');
          updatePreview();
        }
      }, label);
      parentEl.appendChild(pill);
    }

    function updatePreview() {
      var locs = Object.keys(selectedLocations).filter(function(k) { return selectedLocations[k]; });
      var days = Object.keys(selectedDays).filter(function(k) { return selectedDays[k]; });
      var parts = [];
      if (locs.length > 0) parts.push(locs.length + ' location' + (locs.length > 1 ? 's' : ''));
      if (days.length > 0) parts.push(days.length + ' day' + (days.length > 1 ? 's' : ''));
      recipientPreview.textContent = parts.length > 0 ? 'Filtering: ' + parts.join(', ') : 'Sending to all assigned members';
    }

    // Fetch available filter options
    google.script.run.withSuccessHandler(function(opts) {
      // "Select All" for locations
      if (opts.locations.length > 0) {
        var allLocBtn = el('button', {
          className: 'filter-tab', style: { fontSize: '11px', padding: '4px 10px', fontWeight: '600' },
          onClick: function() {
            var allSelected = opts.locations.every(function(l) { return selectedLocations[l]; });
            opts.locations.forEach(function(l) { selectedLocations[l] = !allSelected; });
            locationCheckboxes.querySelectorAll('.filter-tab:not(:first-child)').forEach(function(p) {
              p.className = 'filter-tab' + (!allSelected ? ' active' : '');
            });
            updatePreview();
          }
        }, 'All');
        locationCheckboxes.appendChild(allLocBtn);
        opts.locations.forEach(function(loc) { buildCheckboxPill(locationCheckboxes, loc, selectedLocations); });
      } else {
        locationCheckboxes.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--muted)' } }, 'No location data available'));
      }

      if (opts.officeDays.length > 0) {
        opts.officeDays.forEach(function(day) { buildCheckboxPill(daysCheckboxes, day, selectedDays); });
      } else {
        daysCheckboxes.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--muted)' } }, 'No office day data available'));
      }

      updatePreview();
    }).dataGetBroadcastFilterOptions(CURRENT_USER.email);

    // Message
    var msgGroup = el('div', { className: 'form-group' });
    msgGroup.appendChild(el('label', { className: 'form-label' }, 'Message'));
    var msgTextarea = el('textarea', { className: 'msg-textarea', placeholder: 'Type your message to members...' });
    msgGroup.appendChild(msgTextarea);
    content.appendChild(msgGroup);

    var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '10px' } });
    content.appendChild(statusMsg);

    content.appendChild(el('button', {
      className: 'btn btn-primary',
      onClick: function() {
        var msg = msgTextarea.value.trim();
        if (!msg) { statusMsg.textContent = 'Please enter a message.'; statusMsg.style.color = 'var(--danger)'; return; }
        var filter = {};
        var locs = Object.keys(selectedLocations).filter(function(k) { return selectedLocations[k]; });
        var days = Object.keys(selectedDays).filter(function(k) { return selectedDays[k]; });
        if (locs.length > 0) filter.location = locs.join(',');
        if (days.length > 0) filter.officeDays = days.join(',');
        statusMsg.textContent = 'Sending...';
        statusMsg.style.color = 'var(--muted)';
        google.script.run.withSuccessHandler(function(result) {
          statusMsg.textContent = result && result.success ? result.message : (result && result.message) || 'Error sending.';
          statusMsg.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
          if (result && result.success) msgTextarea.value = '';
        }).withFailureHandler(function() {
          statusMsg.textContent = 'Error sending. Try again.';
          statusMsg.style.color = 'var(--danger)';
        }).dataSendBroadcast(CURRENT_USER.email, filter, msg);
      }
    }, 'Send Broadcast'));

    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// STEWARD NOTIFICATIONS
// ═══════════════════════════════════════

function renderStewardNotifications(appContainer) {
  renderPageLayout(appContainer, 'steward', 'notifications', function(container) {
    _stewardHeader(container, 'Notifications', 'View, compose, and manage');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'inbox';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['inbox', 'compose', 'manage'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'inbox') _renderNotifInbox(subContent);
      else if (activeSubTab === 'compose') _renderNotifCompose(subContent);
      else _renderNotifManage(subContent);
    }

    // --- Inbox: same as member notification list ---
    function _renderNotifInbox(target) {
      showLoading(target);
      google.script.run.withSuccessHandler(function(notifications) {
        target.innerHTML = '';
        if (!notifications || notifications.length === 0) {
          var empty = el('div', { style: { textAlign: 'center', padding: '48px 16px' } });
          empty.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\uD83D\uDD14'));
          empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700' } }, 'All caught up!'));
          empty.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginTop: '6px' } }, 'No new notifications'));
          target.appendChild(empty);
          return;
        }
        var typeColors = { System: 'system', Announcement: 'announcement', 'Steward Message': 'steward', Deadline: 'deadline' };
        notifications.forEach(function(n, idx) {
          var card = el('div', {
            className: 'card card-glass notif-card card-fade-in' + (n.priority === 'Urgent' ? ' notif-urgent-border' : ''),
            style: { animationDelay: (idx * 60) + 'ms' }
          });
          var top = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' } });
          var typeClass = typeColors[n.type] || 'system';
          top.appendChild(el('span', { className: 'notif-type-badge notif-type-' + typeClass }, n.type));
          if (n.priority === 'Urgent') top.appendChild(el('span', { className: 'notif-type-badge notif-type-deadline' }, 'Urgent'));
          card.appendChild(top);
          card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '700', color: 'var(--text)', paddingRight: '28px' } }, n.title));
          card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginTop: '6px', lineHeight: '1.5' } }, n.message));
          var meta = el('div', { className: 'notif-meta' });
          if (n.sentBy) meta.appendChild(el('span', null, 'From: ' + n.sentBy + '  '));
          if (n.createdDate) meta.appendChild(el('span', null, n.createdDate));
          if (n.expiresDate) meta.appendChild(el('span', null, '  \u00B7 Expires: ' + n.expiresDate));
          card.appendChild(meta);
          var dismissBtn = el('button', { className: 'notif-dismiss', onClick: function() {
            dismissBtn.textContent = '...';
            google.script.run.withSuccessHandler(function(r) {
              if (r && r.success) {
                card.style.opacity = '0';
                card.style.transition = 'opacity 0.3s';
                setTimeout(function() { card.remove(); }, 300);
                AppState.notificationCount = Math.max(0, AppState.notificationCount - 1);
              }
            }).dismissWebAppNotification(n.id, CURRENT_USER.email);
          }}, '\u2715');
          card.appendChild(dismissBtn);
          target.appendChild(card);
        });
      }).withFailureHandler(function() {
        target.innerHTML = '';
        target.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--danger)' } }, 'Failed to load notifications.'));
      }).getWebAppNotifications(CURRENT_USER.email, 'steward');
    }

    // --- Compose: send new notification ---
    function _renderNotifCompose(target) {
      // Recipient mode
      var selectedRecipient = '';
      var recipientMode = 'group'; // 'group' or 'individual'

      var modeBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px' } });
      var groupBtn = el('button', { className: 'filter-tab active', onClick: function() {
        recipientMode = 'group'; groupBtn.className = 'filter-tab active'; indivBtn.className = 'filter-tab';
        recipientArea.innerHTML = ''; buildGroupPicker();
      }}, 'Groups');
      var indivBtn = el('button', { className: 'filter-tab', onClick: function() {
        recipientMode = 'individual'; indivBtn.className = 'filter-tab active'; groupBtn.className = 'filter-tab';
        recipientArea.innerHTML = ''; buildIndividualPicker();
      }}, 'Individual');
      modeBar.appendChild(groupBtn);
      modeBar.appendChild(indivBtn);

      var recipientArea = el('div');
      var selectedDisplay = el('div', { style: { fontSize: '12px', color: 'var(--accent)', fontWeight: '600', minHeight: '20px', marginBottom: '8px' } });

      function buildGroupPicker() {
        var groups = ['All Members', 'All Stewards', 'Everyone'];
        groups.forEach(function(g) {
          recipientArea.appendChild(el('button', {
            className: 'filter-tab' + (selectedRecipient === g ? ' active' : ''),
            style: { marginRight: '6px', marginBottom: '6px' },
            onClick: function() {
              selectedRecipient = g;
              selectedDisplay.textContent = 'To: ' + g;
              buildGroupPicker();
            }
          }, g));
        });
      }

      function buildIndividualPicker() {
        var searchInput = el('input', { className: 'form-input', placeholder: 'Search members...', style: { marginBottom: '8px' } });
        var listWrap = el('div', { style: { maxHeight: '180px', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: '8px' } });
        recipientArea.appendChild(searchInput);
        recipientArea.appendChild(listWrap);

        google.script.run.withSuccessHandler(function(members) {
          var allMembers = members || [];
          function renderList(filter) {
            listWrap.innerHTML = '';
            var filtered = filter ? allMembers.filter(function(m) {
              return (m.name || '').toLowerCase().indexOf(filter) !== -1 || (m.email || '').toLowerCase().indexOf(filter) !== -1;
            }) : allMembers;
            filtered.slice(0, 50).forEach(function(m) {
              var row = el('div', {
                style: { padding: '8px 12px', cursor: 'pointer', fontSize: '13px', borderBottom: '1px solid var(--border)', background: selectedRecipient === m.email ? 'var(--accentBg)' : 'transparent' },
                onClick: function() {
                  selectedRecipient = m.email;
                  selectedDisplay.textContent = 'To: ' + m.name + ' (' + m.email + ')';
                  renderList(searchInput.value.trim().toLowerCase());
                }
              }, m.name + ' — ' + m.email);
              listWrap.appendChild(row);
            });
          }
          renderList('');
          searchInput.addEventListener('input', function() { renderList(searchInput.value.trim().toLowerCase()); });
        }).getNotificationRecipientListFull();
      }

      buildGroupPicker();

      // Type
      var typeGroup = el('div', { className: 'form-group' });
      typeGroup.appendChild(el('label', { className: 'form-label' }, 'Type'));
      var typeSelect = el('select', { className: 'form-input' });
      ['Steward Message', 'Announcement', 'Deadline', 'System'].forEach(function(t) {
        typeSelect.appendChild(el('option', { value: t }, t));
      });
      typeGroup.appendChild(typeSelect);

      // Priority
      var selectedPriority = 'Normal';
      var prioBar = el('div', { style: { display: 'flex', gap: '8px', margin: '8px 0' } });
      var normalBtn = el('button', { className: 'filter-tab active', onClick: function() {
        selectedPriority = 'Normal'; normalBtn.className = 'filter-tab active'; urgentBtn.className = 'filter-tab';
      }}, 'Normal');
      var urgentBtn = el('button', { className: 'filter-tab', onClick: function() {
        selectedPriority = 'Urgent'; urgentBtn.className = 'filter-tab active'; normalBtn.className = 'filter-tab';
      }}, 'Urgent');
      prioBar.appendChild(normalBtn);
      prioBar.appendChild(urgentBtn);

      // Title + Message
      var titleInput = el('input', { className: 'form-input', placeholder: 'Notification title' });
      var msgTextarea = el('textarea', { className: 'msg-textarea', placeholder: 'Write your message...' });

      // Expires
      var expiresGroup = el('div', { className: 'form-group' });
      expiresGroup.appendChild(el('label', { className: 'form-label' }, 'Expires (optional)'));
      var expiresInput = el('input', { className: 'form-input', type: 'date' });
      expiresGroup.appendChild(expiresInput);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '10px' } });

      var sendBtn = el('button', { className: 'btn btn-primary', onClick: function() {
        if (!selectedRecipient) { statusMsg.textContent = 'Please select a recipient.'; statusMsg.style.color = 'var(--danger)'; return; }
        if (!titleInput.value.trim()) { statusMsg.textContent = 'Please enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
        if (!msgTextarea.value.trim()) { statusMsg.textContent = 'Please enter a message.'; statusMsg.style.color = 'var(--danger)'; return; }

        sendBtn.textContent = 'Sending...';
        sendBtn.disabled = true;
        statusMsg.textContent = '';
        google.script.run.withSuccessHandler(function(r) {
          sendBtn.textContent = 'Send Notification';
          sendBtn.disabled = false;
          if (r && r.success) {
            statusMsg.textContent = 'Notification sent! (' + r.notificationId + ')';
            statusMsg.style.color = 'var(--success)';
            titleInput.value = '';
            msgTextarea.value = '';
          } else {
            statusMsg.textContent = (r && r.message) || 'Error sending.';
            statusMsg.style.color = 'var(--danger)';
          }
        }).withFailureHandler(function() {
          sendBtn.textContent = 'Send Notification';
          sendBtn.disabled = false;
          statusMsg.textContent = 'Error sending. Try again.';
          statusMsg.style.color = 'var(--danger)';
        }).sendWebAppNotification({
          recipient: selectedRecipient,
          type: typeSelect.value,
          title: titleInput.value.trim(),
          message: msgTextarea.value.trim(),
          priority: selectedPriority,
          expiresDate: expiresInput.value || '',
          senderName: CURRENT_USER.name || ''
        });
      }}, 'Send Notification');

      // Assemble form
      target.appendChild(el('label', { className: 'form-label' }, 'Recipient'));
      target.appendChild(modeBar);
      target.appendChild(recipientArea);
      target.appendChild(selectedDisplay);
      target.appendChild(typeGroup);
      target.appendChild(el('label', { className: 'form-label' }, 'Priority'));
      target.appendChild(prioBar);
      target.appendChild(el('div', { className: 'form-group' }, [
        el('label', { className: 'form-label' }, 'Title'),
        titleInput
      ]));
      target.appendChild(el('div', { className: 'form-group' }, [
        el('label', { className: 'form-label' }, 'Message'),
        msgTextarea
      ]));
      target.appendChild(expiresGroup);
      target.appendChild(statusMsg);
      target.appendChild(sendBtn);
    }

    // --- Manage: view all notifications ---
    function _renderNotifManage(target) {
      showLoading(target);
      google.script.run.withSuccessHandler(function(notifications) {
        target.innerHTML = '';
        if (!notifications || notifications.length === 0) {
          target.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'No notifications found.'));
          return;
        }
        var typeColors = { System: 'system', Announcement: 'announcement', 'Steward Message': 'steward', Deadline: 'deadline' };
        notifications.forEach(function(n) {
          var row = el('div', { className: 'res-manage-row', style: { flexWrap: 'wrap' } });
          var typeClass = typeColors[n.type] || 'system';
          row.appendChild(el('span', { className: 'notif-type-badge notif-type-' + typeClass, style: { fontSize: '10px' } }, n.type));
          row.appendChild(el('span', { className: 'res-manage-title' }, n.title));
          row.appendChild(el('span', { className: 'res-manage-meta' }, 'To: ' + n.recipient));
          row.appendChild(el('span', { className: 'res-manage-meta' }, n.createdDate));
          target.appendChild(row);
        });
      }).withFailureHandler(function() {
        target.innerHTML = '';
        target.appendChild(el('div', { style: { padding: '24px', color: 'var(--danger)' } }, 'Failed to load.'));
      }).getWebAppNotifications(CURRENT_USER.email, 'steward');
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════

function renderStewardResources(appContainer) {
  renderPageLayout(appContainer, 'steward', 'resources', function(container) {
    _stewardHeader(container, 'Resources', 'Browse and manage content');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'browse';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['browse', 'manage'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'browse') _renderResourceBrowse(subContent);
      else _renderResourceManage(subContent);
    }

    // --- Browse: same as member hub but steward audience ---
    function _renderResourceBrowse(target) {
      // Quick links
      var quickLinks = [
        { icon: '\uD83D\uDCC5', label: 'Calendar', sub: 'Upcoming meetings & events', url: CONFIG.calendarUrl },
        { icon: '\uD83D\uDCC2', label: 'Shared Drive', sub: 'Contracts, documents & templates', url: CONFIG.driveFolderUrl },
      ];
      if (CONFIG.orgWebsite) quickLinks.push({ icon: '\uD83C\uDF10', label: 'SEIU 509 Website', sub: CONFIG.orgWebsite, url: CONFIG.orgWebsite });

      quickLinks.forEach(function(r) {
        if (!r.url) return;
        var item = el('div', {
          className: 'card card-clickable',
          style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '13px 16px' },
          onClick: function() { window.open(r.url, '_blank'); }
        });
        item.appendChild(el('span', { style: { fontSize: '18px' } }, r.icon));
        var tg = el('div', { style: { flex: '1' } });
        tg.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, r.label));
        tg.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, r.sub));
        item.appendChild(tg);
        item.appendChild(el('span', { style: { color: 'var(--muted)', fontSize: '14px' } }, '\u203A'));
        target.appendChild(item);
      });

      // Know Your Rights section
      var hubSection = el('div', { style: { marginTop: '20px' } });
      hubSection.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)', marginBottom: '12px' } }, 'Know Your Rights'));
      var searchInput = el('input', { className: 'search-input form-input', placeholder: 'Search resources...', style: { marginBottom: '8px' } });
      hubSection.appendChild(searchInput);
      var pillsWrap = el('div', { className: 'res-pills' });
      hubSection.appendChild(pillsWrap);
      var cardsWrap = el('div');
      hubSection.appendChild(cardsWrap);
      target.appendChild(hubSection);

      var allResources = [];
      var activeCategory = 'All';
      showLoading(cardsWrap);

      google.script.run.withSuccessHandler(function(resources) {
        allResources = resources || [];
        var categories = ['All'];
        allResources.forEach(function(r) { if (r.category && categories.indexOf(r.category) === -1) categories.push(r.category); });
        renderPills(categories);
        renderCards();
      }).withFailureHandler(function() {
        cardsWrap.innerHTML = '';
        cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'Unable to load resources.'));
      }).getWebAppResourcesList('Stewards');

      function renderPills(categories) {
        pillsWrap.innerHTML = '';
        categories.forEach(function(cat) {
          pillsWrap.appendChild(el('button', {
            className: 'res-pill' + (activeCategory === cat ? ' active' : ''),
            onClick: function() { activeCategory = cat; renderPills(categories); renderCards(); }
          }, cat));
        });
      }

      function renderCards() {
        cardsWrap.innerHTML = '';
        var searchTerm = (searchInput.value || '').toLowerCase().trim();
        var filtered = allResources.filter(function(r) {
          if (activeCategory !== 'All' && r.category !== activeCategory) return false;
          if (searchTerm) {
            return (r.title || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                   (r.summary || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                   (r.content || '').toLowerCase().indexOf(searchTerm) !== -1;
          }
          return true;
        });
        if (filtered.length === 0) {
          cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '32px 16px', color: 'var(--muted)' } }, 'No resources match your search.'));
          return;
        }
        filtered.forEach(function(r, idx) {
          var card = el('div', { className: 'card card-glass res-card card-clickable card-fade-in', style: { animationDelay: (idx * 50) + 'ms' } });
          card.appendChild(el('div', { className: 'res-card-icon' }, r.icon || '\uD83D\uDCC4'));
          card.appendChild(el('span', { className: 'notif-type-badge notif-type-announcement', style: { fontSize: '10px', marginBottom: '6px' } }, r.category));
          card.appendChild(el('div', { className: 'res-card-title' }, r.title));
          card.appendChild(el('div', { className: 'res-card-summary' }, r.summary));
          var hint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Tap to read more \u25BE');
          card.appendChild(hint);
          var expandContent = el('div', { className: 'res-card-content' });
          if (r.content) expandContent.appendChild(el('div', null, r.content));
          if (r.url) expandContent.appendChild(el('a', { className: 'res-card-link', href: r.url, target: '_blank' }, '\uD83D\uDD17 Open Resource'));
          if (r.dateAdded) expandContent.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Added: ' + r.dateAdded));
          card.appendChild(expandContent);
          card.addEventListener('click', function() {
            card.classList.toggle('expanded');
            hint.textContent = card.classList.contains('expanded') ? 'Tap to collapse \u25B4' : 'Tap to read more \u25BE';
          });
          cardsWrap.appendChild(card);
        });
      }
      searchInput.addEventListener('input', function() { renderCards(); });
    }

    // --- Manage: CRUD for all resources ---
    function _renderResourceManage(target) {
      var listWrap = el('div');
      var formWrap = el('div');
      target.appendChild(listWrap);
      target.appendChild(formWrap);

      var addBtn = el('button', { className: 'btn btn-primary', style: { marginBottom: '12px' }, onClick: function() {
        showResourceForm(null);
      }}, '+ Add Resource');
      listWrap.appendChild(addBtn);

      var tableWrap = el('div');
      listWrap.appendChild(tableWrap);
      loadResourceList();

      function loadResourceList() {
        showLoading(tableWrap);
        google.script.run.withSuccessHandler(function(resources) {
          tableWrap.innerHTML = '';
          formWrap.innerHTML = '';
          if (!resources || resources.length === 0) {
            tableWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'No resources yet. Add one above!'));
            return;
          }
          resources.forEach(function(r) {
            var row = el('div', { className: 'res-manage-row' + (r.visible ? '' : ' hidden-res') });
            row.appendChild(el('span', { style: { fontSize: '20px', flexShrink: '0' } }, r.icon || '\uD83D\uDCC4'));
            var info = el('div', { style: { flex: '1', minWidth: '0' } });
            info.appendChild(el('div', { className: 'res-manage-title' }, r.title));
            info.appendChild(el('div', { className: 'res-manage-meta' }, r.category + ' \u00B7 ' + r.audience + ' \u00B7 ' + (r.visible ? 'Visible' : 'Hidden')));
            row.appendChild(info);
            row.appendChild(el('span', { className: 'res-status-dot ' + (r.visible ? 'visible' : 'hidden') }));
            row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px' }, onClick: function() { showResourceForm(r); }}, '\u270E'));
            if (r.visible) {
              row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px', color: 'var(--danger)' }, onClick: function() {
                if (confirm('Hide "' + r.title + '"? It can be restored later.')) {
                  google.script.run.withSuccessHandler(function() { loadResourceList(); }).deleteWebAppResource(r.id);
                }
              }}, '\uD83D\uDDD1'));
            } else {
              row.appendChild(el('button', { className: 'icon-btn', style: { fontSize: '14px', color: 'var(--success)' }, onClick: function() {
                google.script.run.withSuccessHandler(function() { loadResourceList(); }).restoreWebAppResource(r.id);
              }}, '\u21A9'));
            }
            tableWrap.appendChild(row);
          });
        }).withFailureHandler(function() {
          tableWrap.innerHTML = '';
          tableWrap.appendChild(el('div', { style: { padding: '24px', color: 'var(--danger)' } }, 'Failed to load resources.'));
        }).getWebAppResourcesListAll();
      }

      function showResourceForm(existing) {
        formWrap.innerHTML = '';
        listWrap.style.display = 'none';

        var isEdit = !!existing;
        formWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', marginBottom: '14px' } }, isEdit ? 'Edit Resource' : 'Add Resource'));

        var fields = {};
        function addField(label, key, type, opts) {
          var group = el('div', { className: 'form-group' });
          group.appendChild(el('label', { className: 'form-label' }, label));
          var input;
          if (type === 'textarea') {
            input = el('textarea', { className: 'msg-textarea', style: opts && opts.style || {} });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          } else if (type === 'select') {
            input = el('select', { className: 'form-input' });
            (opts.options || []).forEach(function(o) { input.appendChild(el('option', { value: o }, o)); });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          } else {
            input = el('input', { className: 'form-input', type: type || 'text' });
            input.value = (existing && existing[key]) || (opts && opts.defaultVal) || '';
          }
          fields[key] = input;
          group.appendChild(input);
          formWrap.appendChild(group);
        }

        addField('Title *', 'title', 'text');
        addField('Category', 'category', 'select', { options: ['General', 'Know Your Rights', 'Contracts', 'Benefits', 'Workplace Safety', 'Union History', 'Legal', 'Training', 'FAQs'], defaultVal: 'General' });
        addField('Summary', 'summary', 'textarea');
        addField('Content', 'content', 'textarea', { style: { minHeight: '120px' } });
        addField('URL (optional)', 'url', 'text');
        addField('Icon', 'icon', 'text', { defaultVal: '\uD83D\uDCC4' });
        addField('Sort Order', 'sortOrder', 'number', { defaultVal: '999' });

        // Visible toggle
        var visGroup = el('div', { className: 'form-group' });
        visGroup.appendChild(el('label', { className: 'form-label' }, 'Visible'));
        var visVal = existing ? (existing.visible ? 'Yes' : 'No') : 'Yes';
        var visBar = el('div', { style: { display: 'flex', gap: '8px' } });
        var visYes = el('button', { className: 'filter-tab' + (visVal === 'Yes' ? ' active' : ''), onClick: function() { visVal = 'Yes'; visYes.className = 'filter-tab active'; visNo.className = 'filter-tab'; }}, 'Yes');
        var visNo = el('button', { className: 'filter-tab' + (visVal === 'No' ? ' active' : ''), onClick: function() { visVal = 'No'; visNo.className = 'filter-tab active'; visYes.className = 'filter-tab'; }}, 'No');
        visBar.appendChild(visYes);
        visBar.appendChild(visNo);
        visGroup.appendChild(visBar);
        formWrap.appendChild(visGroup);

        // Audience toggle
        var audGroup = el('div', { className: 'form-group' });
        audGroup.appendChild(el('label', { className: 'form-label' }, 'Audience'));
        var audVal = (existing && existing.audience) || 'All';
        var audBar = el('div', { style: { display: 'flex', gap: '8px' } });
        var audBtns = {};
        ['All', 'Members', 'Stewards'].forEach(function(a) {
          audBtns[a] = el('button', { className: 'filter-tab' + (audVal === a ? ' active' : ''), onClick: function() {
            audVal = a;
            for (var k in audBtns) audBtns[k].className = 'filter-tab' + (k === a ? ' active' : '');
          }}, a);
          audBar.appendChild(audBtns[a]);
        });
        audGroup.appendChild(audBar);
        formWrap.appendChild(audGroup);

        var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginBottom: '10px' } });
        formWrap.appendChild(statusMsg);

        var btnRow = el('div', { style: { display: 'flex', gap: '8px' } });
        var saveBtn = el('button', { className: 'btn btn-primary', onClick: function() {
          if (!fields.title.value.trim()) { statusMsg.textContent = 'Title is required.'; statusMsg.style.color = 'var(--danger)'; return; }
          saveBtn.textContent = 'Saving...';
          saveBtn.disabled = true;
          var payload = {
            title: fields.title.value.trim(),
            category: fields.category.value,
            summary: fields.summary.value.trim(),
            content: fields.content.value.trim(),
            url: fields.url.value.trim(),
            icon: fields.icon.value.trim() || '\uD83D\uDCC4',
            sortOrder: parseInt(fields.sortOrder.value, 10) || 999,
            visible: visVal,
            audience: audVal
          };
          if (isEdit) {
            google.script.run.withSuccessHandler(function(r) {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              if (r && r.success) { listWrap.style.display = ''; formWrap.innerHTML = ''; loadResourceList(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              statusMsg.textContent = 'Error saving.'; statusMsg.style.color = 'var(--danger)';
            }).updateWebAppResource(existing.id, payload);
          } else {
            google.script.run.withSuccessHandler(function(r) {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              if (r && r.success) { listWrap.style.display = ''; formWrap.innerHTML = ''; loadResourceList(); }
              else { statusMsg.textContent = (r && r.message) || 'Error.'; statusMsg.style.color = 'var(--danger)'; }
            }).withFailureHandler(function() {
              saveBtn.textContent = 'Save'; saveBtn.disabled = false;
              statusMsg.textContent = 'Error saving.'; statusMsg.style.color = 'var(--danger)';
            }).addWebAppResource(payload);
          }
        }}, 'Save');
        var cancelBtn = el('button', { className: 'btn', style: { background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--text)' }, onClick: function() {
          listWrap.style.display = '';
          formWrap.innerHTML = '';
        }}, 'Cancel');
        btnRow.appendChild(saveBtn);
        btnRow.appendChild(cancelBtn);
        formWrap.appendChild(btnRow);
      }
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function renderSurveyTracking(appContainer) {
  renderPageLayout(appContainer, 'steward', 'surveytrack', function(container) {
    _stewardHeader(container, 'Survey Tracking');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(data) {
      content.innerHTML = '';
      if (!data || data.total === 0) {
        content.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No assigned members to track.'));
        return;
      }

      // Progress chart (doughnut)
      var pct = Math.round((data.completed / data.total) * 100);
      var progCard = el('div', { className: 'card', style: { padding: '18px', marginBottom: '14px' } });
      progCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Completion: ' + data.completed + '/' + data.total));

      if (typeof ChartHelper !== 'undefined') {
        var remaining = data.total - data.completed;
        var cColor = pct >= 80 ? '#4ade80' : pct >= 50 ? '#facc15' : '#ef4444';
        ChartHelper.createDoughnutChart(progCard, 'survey-track-chart',
          ['Completed', 'Pending'],
          [data.completed, remaining],
          [cColor, 'rgba(255,255,255,0.08)']
        );
      } else {
        var track = el('div', { className: 'bar-chart-track', style: { height: '10px' } });
        track.appendChild(el('div', { className: 'bar-chart-fill', style: { width: pct + '%', background: pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)' } }));
        progCard.appendChild(track);
      }
      progCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '4px' } }, pct + '% complete'));
      content.appendChild(progCard);

      // Member list with checkmarks
      (data.members || []).forEach(function(m) {
        var item = el('div', { className: 'member-list-item' });
        item.appendChild(el('div', { className: 'member-list-avatar' }, (m.name || 'M').charAt(0).toUpperCase()));
        var info = el('div', { className: 'member-list-info' });
        info.appendChild(el('div', { className: 'member-list-name' }, m.name || m.email));
        if (m.lastCompleted) info.appendChild(el('div', { className: 'member-list-meta' }, 'Completed ' + m.lastCompleted));
        item.appendChild(info);
        item.appendChild(el('span', { style: { fontSize: '16px', color: m.completed ? 'var(--success)' : 'var(--muted)' } }, m.completed ? '\u2705' : '\u2B1C'));
        content.appendChild(item);
      });
    }).dataGetStewardSurveyTracking(CURRENT_USER.email);
  });
}

function renderContactLog(appContainer) {
  renderPageLayout(appContainer, 'steward', 'contactlog', function(container) {
    _stewardHeader(container, 'Contact Log');
    var content = el('div', { className: 'content' });

    // Sub-tabs
    var activeSubTab = 'log';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['log', 'recent', 'by member'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'log') _renderContactForm(subContent);
      else if (activeSubTab === 'recent') _renderRecentContacts(subContent);
      else _renderContactByMember(subContent);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderContactForm(container) {
  var typeIcons = { 'Phone': '\uD83D\uDCDE', 'Email': '\u2709\uFE0F', 'In Person': '\uD83D\uDC64', 'Text': '\uD83D\uDCAC' };
  container.appendChild(el('h3', { className: 'section-title' }, 'Log a Contact'));

  var memberGroup = el('div', { className: 'form-group' });
  memberGroup.appendChild(el('label', { className: 'form-label' }, 'Member Email'));
  var memberInput = el('input', { className: 'form-input', placeholder: 'member@example.com' });
  memberGroup.appendChild(memberInput);
  container.appendChild(memberGroup);

  var typeGroup = el('div', { className: 'form-group' });
  typeGroup.appendChild(el('label', { className: 'form-label' }, 'Contact Type'));
  var typeRow = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
  var selectedType = 'Phone';
  Object.keys(typeIcons).forEach(function(t) {
    var btn = el('button', {
      className: 'filter-tab' + (t === selectedType ? ' active' : ''),
      onClick: function() {
        selectedType = t;
        typeRow.querySelectorAll('.filter-tab').forEach(function(b, i) {
          b.className = 'filter-tab' + (Object.keys(typeIcons)[i] === t ? ' active' : '');
        });
      }
    }, typeIcons[t] + ' ' + t);
    typeRow.appendChild(btn);
  });
  typeGroup.appendChild(typeRow);
  container.appendChild(typeGroup);

  var notesGroup = el('div', { className: 'form-group' });
  notesGroup.appendChild(el('label', { className: 'form-label' }, 'Notes (optional)'));
  var notesInput = el('textarea', { className: 'msg-textarea', placeholder: 'Brief notes about the interaction...', style: { minHeight: '60px' } });
  notesGroup.appendChild(notesInput);
  container.appendChild(notesGroup);

  var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
  container.appendChild(statusMsg);

  container.appendChild(el('button', {
    className: 'btn btn-primary',
    onClick: function() {
      var email = memberInput.value.trim();
      if (!email) { statusMsg.textContent = 'Enter a member email.'; statusMsg.style.color = 'var(--danger)'; return; }
      statusMsg.textContent = 'Logging...'; statusMsg.style.color = 'var(--muted)';
      google.script.run.withSuccessHandler(function(r) {
        statusMsg.textContent = r && r.success ? 'Contact logged!' : 'Error logging contact.';
        statusMsg.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';
        if (r && r.success) { memberInput.value = ''; notesInput.value = ''; }
      }).dataLogMemberContact(CURRENT_USER.email, email, selectedType, notesInput.value.trim(), '');
    }
  }, 'Log Contact'));
}

function _renderRecentContacts(container) {
  showLoading(container);
  google.script.run.withSuccessHandler(function(log) {
    container.innerHTML = '';
    if (!log || log.length === 0) {
      container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No contacts logged yet.'));
      return;
    }
    log.slice(0, 20).forEach(function(entry) {
      var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px' } });
      var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
      top.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, entry.memberEmail ? entry.memberEmail.split('@')[0] : ''));
      top.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, entry.date));
      card.appendChild(top);
      card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--accent)' } }, entry.type));
      if (entry.notes) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, entry.notes));
      container.appendChild(card);
    });
  }).dataGetStewardContactLog(CURRENT_USER.email);
}

function _renderContactByMember(container) {
  container.appendChild(el('h3', { className: 'section-title' }, 'Look Up by Member'));
  var searchInput = el('input', { className: 'form-input', placeholder: 'Enter member email...' });
  container.appendChild(searchInput);
  var resultArea = el('div', { style: { marginTop: '10px' } });
  container.appendChild(resultArea);

  container.appendChild(el('button', {
    className: 'btn btn-secondary', style: { marginTop: '10px' },
    onClick: function() {
      var email = searchInput.value.trim();
      if (!email) return;
      showLoading(resultArea);
      google.script.run.withSuccessHandler(function(history) {
        resultArea.innerHTML = '';
        if (!history || history.length === 0) {

        history.forEach(function(entry) {

            el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, entry.date),
          ]));
          if (entry.notes) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, entry.notes));
          resultArea.appendChild(card);
        });
      }).dataGetMemberContactHistory(CURRENT_USER.email, email);
    }
  }, 'Search'));
}

function renderStewardTasks(appContainer) {
  renderPageLayout(appContainer, 'steward', 'tasks', function(container) {
    _stewardHeader(container, 'Tasks');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'open';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['open', 'completed', 'new task'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'new task') _renderNewTaskForm(subContent, function() { activeSubTab = 'open'; refreshSubTabs(); renderSubContent(); });
      else _renderTaskList(subContent, activeSubTab === 'completed' ? 'completed' : null);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderTaskList(container, statusFilter) {
  showLoading(container);
  google.script.run.withSuccessHandler(function(tasks) {
    container.innerHTML = '';
    var filtered = statusFilter ? tasks.filter(function(t) { return t.status === statusFilter; }) : tasks.filter(function(t) { return t.status !== 'completed'; });

    if (filtered.length === 0) {
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, statusFilter === 'completed' ? 'No completed tasks.' : 'No open tasks. Create one!'));
      return;
    }

    // KPI strip
    var highPri = filtered.filter(function(t) { return t.priority === 'high'; }).length;
    var overdue = filtered.filter(function(t) { return t.dueDays !== null && t.dueDays < 0; }).length;
    var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)', marginBottom: '10px' } });
    [
      { label: 'Total', value: filtered.length },
      { label: 'High Priority', value: highPri, color: highPri > 0 ? 'var(--danger)' : null },
      { label: 'Overdue', value: overdue, color: overdue > 0 ? 'var(--warning)' : null },
    ].forEach(function(kpi) {
      var card = el('div', { className: 'kpi-card' });
      card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
      var val = el('div', { className: 'kpi-value' }, String(kpi.value));
      if (kpi.color) val.style.color = kpi.color;
      card.appendChild(val);
      kpiStrip.appendChild(card);
    });
    container.appendChild(kpiStrip);

    filtered.forEach(function(task) {
      var priColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--muted)' };
      var card = el('div', { className: 'card card-accent-border', style: { padding: '12px 16px', marginBottom: '6px', borderLeftColor: priColors[task.priority] || 'var(--accent)' } });
      var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
      top.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, task.title));
      if (task.dueDate) top.appendChild(el('span', { style: { fontSize: '10px', color: task.dueDays !== null && task.dueDays < 0 ? 'var(--danger)' : 'var(--muted)' } }, task.dueDate));
      card.appendChild(top);
      if (task.memberEmail) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, task.memberEmail.split('@')[0]));
      if (task.description) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, task.description.substring(0, 100)));

      if (task.status !== 'completed') {
        var actions = el('div', { style: { display: 'flex', gap: '6px', marginTop: '8px' } });
        actions.appendChild(el('button', {
          style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
          onClick: function() {
            google.script.run.withSuccessHandler(function() { renderStewardTasks(document.getElementById('app')); }).dataCompleteTask(CURRENT_USER.email, task.id);
          }
        }, '\u2705 Complete'));
        card.appendChild(actions);
      }
      container.appendChild(card);
    });
  }).dataGetTasks(CURRENT_USER.email, statusFilter);
}

function _renderNewTaskForm(container, onCreated) {
  container.appendChild(el('h3', { className: 'section-title' }, 'Create Task'));

  // Chief steward: show "Assign to" dropdown
  var assignSelect = null;
  var assignGroup = el('div', { className: 'form-group', style: { display: 'none' } });
  assignGroup.appendChild(el('label', { className: 'form-label' }, 'Assign to'));
  assignSelect = el('select', { className: 'form-select' });
  assignSelect.appendChild(el('option', { value: '' }, 'Myself'));
  assignGroup.appendChild(assignSelect);
  container.appendChild(assignGroup);

  // Check if current user is chief steward and populate steward list
  google.script.run.withSuccessHandler(function(isChief) {
    if (isChief) {
      assignGroup.style.display = '';
      google.script.run.withSuccessHandler(function(stewards) {
        if (stewards && stewards.length > 0) {
          stewards.forEach(function(s) {
            if (s.email !== CURRENT_USER.email) {
              assignSelect.appendChild(el('option', { value: s.email }, s.name || s.email));
            }
          });
        }
      }).dataGetStewardDirectory();
    }
  }).dataIsChiefSteward(CURRENT_USER.email);

  var titleGroup = el('div', { className: 'form-group' });
  titleGroup.appendChild(el('label', { className: 'form-label' }, 'Title'));
  var titleInput = el('input', { className: 'form-input', placeholder: 'e.g., Check in on member' });
  titleGroup.appendChild(titleInput);
  container.appendChild(titleGroup);

  var descGroup = el('div', { className: 'form-group' });
  descGroup.appendChild(el('label', { className: 'form-label' }, 'Description (optional)'));
  var descInput = el('textarea', { className: 'msg-textarea', placeholder: 'Details...', style: { minHeight: '60px' } });
  descGroup.appendChild(descInput);
  container.appendChild(descGroup);

  var memberGroup = el('div', { className: 'form-group' });
  memberGroup.appendChild(el('label', { className: 'form-label' }, 'Related Member (optional)'));
  var memberInput = el('input', { className: 'form-input', placeholder: 'member@example.com' });
  memberGroup.appendChild(memberInput);
  container.appendChild(memberGroup);

  var priGroup = el('div', { className: 'form-group' });
  priGroup.appendChild(el('label', { className: 'form-label' }, 'Priority'));
  var priSelect = el('select', { className: 'form-select' });
  ['medium', 'high', 'low'].forEach(function(p) {
    var opt = el('option', { value: p }, p.charAt(0).toUpperCase() + p.slice(1));
    priSelect.appendChild(opt);
  });
  priGroup.appendChild(priSelect);
  container.appendChild(priGroup);

  var dueGroup = el('div', { className: 'form-group' });
  dueGroup.appendChild(el('label', { className: 'form-label' }, 'Due Date (optional)'));
  var dueInput = el('input', { className: 'form-input', type: 'date' });
  dueGroup.appendChild(dueInput);
  container.appendChild(dueGroup);

  var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
  container.appendChild(statusMsg);

  container.appendChild(el('button', {
    className: 'btn btn-primary',
    onClick: function() {
      var title = titleInput.value.trim();
      if (!title) { statusMsg.textContent = 'Enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
      statusMsg.textContent = 'Creating...'; statusMsg.style.color = 'var(--muted)';
      var assignee = assignSelect ? assignSelect.value : '';
      if (assignee) {
        google.script.run.withSuccessHandler(function(r) {
          if (r && r.success) { onCreated(); } else { statusMsg.textContent = 'Error creating task.'; statusMsg.style.color = 'var(--danger)'; }
        }).dataCreateTaskForSteward(CURRENT_USER.email, assignee, title, descInput.value.trim(), memberInput.value.trim(), priSelect.value, dueInput.value || '');
      } else {
        google.script.run.withSuccessHandler(function(r) {
          if (r && r.success) { onCreated(); } else { statusMsg.textContent = 'Error creating task.'; statusMsg.style.color = 'var(--danger)'; }
        }).dataCreateTask(CURRENT_USER.email, title, descInput.value.trim(), memberInput.value.trim(), priSelect.value, dueInput.value || '');
      }
    }
  }, 'Create Task'));
}
