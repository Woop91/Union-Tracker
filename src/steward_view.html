/**
 * Renders the Knowledge Base sub-tab inside the Resources tab.
 * Shows a search bar, optional "Add Article" button for stewards,
 * and a list of contract articles fetched from the server.
 */
function _renderKnowledgeBase(container) {
  // Add Article button (steward-only — always visible in steward view)
  var addFormContainer = el('div', { style: { display: 'none' } });
  var addBtn = el('button', {
    className: 'btn btn-primary',
    style: { marginBottom: '12px' },
    onclick: function() {
      var isVisible = addFormContainer.style.display !== 'none';
      addFormContainer.style.display = isVisible ? 'none' : 'block';
      addBtn.textContent = isVisible ? '+ Add Article' : 'Cancel';
    }
  }, '+ Add Article');
  container.appendChild(addBtn);
  _renderAddArticleForm(addFormContainer);
  container.appendChild(addFormContainer);

  // Search bar
  var searchRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '16px' } });
  var searchInput = el('input', { type: 'text', className: 'form-input search-input', placeholder: 'Search contract articles...' });
  searchInput.style.flex = '1';
  var searchBtn = el('button', {
    className: 'btn btn-primary',
    onclick: function() { _searchArticles(searchInput.value, resultsContainer); }
  }, 'Search');
  searchRow.appendChild(searchInput);
  searchRow.appendChild(searchBtn);
  container.appendChild(searchRow);

  // Handle Enter key
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') _searchArticles(searchInput.value, resultsContainer);
  });

  var resultsContainer = el('div');
  container.appendChild(resultsContainer);

  // Load all articles initially
  _searchArticles('', resultsContainer);
}

/**
 * Searches articles via the server and renders results into the container.
 * @param {string} query - Search query (empty = all articles)
 * @param {HTMLElement} container - Container to render results into
 */
function _searchArticles(query, container) {
  container.innerHTML = '';
  container.appendChild(el('div', { style: { color: 'var(--text-secondary, var(--muted))', padding: '12px' } }, 'Searching...'));

  serverCall().withSuccessHandler(function(articles) {
    container.innerHTML = '';
    if (!articles || articles.length === 0) {
      container.appendChild(el('div', { className: 'card', style: { padding: '16px', color: 'var(--text-secondary, var(--muted))', fontStyle: 'italic' } }, 'No articles found. Stewards can add articles using the "+ Add Article" button above.'));
      return;
    }

    articles.forEach(function(article) {
      var card = el('div', {
        className: 'card card-clickable',
        style: { padding: '14px', marginBottom: '8px', cursor: 'pointer' },
        onclick: function() { _showArticleDetail(container, article.id); }
      });
      var header = el('div', { style: { display: 'flex', alignItems: 'baseline', gap: '8px' } });
      header.appendChild(el('span', { style: { fontWeight: '700', fontSize: '14px', color: 'var(--accent)' } }, 'Art. ' + escapeHtml(String(article.articleNumber || ''))));
      header.appendChild(el('span', { style: { fontWeight: '600', fontSize: '14px' } }, escapeHtml(String(article.title || ''))));
      card.appendChild(header);

      if (article.summary) {
        card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary, var(--muted))', marginTop: '4px' } }, escapeHtml(String(article.summary))));
      }

      if (article.tags) {
        var tagRow = el('div', { style: { display: 'flex', gap: '4px', flexWrap: 'wrap', marginTop: '6px' } });
        String(article.tags).split(',').forEach(function(tag) {
          tag = tag.trim();
          if (tag) tagRow.appendChild(el('span', { style: { padding: '1px 6px', borderRadius: '4px', fontSize: '11px', background: 'var(--border-subtle, var(--border))' } }, escapeHtml(tag)));
        });
        card.appendChild(tagRow);
      }

      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { style: { padding: '16px', color: 'var(--danger)' } }, 'Failed to search articles.'));
  }).dataSearchKnowledgeBase(SESSION_TOKEN, query);
}

/**
 * Shows the full detail view of a single knowledge base article.
 * Replaces the parent container content and provides a back button.
 * @param {HTMLElement} parentContainer - The results container to replace
 * @param {string} articleId - The article ID to fetch
 */
function _showArticleDetail(parentContainer, articleId) {
  parentContainer.innerHTML = '';
  showLoading(parentContainer);

  serverCall().withSuccessHandler(function(article) {
    if (!article) {
      parentContainer.innerHTML = '';
      parentContainer.appendChild(el('div', { style: { padding: '16px', color: 'var(--danger)' } }, 'Article not found.'));
      return;
    }

    parentContainer.innerHTML = '';

    var backBtn = el('button', {
      className: 'btn btn-ghost',
      style: { marginBottom: '12px' },
      onclick: function() {
        // Go back to article list — re-render the parent with _renderKnowledgeBase
        var grandParent = parentContainer.parentNode;
        if (grandParent) {
          grandParent.innerHTML = '';
          _renderKnowledgeBase(grandParent);
        }
      }
    }, '\u2190 Back to Articles');
    parentContainer.appendChild(backBtn);

    var detail = el('div', { className: 'card', style: { padding: '20px' } });
    detail.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--accent)', fontWeight: '600', marginBottom: '4px' } }, 'Article ' + escapeHtml(String(article.articleNumber || ''))));
    detail.appendChild(el('h2', { style: { fontSize: '18px', marginBottom: '12px' } }, escapeHtml(String(article.title || ''))));

    if (article.summary) {
      detail.appendChild(el('div', { style: { fontSize: '14px', color: 'var(--text-secondary, var(--muted))', marginBottom: '16px', fontStyle: 'italic' } }, escapeHtml(String(article.summary))));
    }

    if (article.fullText) {
      detail.appendChild(el('div', { style: { fontSize: '14px', lineHeight: '1.6', whiteSpace: 'pre-wrap' } }, escapeHtml(String(article.fullText))));
    }

    if (article.relatedGrievanceTypes) {
      var relatedDiv = el('div', { style: { marginTop: '16px', fontSize: '13px' } });
      relatedDiv.appendChild(el('span', { style: { fontWeight: '600' } }, 'Related Grievance Types: '));
      relatedDiv.appendChild(el('span', {}, escapeHtml(String(article.relatedGrievanceTypes))));
      detail.appendChild(relatedDiv);
    }

    if (article.tags) {
      var tagRow = el('div', { style: { display: 'flex', gap: '4px', flexWrap: 'wrap', marginTop: '12px' } });
      String(article.tags).split(',').forEach(function(tag) {
        tag = tag.trim();
        if (tag) tagRow.appendChild(el('span', { style: { padding: '2px 8px', borderRadius: '4px', fontSize: '11px', background: 'var(--border-subtle, var(--border))' } }, escapeHtml(tag)));
      });
      detail.appendChild(tagRow);
    }

    parentContainer.appendChild(detail);
  }).withFailureHandler(function() {
    parentContainer.innerHTML = '';
    parentContainer.appendChild(el('div', { style: { padding: '16px', color: 'var(--danger)' } }, 'Failed to load article.'));
  }).dataGetKnowledgeBaseArticle(SESSION_TOKEN, articleId);
}

/**
 * Renders the "Add Article" form for stewards to create new knowledge base entries.
 * @param {HTMLElement} container - Container to render the form into
 */
function _renderAddArticleForm(container) {
  var form = el('div', { className: 'card', style: { padding: '16px', marginBottom: '16px' } });
  form.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '12px' } }, 'Add New Article'));

  var fields = [
    { id: 'kb-num', label: 'Article Number', placeholder: 'e.g., 12.3' },
    { id: 'kb-title', label: 'Title', placeholder: 'Article title' },
    { id: 'kb-summary', label: 'Summary', placeholder: 'Brief summary', tag: 'textarea' },
    { id: 'kb-text', label: 'Full Text', placeholder: 'Full article text', tag: 'textarea' },
    { id: 'kb-types', label: 'Related Grievance Types', placeholder: 'e.g., Discipline, Hours' },
    { id: 'kb-tags', label: 'Tags', placeholder: 'comma-separated tags' }
  ];

  var inputs = {};
  fields.forEach(function(f) {
    var group = el('div', { className: 'form-group', style: { marginBottom: '8px' } });
    group.appendChild(el('label', { className: 'form-label' }, f.label));
    var inputAttrs = {
      className: 'form-input',
      placeholder: f.placeholder
    };
    if (f.tag === 'textarea') {
      inputAttrs.style = { minHeight: '60px', resize: 'vertical', width: '100%' };
    }
    var input = el(f.tag || 'input', inputAttrs);
    if (!f.tag) input.type = 'text';
    // Prevent card click propagation on form inputs
    input.addEventListener('click', function(ev) { ev.stopPropagation(); });
    inputs[f.id] = input;
    group.appendChild(input);
    form.appendChild(group);
  });

  var saveBtn = el('button', {
    className: 'btn btn-primary',
    onclick: function() {
      var num = inputs['kb-num'].value.trim();
      var title = inputs['kb-title'].value.trim();
      if (!num || !title) return;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      serverCall().withSuccessHandler(function(r) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Article';
        if (r && r.success) {
          // Clear form fields
          Object.keys(inputs).forEach(function(k) { inputs[k].value = ''; });
          // Hide the form
          container.style.display = 'none';
          // Find and re-trigger the parent's add button text
          var addBtnEl = container.previousSibling;
          if (addBtnEl && addBtnEl.tagName === 'BUTTON') addBtnEl.textContent = '+ Add Article';
          // Refresh the articles list — find the results container
          var sibling = container.nextSibling;
          while (sibling) {
            // The results container is the last div child
            var nextSib = sibling.nextSibling;
            if (!nextSib) {
              _searchArticles('', sibling);
              break;
            }
            sibling = nextSib;
          }
        }
      }).withFailureHandler(function() {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Article';
      }).dataAddKnowledgeBaseArticle(
        SESSION_TOKEN,
        inputs['kb-num'].value.trim(),
        inputs['kb-title'].value.trim(),
        inputs['kb-summary'].value.trim(),
        inputs['kb-text'].value.trim(),
        inputs['kb-types'].value.trim(),
        inputs['kb-tags'].value.trim()
      );
    }
  }, 'Save Article');
  form.appendChild(saveBtn);

  container.appendChild(form);
}

// ═══════════════════════════════════════
// SURVEY TRACKING (steward view)
// ═══════════════════════════════════════

function renderSurveyTracking(appContainer) {
  renderPageLayout(appContainer, 'steward', 'surveytrack', function(container) {
    _stewardHeader(container, 'Survey Tracking');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Period status bar
    var periodBar = el('div', { className: 'mb-14' });
    content.appendChild(periodBar);

    // Scope filter tabs
    var scopeWrap = el('div', { className: 'mb-14' });
    content.appendChild(scopeWrap);

    // KPI summary area
    var kpiWrap = el('div', { className: 'mb-14' });
    content.appendChild(kpiWrap);

    // Stats area
    var statsWrap = el('div', { className: 'mb-14' });
    content.appendChild(statsWrap);

    // Tracking list area
    var dataWrap = el('div');
    content.appendChild(dataWrap);

    var activeScope = 'location';

    function loadSurveyData(scope) {
      activeScope = scope;
      showLoading(dataWrap, 'kpi');
      kpiWrap.innerHTML = '';
      statsWrap.innerHTML = '';

      // Load steward-specific survey tracking with richer data
      serverCall().withSuccessHandler(function(trackingData) {
        dataWrap.innerHTML = '';

        var total = trackingData.total || 0;
        var completed = trackingData.completed || 0;
        var pending = total - completed;
        var rate = total > 0 ? Math.round((completed / total) * 100) : 0;
        var members = trackingData.members || [];
        var stewardInfo = trackingData.stewardInfo || {};

        // ── Overall progress bar ───────────────────────────────────────
        if (total > 0) {
          var progCard = el('div', { className: 'card p-16-mb-10' });
          var progHeader = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' } });
          progHeader.appendChild(el('div', { className: 'display-title-sm' }, 'Response Rate'));
          progHeader.appendChild(el('div', { style: { fontSize: '22px', fontWeight: '700', color: rate >= 80 ? 'var(--success)' : rate >= 50 ? 'var(--warning)' : 'var(--danger)' } }, rate + '%'));
          progCard.appendChild(progHeader);

          // Overall progress bar — hero size (.prog-track--lg = 10px)
          var barColor = rate >= 80 ? 'prog-fill--success' : rate >= 50 ? 'prog-fill--warning' : 'prog-fill--danger';
          var barBg = el('div', { className: 'prog-track prog-track--lg mb-8' });
          barBg.appendChild(el('div', { className: 'prog-fill ' + barColor, style: { width: rate + '%' } }));
          progCard.appendChild(barBg);

          progCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', textAlign: 'center' } }, completed + ' completed of ' + total + ' members'));
          dataWrap.appendChild(progCard);
        }

        // ── Participation statistics ─────────────────────────────────────
        statsWrap.innerHTML = '';
        if (members.length > 0) {
          var newMembers = 0;
          var decliningMembers = 0;
          var consistentMembers = 0;
          var firstTimers = 0;
          var now = new Date();
          members.forEach(function(m) {
            if (m.hireDate) {
              var hd = new Date(m.hireDate);
              if (!isNaN(hd.getTime()) && (now - hd) < 180 * 24 * 60 * 60 * 1000) newMembers++;
            }
            if (m.participationRate !== null) {
              if (m.participationRate < 30 && m.totalMissed > 1) decliningMembers++;
              else if (m.participationRate >= 70) consistentMembers++;
            }
            if (m.totalCompleted === 0 && m.totalMissed === 0) firstTimers++;
          });

          var sGrid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(100px, 1fr))', gap: '8px' } });
          // New member completion: of newMembers, how many completed this survey
          var newMemberCompleted = 0;
          members.forEach(function(m) {
            if (m.hireDate) {
              var hd = new Date(m.hireDate);
              if (!isNaN(hd.getTime()) && (now - hd) < 180 * 24 * 60 * 60 * 1000 && m.completed) newMemberCompleted++;
            }
          });
          // Average participation rate of declining members
          var decliningRateSum = 0, decliningRateCount = 0;
          members.forEach(function(m) {
            if (m.participationRate !== null && m.participationRate < 30 && m.totalMissed > 1) {
              decliningRateSum += m.participationRate;
              decliningRateCount++;
            }
          });
          var avgDecliningRate = decliningRateCount > 0 ? Math.round(decliningRateSum / decliningRateCount) : 0;

          var statItems = [
            { label: 'New Members', value: newMembers, color: 'var(--info)', icon: '\uD83C\uDD95' },
            { label: 'New Completed', value: newMemberCompleted + '/' + newMembers, color: newMembers > 0 && (newMemberCompleted / newMembers) > 0.5 ? 'var(--success)' : newMembers > 0 && (newMemberCompleted / newMembers) < 0.3 ? 'var(--danger)' : 'var(--warning)', icon: '\uD83C\uDF1F' },
            { label: 'First Survey', value: firstTimers, color: 'var(--accent)', icon: '\u2728' },
            { label: 'Consistent', value: consistentMembers, color: 'var(--success)', icon: '\u2705' },
            { label: 'Declining', value: decliningMembers, color: 'var(--danger)', icon: '\u26A0\uFE0F', sub: decliningMembers > 0 ? 'avg ' + avgDecliningRate + '%' : '' },
          ];
          statItems.forEach(function(s) {
            var card = el('div', { className: 'card', style: { padding: '10px 8px', textAlign: 'center', background: 'var(--surface)' } });
            card.appendChild(el('div', { style: { fontSize: '16px', marginBottom: '2px' } }, s.icon));
            card.appendChild(el('div', { style: { fontSize: '18px', fontWeight: '700', color: s.color } }, String(s.value)));
            card.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '2px' } }, s.label));
            if (s.sub) card.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '1px' } }, s.sub));
            sGrid.appendChild(card);
          });
          statsWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Participation Statistics'));
          statsWrap.appendChild(sGrid);
        }

        // ── Satisfaction section averages ────────────────────────────────
        serverCall().withSuccessHandler(function(summary) {
          kpiWrap.innerHTML = '';
          if (!summary || !summary.sections) return;
          var sections = summary.sections;
          var sectionKeys = Object.keys(sections);
          var hasAny = sectionKeys.some(function(k) { return sections[k] && sections[k].avg !== null; });
          if (!hasAny || summary.responseCount < 5) return;

          kpiWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Section Averages (1\u201310)'));
          var kpiRow = el('div', { className: 'flex-wrap-gap' });
          sectionKeys.forEach(function(key) {
            var s = sections[key];
            if (!s || s.avg === null) return;
            var color = s.avg < 4 ? 'var(--danger)' : s.avg < 6 ? 'var(--warning)' : 'var(--success)';
            var kpi = el('div', { className: 'card', style: { flex: '1', minWidth: '80px', padding: '10px 8px', textAlign: 'center', background: 'var(--surface)' } });
            kpi.appendChild(el('div', { style: { fontSize: '18px', fontWeight: '700', color: color } }, s.avg.toFixed(1)));
            kpi.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', marginTop: '2px', lineHeight: '1.3' } }, s.name));
            kpiRow.appendChild(kpi);
          });
          kpiWrap.appendChild(kpiRow);
        }).withFailureHandler(function() {}).dataGetSatisfactionSummary(SESSION_TOKEN);

        // ── No data ───────────────────────────────────────────────────────
        if (!total) {
          dataWrap.appendChild(el('div', { className: 'empty-state-sm' }, 'No survey tracking data. Open a period and populate tracking.'));
          return;
        }

        // ── Nearby members (same location/office days/cubicle proximity) ─
        var pendingMembers = members.filter(function(m) { return !m.completed; });
        var completedMembers = members.filter(function(m) { return m.completed; });

        // Calculate proximity scores for pending members
        if (stewardInfo.workLocation && pendingMembers.length > 0) {
          pendingMembers.forEach(function(m) {
            var score = 0;
            if (m.workLocation && m.workLocation.toLowerCase() === stewardInfo.workLocation.toLowerCase()) score += 3;
            if (m.officeDays && stewardInfo.officeDays) {
              var mDays = m.officeDays.toLowerCase().split(/[,;\s]+/);
              var sDays = stewardInfo.officeDays.toLowerCase().split(/[,;\s]+/);
              var overlap = mDays.filter(function(d) { return sDays.indexOf(d) !== -1; }).length;
              score += overlap;
            }
            if (m.cubicle && stewardInfo.cubicle) {
              // Basic cubicle proximity: same floor/section prefix
              var mPrefix = m.cubicle.replace(/[0-9]+$/, '');
              var sPrefix = stewardInfo.cubicle.replace(/[0-9]+$/, '');
              if (mPrefix && sPrefix && mPrefix.toLowerCase() === sPrefix.toLowerCase()) score += 2;
            }
            m._proximityScore = score;
          });
        }

        // Nearby = same location + high proximity score
        var nearbyMembers = pendingMembers.filter(function(m) { return (m._proximityScore || 0) >= 3; });
        nearbyMembers.sort(function(a, b) { return (b._proximityScore || 0) - (a._proximityScore || 0); });
        var otherPending = pendingMembers.filter(function(m) { return (m._proximityScore || 0) < 3; });

        // ── Render nearby members section ────
        if (nearbyMembers.length > 0) {
          dataWrap.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', margin: '12px 0 6px' } }, '\uD83D\uDCCD Nearby \u2014 Pending (' + nearbyMembers.length + ')'));
          dataWrap.appendChild(el('div', { className: 'text-xs-muted-mb-8' }, 'Members at your location with overlapping office days'));
          var nearbyContainer = el('div');
          _surveyPaginate(nearbyContainer, nearbyMembers, true);
          dataWrap.appendChild(nearbyContainer);
        }

        // ── Render other pending members (limited to 20 initially) ────
        if (otherPending.length > 0) {
          var otherHeader = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', margin: '12px 0 6px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' } });
          otherHeader.appendChild(el('span', { style: { transition: 'transform 0.2s' } }, '\u25BC'));
          otherHeader.appendChild(el('span', {}, 'Other Pending (' + otherPending.length + ')'));
          var otherContainer = el('div');
          otherHeader.onclick = function() {
            var isOpen = otherContainer.style.display !== 'none';
            otherContainer.style.display = isOpen ? 'none' : 'block';
            otherHeader.firstChild.textContent = isOpen ? '\u25B6' : '\u25BC';
          };
          dataWrap.appendChild(otherHeader);
          _surveyPaginate(otherContainer, otherPending, false);
          dataWrap.appendChild(otherContainer);
        }

        // ── Completed list (collapsed by default, limited to 20) ─────
        if (completedMembers.length > 0) {
          var compToggle = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--success)', margin: '16px 0 6px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' } });
          compToggle.appendChild(el('span', { style: { transition: 'transform 0.2s' } }, '\u25B6'));
          compToggle.appendChild(el('span', {}, 'Completed (' + completedMembers.length + ')'));
          var compList = el('div', { style: { display: 'none' } });
          compToggle.onclick = function() {
            var isOpen = compList.style.display !== 'none';
            compList.style.display = isOpen ? 'none' : 'block';
            compToggle.firstChild.textContent = isOpen ? '\u25B6' : '\u25BC';
          };
          dataWrap.appendChild(compToggle);
          _surveyPaginate(compList, completedMembers, false);
          dataWrap.appendChild(compList);
        }

      }).withFailureHandler(function() {
        dataWrap.innerHTML = '';
        dataWrap.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load survey data.'));
      }).dataGetStewardSurveyTracking(SESSION_TOKEN, scope);
    }

    // ── Period status bar ──────────────────────────────────────────────
    serverCall().withSuccessHandler(function(pendingData) {
      periodBar.innerHTML = '';
      var period = pendingData.periodId
        ? { id: pendingData.periodId, name: pendingData.periodName, status: 'Active' }
        : null;

      if (period) {
        var pBar = el('div', { className: 'card', style: { padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0', background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.3)' } });
        pBar.appendChild(el('div', { className: 'text-sm-text' }, '\uD83D\uDCCB ' + (period.name || period.id)));
        pBar.appendChild(el('span', { style: { fontSize: '11px', background: 'var(--success)', color: '#fff', padding: '2px 8px', borderRadius: '20px' } }, 'Active'));
        periodBar.appendChild(pBar);
      } else {
        var closedBar = el('div', { className: 'card', style: { padding: '10px 14px', textAlign: 'center', fontSize: '12px', color: 'var(--muted)', background: 'var(--surface)', marginBottom: '0' } });
        closedBar.appendChild(el('span', {}, 'No survey period is currently open. '));
        closedBar.appendChild(el('button', { className: 'btn btn-sm', style: { fontSize: '11px', padding: '3px 10px', marginLeft: '8px' }, onClick: function() {
          serverCall().withSuccessHandler(function(r) {
            if (r && r.success) renderSurveyTracking(appContainer);
            else { closedBar.textContent = ''; closedBar.appendChild(el('span', { style: { color: 'var(--danger)' } }, 'Error: ' + ((r && r.message) || 'Failed to open period.'))); }
          }).dataOpenNewSurveyPeriod(SESSION_TOKEN);
        } }, 'Open New Period'));
        periodBar.appendChild(closedBar);
      }
    }).withFailureHandler(function() {}).dataGetPendingSurveyMembers(SESSION_TOKEN);

    // ── Scope filter tabs ──────────────────────────────────────────────
    var scopeRow = el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap' } });
    var scopes = [
      { id: 'assigned', label: 'My Members' },
      { id: 'location', label: 'My Location' },
      { id: 'all', label: 'All Members' },
    ];
    var scopeBtns = {};
    scopes.forEach(function(s) {
      var btn = el('button', {
        className: 'filter-tab' + (s.id === activeScope ? ' active' : ''),
        onClick: function() {
          Object.keys(scopeBtns).forEach(function(k) { scopeBtns[k].className = 'filter-tab' + (k === s.id ? ' active' : ''); });
          loadSurveyData(s.id);
        }
      }, s.label);
      scopeBtns[s.id] = btn;
      scopeRow.appendChild(btn);
    });
    scopeWrap.appendChild(scopeRow);

    // Initial load
    loadSurveyData('location');
  });
}

// Helper: paginated survey member list with Prev/Next controls
function _surveyPaginate(container, items, showProximity) {
  var pg = createPaginator({
    items: items,
    pageSize: 20,
    renderItem: function(listArea, m) { _renderSurveyMemberItem(listArea, m, showProximity); }
  });
  container.appendChild(pg.container);
}

// Helper: render a survey member item with progress bar and details
function _renderSurveyMemberItem(parentEl, m, showProximity) {
  var item = el('div', { className: 'member-list-item', style: { cursor: 'pointer', flexDirection: 'column', alignItems: 'stretch', gap: '6px' } });

  var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } });
  topRow.appendChild(el('div', { className: 'member-list-avatar', style: { background: m.completed ? 'var(--success)' : 'var(--surface)' } }, (m.name || 'M').charAt(0).toUpperCase()));

  var info = el('div', { style: { flex: '1', minWidth: '0' } });
  info.appendChild(el('div', { className: 'member-list-name' }, m.name || m.email));

  // Meta line: location, office days, cubicle
  var metaParts = [];
  if (m.workLocation) metaParts.push(m.workLocation);
  if (m.officeDays) metaParts.push(m.officeDays);
  if (showProximity && m.cubicle) metaParts.push('Cube ' + m.cubicle);
  if (metaParts.length > 0) {
    info.appendChild(el('div', { className: 'member-list-meta' }, metaParts.join(' \u00B7 ')));
  }

  // Proximity badge pills (only for nearby members)
  if (showProximity && m._proximityScore > 0) {
    var badgeRow = el('div', { style: { display: 'flex', gap: '4px', flexWrap: 'wrap', marginTop: '3px' } });
    var badgeStyle = { fontSize: '9px', padding: '1px 6px', borderRadius: '8px', fontWeight: '600' };
    if (m._proximityScore >= 3) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(34,197,94,0.15)', color: 'var(--success)' }) }, 'Same Location'));
    }
    if (m.officeDays && m._proximityScore >= 4) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(59,130,246,0.15)', color: 'var(--info)' }) }, 'Day Overlap'));
    }
    if (m.cubicle && m._proximityScore >= 5) {
      badgeRow.appendChild(el('span', { style: Object.assign({}, badgeStyle, { background: 'rgba(168,85,247,0.15)', color: 'var(--accent)' }) }, 'Same Floor'));
    }
    if (badgeRow.childNodes.length > 0) info.appendChild(badgeRow);
  }
  topRow.appendChild(info);

  // Status icon
  topRow.appendChild(el('span', { style: { fontSize: '14px', color: m.completed ? 'var(--success)' : 'var(--muted)', flexShrink: '0' } }, m.completed ? '\u2705' : '\u23F3'));
  item.appendChild(topRow);

  // Participation rate bar
  if (m.participationRate !== null) {
    var partRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', paddingLeft: '42px' } });
    var pRate = m.participationRate;
    var pColorClass = pRate >= 70 ? 'prog-fill--success' : pRate >= 40 ? 'prog-fill--warning' : 'prog-fill--danger';
    partRow.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', minWidth: '60px' } }, 'History: ' + pRate + '%'));
    var partBg = el('div', { className: 'prog-track prog-track--sm flex-1' });
    partBg.appendChild(el('div', { className: 'prog-fill ' + pColorClass, style: { width: pRate + '%' } }));
    partRow.appendChild(partBg);
    partRow.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', minWidth: '40px', textAlign: 'right' } }, m.totalCompleted + '/' + (m.totalCompleted + m.totalMissed)));
    item.appendChild(partRow);
  }

  if (m.email && typeof _toggleMemberDetail === 'function') {
    item.onclick = (function(member, itemEl) { return function() { _toggleMemberDetail(parentEl, itemEl, member); }; })(m, item);
  }
  parentEl.appendChild(item);
}

function _renderTaskList(container, statusFilter) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(tasks) {
    container.innerHTML = '';
    var filtered = statusFilter ? tasks.filter(function(t) { return t.status === statusFilter; }) : tasks.filter(function(t) { return t.status !== 'completed'; });

    if (filtered.length === 0) {
      container.appendChild(el('div', { className: 'empty-state' }, statusFilter === 'completed' ? 'No completed tasks.' : 'No open tasks. Create one!'));
      return;
    }

    // KPI strip
    var highPri = filtered.filter(function(t) { return t.priority === 'high'; }).length;
    var overdue = filtered.filter(function(t) { return t.dueDays !== null && t.dueDays < 0; }).length;
    renderKPIStrip(container, [
      { label: 'Total', value: filtered.length },
      { label: 'High Priority', value: highPri, color: highPri > 0 ? 'var(--danger)' : null },
      { label: 'Overdue', value: overdue, color: overdue > 0 ? 'var(--warning)' : null },
    ], { columns: 3, marginBottom: '10px' });

    filtered.forEach(function(task) {
      var priColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--muted)' };
      var card = el('div', { className: 'card card-accent-border', style: { padding: '12px 16px', marginBottom: '6px', borderLeftColor: priColors[task.priority] || 'var(--accent)' } });
      var top = el('div', { className: 'flex-between' });
      top.appendChild(el('div', { className: 'display-section' }, task.title));
      if (task.dueDate) top.appendChild(el('span', { style: { fontSize: '10px', color: task.dueDays !== null && task.dueDays < 0 ? 'var(--danger)' : 'var(--muted)' } }, task.dueDate));
      card.appendChild(top);
      if (task.memberEmail) card.appendChild(el('div', { className: 'text-xs-muted' }, task.memberEmail.split('@')[0]));
      if (task.description) card.appendChild(el('div', { className: 'text-xs-muted-mt-4' }, task.description.substring(0, 100)));

      if (task.status !== 'completed') {
        var actions = el('div', { style: { display: 'flex', gap: '6px', marginTop: '8px', flexWrap: 'wrap', alignItems: 'center' } });
        var taskErrSpan = el('span', { style: { fontSize: '11px', color: 'var(--danger)' } });

        // Complete button
        (function(t, errEl) {
          actions.appendChild(el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
            onClick: function() {
              serverCall().withSuccessHandler(function() {
                if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
                _invalidateTabCache('tasks'); _handleTabNav('steward', 'tasks');
              }).withFailureHandler(function() { errEl.textContent = 'Failed to complete task.'; }).dataCompleteTask(SESSION_TOKEN, t.id);
            }
          }, '\u2705 Complete'));
        })(task, taskErrSpan);

        // Edit button — toggles inline edit form
        (function(t, cardEl) {
          var editing = false;
          var editBtn = el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'transparent', border: '1px solid var(--border)', color: 'var(--muted)', fontWeight: '600' },
          }, '\u270F\uFE0F Edit');
          var editForm = null;
          editBtn.onclick = function() {
            editing = !editing;
            if (editForm) { editForm.remove(); editForm = null; editBtn.textContent = '\u270F\uFE0F Edit'; return; }
            editBtn.textContent = 'Cancel';
            editForm = el('div', { style: { marginTop: '8px', display: 'flex', flexDirection: 'column', gap: '6px' } });
            var titleIn = el('input', { className: 'form-input text-sm', value: t.title });
            var priSel = el('select', { className: 'form-select text-sm' });
            ['high', 'medium', 'low'].forEach(function(p) {
              var o = el('option', { value: p }, p.charAt(0).toUpperCase() + p.slice(1));
              if (p === t.priority) o.selected = true;
              priSel.appendChild(o);
            });
            var dueIn = el('input', { className: 'form-input text-sm', type: 'date', value: t.dueDate || '' });
            var editStatus = el('div', { style: { fontSize: '11px', color: 'var(--danger)', minHeight: '14px' } });
            var saveBtn = el('button', {
              className: 'btn btn-primary', style: { fontSize: '11px', padding: '4px 12px' },
              onClick: function() {
                editStatus.textContent = '';
                var updates = { title: titleIn.value.trim(), priority: priSel.value, dueDate: dueIn.value };
                if (!updates.title) { editStatus.textContent = 'Title required.'; titleIn.style.borderColor = 'var(--danger)'; return; }
                serverCall().withSuccessHandler(function(r) {
                  if (r && r.success) {
                    if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
                    _handleTabNav('steward', 'tasks');
                  } else { editStatus.textContent = 'Update failed.'; }
                }).withFailureHandler(function() { editStatus.textContent = 'Update failed.'; }).dataUpdateTask(SESSION_TOKEN, t.id, updates);
              }
            }, 'Save');
            editForm.appendChild(titleIn);
            editForm.appendChild(priSel);
            editForm.appendChild(dueIn);
            editForm.appendChild(saveBtn);
            editForm.appendChild(editStatus);
            cardEl.appendChild(editForm);
          };
          actions.appendChild(editBtn);
        })(task, card);

        actions.appendChild(taskErrSpan);
        card.appendChild(actions);
      }
      container.appendChild(card);
    });
  }).dataGetTasks(SESSION_TOKEN, statusFilter);
}

// ─────────────────────────────────────────────────────────────────────────────
// _renderStewardMemberTasks — Steward's view of tasks they assigned to members
// ─────────────────────────────────────────────────────────────────────────────
//
// WHAT: Renders a list of member tasks that THIS steward created, with a
//       KPI strip (total/open/completed) and a "Complete for member" button
//       on each open task.
//
// DATA SOURCE: Calls dataGetStewardAssignedMemberTasks(SESSION_TOKEN) which
//       returns tasks where col 12 (Assigned By) = this steward's email.
//       The server verifies identity — SESSION_TOKEN is not the email itself.
//
// COMPLETE BUTTON FLOW:
//   1. User clicks "Complete for member"
//   2. confirm() dialog prevents accidental clicks
//   3. Calls dataStaffCompleteMemberTask(SESSION_TOKEN, taskId)
//   4. Server: _requireStewardAuth → withScriptLock_ → stewardCompleteMemberTask
//   5. On success: _refreshNavBadges() updates the nav badge counts, then
//      the entire task view re-renders to reflect the new state.
//
// IIFE PATTERN — (function(t) { ... })(task):
//   The button onClick handler captures `task` from the forEach loop.
//   Without the IIFE, all buttons would reference the last task in the
//   array due to JavaScript closure scoping. The IIFE creates a new scope
//   per iteration, binding `t` to the correct task object.
//
// IF THIS BREAKS:
// - dataGetStewardAssignedMemberTasks fails → withFailureHandler shows
//   "Failed to load member tasks" in red. No data leakage.
// - SESSION_TOKEN expired → server returns empty array (auth gate returns
//   false). UI shows "No member tasks assigned yet" — misleading but safe.
// - _refreshNavBadges missing → badge counts go stale until next page load.
//   Functional but confusing (task completed but badge still shows old count).
// - IIFE removed → all "Complete for member" buttons complete the LAST task
//   in the list, regardless of which button was clicked.
// ─────────────────────────────────────────────────────────────────────────────
function _renderStewardMemberTasks(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(tasks) {
    container.innerHTML = '';
    if (!tasks || tasks.length === 0) {
      container.appendChild(el('div', { className: 'empty-state' }, 'No member tasks assigned yet.'));
      return;
    }

    // KPI strip — summary counts at the top of the member tasks sub-tab
    var openTasks = tasks.filter(function(t) { return t.status !== 'completed'; });
    var completedTasks = tasks.filter(function(t) { return t.status === 'completed'; });
    renderKPIStrip(container, [
      { label: 'Total Assigned', value: tasks.length },
      { label: 'Open', value: openTasks.length, color: openTasks.length > 0 ? 'var(--accent)' : null },
      { label: 'Completed', value: completedTasks.length, color: completedTasks.length > 0 ? 'var(--success)' : null }
    ], { columns: 3, marginBottom: '10px' });

    tasks.forEach(function(task) {
      var priColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--muted)' };
      var card = el('div', { className: 'card card-accent-border', style: { padding: '12px 16px', marginBottom: '6px', borderLeftColor: priColors[task.priority] || 'var(--accent)' } });
      var top = el('div', { className: 'flex-between' });
      top.appendChild(el('div', { className: 'display-section' }, task.title));
      var statusColor = task.status === 'completed' ? 'var(--success)' : 'var(--accent)';
      top.appendChild(el('span', { style: { fontSize: '10px', fontWeight: '600', color: statusColor, background: statusColor + '18', padding: '2px 8px', borderRadius: '8px' } }, task.status));
      card.appendChild(top);
      if (task.memberEmail) card.appendChild(el('div', { className: 'text-xs-muted' }, 'Assigned to: ' + task.memberEmail.split('@')[0]));
      if (task.dueDate) card.appendChild(el('div', { style: { fontSize: '11px', color: task.dueDays !== null && task.dueDays < 0 ? 'var(--danger)' : 'var(--muted)' } }, 'Due: ' + task.dueDate));
      if (task.description) card.appendChild(el('div', { className: 'text-xs-muted-mt-4' }, task.description.substring(0, 100)));
      if (task.status !== 'completed') {
        var mActions = el('div', { style: { marginTop: '8px' } });
        (function(t) {
          var mErrSpan = el('span', { style: { fontSize: '11px', color: 'var(--danger)', display: 'block', marginTop: '4px' } });
          mActions.appendChild(el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
            onClick: function() {
              if (!confirm('Mark this member task as complete?')) return;
              serverCall().withSuccessHandler(function(r) {
                if (r && r.success) {
                  if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
                  _handleTabNav('steward', 'tasks');
                } else { mErrSpan.textContent = 'Failed to complete task.'; }
              }).withFailureHandler(function() { mErrSpan.textContent = 'Failed to complete task.'; }).dataStaffCompleteMemberTask(SESSION_TOKEN, t.id);
            }
          }, '\u2705 Complete for member'));
        })(task);
        mActions.appendChild(mErrSpan);
        card.appendChild(mActions);
      }
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load member tasks.'));
  }).dataGetStewardAssignedMemberTasks(SESSION_TOKEN);
}

// ═══════════════════════════════════════

function renderInsightsPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'insights', function(container) {
    _stewardHeader(container, 'Insights', 'Agency-wide analytics');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Cache: serve immediately on revisit, background-refresh after 5 min
    var CACHE_TTL = ((CONFIG && CONFIG.insightsCacheTTLMin) || 5) * 60 * 1000;
    var cache = AppState.insightsCache;
    var cacheAge = cache ? (Date.now() - (cache.ts || 0)) : Infinity;

    if (cache && cacheAge < CACHE_TTL) {
      _renderInsightsContent(content, cache.stats, cache.hotSpots, cache.perf, cache.sat, cache.memberStats, cache.workload);
      return;
    }
    if (cache) {
      // Stale: render stale immediately, refresh in background
      _renderInsightsContent(content, cache.stats, cache.hotSpots, cache.perf, cache.sat, cache.memberStats, cache.workload);
    } else {
      showLoading(content);
    }

    // v4.33.0 — Single batch call replaces 6 parallel server calls (saves ~5 round-trips of IPC overhead)
    serverCall().withSuccessHandler(function(batch) {
      if (!batch) batch = {};
      var statsData = batch.stats || (cache && cache.stats) || { available: false };
      var hotSpotsData = batch.hotSpots || (cache && cache.hotSpots) || [];
      var perfData = batch.perf || (cache && cache.perf) || [];
      var satData = batch.sat || (cache && cache.sat) || { categories: [] };
      var memberStatsData = batch.memberStats || (cache && cache.memberStats) || null;
      var workloadData = batch.workload || (cache && cache.workload) || { available: false };
      AppState.insightsCache = { ts: Date.now(), stats: statsData, hotSpots: hotSpotsData, perf: perfData, sat: satData, memberStats: memberStatsData, workload: workloadData };
      _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData);
    }).withFailureHandler(function() {
      var statsData = (cache && cache.stats) || { available: false };
      var hotSpotsData = (cache && cache.hotSpots) || [];
      var perfData = (cache && cache.perf) || [];
      var satData = (cache && cache.sat) || { categories: [] };
      var memberStatsData = (cache && cache.memberStats) || null;
      var workloadData = (cache && cache.workload) || { available: false };
      _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData);
    }).dataGetInsightsBatch(SESSION_TOKEN);
  });
}

/**
 * Renders a report generation card with date range picker and generate button.
 * Uses el() for safe DOM construction, escapeHtml() for all text output.
 * @param {HTMLElement} container - Parent container to append card to.
 */
function _renderReportGenerator(container) {
  var card = el('div', { className: 'card', style: { padding: '16px', marginBottom: '16px' } });
  card.appendChild(el('div', { style: { fontWeight: '600', fontSize: '15px', marginBottom: '12px' } }, 'Generate Report'));

  // Date range picker
  var dateRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap', alignItems: 'center' } });
  var startInput = el('input', { type: 'date', className: 'form-input', style: { flex: '1', minWidth: '130px' } });
  var endInput = el('input', { type: 'date', className: 'form-input', style: { flex: '1', minWidth: '130px' } });

  // Default to last month
  var now = new Date();
  var lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var endOfLastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
  startInput.value = lastMonth.toISOString().split('T')[0];
  endInput.value = endOfLastMonth.toISOString().split('T')[0];

  dateRow.appendChild(el('label', { style: { fontSize: '13px' } }, 'From:'));
  dateRow.appendChild(startInput);
  dateRow.appendChild(el('label', { style: { fontSize: '13px' } }, 'To:'));
  dateRow.appendChild(endInput);
  card.appendChild(dateRow);

  var previewContainer = el('div', {});

  var genBtn = el('button', { className: 'btn btn-primary',
    onclick: function() {
      genBtn.disabled = true;
      genBtn.textContent = 'Generating...';
      var dateRange = { start: startInput.value, end: endInput.value };
      serverCall().withSuccessHandler(function(result) {
        genBtn.disabled = false;
        genBtn.textContent = 'Generate Report';
        if (!result || !result.success || !result.report) return;
        _renderReportPreview(previewContainer, result.report);
      }).withFailureHandler(function() {
        genBtn.disabled = false;
        genBtn.textContent = 'Generate Report';
      }).dataGenerateMonthlyReport(SESSION_TOKEN, dateRange);
    }
  }, 'Generate Report');
  card.appendChild(genBtn);
  card.appendChild(previewContainer);
  container.appendChild(card);
}

/**
 * Renders a report preview with KPIs, category breakdown, and download button.
 * Uses el() for safe DOM construction, escapeHtml() for all text output.
 * @param {HTMLElement} container - Container to render preview into.
 * @param {Object} report - Report object from ReportService.generateMonthlyReport.
 */
function _renderReportPreview(container, report) {
  container.innerHTML = '';

  var preview = el('div', { style: { marginTop: '16px' } });
  preview.appendChild(el('h3', { style: { fontSize: '16px', marginBottom: '8px' } }, escapeHtml(report.title)));
  preview.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '12px' } }, 'Period: ' + escapeHtml(report.period)));

  // Summary KPIs
  var kpis = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(100px, 1fr))', gap: '8px', marginBottom: '16px' } });
  var stats = [
    { label: 'Total', value: report.summary.totalCases },
    { label: 'New', value: report.summary.newCases },
    { label: 'Resolved', value: report.summary.resolved },
    { label: 'Pending', value: report.summary.pending },
    { label: 'Overdue', value: report.summary.overdue }
  ];
  stats.forEach(function(s) {
    var kpi = el('div', { style: { textAlign: 'center', padding: '8px', background: 'var(--bg)', borderRadius: '8px' } });
    kpi.appendChild(el('div', { style: { fontSize: '20px', fontWeight: '700' } }, String(s.value)));
    kpi.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, s.label));
    kpis.appendChild(kpi);
  });
  preview.appendChild(kpis);

  // By category breakdown
  if (report.byCategory && Object.keys(report.byCategory).length > 0) {
    preview.appendChild(el('div', { style: { fontWeight: '600', fontSize: '14px', marginBottom: '6px' } }, 'By Category'));
    var catList = el('div', {});
    for (var cat in report.byCategory) {
      if (report.byCategory.hasOwnProperty(cat)) {
        var catRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: '13px' } });
        catRow.appendChild(el('span', {}, escapeHtml(cat)));
        catRow.appendChild(el('span', { style: { fontWeight: '600' } }, String(report.byCategory[cat])));
        catList.appendChild(catRow);
      }
    }
    preview.appendChild(catList);
  }

  // Download as text
  var downloadBtn = el('button', { className: 'btn btn-secondary', style: { marginTop: '12px' },
    onclick: function() {
      var text = report.title + '\nPeriod: ' + report.period + '\n\n';
      text += 'Total: ' + report.summary.totalCases + '\n';
      text += 'New: ' + report.summary.newCases + '\n';
      text += 'Resolved: ' + report.summary.resolved + '\n';
      text += 'Pending: ' + report.summary.pending + '\n';
      text += 'Overdue: ' + report.summary.overdue + '\n';
      if (report.byCategory && Object.keys(report.byCategory).length > 0) {
        text += '\nBy Category:\n';
        for (var c in report.byCategory) {
          if (report.byCategory.hasOwnProperty(c)) text += '  ' + c + ': ' + report.byCategory[c] + '\n';
        }
      }
      var blob = new Blob([text], { type: 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = el('a', { href: url, download: 'report-' + new Date().toISOString().split('T')[0] + '.txt', style: { display: 'none' } });
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }
  }, 'Download Report');
  preview.appendChild(downloadBtn);

  container.appendChild(preview);
}

function _renderInsightsContent(content, statsData, hotSpotsData, perfData, satData, memberStatsData, workloadData) {
  content.innerHTML = '';
  // Detail panel for drill-down views
  var detailPanel = el('div', { style: { display: 'none', marginBottom: '16px' } });
  content.appendChild(detailPanel);

  var mainContent = el('div');
  content.appendChild(mainContent);

  // Track current detail render for hash-based navigation
  var _currentDetailTitle = null;
  var _currentDetailRenderFn = null;
  var _detailRegistry = {};

  function _closeDetail() {
    detailPanel.style.display = 'none';
    mainContent.style.display = 'block';
    _currentDetailTitle = null;
    _currentDetailRenderFn = null;
    if (location.hash.indexOf('#insight-') === 0) {
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  function showDetail(title, renderFn) {
    detailPanel.innerHTML = '';
    detailPanel.style.display = 'block';
    mainContent.style.display = 'none';
    _currentDetailTitle = title;
    _currentDetailRenderFn = renderFn;

    // Set hash for back-button support
    var slug = 'insight-' + title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
    _detailRegistry[slug] = { title: title, renderFn: renderFn };
    history.pushState(null, '', '#' + slug);

    // Scroll to top
    content.scrollIntoView({ behavior: 'smooth', block: 'start' });

    var backBtn = el('button', { className: 'btn btn-sm', style: { marginBottom: '12px', fontSize: '12px' }, onClick: _closeDetail }, '\u2190 Back to Insights');
    detailPanel.appendChild(backBtn);
    detailPanel.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)', marginBottom: '12px' } }, title));

    renderFn(detailPanel);
  }

  // Listen for browser back button — single global handler to prevent accumulation
  if (window._insightsHashHandler) {
    window.removeEventListener('hashchange', window._insightsHashHandler);
  }
  window._insightsHashHandler = function() {
    var hash = location.hash.replace('#', '');
    if (_detailRegistry[hash] && detailPanel.style.display === 'none') {
      showDetail(_detailRegistry[hash].title, _detailRegistry[hash].renderFn);
    } else if (!hash || hash.indexOf('insight-') !== 0) {
      if (detailPanel.style.display !== 'none') _closeDetail();
    }
  };
  window.addEventListener('hashchange', window._insightsHashHandler);

  // v4.39.0 — Feature 17: Report generator at top of Insights
  _renderReportGenerator(mainContent);

  if (!statsData || !statsData.available) {
    mainContent.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, 'Grievance stats not yet available (minimum 10 records needed).'));
  } else {
    _renderQuickInsights(mainContent, statsData, hotSpotsData, showDetail);
    _renderFiledVsResolved(mainContent, statsData);
  }
  if (memberStatsData && memberStatsData.available) _renderMembershipInsights(mainContent, memberStatsData, showDetail);
  if (workloadData && (workloadData.success || workloadData.data)) _renderWorkloadInsights(mainContent, workloadData, showDetail);
  if (perfData && perfData.length > 0) _renderPerformanceSection(mainContent, perfData, showDetail);
  if (satData && satData.categories && satData.categories.length > 0) _renderSatisfactionSection(mainContent, satData, showDetail);

  // Outcome Analytics — separate fetch, independent of correlation engine (v4.35.0)
  var outcomePlaceholder = el('div', { id: 'outcome-analytics-section' });
  mainContent.appendChild(outcomePlaceholder);
  serverCall().withSuccessHandler(function(analytics) {
    if (!analytics || analytics.error || !analytics.totalCases) return;
    _renderOutcomeAnalytics(outcomePlaceholder, analytics, showDetail);
  }).withFailureHandler(function() { /* silent — optional section */ }).dataGetOutcomeAnalytics(SESSION_TOKEN, null);

  // Correlation Engine — fetch separately to avoid slowing the main batch
  var corrPlaceholder = el('div', { id: 'correlation-insights-section' });
  mainContent.appendChild(corrPlaceholder);
  serverCall().withSuccessHandler(function(res) {
    if (!res || !res.success) return;
    var summary = res.summary;
    if (!summary || summary.disabled || summary.total === 0) return;
    _renderCorrelationInsights(corrPlaceholder, summary, showDetail);
  }).withFailureHandler(function() { /* silent — optional section */ }).dataGetCorrelationSummary(SESSION_TOKEN);
}

function _renderMembershipInsights(container, ms, showDetail) {
  var section = el('div', { className: 'mb-16' });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',

  }}, 'Membership Overview'));

  grid.appendChild(_insightCard('TOTAL MEMBERS', 'var(--info)', _fmtNum(ms.total), '', function() {
    if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'members');
  }));

  // New members (last 90 days)
  var newCount = ms.newMembersLast90 || 0;

  if (ms.byHireMonth) {

    if (showDetail && ms.byHireMonth) showDetail('New Hires by Month', function(panel) {

  // Dues breakdown

  var duesSub = duesEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');

      _renderInsightDetailList(panel, duesEntries, 'var(--success)');
    });

  // Location breakdown
  var locEntries = [];
  if (ms.byLocation) Object.keys(ms.byLocation).forEach(function(k) { locEntries.push({ label: k, count: ms.byLocation[k] }); });
  locEntries.sort(function(a, b) { return b.count - a.count; });
  var locSub = locEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('TOP LOCATION', 'var(--accent)', locEntries.length > 0 ? locEntries[0].label : 'N/A', locSub, function() {
    if (showDetail) showDetail('Members by Location', function(panel) {
      _renderInsightDetailList(panel, locEntries, 'var(--accent)');
    });
  }));

  // Unit breakdown
  var unitEntries = [];
  if (ms.byUnit) Object.keys(ms.byUnit).forEach(function(k) { unitEntries.push({ label: k, count: ms.byUnit[k] }); });
  unitEntries.sort(function(a, b) { return b.count - a.count; });
  var unitSub = unitEntries.slice(0, 3).map(function(e) { return e.label + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('TOP UNIT', 'var(--warning)', unitEntries.length > 0 ? unitEntries[0].label : 'N/A', unitSub, function() {
    if (showDetail) showDetail('Members by Unit', function(panel) {
      _renderInsightDetailList(panel, unitEntries, 'var(--warning)');
    });

  section.appendChild(grid);
  container.appendChild(section);

/**
 * Renders workload prediction and rebalancing suggestion cards.
 * Called from renderWorkloadTracker (in member_view.html) when role is steward.
 * @param {Element} container - Container to append cards to
 */
function _renderWorkloadPredictions(container) {
  // Prediction card
  var card = el('div', { className: 'card', style: { padding: '16px', marginBottom: '16px' } });
  card.appendChild(el('div', { style: { fontWeight: '600', fontSize: '15px', marginBottom: '12px' } }, 'Workload Predictions'));

  var predictionContent = el('div');
  card.appendChild(predictionContent);

  serverCall().withSuccessHandler(function(pred) {
    if (!pred) return;

    var trendIcon = pred.trend === 'increasing' ? '\uD83D\uDCC8' : pred.trend === 'decreasing' ? '\uD83D\uDCC9' : '\u27A1\uFE0F';
    var trendColor = pred.trend === 'increasing' ? '#ef4444' : pred.trend === 'decreasing' ? '#22c55e' : 'var(--muted)';

    var row = el('div', { style: { display: 'flex', gap: '16px', alignItems: 'center', flexWrap: 'wrap' } });

    var currentBox = el('div', { style: { textAlign: 'center' } });
    currentBox.appendChild(el('div', { style: { fontSize: '24px', fontWeight: '700' } }, String(pred.current)));
    currentBox.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Current'));
    row.appendChild(currentBox);

    row.appendChild(el('span', { style: { fontSize: '20px', color: trendColor } }, trendIcon));

    var predictedBox = el('div', { style: { textAlign: 'center' } });
    predictedBox.appendChild(el('div', { style: { fontSize: '24px', fontWeight: '700', color: trendColor } }, String(pred.predicted)));
    predictedBox.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Predicted'));
    row.appendChild(predictedBox);

    predictionContent.appendChild(row);

    // Mini sparkline (CSS bars for history)
    if (pred.history && pred.history.length > 0) {
      var maxVal = Math.max.apply(null, pred.history) || 1;
      var spark = el('div', { style: { display: 'flex', alignItems: 'flex-end', gap: '2px', height: '40px', marginTop: '12px' } });
      pred.history.forEach(function(v) {
        var pct = Math.round((v / maxVal) * 100);
        spark.appendChild(el('div', {
          style: { flex: '1', height: pct + '%', background: 'var(--accent)', borderRadius: '2px 2px 0 0', minHeight: '2px' },
          title: String(v) + ' items'
        }));
      });
      predictionContent.appendChild(spark);
      predictionContent.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, 'Recent workload history'));
    }
  }).withFailureHandler(function() {
    predictionContent.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'Unable to load predictions.'));
  }).dataGetWorkloadPrediction(SESSION_TOKEN, '');

  container.appendChild(card);

  // Rebalancing suggestions card
  var rebalCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '16px' } });
  rebalCard.appendChild(el('div', { style: { fontWeight: '600', fontSize: '15px', marginBottom: '12px' } }, 'Rebalancing Suggestions'));

  var suggestContent = el('div');
  rebalCard.appendChild(suggestContent);

  serverCall().withSuccessHandler(function(suggestions) {
    if (!suggestions || suggestions.length === 0) {
      suggestContent.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'Workload is balanced across stewards.'));
      return;
    }
    suggestions.forEach(function(s) {
      var row = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid var(--border)' } });

      var leftCol = el('div');
      leftCol.appendChild(el('div', { style: { fontWeight: '500', fontSize: '14px' } }, escapeHtml(s.stewardEmail)));
      leftCol.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)' } }, escapeHtml(s.suggestion)));
      row.appendChild(leftCol);

      var rightCol = el('div', { style: { textAlign: 'right', fontSize: '13px' } });
      rightCol.appendChild(el('div', { style: { fontWeight: '600' } }, s.currentLoad + ' cases'));
      rightCol.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'avg: ' + s.averageLoad));
      row.appendChild(rightCol);

      suggestContent.appendChild(row);
    });
  }).withFailureHandler(function() {
    suggestContent.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'Unable to load suggestions.'));
  }).dataGetRebalancingSuggestions(SESSION_TOKEN);

  container.appendChild(rebalCard);
}

function _renderWorkloadInsights(container, wl, showDetail) {
  // Workload data is nested: { success, data: { totalSubmissions, members, categories, averages } }
  var d = (wl && wl.data) || wl || {};
  if (!d || (!d.totalSubmissions && !d.categories)) return;

  var section = el('div', { className: 'mb-16' });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Workload Overview'));

  var grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '10px', marginBottom: '12px' } });

  var totalSubmissions = d.totalSubmissions || 0;
  var memberCount = d.members || 0;
  grid.appendChild(_insightCard('SUBMISSIONS', 'var(--info)', _fmtNum(totalSubmissions), memberCount + ' stewards reporting', function() {
    /* workload tab not available in SolidBase */
  }));

  // Extract averages from the data — averages keys are CATEGORY_LABELS values
  var avgs = d.averages || {};
  var avgPriority = parseFloat(avgs['Priority Cases']) || 0;
  var avgPending = parseFloat(avgs['Pending Cases']) || 0;
  var avgAged = parseFloat(avgs['Aged Cases']) || 0;

  grid.appendChild(_insightCard('AVG PRIORITY CASES', avgPriority > 5 ? 'var(--danger)' : 'var(--success)', String(avgPriority), 'Per steward average', function() {
    if (showDetail) showDetail('Workload Breakdown', function(panel) {
      // Build items from all category averages
      var items = [];
      for (var key in avgs) {
        items.push({ label: key + ' (avg)', count: parseFloat(avgs[key]) || 0 });
      }
      items.sort(function(a, b) { return b.count - a.count; });
      _renderInsightDetailList(panel, items, 'var(--info)');
      var navBtn = el('button', { className: 'btn btn-primary', style: { marginTop: '12px', fontSize: '12px' }, onClick: function() {
        /* workload tab not available in SolidBase */
      }}, 'View Workload Tracker \u2192');
      panel.appendChild(navBtn);
    });
  }));

  grid.appendChild(_insightCard('AVG PENDING', avgPending > 10 ? 'var(--warning)' : 'var(--success)', String(avgPending), 'Cases awaiting action'));
  grid.appendChild(_insightCard('AVG AGED CASES', avgAged > 3 ? 'var(--danger)' : 'var(--success)', String(avgAged), 'Cases 60+ days old'));

  // Overtime and employment mix from workload data
  var avgOvertime = parseFloat(avgs['Overtime Hours']) || 0;
  if (avgOvertime > 0) {
    grid.appendChild(_insightCard('AVG OVERTIME', avgOvertime > 10 ? 'var(--danger)' : 'var(--warning)', String(avgOvertime) + 'h', 'Hours per steward'));
  }
  var avgFTE = parseFloat(avgs['Full-Time Employees']) || parseFloat(avgs['FTE Count']) || 0;
  var avgPTE = parseFloat(avgs['Part-Time Employees']) || parseFloat(avgs['PTE Count']) || 0;
  if (avgFTE > 0 || avgPTE > 0) {
    var mixRatio = avgFTE > 0 ? Math.round((avgFTE / (avgFTE + avgPTE)) * 100) : 0;
    grid.appendChild(_insightCard('EMPLOYMENT MIX', 'var(--accent)', mixRatio + '% FT', 'FT: ' + avgFTE + ' / PT: ' + avgPTE + ' avg'));
  }

  section.appendChild(grid);
  container.appendChild(section);
}

function _fmtNum(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function _insightCard(title, color, mainText, subText, onClick) {
  var card = el('div', { className: 'card card-glass', style: {
    padding: '16px 18px', borderLeft: '3px solid ' + color,
    background: color + '08',
    cursor: onClick ? 'pointer' : 'default',
    transition: 'transform 0.15s ease',
  }});
  if (onClick) {
    card.onclick = onClick;
    card.onmouseenter = function() { card.style.transform = 'translateY(-2px)'; };
    card.onmouseleave = function() { card.style.transform = ''; };
  }
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '11px', fontWeight: '600',
    color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px',
  }}, title));
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '24px', fontWeight: '700', color: color, lineHeight: '1.2',
  }}, mainText));
  if (subText) {
    card.appendChild(el('div', { style: {
      fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)', marginTop: '6px', lineHeight: '1.4',
    }}, subText));
  }
  return card;
}

function _renderQuickInsights(container, stats, hotSpots, showDetail) {
  var grid = el('div', { style: {
    display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
    gap: '10px', marginBottom: '16px',
  }});

  // Box 1: Grievance Status
  var activeCount = stats.openCount || 0;
  var statusSub = _fmtNum(stats.total) + ' total';
  var parts = [];
  if (stats.wonCount) parts.push(_fmtNum(stats.wonCount) + ' won');
  if (stats.deniedCount) parts.push(_fmtNum(stats.deniedCount) + ' denied');
  if (stats.settledCount) parts.push(_fmtNum(stats.settledCount) + ' settled');
  if (parts.length) statusSub += ' \u00B7 ' + parts.join(', ');
  grid.appendChild(_insightCard('GRIEVANCE STATUS', 'var(--info)', _fmtNum(activeCount) + ' Active', statusSub, function() {
    if (showDetail) showDetail('Grievance Status Details', function(panel) {
      var items = [{ label: 'Active / Open', count: activeCount }];
      if (stats.wonCount) items.push({ label: 'Won', count: stats.wonCount });
      if (stats.deniedCount) items.push({ label: 'Denied', count: stats.deniedCount });
      if (stats.settledCount) items.push({ label: 'Settled', count: stats.settledCount });
      if (stats.withdrawnCount) items.push({ label: 'Withdrawn', count: stats.withdrawnCount });
      _renderInsightDetailList(panel, items, 'var(--info)');
      // Add link to cases
      var navBtn = el('button', { className: 'btn btn-primary', style: { marginTop: '12px', fontSize: '12px' }, onClick: function() {
        if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
      }}, 'View All Cases \u2192');
      panel.appendChild(navBtn);
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 2: Hot Spots
  var hsCount = hotSpots ? hotSpots.length : 0;
  var hsColor = hsCount > 0 ? 'var(--danger)' : 'var(--success)';
  var hsSub = hsCount > 0
    ? hotSpots.slice(0, 3).map(function(h) { return h.location + ' (' + h.count + ')'; }).join(', ')
    : 'No concentration areas detected';
  grid.appendChild(_insightCard('HOT SPOTS', hsColor, hsCount > 0 ? hsCount + ' Location' + (hsCount > 1 ? 's' : '') : 'All Clear', hsSub, function() {
    if (showDetail && hotSpots && hotSpots.length > 0) showDetail('Grievance Hot Spots', function(panel) {
      var hsItems = hotSpots.map(function(h) { return { label: h.location, count: h.count }; });
      _renderInsightDetailList(panel, hsItems, 'var(--danger)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 3: Step Distribution
  var stepEntries = [];
  if (stats.byStep) {
    Object.keys(stats.byStep).forEach(function(k) { stepEntries.push({ step: k, count: stats.byStep[k] }); });
    stepEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var stepsWithCases = stepEntries.filter(function(e) { return e.count > 0; }).length;
  var stepSub = stepEntries.slice(0, 3).map(function(e) { return e.step + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('STEP DISTRIBUTION', 'var(--accent)', stepsWithCases + ' Step' + (stepsWithCases !== 1 ? 's' : ''), stepSub, function() {
    if (showDetail) showDetail('Grievance Step Distribution', function(panel) {
      var sItems = stepEntries.map(function(e) { return { label: e.step, count: e.count }; });
      _renderInsightDetailList(panel, sItems, 'var(--accent)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 4: Top Issue Category
  var catEntries = [];
  if (stats.byCategory) {
    Object.keys(stats.byCategory).forEach(function(k) { catEntries.push({ cat: k, count: stats.byCategory[k] }); });
    catEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var filteredCats = catEntries.filter(function(e) { return e.cat.toLowerCase() !== 'uncategorized'; });
  var topCat = filteredCats.length > 0 ? filteredCats[0] : (catEntries.length > 0 ? catEntries[0] : { cat: 'N/A', count: 0 });
  grid.appendChild(_insightCard('TOP ISSUE CATEGORY', 'var(--warning)', topCat.cat, topCat.count + ' cases', function() {
    if (showDetail) showDetail('Issue Categories', function(panel) {
      var cItems = catEntries.map(function(e) { return { label: e.cat, count: e.count }; });
      _renderInsightDetailList(panel, cItems, 'var(--warning)');
    });
    else if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  // Box 5: Overdue Cases
  var overdueVal = stats.overdueCount || 0;
  var dueSoonVal = stats.dueSoonCount || 0;
  var overdueColor = overdueVal > 0 ? 'var(--danger)' : 'var(--success)';
  var overdueSub = dueSoonVal > 0 ? dueSoonVal + ' due this week' : 'No upcoming deadlines';
  grid.appendChild(_insightCard('OVERDUE CASES', overdueColor, _fmtNum(overdueVal), overdueSub, function() {
    if (typeof _handleTabNav === 'function') _handleTabNav('steward', 'cases');
  }));

  container.appendChild(grid);
}

// Helper: renders a detailed breakdown list for drill-down views
function _renderInsightDetailList(panel, items, color) {
  if (!items || items.length === 0) {
    panel.appendChild(el('div', { className: 'empty-state-sm' }, 'No data available.'));
    return;
  }
  var maxCount = Math.max.apply(null, items.map(function(i) { return i.count || 0; }));
  items.forEach(function(item) {
    var row = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '12px' } });
    var labelEl = el('div', { style: { flex: '1', minWidth: '0' } });
    labelEl.appendChild(el('div', { className: 'display-section' }, item.label));
    // Progress bar — sm (4px) relative-to-max chart bar
    var pct = maxCount > 0 ? Math.round(((item.count || 0) / maxCount) * 100) : 0;
    var barBg = el('div', { className: 'prog-track prog-track--sm', style: { marginTop: '4px' } });
    barBg.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%', background: color } }));
    labelEl.appendChild(barBg);
    row.appendChild(labelEl);
    row.appendChild(el('div', { style: { fontSize: '16px', fontWeight: '700', color: color, minWidth: '40px', textAlign: 'right' } }, _fmtNum(item.count || 0)));
    panel.appendChild(row);
  });
}

function _renderPerformanceSection(container, perfData, showDetail) {
  var section = el('div', { className: 'mb-16' });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, CONFIG.stewardLabel + ' Performance'));

  // Aggregate stats — weighted by case count for accuracy
  var totalWon = 0, totalClosed = 0, totalDaysWeighted = 0, totalDaysCount = 0, count = 0;
  perfData.forEach(function(p) {
    totalWon += p.won || 0;
    totalClosed += p.closed || 0;
    if (p.closed > 0) { totalDaysWeighted += (p.avgDays || 0) * p.closed; totalDaysCount += p.closed; }
    count++;
  });
  var avgWin = totalClosed > 0 ? Math.round((totalWon / totalClosed) * 100) : 0;
  // Fallback: average individual winRate values if no won/closed counts available
  if (avgWin === 0 && count > 0) {
    var sumRate = 0, rateCount = 0;
    perfData.forEach(function(p) { if (p.winRate > 0) { sumRate += p.winRate; rateCount++; } });
    if (rateCount > 0) avgWin = Math.round(sumRate / rateCount);
  }
  var avgDays = totalDaysCount > 0 ? Math.round(totalDaysWeighted / totalDaysCount) : 0;

  var statsRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '12px' } });
  statsRow.appendChild(_insightCard('AVG WIN RATE', 'var(--success)', avgWin + '%', count + ' ' + CONFIG.stewardLabel.toLowerCase() + 's', function() {
    if (showDetail) showDetail(CONFIG.stewardLabel + ' Win Rates', function(panel) {
      var items = perfData.map(function(p) { return { label: p.steward, count: p.winRate || 0 }; });
      items.sort(function(a, b) { return b.count - a.count; });
      items.forEach(function(item) { item.label = item.label + ' (' + item.count + '%)'; });
      _renderInsightDetailList(panel, items, 'var(--success)');
    });
  }));
  statsRow.appendChild(_insightCard('AVG RESOLUTION', 'var(--info)', avgDays + 'd', 'Days to close', function() {
    if (showDetail) showDetail('Resolution Time by ' + CONFIG.stewardLabel, function(panel) {
      var items = perfData.filter(function(p) { return p.avgDays > 0; }).map(function(p) { return { label: p.steward + ' (' + p.avgDays + ' days)', count: p.avgDays }; });
      items.sort(function(a, b) { return a.count - b.count; }); // fastest first
      _renderInsightDetailList(panel, items, 'var(--info)');
    });
  }));
  statsRow.appendChild(_insightCard('TEAM SIZE', 'var(--accent)', String(count), 'Active ' + CONFIG.stewardLabel.toLowerCase() + 's'));
  section.appendChild(statsRow);

  // Top performers table
  var tableCard = el('div', { className: 'card card-glass', style: { padding: '14px', overflow: 'auto' } });
  var table = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '12px', fontFamily: 'var(--fontBody)' } });
  var thead = el('tr');
  ['Name', 'Cases', 'Won', 'Win%', 'Avg Days', 'Score'].forEach(function(h) {
    thead.appendChild(el('th', { style: { textAlign: 'left', padding: '6px 8px', color: 'var(--muted)', fontSize: '10px', textTransform: 'uppercase', borderBottom: '1px solid var(--border)' } }, h));
  });
  table.appendChild(thead);

  perfData.slice(0, 10).forEach(function(p) {
    var row = el('tr');
    var scoreColor = p.performanceScore >= 80 ? 'var(--success)' : p.performanceScore >= 50 ? 'var(--warning)' : 'var(--danger)';
    [p.steward, p.totalCases, p.won, p.winRate + '%', p.avgDays, p.performanceScore].forEach(function(val, idx) {
      var style = { padding: '6px 8px', color: idx === 5 ? scoreColor : 'var(--text)', fontWeight: idx === 5 ? '700' : '400', borderBottom: '1px solid var(--border)' };
      row.appendChild(el('td', { style: style }, String(val)));
    });
    table.appendChild(row);
  });
  tableCard.appendChild(table);
  section.appendChild(tableCard);
  container.appendChild(section);
}

function _renderSatisfactionSection(container, trends, showDetail) {
  var section = el('div', { className: 'mb-16' });
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Member Satisfaction Trends'));

  // Overall score card — clickable for category drill-down

    overallCard.onmouseenter = function() { overallCard.style.transform = 'translateY(-2px)'; };

          _renderInsightDetailList(panel, items, scoreColor);
        }
        panel.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '12px' } }, trends.responseCount + ' total responses'));
      });

  }
  overallCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '32px', fontWeight: '700', color: scoreColor } }, String(trends.overall)));
  var overallInfo = el('div');
  overallInfo.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', fontWeight: '600' } }, 'Overall Score'));
  overallInfo.appendChild(el('div', { className: 'text-xs-muted' }, trends.responseCount + ' responses'));
  if (showDetail) overallInfo.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--accent)', marginTop: '4px' } }, 'Tap for details \u2192'));
  overallCard.appendChild(overallInfo);
  section.appendChild(overallCard);

  // Horizontal bar chart of categories
  if (typeof ChartHelper !== 'undefined' && trends.categories.length > 0) {
    var chartCard = el('div', { className: 'card card-glass p-16' });
    var labels = trends.categories.map(function(c) { return c.name; });
    var data = trends.categories.map(function(c) { return c.avg; });
    ChartHelper.createHorizontalBarChart(chartCard, 'insights-satisfaction-chart', labels, data);
    section.appendChild(chartCard);
  } else if (trends.categories.length > 0) {
    // Fallback: simple bars
    var barsCard = el('div', { className: 'card card-glass p-16' });
    trends.categories.forEach(function(cat) {
      var row = el('div', { className: 'mb-10' });
      var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '3px' } });
      header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text)' } }, cat.name));
      header.appendChild(el('span', { style: { fontSize: '11px', fontWeight: '600', color: cat.avg >= 7 ? 'var(--success)' : cat.avg >= 5 ? 'var(--warning)' : 'var(--danger)' } }, String(cat.avg)));
      row.appendChild(header);
      var satColorClass = cat.avg >= 7 ? 'prog-fill--success' : cat.avg >= 5 ? 'prog-fill--warning' : 'prog-fill--danger';
      var barBg = el('div', { className: 'prog-track prog-track--md' });
      barBg.appendChild(el('div', { className: 'prog-fill ' + satColorClass, style: { width: (cat.avg * 10) + '%' } }));
      row.appendChild(barBg);
      barsCard.appendChild(row);
    });
    section.appendChild(barsCard);
  }

  container.appendChild(section);
}
