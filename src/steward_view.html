function renderSearchPage(appContainer) {
  var role = AppState.userRole || 'steward';
  renderPageLayout(appContainer, role, 'search', function(container) {
    _stewardHeader(container, 'Search', 'Find members and grievances');
    var content = el('div', { className: 'content' });
    container.appendChild(content);

    // Search input
    var searchRow = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '16px' } });
    var input = el('input', {
      type: 'text', placeholder: 'Search by name, email, ID, or status...',
      style: { flex: '1', padding: '10px 14px', borderRadius: '10px', border: '1px solid var(--border)', background: 'var(--card)', color: 'var(--text)', fontSize: '14px', boxSizing: 'border-box' },
      autofocus: true
    });
    searchRow.appendChild(input);

    // Tab filter
    var tabSelect = el('select', {
      style: { padding: '10px 12px', borderRadius: '10px', border: '1px solid var(--border)', background: 'var(--card)', color: 'var(--text)', fontSize: '13px' }
    });
    ['all', 'members', 'grievances'].forEach(function(t) {
      var opt = el('option', { value: t }, t.charAt(0).toUpperCase() + t.slice(1));
      tabSelect.appendChild(opt);
    });
    searchRow.appendChild(tabSelect);
    content.appendChild(searchRow);

    var resultsContainer = el('div');
    content.appendChild(resultsContainer);

    var _debounceTimer = null;

    function doSearch() {
      var q = (input.value || '').trim();
      if (q.length < 2) {
        resultsContainer.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px">Type at least 2 characters to search.</div>';
        return;
      }
      resultsContainer.innerHTML = '';
      showLoading(resultsContainer, 'search');
      serverCall().withSuccessHandler(function(res) {
        resultsContainer.innerHTML = '';
        if (!res || !res.success) {
          resultsContainer.appendChild(el('div', { style: { color: 'var(--danger)', padding: '20px', textAlign: 'center' } }, (res && res.message) || 'Search failed.'));
          return;
        }
        var results = res.results || [];
        if (results.length === 0) {
          resultsContainer.appendChild(el('div', { className: 'empty-state' }, 'No results found for "' + safeText(q) + '".'));
          return;
        }
        // Result count
        resultsContainer.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '10px' } }, results.length + ' result' + (results.length !== 1 ? 's' : '')));
        results.forEach(function(r) {
          var card = el('div', { className: 'card card-glass', style: {
            padding: '12px 14px', marginBottom: '8px', cursor: 'pointer',
            transition: 'transform 0.12s ease, box-shadow 0.12s ease',
          }});
          card.onmouseenter = function() { card.style.transform = 'translateY(-1px)'; card.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)'; };
          card.onmouseleave = function() { card.style.transform = ''; card.style.boxShadow = ''; };

          var header = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
          var typeColor = r.type === 'member' ? 'var(--info)' : 'var(--warning)';
          var typeLabel = r.type === 'member' ? 'MEMBER' : 'CASE';
          header.appendChild(el('span', { style: { fontSize: '9px', fontWeight: '700', padding: '2px 6px', borderRadius: '6px', background: typeColor, color: '#fff', textTransform: 'uppercase', letterSpacing: '0.5px' } }, typeLabel));
          header.appendChild(el('span', { className: 'display-section' }, safeText(r.title || '')));
          card.appendChild(header);

          if (r.subtitle) card.appendChild(el('div', { className: 'text-sm-muted' }, safeText(r.subtitle)));
          if (r.detail) card.appendChild(el('div', { className: 'text-xs-muted-mt-2' }, safeText(r.detail)));

          // Navigate on click
          card.onclick = function() {
            if (r.type === 'member' && typeof _handleTabNav === 'function') {
              _handleTabNav(role, 'members');
            } else if (r.type === 'grievance' && typeof _handleTabNav === 'function') {
              _handleTabNav(role, 'cases');
            }
          };
          resultsContainer.appendChild(card);
        });
      }).withFailureHandler(function(err) {
        resultsContainer.innerHTML = '';
        resultsContainer.appendChild(el('div', { style: { color: 'var(--danger)', padding: '20px', textAlign: 'center' } }, 'Search failed: ' + safeText((err && err.message) || 'Unknown error')));
      }).dataGetWebAppSearchResults(SESSION_TOKEN, q, tabSelect.value);
    }

    input.addEventListener('input', function() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(doSearch, 300);
    });
    tabSelect.addEventListener('change', doSearch);

    // Initial state
    resultsContainer.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);font-size:13px">Type at least 2 characters to search.</div>';
  });
}

/**
 * Renders a simple CSS bar row (no chart library).
 * @param {HTMLElement} container
 * @param {string} label
 * @param {number} value
 * @param {number} maxValue
 * @param {string} [color]
 */
function _renderOutcomeBar(container, label, value, maxValue, color) {
  var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
  row.appendChild(el('div', { style: { width: '120px', fontSize: '13px', textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap' } }, escapeHtml(label)));
  var barBg = el('div', { style: { flex: '1', height: '20px', background: 'var(--border-subtle, var(--border))', borderRadius: '4px', overflow: 'hidden' } });
  var pct = maxValue > 0 ? Math.round((value / maxValue) * 100) : 0;
  barBg.appendChild(el('div', { style: { width: pct + '%', height: '100%', background: color || 'var(--accent)', borderRadius: '4px', transition: 'width 0.3s ease' } }));
  row.appendChild(barBg);
  row.appendChild(el('span', { style: { fontSize: '13px', fontWeight: '500', minWidth: '30px' } }, String(value)));
  container.appendChild(row);
}

/**
 * Renders Grievance Outcome Analytics section on the Insights page.
 * @param {HTMLElement} container - Placeholder element
 * @param {Object} analytics - Data from getOutcomeAnalytics()
 * @param {function} showDetail - Detail drill-down function
 */
function _renderOutcomeAnalytics(container, analytics, showDetail) {
  container.innerHTML = '';
  var section = el('div', { className: 'mb-16' });

  // Section header
  section.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px'
  }}, 'Grievance Outcome Analytics'));

  // KPI strip
  var winRate = analytics.resolved + analytics.denied > 0
    ? Math.round((analytics.resolved / (analytics.resolved + analytics.denied)) * 100)
    : 0;
  renderKPIStrip(section, [
    { label: 'Total Cases', value: _fmtNum(analytics.totalCases), color: 'var(--info)' },
    { label: 'Win Rate', value: winRate + '%', color: winRate >= 50 ? 'var(--success)' : 'var(--warning)' },
    { label: 'Avg Resolution', value: analytics.avgResolutionDays + 'd', color: 'var(--accent)' },
    { label: 'Pending', value: _fmtNum(analytics.pending), color: 'var(--muted)' }
  ], { columns: 4 });

  // Top categories by case count (bar chart)
  var catKeys = Object.keys(analytics.byCategory);
  if (catKeys.length > 0) {
    var catCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '12px' } });
    catCard.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '10px' } }, 'Top Categories by Case Count'));
    // Sort by total descending, take top 5
    catKeys.sort(function(a, b) { return analytics.byCategory[b].total - analytics.byCategory[a].total; });
    var topCats = catKeys.slice(0, 5);
    var maxCatCount = topCats.length > 0 ? analytics.byCategory[topCats[0]].total : 1;
    topCats.forEach(function(cat) {
      _renderOutcomeBar(catCard, cat, analytics.byCategory[cat].total, maxCatCount, 'var(--accent)');
    });
    section.appendChild(catCard);
  }

  // Steward performance table
  var stewardKeys = Object.keys(analytics.bySteward);
  if (stewardKeys.length > 0) {
    var stewardCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '12px' } });
    stewardCard.appendChild(el('div', { style: { fontSize: '11px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '10px' } }, 'Steward Performance'));

    var table = el('div', { style: { overflowX: 'auto' } });
    var tbl = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '13px' } });

    // Header row
    var thead = el('tr', { style: { borderBottom: '2px solid var(--border)' } });
    ['Steward', 'Cases', 'Win Rate', 'Avg Days'].forEach(function(h) {
      thead.appendChild(el('th', { style: { textAlign: 'left', padding: '6px 8px', fontSize: '11px', fontWeight: '600', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px' } }, h));
    });
    tbl.appendChild(thead);

    // Sort stewards by case count descending
    stewardKeys.sort(function(a, b) { return analytics.bySteward[b].total - analytics.bySteward[a].total; });

    stewardKeys.forEach(function(name) {
      var s = analytics.bySteward[name];
      var sWinRate = s.won + s.lost > 0 ? Math.round((s.won / (s.won + s.lost)) * 100) : 0;
      var sAvgDays = s.closedCount > 0 ? Math.round(s.totalDays / s.closedCount) : 0;

      var row = el('tr', { style: { borderBottom: '1px solid var(--border)' } });
      row.appendChild(el('td', { style: { padding: '6px 8px', fontWeight: '500' } }, escapeHtml(name)));
      row.appendChild(el('td', { style: { padding: '6px 8px' } }, String(s.total)));
      var rateCell = el('td', { style: { padding: '6px 8px', fontWeight: '600', color: sWinRate >= 50 ? 'var(--success)' : 'var(--warning)' } }, sWinRate + '%');
      row.appendChild(rateCell);
      row.appendChild(el('td', { style: { padding: '6px 8px' } }, sAvgDays > 0 ? sAvgDays + 'd' : '\u2014'));
      tbl.appendChild(row);
    });

    table.appendChild(tbl);
    stewardCard.appendChild(table);
    section.appendChild(stewardCard);
  }

  // Drill-down detail view
  if (showDetail && catKeys.length > 0) {
    var viewAllBtn = el('button', { className: 'btn btn-sm', style: { marginTop: '8px', fontSize: '11px' }, onClick: function() {
      showDetail('Outcome Analytics — Full Breakdown', function(panel) {
        // Unit breakdown
        var unitKeys = Object.keys(analytics.byUnit);
        if (unitKeys.length > 0) {
          panel.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px', marginTop: '8px' } }, 'By Unit'));
          var unitCard = el('div', { className: 'card card-glass', style: { padding: '12px' } });
          unitKeys.sort(function(a, b) { return analytics.byUnit[b].total - analytics.byUnit[a].total; });
          var maxUnit = analytics.byUnit[unitKeys[0]].total;
          unitKeys.forEach(function(u) {
            _renderOutcomeBar(unitCard, u, analytics.byUnit[u].total, maxUnit, 'var(--info)');
          });
          panel.appendChild(unitCard);
        }

        // All categories (not just top 5)
        if (catKeys.length > 5) {
          panel.appendChild(el('div', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px', marginTop: '16px' } }, 'All Categories'));
          var allCatCard = el('div', { className: 'card card-glass', style: { padding: '12px' } });
          var maxAllCat = analytics.byCategory[catKeys[0]].total;
          catKeys.forEach(function(cat) {
            _renderOutcomeBar(allCatCard, cat, analytics.byCategory[cat].total, maxAllCat, 'var(--accent)');
          });
          panel.appendChild(allCatCard);
        }
      });
    }}, 'View Full Breakdown \u2192');
    section.appendChild(viewAllBtn);
  }

  container.appendChild(section);
}

// ═══════════════════════════════════════
// CORRELATION INSIGHTS (v4.33.0 — no PII)
// ═══════════════════════════════════════

function _renderCorrelationInsights(container, summary, showDetail) {
  container.innerHTML = '';
  var section = el('div', { className: 'mb-16' });

  // Section header
  var headerRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' } });
  headerRow.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)',
  }}, 'Statistical Correlations'));
  if (summary.actionableCount > 0) {
    headerRow.appendChild(el('span', { style: {
      fontSize: '10px', fontWeight: '600', padding: '2px 8px', borderRadius: '10px',
      background: 'var(--accent)', color: '#fff',
    }}, summary.actionableCount + ' actionable'));
  }
  section.appendChild(headerRow);

  // Summary KPI grid
  var grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '8px', marginBottom: '12px' } });
  var items = [
    { label: 'STRONG', value: summary.strong, color: 'var(--danger)' },
    { label: 'MODERATE', value: summary.moderate, color: 'var(--warning)' },
    { label: 'WEAK', value: summary.weak, color: 'var(--muted)' },
    { label: 'TOTAL', value: summary.total, color: 'var(--info)' }
  ];
  items.forEach(function(item) {
    var card = el('div', { className: 'card card-glass', style: { padding: '12px', textAlign: 'center' } });
    card.appendChild(el('div', { style: { fontSize: '20px', fontWeight: '700', color: item.color } }, String(item.value)));
    card.appendChild(el('div', { className: 'text-label' }, item.label));
    grid.appendChild(card);
  });
  section.appendChild(grid);

  // Top insights list
  if (summary.topInsights && summary.topInsights.length > 0) {
    var listCard = el('div', { className: 'card card-glass', style: { padding: '12px' } });
    listCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' } }, 'Top Insights'));
    summary.topInsights.forEach(function(ins) {
      var row = el('div', { style: { display: 'flex', alignItems: 'flex-start', gap: '10px', padding: '8px 0', borderBottom: '1px solid var(--border)' } });

      // Correlation badge
      var rAbs = Math.abs(ins.r || 0).toFixed(2);
      var badgeColor = ins.strength === 'strong' ? 'var(--danger)' : ins.strength === 'moderate' ? 'var(--warning)' : 'var(--muted)';
      row.appendChild(el('div', { style: {
        minWidth: '44px', textAlign: 'center', padding: '4px 6px', borderRadius: '6px',
        fontSize: '11px', fontWeight: '700', color: '#fff', background: badgeColor,
      }}, 'r=' + rAbs));

      var info = el('div', { className: 'flex-1' });
      info.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)' } }, ins.title));
      if (ins.insight) {
        info.appendChild(el('div', { className: 'text-xs-muted-mt-2' }, ins.insight));
      }
      row.appendChild(info);
      listCard.appendChild(row);
    });
    section.appendChild(listCard);

    // Drill-down detail view
    if (showDetail) {
      var viewAll = el('button', { className: 'btn btn-sm', style: { marginTop: '8px', fontSize: '11px' }, onClick: function() {
        showDetail('All Correlations', function(panel) {
          // Fetch full alerts for the detail view
          serverCall().withSuccessHandler(function(res) {
            if (!res || !res.success || !res.alerts || res.alerts.length === 0) {
              panel.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px', textAlign: 'center' } }, 'No actionable alerts at this time.'));
              return;
            }
            res.alerts.forEach(function(alert) {
              var alertCard = el('div', { className: 'card card-glass', style: { padding: '12px', marginBottom: '8px' } });
              var alertHeader = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' } });
              var sevColor = alert.severity === 'high' ? 'var(--danger)' : 'var(--warning)';
              alertHeader.appendChild(el('span', { className: 'material-icons', style: { fontSize: '18px', color: sevColor } }, alert.icon || 'trending_up'));
              alertHeader.appendChild(el('span', { className: 'display-section' }, alert.title));
              if (alert.actionable) {
                alertHeader.appendChild(el('span', { style: { fontSize: '9px', padding: '2px 6px', borderRadius: '8px', background: sevColor, color: '#fff', fontWeight: '600' } }, 'ACTION'));
              }
              alertCard.appendChild(alertHeader);
              alertCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.4' } }, alert.message));
              alertCard.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '6px' } }, 'r = ' + (alert.r || 0).toFixed(2) + ' | n = ' + (alert.sampleSize || 0)));
              panel.appendChild(alertCard);
            });
          }).withFailureHandler(function() {
            panel.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px' } }, 'Failed to load correlation alerts.'));
          }).dataGetCorrelationAlerts(SESSION_TOKEN);
        });
      }}, 'View All Correlations \u2192');
      section.appendChild(viewAll);
    }
  }

  container.appendChild(section);
}

// ═══════════════════════════════════════
// STEWARD DIRECTORY (steward role, v4.15.0)
// ═══════════════════════════════════════

function renderStewardDirectoryPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'stewarddirectory', function(container) {
    _stewardHeader(container, CONFIG.stewardLabel + ' Directory', 'Contact your fellow stewards');
    var content = el('div', { className: 'content' });
    showLoading(content, 'member-list');
    container.appendChild(content);

    serverCall().withSuccessHandler(function(stewards) {
      content.innerHTML = '';
      if (!stewards || stewards.length === 0) {
        content.appendChild(el('div', { className: 'empty-state' }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
        return;
      }

      // Search input
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search by name, location, or unit...',
        onInput: function() { renderList(searchInput.value.toLowerCase(), activeLocFilter); },
      });
      content.appendChild(searchInput);

      // Location quick-filter pills
      var locs = {};
      stewards.forEach(function(s) { if (s.workLocation) locs[s.workLocation] = (locs[s.workLocation] || 0) + 1; });
      var topLocs = Object.keys(locs).sort(function(a, b) { return locs[b] - locs[a]; }).slice(0, 5);
      var activeLocFilter = '';

      var pillBar = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' } });
      function renderPills() {
        pillBar.innerHTML = '';
        var clearPill = el('button', {
          style: {
            fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
            background: !activeLocFilter ? 'var(--accent)' : 'var(--surface)',
            color: !activeLocFilter ? '#fff' : 'var(--muted)',
            border: '1px solid ' + (!activeLocFilter ? 'var(--accent)' : 'var(--border)'),
          },
          onClick: function() { activeLocFilter = ''; renderPills(); renderList(searchInput.value.toLowerCase(), ''); },
        }, 'All');
        pillBar.appendChild(clearPill);
        topLocs.forEach(function(loc) {
          var pill = el('button', {
            style: {
              fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
              background: activeLocFilter === loc ? 'var(--accent)' : 'var(--surface)',
              color: activeLocFilter === loc ? '#fff' : 'var(--muted)',
              border: '1px solid ' + (activeLocFilter === loc ? 'var(--accent)' : 'var(--border)'),
            },
            onClick: function() { activeLocFilter = loc; renderPills(); renderList(searchInput.value.toLowerCase(), loc); },
          }, loc);
          pillBar.appendChild(pill);
        });
      }
      if (topLocs.length > 1) {
        renderPills();
        content.appendChild(pillBar);
      }

      var listArea = el('div');
      content.appendChild(listArea);

      function renderList(query, locFilter) {
        listArea.innerHTML = '';
        var filtered = stewards.filter(function(s) {
          if (locFilter && (s.workLocation || '') !== locFilter) return false;
          if (!query) return true;
          return (s.name || '').toLowerCase().indexOf(query) !== -1
            || (s.workLocation || '').toLowerCase().indexOf(query) !== -1
            || (s.unit || '').toLowerCase().indexOf(query) !== -1;
        });

        if (filtered.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)' } }, 'No matches.'));
          return;
        }

        // Smart sort: (1) same work location as current user, (2) in office today, (3) alphabetical
        var myLocation = (CURRENT_USER && CURRENT_USER.workLocation) ? CURRENT_USER.workLocation.trim().toLowerCase() : '';
        var days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        var todayName = days[new Date().getDay()];
        function isInOfficeToday(s) {
          if (!s.officeDays) return false;
          return s.officeDays.toLowerCase().indexOf(todayName) !== -1;
        }
        filtered.sort(function(a, b) {
          var aLoc = (a.workLocation || '').trim().toLowerCase();
          var bLoc = (b.workLocation || '').trim().toLowerCase();
          var aMatch = myLocation && aLoc === myLocation ? 0 : 1;
          var bMatch = myLocation && bLoc === myLocation ? 0 : 1;
          if (aMatch !== bMatch) return aMatch - bMatch;
          var aOffice = isInOfficeToday(a) ? 0 : 1;
          var bOffice = isInOfficeToday(b) ? 0 : 1;
          if (aOffice !== bOffice) return aOffice - bOffice;
          return (a.name || '').localeCompare(b.name || '');
        });

        filtered.forEach(function(s, i) {
          var card = el('div', {
            className: 'card card-glass card-fade-in',
            style: { padding: '14px 16px', marginBottom: '6px', cursor: 'pointer', animationDelay: (i * 0.04) + 's' },
          });
          var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
          topRow.appendChild(el('div', { className: 'member-list-avatar' }, (s.name || 'S').charAt(0).toUpperCase()));
          var info = el('div', { className: 'flex-1' });
          info.appendChild(el('div', { className: 'display-title-sm' }, s.name || s.email));
          var meta = [];
          if (s.workLocation) meta.push(s.workLocation);
          if (s.unit) meta.push(s.unit);
          info.appendChild(el('div', { className: 'text-xs-muted' }, meta.join(' \u00B7 ')));
          topRow.appendChild(info);
          card.appendChild(topRow);

          // Expandable details
          card.setAttribute('aria-expanded', 'false');
          var details = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          if (s.email) details.appendChild(el('a', { href: 'mailto:' + s.email, style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginBottom: '4px' } }, '\u2709\uFE0F ' + s.email));
          if (s.phone) details.appendChild(el('a', { href: 'tel:' + s.phone, style: { display: 'block', fontSize: '12px', color: 'var(--success)', marginBottom: '4px' } }, '\uD83D\uDCDE ' + s.phone));
          if (s.officeDays) details.appendChild(el('div', { className: 'text-xs-muted-mb-6' }, '\uD83D\uDCC5 In-office: ' + s.officeDays));

          // vCard download button
          details.appendChild(el('button', {
            style: { fontSize: '11px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accent)', color: '#fff', fontWeight: '600', marginTop: '4px' },
            onClick: function(e) {
              e.stopPropagation();
              var vcf = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + (s.name || '') + '\n';
              if (s.email) vcf += 'EMAIL:' + s.email + '\n';
              if (s.phone) vcf += 'TEL:' + s.phone + '\n';
              if (s.workLocation) vcf += 'ORG:' + (CONFIG.orgName || '') + ';' + s.workLocation + '\n';
              if (s.unit) vcf += 'TITLE:' + CONFIG.stewardLabel + ' - ' + s.unit + '\n';
              vcf += 'END:VCARD';
              var blob = new Blob([vcf], { type: 'text/vcard' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url;
              a.download = (s.name || 'contact').replace(/\s+/g, '_') + '.vcf';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            },
          }, '\uD83D\uDCBE Save Contact'));
          card.appendChild(details);

          card.addEventListener('click', function() {
            var isHidden = details.style.display === 'none';
            details.style.display = isHidden ? 'block' : 'none';
            card.setAttribute('aria-expanded', String(isHidden));
          });
          listArea.appendChild(card);
        });
      }
      renderList('', '');
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load directory.'));
    }).dataGetStewardDirectory(SESSION_TOKEN);
  });
}

// ═══════════════════════════════════════
// ESCALATION RECOMMENDATION — Automated Case Escalation (v4.36.0 — Feature 14)
// ═══════════════════════════════════════

/**
 * Checks if a case should be escalated and displays a recommendation banner.
 * Called when a case card is expanded. Only fetches once per card (checks for
 * existing `.escalation-banner` element before making a server call).
 * @param {HTMLElement} card - The case card element
 * @param {string} caseId - The grievance/case ID
 */
function _checkEscalationRecommendation(card, caseId) {
  // Don't show if already shown
  if (card.querySelector('.escalation-banner')) return;

  serverCall().withSuccessHandler(function(rec) {
    if (!rec || !rec.shouldEscalate) return;

    var colors = { high: '#ef4444', medium: '#f97316', low: '#eab308' };
    var bgColors = { high: '#fef2f2', medium: '#fff7ed', low: '#fefce8' };
    var confidence = String(rec.confidence || 'low');
    var color = colors[confidence] || '#eab308';
    var bgColor = bgColors[confidence] || '#fefce8';

    var banner = el('div', { className: 'escalation-banner' });
    banner.style.margin = '8px 0';
    banner.style.padding = '10px 14px';
    banner.style.borderRadius = '8px';
    banner.style.border = '1px solid ' + color;
    banner.style.background = bgColor;
    banner.style.fontSize = '13px';

    // Prevent card click from toggling when interacting with banner
    banner.addEventListener('click', function(ev) { ev.stopPropagation(); });

    var header = el('div', { style: { display: 'flex', alignItems: 'center', gap: '6px', fontWeight: '600', color: color } });
    header.appendChild(el('span', {}, '\u26A1'));
    header.appendChild(el('span', {}, 'Escalation Recommended (' + escapeHtml(confidence) + ' confidence)'));
    banner.appendChild(header);

    if (rec.suggestedStep) {
      banner.appendChild(el('div', { style: { marginTop: '4px' } }, 'Suggested: escalate to ' + escapeHtml(String(rec.suggestedStep))));
    }

    // Expandable reasons
    if (rec.reasons && rec.reasons.length > 0) {
      var reasonsList = el('ul', { style: { margin: '6px 0 0 16px', padding: '0', fontSize: '12px' } });
      rec.reasons.forEach(function(r) {
        reasonsList.appendChild(el('li', { style: { marginBottom: '2px' } }, escapeHtml(String(r))));
      });
      banner.appendChild(reasonsList);
    }

    // Insert at the top of the card content (after the header rows, before panels)
    var firstChild = card.querySelector('.handoff-panel') || card.querySelector('.activity-panel') || card.querySelector('.doc-checklist');
    if (firstChild) {
      card.insertBefore(banner, firstChild);
    } else {
      // Insert before the checklist area (the expandable div with borderTop)
      var children = card.children;
      for (var i = 0; i < children.length; i++) {
        if (children[i].style.borderTop && children[i].style.display !== undefined) {
          card.insertBefore(banner, children[i]);
          return;
        }
      }
      card.appendChild(banner);
    }
  }).withFailureHandler(function() {
    // Silently fail — escalation recommendation is advisory
  }).dataGetEscalationRecommendation(SESSION_TOKEN, caseId);
}

// ═══════════════════════════════════════
// HANDOFF NOTES — Steward Shift Handoff (v4.35.0)
// ═══════════════════════════════════════

/**
 * Toggles the handoff notes panel below a case card.
 * If the panel already exists, it is removed (collapsed).
 * Otherwise, a new panel is created, notes are fetched from the server,
 * and an "Add Note" form is appended.
 */
function _toggleHandoffPanel(card, caseId) {
  var existing = card.querySelector('.handoff-panel');
  if (existing) { existing.remove(); return; }

  var panel = el('div', { className: 'handoff-panel card-glass', style: { marginTop: '8px', padding: '12px', borderTop: '1px solid var(--border)' } });
  panel.appendChild(el('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '8px', color: 'var(--text)' } }, 'Handoff Notes'));

  var notesContainer = el('div');
  showLoading(notesContainer);
  panel.appendChild(notesContainer);
  card.appendChild(panel);

  serverCall().withSuccessHandler(function(notes) {
    notesContainer.innerHTML = '';
    if (!notes || notes.length === 0) {
      notesContainer.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'No handoff notes yet.'));
    } else {
      notes.forEach(function(note) {
        var noteEl = el('div', { className: 'handoff-note', style: { padding: '8px 0', borderBottom: '1px solid var(--border-subtle, var(--border))', fontSize: '13px' } });
        var meta = el('div', { style: { color: 'var(--muted)', fontSize: '11px', marginBottom: '2px' } });
        meta.appendChild(el('span', {}, 'From: '));
        meta.appendChild(el('strong', {}, note.fromSteward || 'Unknown'));
        meta.appendChild(el('span', {}, ' \u2014 ' + (note.created ? new Date(note.created).toLocaleDateString() : '')));
        noteEl.appendChild(meta);
        noteEl.appendChild(el('div', { style: { color: 'var(--text)' } }, note.noteText || ''));
        var archBtn = el('button', {
          className: 'btn btn-secondary',
          style: { fontSize: '11px', padding: '2px 8px', marginTop: '4px' },
          onclick: function(ev) {
            ev.stopPropagation();
            _archiveHandoffNote(noteEl, note.id, caseId, card);
          }
        }, 'Archive');
        noteEl.appendChild(archBtn);
        notesContainer.appendChild(noteEl);
      });
    }
    _renderAddNoteForm(panel, caseId, card);
  }).withFailureHandler(function() {
    notesContainer.innerHTML = '';
    notesContainer.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load handoff notes.'));
    _renderAddNoteForm(panel, caseId, card);
  }).dataGetHandoffNotes(SESSION_TOKEN, caseId);
}

/**
 * Renders the "Add Note" form at the bottom of a handoff panel.
 */
function _renderAddNoteForm(panel, caseId, card) {
  var form = el('div', { style: { marginTop: '10px', borderTop: '1px solid var(--border-subtle, var(--border))', paddingTop: '10px' } });
  var textarea = el('textarea', {
    className: 'form-input',
    placeholder: 'Leave a note for the next steward\u2026',
    style: { width: '100%', minHeight: '60px', resize: 'vertical' },
    'aria-label': 'Handoff note text'
  });
  textarea.addEventListener('click', function(ev) { ev.stopPropagation(); });
  var addBtn = el('button', {
    className: 'btn btn-primary',
    style: { marginTop: '6px' },
    onclick: function(ev) {
      ev.stopPropagation();
      var text = textarea.value.trim();
      if (!text) return;
      addBtn.disabled = true;
      addBtn.textContent = 'Saving\u2026';
      serverCall().withSuccessHandler(function(result) {
        if (result && result.success) {
          // Refresh panel by toggling off then on
          var existingPanel = card.querySelector('.handoff-panel');
          if (existingPanel) existingPanel.remove();
          _toggleHandoffPanel(card, caseId);
        } else {
          addBtn.disabled = false;
          addBtn.textContent = 'Add Note';
        }
      }).withFailureHandler(function() {
        addBtn.disabled = false;
        addBtn.textContent = 'Add Note';
      }).dataAddHandoffNote(SESSION_TOKEN, caseId, text, '');
    }
  }, 'Add Note');
  form.appendChild(textarea);
  form.appendChild(addBtn);
  panel.appendChild(form);
}

/**
 * Archives a handoff note and removes it from the DOM.
 */
function _archiveHandoffNote(noteEl, noteId, caseId, card) {
  noteEl.style.opacity = '0.5';
  serverCall().withSuccessHandler(function(result) {
    if (result && result.success) {
      noteEl.remove();
      // If no notes remain, refresh the panel to show the empty state
      var panel = card.querySelector('.handoff-panel');
      if (panel) {
        var remaining = panel.querySelectorAll('.handoff-note');
        if (remaining.length === 0) {
          panel.remove();
          _toggleHandoffPanel(card, caseId);
        }
      }
    } else {
      noteEl.style.opacity = '1';
    }
  }).withFailureHandler(function() {
    noteEl.style.opacity = '1';
  }).dataArchiveHandoffNote(SESSION_TOKEN, noteId);
}

// ═══════════════════════════════════════
// CASE ACTIVITY LOG (v4.34.0 — Feature 5)
// ═══════════════════════════════════════

/**
 * Toggles the case activity panel on a case card.
 * If the panel is open, closes it. Otherwise, creates and populates it.
 * @param {HTMLElement} card - The case card element
 * @param {string} caseId - The grievance/case ID
 */
function _toggleActivityPanel(card, caseId) {
  var existing = card.querySelector('.activity-panel');
  if (existing) { existing.remove(); return; }

  var panel = el('div', { className: 'activity-panel card-glass', style: { marginTop: '8px', padding: '12px', borderTop: '1px solid var(--border)' } });
  panel.appendChild(el('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '8px', color: 'var(--text)' } }, 'Case Activity'));

  var timeline = el('div', { className: 'activity-timeline' });
  showLoading(timeline);
  panel.appendChild(timeline);
  card.appendChild(panel);

  // Prevent click from toggling the checklist
  panel.addEventListener('click', function(ev) { ev.stopPropagation(); });

  serverCall().withSuccessHandler(function(events) {
    timeline.innerHTML = '';
    if (!events || events.length === 0) {
      timeline.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'No activity recorded yet.'));
      return;
    }
    events.forEach(function(evt) {
      var fieldLower = (evt.field || '').toLowerCase();
      var actionLower = (evt.actionType || '').toLowerCase();
      var icon = actionLower === 'create' ? '\u2795' :
                 actionLower === 'escalate' ? '\u2B06\uFE0F' :
                 fieldLower.indexOf('folder') !== -1 ? '\uD83D\uDCC1' :
                 fieldLower.indexOf('email') !== -1 ? '\uD83D\uDCE7' :
                 '\u270F\uFE0F';

      var node = el('div', { className: 'activity-node', style: { display: 'flex', gap: '8px', padding: '6px 0', borderLeft: '2px solid var(--border-subtle, var(--border))', paddingLeft: '12px', marginLeft: '6px', fontSize: '13px' } });
      node.appendChild(el('span', {}, icon));

      var info = el('div', { style: { flex: '1' } });
      info.appendChild(el('div', { style: { fontWeight: '500', color: 'var(--text)' } }, evt.field || evt.actionType || 'edit'));

      if (evt.oldValue && evt.newValue) {
        var changeDiv = el('div', { style: { color: 'var(--muted)', fontSize: '12px' } });
        changeDiv.appendChild(el('span', {}, evt.oldValue));
        changeDiv.appendChild(el('span', {}, ' \u2192 '));
        changeDiv.appendChild(el('span', {}, evt.newValue));
        info.appendChild(changeDiv);
      } else if (evt.newValue) {
        info.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, evt.newValue));
      }

      var metaText = '';
      try { metaText = new Date(evt.timestamp).toLocaleString(); } catch (_) { metaText = String(evt.timestamp || ''); }
      if (evt.userEmail) metaText += ' \u00B7 ' + evt.userEmail;
      info.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '11px', marginTop: '2px' } }, metaText));

      node.appendChild(info);
      timeline.appendChild(node);
    });
  }).withFailureHandler(function() {
    timeline.innerHTML = '';
    timeline.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load activity log.'));
  }).dataGetCaseActivityLog(SESSION_TOKEN, caseId);
}

// ═══════════════════════════════════════
// DOCUMENT CHECKLIST PER GRIEVANCE STEP (v4.36.0 — Feature 11)
// ═══════════════════════════════════════

/**
 * Toggles a document checklist panel on a case card.
 * Shows which documents are required for the current step
 * and whether each has been found in the case Drive folder.
 * @param {HTMLElement} card - The case card element
 * @param {string} caseId - The grievance/case ID
 * @param {string} step - Current grievance step
 * @param {string} folderId - Drive folder ID for this case (may be null)
 */
function _toggleDocChecklist(card, caseId, step, folderId) {
  var existing = card.querySelector('.doc-checklist');
  if (existing) { existing.remove(); return; }

  var panel = el('div', { className: 'doc-checklist card-glass', style: { marginTop: '8px', padding: '12px' } });
  panel.appendChild(el('div', { style: { fontWeight: '600', marginBottom: '8px' } }, 'Document Checklist \u2014 ' + (step || 'Unknown Step')));

  // Prevent click from toggling the case checklist
  panel.addEventListener('click', function(ev) { ev.stopPropagation(); });

  var listContainer = el('div', {});
  showLoading(listContainer);
  panel.appendChild(listContainer);

  serverCall().withSuccessHandler(function(checklist) {
    listContainer.innerHTML = '';
    if (!checklist || checklist.length === 0) {
      listContainer.appendChild(el('div', { style: { color: 'var(--muted)', fontStyle: 'italic', fontSize: '13px' } }, 'No document requirements defined for this step.'));
      return;
    }

    var found = 0;
    checklist.forEach(function(item) {
      var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 0', borderBottom: '1px solid var(--border-subtle, var(--border))' } });
      row.appendChild(el('span', { style: { fontSize: '16px' } }, item.found ? '\u2705' : '\u274C'));
      var label = el('div', { style: { flex: '1', fontSize: '13px' } });
      label.appendChild(el('span', { style: { fontWeight: item.found ? '400' : '600' } }, item.name));
      if (item.found && item.fileUrl) {
        label.appendChild(el('a', { href: item.fileUrl, target: '_blank', style: { marginLeft: '8px', fontSize: '12px', color: 'var(--accent)' } }, 'View'));
      }
      row.appendChild(label);
      listContainer.appendChild(row);
      if (item.found) found++;
    });

    // Progress bar
    var pct = Math.round((found / checklist.length) * 100);
    var progress = el('div', { style: { marginTop: '10px' } });
    progress.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '4px' } }, found + '/' + checklist.length + ' documents (' + pct + '%)'));
    var barBg = el('div', { style: { height: '6px', background: 'var(--border-subtle, var(--border))', borderRadius: '3px', overflow: 'hidden' } });
    barBg.appendChild(el('div', { style: { width: pct + '%', height: '100%', background: pct === 100 ? 'var(--success, #22c55e)' : 'var(--accent)', borderRadius: '3px', transition: 'width 0.3s' } }));
    progress.appendChild(barBg);
    listContainer.appendChild(progress);
  }).withFailureHandler(function() {
    listContainer.innerHTML = '';
    listContainer.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Failed to load document checklist.'));
  }).dataGetDocumentChecklist(SESSION_TOKEN, caseId, step, folderId || '');

  card.appendChild(panel);
}

// CASE CHECKLIST — Steward Case Detail (v4.16.0)
// ═══════════════════════════════════════

function _renderCaseChecklist(container, caseId) {
  var section = el('div', { style: { padding: '0 16px 12px' } });
  section.appendChild(el('h3', { className: 'section-title' }, 'Case Checklist'));
  var checklistContent = el('div');
  showLoading(checklistContent);
  section.appendChild(checklistContent);
  container.appendChild(section);

  serverCall().withSuccessHandler(function(items) {
    checklistContent.innerHTML = '';
    if (!items || items.length === 0) {
      checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', padding: '8px 0' } }, 'No checklist items for this case.'));
      return;
    }

    // Progress bar
    var completed = items.filter(function(i) { return i.completed; }).length;
    var pct = Math.round((completed / items.length) * 100);
    var progRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } });
    var progBar = el('div', { className: 'prog-track prog-track--md flex-1' });
    progBar.appendChild(el('div', { className: 'prog-fill' + (pct === 100 ? ' prog-fill--success' : ''), style: { width: pct + '%' } }));
    progRow.appendChild(progBar);
    progRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', whiteSpace: 'nowrap' } }, completed + '/' + items.length + ' (' + pct + '%)'));
    checklistContent.appendChild(progRow);

    // Group by category
    var grouped = {};
    items.forEach(function(item) {
      var cat = item.category || 'General';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(item);
    });

    Object.keys(grouped).forEach(function(cat) {
      checklistContent.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', margin: '10px 0 4px', fontWeight: '600' } }, cat));
      grouped[cat].forEach(function(item) {
        var cb = el('input', {
          type: 'checkbox',
          checked: !!item.completed,
          'aria-label': item.itemText,
          style: { width: '16px', height: '16px', accentColor: 'var(--success)', cursor: 'pointer', flexShrink: '0' }
        });
        var label = el('span', { style: { fontSize: '12px', color: item.completed ? 'var(--muted)' : 'var(--text)', textDecoration: item.completed ? 'line-through' : 'none', flex: '1' } }, item.itemText);
        var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '5px 0', cursor: 'pointer' },
          onClick: function(ev) {
            ev.preventDefault();
            var newState = !item.completed;
            cb.style.opacity = '0.4';
            serverCall().withSuccessHandler(function(result) {
              if (result && result.success) {
                item.completed = newState;
                cb.checked = newState;
                label.style.textDecoration = newState ? 'line-through' : 'none';
                label.style.color = newState ? 'var(--muted)' : 'var(--text)';
                // Refresh progress
                var newCompleted = items.filter(function(i) { return i.completed; }).length;
                var newPct = Math.round((newCompleted / items.length) * 100);
                progBar.firstChild.style.width = newPct + '%';
                progBar.firstChild.style.background = newPct === 100 ? 'var(--success)' : 'var(--accent)';
                progRow.lastChild.textContent = newCompleted + '/' + items.length + ' (' + newPct + '%)';
              }
              cb.style.opacity = '1';
            }).withFailureHandler(function() { cb.style.opacity = '1'; }).dataToggleChecklistItem(SESSION_TOKEN, item.checklistId, !item.completed);
          }
        });
        row.appendChild(cb);
        row.appendChild(label);
        if (item.required) row.appendChild(el('span', { style: { fontSize: '9px', color: 'var(--danger)', fontWeight: '600' } }, 'REQ'));
        checklistContent.appendChild(row);
      });
    });
  }).withFailureHandler(function() {
    checklistContent.innerHTML = '';
    checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', padding: '8px 0' } }, 'Failed to load checklist.'));
  }).dataGetCaseChecklist(SESSION_TOKEN, caseId);
}

// POLLS MANAGEMENT (steward, v4.16.0)

// POLLS MANAGEMENT (steward, v4.23.0 — merged Weekly Questions + Polls)
// ═══════════════════════════════════════
// Steward can:
//   • See this week's live poll results
//   • Create/replace the steward poll for this week (with guide)
//   • Close any active poll manually
//   • View past poll history
// Community pool is drawn automatically every Monday — stewards cannot
// pick from it or approve submissions.

function renderManagePolls(appContainer) {
  renderPageLayout(appContainer, 'steward', 'polls', function(container) {
    _stewardHeader(container, 'Polls', 'Create polls · view community results');
    var content = el('div', { className: 'content' });

    var _st = createSubTabs([
      { id: 'live',   label: 'This Week', render: function(c) { _renderLivePollsSteward(c); } },
      { id: 'create', label: 'Create Poll', render: function(c) { _renderCreateStewardPoll(c); } },
      { id: 'past',   label: 'History', render: function(c) { _renderPollHistorySteward(c); } }
    ]);
    content.appendChild(_st.bar);
    content.appendChild(_st.content);
    container.appendChild(content);
  });
}

function _renderLivePollsSteward(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(data) {
    container.innerHTML = '';
    if (!data || !data.questions || data.questions.length === 0) {
      container.appendChild(el('div', { className: 'empty-state-13' }, 'No active polls this week. Create one in the "Create Poll" tab.'));
      return;
    }
    container.appendChild(el('div', { className: 'privacy-badge mb-14' }, '🔒 Votes are anonymous — individual responses are never stored'));
    data.questions.forEach(function(q) {
      var card = el('div', { className: 'card card-glass', style: { padding: '14px', marginBottom: '10px' } });
      var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' } });
      var titleCol = el('div');
      titleCol.appendChild(el('div', { className: 'display-title-sm' }, q.text));
      titleCol.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '2px' } },
        q.source === 'community' ? '🌐 Community poll (random draw)' : '🗳️ ' + (CONFIG.stewardLabel || 'Steward') + ' poll'));
      topRow.appendChild(titleCol);
      var closeBtn = el('button', { className: 'btn btn-secondary', style: { width: 'auto', padding: '4px 10px', fontSize: '11px', flexShrink: '0', marginLeft: '8px' },
        onClick: function() {
          closeBtn.textContent = 'Closing…'; closeBtn.disabled = true;
          serverCall().withSuccessHandler(function(result) {
            if (result && result.success) { _renderLivePollsSteward(container); }
            else { closeBtn.textContent = 'Close'; closeBtn.disabled = false; }
          }).wqClosePoll(SESSION_TOKEN, q.id);
        }
      }, 'Close');
      topRow.appendChild(closeBtn);
      card.appendChild(topRow);

      // Results
      var stats = q.stats || {};
      var total = stats.total || 0;
      var counts = stats.counts || {};
      var colors = ['var(--accent)', 'var(--success)', '#facc15', '#f97316', '#a78bfa'];
      (q.options || []).forEach(function(opt, i) {
        var count = counts[opt] || 0;
        var pct = total > 0 ? Math.round((count / total) * 100) : 0;
        var row = el('div', { className: 'mb-6' });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '2px' } });
        header.appendChild(el('span', { style: { color: 'var(--text)' } }, opt));
        header.appendChild(el('span', { style: { color: 'var(--muted)' } }, pct + '%  (' + count + ')'));
        row.appendChild(header);
        var bar = el('div', { className: 'prog-track prog-track--md' });
        bar.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%', background: colors[i % colors.length] } }));
        row.appendChild(bar);
        card.appendChild(row);
      });
      card.appendChild(el('div', { className: 'text-xs-muted-mt-4' }, total + ' anonymous vote' + (total !== 1 ? 's' : '')));
      container.appendChild(card);
    });
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load polls.'));
  }).wqGetActiveQuestions(SESSION_TOKEN);
}

function _renderCreateStewardPoll(container) {
  // Guide
  if (typeof _renderPollGuide === 'function') _renderPollGuide(container);
  else {
    container.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px', padding: '10px', border: '1px solid var(--border)', borderRadius: '8px' } },
      '📋 Good polls: neutral framing, one concept, balanced options, 2–5 choices. Avoid leading questions.'));
  }

  var formCard = el('div', { className: 'card card-glass p-16' });
  formCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, "Create This Week's " + (CONFIG.stewardLabel || 'Steward') + ' Poll'));
  formCard.appendChild(el('div', { className: 'text-sm-muted-mb-12' }, 'Replaces any existing steward poll for this week. The community poll is drawn automatically from the member pool each Monday.'));

  var questionInput = el('textarea', { className: 'msg-textarea', placeholder: 'Poll question…', style: { minHeight: '70px', marginBottom: '10px' } });
  formCard.appendChild(questionInput);
  formCard.appendChild(el('div', { className: 'text-xs-muted-mb-6' }, 'Answer options (2–5):'));
  var optBuilder = typeof _buildOptionInputs === 'function' ? _buildOptionInputs(formCard, null) : null;

  var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '18px', marginBottom: '8px' } });
  formCard.appendChild(statusMsg);
  formCard.appendChild(el('button', { className: 'btn btn-primary', style: { marginTop: '6px' },
    onClick: function() {
      var text = questionInput.value.trim();
      var opts = optBuilder ? optBuilder.getOptions() : [];
      if (!text) { statusMsg.textContent = 'Please enter a question.'; statusMsg.style.color = 'var(--danger)'; return; }
      if (opts.length < 2) { statusMsg.textContent = 'Add at least 2 answer options.'; statusMsg.style.color = 'var(--danger)'; return; }
      statusMsg.textContent = 'Creating…'; statusMsg.style.color = 'var(--muted)';
      serverCall().withSuccessHandler(function(result) {
        statusMsg.textContent = result && result.success ? '✅ ' + result.message : (result && result.message) || 'Error creating poll.';
        statusMsg.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
        if (result && result.success) questionInput.value = '';
      }).withFailureHandler(function() {
        statusMsg.textContent = 'Failed to create poll.'; statusMsg.style.color = 'var(--danger)';
      }).wqSetStewardQuestion(SESSION_TOKEN, text, opts);
    }
  }, 'Post Poll'));
  container.appendChild(formCard);

  // Frequency setting
  var freqCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '14px' } });
  freqCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, '⏱️ Poll Frequency'));
  freqCard.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '10px' } }, 'How often should new polls be posted? Affects both the steward poll and community pool draw.'));

  var freqStatus = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '6px' } });
  var freqBtns = el('div', { className: 'flex-wrap-gap' });

  serverCall().withSuccessHandler(function(currentFreq) {
    ['weekly', 'biweekly', 'monthly'].forEach(function(freq) {
      var labels = { weekly: '📅 Weekly', biweekly: '📆 Bi-weekly', monthly: '🗓️ Monthly' };
      var btn = el('button', {
        className: 'btn freq-btn' + (currentFreq === freq ? ' btn-primary' : ' btn-secondary'),
        style: { width: 'auto', padding: '8px 16px', fontSize: '12px' },
        onClick: function() {
          freqStatus.textContent = 'Saving…'; freqStatus.style.color = 'var(--muted)';
          freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
          serverCall().withSuccessHandler(function(result) {
            freqStatus.textContent = result && result.success ? '✅ ' + result.message : (result && result.message) || 'Error.';
            freqStatus.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
            if (result && result.success) {
              freqBtns.querySelectorAll('button').forEach(function(b) {
                b.className = (b.getAttribute('data-freq') === freq ? 'btn btn-primary' : 'btn btn-secondary') + ' freq-btn';
              });
            }
          }).withFailureHandler(function() {
            freqStatus.textContent = 'Failed to save.'; freqStatus.style.color = 'var(--danger)';
            freqBtns.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
          }).wqSetPollFrequency(SESSION_TOKEN, freq);
        }
      }, labels[freq]);
      btn.setAttribute('data-freq', freq);
      freqBtns.appendChild(btn);
    });
  }).withFailureHandler(function() {
    freqBtns.appendChild(el('div', { style: { color: 'var(--danger)', fontSize: '12px' } }, 'Could not load frequency setting.'));
  }).wqGetPollFrequency();

  freqCard.appendChild(freqBtns);
  freqCard.appendChild(freqStatus);
  container.appendChild(freqCard);

  // Community pool card — pool count + manual draw trigger
  serverCall().withSuccessHandler(function(count) {
    var poolCard = el('div', { className: 'card card-glass', style: { padding: '14px', marginTop: '14px' } });
    poolCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, '🌐 Community Poll Pool'));
    poolCard.appendChild(el('div', { className: 'text-sm-muted-mb-12' },
      (count || 0) + ' question' + (count !== 1 ? 's' : '') + ' in the pool. One is drawn randomly each period — you cannot select which one. Use this to release the community poll now without waiting for the Monday trigger.'));

    var drawStatus = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '6px' } });
    var drawBtn = el('button', {
      className: 'btn btn-secondary',
      style: { width: 'auto', padding: '8px 18px', fontSize: '12px' },
      onClick: function() {
        if (count === 0) {
          drawStatus.textContent = 'Pool is empty — members must submit poll questions first.';
          drawStatus.style.color = 'var(--danger)';
          return;
        }
        if (!confirm('Draw a random community poll now? This replaces any existing community poll for this period.')) return;
        drawBtn.textContent = 'Drawing…';
        drawBtn.disabled = true;
        drawStatus.textContent = '';
        serverCall().withSuccessHandler(function(result) {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          if (result && result.success) {
            drawStatus.textContent = '✅ Community poll released: "' + (result.text || '').substring(0, 60) + (result.text && result.text.length > 60 ? '…' : '') + '"';
            drawStatus.style.color = 'var(--success)';
          } else {
            drawStatus.textContent = (result && result.message) || 'Draw failed.';
            drawStatus.style.color = 'var(--danger)';
          }
        }).withFailureHandler(function() {
          drawBtn.disabled = false;
          drawBtn.textContent = 'Draw Community Poll';
          drawStatus.textContent = 'Request failed.';
          drawStatus.style.color = 'var(--danger)';
        }).wqManualDrawCommunityPoll(SESSION_TOKEN);
      }
    }, 'Draw Community Poll');

    if (count === 0) {
      drawBtn.disabled = true;
      drawBtn.title = 'No questions in pool yet';
    }

    poolCard.appendChild(drawBtn);
    poolCard.appendChild(drawStatus);
    container.appendChild(poolCard);
  }).wqGetPoolCount();
}

function _renderPollHistorySteward(container) {
  showLoading(container, 'list');
  function loadPage(p) {
    showLoading(container);
    serverCall().withSuccessHandler(function(data) {
      container.innerHTML = '';
      if (!data || !data.questions || data.questions.length === 0) {
        container.appendChild(el('div', { className: 'empty-state-13' }, p > 1 ? 'No more history.' : 'No past polls.'));
        return;
      }
      data.questions.forEach(function(q) {
        var card = el('div', { className: 'card card-glass', style: { padding: '13px', marginBottom: '8px' } });
        card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginBottom: '3px' } },
          'Week of ' + q.weekStr + ' · ' + (q.source === 'community' ? '🌐 Community' : '🗳️ ' + (CONFIG.stewardLabel || 'Steward'))));
        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, q.text));
        var stats = q.stats || {};
        var total = stats.total || 0;
        var counts = stats.counts || {};
        if (total > 0) {
          (q.options || []).forEach(function(opt) {
            var count = counts[opt] || 0;
            var pct = Math.round((count / total) * 100);
            var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
            row.appendChild(el('div', { style: { width: '120px', fontSize: '11px', color: 'var(--muted)', flexShrink: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, opt));
            var bar = el('div', { className: 'prog-track prog-track--md flex-1' });
            bar.appendChild(el('div', { className: 'prog-fill', style: { width: pct + '%' } }));
            row.appendChild(bar);
            row.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text)', width: '36px', textAlign: 'right' } }, pct + '%'));
            card.appendChild(row);
          });
          card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', marginTop: '4px' } }, total + ' votes'));
        } else {
          card.appendChild(el('div', { className: 'text-xs-muted' }, 'No votes'));
        }
        container.appendChild(card);
      });
      if (data.hasMore || p > 1) {
        var nav = el('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '14px' } });
        if (p > 1) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { loadPage(p - 1); } }, '← Previous'));
        if (data.hasMore) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { loadPage(p + 1); } }, 'Next →'));
        container.appendChild(nav);
      }
    }).withFailureHandler(function() {
      container.innerHTML = '';
      container.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load history.'));
    }).wqGetHistory(SESSION_TOKEN, p, 15);
  }
  loadPage(1);
}

// Pagination: 10 per page, load 100 records (v4.20.18)
var _MINUTES_PAGE_SIZE = 10;

function _renderMinutesList(container) {
  showLoading(container, 'list');
  serverCall().withSuccessHandler(function(minutes) {
    container.innerHTML = '';
    if (!minutes || minutes.length === 0) {
      container.appendChild(el('div', { className: 'empty-state-13' }, 'No meeting minutes yet.'));
      return;
    }

    var filtered = minutes;
    var currentPage = 0;

    var filterInput = el('input', { type: 'text', className: 'msg-textarea', placeholder: 'Search minutes...', style: { marginBottom: '10px', minHeight: '36px' } });
    container.appendChild(filterInput);

    var listArea = el('div');
    var pagerArea = el('div', { style: { marginTop: '12px' } });
    container.appendChild(listArea);
    container.appendChild(pagerArea);

    filterInput.addEventListener('input', function() {
      var q = filterInput.value.toLowerCase();
      filtered = q ? minutes.filter(function(m) {
        return (m.title || '').toLowerCase().indexOf(q) !== -1 ||
               (m.meetingDate || '').toLowerCase().indexOf(q) !== -1 ||
               (m.bullets || '').toLowerCase().indexOf(q) !== -1;
      }) : minutes;
      renderPage(0);
    });

    function renderPage(page) {
      currentPage = page;
      listArea.innerHTML = '';
      var totalPages = Math.ceil(filtered.length / _MINUTES_PAGE_SIZE) || 1;
      var start = page * _MINUTES_PAGE_SIZE;
      var slice = filtered.slice(start, start + _MINUTES_PAGE_SIZE);

      if (slice.length === 0) {
        listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No matching minutes.'));
      }

      slice.forEach(function(m) {
        var card = el('div', { className: 'card card-glass card-clickable', style: { padding: '14px', marginBottom: '8px' } });
        var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '6px' } });
        header.appendChild(el('span', { className: 'display-title-sm' }, m.title));
        header.appendChild(el('span', { className: 'text-xs-muted' }, m.meetingDate));
        card.appendChild(header);
        if (m.bullets) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5', whiteSpace: 'pre-wrap' } }, m.bullets));

        var expanded = false;
        var fullDiv = el('div', { style: { display: 'none', fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap' } }, m.fullMinutes || '');
        card.appendChild(fullDiv);
        if (m.driveDocUrl && /^https?:\/\//i.test(m.driveDocUrl)) {
          card.appendChild(el('a', { href: m.driveDocUrl, target: '_blank', style: { display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '11px', color: 'var(--accent)', marginTop: '6px', textDecoration: 'none' } }, '\uD83D\uDCC4 Open Google Doc'));
        }
        if (m.fullMinutes) {
          card.addEventListener('click', function() { expanded = !expanded; fullDiv.style.display = expanded ? 'block' : 'none'; });
        }
        listArea.appendChild(card);
      });

      // Pagination controls
      pagerArea.innerHTML = '';
      var pagerRow = el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px', marginBottom: '6px' } });
      var prevBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page === 0 ? '0.3' : '1', pointerEvents: page === 0 ? 'none' : 'auto' },
        onClick: function() { renderPage(page - 1); }
      }, '← Prev');
      var pageLabel = el('span', { className: 'text-xs-muted' }, 'Page ' + (page + 1) + ' of ' + totalPages);
      var nextBtn = el('button', { className: 'btn btn-ghost', style: { fontSize: '12px', opacity: page >= totalPages - 1 ? '0.3' : '1', pointerEvents: page >= totalPages - 1 ? 'none' : 'auto' },
        onClick: function() { renderPage(page + 1); }
      }, 'Next →');
      pagerRow.appendChild(prevBtn);
      pagerRow.appendChild(pageLabel);
      pagerRow.appendChild(nextBtn);
      pagerArea.appendChild(pagerRow);

      // Last page: show Drive folder link
      if (page >= totalPages - 1 && CONFIG && CONFIG.hasMinutesFolder) {
        pagerArea.appendChild(el('div', { style: { textAlign: 'center', marginTop: '8px' } },
          el('a', { href: CONFIG.minutesFolderUrl, target: '_blank', style: { fontSize: '11px', color: 'var(--accent)', textDecoration: 'none' } }, '\uD83D\uDCC2 View all minutes in Drive folder')
        ));
      }
    }

    renderPage(0);
  }).withFailureHandler(function() {
    container.innerHTML = '';
    container.appendChild(el('div', { className: 'empty-state-danger' }, 'Failed to load minutes.'));
  }).dataGetMeetingMinutes(SESSION_TOKEN, 100);
}

function _renderAddMinutes(container, onSaveSuccess) {

    container.appendChild(el('div', { style: { background: 'rgba(255,170,0,0.10)', border: '1px solid rgba(255,170,0,0.4)', borderRadius: '6px', padding: '10px 12px', fontSize: '12px', color: '#ffaa00', marginBottom: '12px' } },

    String(today.getDate()).padStart(2, '0');

  formCard.appendChild(dateInput);

  formCard.appendChild(el('div', { className: 'text-xs-muted-mb-4' }, 'Key points (bullet format)'));

  formCard.appendChild(bulletsInput);
  var bulletsCount = el('div', { style: { fontSize: '10px', color: 'var(--muted)', textAlign: 'right', marginBottom: '8px' } }, '0 / ' + BULLETS_MAX);
  formCard.appendChild(bulletsCount);
  bulletsInput.addEventListener('input', function() {
    var len = bulletsInput.value.length;
    bulletsCount.textContent = len + ' / ' + BULLETS_MAX;
    bulletsCount.style.color = len >= BULLETS_MAX ? 'var(--danger)' : 'var(--muted)';
  });

  formCard.appendChild(el('div', { className: 'text-xs-muted-mb-4' }, 'Full minutes (optional)'));
  var fullInput = el('textarea', { className: 'msg-textarea', placeholder: 'Detailed meeting notes...', maxLength: FULL_MAX, style: { marginBottom: '2px', minHeight: '120px' } });
  formCard.appendChild(fullInput);
  var fullCount = el('div', { style: { fontSize: '10px', color: 'var(--muted)', textAlign: 'right', marginBottom: '10px' } }, '0 / ' + FULL_MAX);
  formCard.appendChild(fullCount);
  fullInput.addEventListener('input', function() {
    var len = fullInput.value.length;
    fullCount.textContent = len + ' / ' + FULL_MAX;
    fullCount.style.color = len >= FULL_MAX ? 'var(--danger)' : 'var(--muted)';
  });

  var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '18px', marginBottom: '8px' } });
  formCard.appendChild(statusMsg);

  formCard.appendChild(el('button', { className: 'btn btn-primary',
    onClick: function() {
      var title = titleInput.value.trim();
      if (!title) { statusMsg.textContent = 'Title is required.'; statusMsg.style.color = 'var(--danger)'; return; }
      if (!confirm('Save these meeting minutes? A Google Doc will also be created in Drive.')) return;
      statusMsg.textContent = 'Saving...'; statusMsg.style.color = 'var(--muted)';
      serverCall().withSuccessHandler(function(result) {
        if (result && result.success) {
          if (typeof _refreshNavBadges === 'function') _refreshNavBadges();
          // Auto-switch to Recent tab on success so steward sees the new entry (v4.20.18)
          if (typeof onSaveSuccess === 'function') { onSaveSuccess(); return; }
          statusMsg.textContent = 'Minutes saved!'; statusMsg.style.color = 'var(--success)';
        } else {
          statusMsg.textContent = (result && result.message) || 'Failed to save.'; statusMsg.style.color = 'var(--danger)';
        }
      }).withFailureHandler(function() {
        statusMsg.textContent = 'Failed to save minutes.'; statusMsg.style.color = 'var(--danger)';
      }).dataAddMeetingMinutes(SESSION_TOKEN, { title: title, meetingDate: dateInput.value, bullets: bulletsInput.value.trim(), fullMinutes: fullInput.value.trim() }, _genIdemKey());
    }
  }, 'Save Minutes'));

  container.appendChild(formCard);
}

      serverCall().withSuccessHandler(function(result) {
        if (result && result.success) {
          statusMsg.textContent = 'Feedback submitted! Thank you.'; statusMsg.style.color = 'var(--success)';

// ENGAGEMENT SCORE DASHBOARD (v4.36.0 — steward only)
// ═══════════════════════════════════════

function renderEngagementDashboard(appContainer) {
  renderPageLayout(appContainer, 'steward', 'engagement', function(container) {
    _stewardHeader(container, 'Engagement', 'Member engagement scores across 5 dimensions');

    var content = el('div', { className: 'content' });
    showLoading(content, 'list');
    container.appendChild(content);

    var currentSort = 'composite';
    var currentUnit = '';
    var currentSearch = '';

    function loadScoreboard(page) {
      showLoading(content, 'list');
      var opts = { page: page || 0, pageSize: 20, sortBy: currentSort, filterUnit: currentUnit, searchTerm: currentSearch };

      serverCall().withSuccessHandler(function(result) {
        content.innerHTML = '';
        if (!result) { content.appendChild(el('div', { className: 'empty-state-lg' }, 'No engagement data. Click "Refresh Scores" to compute.')); return; }

        // KPI strip
        renderKPIStrip(content, [
          { label: 'Avg Score', value: result.avgScore || 0, color: (result.avgScore || 0) >= 50 ? 'var(--success, #22c55e)' : 'var(--warning, #eab308)' },
          { label: 'Top Unit', value: result.topUnit || '--' },
          { label: 'Low (<30)', value: result.lowCount || 0, color: (result.lowCount || 0) > 0 ? 'var(--danger, #ef4444)' : 'var(--success, #22c55e)' },
          { label: 'Total', value: result.totalRows || 0 }
        ]);

        // Controls bar
        var controls = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '12px', alignItems: 'center' } });
        var searchInput = el('input', { type: 'text', className: 'form-input form-input-sm', placeholder: 'Search name or email...', value: currentSearch, style: { flex: '1', minWidth: '140px' } });
        searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { currentSearch = searchInput.value; loadScoreboard(0); } });
        controls.appendChild(searchInput);

        var sortSelect = el('select', { className: 'form-input form-input-sm', style: { width: 'auto' } });
        ['composite', 'survey', 'meeting', 'qa', 'workload', 'contact', 'name'].forEach(function(s) {
          var opt = el('option', { value: s }, s.charAt(0).toUpperCase() + s.slice(1));
          if (s === currentSort) opt.selected = true;
          sortSelect.appendChild(opt);
        });
        sortSelect.addEventListener('change', function() { currentSort = sortSelect.value; loadScoreboard(0); });
        controls.appendChild(sortSelect);

        var refreshBtn = el('button', { className: 'btn-sm btn-primary', onClick: function() {
          refreshBtn.disabled = true; refreshBtn.textContent = 'Computing...';
          serverCall().withSuccessHandler(function(res) {
            if (res && res.success) { refreshBtn.textContent = 'Done (' + res.computed + ')'; loadScoreboard(0); }
            else { refreshBtn.textContent = 'Failed'; refreshBtn.disabled = false; }
          }).withFailureHandler(function() { refreshBtn.textContent = 'Failed'; refreshBtn.disabled = false; }).dataComputeEngagementScores(SESSION_TOKEN);
        } }, 'Refresh Scores');
        controls.appendChild(refreshBtn);
        content.appendChild(controls);

        if (!result.items || result.items.length === 0) {
          content.appendChild(el('div', { className: 'empty-state-lg' }, 'No engagement scores found. Click "Refresh Scores" to compute.'));
          return;
        }

        // Scoreboard table
        result.items.forEach(function(member, idx) {
          var card = el('div', { className: 'card card-glass card-fade-in', style: { padding: '10px 12px', marginBottom: '6px', animationDelay: (idx * 30) + 'ms' } });
          var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } });
          var nameEl = el('span', { style: { fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, member.name || member.email);
          topRow.appendChild(nameEl);
          var scoreColor = member.composite >= 70 ? 'var(--success, #22c55e)' : member.composite >= 40 ? 'var(--warning, #eab308)' : 'var(--danger, #ef4444)';
          var trendIcon = member.trend === 'up' ? '\u2191' : member.trend === 'down' ? '\u2193' : '\u2192';
          topRow.appendChild(el('span', { style: { fontSize: '16px', fontWeight: '700', color: scoreColor } }, member.composite + ' ' + trendIcon));
          card.appendChild(topRow);

          if (member.unit) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px' } }, member.unit));

          // 5 dimension bars
          var dims = [
            { label: 'Survey', value: member.survey, color: 'hsl(250,70%,68%)' },
            { label: 'Meeting', value: member.meeting, color: 'hsl(200,70%,55%)' },
            { label: 'Q&A', value: member.qa, color: 'hsl(150,60%,50%)' },
            { label: 'Workload', value: member.workload, color: 'hsl(40,80%,55%)' },
            { label: 'Contact', value: member.contact, color: 'hsl(340,65%,55%)' }
          ];
          dims.forEach(function(dim) {
            var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '3px' } });
            row.appendChild(el('span', { style: { fontSize: '10px', color: 'var(--muted)', width: '52px', textAlign: 'right', flexShrink: '0' } }, dim.label));
            var barBg = el('div', { style: { flex: '1', height: '4px', borderRadius: '2px', background: 'var(--border)', overflow: 'hidden' } });
            barBg.appendChild(el('div', { style: { height: '100%', borderRadius: '2px', background: dim.color, width: dim.value + '%', transition: 'width 0.3s' } }));
            row.appendChild(barBg);
            row.appendChild(el('span', { style: { fontSize: '10px', color: 'var(--muted)', width: '24px', flexShrink: '0' } }, String(dim.value)));
            card.appendChild(row);
          });

        });

        // Pager
        var totalPages = Math.ceil(result.totalRows / result.pageSize);

          var pager = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0' } });

// ACCESS LOG VIEWER (v4.36.0 — steward/admin)
