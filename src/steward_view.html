// renderWeeklyQuestionsPage already handles steward role via the role param.
// Additional steward-specific manager (set question, review pool):
function renderWeeklyQuestionManager(appContainer) {
  renderPageLayout(appContainer, 'steward', 'weeklyq', function(container) {
    _stewardHeader(container, 'Weekly Question Manager');
    var content = el('div', { className: 'content' });

    // Set steward question
    content.appendChild(el('h3', { className: 'section-title' }, 'Set This Week\'s Question'));
    var questionInput = el('textarea', { className: 'msg-textarea', placeholder: 'Type your question for this week...' });
    content.appendChild(questionInput);

    var setStatus = el('div', { style: { fontSize: '13px', minHeight: '20px', marginTop: '6px' } });
    content.appendChild(setStatus);

    content.appendChild(el('button', {
      className: 'btn btn-primary', style: { marginTop: '10px', marginBottom: '24px' },
      onClick: function() {
        var text = questionInput.value.trim();
        if (!text) { setStatus.textContent = 'Enter a question.'; setStatus.style.color = 'var(--danger)'; return; }
        setStatus.textContent = 'Saving...';
        google.script.run.withSuccessHandler(function(result) {
          setStatus.textContent = result && result.success ? 'Question set!' : 'Error.';
          setStatus.style.color = result && result.success ? 'var(--success)' : 'var(--danger)';
          if (result && result.success) questionInput.value = '';
        }).wqSetStewardQuestion(CURRENT_USER.email, text);
      }
    }, 'Set Question'));

    // Pool review
    content.appendChild(el('h3', { className: 'section-title' }, 'Submitted Questions Pool'));
    var poolArea = el('div');
    showLoading(poolArea);
    content.appendChild(poolArea);

    google.script.run.withSuccessHandler(function(pool) {
      poolArea.innerHTML = '';
      if (!pool || pool.length === 0) {
        poolArea.appendChild(el('div', { style: { color: 'var(--muted)', padding: '16px 0' } }, 'No pending questions in the pool.'));
        return;
      }
      pool.forEach(function(q) {
        var card = el('div', { className: 'wq-card' });
        card.appendChild(el('div', { className: 'wq-question' }, q.text));
        card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Status: ' + (q.status || 'pending')));
        poolArea.appendChild(card);
      });
    }).wqGetPoolQuestions();

    container.appendChild(content);
  });
}

function renderInsightsPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'insights', function(container) {
    _stewardHeader(container, 'Insights', 'Agency-wide analytics');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    var statsData = null, hotSpotsData = null;
    function tryRender() {
      if (statsData === null || hotSpotsData === null) return;
      content.innerHTML = '';
      if (!statsData || !statsData.available) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)' } }, 'Grievance stats not yet available (minimum 10 records needed).'));
        return;
      }
      _renderQuickInsights(content, statsData, hotSpotsData);
      _renderFiledVsResolved(content, statsData);
    }

    google.script.run.withSuccessHandler(function(stats) {
      statsData = stats || { available: false };
      tryRender();
    }).withFailureHandler(function() {
      statsData = { available: false };
      tryRender();
    }).dataGetAgencyGrievanceStats();

    google.script.run.withSuccessHandler(function(spots) {
      hotSpotsData = spots || [];
      tryRender();
    }).withFailureHandler(function() {
      hotSpotsData = [];
      tryRender();
    }).dataGetGrievanceHotSpots();
  });
}

function _insightCard(title, color, mainText, subText) {
  var card = el('div', { className: 'card card-glass', style: {
    padding: '16px 18px', borderLeft: '3px solid ' + color,
    background: color + '08',
  }});
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '11px', fontWeight: '600',
    color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px',
  }}, title));
  card.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '24px', fontWeight: '700', color: color, lineHeight: '1.2',
  }}, mainText));
  if (subText) {
    card.appendChild(el('div', { style: {
      fontFamily: 'var(--fontBody)', fontSize: '11px', color: 'var(--muted)', marginTop: '6px', lineHeight: '1.4',
    }}, subText));
  }
  return card;
}

function _renderQuickInsights(container, stats, hotSpots) {
  var grid = el('div', { style: {
    display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
    gap: '10px', marginBottom: '16px',
  }});

  // Box 1: Grievance Status
  var activeCount = stats.openCount || 0;
  var statusSub = stats.total + ' total';
  var parts = [];
  if (stats.wonCount) parts.push(stats.wonCount + ' won');
  if (stats.deniedCount) parts.push(stats.deniedCount + ' denied');
  if (stats.settledCount) parts.push(stats.settledCount + ' settled');
  if (parts.length) statusSub += ' \u00B7 ' + parts.join(', ');
  grid.appendChild(_insightCard('GRIEVANCE STATUS', 'var(--info)', String(activeCount) + ' Active', statusSub));

  // Box 2: Hot Spots
  var hsCount = hotSpots ? hotSpots.length : 0;
  var hsColor = hsCount > 0 ? 'var(--danger)' : 'var(--success)';
  var hsSub = hsCount > 0
    ? hotSpots.slice(0, 3).map(function(h) { return h.location + ' (' + h.count + ')'; }).join(', ')
    : 'No concentration areas detected';
  grid.appendChild(_insightCard('HOT SPOTS', hsColor, hsCount > 0 ? hsCount + ' Location' + (hsCount > 1 ? 's' : '') : 'All Clear', hsSub));

  // Box 3: Step Distribution
  var stepEntries = [];
  if (stats.byStep) {
    Object.keys(stats.byStep).forEach(function(k) { stepEntries.push({ step: k, count: stats.byStep[k] }); });
    stepEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var stepsWithCases = stepEntries.filter(function(e) { return e.count > 0; }).length;
  var stepSub = stepEntries.slice(0, 3).map(function(e) { return e.step + ': ' + e.count; }).join(', ');
  grid.appendChild(_insightCard('STEP DISTRIBUTION', 'var(--accent)', stepsWithCases + ' Step' + (stepsWithCases !== 1 ? 's' : ''), stepSub));

  // Box 4: Top Issue Category
  var catEntries = [];
  if (stats.byCategory) {
    Object.keys(stats.byCategory).forEach(function(k) { catEntries.push({ cat: k, count: stats.byCategory[k] }); });
    catEntries.sort(function(a, b) { return b.count - a.count; });
  }
  var topCat = catEntries.length > 0 ? catEntries[0] : { cat: 'N/A', count: 0 };
  grid.appendChild(_insightCard('TOP ISSUE CATEGORY', 'var(--warning)', topCat.cat, topCat.count + ' cases'));

  container.appendChild(grid);
}

function _renderFiledVsResolved(container, stats) {
  if (typeof ChartHelper === 'undefined' || !stats.monthly || stats.monthly.length === 0) return;

  var chartCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '16px' } });
  chartCard.appendChild(el('div', { style: {
    fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600',
    color: 'var(--text)', marginBottom: '12px',
  }}, 'Filed vs Resolved'));

  var labels = stats.monthly.map(function(m) { return m.month; });
  var filedData = stats.monthly.map(function(m) { return m.count; });
  var resolvedData = (stats.monthlyResolved || []).map(function(m) { return m.count; });

  ChartHelper.createLineChart(chartCard, 'insights-filed-resolved', labels, [
    { label: 'Filed', data: filedData, color: '#f59e0b' },
    { label: 'Resolved', data: resolvedData, color: '#22c55e' },
  ]);

  container.appendChild(chartCard);
}

// ═══════════════════════════════════════
// STEWARD DIRECTORY (steward role, v4.15.0)
// ═══════════════════════════════════════

function renderStewardDirectoryPage(appContainer) {
  renderPageLayout(appContainer, 'steward', 'stewarddirectory', function(container) {
    _stewardHeader(container, CONFIG.stewardLabel + ' Directory', 'Contact your fellow stewards');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(stewards) {
      content.innerHTML = '';
      if (!stewards || stewards.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
        return;
      }

      // Search input
      var searchInput = el('input', {
        className: 'search-input',
        placeholder: 'Search by name, location, or unit...',
        onInput: function() { renderList(searchInput.value.toLowerCase(), activeLocFilter); },
      });
      content.appendChild(searchInput);

      // Location quick-filter pills
      var locs = {};
      stewards.forEach(function(s) { if (s.workLocation) locs[s.workLocation] = (locs[s.workLocation] || 0) + 1; });
      var topLocs = Object.keys(locs).sort(function(a, b) { return locs[b] - locs[a]; }).slice(0, 5);
      var activeLocFilter = '';

      var pillBar = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' } });
      function renderPills() {
        pillBar.innerHTML = '';
        var clearPill = el('button', {
          style: {
            fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
            background: !activeLocFilter ? 'var(--accent)' : 'var(--surface)',
            color: !activeLocFilter ? '#fff' : 'var(--muted)',
            border: '1px solid ' + (!activeLocFilter ? 'var(--accent)' : 'var(--border)'),
          },
          onClick: function() { activeLocFilter = ''; renderPills(); renderList(searchInput.value.toLowerCase(), ''); },
        }, 'All');
        pillBar.appendChild(clearPill);
        topLocs.forEach(function(loc) {
          var pill = el('button', {
            style: {
              fontSize: '11px', padding: '4px 12px', borderRadius: '16px', fontWeight: '600', fontFamily: 'var(--fontBody)',
              background: activeLocFilter === loc ? 'var(--accent)' : 'var(--surface)',
              color: activeLocFilter === loc ? '#fff' : 'var(--muted)',
              border: '1px solid ' + (activeLocFilter === loc ? 'var(--accent)' : 'var(--border)'),
            },
            onClick: function() { activeLocFilter = loc; renderPills(); renderList(searchInput.value.toLowerCase(), loc); },
          }, loc);
          pillBar.appendChild(pill);
        });
      }
      if (topLocs.length > 1) {
        renderPills();
        content.appendChild(pillBar);
      }

      var listArea = el('div');
      content.appendChild(listArea);

      function renderList(query, locFilter) {
        listArea.innerHTML = '';
        var filtered = stewards.filter(function(s) {
          if (locFilter && (s.workLocation || '') !== locFilter) return false;
          if (!query) return true;
          return (s.name || '').toLowerCase().indexOf(query) !== -1
            || (s.workLocation || '').toLowerCase().indexOf(query) !== -1
            || (s.unit || '').toLowerCase().indexOf(query) !== -1;
        });

        if (filtered.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)' } }, 'No matches.'));
          return;
        }

        filtered.forEach(function(s, i) {
          var card = el('div', {
            className: 'card card-glass card-fade-in',
            style: { padding: '14px 16px', marginBottom: '6px', cursor: 'pointer', animationDelay: (i * 0.04) + 's' },
          });
          var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
          topRow.appendChild(el('div', { className: 'member-list-avatar' }, (s.name || 'S').charAt(0).toUpperCase()));
          var info = el('div', { style: { flex: '1' } });
          info.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, s.name || s.email));
          var meta = [];
          if (s.workLocation) meta.push(s.workLocation);
          if (s.unit) meta.push(s.unit);
          info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, meta.join(' \u00B7 ')));
          topRow.appendChild(info);
          card.appendChild(topRow);

          // Expandable details
          var details = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          if (s.email) details.appendChild(el('a', { href: 'mailto:' + s.email, style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginBottom: '4px' } }, '\u2709\uFE0F ' + s.email));
          if (s.phone) details.appendChild(el('a', { href: 'tel:' + s.phone, style: { display: 'block', fontSize: '12px', color: 'var(--success)', marginBottom: '4px' } }, '\uD83D\uDCDE ' + s.phone));
          if (s.officeDays) details.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px' } }, '\uD83D\uDCC5 In-office: ' + s.officeDays));

          // vCard download button
          details.appendChild(el('button', {
            style: { fontSize: '11px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accent)', color: '#fff', fontWeight: '600', marginTop: '4px' },
            onClick: function(e) {
              e.stopPropagation();
              var vcf = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + (s.name || '') + '\n';
              if (s.email) vcf += 'EMAIL:' + s.email + '\n';
              if (s.phone) vcf += 'TEL:' + s.phone + '\n';
              if (s.workLocation) vcf += 'ORG:' + (CONFIG.orgName || '') + ';' + s.workLocation + '\n';
              if (s.unit) vcf += 'TITLE:' + CONFIG.stewardLabel + ' - ' + s.unit + '\n';
              vcf += 'END:VCARD';
              var blob = new Blob([vcf], { type: 'text/vcard' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url;
              a.download = (s.name || 'contact').replace(/\s+/g, '_') + '.vcf';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            },
          }, '\uD83D\uDCBE Save Contact'));
          card.appendChild(details);

          card.addEventListener('click', function() {
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
          });
          listArea.appendChild(card);
        });
      }
      renderList('', '');
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load directory.'));
    }).dataGetStewardDirectory();
  });
}
