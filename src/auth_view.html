<script>
/**
 * Auth View — Login screen (v4.43.0 — Quick Sign-In & Device Keys)
 * Renders: Google SSO button, magic link email form, PIN login, biometric
 * States: choose → email → sending → sent → error
 *
 * Design: Frosted glass card on light radial gradient.
 * Rotating perimeter light, manifesto watermarks, quote cycler.
 *
 * Password manager & biometric support:
 * - Forms use proper autocomplete attributes for credential autofill
 * - PIN form stores credentials via Credential Management API (Chrome/Edge)
 * - iOS/Safari: proper <form> semantics trigger Keychain save + Face ID autofill
 * - Biometric button shown when saved credentials exist
 */

// ── Credential management helpers ──────────────────────────────
/**
 * Detect platform biometric label for UI display.
 * @returns {string} Human-readable biometric method name
 */
function _detectBiometricLabel() {
  var ua = navigator.userAgent || '';
  if (/iPad|iPhone|iPod/.test(ua)) return 'Face ID';
  if (/Mac/.test(ua)) return 'Touch ID';
  if (/Android/.test(ua)) return 'Fingerprint';
  if (/Windows/.test(ua)) return 'Windows Hello';
  return 'Biometrics';
}

/**
 * Save credential after successful PIN login.
 * Uses Credential Management API where available (Chrome/Edge).
 * On Safari/iOS, the <form> semantics + page redirect trigger native Keychain save.
 * @param {string} displayName — member name or ID for credential label
 * @param {string} pin — the PIN to store
 */
function _trySaveCredential(displayName, pin) {
  if (typeof PasswordCredential !== 'undefined' && navigator.credentials && navigator.credentials.store) {
    try {
      var cred = new PasswordCredential({
        id: displayName,
        password: pin,
        name: displayName
      });
      navigator.credentials.store(cred).catch(function() {});
    } catch (_) {}
  }
  try {
    localStorage.setItem('dds_biometric_available', 'true');
    localStorage.setItem('dds_biometric_name', (displayName || '').split(' ').map(function(w) { return w.charAt(0); }).join('').toUpperCase() || 'You');
  } catch (_) {}
}

/**
 * Check if user has previously saved credentials on this device.
 * @returns {boolean}
 */
function _hasSavedCredentials() {
  try { return localStorage.getItem('dds_biometric_available') === 'true'; } catch (_) { return false; }
}

/**
 * Get the display name of the saved credential holder.
 * @returns {string}
 */
function _getSavedCredentialName() {
  try { return localStorage.getItem('dds_biometric_name') || ''; } catch (_) { return ''; }
}

/**
 * Clear saved credential markers (e.g., on explicit logout).
 */
function _clearSavedCredentials() {
  try {
    localStorage.removeItem('dds_biometric_available');
    localStorage.removeItem('dds_biometric_name');
    localStorage.removeItem('dds_credential_type');
    localStorage.removeItem('dds_devicekey_prompted');
  } catch (_) {}
}

/**
 * Attempt to retrieve a stored credential via Credential Management API.
 * Triggers biometric prompt on supported devices (Android Chrome).
 * @param {function} callback — receives PasswordCredential or null
 */
function _tryGetSavedCredential(callback) {
  if (typeof PasswordCredential === 'undefined' || !navigator.credentials || !navigator.credentials.get) {
    callback(null);
    return;
  }
  try {
    navigator.credentials.get({ password: true, mediation: 'optional' })
      .then(function(cred) { callback(cred); })
      .catch(function() { callback(null); });
  } catch (_) {
    callback(null);
  }
}

/**
 * Auto-submit a credential retrieved from credential manager (biometric flow).
 * Tries device key login first (for SSO/magic-link users), falls back to PIN.
 * @param {HTMLElement} container — app container
 * @param {string} credentialValue — retrieved credential (device key or PIN)
 */
function _autoSubmitPIN(container, credentialValue) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '40px 28px' } });
  card.appendChild(el('div', { className: 'spinner', style: { marginBottom: '16px' } }));
  card.appendChild(el('div', { className: 'auth-text', style: { fontSize: '14px' } }, 'Signing you in\u2026'));
  wrapper.appendChild(card);
  container.appendChild(wrapper);

  function _onSuccess(result) {
    if (result && result.success && result.sessionToken) {
      if (WEB_APP_URL) {
        window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(result.sessionToken);
      } else {
        showAuthError(container, 'No app URL available. Contact admin.');
      }
    } else {
      _clearSavedCredentials();
      showAuthPIN(container);
    }
  }

  function _onFailure() {
    _clearSavedCredentials();
    showAuthPIN(container);
  }

  // Check credential type — device_key for SSO/magic-link users, pin for PIN users
  var credType = 'pin';
  try { credType = localStorage.getItem('dds_credential_type') || 'pin'; } catch (_) {}

  if (credType === 'device_key') {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          _onSuccess(result);
        } else {
          // Device key not recognized — try as PIN fallback
          google.script.run.withSuccessHandler(_onSuccess).withFailureHandler(_onFailure).devAuthLoginByPIN(credentialValue);
        }
      })
      .withFailureHandler(function() {
        google.script.run.withSuccessHandler(_onSuccess).withFailureHandler(_onFailure).devAuthLoginByPIN(credentialValue);
      })
      .authLoginWithDeviceKey(credentialValue);
  } else {
    google.script.run.withSuccessHandler(_onSuccess).withFailureHandler(_onFailure).devAuthLoginByPIN(credentialValue);
  }
}

/**
 * Set up keyboard focus trap within an auth card.
 * Prevents tabbing outside the login form for accessibility.
 */
function _setupAuthFocusTrap(container) {
  setTimeout(function() {
    var card = container.querySelector('.auth-glass-card');
    if (!card) return;
    card.addEventListener('keydown', function(e) {
      if (e.key !== 'Tab') return;
      var focusable = card.querySelectorAll('button:not([disabled]), input:not([disabled]), [tabindex]:not([tabindex="-1"]), a[href], select, textarea');
      if (!focusable.length) return;
      var first = focusable[0], last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
  }, 100);
}

// ── Inject page-level effects (once) ──────────────────────────
var _authEffectsInjected = false;
function _injectAuthEffects() {
  if (_authEffectsInjected) return;
  _authEffectsInjected = true;

  // Body gradient (so manifesto layer behind auth-container is visible)
  document.body.classList.add('auth-active');

  // Perimeter light (rotating conic-gradient border) — random hue per session
  var pl = document.createElement('div');
  pl.className = 'auth-perimeter-light';
  pl.setAttribute('aria-hidden', 'true');
  pl.style.filter = 'hue-rotate(' + Math.floor(Math.random() * 360) + 'deg)';
  document.body.appendChild(pl);

  // Noise texture overlay (inline SVG)
  var noise = document.createElement('div');
  noise.className = 'auth-noise';
  noise.setAttribute('aria-hidden', 'true');
  noise.innerHTML = '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">' +
    '<filter id="authNoise"><feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" type="fractalNoise"/></filter>' +
    '<rect filter="url(#authNoise)" width="100%" height="100%"/></svg>';
  document.body.appendChild(noise);

  // Nav cats — show idle cats on the login screen (they'll chase the bar on first tab nav)
  if (typeof _ensureNavCats === 'function') _ensureNavCats();

  // Dark mode toggle (top-right)
  var toggle = document.createElement('button');
  toggle.className = 'auth-mode-toggle';
  toggle.setAttribute('aria-label', 'Toggle dark mode');
  toggle.textContent = (typeof AppState !== 'undefined' && AppState.isDark) ? '\u2600\uFE0F' : '\uD83C\uDF19';
  toggle.addEventListener('click', function() {
    if (typeof AppState === 'undefined') return;
    AppState.isDark = !AppState.isDark;
    try { localStorage.setItem('dds_isDark', AppState.isDark); } catch(_) {}
    toggle.textContent = AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
    if (typeof UnifiedTheme !== 'undefined') UnifiedTheme.apply();
    else if (typeof ThemeEngine !== 'undefined') ThemeEngine.applyTheme(ThemeEngine.getTheme('member', AppState.isDark));
    // Don't override body bg — CSS handles it via [data-theme-mode]
  });
  document.body.appendChild(toggle);
}

function _cleanupAuthEffects() {
  document.body.classList.remove('auth-active');
  var pl = document.querySelector('.auth-perimeter-light');
  if (pl) pl.remove();
  var noise = document.querySelector('.auth-noise');
  if (noise) noise.remove();
  var toggle = document.querySelector('.auth-mode-toggle');
  if (toggle) toggle.remove();
  var corners = document.querySelectorAll('.auth-corner');
  for (var i = 0; i < corners.length; i++) corners[i].remove();
  _authEffectsInjected = false;
}

function renderAuth(container) {
  // v4.41.0: Respect user's stored preference (default to light for auth)
  var prefersDark = false;
  try { prefersDark = localStorage.getItem('dds_isDark') === 'true'; } catch(_) {}
  if (typeof AppState !== 'undefined') AppState.isDark = prefersDark;

  if (typeof UnifiedTheme !== 'undefined' && typeof AppState !== 'undefined') {
    UnifiedTheme.apply();
  } else if (typeof ThemeEngine !== 'undefined') {
    ThemeEngine.applyTheme(ThemeEngine.getTheme('member', prefersDark));
  }

  // Inject page-level effects
  _injectAuthEffects();

  // v4.51.1: Fragment-based magic link handling — extract #token= from URL hash.
  // Magic link tokens are now transported via fragment instead of query string to
  // prevent exposure in server logs, browser history, and Referer headers.
  // The client extracts the token and validates it server-side via google.script.run.
  var _fragToken = null;
  var _fragRemember = false;
  try {
    var _hash = window.top.location.hash || window.location.hash || '';
    // Parse fragment parameters — look specifically for 'token=' (magic link).
    // Session tokens use query string (?sessionToken=) so the server can route correctly.
    if (_hash) {
      var _fragParts = _hash.substring(1).split('&');
      for (var _fi = 0; _fi < _fragParts.length; _fi++) {
        var _kv = _fragParts[_fi].split('=');
        if (_kv[0] === 'token' && _kv[1]) _fragToken = decodeURIComponent(_kv[1]);
        if (_kv[0] === 'remember' && _kv[1] === '1') _fragRemember = true;
      }
      // Clean fragment from URL immediately (security: prevent token lingering in address bar)
      try {
        if (window.top.history && window.top.history.replaceState) {
          window.top.history.replaceState(null, '', window.top.location.pathname + window.top.location.search);
        }
      } catch (_) { /* cross-origin iframe */ }
    }
  } catch (_fragErr) { /* cross-origin iframe — skip */ }

  if (_fragToken) {
    // Show a loading state while validating the magic link token
    container.innerHTML = '';
    var _mlWrap = el('div', { className: 'auth-container fade-in' });
    var _mlCard = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '40px 28px' } });
    _mlCard.appendChild(el('div', { className: 'spinner', style: { marginBottom: '16px' } }));
    _mlCard.appendChild(el('div', { className: 'auth-text', style: { fontSize: '14px' } }, 'Verifying your sign-in link\u2026'));
    _mlWrap.appendChild(_mlCard);
    container.appendChild(_mlWrap);

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success && result.sessionToken) {
          if (WEB_APP_URL) {
            window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(result.sessionToken);
          } else {
            showAuthError(container, 'No app URL available. Contact admin.');
          }
        } else {
          showAuthError(container, (result && result.message) || 'This link has expired or was already used. Please request a new one.');
        }
      })
      .withFailureHandler(function(err) {
        showAuthError(container, (err && err.message) || 'Could not verify sign-in link. Please try again.');
      })
      .authValidateMagicToken(_fragToken, _fragRemember);
    return; // Don't show the login form while validating
  }

  showAuthChoose(container);
}

function showAuthChoose(container) {
  container.innerHTML = '';

  // Inject manifesto bg phrases + quote cycler
  if (typeof injectAuthManifesto === 'function') injectAuthManifesto(container);

  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card = el('div', { className: 'auth-glass-card' });

  // ── Brand title ──
  card.appendChild(el('div', { className: 'auth-brand' }, CONFIG.logoInitials || CONFIG.orgAbbrev || 'App'));

  // ── Header ──
  var header = el('div', { style: { textAlign: 'center', marginBottom: '28px' } });
  header.appendChild(el('div', { className: 'auth-title' },
    CONFIG.memberLabel.toUpperCase() + ' AND ' + CONFIG.stewardLabel.toUpperCase() + ' PORTAL'));
  header.appendChild(el('div', { className: 'auth-subtitle' }, 'Solidarity is not a slogan'));
  card.appendChild(header);

  // ── Status messages (loggedout, token_expired) ──
  var ssoError = (PAGE_DATA && PAGE_DATA.error) || null;
  if (ssoError === 'loggedout') {
    card.appendChild(el('div', {
      style: { fontSize: '12px', color: '#059669', textAlign: 'center', lineHeight: '1.5', padding: '10px 16px', background: 'rgba(52,211,153,0.1)', borderRadius: '8px', border: '1px solid rgba(52,211,153,0.2)', marginBottom: '16px' }
    }, 'Signed out successfully.'));
  }
  if (ssoError === 'token_expired') {
    card.appendChild(el('div', {
      style: { fontSize: '11px', color: '#d97706', textAlign: 'center', lineHeight: '1.5', padding: '10px 16px', background: 'rgba(245,158,11,0.08)', borderRadius: '8px', border: '1px solid rgba(245,158,11,0.15)', marginBottom: '16px' }
    }, 'This sign-in link has expired or was already used. Please request a new one below.'));
  }

  // ── Smart default: biometric (returning) vs email (new) ──
  var btns = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '12px', width: '100%' } });

  if (_hasSavedCredentials()) {
    // ── STATE 1: Returning user — biometric primary ──
    var bioLabel = _detectBiometricLabel();
    var bioName = _getSavedCredentialName();
    var biometricBtn = el('button', {
      className: 'btn btn-primary',
      style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', width: '100%', fontSize: '15px', padding: '14px 20px' },
      onClick: function() {
        biometricBtn.disabled = true;
        biometricBtn.textContent = 'Verifying\u2026';

        _tryGetSavedCredential(function(cred) {
          if (cred && cred.password) {
            _autoSubmitPIN(container, cred.password);
          } else {
            biometricBtn.disabled = false;
            biometricBtn.innerHTML = '\uD83D\uDD12 Sign in with ' + escapeHtml(bioLabel);
            container.innerHTML = '';
            var w = el('div', { className: 'auth-container fade-in' });
            var c = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '32px 28px' } });
            c.appendChild(el('div', { style: { fontSize: '13px', color: '#d97706', padding: '16px', background: 'rgba(245,158,11,0.1)', borderRadius: '8px', lineHeight: '1.6' } },
              escapeHtml(bioLabel) + ' could not verify your identity. Please enter your PIN instead.'));
            w.appendChild(c);
            container.appendChild(w);
            setTimeout(function() { showAuthPIN(container); }, 1500);
          }
        });
      }
    });
    biometricBtn.innerHTML = '\uD83D\uDD12 Sign in with ' + escapeHtml(bioLabel) +
      (bioName ? '<span style="font-size:12px;opacity:0.8;margin-left:4px">(' + escapeHtml(bioName) + ')</span>' : '');
    btns.appendChild(biometricBtn);

    // Forget link
    btns.appendChild(el('button', {
      className: 'auth-muted',
      style: { fontSize: '11px', background: 'none', border: 'none', cursor: 'pointer', padding: '0', textAlign: 'center', textDecoration: 'underline', opacity: '0.6' },
      onClick: function() {
        _clearSavedCredentials();
        showAuthChoose(container);
      }
    }, 'Forget saved credentials'));

    // OR divider
    var bioDivider = el('div', { className: 'auth-divider', style: { margin: '4px 0' } });
    bioDivider.appendChild(el('div', { className: 'auth-divider-line' }));
    bioDivider.appendChild(el('span', { className: 'auth-divider-text' }, 'OR'));
    bioDivider.appendChild(el('div', { className: 'auth-divider-line' }));
    btns.appendChild(bioDivider);

    // Email fallback link
    btns.appendChild(el('button', {
      className: 'btn btn-secondary',
      onClick: function() { showAuthEmail(container); }
    }, '\u2709\uFE0F  Sign in with email'));

    card.appendChild(btns);

  } else {
    // ── STATE 2: New user — inline email form ──
    _renderEmailForm(card, { showBack: false, container: container });
  }

  // ── PIN trigger (always visible) ──
  var divider = el('div', { className: 'auth-divider' });
  divider.appendChild(el('div', { className: 'auth-divider-line' }));
  divider.appendChild(el('span', { className: 'auth-divider-text' }, 'OR'));
  divider.appendChild(el('div', { className: 'auth-divider-line' }));
  card.appendChild(divider);

  var pinTrigger = el('div', {
    className: 'auth-pin-trigger',
    role: 'button', tabIndex: 0,
    onClick: function() { showAuthPIN(container); },
    onKeyDown: function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showAuthPIN(container); } }
  });
  var pinLeft = el('div', { className: 'auth-pin-left' });
  pinLeft.appendChild(el('span', { className: 'auth-pin-icon' }, '\u2328'));
  pinLeft.appendChild(el('span', {}, 'Sign in with PIN'));
  pinTrigger.appendChild(pinLeft);
  pinTrigger.appendChild(el('span', { className: 'auth-pin-arrow' }, '\u203A'));
  card.appendChild(pinTrigger);

  // Decorative dots
  var dots = el('div', { className: 'auth-dots' });
  for (var d = 0; d < 3; d++) dots.appendChild(el('div', { className: 'auth-dot' }));
  card.appendChild(dots);

  wrapper.appendChild(card);

  // Quote cycler below the card
  wrapper.appendChild(el('div', { id: 'auth-quote-wrap', className: 'auth-quote-wrap' }));

  // Footer
  var footer = el('div', { className: 'auth-footer' });
  footer.appendChild(el('div', { className: 'auth-footer-copy' },
    '\u00A9 ' + new Date().getFullYear() + ' ' + (CONFIG.orgName || 'Solidarity Portal')));
  wrapper.appendChild(footer);

  container.appendChild(wrapper);
  _setupAuthFocusTrap(container);
}


/**
 * PIN login screen.
 * Single numeric input. Calls devAuthLoginByPIN() server-side.
 * On success redirects with sessionToken.
 */
function showAuthPIN(container) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card    = el('div', { className: 'auth-glass-card' });

  // Back
  card.appendChild(el('button', {
    className: 'auth-back-btn',
    style: { fontSize: '13px', marginBottom: '20px', textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', padding: '0' },
    onClick: function() { showAuthChoose(container); }
  }, '\u2190 Back'));

  card.appendChild(el('div', { className: 'auth-title', style: { textAlign: 'left', fontSize: '16px', letterSpacing: '0.02em' } }, 'Sign in with PIN'));
  card.appendChild(el('div', { className: 'auth-muted', style: { fontSize: '12px', marginBottom: '20px' } }, 'Enter your 6-digit member PIN.'));

  // ── Form wrapper for password manager + biometric autofill ──
  var form = el('form', {
    autocomplete: 'on',
    onSubmit: function(e) { e.preventDefault(); doSubmit(); }
  });
  // Prevent form from navigating on submit
  form.setAttribute('action', 'javascript:void(0)');
  form.setAttribute('method', 'post');

  // Hidden username field — enables password managers to associate credentials
  // with a specific user. Updated after successful login with actual member name.
  var usernameInput = el('input', {
    type: 'text',
    name: 'username',
    autocomplete: 'username',
    tabIndex: -1,
    'aria-hidden': 'true',
    style: { position: 'absolute', width: '1px', height: '1px', padding: '0', margin: '-1px', overflow: 'hidden', clip: 'rect(0,0,0,0)', border: '0' }
  });
  // Pre-fill with saved credential name if returning user
  var savedName = _getSavedCredentialName();
  if (savedName) usernameInput.value = savedName;
  else usernameInput.value = CONFIG.orgName || 'Member Portal';
  form.appendChild(usernameInput);

  var pinLabel = el('label', { htmlFor: 'dev-pin-input', className: 'auth-muted', style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '6px' } }, 'PIN');
  form.appendChild(pinLabel);

  var pinInput = el('input', {
    id:           'dev-pin-input',
    className:    'auth-input',
    name:         'pin',
    type:         'password',
    inputMode:    'numeric',
    maxLength:    '6',
    placeholder:  '\u2022\u2022\u2022\u2022\u2022\u2022',
    autocomplete: 'current-password',
    style:        { letterSpacing: '0.2em', fontSize: '20px', textAlign: 'center' }
  });
  form.appendChild(pinInput);

  var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '18px', margin: '8px 0', textAlign: 'center' } });
  form.appendChild(statusMsg);

  var submitBtn = el('button', {
    className: 'btn btn-primary',
    type:      'submit',
    style:     { width: '100%', marginTop: '8px' }
  }, 'Sign In');
  form.appendChild(submitBtn);

  // Forgot PIN link
  var forgotLink = el('div', { style: { textAlign: 'center', marginTop: '12px' } });
  forgotLink.appendChild(el('button', {
    className: 'auth-muted',
    style: { fontSize: '12px', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', opacity: '0.7' },
    onClick: function() { showForgotPIN(container); }
  }, 'Forgot your PIN?'));
  form.appendChild(forgotLink);

  card.appendChild(form);
  wrapper.appendChild(card);
  container.appendChild(wrapper);
  _setupAuthFocusTrap(container);

  setTimeout(function() { try { pinInput.focus(); } catch (_) {} }, 50);

  // Auto-submit when 6 digits entered
  pinInput.addEventListener('input', function() {
    if (pinInput.value.length === 6 && /^\d{6}$/.test(pinInput.value)) {
      doSubmit();
    }
  });

  function doSubmit() {
    var pin = pinInput.value.trim();
    if (!pin || !/^\d{6}$/.test(pin)) {
      statusMsg.textContent = 'Enter your 6-digit PIN.';
      statusMsg.style.color = '#dc2626';
      return;
    }
    submitBtn.disabled   = true;
    submitBtn.textContent = 'Verifying\u2026';
    statusMsg.textContent = '';

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success && result.sessionToken) {
          statusMsg.textContent = '\u2713 Matched. Signing you in\u2026';
          statusMsg.style.color = '#059669';

          // Save credential for password manager + biometric autofill
          var credName = result.name || result.memberId || 'Member';
          usernameInput.value = credName;
          _trySaveCredential(credName, pin);

          if (WEB_APP_URL) {
            window.top.location.href = WEB_APP_URL + '?sessionToken=' + encodeURIComponent(result.sessionToken);
          } else {
            statusMsg.textContent = 'No app URL available. Contact admin.';
            statusMsg.style.color = '#dc2626';
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Sign In';
          }
        } else {
          statusMsg.textContent = (result && result.message) || 'Incorrect PIN.';
          statusMsg.style.color = '#dc2626';
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Sign In';
          pinInput.value        = '';
          try { pinInput.focus(); } catch (_) {}
        }
      })
      .withFailureHandler(function(err) {
        statusMsg.textContent = (err && err.message) ? err.message : 'Server error. Try again.';
        statusMsg.style.color = '#dc2626';
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Sign In';
      })
      .devAuthLoginByPIN(pin);
  }
}

/**
 * Renders the email sign-in form (input + remember-me + submit).
 * Used both inline on the main login screen (new users) and as
 * a separate screen via showAuthEmail (returning user fallback).
 * @param {HTMLElement} parentEl - Element to append the form into
 * @param {Object} opts - { showBack: boolean, container: HTMLElement }
 */
function _renderEmailForm(parentEl, opts) {
  opts = opts || {};

  if (opts.showBack) {
    parentEl.appendChild(el('button', {
      className: 'auth-back-btn',
      style: { fontSize: '13px', marginBottom: '20px', textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', padding: '0' },
      'aria-label': 'Go back',
      onClick: function() { showAuthChoose(opts.container); }
    }, '\u2190 Back'));
  }

  parentEl.appendChild(el('div', { className: 'auth-title', style: { textAlign: 'left', fontSize: '16px', letterSpacing: '0.02em' } }, 'Sign in with email'));
  parentEl.appendChild(el('div', { className: 'auth-muted', style: { fontSize: '12px', marginTop: '4px', marginBottom: '24px', lineHeight: '1.5' } }, "We'll send a secure link. No password needed."));

  // Form wrapper for password manager autofill
  var form = el('form', {
    autocomplete: 'on',
    onSubmit: function(e) {
      e.preventDefault();
      var email = emailInput.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
      showAuthSending(opts.container, email, rememberMe.value);
    }
  });
  form.setAttribute('action', 'javascript:void(0)');
  form.setAttribute('method', 'post');

  var inputLabel = el('label', { htmlFor: 'auth-email-input', className: 'auth-muted', style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '6px' } }, 'Email address');
  form.appendChild(inputLabel);

  var emailInput = el('input', {
    id: 'auth-email-input',
    className: 'auth-input',
    name: 'email',
    type: 'email',
    placeholder: 'you@example.com',
    autocomplete: 'email',
  });
  form.appendChild(emailInput);

  // Remember me toggle
  var rememberMe = { value: true };
  var toggleContainer = el('div', { className: 'auth-toggle', style: { margin: '14px 0' }, role: 'switch', 'aria-checked': 'true', 'aria-label': 'Remember this device for ' + CONFIG.cookieDurationDays + ' days', tabIndex: 0 });

  var track = el('div', { className: 'auth-toggle-track', style: { background: '#1f4a43' } });
  var thumb = el('div', { className: 'auth-toggle-thumb', style: { left: '18px' } });
  track.appendChild(thumb);
  toggleContainer.appendChild(track);
  toggleContainer.appendChild(el('span', {}, 'Remember this device (' + CONFIG.cookieDurationDays + ' days)'));

  function _toggleRememberMe() {
    rememberMe.value = !rememberMe.value;
    track.style.background = rememberMe.value ? '#1f4a43' : '';
    thumb.style.left = rememberMe.value ? '18px' : '2px';
    toggleContainer.setAttribute('aria-checked', String(rememberMe.value));
  }
  toggleContainer.addEventListener('click', _toggleRememberMe);
  toggleContainer.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); _toggleRememberMe(); }
  });
  form.appendChild(toggleContainer);

  var submitBtn = el('button', {
    className: 'btn btn-primary',
    type: 'submit',
    style: { marginTop: '8px', opacity: '0.5', width: '100%' }
  }, 'Send sign-in link');
  form.appendChild(submitBtn);

  emailInput.addEventListener('input', function() {
    var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    submitBtn.style.opacity = valid ? '1' : '0.5';
  });

  parentEl.appendChild(form);

  // Auto-focus email input after render
  setTimeout(function() { emailInput.focus(); }, 50);
}

function showAuthEmail(container) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card    = el('div', { className: 'auth-glass-card' });

  _renderEmailForm(card, { showBack: true, container: container });

  wrapper.appendChild(card);
  container.appendChild(wrapper);
  _setupAuthFocusTrap(container);
}

function showAuthSending(container, email, rememberMe) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card    = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '40px 28px' } });

  card.appendChild(el('div', { className: 'spinner', style: { marginBottom: '16px' } }));
  card.appendChild(el('div', { className: 'auth-text', style: { fontSize: '14px' } }, 'Sending sign-in link...'));

  wrapper.appendChild(card);
  container.appendChild(wrapper);

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        showAuthSent(container, email, rememberMe);
      } else if (result) {
        showAuthError(container, result.message || 'An unknown error occurred.', email);
      } else {
        showAuthError(container, 'No response from server. The web app may need to be re-deployed. Please contact your administrator.', email);
      }
    })
    .withFailureHandler(function(err) {
      var msg = (err && err.message) ? err.message : '';
      if (!msg || msg === 'Error' || msg === 'ScriptError') {
        msg = 'Unable to connect to the server. ';
        msg += 'This is often caused by a stale browser cache. ';
        msg += 'Please clear your browser cache or try in an incognito/private window.';
      }
      showAuthError(container, msg, email);
    })
    .authSendMagicLink(email, rememberMe);
}

function showAuthSent(container, email, rememberMe) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card    = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '32px 28px' } });

  card.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '16px' } }, '\u2709\uFE0F'));
  card.appendChild(el('div', { className: 'auth-title', style: { fontSize: '16px', letterSpacing: '0.02em' } }, 'Check your email'));

  var desc = el('div', { className: 'auth-muted', style: { fontSize: '13px', marginTop: '8px', lineHeight: '1.6' } });
  desc.appendChild(document.createTextNode('Sign-in link sent to'));
  desc.appendChild(document.createElement('br'));
  desc.appendChild(el('span', { style: { color: '#1f4a43', fontWeight: '600' } }, email));
  wrapper._sentDesc = desc;
  card.appendChild(desc);

  card.appendChild(el('div', { className: 'auth-muted', style: { marginTop: '14px', fontSize: '11px', lineHeight: '1.7', maxWidth: '300px', margin: '14px auto 0' } }, "Check your spam/junk folder if you don't see it."));

  var info = el('div', {
    className: 'auth-info-card',
    style: { marginTop: '16px', fontSize: '12px', lineHeight: '1.6', textAlign: 'center', maxWidth: '280px', margin: '16px auto 0' }
  });
  info.appendChild(document.createTextNode('Link expires in '));
  info.appendChild(el('span', { className: 'auth-text', style: { fontWeight: '600' } }, CONFIG.magicLinkExpiryDays + ' days'));
  info.appendChild(document.createTextNode('.'));
  if (rememberMe) {
    info.appendChild(document.createElement('br'));
    info.appendChild(document.createTextNode("You'll stay signed in for "));
    info.appendChild(el('span', { className: 'auth-text', style: { fontWeight: '600' } }, CONFIG.cookieDurationDays + ' days'));
    info.appendChild(document.createTextNode('.'));
  }
  card.appendChild(info);

  var actions = el('div', { style: { display: 'flex', gap: '16px', marginTop: '20px', alignItems: 'center', justifyContent: 'center' } });
  var resendBtn = el('button', {
    className: 'auth-muted',
    style: { fontSize: '13px', fontWeight: '600', opacity: '0.5', cursor: 'default', background: 'none', border: 'none' },
  }, 'Resend (30s)');
  resendBtn.disabled = true;
  actions.appendChild(resendBtn);

  var countdown = 30;
  var timer = setInterval(function() {
    countdown--;
    if (countdown <= 0) {
      clearInterval(timer);
      resendBtn.textContent = 'Resend';
      resendBtn.style.color = '#1f4a43';
      resendBtn.style.opacity = '1';
      resendBtn.style.cursor = 'pointer';
      resendBtn.disabled = false;
      resendBtn.onclick = function() { showAuthSending(container, email, rememberMe); };
    } else {
      resendBtn.textContent = 'Resend (' + countdown + 's)';
    }
  }, 1000);

  actions.appendChild(el('button', {
    className: 'auth-muted',
    style: { fontSize: '13px', background: 'none', border: 'none', cursor: 'pointer' },
    onClick: function() { clearInterval(timer); showAuthEmail(container); }
  }, 'Different email'));
  card.appendChild(actions);

  wrapper.appendChild(card);
  container.appendChild(wrapper);
}

function showAuthError(container, message, email) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card    = el('div', { className: 'auth-glass-card', style: { textAlign: 'center', padding: '32px 28px' } });

  card.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '16px' } }, '\u26A0\uFE0F'));
  card.appendChild(el('div', { className: 'auth-title', style: { fontSize: '16px', letterSpacing: '0.02em' } }, 'Something went wrong'));
  card.appendChild(el('div', { className: 'auth-muted', style: { fontSize: '13px', marginTop: '8px', lineHeight: '1.6', maxWidth: '300px', margin: '8px auto 0' } }, message));

  card.appendChild(el('button', {
    className: 'btn btn-primary',
    style: { marginTop: '24px', maxWidth: '280px', width: '100%' },
    onClick: function() { showAuthChoose(container); }
  }, 'Try again'));

  wrapper.appendChild(card);
  container.appendChild(wrapper);
}

/**
 * Forgot PIN screen — sends a reset email with a new PIN.
 */
function showForgotPIN(container) {
  container.innerHTML = '';
  var wrapper = el('div', { className: 'auth-container fade-in' });
  var card = el('div', { className: 'auth-glass-card' });

  card.appendChild(el('button', {
    className: 'auth-back-btn',
    style: { fontSize: '13px', marginBottom: '20px', textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', padding: '0' },
    onClick: function() { showAuthPIN(container); }
  }, '\u2190 Back'));

  card.appendChild(el('div', { className: 'auth-title', style: { textAlign: 'left', fontSize: '16px', letterSpacing: '0.02em' } }, 'Reset your PIN'));
  card.appendChild(el('div', { className: 'auth-muted', style: { fontSize: '12px', marginBottom: '20px', lineHeight: '1.5' } },
    "Enter your email and we'll send you a new PIN."));

  var form = el('form', {
    autocomplete: 'on',
    onSubmit: function(e) { e.preventDefault(); doReset(); }
  });
  form.setAttribute('action', 'javascript:void(0)');
  form.setAttribute('method', 'post');

  var emailLabel = el('label', { htmlFor: 'forgot-pin-email', className: 'auth-muted', style: { fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '6px' } }, 'Email address');
  form.appendChild(emailLabel);

  var emailInput = el('input', {
    id: 'forgot-pin-email',
    className: 'auth-input',
    name: 'email',
    type: 'email',
    placeholder: 'you@example.com',
    autocomplete: 'email'
  });
  form.appendChild(emailInput);

  var statusMsg = el('div', { style: { fontSize: '12px', minHeight: '18px', margin: '8px 0', textAlign: 'center' } });
  form.appendChild(statusMsg);

  var resetBtn = el('button', {
    className: 'btn btn-primary',
    type: 'submit',
    style: { width: '100%', marginTop: '8px', opacity: '0.5' }
  }, 'Send new PIN');
  form.appendChild(resetBtn);

  emailInput.addEventListener('input', function() {
    var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    resetBtn.style.opacity = valid ? '1' : '0.5';
  });

  card.appendChild(form);
  wrapper.appendChild(card);
  container.appendChild(wrapper);
  _setupAuthFocusTrap(container);
  emailInput.focus();

  function doReset() {
    var email = emailInput.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      statusMsg.textContent = 'Enter a valid email address.';
      statusMsg.style.color = '#dc2626';
      return;
    }
    resetBtn.disabled = true;
    resetBtn.textContent = 'Sending\u2026';
    statusMsg.textContent = '';

    google.script.run
      .withSuccessHandler(function(result) {
        statusMsg.textContent = (result && result.message) || 'Check your email for your new PIN.';
        statusMsg.style.color = '#059669';
        resetBtn.textContent = 'Sent';
        // After 3 seconds, go back to PIN screen
        setTimeout(function() { showAuthPIN(container); }, 3000);
      })
      .withFailureHandler(function() {
        statusMsg.textContent = 'Server error. Try again.';
        statusMsg.style.color = '#dc2626';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Send new PIN';
      })
      .devRequestPINReset(email);
  }
}
</script>
