<style>

/* ── AUTH MANIFESTO BACKGROUND ──────────────────── */
.auth-manifesto-layer {
  position: fixed; inset: 0; pointer-events: none;
  display: flex; flex-direction: column;
  justify-content: space-between; padding: 44px 60px;
  overflow: hidden; z-index: 0;
}
@media(max-width: 480px) { .auth-manifesto-layer { padding: 36px 24px; } }

.auth-manifesto-phrase {
  font-family: var(--fontDisplay, 'Bebas Neue', sans-serif);
  color: rgba(var(--accentRGB, 59,130,246), 0.2);
  line-height: 1; white-space: nowrap; user-select: none; opacity: 0;
}
.amp-1 { font-size: clamp(26px, 6vw, 78px); }
.amp-2 { font-size: clamp(17px, 3.8vw, 50px); text-align: right; }
.amp-3 { font-size: clamp(21px, 5vw, 66px); }
.amp-4 { font-size: clamp(14px, 3.2vw, 40px); text-align: center; }
.amp-5 { font-size: clamp(18px, 4.2vw, 58px); text-align: right; }

@keyframes authPhraseCycle {
  0%,18%  { opacity:0; } 28%,72% { opacity:1; } 82%,100% { opacity:0; }
}
.auth-manifesto-phrase:nth-child(1) { animation: authPhraseCycle 14s 0s   infinite; }
.auth-manifesto-phrase:nth-child(2) { animation: authPhraseCycle 14s 2.4s infinite; }
.auth-manifesto-phrase:nth-child(3) { animation: authPhraseCycle 14s 4.8s infinite; }
.auth-manifesto-phrase:nth-child(4) { animation: authPhraseCycle 14s 7.2s infinite; }
.auth-manifesto-phrase:nth-child(5) { animation: authPhraseCycle 14s 9.6s infinite; }

.auth-corner { position: fixed; width: 44px; height: 44px; pointer-events: none; z-index: 0; }
.auth-corner.tl { top:14px; left:14px;   border-top:1px solid rgba(var(--accentRGB,59,130,246),0.3); border-left:1px solid rgba(var(--accentRGB,59,130,246),0.3); }
.auth-corner.tr { top:14px; right:14px;  border-top:1px solid rgba(var(--accentRGB,59,130,246),0.3); border-right:1px solid rgba(var(--accentRGB,59,130,246),0.3); }
.auth-corner.bl { bottom:14px; left:14px;  border-bottom:1px solid rgba(var(--accentRGB,59,130,246),0.3); border-left:1px solid rgba(var(--accentRGB,59,130,246),0.3); }
.auth-corner.br { bottom:14px; right:14px; border-bottom:1px solid rgba(var(--accentRGB,59,130,246),0.3); border-right:1px solid rgba(var(--accentRGB,59,130,246),0.3); }
@media(max-width:420px) { .auth-corner { display:none; } }

/* Override auth-container to center-flex for card layout */
.auth-container {
  position: relative; z-index: 2;
  display: flex !important; flex-direction: column !important;
  align-items: center !important; justify-content: center !important;
  min-height: 100vh; padding: 24px;
}

/* Glass card wrapper around existing auth content */
.auth-glass-card {
  width: min(350px, 94vw);
  background: rgba(8,13,24,0.18);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  border: 1px solid rgba(255,255,255,0.12);
  border-top-color: rgba(255,255,255,0.2);
  border-radius: 20px; padding: 26px 22px 22px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.07);
}

/* Login quote cycler */
.auth-quote-wrap {
  position: relative; z-index: 2;
  width: min(350px, 94vw); margin-top: 18px;
  text-align: center; min-height: 58px;
}
.auth-quote-item {
  position: absolute; inset: 0; opacity: 0;
  transition: opacity 0.9s ease;
  display: flex; flex-direction: column;
  align-items: center; gap: 5px; padding: 0 6px;
}
.auth-quote-item.aq-visible { opacity: 1; }
.aq-text { font-style:italic; font-size:12px; font-weight:300; color:rgba(255,255,255,0.42); line-height:1.5; }
.aq-attr { font-size:10px; color:rgba(255,255,255,0.18); letter-spacing:0.1em; text-transform:uppercase; }

/* ── MEMBER HUB TAB ──────────────────────────────── */
.hub-hero { margin-bottom: 30px; }

.hub-live-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 100px; padding: 3px 10px;
  font-size: 10px; color: #FCA5A5; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 12px;
}
.hub-blink { width:5px; height:5px; border-radius:50%; background:#EF4444; animation:hubBlink 1.4s ease-in-out infinite; }
@keyframes hubBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hub-headline {
  font-family: var(--fontDisplay, 'Bebas Neue', sans-serif);
  font-size: clamp(26px, 6vw, 56px); line-height: 0.95; margin-bottom: 11px;
}
.hub-headline .hub-hl-accent { color: var(--accent); }

.hub-lead { font-size:14px; color:var(--muted); font-weight:300; line-height:1.65; max-width:540px; }
.hub-lead strong { color:var(--text); font-weight:600; }

.hub-inline-quote {
  border-left: 2px solid var(--accent);
  padding: 11px 15px; margin: 24px 0;
  background: rgba(var(--accentRGB,59,130,246),0.04);
  border-radius: 0 8px 8px 0;
}
.hiq-text { font-style:italic; font-size:13px; font-weight:300; color:rgba(var(--textRGB,249,250,251),0.68); line-height:1.6; }
.hiq-attr { font-size:10px; color:var(--muted); margin-top:5px; letter-spacing:0.06em; text-transform:uppercase; }

.hub-section-hd { display:flex; align-items:center; gap:12px; }
.hub-section-hd-line { flex:1; height:1px; background:var(--border); }
.hub-section-hd-text { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }

/* Life cards — responsive */
.hub-life-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media(max-width:480px) { .hub-life-grid { grid-template-columns: 1fr; } }

.hub-life-card {
  background: var(--surface, rgba(255,255,255,0.04));
  border: 1px solid var(--border); border-radius: 11px; padding: 14px;
  cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
}
.hub-life-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  opacity:0; transition:opacity 0.25s; border-radius:11px 11px 0 0;
}
.hlc-fin::before  { background:#F59E0B; }
.hlc-hlth::before { background:#10B981; }
.hlc-fam::before  { background:#14B8A6; }
.hlc-ret::before  { background:var(--accent); }
.hub-life-card:hover,.hub-life-card.hlc-open { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.14); }
.hub-life-card:hover::before,.hub-life-card.hlc-open::before { opacity:1; }

.hlc-hd { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
.hlc-ico { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.hlc-fin  .hlc-ico { background:rgba(245,158,11,0.12); }
.hlc-hlth .hlc-ico { background:rgba(16,185,129,0.12); }
.hlc-fam  .hlc-ico { background:rgba(20,184,166,0.12); }
.hlc-ret  .hlc-ico { background:rgba(var(--accentRGB,59,130,246),0.12); }
.hlc-name { font-size:12px; font-weight:700; color:var(--text); }
.hlc-tag  { font-size:11px; color:var(--muted); }
.hlc-body { font-size:12px; color:var(--muted); line-height:1.6; max-height:0; overflow:hidden; opacity:0; transition:max-height 0.4s ease,opacity 0.3s ease; }
.hub-life-card.hlc-open .hlc-body { max-height:240px; opacity:1; }
.hlc-pts { list-style:none; margin-top:7px; }
.hlc-pts li { padding:2px 0 2px 13px; position:relative; font-size:11px; color:var(--muted); }
.hlc-pts li::before { content:'→'; position:absolute; left:0; font-size:10px; }
.hlc-fin  .hlc-pts li::before { color:#F59E0B; }
.hlc-hlth .hlc-pts li::before { color:#10B981; }
.hlc-fam  .hlc-pts li::before { color:#14B8A6; }
.hlc-ret  .hlc-pts li::before { color:var(--accent); }
.hlc-hint { font-size:10px; color:rgba(255,255,255,0.18); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; transition:color 0.2s; }
.hub-life-card:hover .hlc-hint { color:rgba(255,255,255,0.36); }
.hub-life-card.hlc-open .hlc-hint { opacity:0; }

/* Habit cards — responsive 2-col on mobile */
.hub-habits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 9px;
}
@media(max-width:400px) { .hub-habits-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:300px) { .hub-habits-grid { grid-template-columns: 1fr; } }

.hub-habit-card {
  background: var(--surface, rgba(255,255,255,0.04));
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px;
  cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
}
.hub-habit-card::after {
  content:''; position:absolute; top:0; left:0; bottom:0;
  width:3px; border-radius:10px 0 0 10px; opacity:0; transition:opacity 0.25s;
}
.hhc-clock::after  { background:#60A5FA; }
.hhc-meal::after   { background:#10B981; }
.hhc-break::after  { background:#14B8A6; }
.hhc-ot::after     { background:#EF4444; }
.hhc-fund::after   { background:#F59E0B; }
.hhc-vac::after    { background:#8B5CF6; }
.hhc-sick::after   { background:#F97316; }
.hhc-offclk::after { background:#EF4444; }
.hub-habit-card:hover,.hub-habit-card.hhc-open { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.14); }
.hub-habit-card:hover::after,.hub-habit-card.hhc-open::after { opacity:1; }
.hhc-hd { display:flex; align-items:flex-start; gap:8px; }
.hhc-ico { font-size:15px; flex-shrink:0; margin-top:1px; }
.hhc-name { font-size:12px; font-weight:700; color:var(--text); line-height:1.3; }
.hhc-rule { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; margin-top:2px; }
.hhc-clock  .hhc-rule { color:#60A5FA; }
.hhc-meal   .hhc-rule { color:#10B981; }
.hhc-break  .hhc-rule { color:#14B8A6; }
.hhc-ot     .hhc-rule { color:#F87171; }
.hhc-fund   .hhc-rule { color:#F59E0B; }
.hhc-vac    .hhc-rule { color:#A78BFA; }
.hhc-sick   .hhc-rule { color:#F97316; }
.hhc-offclk .hhc-rule { color:#F87171; }
.hhc-body { font-size:12px; color:var(--muted); line-height:1.6; max-height:0; overflow:hidden; opacity:0; transition:max-height 0.4s ease,opacity 0.3s ease,margin 0.3s ease; margin-top:0; }
.hub-habit-card.hhc-open .hhc-body { max-height:160px; opacity:1; margin-top:8px; }
.hhc-warn { display:inline-flex; align-items:center; gap:4px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-radius:5px; padding:3px 7px; margin-top:6px; font-size:10px; color:#FCA5A5; letter-spacing:0.05em; text-transform:uppercase; }

/* Work to Rule strip */
.hub-wtr-strip {
  background: rgba(245,158,11,0.05);
  border: 1px solid rgba(245,158,11,0.18);
  border-left: 3px solid #FBBF24;
  border-radius: 0 12px 12px 0;
  padding: 18px; cursor: pointer; transition: all 0.25s;
}
.hub-wtr-strip:hover { background: rgba(245,158,11,0.09); }
.hub-wtr-hd { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.hub-wtr-left { display:flex; align-items:center; gap:11px; }
.hub-wtr-ico { font-size:20px; flex-shrink:0; }
.hub-wtr-title { font-size:14px; font-weight:700; color:var(--text); line-height:1.2; }
.hub-wtr-subtitle { font-size:10px; color:#FBBF24; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
.hub-wtr-badge { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.22); border-radius:6px; padding:3px 9px; font-size:10px; font-weight:700; color:#FBBF24; letter-spacing:0.07em; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
@media(max-width:360px) { .hub-wtr-badge { display:none; } }

.hub-wtr-body { font-size:13px; color:var(--muted); line-height:1.65; max-height:0; overflow:hidden; opacity:0; transition:max-height 0.5s ease,opacity 0.35s ease,margin 0.4s ease; margin-top:0; }
.hub-wtr-strip.hub-wtr-open .hub-wtr-body { max-height:700px; opacity:1; margin-top:16px; }

.hub-wtr-intro { margin-bottom:8px; }
.hub-wtr-sub-note { font-size:12px; color:rgba(var(--textRGB,249,250,251),0.5); margin-bottom:12px; }

.hub-wtr-principles { list-style:none; display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
.hub-wtr-principles li { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; background:rgba(245,158,11,0.05); border:1px solid rgba(245,158,11,0.1); border-radius:8px; font-size:12px; color:var(--muted); line-height:1.5; }
.hub-wtr-principles li strong { color:var(--text); font-weight:600; display:block; margin-bottom:2px; }
.hub-wtr-num { font-family:var(--fontDisplay,'Bebas Neue',sans-serif); font-size:17px; color:#FBBF24; line-height:1; flex-shrink:0; width:18px; text-align:center; margin-top:1px; }

.hub-wtr-note { padding:10px 13px; background:rgba(var(--accentRGB,59,130,246),0.06); border:1px solid rgba(var(--accentRGB,59,130,246),0.14); border-radius:8px; font-size:11px; color:var(--text-info,#60A5FA); line-height:1.55; }

/* Action links — responsive */
.hub-action-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 9px;
}
@media(max-width:340px) { .hub-action-grid { grid-template-columns: 1fr 1fr; } }

.hub-action-link {
  background: var(--surface, rgba(255,255,255,0.04));
  border: 1px solid var(--border); border-radius: 10px; padding: 13px 10px;
  cursor: pointer; transition: all 0.25s;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  text-align: center; text-decoration: none;
}
.hub-action-link:hover { background:rgba(255,255,255,0.08); border-color:rgba(var(--accentRGB,59,130,246),0.35); transform:translateY(-2px); }
.hal-ico { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.hal-meetings .hal-ico { background:rgba(var(--accentRGB,59,130,246),0.12); }
.hal-events   .hal-ico { background:rgba(16,185,129,0.12); }
.hal-polls    .hal-ico { background:rgba(139,92,246,0.12); }
.hal-stats    .hal-ico { background:rgba(245,158,11,0.12); }
.hal-steward  .hal-ico { background:rgba(239,68,68,0.12); }
.hal-name { font-size:11px; font-weight:600; color:var(--text); }
.hal-desc { font-size:10px; color:var(--muted); line-height:1.4; }
</style>
