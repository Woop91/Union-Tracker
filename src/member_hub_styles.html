/* ── AUTH PAGE — ETHEREAL PROFESSIONAL ─────────── */
/* v4.41.0 — Translucent editorial login screen.    */
/* Light-first with dark mode. Frosted glass card.   */

/* ── Auth page background (on body so manifesto layer shows through) ── */
body.auth-active {
  background: radial-gradient(ellipse at 50% 40%, #fcfdfc 0%, #f0f4f3 100%);
  overflow: hidden; min-height: 100dvh;
  transition: background 0.5s ease;
}
[data-theme-mode="dark"] body.auth-active {
  background: radial-gradient(ellipse at 50% 40%, #111615 0%, #060a09 100%);
}
.auth-container {
  position: relative; z-index: 2;
  display: flex !important; flex-direction: column !important;
  align-items: center !important; justify-content: center !important;
  min-height: 100dvh; padding: 24px;
  background: transparent;
}

/* ── Perimeter light — rotating conic-gradient border ── */
.auth-perimeter-light {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 100;
}
.auth-perimeter-light::before {
  content: '';
  position: absolute; inset: 0;
  border: 3px solid transparent;
  background: conic-gradient(
    from 0deg,
    transparent 0%, #1e5148 10%, #4fd8c1 25%,
    #005f56 40%, #00ced1 55%, transparent 70%
  ) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: authBorderSpin 14s linear infinite;
}
@keyframes authBorderSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Noise texture overlay ── */
.auth-noise {
  pointer-events: none; position: fixed; inset: 0; z-index: 50;
  opacity: 0.03; mix-blend-mode: multiply;
}
[data-theme-mode="dark"] .auth-noise {
  opacity: 0.05; mix-blend-mode: overlay;
}

/* ── Dark mode toggle ── */
.auth-mode-toggle {
  position: fixed; top: 24px; right: 24px; z-index: 110;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(0,0,0,0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  cursor: pointer; font-size: 18px; transition: all 0.3s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.auth-mode-toggle:hover { transform: scale(1.08); }
.auth-mode-toggle:active { transform: scale(0.95); }
[data-theme-mode="dark"] .auth-mode-toggle {
  background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1);
}

/* ── Manifesto background phrases ── */
.auth-manifesto-layer {
  position: fixed; inset: 0; pointer-events: none;
  overflow: hidden; z-index: 0;
}
.auth-manifesto-phrase {
  position: absolute;
  font-family: 'Space Grotesk', var(--fontDisplay, sans-serif);
  font-weight: 700; color: rgba(31,74,67,0.30);
  user-select: none; pointer-events: none; z-index: 0;
  white-space: pre-wrap; max-width: 280px;
  opacity: 0; transition: opacity 4.5s ease-in-out, transform 4.5s ease-in-out;
}
[data-theme-mode="dark"] .auth-manifesto-phrase { color: rgba(79,216,193,0.24); }

/* ── Auth glass card (frosted) ── */
.auth-glass-card {
  width: min(340px, 90vw);
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 16px; padding: 32px 28px 26px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  position: relative;
  transition: background 0.3s ease, border-color 0.3s ease;
}
[data-theme-mode="dark"] .auth-glass-card {
  background: rgba(15,20,19,0.8);
  border-color: rgba(255,255,255,0.05);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ── Auth typography ── */
.auth-brand {
  font-family: 'Space Grotesk', var(--fontDisplay, sans-serif);
  font-size: 2.5rem; font-weight: 700;
  letter-spacing: 0.4em; text-align: center;
  color: #1f4a43; margin-bottom: 4px;
}
[data-theme-mode="dark"] .auth-brand { color: #4fd8c1; }

.auth-container .auth-title {
  font-family: 'Space Grotesk', var(--fontDisplay, sans-serif);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.25em; text-transform: uppercase;
  text-align: center; color: rgba(6,10,9,0.8);
  line-height: 1.4;
}
[data-theme-mode="dark"] .auth-container .auth-title { color: rgba(225,227,226,0.8); }

.auth-container .auth-subtitle {
  font-family: 'Space Grotesk', var(--fontDisplay, sans-serif);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3em; text-transform: uppercase;
  font-style: italic; text-align: center;
  color: rgba(31,74,67,0.6); margin-top: 10px;
}
[data-theme-mode="dark"] .auth-container .auth-subtitle { color: rgba(79,216,193,0.6); }

/* ── Auth buttons ── */
.auth-container .btn-google {
  width: 100%; padding: 14px 16px;
  background: #fff; color: #060a09;
  font-weight: 700; font-size: 14px;
  border-radius: 9999px; border: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: center; gap: 12px;
  transition: all 0.3s ease;
}
.auth-container .btn-google:hover { transform: scale(1.02); }
[data-theme-mode="dark"] .auth-container .btn-google {
  background: rgba(225,227,226,1); color: #060a09;
}

.auth-container .btn-secondary {
  width: 100%; padding: 14px 16px;
  background: transparent; color: #060a09;
  font-weight: 700; font-size: 14px;
  border-radius: 9999px;
  border: 2px solid rgba(31,74,67,0.2);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.3s ease;
}
.auth-container .btn-secondary:hover { border-color: rgba(31,74,67,0.4); }
[data-theme-mode="dark"] .auth-container .btn-secondary {
  color: rgba(225,227,226,0.9);
  border-color: rgba(79,216,193,0.3);
}
[data-theme-mode="dark"] .auth-container .btn-secondary:hover {
  border-color: rgba(79,216,193,0.5);
}

.auth-pin-trigger {
  width: 100%; padding: 14px 16px;
  background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
  border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.3s ease;
}
.auth-pin-trigger:hover { background: rgba(0,0,0,0.05); }
[data-theme-mode="dark"] .auth-pin-trigger {
  background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.06);
}
[data-theme-mode="dark"] .auth-pin-trigger:hover {
  background: rgba(255,255,255,0.05);
}
.auth-pin-trigger .auth-pin-left {
  display: flex; align-items: center; gap: 12px;
  font-weight: 700; font-size: 14px; color: #060a09;
}
[data-theme-mode="dark"] .auth-pin-trigger .auth-pin-left { color: rgba(225,227,226,0.9); }
.auth-pin-trigger .auth-pin-arrow {
  font-size: 12px; opacity: 0.4;
  transition: transform 0.3s ease;
}
.auth-pin-trigger:hover .auth-pin-arrow { transform: translateX(3px); }

.auth-pin-icon { color: #1f4a43; font-size: 16px; }
[data-theme-mode="dark"] .auth-pin-icon { color: #4fd8c1; }

/* ── Auth divider ── */
.auth-container .auth-divider-line {
  background: rgba(0,0,0,0.1);
}
[data-theme-mode="dark"] .auth-container .auth-divider-line {
  background: rgba(255,255,255,0.1);
}
.auth-container .auth-divider-text {
  font-size: 9px; letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.4);
}
[data-theme-mode="dark"] .auth-container .auth-divider-text {
  color: rgba(255,255,255,0.4);
}

/* ── Decorative dots ── */
.auth-dots {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 24px; opacity: 0.2;
}
.auth-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #060a09;
}
[data-theme-mode="dark"] .auth-dot { background: rgba(225,227,226,0.8); }

/* ── Quote cycler ── */
.auth-quote-wrap {
  position: relative; z-index: 2;
  width: min(340px, 90vw); margin-top: 28px;
  text-align: center; min-height: 50px;
  padding: 8px 24px;
}
.auth-quote-item {
  position: absolute; inset: 0; opacity: 0;
  transition: opacity 0.9s ease;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 0 6px;
}
.auth-quote-item.aq-visible { opacity: 1; }
.aq-text {
  font-style: italic; font-size: 11px; font-weight: 400;
  letter-spacing: 0.04em; color: rgba(6,10,9,0.6);
  line-height: 1.6;
}
[data-theme-mode="dark"] .aq-text { color: rgba(225,227,226,0.6); }
.aq-attr {
  font-size: 9px; color: rgba(6,10,9,0.35);
  letter-spacing: 0.12em; text-transform: uppercase;
}
[data-theme-mode="dark"] .aq-attr { color: rgba(225,227,226,0.35); }

/* ── Auth footer ── */
.auth-footer {
  position: absolute; bottom: 24px; width: 100%; z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.auth-footer-links { display: flex; gap: 24px; }
.auth-footer-link {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(6,10,9,0.4); transition: color 0.3s;
  text-decoration: none; cursor: default;
}
[data-theme-mode="dark"] .auth-footer-link { color: rgba(225,227,226,0.4); }
.auth-footer-copy {
  font-size: 8px; letter-spacing: 0.2em;
  text-transform: uppercase; color: rgba(6,10,9,0.3);
}
[data-theme-mode="dark"] .auth-footer-copy { color: rgba(225,227,226,0.3); }

/* ── Auth input (email, PIN screens) ── */
.auth-container .auth-input {
  background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08);
  color: #060a09;
}
.auth-container .auth-input::placeholder { color: rgba(6,10,9,0.4); }
.auth-container .auth-input:focus { border-color: #1f4a43; box-shadow: 0 0 0 3px rgba(31,74,67,0.08); }
[data-theme-mode="dark"] .auth-container .auth-input {
  background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);
  color: #e1e3e2;
}
[data-theme-mode="dark"] .auth-container .auth-input::placeholder { color: rgba(225,227,226,0.4); }
[data-theme-mode="dark"] .auth-container .auth-input:focus { border-color: #4fd8c1; box-shadow: 0 0 0 3px rgba(79,216,193,0.12); }

/* Auth primary button override */
.auth-container .btn-primary {
  background: #1f4a43; color: #f8f8f8;
  border-radius: 9999px; font-weight: 700;
  transition: all 0.3s ease;
}
.auth-container .btn-primary:hover { background: #174038; }
[data-theme-mode="dark"] .auth-container .btn-primary {
  background: #4fd8c1; color: #060a09;
}
[data-theme-mode="dark"] .auth-container .btn-primary:hover { background: #3bc5af; }

/* Auth toggle override */
.auth-container .auth-toggle span { color: rgba(6,10,9,0.6); }
[data-theme-mode="dark"] .auth-container .auth-toggle span { color: rgba(225,227,226,0.6); }
.auth-container .auth-toggle-track { background: rgba(0,0,0,0.15); }
[data-theme-mode="dark"] .auth-container .auth-toggle-track { background: rgba(255,255,255,0.15); }

/* Auth back/link text */
.auth-container .auth-back-btn {
  color: #1f4a43; font-weight: 600;
}
[data-theme-mode="dark"] .auth-container .auth-back-btn { color: #4fd8c1; }

/* Auth status / info text */
.auth-container .auth-muted { color: rgba(6,10,9,0.5); }
[data-theme-mode="dark"] .auth-container .auth-muted { color: rgba(225,227,226,0.5); }
.auth-container .auth-text { color: #060a09; }
[data-theme-mode="dark"] .auth-container .auth-text { color: #e1e3e2; }

/* Card for auth info boxes */
.auth-container .auth-info-card {
  background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
  border-radius: 12px; padding: 12px 16px;
}
[data-theme-mode="dark"] .auth-container .auth-info-card {
  background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08);
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .auth-perimeter-light::before { animation: none; }
  .auth-manifesto-phrase { transition: none; }
}

/* ── MANROPE TYPOGRAPHY — KNOWLEDGE ENGINE ONLY ──
   "Emphasis through Contrast" — Manrope geometric
   sans-serif applied to knowledge engine surfaces.
   Base text: light weight, soft lavender-tinted.
   Emphasis: extrabold bright white that "pops."
──────────────────────────────────────────────────── */

/* Knowledge Engine typography tokens */
:root {
  --ke-base: rgba(196, 210, 235, 0.85);
  --ke-emphasis: #f8fafc;
}
[data-theme-mode="light"] {
  --ke-base: rgba(71, 85, 105, 0.85);
  --ke-emphasis: #1e293b;
}

/* Apply Manrope to all Knowledge Engine surfaces */
.neg-knowledge-widget,
.sidebar-knowledge,
.neg-knowledge-strip {
  font-family: 'Manrope', var(--fontBody, sans-serif);
}

/* KE base text: Manrope 300, soft lavender-tinted */
.nkw-quote, .nkw-bullet, .nkw-attr,
.sk-quote,
.nks-text {
  font-family: 'Manrope', var(--fontBody, sans-serif);
  font-weight: 300;
  color: var(--ke-base);
}

/* KE emphasis: Manrope 800, bright white */
.nkw-title,
.sk-title,
.nks-text strong {
  font-family: 'Manrope', var(--fontBody, sans-serif);
  font-weight: 800;
  color: var(--ke-emphasis);
}

/* ── MEMBER HUB TAB ──────────────────────────────── */
.hub-hero { margin-bottom: 30px; }

.hub-live-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 100px; padding: 3px 10px;
  font-size: 10px; color: #FCA5A5; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 12px;
}
.hub-blink { width:5px; height:5px; border-radius:50%; background:#EF4444; animation:hubBlink 1.4s ease-in-out infinite; }
@keyframes hubBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hub-headline {
  font-family: var(--fontDisplay, 'Bebas Neue', sans-serif);
  font-size: clamp(26px, 6vw, 56px); line-height: 0.95; margin-bottom: 11px;
}
.hub-headline .hub-hl-accent { color: var(--accent); }

.hub-lead { font-size:14px; color:var(--muted); font-weight:300; line-height:1.65; max-width:540px; }
.hub-lead strong { color:var(--text); font-weight:600; }

.hub-inline-quote {
  border-left: 2px solid var(--accent);
  padding: 11px 15px; margin: 24px 0;
  background: rgba(var(--accentRGB,59,130,246),0.04);
  border-radius: 0 8px 8px 0;
}
.hiq-text { font-style:italic; font-size:13px; font-weight:300; color:rgba(var(--textRGB,249,250,251),0.68); line-height:1.6; }
.hiq-attr { font-size:10px; color:var(--muted); margin-top:5px; letter-spacing:0.06em; text-transform:uppercase; }

.hub-section-hd { display:flex; align-items:center; gap:12px; }
.hub-section-hd-line { flex:1; height:1px; background:var(--border); }
.hub-section-hd-text { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }

/* Life cards — responsive */
.hub-life-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media(max-width:480px) { .hub-life-grid { grid-template-columns: 1fr; } }

.hub-life-card {
  background: var(--surface, rgba(255,255,255,0.04));
  border: 1px solid var(--border); border-radius: 11px; padding: 14px;

  animation: hub-blob-morph 9s ease-in-out infinite; will-change: border-radius;
}

  content:''; position:absolute; top:0; left:0; right:0; height:2px;

.hlc-hlth::before { background:#10B981; }
.hlc-fam::before  { background:#14B8A6; }

.hlc-hd { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
.hlc-ico { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.hlc-fin  .hlc-ico { background:rgba(245,158,11,0.12); }
.hlc-hlth .hlc-ico { background:rgba(16,185,129,0.12); }
.hlc-fam  .hlc-ico { background:rgba(20,184,166,0.12); }
.hlc-ret  .hlc-ico { background:rgba(var(--accentRGB,59,130,246),0.12); }
.hlc-name { font-size:12px; font-weight:700; color:var(--text); }
.hlc-tag  { font-size:11px; color:var(--muted); }
.hlc-body { font-size:12px; color:var(--muted); line-height:1.6; max-height:0; overflow:hidden; opacity:0; transition:max-height 0.4s ease,opacity 0.3s ease; }
.hub-life-card.hlc-open .hlc-body { max-height:240px; opacity:1; }
.hlc-pts { list-style:none; margin-top:7px; }
.hlc-pts li { padding:2px 0 2px 13px; position:relative; font-size:11px; color:var(--muted); }
.hlc-pts li::before { content:'→'; position:absolute; left:0; font-size:10px; }
.hlc-fin  .hlc-pts li::before { color:#F59E0B; }
.hlc-hlth .hlc-pts li::before { color:#10B981; }
.hlc-fam  .hlc-pts li::before { color:#14B8A6; }
.hlc-ret  .hlc-pts li::before { color:var(--accent); }
.hlc-hint { font-size:10px; color:rgba(255,255,255,0.18); margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; transition:color 0.2s; }

.hub-life-card.hlc-open .hlc-hint { opacity:0; }

/* Habit cards — responsive 2-col on mobile */
.hub-habits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 9px;
}

.hhc-hd { display:flex; align-items:flex-start; gap:8px; }
.hhc-ico { font-size:15px; flex-shrink:0; margin-top:1px; }

.hhc-offclk .hhc-rule { color:#F87171; }

/* ── Liquid Blob Morph — member hub cards ─────────────────────────────
   v4.18.2 — applies organic border-radius morph to all three hub card
   families. Uses two keyframe sets (11px base / 10px base) so habit
   cards stay proportional. Pauses on open state to avoid fighting the
   expand transition. Stagger delays prevent all cards morphing in sync.
   transition changed from 'all' → explicit props so animation isn't
   overridden by the transition shorthand on hover.
──────────────────────────────────────────────────────────────────── */
@keyframes hub-blob-morph {
  0%,100% { border-radius: 11px; }
  20%     { border-radius: 18px 11px 15px 9px / 11px 15px 9px 18px; }
  40%     { border-radius: 9px 18px 11px 15px / 15px 9px 18px 11px; }
  60%     { border-radius: 15px 9px 18px 11px / 9px 18px 11px 15px; }
  80%     { border-radius: 11px 15px 9px 18px / 18px 11px 15px 9px; }
}
@keyframes hub-blob-morph-sm {
  0%,100% { border-radius: 10px; }
  20%     { border-radius: 16px 10px 14px 8px / 10px 14px 8px 16px; }
  40%     { border-radius: 8px 16px 10px 14px / 14px 8px 16px 10px; }
  60%     { border-radius: 14px 8px 16px 10px / 8px 16px 10px 14px; }
  80%     { border-radius: 10px 14px 8px 16px / 16px 10px 14px 8px; }
}
/* Stagger — each card starts at a different phase so the grid breathes */
.hub-life-card:nth-child(2)  { animation-delay: -2.5s; }
.hub-life-card:nth-child(3)  { animation-delay: -5s; }
.hub-life-card:nth-child(4)  { animation-delay: -7s; }
.hub-habit-card:nth-child(2) { animation-delay: -1.8s; }
.hub-habit-card:nth-child(3) { animation-delay: -3.6s; }
.hub-habit-card:nth-child(4) { animation-delay: -5.4s; }
.hub-habit-card:nth-child(5) { animation-delay: -7.2s; }
.hub-habit-card:nth-child(6) { animation-delay: -9s; }
.hub-neg-card:nth-child(2)   { animation-delay: -2s; }
.hub-neg-card:nth-child(3)   { animation-delay: -4s; }
.hub-neg-card:nth-child(4)   { animation-delay: -6s; }
/* Pause morph when card is expanded — prevents border-radius fighting expand */
.hub-life-card.hlc-open,
.hub-habit-card.hhc-open,
.hub-neg-card.hnc-open { animation-play-state: paused; }

   v4.18.3 — circular fluid-fill gauge for percentage-based KPI cards

──────────────────────────────────────────────────────────────────────── */
@keyframes merc-fill-rise {

  to   { height: var(--merc-pct, 70%); }
}
@keyframes merc-shimmer {

}
@keyframes merc-surface-wave {

.merc-gauge {
