<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Workload Tracker | SEIU 509 DDS Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --raised: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #4285f4;
      --accent-hover: #5a95f5;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 16px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    .header {
      text-align: center;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header h1 { font-size: 1.4rem; color: var(--text); letter-spacing: -0.3px; }
    .header p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-child { margin-top: 0; }

    input[type="number"] {
      width: 100%;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 9px 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 480px) { .category-grid { grid-template-columns: 1fr; } }

    .category-item {
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      transition: border-color 0.15s;
    }
    .category-item.warn { border-color: var(--warning); }

    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .cat-label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }

    .expand-btn {
      font-size: 0.7rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .expand-btn:hover { background: var(--border); }

    .category-item input[type="number"] {
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      padding: 6px;
    }

    .warn-label {
      font-size: 0.7rem;
      color: var(--warning);
      margin-top: 4px;
      display: none;
    }
    .category-item.warn .warn-label { display: block; }

    /* Sub-category modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 420px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 1rem; margin-bottom: 14px; color: var(--text); }

    .sub-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text);
    }
    .sub-row:last-child { border-bottom: none; }
    .sub-row input { width: 60px; text-align: center; padding: 4px 6px; }

    .modal-total {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      color: var(--accent);
    }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; text-align: center; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Checkboxes */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      margin-top: 0;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Alerts */
    .alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert-error   { background: #2a1215; border: 1px solid var(--danger);  color: var(--danger);  }
    .alert-success { background: #122116; border: 1px solid var(--success); color: var(--success); }
    .alert-warning { background: #2a1f0a; border: 1px solid var(--warning); color: var(--warning); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
    .mt-8 { margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Workload Tracker</h1>
    <p>SEIU 509 DDS &mdash; Weekly caseload entry</p>
  </div>

  <div id="submitAlert" class="alert"></div>

  <!-- Categories -->
  <div class="card">
    <h2>This Week's Caseload</h2>
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <!-- Checkboxes -->
  <div class="card">
    <h2>Status</h2>
    <label class="checkbox-row">
      <input type="checkbox" id="onPlan" onchange="checkWarnings()">
      Currently on Performance Plan
    </label>
    <label class="checkbox-row" style="margin-top:4px">
      <input type="checkbox" id="overtimeEnabled" onchange="toggleOvertime(); checkWarnings()">
      Tracking Overtime This Week
    </label>
    <div id="overtimeRow" class="hidden" style="margin-top:10px">
      <label for="overtimeHours">Overtime Hours</label>
      <input type="number" id="overtimeHours" min="0" max="99" placeholder="hours" oninput="checkWarnings()">
    </div>
  </div>

  <!-- Warnings -->
  <div id="warningsCard" class="hidden">
    <div id="warningsList" class="alert alert-warning show"></div>
  </div>

  <button class="btn btn-primary" onclick="submitWorkload()" id="submitBtn">Submit Workload Data</button>

</div>

<!-- Sub-category modal -->
<div class="modal-overlay" id="subModal">
  <div class="modal">
    <h3 id="modalTitle">Sub-categories</h3>
    <div id="modalBody"></div>
    <div class="modal-total">
      <span>Total</span>
      <span id="modalTotal">0</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="applySubModal()">Apply</button>
      <button class="btn btn-ghost" onclick="closeSubModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  // -- Category definitions -------------------------------------------------
  var CATEGORIES = [
    { key: 'priority',   label: 'Priority Cases',      icon: '🔴', t: 't1', warnAt: 50  },
    { key: 'pending',    label: 'Pending Cases',        icon: '🟡', t: 't2', warnAt: 100 },
    { key: 'unread',     label: 'Unread Documents',     icon: '📄', t: 't3', warnAt: 200 },
    { key: 'todo',       label: 'To-Do Items',          icon: '✅', t: 't4', warnAt: 150 },
    { key: 'referrals',  label: 'Sent Referrals',       icon: '📤', t: 't5', warnAt: 50  },
    { key: 'ce',         label: 'CE Activities',        icon: '📚', t: 't6', warnAt: 50  },
    { key: 'assistance', label: 'Assistance Requests',  icon: '🤝', t: 't7', warnAt: 50  },
    { key: 'aged',       label: 'Aged Cases',           icon: '⏳', t: 't8', warnAt: 30  }
  ];

  var SUB_CATS = {
    priority:   ['QDD','CAL','TERI','Aged Case','Congressional','Dire Need','Homeless',
                 'Presumptive Disability','COBRA','DDS Aged','SOAR Involvement',
                 'MC/WW','100% P&T','Public Inquiry','DDS Important (High)','DDS Important (Medium)'],
    pending:    ['New Cases','Immediate Action','No Activity 15+ Days',
                 'No Activity 30+ Days','Internal QA Returns','Federal QA Returns','Approval Returns'],
    unread:     ['All Unread Documents','MER','CE Reports','Trailer Mail'],
    todo:       ['Follow-Ups Due','Unread Case Notes','Delivery Failures','Updates'],
    referrals:  ['MC/PC','General'],
    ce:         ['All CE Activities','Scheduled','Not Kept','Under Review'],
    assistance: ['Outbound'],
    aged:       ['60-89 Days','90-119 Days','120-179 Days','180+ Days']
  };

  // -- State ----------------------------------------------------------------
  var subData = {};
  var activeModalCatIdx = -1;

  // -- Category grid --------------------------------------------------------
  function buildCategoryGrid() {
    var grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    CATEGORIES.forEach(function(cat, idx) {
      var item = document.createElement('div');
      item.className = 'category-item';
      item.id = 'cat-item-' + idx;
      item.innerHTML =
        '<div class="cat-header">' +
          '<span class="cat-label">' + cat.icon + ' ' + cat.label + '</span>' +
          '<button class="expand-btn" onclick="openSubModal(' + idx + ')">+ detail</button>' +
        '</div>' +
        '<input type="number" id="' + cat.t + '" min="0" max="999" value="0" oninput="checkWarnings()">' +
        '<div class="warn-label" id="warn-' + idx + '">High — review with steward</div>';
      grid.appendChild(item);
    });
  }

  // -- Warnings ------------------------------------------------------------
  function checkWarnings() {
    var msgs = [];

    CATEGORIES.forEach(function(cat, idx) {
      var val = parseInt(document.getElementById(cat.t).value, 10) || 0;
      var item = document.getElementById('cat-item-' + idx);
      if (val > cat.warnAt) {
        item.classList.add('warn');
        msgs.push(cat.icon + ' ' + cat.label + ': ' + val + ' (flag threshold: ' + cat.warnAt + ')');
      } else {
        item.classList.remove('warn');
      }
    });

    if (document.getElementById('onPlan').checked) {
      msgs.push('📋 Performance Plan active — document all caseload decisions this week');
    }

    var otEnabled = document.getElementById('overtimeEnabled').checked;
    var otHours   = parseInt(document.getElementById('overtimeHours').value, 10) || 0;
    if (otEnabled && otHours > 20) {
      msgs.push('⏱️ Overtime ' + otHours + 'h exceeds 20h — consider filing a grievance');
    }

    var card = document.getElementById('warningsCard');
    var list = document.getElementById('warningsList');
    if (msgs.length) {
      list.innerHTML = '<strong>⚠️ Flags this week:</strong><br>' + msgs.join('<br>');
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  }

  // -- Overtime toggle ------------------------------------------------------
  function toggleOvertime() {
    var checked = document.getElementById('overtimeEnabled').checked;
    document.getElementById('overtimeRow').classList.toggle('hidden', !checked);
    if (!checked) { document.getElementById('overtimeHours').value = ''; }
  }

  // -- Sub-category modal ---------------------------------------------------
  function openSubModal(catIdx) {
    activeModalCatIdx = catIdx;
    var cat      = CATEGORIES[catIdx];
    var subs     = SUB_CATS[cat.key] || [];
    var existing = subData[cat.key] || {};

    document.getElementById('modalTitle').textContent = cat.icon + ' ' + cat.label + ' — Sub-categories';
    var body = document.getElementById('modalBody');
    body.innerHTML = '';
    subs.forEach(function(name, si) {
      var val = existing[name] || 0;
      var row = document.createElement('div');
      row.className = 'sub-row';
      row.innerHTML =
        '<span>' + name + '</span>' +
        '<input type="number" id="sub_' + (catIdx+1) + '_' + si + '" min="0" max="999" value="' + val + '" ' +
          'onchange="updateModalTotal()" oninput="updateModalTotal()">';
      body.appendChild(row);
    });
    updateModalTotal();
    document.getElementById('subModal').classList.add('active');
  }

  function updateModalTotal() {
    var cat   = CATEGORIES[activeModalCatIdx];
    var subs  = SUB_CATS[cat.key] || [];
    var total = 0;
    subs.forEach(function(name, si) {
      var el = document.getElementById('sub_' + (activeModalCatIdx+1) + '_' + si);
      if (el) total += parseInt(el.value, 10) || 0;
    });
    document.getElementById('modalTotal').textContent = total;
  }

  function applySubModal() {
    var cat   = CATEGORIES[activeModalCatIdx];
    var subs  = SUB_CATS[cat.key] || [];
    var total = 0;
    subData[cat.key] = {};
    subs.forEach(function(name, si) {
      var el  = document.getElementById('sub_' + (activeModalCatIdx+1) + '_' + si);
      var val = el ? (parseInt(el.value, 10) || 0) : 0;
      if (val > 0) { subData[cat.key][name] = val; }
      total += val;
    });
    var mainInput = document.getElementById(cat.t);
    if (mainInput && total > 0) { mainInput.value = total; }
    closeSubModal();
    checkWarnings();
  }

  function closeSubModal() {
    document.getElementById('subModal').classList.remove('active');
    activeModalCatIdx = -1;
  }

  // -- Submit ---------------------------------------------------------------
  function submitWorkload() {
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Submitting...';

    var formObj = {
      on_plan:          document.getElementById('onPlan').checked,
      overtime_enabled: document.getElementById('overtimeEnabled').checked,
      overtime_hours:   document.getElementById('overtimeHours').value || 0
    };

    CATEGORIES.forEach(function(cat) {
      formObj[cat.t] = parseInt(document.getElementById(cat.t).value, 10) || 0;
    });

    CATEGORIES.forEach(function(cat, catIdx) {
      var subs = SUB_CATS[cat.key] || [];
      subs.forEach(function(name, si) {
        var el = document.getElementById('sub_' + (catIdx+1) + '_' + si);
        formObj['sub_' + (catIdx+1) + '_' + si] = el ? (parseInt(el.value, 10) || 0) : 0;
      });
    });

    google.script.run
      .withSuccessHandler(function(msg) {
        btn.disabled = false;
        btn.textContent = 'Submit Workload Data';
        showAlert('submitAlert', msg && msg.indexOf('Success') === 0 ? 'success' : 'error',
          msg || 'Submission failed.');
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = 'Submit Workload Data';
        showAlert('submitAlert', 'error', err.message || 'Submission failed.');
      })
      .processWorkloadForm(formObj);
  }

  // -- Alert helper ---------------------------------------------------------
  function showAlert(id, type, msg) {
    var el = document.getElementById(id);
    el.className = 'alert alert-' + type + ' show';
    el.textContent = msg;
    if (type === 'success') {
      setTimeout(function() { el.className = 'alert'; }, 4000);
    }
  }

  // -- Init -----------------------------------------------------------------
  buildCategoryGrid();
</script>
</body>
</html>
