// WEEKLY QUESTIONS (member side)
// ═══════════════════════════════════════

function renderWeeklyQuestionsPage(appContainer, role) {
  var isMember = role === 'member';
  renderPageLayout(appContainer, role, 'weeklyq', function(container) {
    if (isMember) _memberHeader(container, 'Weekly Questions');
    else container.appendChild(el('div', { className: 'page-header' }, el('div', { className: 'page-title' }, 'Weekly Questions')));

    var content = el('div', { className: 'content' });

    // Sub-tabs: This Week | Past Questions | Suggest
    var activeSubTab = 'current';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      var tabs = [{ id: 'current', label: 'This Week' }, { id: 'past', label: 'Past Questions' }, { id: 'suggest', label: 'Suggest' }];
      tabs.forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; refreshSubTabs(); renderWQSubContent(); }
        }, tab.label));
      });
    }

    function renderWQSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'suggest') { _renderQuestionSubmission(subContent); return; }
      if (activeSubTab === 'past') { _renderPastQuestions(subContent); return; }
      _renderCurrentQuestions(subContent);
    }

    function _renderCurrentQuestions(target) {
      showLoading(target);
      google.script.run.withSuccessHandler(function(data) {
        target.innerHTML = '';
        if (!data || !data.questions || data.questions.length === 0) {
          target.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No questions this week.'));
          return;
        }

        // Survey anonymity badge
        target.appendChild(el('div', { className: 'privacy-badge', style: { marginBottom: '14px' } }, '\uD83D\uDD12 Your responses are fully anonymous via one-way encryption'));

        data.questions.forEach(function(q) {
          var qCard = el('div', { className: 'wq-card' });
          qCard.appendChild(el('div', { className: 'wq-question' }, q.text));

          if (q.hasResponded) {
            _renderQuestionResults(qCard, q);
          } else {
            var options = ['Strongly Agree', 'Agree', 'Neutral', 'Disagree', 'Strongly Disagree'];
            options.forEach(function(opt) {
              var optEl = el('div', { className: 'wq-option', onClick: function() {
                google.script.run.withSuccessHandler(function(result) {
                  if (result && result.success) {
                    q.hasResponded = true;
                    q.stats = result.stats;
                    qCard.innerHTML = '';
                    qCard.appendChild(el('div', { className: 'wq-question' }, q.text));
                    _renderQuestionResults(qCard, q);
                  }
                }).wqSubmitResponse(CURRENT_USER.email, q.id, opt);
              }}, opt);
              qCard.appendChild(optEl);
            });
          }
          target.appendChild(qCard);
        });
      }).withFailureHandler(function() {
        target.innerHTML = '';
        target.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load questions.'));
      }).wqGetActiveQuestions(CURRENT_USER.email);
    }

    function _renderPastQuestions(target) {
      showLoading(target);
      var page = 1;
      function loadPage(p) {
        showLoading(target);
        google.script.run.withSuccessHandler(function(data) {
          target.innerHTML = '';
          if (!data || !data.questions || data.questions.length === 0) {
            target.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, p > 1 ? 'No more past questions.' : 'No past questions available.'));
            return;
          }
          data.questions.forEach(function(q) {
            var card = el('div', { className: 'wq-card' });
            card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Week of ' + q.weekStr));
            card.appendChild(el('div', { className: 'wq-question' }, q.text));
            if (q.stats && q.stats.total > 0) _renderQuestionResults(card, q);
            else card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)' } }, 'No responses'));
            target.appendChild(card);
          });
          // Pagination
          if (data.hasMore || p > 1) {
            var nav = el('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '14px' } });
            if (p > 1) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { page = p - 1; loadPage(page); } }, '\u2190 Previous'));
            if (data.hasMore) nav.appendChild(el('button', { className: 'btn btn-secondary', style: { width: 'auto', fontSize: '12px', padding: '8px 16px' }, onClick: function() { page = p + 1; loadPage(page); } }, 'Next \u2192'));
            target.appendChild(nav);
          }
        }).wqGetHistory(CURRENT_USER.email, p, 10);
      }
      loadPage(page);
    }

    refreshSubTabs();
    renderWQSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

function _renderQuestionResults(container, q) {
  var stats = q.stats || {};
  var total = stats.total || 0;
  var options = ['Strongly Agree', 'Agree', 'Neutral', 'Disagree', 'Strongly Disagree'];

  if (typeof ChartHelper !== 'undefined' && total > 0) {
    var labels = [];
    var data = [];
    var colors = ['#4ade80', '#60a5fa', '#a78bfa', '#facc15', '#ef4444'];
    options.forEach(function(opt, i) {
      labels.push(opt);
      data.push((stats.counts && stats.counts[opt]) || 0);
    });
    var chartId = 'wq-results-' + (q.id || Math.random().toString(36).substr(2, 6));
    ChartHelper.createHorizontalBarChart(container, chartId, labels, data, colors);
  } else {
    options.forEach(function(opt) {
      var count = (stats.counts && stats.counts[opt]) || 0;
      var pct = total > 0 ? Math.round((count / total) * 100) : 0;
      var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' } });
      row.appendChild(el('div', { style: { width: '110px', fontSize: '11px', color: 'var(--muted)', textAlign: 'right', flexShrink: '0' } }, opt));
      var bar = el('div', { className: 'wq-results-bar' });
      bar.appendChild(el('div', { className: 'wq-results-fill', style: { width: pct + '%' } }));
      row.appendChild(bar);
      row.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text)', fontWeight: '600', width: '40px' } }, pct + '%'));
      container.appendChild(row);
    });
  }
  container.appendChild(el('div', { className: 'wq-stats' }, total + ' responses'));
}

        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)' } }, ev.title));
        var startDate = new Date(ev.startTime);
        var endDate = new Date(ev.endTime);
        var dateStr = startDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        var timeStr = startDate.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) + ' - ' + endDate.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--accent)', marginTop: '6px', fontWeight: '600' } }, dateStr));
        card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)' } }, timeStr));
        if (ev.location) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '4px' } }, '\uD83D\uDCCD ' + ev.location));
        if (ev.description) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '6px', lineHeight: '1.5' } }, ev.description));
        // Add to Calendar
        var calUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
          '&text=' + encodeURIComponent(ev.title) +
          '&dates=' + ev.startTime.replace(/[-:]/g, '').replace('.000Z', 'Z') + '/' + ev.endTime.replace(/[-:]/g, '').replace('.000Z', 'Z') +
          (ev.location ? '&location=' + encodeURIComponent(ev.location) : '');
        card.appendChild(el('a', {
          href: calUrl, target: '_blank',
          style: { display: 'inline-block', fontSize: '12px', color: 'var(--accent)', fontWeight: '600', marginTop: '8px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)' }
        }, '\uD83D\uDCC5 Add to My Calendar'));
        content.appendChild(card);
      });
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load events.'));
    }).dataGetUpcomingEvents(20);
  });
}

function renderUnionStatsPage(appContainer) {

function _renderGrievanceStats(container) {
  showLoading(container);
  google.script.run.withSuccessHandler(function(data) {
    container.innerHTML = '';
    if (!data || !data.available) {
      var msg = data && data.threshold ? 'Need ' + data.threshold + '+ grievances for anonymized stats (' + (data.count || 0) + ' current).' : 'Grievance stats unavailable.';
      container.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, msg));
      return;
    }

    container.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '14px' } }, data.total + ' total grievances'));
    container.appendChild(el('div', { className: 'privacy-badge', style: { marginBottom: '14px' } }, '\uD83D\uDD12 Anonymized aggregate data only'));

    if (typeof ChartHelper !== 'undefined') {
      // Status doughnut
      var statusLabels = Object.keys(data.byStatus);
      var statusData = statusLabels.map(function(k) { return data.byStatus[k]; });
      var statusCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
      statusCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Status'));
      ChartHelper.createDoughnutChart(statusCard, 'griev-status-chart', statusLabels, statusData);
      container.appendChild(statusCard);

      // Step bar
      var stepLabels = Object.keys(data.byStep);
      var stepData = stepLabels.map(function(k) { return data.byStep[k]; });
      var stepCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
      stepCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Step'));
      ChartHelper.createBarChart(stepCard, 'griev-step-chart', stepLabels, [{ label: 'Count', data: stepData }]);
      container.appendChild(stepCard);

      // Category distribution
      if (data.byCategory) {
        var catLabels = Object.keys(data.byCategory);
        var catData = catLabels.map(function(k) { return data.byCategory[k]; });
        if (catLabels.length > 0) {
          var catCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
          catCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'By Category'));
          ChartHelper.createHorizontalBarChart(catCard, 'griev-cat-chart', catLabels, catData);
          container.appendChild(catCard);
        }
      }

      // Monthly trend
      if (data.monthly && data.monthly.length > 1) {
        var monthLabels = data.monthly.map(function(m) { return m.month; });
        var monthData = data.monthly.map(function(m) { return m.count; });
        var monthCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
        monthCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Monthly Trend'));
        ChartHelper.createLineChart(monthCard, 'griev-trend-chart', monthLabels, [{ label: 'Filed', data: monthData }]);
        container.appendChild(monthCard);
      }
    }
  }).dataGetGrievanceStats();
}

function renderStewardDirectory(appContainer) {
  renderPageLayout(appContainer, 'member', 'stewarddirectory', function(container) {
    _memberHeader(container, CONFIG.stewardLabel + ' Directory');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(stewards) {
      content.innerHTML = '';
      if (!stewards || stewards.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's found.'));
        return;
      }

      var searchInput = el('input', { className: 'search-input', placeholder: 'Search by name or location...', onInput: function() { renderList(searchInput.value.toLowerCase()); } });
      content.appendChild(searchInput);
      var listArea = el('div');
      content.appendChild(listArea);

      function renderList(query) {
        listArea.innerHTML = '';
        var filtered = query ? stewards.filter(function(s) {
          return (s.name || '').toLowerCase().indexOf(query) !== -1 || (s.workLocation || '').toLowerCase().indexOf(query) !== -1;
        }) : stewards;
        filtered.forEach(function(s, i) {
          var card = el('div', { className: 'card card-glass card-fade-in', style: { padding: '14px 16px', marginBottom: '6px', animationDelay: (i * 0.05) + 's' } });
          var topRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px' } });
          topRow.appendChild(el('div', { className: 'member-list-avatar' }, (s.name || 'S').charAt(0).toUpperCase()));
          var info = el('div', { style: { flex: '1' } });
          info.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, s.name || s.email));
          var meta = [];
          if (s.workLocation) meta.push(s.workLocation);
          if (s.officeDays) meta.push(s.officeDays);
          if (s.unit) meta.push(s.unit);
          info.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, meta.join(' \u00B7 ')));
          topRow.appendChild(info);
          card.appendChild(topRow);

          // Contact details (expandable)
          var details = el('div', { style: { display: 'none', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--border)' } });
          if (s.email) details.appendChild(el('a', { href: 'mailto:' + s.email, style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginBottom: '4px' } }, '\u2709\uFE0F ' + s.email));
          if (s.phone) details.appendChild(el('a', { href: 'tel:' + s.phone, style: { display: 'block', fontSize: '12px', color: 'var(--success)', marginBottom: '4px' } }, '\uD83D\uDCDE ' + s.phone));
          details.appendChild(el('button', {
            style: { fontSize: '11px', padding: '6px 14px', borderRadius: '8px', background: 'var(--accent)', color: '#fff', fontWeight: '600', marginTop: '6px' },
            onClick: function(e) {
              e.stopPropagation();
              google.script.run.withSuccessHandler(function(result) {
                if (result && result.success) renderStewardContact(document.getElementById('app'));
              }).dataAssignSteward(CURRENT_USER.email, s.email);
            }
          }, 'Select as my ' + CONFIG.stewardLabel));
          card.appendChild(details);

          card.addEventListener('click', function() {
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
          });
          card.style.cursor = 'pointer';
          listArea.appendChild(card);
        });
      }
      renderList('');
    }).dataGetStewardDirectory();
  });
}

function _renderMemberCaseChecklist(container, caseId) {
  var section = el('div', { style: { padding: '0 16px 12px' } });
  section.appendChild(el('h3', { className: 'section-title' }, 'Case Checklist'));
  var checklistContent = el('div');
  showLoading(checklistContent);
  section.appendChild(checklistContent);
  container.appendChild(section);

  google.script.run.withSuccessHandler(function(items) {
    checklistContent.innerHTML = '';
    if (!items || items.length === 0) {
      checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', padding: '8px 0' } }, 'No checklist items for this case.'));
      return;
    }

    // Progress bar
    var completed = items.filter(function(i) { return i.completed; }).length;
    var pct = Math.round((completed / items.length) * 100);
    var progRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } });
    var progBar = el('div', { style: { flex: '1', height: '8px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden' } });
    progBar.appendChild(el('div', { style: { height: '100%', width: pct + '%', background: pct === 100 ? 'var(--success)' : 'var(--accent)', borderRadius: '4px' } }));
    progRow.appendChild(progBar);
    progRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', whiteSpace: 'nowrap' } }, completed + '/' + items.length + ' (' + pct + '%)'));
    checklistContent.appendChild(progRow);

    // Group by category
    var grouped = {};
    items.forEach(function(item) {
      var cat = item.category || 'General';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(item);
    });

    Object.keys(grouped).forEach(function(cat) {
      checklistContent.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.5px', margin: '10px 0 4px', fontWeight: '600' } }, cat));
      grouped[cat].forEach(function(item) {
        var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', padding: '5px 0' } });
        row.appendChild(el('span', { style: { fontSize: '16px', color: item.completed ? 'var(--success)' : 'var(--muted)' } }, item.completed ? '\u2611' : '\u2610'));
        row.appendChild(el('span', { style: { fontSize: '12px', color: item.completed ? 'var(--muted)' : 'var(--text)', textDecoration: item.completed ? 'line-through' : 'none', flex: '1' } }, item.itemText));
        if (item.required) row.appendChild(el('span', { style: { fontSize: '9px', color: 'var(--danger)', fontWeight: '600' } }, 'REQ'));
        checklistContent.appendChild(row);
      });
    });
  }).withFailureHandler(function() {
    checklistContent.innerHTML = '';
    checklistContent.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--danger)', padding: '8px 0' } }, 'Failed to load checklist.'));
  }).dataGetCaseChecklist(caseId);
}

        var hasExpand = m.notesUrl || m.agendaUrl || m.minutesTitle || m.minutesBullets;
        if (hasExpand) {
          var expandDiv = el('div', { style: { display: 'none', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' } });
          if (m.minutesTitle) {
            expandDiv.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, m.minutesTitle));
          }
          if (m.minutesBullets) {
            var bullets = m.minutesBullets.split('\n');
            bullets.forEach(function(b) {
              if (b.trim()) expandDiv.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', paddingLeft: '8px', marginBottom: '2px' } }, '\u2022 ' + b.trim()));
            });
          }
          if (m.notesUrl) expandDiv.appendChild(el('a', { href: m.notesUrl, target: '_blank', style: { display: 'block', fontSize: '12px', color: 'var(--accent)', marginTop: '6px', marginBottom: '4px' } }, 'View Notes'));
          if (m.agendaUrl) expandDiv.appendChild(el('a', { href: m.agendaUrl, target: '_blank', style: { display: 'block', fontSize: '12px', color: 'var(--accent)' } }, 'View Agenda'));
          card.appendChild(expandDiv);
          card.addEventListener('click', function() {
            expandDiv.style.display = expandDiv.style.display === 'none' ? 'block' : 'none';
          });
        }

        content.appendChild(card);
      });
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load meetings.'));
    }).dataGetMemberMeetings(CURRENT_USER.email);
  });
}

// ═══════════════════════════════════════
// POLLS PAGE (member, v4.16.0)
// ═══════════════════════════════════════

function renderPollsPage(appContainer) {
  renderPageLayout(appContainer, 'member', 'polls', function(container) {
    _memberHeader(container, 'Polls', 'Vote on active polls');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    function loadPolls() {
      showLoading(content);
      google.script.run.withSuccessHandler(function(polls) {
        content.innerHTML = '';
        if (!polls || polls.length === 0) {
          content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No active polls right now.'));
          return;
        }

        polls.forEach(function(poll) {
          var card = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
          card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, poll.question));

          if (poll.hasVoted) {
            // Show results
            card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--success)', marginBottom: '8px', fontWeight: '600' } }, 'You voted: ' + poll.myVote));
            poll.options.forEach(function(opt) {
              var count = poll.results[opt] || 0;
              var pct = poll.totalVotes > 0 ? Math.round((count / poll.totalVotes) * 100) : 0;
              var isMyVote = opt === poll.myVote;
              var row = el('div', { style: { marginBottom: '6px' } });
              var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '2px' } });
              header.appendChild(el('span', { style: { color: 'var(--text)', fontWeight: isMyVote ? '600' : '400' } }, opt));
              header.appendChild(el('span', { style: { color: 'var(--muted)' } }, count + ' (' + pct + '%)'));
              row.appendChild(header);
              var bar = el('div', { style: { height: '8px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden' } });
              bar.appendChild(el('div', { style: { height: '100%', width: pct + '%', background: isMyVote ? 'var(--accent)' : 'var(--info)', borderRadius: '4px', transition: 'width 0.6s ease' } }));
              row.appendChild(bar);
              card.appendChild(row);
            });
            card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '6px' } }, poll.totalVotes + ' total vote' + (poll.totalVotes !== 1 ? 's' : '')));
          } else {
            // Show vote buttons
            poll.options.forEach(function(opt) {
              var btn = el('button', { className: 'btn', style: { display: 'block', width: '100%', marginBottom: '6px', textAlign: 'left', padding: '10px 14px', fontSize: '13px' },
                onClick: function() {
                  btn.textContent = 'Voting...'; btn.disabled = true;
                  google.script.run.withSuccessHandler(function(result) {
                    if (result && result.success) loadPolls();
                    else { btn.textContent = opt; btn.disabled = false; }
                  }).withFailureHandler(function() {
                    btn.textContent = opt; btn.disabled = false;
                  }).dataSubmitPollVote(CURRENT_USER.email, poll.id, opt);
                }
              }, opt);
              card.appendChild(btn);
            });
          }
          content.appendChild(card);
        });
      }).withFailureHandler(function() {
        content.innerHTML = '';
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load polls.'));
      }).dataGetActivePolls(CURRENT_USER.email);
    }

    loadPolls();
  });
}

// ═══════════════════════════════════════
// MINUTES PAGE (member, v4.16.0)
// ═══════════════════════════════════════

function renderMinutesPage(appContainer) {
  renderPageLayout(appContainer, 'member', 'minutes', function(container) {
    _memberHeader(container, 'Meeting Minutes', 'Notes from recent meetings');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(minutes) {
      content.innerHTML = '';
      if (!minutes || minutes.length === 0) {
        content.appendChild(el('div', { style: { textAlign: 'center', padding: '40px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No meeting minutes posted yet.'));
        return;
      }

      // Search filter
      var filterInput = el('input', { type: 'text', className: 'msg-textarea', placeholder: 'Search minutes...', style: { marginBottom: '10px', minHeight: '36px' } });
      content.appendChild(filterInput);

      var listArea = el('div');
      content.appendChild(listArea);

      function renderFiltered(query) {
        listArea.innerHTML = '';
        var q = (query || '').toLowerCase();
        var filtered = minutes.filter(function(m) {
          if (!q) return true;
          return (m.title || '').toLowerCase().indexOf(q) !== -1 || (m.meetingDate || '').toLowerCase().indexOf(q) !== -1 || (m.bullets || '').toLowerCase().indexOf(q) !== -1;
        });

        if (filtered.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No matching minutes.'));
          return;
        }

        filtered.forEach(function(m) {
          var card = el('div', { className: 'card card-glass card-clickable', style: { padding: '14px', marginBottom: '8px' } });
          var header = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '6px' } });
          header.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, m.title));
          header.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)' } }, m.meetingDate));
          card.appendChild(header);
          if (m.bullets) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', lineHeight: '1.5', whiteSpace: 'pre-wrap' } }, m.bullets));

          if (m.fullMinutes) {
            var fullDiv = el('div', { style: { display: 'none', fontSize: '12px', color: 'var(--text)', lineHeight: '1.5', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap' } }, m.fullMinutes);
            card.appendChild(fullDiv);
            card.addEventListener('click', function() {
              fullDiv.style.display = fullDiv.style.display === 'none' ? 'block' : 'none';
            });
          }

          listArea.appendChild(card);
        });
      }

      filterInput.addEventListener('input', function() { renderFiltered(filterInput.value); });
      renderFiltered('');
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load minutes.'));
    }).dataGetMeetingMinutes(20);
  });
}

// ═══════════════════════════════════════
// MY TASKS PAGE (v4.17.0 — member task assignment)
// ═══════════════════════════════════════

function renderMemberTasks(appContainer) {
  renderPageLayout(appContainer, 'member', 'mytasks', function(container) {
    _memberHeader(container, 'My Tasks', 'Tasks assigned to you');
    var content = el('div', { className: 'content' });

    var activeSubTab = 'open';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      [{ id: 'open', label: 'Open' }, { id: 'completed', label: 'Completed' }].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; refreshSubTabs(); renderSubContent(); }
        }, tab.label));
      });
    }

    function renderSubContent() {
      subContent.innerHTML = '';
      showLoading(subContent);
      var statusFilter = activeSubTab === 'completed' ? 'completed' : null;
      google.script.run.withSuccessHandler(function(tasks) {
        subContent.innerHTML = '';
        var filtered = statusFilter ? tasks.filter(function(t) { return t.status === 'completed'; }) : tasks.filter(function(t) { return t.status !== 'completed'; });

        if (filtered.length === 0) {
          subContent.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, statusFilter === 'completed' ? 'No completed tasks.' : 'No open tasks assigned to you.'));
          return;
        }

        // KPI strip
        var highPri = filtered.filter(function(t) { return t.priority === 'high'; }).length;
        var overdue = filtered.filter(function(t) { return t.dueDays !== null && t.dueDays < 0; }).length;
        var kpiStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)', marginBottom: '10px' } });
        [
          { label: 'Total', value: filtered.length },
          { label: 'High Priority', value: highPri, color: highPri > 0 ? 'var(--danger)' : null },
          { label: 'Overdue', value: overdue, color: overdue > 0 ? 'var(--warning)' : null }
        ].forEach(function(kpi) {
          var card = el('div', { className: 'kpi-card' });
          card.appendChild(el('div', { className: 'kpi-label' }, kpi.label));
          var val = el('div', { className: 'kpi-value' }, String(kpi.value));
          if (kpi.color) val.style.color = kpi.color;
          card.appendChild(val);
          kpiStrip.appendChild(card);
        });
        subContent.appendChild(kpiStrip);

        filtered.forEach(function(task) {
          var priColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--muted)' };
          var card = el('div', { className: 'card card-accent-border', style: { padding: '12px 16px', marginBottom: '6px', borderLeftColor: priColors[task.priority] || 'var(--accent)' } });
          var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
          top.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, task.title));
          if (task.dueDate) top.appendChild(el('span', { style: { fontSize: '10px', color: task.dueDays !== null && task.dueDays < 0 ? 'var(--danger)' : 'var(--muted)' } }, task.dueDate));
          card.appendChild(top);
          if (task.assignedBy) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, 'Assigned by: ' + task.assignedBy.split('@')[0]));
          if (task.description) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '4px' } }, task.description.substring(0, 100)));

          if (task.status !== 'completed') {
            var actions = el('div', { style: { display: 'flex', gap: '6px', marginTop: '8px' } });
            actions.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
              onClick: function() {
                google.script.run.withSuccessHandler(function() { renderMemberTasks(document.getElementById('app')); }).dataCompleteMemberTask(CURRENT_USER.email, task.id);
              }
            }, '\u2705 Complete'));
            card.appendChild(actions);
          }
          subContent.appendChild(card);
        });
      }).withFailureHandler(function() {
        subContent.innerHTML = '';
        subContent.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load tasks.'));
      }).dataGetMemberTasks(CURRENT_USER.email, statusFilter);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// Q&A FORUM PAGE (v4.17.0 — shared by both roles)
// ═══════════════════════════════════════

function renderQAForum(appContainer, role) {
  var isMember = role === 'member';
  var isSteward = role === 'steward';
  renderPageLayout(appContainer, role, 'qaforum', function(container) {
    if (isMember) _memberHeader(container, 'Q&A Forum', 'Ask questions, get answers');
    else container.appendChild(el('div', { className: 'page-header' }, el('div', { className: 'page-title' }, 'Q&A Forum')));

    var content = el('div', { className: 'content' });

    var activeSubTab = 'browse';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');
    var currentPage = 1;
    var currentSort = 'recent';

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      var tabs = [{ id: 'browse', label: 'Browse' }, { id: 'ask', label: 'Ask' }];
      if (isSteward) tabs.push({ id: 'moderate', label: 'Moderate' });
      tabs.forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; currentPage = 1; refreshSubTabs(); renderQASubContent(); }
        }, tab.label));
      });
    }

    function renderQASubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'ask') { _renderAskForm(subContent); return; }
      if (activeSubTab === 'moderate') { _renderModQueue(subContent); return; }
      _renderQABrowse(subContent);
    }

    function _renderQABrowse(cont) {
      // Sort toggle
      var sortBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px' } });
      ['recent', 'popular'].forEach(function(s) {
        sortBar.appendChild(el('button', {
          className: 'sub-tab' + (currentSort === s ? ' active' : ''),
          style: { fontSize: '11px', padding: '4px 12px' },
          onClick: function() { currentSort = s; currentPage = 1; _renderQABrowse(cont); }
        }, s.charAt(0).toUpperCase() + s.slice(1)));
      });
      cont.innerHTML = '';
      cont.appendChild(sortBar);

      var listArea = el('div');
      cont.appendChild(listArea);
      showLoading(listArea);

      google.script.run.withSuccessHandler(function(result) {
        listArea.innerHTML = '';
        if (!result || !result.questions || result.questions.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No questions yet. Be the first to ask!'));
          return;
        }
        result.questions.forEach(function(q) {
          var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '8px', cursor: 'pointer' } });
          card.addEventListener('click', function() { _renderQuestionDetail(cont, q.id); });
          var top = el('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '4px' } });
          top.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', flex: '1' } }, q.questionText.substring(0, 120) + (q.questionText.length > 120 ? '...' : '')));
          card.appendChild(top);

          var meta = el('div', { style: { display: 'flex', gap: '12px', fontSize: '11px', color: 'var(--muted)', alignItems: 'center' } });
          if (q.isAnonymous) meta.appendChild(el('span', { className: 'privacy-badge', style: { fontSize: '10px', padding: '1px 6px' } }, 'Anonymous'));
          else meta.appendChild(el('span', {}, q.authorName));
          meta.appendChild(el('span', {}, q.created));
          meta.appendChild(el('span', {}, '\u25B2 ' + q.upvoteCount));
          meta.appendChild(el('span', {}, q.answerCount + ' answer' + (q.answerCount !== 1 ? 's' : '')));
          card.appendChild(meta);
          listArea.appendChild(card);
        });

        // Pagination
        if (result.total > result.pageSize) {
          var totalPages = Math.ceil(result.total / result.pageSize);
          var pageBar = el('div', { style: { display: 'flex', justifyContent: 'center', gap: '8px', marginTop: '12px' } });
          if (currentPage > 1) pageBar.appendChild(el('button', { className: 'sub-tab', onClick: function() { currentPage--; _renderQABrowse(cont); } }, 'Prev'));
          pageBar.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--muted)', padding: '4px 8px' } }, currentPage + ' / ' + totalPages));
          if (currentPage < totalPages) pageBar.appendChild(el('button', { className: 'sub-tab', onClick: function() { currentPage++; _renderQABrowse(cont); } }, 'Next'));
          listArea.appendChild(pageBar);
        }
      }).withFailureHandler(function() {
        listArea.innerHTML = '';
        listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load questions.'));
      }).qaGetQuestions(CURRENT_USER.email, currentPage, 20, currentSort);
    }

    function _renderQuestionDetail(cont, questionId) {
      cont.innerHTML = '';
      var backBtn = el('button', { className: 'sub-tab', style: { marginBottom: '12px' }, onClick: function() { _renderQABrowse(cont); } }, '\u2190 Back');
      cont.appendChild(backBtn);
      showLoading(cont);

      google.script.run.withSuccessHandler(function(q) {
        // Keep back button, remove loading
        while (cont.children.length > 1) cont.removeChild(cont.lastChild);
        if (!q) { cont.appendChild(el('div', { style: { color: 'var(--danger)', padding: '20px 0' } }, 'Question not found.')); return; }

        // Question card
        var qCard = el('div', { className: 'card', style: { padding: '16px', marginBottom: '12px' } });
        qCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, q.questionText));
        var qMeta = el('div', { style: { display: 'flex', gap: '12px', fontSize: '11px', color: 'var(--muted)', marginBottom: '8px', alignItems: 'center' } });
        if (q.isAnonymous) qMeta.appendChild(el('span', { className: 'privacy-badge', style: { fontSize: '10px', padding: '1px 6px' } }, 'Anonymous'));
        else qMeta.appendChild(el('span', {}, q.authorName));
        qMeta.appendChild(el('span', {}, q.created));
        qCard.appendChild(qMeta);

        // Upvote + Flag buttons
        var actions = el('div', { style: { display: 'flex', gap: '8px' } });
        actions.appendChild(el('button', {
          style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', color: 'var(--accent)', fontWeight: '600' },
          onClick: function() {
            google.script.run.withSuccessHandler(function(r) {
              if (r && r.success) _renderQuestionDetail(cont, questionId);
            }).qaUpvoteQuestion(CURRENT_USER.email, questionId);
          }
        }, '\u25B2 ' + q.upvoteCount));
        if (isSteward && q.status !== 'flagged') {
          actions.appendChild(el('button', {
            style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
            onClick: function() { google.script.run.withSuccessHandler(function() { _renderQuestionDetail(cont, questionId); }).qaModerateQuestion(CURRENT_USER.email, questionId, 'flag'); }
          }, 'Flag'));
        }
        qCard.appendChild(actions);
        cont.appendChild(qCard);

        // Answers
        cont.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, q.answerCount + ' Answer' + (q.answerCount !== 1 ? 's' : '')));

        if (q.answers && q.answers.length > 0) {
          q.answers.forEach(function(a) {
            if (a.status === 'deleted') return;
            var aCard = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', borderLeft: a.isSteward ? '3px solid var(--accent)' : 'none' } });
            aCard.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', lineHeight: '1.5', marginBottom: '6px' } }, a.answerText));
            var aMeta = el('div', { style: { display: 'flex', gap: '8px', fontSize: '11px', color: 'var(--muted)', alignItems: 'center' } });
            aMeta.appendChild(el('span', {}, a.authorName));
            if (a.isSteward) aMeta.appendChild(el('span', { style: { color: 'var(--accent)', fontWeight: '600' } }, CONFIG.stewardLabel || 'Steward'));
            aMeta.appendChild(el('span', {}, a.created));
            aCard.appendChild(aMeta);
            cont.appendChild(aCard);
          });
        }

        // Reply form
        cont.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginTop: '16px', marginBottom: '8px' } }, 'Your Answer'));
        var ansInput = el('textarea', { className: 'msg-textarea', placeholder: 'Write your answer...', style: { minHeight: '60px' } });
        cont.appendChild(ansInput);
        var ansStatus = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
        cont.appendChild(ansStatus);
        cont.appendChild(el('button', {
          className: 'btn btn-primary', style: { marginTop: '8px' },
          onClick: function() {
            var text = ansInput.value.trim();
            if (!text) { ansStatus.textContent = 'Write an answer first.'; ansStatus.style.color = 'var(--danger)'; return; }
            ansStatus.textContent = 'Posting...'; ansStatus.style.color = 'var(--muted)';
            google.script.run.withSuccessHandler(function(r) {
              if (r && r.success) _renderQuestionDetail(cont, questionId);
              else { ansStatus.textContent = r ? r.message : 'Error.'; ansStatus.style.color = 'var(--danger)'; }
            }).qaSubmitAnswer(CURRENT_USER.email, CURRENT_USER.name || '', questionId, text, isSteward);
          }
        }, 'Post Answer'));
      }).qaGetQuestionDetail(CURRENT_USER.email, questionId);
    }

    function _renderAskForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Ask a Question'));

      var textGroup = el('div', { className: 'form-group' });
      textGroup.appendChild(el('label', { className: 'form-label' }, 'Your Question'));
      var textInput = el('textarea', { className: 'msg-textarea', placeholder: 'What would you like to know?', style: { minHeight: '80px' } });
      textGroup.appendChild(textInput);
      cont.appendChild(textGroup);

      var anonGroup = el('div', { className: 'form-group', style: { display: 'flex', alignItems: 'center', gap: '8px' } });
      var anonCheck = el('input', { type: 'checkbox' });
      anonGroup.appendChild(anonCheck);
      anonGroup.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, 'Post anonymously'));
      cont.appendChild(anonGroup);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          var text = textInput.value.trim();
          if (!text) { statusMsg.textContent = 'Write your question first.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Posting...'; statusMsg.style.color = 'var(--muted)';
          google.script.run.withSuccessHandler(function(r) {
            if (r && r.success) { activeSubTab = 'browse'; refreshSubTabs(); renderQASubContent(); }
            else { statusMsg.textContent = r ? r.message : 'Error posting.'; statusMsg.style.color = 'var(--danger)'; }
          }).qaSubmitQuestion(CURRENT_USER.email, CURRENT_USER.name || '', text, anonCheck.checked);
        }
      }, 'Post Question'));
    }

    function _renderModQueue(cont) {
      showLoading(cont);
      google.script.run.withSuccessHandler(function(flagged) {
        cont.innerHTML = '';
        if (!flagged || (flagged.questions.length === 0 && flagged.answers.length === 0)) {
          cont.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No flagged content. All clear!'));
          return;
        }

        if (flagged.questions.length > 0) {
          cont.appendChild(el('h3', { className: 'section-title' }, 'Flagged Questions'));
          flagged.questions.forEach(function(q) {
            var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', borderLeft: '3px solid var(--warning)' } });
            card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, q.questionText));
            card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, q.authorName + ' \u00B7 ' + q.created));
            var acts = el('div', { style: { display: 'flex', gap: '6px' } });
            acts.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--successBg, #f0fdf4)', border: '1px solid var(--success)', color: 'var(--success)', fontWeight: '600' },
              onClick: function() { google.script.run.withSuccessHandler(function() { _renderModQueue(cont); }).qaModerateQuestion(CURRENT_USER.email, q.id, 'approve'); }
            }, 'Approve'));
            acts.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
              onClick: function() { google.script.run.withSuccessHandler(function() { _renderModQueue(cont); }).qaModerateQuestion(CURRENT_USER.email, q.id, 'delete'); }
            }, 'Delete'));
            card.appendChild(acts);
            cont.appendChild(card);
          });
        }

        if (flagged.answers.length > 0) {
          cont.appendChild(el('h3', { className: 'section-title', style: { marginTop: '16px' } }, 'Flagged Answers'));
          flagged.answers.forEach(function(a) {
            var card = el('div', { className: 'card', style: { padding: '12px 16px', marginBottom: '6px', borderLeft: '3px solid var(--warning)' } });
            card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginBottom: '4px' } }, a.answerText));
            card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '8px' } }, a.authorName + ' \u00B7 ' + a.created));
            var acts = el('div', { style: { display: 'flex', gap: '6px' } });
            acts.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--successBg, #f0fdf4)', border: '1px solid var(--success)', color: 'var(--success)', fontWeight: '600' },
              onClick: function() { google.script.run.withSuccessHandler(function() { _renderModQueue(cont); }).qaModerateAnswer(CURRENT_USER.email, a.id, 'approve'); }
            }, 'Approve'));
            acts.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
              onClick: function() { google.script.run.withSuccessHandler(function() { _renderModQueue(cont); }).qaModerateAnswer(CURRENT_USER.email, a.id, 'delete'); }
            }, 'Delete'));
            card.appendChild(acts);
            cont.appendChild(card);
          });
        }
      }).qaGetFlaggedContent(CURRENT_USER.email);
    }

    refreshSubTabs();
    renderQASubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// TIMELINE PAGE (v4.17.0 — shared by both roles)
// ═══════════════════════════════════════

function renderTimelinePage(appContainer) {
  var role = CURRENT_VIEW;
  var isSteward = role === 'steward';
  renderPageLayout(appContainer, role, 'timeline', function(container) {
    if (!isSteward) _memberHeader(container, 'Timeline', 'Union events & milestones');
    else container.appendChild(el('div', { className: 'page-header' }, el('div', { className: 'page-title' }, 'Timeline')));

    var content = el('div', { className: 'content' });

    var activeSubTab = 'timeline';
    var subTabBar = el('div', { className: 'sub-tabs' });
    var subContent = el('div');
    var filterYear = '';
    var filterCategory = '';

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      var tabs = [{ id: 'timeline', label: 'Timeline' }];
      if (isSteward) {
        tabs.push({ id: 'add', label: 'Add Event' });
        tabs.push({ id: 'import', label: 'Import' });
      }
      tabs.forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab.id ? ' active' : ''),
          onClick: function() { activeSubTab = tab.id; refreshSubTabs(); renderTLSubContent(); }
        }, tab.label));
      });
    }

    function renderTLSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'add') { _renderAddEventForm(subContent); return; }
      if (activeSubTab === 'import') { _renderImportForm(subContent); return; }
      _renderTimeline(subContent);
    }

    function _renderTimeline(cont) {
      // Filters
      var filterBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' } });
      var yearSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '100px' } });
      yearSelect.appendChild(el('option', { value: '' }, 'All Years'));
      var thisYear = new Date().getFullYear();
      for (var y = thisYear; y >= thisYear - 5; y--) yearSelect.appendChild(el('option', { value: String(y) }, String(y)));
      yearSelect.value = filterYear;
      yearSelect.addEventListener('change', function() { filterYear = yearSelect.value; _renderTimeline(cont); });

      var catSelect = el('select', { className: 'form-select', style: { width: 'auto', minWidth: '120px' } });
      catSelect.appendChild(el('option', { value: '' }, 'All Categories'));
      ['meeting', 'announcement', 'milestone', 'action', 'decision', 'other'].forEach(function(c) {
        catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1)));
      });
      catSelect.value = filterCategory;
      catSelect.addEventListener('change', function() { filterCategory = catSelect.value; _renderTimeline(cont); });

      filterBar.appendChild(yearSelect);
      filterBar.appendChild(catSelect);
      cont.innerHTML = '';
      cont.appendChild(filterBar);

      var listArea = el('div');
      cont.appendChild(listArea);
      showLoading(listArea);

      google.script.run.withSuccessHandler(function(result) {
        listArea.innerHTML = '';
        if (!result || !result.events || result.events.length === 0) {
          listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--muted)' } }, 'No events to display.'));
          return;
        }

        var tlContainer = el('div', { className: 'timeline-container' });
        tlContainer.appendChild(el('div', { className: 'timeline-line' }));

        result.events.forEach(function(evt) {
          var item = el('div', { className: 'timeline-event' });
          item.appendChild(el('div', { className: 'timeline-dot' }));
          item.appendChild(el('div', { className: 'timeline-date' }, evt.eventDate));

          var card = el('div', { className: 'card', style: { padding: '12px 16px' } });
          var titleRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' } });
          titleRow.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, evt.title));
          titleRow.appendChild(el('span', { className: 'category-badge ' + evt.category }, evt.category));
          card.appendChild(titleRow);

          if (evt.description) card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)', lineHeight: '1.4', marginTop: '4px' } }, evt.description.substring(0, 300)));

          // Drive file links
          if (evt.driveFiles && evt.driveFiles.length > 0) {
            var filesDiv = el('div', { style: { marginTop: '8px', fontSize: '11px' } });
            filesDiv.appendChild(el('span', { style: { color: 'var(--muted)' } }, 'Files: '));
            evt.driveFiles.forEach(function(f, idx) {
              if (idx > 0) filesDiv.appendChild(document.createTextNode(', '));
              var link = el('a', { href: 'https://drive.google.com/file/d/' + f.id + '/view', target: '_blank', style: { color: 'var(--accent)' } }, f.name);
              filesDiv.appendChild(link);
            });
            card.appendChild(filesDiv);
          }

          if (isSteward) {
            var acts = el('div', { style: { display: 'flex', gap: '6px', marginTop: '8px' } });
            acts.appendChild(el('button', {
              style: { fontSize: '11px', padding: '4px 10px', borderRadius: '6px', background: 'var(--dangerBg, #fef2f2)', border: '1px solid var(--danger)', color: 'var(--danger)', fontWeight: '600' },
              onClick: function() {
                google.script.run.withSuccessHandler(function() { _renderTimeline(cont); }).tlDeleteTimelineEvent(CURRENT_USER.email, evt.id);
              }
            }, 'Delete'));
            card.appendChild(acts);
          }

          item.appendChild(card);
          tlContainer.appendChild(item);
        });

        listArea.appendChild(tlContainer);
      }).withFailureHandler(function() {
        listArea.innerHTML = '';
        listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '30px 0', color: 'var(--danger)' } }, 'Failed to load timeline.'));
      }).tlGetTimelineEvents(1, 50, filterYear || null, filterCategory || null);
    }

    function _renderAddEventForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Add Event'));

      var titleGroup = el('div', { className: 'form-group' });
      titleGroup.appendChild(el('label', { className: 'form-label' }, 'Title'));
      var titleInput = el('input', { className: 'form-input', placeholder: 'Event title' });
      titleGroup.appendChild(titleInput);
      cont.appendChild(titleGroup);

      var dateGroup = el('div', { className: 'form-group' });
      dateGroup.appendChild(el('label', { className: 'form-label' }, 'Event Date'));
      var dateInput = el('input', { className: 'form-input', type: 'date' });
      dateGroup.appendChild(dateInput);
      cont.appendChild(dateGroup);

      var descGroup = el('div', { className: 'form-group' });
      descGroup.appendChild(el('label', { className: 'form-label' }, 'Description'));
      var descInput = el('textarea', { className: 'msg-textarea', placeholder: 'Event details...', style: { minHeight: '60px' } });
      descGroup.appendChild(descInput);
      cont.appendChild(descGroup);

      var catGroup = el('div', { className: 'form-group' });
      catGroup.appendChild(el('label', { className: 'form-label' }, 'Category'));
      var catSelect = el('select', { className: 'form-select' });
      ['meeting', 'announcement', 'milestone', 'action', 'decision', 'other'].forEach(function(c) {
        catSelect.appendChild(el('option', { value: c }, c.charAt(0).toUpperCase() + c.slice(1)));
      });
      catGroup.appendChild(catSelect);
      cont.appendChild(catGroup);

      var driveGroup = el('div', { className: 'form-group' });
      driveGroup.appendChild(el('label', { className: 'form-label' }, 'Drive File IDs (optional, comma-separated)'));
      var driveInput = el('input', { className: 'form-input', placeholder: 'file_id_1, file_id_2' });
      driveGroup.appendChild(driveInput);
      cont.appendChild(driveGroup);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          var title = titleInput.value.trim();
          if (!title) { statusMsg.textContent = 'Enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Creating...'; statusMsg.style.color = 'var(--muted)';
          var eventData = {
            title: title, eventDate: dateInput.value || '', description: descInput.value.trim(),
            category: catSelect.value, driveFileIds: driveInput.value.trim()
          };
          google.script.run.withSuccessHandler(function(r) {
            if (r && r.success) { activeSubTab = 'timeline'; refreshSubTabs(); renderTLSubContent(); }
            else { statusMsg.textContent = r ? r.message : 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlAddTimelineEvent(CURRENT_USER.email, eventData);
        }
      }, 'Create Event'));
    }

    function _renderImportForm(cont) {
      cont.appendChild(el('h3', { className: 'section-title' }, 'Import from Google Calendar'));
      cont.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Import events from your Google Calendar into the timeline.'));

      var startGroup = el('div', { className: 'form-group' });
      startGroup.appendChild(el('label', { className: 'form-label' }, 'Start Date'));
      var startInput = el('input', { className: 'form-input', type: 'date' });
      startGroup.appendChild(startInput);
      cont.appendChild(startGroup);

      var endGroup = el('div', { className: 'form-group' });
      endGroup.appendChild(el('label', { className: 'form-label' }, 'End Date'));
      var endInput = el('input', { className: 'form-input', type: 'date' });
      endGroup.appendChild(endInput);
      cont.appendChild(endGroup);

      var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px' } });
      cont.appendChild(statusMsg);

      cont.appendChild(el('button', {
        className: 'btn btn-primary',
        onClick: function() {
          if (!startInput.value || !endInput.value) { statusMsg.textContent = 'Select both dates.'; statusMsg.style.color = 'var(--danger)'; return; }
          statusMsg.textContent = 'Importing...'; statusMsg.style.color = 'var(--muted)';
          google.script.run.withSuccessHandler(function(r) {
            if (r && r.success) { statusMsg.textContent = r.imported + ' events imported!'; statusMsg.style.color = 'var(--success)'; }
            else { statusMsg.textContent = r ? r.message : 'Error.'; statusMsg.style.color = 'var(--danger)'; }
          }).tlImportCalendarEvents(CURRENT_USER.email, startInput.value, endInput.value);
        }
      }, 'Import Events'));
    }

    refreshSubTabs();
    renderTLSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// ═══════════════════════════════════════
// DIGEST SETTINGS (v4.17.0 — embedded in Profile page)
// ═══════════════════════════════════════

function _renderDigestSettings(container) {
  var section = el('div', { style: { marginTop: '24px', paddingTop: '16px', borderTop: '1px solid var(--border)' } });
  section.appendChild(el('h3', { className: 'section-title' }, 'Email Digest Settings'));
  section.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginBottom: '12px' } }, 'Receive periodic email summaries of your union data.'));

  var formArea = el('div');
  showLoading(formArea);
  section.appendChild(formArea);

  google.script.run.withSuccessHandler(function(config) {
    formArea.innerHTML = '';
    if (!config) config = { enabled: false, frequency: 'weekly', includeGrievances: true, includeWorkload: true, includeTasks: true };

    var enableGroup = el('div', { className: 'form-group', style: { display: 'flex', alignItems: 'center', gap: '8px' } });
    var enableCheck = el('input', { type: 'checkbox' });
    enableCheck.checked = config.enabled;
    enableGroup.appendChild(enableCheck);
    enableGroup.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, 'Enable email digest'));
    formArea.appendChild(enableGroup);

    var freqGroup = el('div', { className: 'form-group' });
    freqGroup.appendChild(el('label', { className: 'form-label' }, 'Frequency'));
    var freqDiv = el('div', { style: { display: 'flex', gap: '16px' } });
    var weeklyRadio = el('input', { type: 'radio', name: 'digestFreq', value: 'weekly' });
    weeklyRadio.checked = config.frequency === 'weekly';
    var monthlyRadio = el('input', { type: 'radio', name: 'digestFreq', value: 'monthly' });
    monthlyRadio.checked = config.frequency === 'monthly';
    freqDiv.appendChild(el('label', { style: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px' } }, [weeklyRadio, document.createTextNode(' Weekly')]));
    freqDiv.appendChild(el('label', { style: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px' } }, [monthlyRadio, document.createTextNode(' Monthly')]));
    freqGroup.appendChild(freqDiv);
    formArea.appendChild(freqGroup);

    var includeLabel = el('div', { className: 'form-label', style: { marginBottom: '6px' } }, 'Include in digest:');
    formArea.appendChild(includeLabel);

    var grievCheck = el('input', { type: 'checkbox' }); grievCheck.checked = config.includeGrievances;
    var workCheck = el('input', { type: 'checkbox' }); workCheck.checked = config.includeWorkload;
    var taskCheck = el('input', { type: 'checkbox' }); taskCheck.checked = config.includeTasks;

    [{ check: grievCheck, label: 'Grievances' }, { check: workCheck, label: 'Workload' }, { check: taskCheck, label: 'Tasks' }].forEach(function(item) {
      var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' } });
      row.appendChild(item.check);
      row.appendChild(el('label', { style: { fontSize: '13px', color: 'var(--text)' } }, item.label));
      formArea.appendChild(row);
    });

    var statusMsg = el('div', { style: { fontSize: '13px', minHeight: '20px', marginTop: '8px' } });
    formArea.appendChild(statusMsg);

    formArea.appendChild(el('button', {
      className: 'btn btn-primary', style: { marginTop: '8px' },
      onClick: function() {
        statusMsg.textContent = 'Saving...'; statusMsg.style.color = 'var(--muted)';
        var digestConfig = {
          enabled: enableCheck.checked,
          frequency: monthlyRadio.checked ? 'monthly' : 'weekly',
          includeGrievances: grievCheck.checked,
          includeWorkload: workCheck.checked,
          includeTasks: taskCheck.checked
        };
        google.script.run.withSuccessHandler(function(r) {
          statusMsg.textContent = r && r.success ? 'Digest settings saved!' : (r && r.message) || 'Error.';
          statusMsg.style.color = r && r.success ? 'var(--success)' : 'var(--danger)';
        }).fsUpdateDigestConfig(CURRENT_USER.email, digestConfig);
      }
    }, 'Save Digest Settings'));
  }).fsGetDigestConfig(CURRENT_USER.email);

  container.appendChild(section);
}
</script>
