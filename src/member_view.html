<script>
/**
 * Member View — "Glass Depth"
 * v4.12.0 — Full member dashboard with responsive layout,
 * steward contact, profile editor, resources, survey, workload, weekly questions.
 */

// ═══════════════════════════════════════
// INIT & DATA LOADING
// ═══════════════════════════════════════

function initMemberView(container) {
  var t = ThemeEngine.getTheme('member', AppState.isDark);
  ThemeEngine.applyTheme(t);
  AppState.activeRole = 'member';
  showLoading(container);

  // Use batch data if available from initApp pre-fetch
  var batch = AppState.batchData;
  if (batch && batch.grievances) {
    AppState.grievances = batch.grievances || [];
    AppState.notificationCount = batch.notificationCount || 0;
    // Seed the client-side DataCache with batch results
    if (batch.history) DataCache.set('memberHistory_' + CURRENT_USER.email, batch.history);
    if (batch.stewardInfo) DataCache.set('stewardInfo_' + CURRENT_USER.email, batch.stewardInfo);
    if (batch.surveyStatus) DataCache.set('surveyStatus_' + CURRENT_USER.email, batch.surveyStatus);
    if (batch.events) DataCache.set('events', batch.events);
    AppState.loading = false;
    renderMemberHome(container);
    _checkDeepLink('member');
    return;
  }

  // Fallback: load individually (batch unavailable)
  google.script.run.withSuccessHandler(function(r) {
    AppState.notificationCount = (r && r.count) || 0;
  }).getWebAppNotificationCount(CURRENT_USER.email, 'member');

  google.script.run
    .withSuccessHandler(function(grievances) {
      AppState.grievances = grievances || [];
      AppState.loading = false;
      renderMemberHome(container);
      _checkDeepLink('member');
    })
    .withFailureHandler(function() {
      AppState.grievances = [];
      AppState.loading = false;
      renderMemberHome(container);
      _checkDeepLink('member');
    })
    .dataGetMemberGrievances(CURRENT_USER.email);
}

// ═══════════════════════════════════════
// MEMBER HEADER (shared across all member pages)
// ═══════════════════════════════════════

function _memberHeader(container, title, subtitle) {
  var header = el('div', { className: 'page-header' });
  var headerLeft = el('div', { className: 'page-header-left' });
  headerLeft.appendChild(el('div', { className: 'page-title' }, title));
  if (subtitle) headerLeft.appendChild(el('div', { className: 'page-subtitle' }, subtitle));
  header.appendChild(headerLeft);

  var headerRight = el('div', { className: 'page-header-right' });
  // Only show utility buttons on mobile (sidebar handles these on tablet+)
  if (!isSidebarLayout()) {
    if (IS_DUAL_ROLE) {
      headerRight.appendChild(el('button', {
        style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '6px', padding: '4px 10px', fontSize: '10px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
        onClick: function() { AppState.activeRole = 'steward'; initStewardView(document.getElementById('app')); }
      }, '\uD83D\uDD27 ' + CONFIG.stewardLabel));
    }
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: function() {
      AppState.isDark = !AppState.isDark;
      ThemeEngine.applyTheme(ThemeEngine.getTheme('member', AppState.isDark));
      renderMemberHome(document.getElementById('app'));
    }}, AppState.isDark ? '\u2600\uFE0F' : '\uD83C\uDF19'));
    headerRight.appendChild(el('button', { className: 'icon-btn', onClick: handleLogout }, '\u21A9'));
  }
  header.appendChild(headerRight);
  container.appendChild(header);
}

// ═══════════════════════════════════════
// HOME TAB
// ═══════════════════════════════════════

function _getGreeting() {
  var h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function renderMemberHome(appContainer) {
  renderPageLayout(appContainer, 'member', 'home', function(container) {
    var firstName = CURRENT_USER.firstName || CURRENT_USER.name.split(' ')[0] || 'there';
    _memberHeader(container, _getGreeting() + ', ' + firstName, CURRENT_USER.unit);

    // Welcome card placeholder — shows on first visit
    var welcomeSlot = el('div');
    container.appendChild(welcomeSlot);
    _maybeShowMemberWelcome(welcomeSlot);

    // Survey banner — links to in-app survey form (uses DataCache)
    DataCache.cachedCall('surveyStatus_' + CURRENT_USER.email, 'dataGetSurveyStatus', [CURRENT_USER.email], function(status) {
      if (status && !status.hasCompleted) {
        var banner = el('div', { className: 'survey-banner fade-in' });
        var bannerLeft = el('div');
        bannerLeft.appendChild(el('span', { className: 'survey-banner-text' }, 'Quarterly survey is open!'));
        bannerLeft.appendChild(el('div', { className: 'privacy-badge', style: { marginTop: '4px', fontSize: '10px', padding: '3px 8px' } }, '\uD83D\uDD12 Anonymous via one-way encryption'));
        banner.appendChild(bannerLeft);
        banner.appendChild(el('button', {
          className: 'survey-banner-btn',
          onClick: function() {
            if (typeof renderSurveyFormPage === 'function') {
              renderSurveyFormPage(document.getElementById('app'));
            } else if (CONFIG.surveyFormUrl) {
              window.open(CONFIG.surveyFormUrl, '_blank');
            }
          }
        }, 'Take Survey'));
        // Insert after header
        var firstContent = container.querySelector('.content, .card');
        if (firstContent) container.insertBefore(banner, firstContent);
        else container.appendChild(banner);
      }
    });

    // Active grievance card — only show if member has an active case
    var activeG = AppState.grievances.find(function(g) { return g.status !== 'resolved'; });
    if (activeG) {
      renderGrievanceCard(container, activeG);
    }

    // Past cases preview (compact — shows up to 2 recent closed cases)
    var pastPreview = el('div', { style: { margin: '0 16px 14px' } });
    container.appendChild(pastPreview);
    DataCache.cachedCall('memberHistory_' + CURRENT_USER.email, 'dataGetMemberGrievanceHistory', [CURRENT_USER.email], function(result) {
      if (!result || !result.success || !result.history || result.history.length === 0) return;
      var items = result.history.slice(0, 2);
      var previewCard = el('div', { className: 'card card-glass', style: { padding: '14px 16px' } });
      previewCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '8px' } }, 'Past Cases'));
      items.forEach(function(h) {
        var row = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0' } });
        row.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text)' } }, (h.grievanceId || 'Case') + (h.issueCategory ? ' \u00B7 ' + h.issueCategory : '')));
        row.appendChild(el('span', { style: { fontSize: '11px', fontWeight: '600', color: _getOutcomeColor(h.status) } }, h.status));
        previewCard.appendChild(row);
      });
      if (result.history.length > 2) {
        previewCard.appendChild(el('div', {
          style: { fontSize: '11px', color: 'var(--accent)', fontWeight: '600', marginTop: '8px', cursor: 'pointer' },
          onClick: function() { renderMyCases(document.getElementById('app')); }
        }, 'View all ' + result.history.length + ' past cases \u2192'));
      }
      pastPreview.appendChild(previewCard);
    });

    // Steward card
    var stewardCard = el('div', { className: 'card card-glass', style: { margin: '0 16px 14px', padding: '16px' } });
    stewardCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '5px' } }, 'Your ' + CONFIG.stewardLabel));
    var stewardName = el('div', { style: { fontSize: '13px', fontFamily: 'var(--fontDisplay)', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Loading...');
    stewardCard.appendChild(stewardName);
    var stewardActions = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
    stewardCard.appendChild(stewardActions);
    container.appendChild(stewardCard);

    DataCache.cachedCall('stewardInfo_' + CURRENT_USER.email, 'dataGetAssignedSteward', [CURRENT_USER.email], function(info) {
      if (info) {
        stewardName.textContent = info.name || info.email;
        stewardActions.appendChild(el('a', {
          href: 'mailto:' + info.email,
          style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
        }, '\u2709\uFE0F ' + info.email));
        if (info.phone) {
          stewardActions.appendChild(el('a', {
            href: 'tel:' + info.phone,
            style: { background: 'rgba(52,211,153,0.1)', border: '1px solid rgba(52,211,153,0.25)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--success)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
          }, '\uD83D\uDCDE ' + info.phone));
        }
      } else {
        stewardName.textContent = 'Not assigned';
        stewardActions.appendChild(el('button', {
          style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)' },
          onClick: function() { renderStewardContact(document.getElementById('app')); }
        }, 'Find a ' + CONFIG.stewardLabel));
      }
    });

    // Actionable stats strip — Unread Notifications, Survey Status, Upcoming Events
    var statsStrip = el('div', { className: 'kpi-grid', style: { gridTemplateColumns: 'repeat(3, 1fr)' } });
    var notifKpi = el('div', { className: 'kpi-card card-fade-in' });
    notifKpi.appendChild(el('div', { className: 'kpi-label' }, 'Notifications'));
    var notifVal = el('div', { className: 'kpi-value' }, '--');
    notifKpi.appendChild(notifVal);
    statsStrip.appendChild(notifKpi);

    var surveyKpi = el('div', { className: 'kpi-card card-fade-in' });
    surveyKpi.appendChild(el('div', { className: 'kpi-label' }, 'Survey'));
    var surveyVal = el('div', { className: 'kpi-value' }, '--');
    surveyKpi.appendChild(surveyVal);
    statsStrip.appendChild(surveyKpi);

    var eventsKpi = el('div', { className: 'kpi-card card-fade-in' });
    eventsKpi.appendChild(el('div', { className: 'kpi-label' }, 'Upcoming Events'));
    var eventsVal = el('div', { className: 'kpi-value' }, '--');
    eventsKpi.appendChild(eventsVal);
    statsStrip.appendChild(eventsKpi);

    container.appendChild(statsStrip);

    // Populate KPIs asynchronously (uses DataCache — no duplicate calls)
    DataCache.cachedCall('surveyStatus_' + CURRENT_USER.email, 'dataGetSurveyStatus', [CURRENT_USER.email], function(status) {
      if (status) {
        surveyVal.textContent = status.hasCompleted ? 'Done' : 'Open';
        surveyVal.style.color = status.hasCompleted ? 'var(--success)' : 'var(--warning)';
      }
    });

    // Notification count
    notifVal.textContent = String(AppState.notificationCount || 0);

    // Upcoming Events section — single fetch populates both KPI and event cards
    var eventsSection = el('div', { className: 'content', style: { marginBottom: '14px' } });
    eventsSection.appendChild(el('h3', { className: 'section-title' }, 'Upcoming Events'));
    var eventsArea = el('div');
    eventsSection.appendChild(eventsArea);
    container.appendChild(eventsSection);

    DataCache.cachedCall('events', 'dataGetUpcomingEvents', [10], function(events) {
      // Update KPI counter
      eventsVal.textContent = events ? String(events.length) : '0';

      // Render event cards
      if (!events || events.length === 0) {
        eventsArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'No upcoming events.'));
        return;
      }
      events.slice(0, 3).forEach(function(ev, i) {
        var card = el('div', { className: 'card card-glass card-fade-in card-accent-border', style: { padding: '14px 16px', animationDelay: (i * 0.1) + 's' } });
        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, ev.title));
        var startDate = new Date(ev.startTime);
        var dateStr = startDate.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        var timeStr = startDate.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--accent)', marginTop: '4px' } }, dateStr + ' at ' + timeStr));
        if (ev.location) card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '2px' } }, '\uD83D\uDCCD ' + ev.location));
        // Add to Calendar button
        var calUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
          '&text=' + encodeURIComponent(ev.title) +
          '&dates=' + ev.startTime.replace(/[-:]/g, '').replace('.000Z', 'Z') + '/' + ev.endTime.replace(/[-:]/g, '').replace('.000Z', 'Z') +
          (ev.location ? '&location=' + encodeURIComponent(ev.location) : '');
        card.appendChild(el('a', {
          href: calUrl, target: '_blank',
          style: { display: 'inline-block', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', marginTop: '6px' }
        }, '+ Add to My Calendar'));
        eventsArea.appendChild(card);
      });
      if (events.length > 3) {
        eventsArea.appendChild(el('button', {
          className: 'btn btn-secondary', style: { marginTop: '8px', fontSize: '13px', padding: '8px' },
          onClick: function() { renderEventsPage(document.getElementById('app')); }
        }, 'View All Events'));
      }
    });

    // Quick links
    var res = el('div', { className: 'content' });
    res.appendChild(el('h3', { className: 'section-title' }, 'Quick Links'));
    var links = [
      { icon: '\uD83D\uDCD6', label: 'Know Your Rights', sub: 'Contract highlights' },
      { icon: '\uD83D\uDCDD', label: 'File a Grievance', sub: 'Start a new case' },
      { icon: '\u2753', label: 'FAQ', sub: 'Common questions' },
    ];
    links.forEach(function(r) {
      var item = el('div', { className: 'card card-glass card-clickable card-fade-in', style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '13px 16px' } });
      item.appendChild(el('span', { style: { fontSize: '18px' } }, r.icon));
      var tg = el('div', { style: { flex: '1' } });
      tg.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, r.label));
      tg.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, r.sub));
      item.appendChild(tg);
      item.appendChild(el('span', { style: { color: 'var(--muted)', fontSize: '14px' } }, '\u203A'));
      res.appendChild(item);
    });
    container.appendChild(res);
  });
}

// ═══════════════════════════════════════
// GRIEVANCE CARD & DETAIL (preserved from v4.10)
// ═══════════════════════════════════════

function renderGrievanceCard(parentContainer, g) {
  var dl = g.deadlineDays;
  var dc = dl !== null && dl < 0 ? 'var(--danger)' : dl !== null && dl <= 3 ? 'var(--warning)' : dl !== null && dl <= 7 ? 'var(--info)' : 'var(--success)';

  var card = el('div', { className: 'card card-glass card-clickable', style: { margin: '0 16px 14px', padding: '22px', position: 'relative', overflow: 'hidden' },
    onClick: function() { renderGrievanceDetail(document.getElementById('app'), g); }
  });

  var sc = g.status === 'overdue' ? 'danger' : g.status === 'active' ? 'warning' : 'info';
  card.appendChild(el('div', { className: 'glow-bar ' + sc }));
  card.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '8px' } }, 'Your Active Grievance'));
  card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } }, g.step || 'Grievance'));
  card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '14px' } }, g.id + ' \u00B7 Filed ' + (g.filed || 'N/A')));

  if (dl !== null) {
    var cd = el('div', { style: { background: 'rgba(255,255,255,0.04)', borderRadius: '12px', padding: '11px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
    cd.appendChild(el('span', { style: { fontSize: '12px', color: 'var(--text)' } }, 'Next deadline'));
    var dg = el('div');
    dg.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: dc } }, String(Math.abs(dl))));
    dg.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--muted)', marginLeft: '3px' } }, dl < 0 ? 'days overdue' : 'days'));
    cd.appendChild(dg);
    card.appendChild(cd);
  }

  card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--accent)', marginTop: '10px', fontWeight: '600' } }, 'View timeline \u2192'));
  parentContainer.appendChild(card);
}

function renderGrievanceDetail(appContainer, g) {
  renderPageLayout(appContainer, 'member', 'cases', function(container) {
    // Back button
    container.appendChild(el('div', { style: { padding: '12px 20px' } },
      el('button', { style: { color: 'var(--accent)', fontSize: '13px', fontFamily: 'var(--fontBody)' },
        onClick: function() { renderMyCases(document.getElementById('app')); }
      }, '\u2190 Back')
    ));

    var dl = g.deadlineDays;
    var dc = dl !== null && dl < 0 ? 'var(--danger)' : dl !== null && dl <= 3 ? 'var(--warning)' : 'var(--info)';

    var detailCard = el('div', { className: 'card card-glass', style: { margin: '0 16px 14px', padding: '20px', position: 'relative', overflow: 'hidden' } });
    var sc = g.status === 'overdue' ? 'danger' : g.status === 'active' ? 'warning' : 'info';
    detailCard.appendChild(el('div', { className: 'glow-bar ' + sc, style: { top: '0', bottom: 'auto' } }));

    var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } });
    topRow.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontWeight: '700', fontSize: '17px', color: 'var(--text)' } }, g.id));
    var badge = el('span', { className: 'status-badge', style: { color: 'var(--' + sc + ')', background: 'rgba(255,255,255,0.06)' } });
    badge.textContent = g.status.charAt(0).toUpperCase() + g.status.slice(1);
    topRow.appendChild(badge);
    detailCard.appendChild(topRow);

    detailCard.appendChild(el('div', { style: { fontFamily: 'var(--fontBody)', fontSize: '13px', color: 'var(--text)', marginBottom: '12px' } }, g.step || ''));

    var infoRow = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', padding: '12px 0', borderTop: '1px solid var(--border)' } });
    var filed = el('div');
    filed.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em' } }, 'Filed'));
    filed.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)', marginTop: '2px' } }, g.filed || 'N/A'));
    infoRow.appendChild(filed);
    var deadline = el('div');
    deadline.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em' } }, 'Deadline'));
    deadline.appendChild(el('div', { style: { fontSize: '12px', color: dc, fontWeight: '600', marginTop: '2px' } }, g.deadline || 'N/A'));
    infoRow.appendChild(deadline);
    detailCard.appendChild(infoRow);
    container.appendChild(detailCard);

    // Timeline
    var timelineSection = el('div', { style: { padding: '0 16px' } });
    timelineSection.appendChild(el('h3', { className: 'section-title' }, 'Timeline'));
    var steps = [];
    if (g.filed) steps.push({ date: g.filed, event: 'Grievance filed', done: true });
    if (g.step) {
      var currentStepNum = parseInt(g.step.replace(/\D/g, '')) || 1;
      for (var s = 1; s <= currentStepNum; s++) {
        if (s < currentStepNum) steps.push({ date: '', event: 'Step ' + s + ' completed', done: true });
        else steps.push({ date: g.deadline || '', event: g.step + ' \u2014 in progress', done: false });
      }
    }
    steps.forEach(function(step, i) {
      var item = el('div', { className: 'timeline-item' });
      var track = el('div', { className: 'timeline-track' });
      track.appendChild(el('div', { className: 'timeline-dot ' + (step.done ? 'done' : 'pending') }));
      if (i < steps.length - 1) track.appendChild(el('div', { className: 'timeline-line ' + (step.done && steps[i + 1].done ? 'done' : 'pending') }));
      item.appendChild(track);
      var content = el('div', { className: 'timeline-content' });
      content.appendChild(el('div', { className: 'timeline-event', style: { color: step.done ? 'var(--text)' : 'var(--muted)' } }, step.event));
      if (step.date) content.appendChild(el('div', { className: 'timeline-date' }, step.date));
      item.appendChild(content);
      timelineSection.appendChild(item);
    });
    container.appendChild(timelineSection);

    // Case checklist (read-only for members, v4.16.0)
    _renderMemberCaseChecklist(container, g.id);

    // Steward contact in detail view
    if (g.steward) {
      var contactSection = el('div', { style: { padding: '12px 16px' } });
      var contactCard = el('div', { className: 'card card-glass', style: { padding: '16px' } });
      contactCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '5px' } }, CONFIG.stewardLabel));
      var cName = el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Loading...');
      contactCard.appendChild(cName);
      var contactBtns = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
      contactCard.appendChild(contactBtns);
      contactSection.appendChild(contactCard);
      container.appendChild(contactSection);

      google.script.run.withSuccessHandler(function(contact) {
        if (!contact) { cName.textContent = 'Not available'; return; }
        cName.textContent = contact.name || contact.email;
        contactBtns.appendChild(el('a', {
          href: 'mailto:' + contact.email,
          style: { background: 'var(--accentBg)', border: '1px solid var(--accentBorder)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--accent)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
        }, '\u2709\uFE0F ' + contact.email));
        if (contact.phone) {
          contactBtns.appendChild(el('a', {
            href: 'tel:' + contact.phone,
            style: { background: 'rgba(52,211,153,0.1)', border: '1px solid rgba(52,211,153,0.25)', borderRadius: '10px', padding: '7px 14px', fontSize: '11px', color: 'var(--success)', fontWeight: '600', fontFamily: 'var(--fontBody)', display: 'inline-block' }
          }, '\uD83D\uDCDE ' + contact.phone));
        }
      }).dataGetStewardContact(g.steward);
    }
  });
}

// ═══════════════════════════════════════
// MY CASES TAB
// ═══════════════════════════════════════

function renderMyCases(appContainer) {
  renderPageLayout(appContainer, 'member', 'cases', function(container) {
    _memberHeader(container, 'My Cases', AppState.grievances.length + ' total');

    var content = el('div', { className: 'content' });
    if (AppState.grievances.length === 0) {
      // Know Your Rights card
      var kyrCard = el('div', { className: 'card card-glass', style: { padding: '20px', marginBottom: '12px' } });
      kyrCard.appendChild(el('div', { style: { fontSize: '28px', marginBottom: '8px', textAlign: 'center' } }, '\u2696\uFE0F'));

// ───────────────────────────────────────
// Grievance intake mini-form (draft mode)
// ───────────────────────────────────────

function _showGrievanceIntakeForm(parentContent) {
  parentContent.innerHTML = '';
  var form = el('div', { className: 'card card-glass', style: { padding: '18px' } });
  form.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '700', color: 'var(--text)', marginBottom: '14px' } }, 'Start a Grievance Draft'));

  var fields = {};
  var fieldDefs = [
    { key: 'title', label: 'Title', type: 'text', placeholder: 'Brief description of the issue' },
    { key: 'category', label: 'Category', type: 'select', options: ['Contract Violation', 'Discipline', 'Safety/Health', 'Discrimination', 'Workload', 'Other'] },
    { key: 'description', label: 'Description', type: 'textarea', placeholder: 'Describe what happened, when, and who was involved' },
  ];

  fieldDefs.forEach(function(f) {
    form.appendChild(el('label', { style: { display: 'block', fontSize: '12px', color: 'var(--muted)', marginBottom: '4px', marginTop: '10px' } }, f.label));
    var input;
    if (f.type === 'textarea') {
      input = el('textarea', { style: { width: '100%', minHeight: '80px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px', fontSize: '13px', color: 'var(--text)', resize: 'vertical', boxSizing: 'border-box' }, placeholder: f.placeholder || '' });
    } else if (f.type === 'select') {
      input = el('select', { style: { width: '100%', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px', fontSize: '13px', color: 'var(--text)' } });
      input.appendChild(el('option', { value: '' }, '-- Select --'));
      f.options.forEach(function(opt) { input.appendChild(el('option', { value: opt }, opt)); });
    } else {
      input = el('input', { type: 'text', style: { width: '100%', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px', fontSize: '13px', color: 'var(--text)', boxSizing: 'border-box' }, placeholder: f.placeholder || '' });
    }
    fields[f.key] = input;
    form.appendChild(input);
  });

  var statusMsg = el('div', { style: { fontSize: '12px', marginTop: '8px', minHeight: '16px' } });
  form.appendChild(statusMsg);

  var btnRow = el('div', { style: { display: 'flex', gap: '8px', marginTop: '14px' } });
  var submitBtn = el('button', { className: 'btn btn-primary', style: { flex: '1' }, onClick: function() {
    var title = fields.title.value.trim();
    var category = fields.category.value;
    var description = fields.description.value.trim();
    if (!title) { statusMsg.textContent = 'Please enter a title.'; statusMsg.style.color = 'var(--danger)'; return; }
    submitBtn.textContent = 'Submitting...'; submitBtn.disabled = true;
    google.script.run.withSuccessHandler(function(r) {
      if (r && r.success) {
        parentContent.innerHTML = '';
        var done = el('div', { className: 'card card-glass', style: { padding: '24px', textAlign: 'center' } });
        done.appendChild(el('div', { style: { fontSize: '32px', marginBottom: '8px' } }, '\u2705'));
        done.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '600', color: 'var(--text)' } }, 'Draft Submitted'));
        done.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', marginTop: '6px' } }, 'Your steward will be notified to follow up.'));
        done.appendChild(el('button', { className: 'btn btn-primary', style: { marginTop: '14px' }, onClick: function() { renderMyCases(document.getElementById('app')); } }, 'Back to My Cases'));
        parentContent.appendChild(done);
      } else {
        statusMsg.textContent = (r && r.message) || 'Error submitting draft.'; statusMsg.style.color = 'var(--danger)';
        submitBtn.textContent = 'Submit Draft'; submitBtn.disabled = false;
      }
    }).withFailureHandler(function() {
      statusMsg.textContent = 'Error submitting. Please try again.'; statusMsg.style.color = 'var(--danger)';
      submitBtn.textContent = 'Submit Draft'; submitBtn.disabled = false;
    }).dataStartGrievanceDraft(CURRENT_USER.email, { title: title, category: category, description: description });
  } }, 'Submit Draft');
  var cancelBtn = el('button', { className: 'btn', style: { flex: '1', background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--text)' }, onClick: function() {
    renderMyCases(document.getElementById('app'));
  } }, 'Cancel');
  btnRow.appendChild(submitBtn);
  btnRow.appendChild(cancelBtn);
  form.appendChild(btnRow);

  parentContent.appendChild(form);
}

// ═══════════════════════════════════════
// PAST CASES (resolved/closed grievance history)
// ═══════════════════════════════════════

function _renderPastCasesSection(parentContainer) {
  var section = el('div', { className: 'content', style: { marginTop: '4px' } });

  // Collapsible header
  var pastCasesExpanded = false;
  var headerRow = el('div', {
    style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', padding: '2px 0' },
    onClick: function() {
      pastCasesExpanded = !pastCasesExpanded;
      listArea.style.display = pastCasesExpanded ? 'block' : 'none';
      toggleIcon.textContent = pastCasesExpanded ? '\u25B4' : '\u25BE';
    }
  });
  var titleWrap = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } });
  titleWrap.appendChild(el('h3', { className: 'section-title', style: { margin: '0' } }, 'Past Cases'));
  var toggleIcon = el('span', { style: { fontSize: '12px', color: 'var(--muted)' } }, '\u25BE');
  titleWrap.appendChild(toggleIcon);
  headerRow.appendChild(titleWrap);
  section.appendChild(headerRow);

  var listArea = el('div', { style: { display: 'none' } });
  showLoading(listArea);
  section.appendChild(listArea);
  parentContainer.appendChild(section);

  google.script.run.withSuccessHandler(function(result) {
    listArea.innerHTML = '';
    if (!result || !result.success || !result.history || result.history.length === 0) {
      listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '24px 0', color: 'var(--muted)', fontSize: '13px' } }, 'No past cases.'));
      // Update header to show count
      headerRow.querySelector('.section-title').textContent = 'Past Cases (0)';
      return;
    }

    headerRow.querySelector('.section-title').textContent = 'Past Cases (' + result.history.length + ')';

    result.history.forEach(function(h, idx) {
      var outcomeColor = _getOutcomeColor(h.status);
      var card = el('div', {
        className: 'card card-glass card-fade-in',
        style: { padding: '14px 16px', marginBottom: '6px', borderLeft: '3px solid ' + outcomeColor, animationDelay: (idx * 60) + 'ms' }
      });

      var topRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } });
      topRow.appendChild(el('span', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, h.grievanceId || 'Case'));

      var badge = el('span', {
        style: {
          display: 'inline-block', padding: '2px 10px', borderRadius: '12px', fontSize: '11px', fontWeight: '600',
          background: _getOutcomeBg(h.status), color: outcomeColor
        }
      }, h.status || 'Closed');
      topRow.appendChild(badge);
      card.appendChild(topRow);

      if (h.issueCategory) {
        card.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--text)', marginBottom: '4px' } }, h.issueCategory));
      }

      if (h.outcome) {
        card.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '4px' } }, 'Outcome: ' + h.outcome));
      }

      var dateRow = el('div', { style: { display: 'flex', gap: '16px', fontSize: '11px', color: 'var(--muted)' } });
      if (h.dateFiled) dateRow.appendChild(el('span', null, 'Filed: ' + h.dateFiled));
      if (h.dateClosed) dateRow.appendChild(el('span', null, 'Closed: ' + h.dateClosed));
      card.appendChild(dateRow);

      listArea.appendChild(card);
    });
  }).withFailureHandler(function() {
    listArea.innerHTML = '';
    listArea.appendChild(el('div', { style: { textAlign: 'center', padding: '24px 0', color: 'var(--muted)', fontSize: '13px' } }, 'Unable to load past cases.'));
  }).dataGetMemberGrievanceHistory(CURRENT_USER.email);
}

function _getOutcomeColor(status) {
  var s = (status || '').toLowerCase();
  if (s === 'won' || s === 'settled') return 'var(--success)';
  if (s === 'denied') return 'var(--danger)';
  if (s === 'withdrawn') return 'var(--warning)';
  return 'var(--muted)';
}

function _getOutcomeBg(status) {
  var s = (status || '').toLowerCase();
  if (s === 'won' || s === 'settled') return 'rgba(52,211,153,0.12)';
  if (s === 'denied') return 'rgba(239,68,68,0.12)';
  if (s === 'withdrawn') return 'rgba(250,204,21,0.12)';
  return 'rgba(255,255,255,0.06)';
}

/**
 * Shows a welcome/onboarding card on the member home page if first visit.
 * @param {Element} slot - Container element to insert the welcome card into
 */
function _maybeShowMemberWelcome(slot) {
  // Skip if already dismissed in this session
  if (AppState._welcomeDismissed) return;

  google.script.run.withSuccessHandler(function(data) {
    if (!data || !data.isFirstVisit) return;

    var card = el('div', {
      className: 'card card-glass card-fade-in',
      style: {
        padding: '24px 20px',
        margin: '0 16px 14px',
        background: 'linear-gradient(135deg, var(--accentBg), rgba(255,255,255,0.03))',
        border: '1px solid var(--accentBorder)',
        position: 'relative'
      }
    });

    // Header
    var safeName = (data.userName || 'there').replace(/[<>&"']/g, '');
    card.appendChild(el('div', {
      style: { fontFamily: 'var(--fontDisplay)', fontSize: '20px', fontWeight: '700', color: 'var(--text)', marginBottom: '8px' }
    }, 'Welcome, ' + safeName + '!'));

    card.appendChild(el('div', {
      style: { fontSize: '13px', color: 'var(--muted)', lineHeight: '1.5', marginBottom: '16px' }
    }, 'This is your ' + CONFIG.memberLabel + ' dashboard. View your grievance cases, update your contact info, access union resources, and stay connected with your ' + CONFIG.stewardLabel.toLowerCase() + '.'));

    // Quick-start action cards grid
    var grid = el('div', {
      style: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '16px' }
    });

    (data.quickActions || []).forEach(function(qa) {
      var actionCard = el('div', {
        className: 'card card-clickable',
        style: {
          padding: '12px',
          textAlign: 'center',
          cursor: 'pointer',
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: '10px'
        },
        onClick: function() {
          _dismissMemberWelcome(card);
          _handleTabNav('member', qa.action);
        }
      });
      actionCard.appendChild(el('div', { style: { fontSize: '22px', marginBottom: '4px' } }, qa.icon));
      actionCard.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', fontFamily: 'var(--fontDisplay)' } }, qa.label));
      grid.appendChild(actionCard);
    });
    card.appendChild(grid);

    // Dismiss button
    card.appendChild(el('button', {
      className: 'btn',
      style: {
        width: '100%',
        background: 'var(--accent)',
        color: '#fff',
        border: 'none',
        borderRadius: '8px',
        padding: '10px',
        fontSize: '13px',
        fontWeight: '600',
        cursor: 'pointer'
      },
      onClick: function() { _dismissMemberWelcome(card); }
    }, 'Got it!'));

    slot.appendChild(card);
  }).dataGetWelcomeData(CURRENT_USER.email);
}

/**
 * Dismisses the member welcome card and saves preference to backend.
 */
function _dismissMemberWelcome(cardEl) {
  AppState._welcomeDismissed = true;
  if (cardEl) {
    cardEl.style.opacity = '0';
    cardEl.style.transition = 'opacity 0.3s ease';
    setTimeout(function() { cardEl.remove(); }, 300);
  }
  google.script.run.dataMarkWelcomeDismissed(CURRENT_USER.email);
}

function renderStewardContact(appContainer) {
  renderPageLayout(appContainer, 'member', 'contact', function(container) {
    _memberHeader(container, 'Contact ' + CONFIG.stewardLabel);
    var content = el('div', { className: 'content' });
    showLoading(content);

          { label: 'Email', value: info.email, icon: '\u2709\uFE0F', href: 'mailto:' + info.email },
          { label: 'Phone', value: info.phone, icon: '\uD83D\uDCDE', href: 'tel:' + info.phone },

          info_.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--muted)', textTransform: 'uppercase' } }, d.label));
          if (d.href) {
            info_.appendChild(el('a', { href: d.href, style: { fontSize: '13px', color: 'var(--accent)', fontWeight: '600' } }, d.value));
          } else {
            info_.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)' } }, d.value));

      } else {

        content.appendChild(el('div', { style: { textAlign: 'center', padding: '20px 0' } },
          el('div', { style: { fontSize: '32px', marginBottom: '10px' } }, '\uD83D\uDC65')
        ));

function _renderStewardPicker(content) {
  var pickerArea = el('div');
  pickerArea.innerHTML = '<div class="loading-spinner" style="min-height:100px"><div class="spinner"></div></div>';
  content.appendChild(pickerArea);

      pickerArea.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px', padding: '16px 0' } }, 'No ' + CONFIG.stewardLabel.toLowerCase() + 's available.'));

    }

      if (s.officeDays) meta += (meta ? ' \u00B7 ' : '') + s.officeDays;
      if (s.sameLocation) meta += ' \u2605';
      info.appendChild(el('div', { className: 'member-list-meta' }, meta));

// RESOURCES TAB
// ═══════════════════════════════════════

function renderMemberResources(appContainer) {
  renderPageLayout(appContainer, 'member', 'resources', function(container) {
    _memberHeader(container, 'Resources');
    var content = el('div', { className: 'content' });

    // Section 1: Quick Links
    var quickLinks = [
      { icon: '\uD83D\uDCC5', label: 'Calendar', sub: 'Upcoming meetings & events', url: CONFIG.calendarUrl },
      { icon: '\uD83D\uDCC2', label: 'Shared Drive', sub: 'Contracts, documents & templates', url: CONFIG.driveFolderUrl },
    ];
    if (CONFIG.orgWebsite) quickLinks.push({ icon: '\uD83C\uDF10', label: 'SEIU 509 Website', sub: CONFIG.orgWebsite, url: CONFIG.orgWebsite });

    quickLinks.forEach(function(r) {
      if (!r.url) return;
      var item = el('div', {
        className: 'card card-glass card-clickable',
        style: { display: 'flex', alignItems: 'center', gap: '14px', padding: '13px 16px' },
        onClick: function() { window.open(r.url, '_blank'); }
      });
      item.appendChild(el('span', { style: { fontSize: '18px' } }, r.icon));
      var tg = el('div', { style: { flex: '1' } });
      tg.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '13px', fontWeight: '600', color: 'var(--text)' } }, r.label));
      tg.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)' } }, r.sub));
      item.appendChild(tg);
      item.appendChild(el('span', { style: { color: 'var(--muted)', fontSize: '14px' } }, '\u203A'));
      content.appendChild(item);
    });

    // Section 2: Know Your Rights Hub
    var hubSection = el('div', { style: { marginTop: '24px' } });
    hubSection.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)', marginBottom: '12px' } }, 'Know Your Rights'));

    var searchInput = el('input', { className: 'search-input form-input', placeholder: 'Search resources...', style: { marginBottom: '8px' } });
    hubSection.appendChild(searchInput);

    var pillsWrap = el('div', { className: 'res-pills' });
    hubSection.appendChild(pillsWrap);

    var cardsWrap = el('div');
    hubSection.appendChild(cardsWrap);
    content.appendChild(hubSection);

    // Load resources
    var allResources = [];
    var activeCategory = 'All';
    showLoading(cardsWrap);

    google.script.run.withSuccessHandler(function(resources) {
      allResources = resources || [];
      // Build category pills
      var categories = ['All'];
      allResources.forEach(function(r) {
        if (r.category && categories.indexOf(r.category) === -1) categories.push(r.category);
      });
      renderPills(categories);
      renderCards();
    }).withFailureHandler(function() {
      cardsWrap.innerHTML = '';
      cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--muted)' } }, 'Unable to load resources.'));
    }).getWebAppResourcesList('Members');

    function renderPills(categories) {
      pillsWrap.innerHTML = '';
      categories.forEach(function(cat) {
        pillsWrap.appendChild(el('button', {
          className: 'res-pill' + (activeCategory === cat ? ' active' : ''),
          onClick: function() { activeCategory = cat; renderPills(categories); renderCards(); }
        }, cat));
      });
    }

    function renderCards() {
      cardsWrap.innerHTML = '';
      var searchTerm = (searchInput.value || '').toLowerCase().trim();
      var filtered = allResources.filter(function(r) {
        if (activeCategory !== 'All' && r.category !== activeCategory) return false;
        if (searchTerm) {
          return (r.title || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                 (r.summary || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                 (r.content || '').toLowerCase().indexOf(searchTerm) !== -1;
        }
        return true;
      });

      if (filtered.length === 0) {
        cardsWrap.appendChild(el('div', { style: { textAlign: 'center', padding: '32px 16px', color: 'var(--muted)' } }, 'No resources match your search.'));
        return;
      }

      filtered.forEach(function(r, idx) {
        var card = el('div', {
          className: 'card card-glass res-card card-clickable card-fade-in',
          style: { animationDelay: (idx * 50) + 'ms' }
        });

        card.appendChild(el('div', { className: 'res-card-icon' }, r.icon || '\uD83D\uDCC4'));

        var catBadge = el('span', { className: 'notif-type-badge notif-type-announcement', style: { fontSize: '10px', marginBottom: '6px' } }, r.category);
        card.appendChild(catBadge);

        card.appendChild(el('div', { className: 'res-card-title' }, r.title));
        card.appendChild(el('div', { className: 'res-card-summary' }, r.summary));

        // Expand hint
        var hint = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Tap to read more \u25BE');
        card.appendChild(hint);

        // Expandable content
        var expandContent = el('div', { className: 'res-card-content' });
        if (r.content) expandContent.appendChild(el('div', null, r.content));
        // H-53: Validate URL protocol to prevent javascript: XSS
        if (r.url && /^https?:\/\//i.test(r.url)) {
          expandContent.appendChild(el('a', { className: 'res-card-link', href: r.url, target: '_blank' }, '\uD83D\uDD17 Open Resource'));
        }
        if (r.dateAdded) expandContent.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginTop: '8px' } }, 'Added: ' + r.dateAdded));
        card.appendChild(expandContent);

        card.addEventListener('click', function() {
          card.classList.toggle('expanded');
          hint.textContent = card.classList.contains('expanded') ? 'Tap to collapse \u25B4' : 'Tap to read more \u25BE';
        });

        cardsWrap.appendChild(card);
      });
    }

    searchInput.addEventListener('input', function() { renderCards(); });

    container.appendChild(content);
  });
}

          statusMsg.style.color = 'var(--danger)';
        }).dataUpdateProfile(CURRENT_USER.email, updates);

      content.appendChild(form);

      _renderDigestSettings(content);
    }).dataGetFullProfile(CURRENT_USER.email);
  });
}

function renderMemberNotifications(appContainer) {
  renderPageLayout(appContainer, 'member', 'notifications', function(container) {
    _memberHeader(container, 'Notifications', 'Stay informed');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(notifications) {
      content.innerHTML = '';
      if (!notifications || notifications.length === 0) {
        var empty = el('div', { style: { textAlign: 'center', padding: '48px 16px' } });
        empty.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\uD83D\uDD14'));
        empty.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)' } }, 'All caught up!'));
        empty.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginTop: '6px' } }, 'No new notifications'));
        content.appendChild(empty);
        return;
      }

      // Filter out temporarily dismissed notifications (1-hour localStorage TTL)
      var DISMISS_TTL = 3600000; // 1 hour
      var visible = notifications.filter(function(n) {
        var dismissedAt = localStorage.getItem('dismissed_notif_' + n.id);
        return !dismissedAt || (Date.now() - parseInt(dismissedAt, 10)) >= DISMISS_TTL;
      });

      if (visible.length === 0) {
        var empty2 = el('div', { style: { textAlign: 'center', padding: '48px 16px' } });
        empty2.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\uD83D\uDD14'));
        empty2.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '700', color: 'var(--text)' } }, 'All caught up!'));
        empty2.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginTop: '6px' } }, 'Dismissed notifications will reappear in up to 1 hour'));
        content.appendChild(empty2);
        return;
      }

      var typeColors = { System: 'system', Announcement: 'announcement', 'Steward Message': 'steward', Deadline: 'deadline' };
      visible.forEach(function(n, idx) {
        var card = el('div', {
          className: 'card card-glass notif-card card-fade-in' + (n.priority === 'Urgent' ? ' notif-urgent-border' : ''),
          style: { animationDelay: (idx * 60) + 'ms' }
        });

        var top = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' } });
        var typeClass = typeColors[n.type] || 'system';
        top.appendChild(el('span', { className: 'notif-type-badge notif-type-' + typeClass }, n.type));
        if (n.priority === 'Urgent') {
          top.appendChild(el('span', { className: 'notif-type-badge notif-type-deadline' }, 'Urgent'));
        }
        card.appendChild(top);

        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '15px', fontWeight: '700', color: 'var(--text)', paddingRight: '28px' } }, n.title));
        card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginTop: '6px', lineHeight: '1.5' } }, n.message));

        var meta = el('div', { className: 'notif-meta' });
        if (n.sentBy) meta.appendChild(el('span', null, 'From: ' + n.sentBy + '  '));
        if (n.createdDate) meta.appendChild(el('span', null, n.createdDate));
        if (n.expiresDate) meta.appendChild(el('span', null, '  · Expires: ' + n.expiresDate));
        card.appendChild(meta);

        var dismissBtn = el('button', { className: 'notif-dismiss', onClick: function() {
          // Use localStorage with 1-hour TTL instead of permanent backend dismiss
          localStorage.setItem('dismissed_notif_' + n.id, String(Date.now()));
          card.style.opacity = '0';
          card.style.transition = 'opacity 0.3s';
          setTimeout(function() { card.remove(); }, 300);
          AppState.notificationCount = Math.max(0, AppState.notificationCount - 1);
        }}, '\u2715');
        card.appendChild(dismissBtn);

        content.appendChild(card);
      });
    }).withFailureHandler(function() {
      content.innerHTML = '';
      content.appendChild(el('div', { style: { textAlign: 'center', padding: '24px', color: 'var(--danger)' } }, 'Failed to load notifications. Please try again.'));
    }).getWebAppNotifications(CURRENT_USER.email, 'member');
  });
}

function _renderSurveyWizard(container, sections) {
  container.innerHTML = '';
  var totalSteps = sections.length;
  var currentStep = 0;
  var responses = {};

  // Restore saved progress from localStorage
  var STORAGE_KEY = 'dds_survey_progress';
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      responses = parsed.responses || {};
      if (parsed.step >= 0 && parsed.step < totalSteps) currentStep = parsed.step;
    }
  } catch (e) { /* ignore */ }

  function saveProgress() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step: currentStep, responses: responses })); } catch (e) { /* ignore */ }
  }

  function clearProgress() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
  }

  // Privacy banner (sticky)
  var banner = el('div', {
    className: 'privacy-badge',
    style: { marginBottom: '14px', textAlign: 'center', position: 'sticky', top: '0', zIndex: '10', padding: '8px 12px', background: 'var(--surface)', borderRadius: '8px' }
  }, '\uD83D\uDD12 Your responses are fully anonymous via one-way encryption');
  container.appendChild(banner);

  // Progress bar container
  var progressWrap = el('div', { style: { marginBottom: '18px' } });
  var progressLabel = el('div', { style: { fontSize: '11px', color: 'var(--muted)', marginBottom: '6px', display: 'flex', justifyContent: 'space-between' } });
  var progressTrack = el('div', { className: 'bar-chart-track', style: { height: '6px', borderRadius: '3px' } });
  var progressFill = el('div', { className: 'bar-chart-fill', style: { borderRadius: '3px', background: 'var(--accent)', transition: 'width 0.3s ease' } });
  progressTrack.appendChild(progressFill);
  progressWrap.appendChild(progressLabel);
  progressWrap.appendChild(progressTrack);
  container.appendChild(progressWrap);

  // Step content area
  var stepContainer = el('div');
  container.appendChild(stepContainer);

  // Navigation buttons
  var navRow = el('div', { style: { display: 'flex', gap: '10px', marginTop: '18px', justifyContent: 'space-between' } });
  var prevBtn = el('button', { className: 'btn btn-secondary', style: { flex: '1' }, onClick: function() { goStep(-1); } }, '\u2190 Back');
  var nextBtn = el('button', { className: 'btn btn-primary', style: { flex: '1' }, onClick: function() { goStep(1); } }, 'Next \u2192');
  navRow.appendChild(prevBtn);
  navRow.appendChild(nextBtn);
  container.appendChild(navRow);

  function updateProgress() {
    progressLabel.innerHTML = '';
    progressLabel.appendChild(el('span', {}, 'Section ' + (currentStep + 1) + ' of ' + totalSteps));
    progressLabel.appendChild(el('span', {}, sections[currentStep].title));
    var pct = ((currentStep + 1) / totalSteps) * 100;
    progressFill.style.width = pct + '%';
  }

  function renderStep() {
    stepContainer.innerHTML = '';
    var sec = sections[currentStep];

    var sectionCard = el('div', { className: 'card card-glass fade-in', style: { padding: '20px' } });
    sectionCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--text)', marginBottom: '16px' } }, sec.title));

    sec.questions.forEach(function(q) {
      var qWrap = el('div', { style: { marginBottom: '20px' } });
      qWrap.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)', marginBottom: '8px', lineHeight: '1.5' } }, q.text));

      if (q.type === 'scale') {
        // 1-10 tappable number buttons
        var scaleRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', justifyContent: 'center' } });
        for (var n = 1; n <= 10; n++) {
          (function(num) {
            var isSelected = responses[q.id] === num;
            var numBtn = el('button', {
              style: {
                width: '44px', height: '44px', borderRadius: '10px', fontSize: '16px', fontWeight: '600',
                display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                transition: 'all 0.15s ease',
                background: isSelected ? 'var(--accent)' : 'var(--surface)',
                color: isSelected ? '#fff' : 'var(--text)',
                border: isSelected ? '2px solid var(--accent)' : '2px solid var(--border)'
              },
              onClick: function() {
                responses[q.id] = num;
                saveProgress();
                renderStep();
              }
            }, String(num));
            scaleRow.appendChild(numBtn);
          })(n);
        }
        // Scale labels
        var scaleLabels = el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '10px', color: 'var(--muted)', marginTop: '4px', padding: '0 4px' } });
        scaleLabels.appendChild(el('span', {}, 'Strongly disagree'));
        scaleLabels.appendChild(el('span', {}, 'Strongly agree'));
        qWrap.appendChild(scaleRow);
        qWrap.appendChild(scaleLabels);

      } else if (q.type === 'freetext') {
        // Multi-line text area with character counter
        var maxChars = 1000;
        var ta = el('textarea', {
          style: {
            width: '100%', minHeight: '120px', padding: '12px', fontSize: '16px',
            fontFamily: 'var(--fontBody)', background: 'var(--surface)', color: 'var(--text)',
            border: '1px solid var(--border)', borderRadius: '10px', resize: 'vertical', boxSizing: 'border-box'
          },
          placeholder: 'Share your thoughts (optional)...',
          maxLength: String(maxChars)
        });
        ta.value = responses[q.id] || '';
        var counter = el('div', { style: { fontSize: '11px', color: 'var(--muted)', textAlign: 'right', marginTop: '4px' } },
          (responses[q.id] || '').length + ' / ' + maxChars);
        ta.addEventListener('input', function() {
          responses[q.id] = ta.value;
          counter.textContent = ta.value.length + ' / ' + maxChars;
          saveProgress();
        });
        qWrap.appendChild(ta);
        qWrap.appendChild(counter);

      } else {
        // Short text input
        var inp = el('input', {
          className: 'auth-input',
          type: 'text',
          style: { fontSize: '16px', width: '100%', boxSizing: 'border-box' },
          placeholder: 'Your answer...'
        });
        inp.value = responses[q.id] || '';
        inp.addEventListener('input', function() {
          responses[q.id] = inp.value;
          saveProgress();
        });
        qWrap.appendChild(inp);
      }
      sectionCard.appendChild(qWrap);
    });

    stepContainer.appendChild(sectionCard);

    // Update nav button states
    prevBtn.style.display = currentStep === 0 ? 'none' : '';
    if (currentStep === totalSteps - 1) {
      nextBtn.textContent = 'Submit Survey';
      nextBtn.className = 'btn btn-primary';
      nextBtn.style.background = 'var(--success)';
    } else {
      nextBtn.textContent = 'Next \u2192';
      nextBtn.style.background = '';
    }

    updateProgress();
  }

  function goStep(dir) {
    if (dir > 0 && currentStep === totalSteps - 1) {
      // Submit
      submitSurvey();
      return;
    }
    currentStep = Math.max(0, Math.min(totalSteps - 1, currentStep + dir));
    saveProgress();
    renderStep();
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function submitSurvey() {
    stepContainer.innerHTML = '';
    navRow.style.display = 'none';
    var submitCard = el('div', { className: 'card card-glass fade-in', style: { padding: '30px', textAlign: 'center' } });
    submitCard.appendChild(el('div', { className: 'spinner', style: { marginBottom: '14px' } }));
    submitCard.appendChild(el('div', { style: { fontSize: '14px', color: 'var(--text)' } }, 'Submitting your responses...'));
    stepContainer.appendChild(submitCard);

    var email = (AppState.profile && AppState.profile.email) || '';
    google.script.run.withSuccessHandler(function(result) {
      stepContainer.innerHTML = '';
      navRow.style.display = 'none';
      if (result && result.success) {
        clearProgress();
        var doneCard = el('div', { className: 'card card-glass fade-in', style: { padding: '30px', textAlign: 'center' } });
        doneCard.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\u2705'));
        doneCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '18px', fontWeight: '600', color: 'var(--text)', marginBottom: '8px' } }, 'Thank you!'));
        doneCard.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '20px', lineHeight: '1.5' } }, 'Your anonymous response has been recorded.'));
        doneCard.appendChild(el('button', { className: 'btn btn-primary', style: { maxWidth: '200px', margin: '0 auto' }, onClick: function() {
          renderMemberHome(document.getElementById('app'));
        } }, 'Return Home'));
        stepContainer.appendChild(doneCard);
      } else {
        _showSurveyError(stepContainer, navRow, (result && result.message) || 'Submission failed.', email, responses);
      }
    }).withFailureHandler(function(err) {
      stepContainer.innerHTML = '';
      _showSurveyError(stepContainer, navRow, err.message || 'Network error. Your progress is saved.', email, responses);
    }).dataSubmitSurveyResponse(email, responses);
  }

  renderStep();
}

function _showSurveyError(stepContainer, navRow, message, email, responses) {
  navRow.style.display = 'none';
  var errCard = el('div', { className: 'card card-glass fade-in', style: { padding: '30px', textAlign: 'center' } });
  errCard.appendChild(el('div', { style: { fontSize: '48px', marginBottom: '12px' } }, '\u26A0\uFE0F'));
  errCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--danger)', marginBottom: '8px' } }, 'Submission Error'));
  errCard.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '20px', lineHeight: '1.5' } }, message));
  errCard.appendChild(el('button', { className: 'btn btn-primary', style: { maxWidth: '200px', margin: '0 auto 10px' }, onClick: function() {
    stepContainer.innerHTML = '';
    navRow.style.display = '';
    var submitCard = el('div', { className: 'card card-glass fade-in', style: { padding: '30px', textAlign: 'center' } });
    submitCard.appendChild(el('div', { className: 'spinner', style: { marginBottom: '14px' } }));

    navRow.style.display = 'none';

      stepContainer.innerHTML = '';
      if (result && result.success) {
        try { localStorage.removeItem('dds_survey_progress'); } catch (e) { /* ignore */ }
        var doneCard = el('div', { className: 'card card-glass fade-in', style: { padding: '30px', textAlign: 'center' } });

        doneCard.appendChild(el('button', { className: 'btn btn-primary', style: { maxWidth: '200px', margin: '0 auto' }, onClick: function() { renderMemberHome(document.getElementById('app')); } }, 'Return Home'));
        stepContainer.appendChild(doneCard);
      } else {

      }
    }).withFailureHandler(function(err2) {
      _showSurveyError(stepContainer, navRow, err2.message || 'Still failing. Your progress is saved locally.', email, responses);
    }).dataSubmitSurveyResponse(email, responses);
  } }, 'Retry'));
  errCard.appendChild(el('button', { className: 'btn btn-secondary', style: { maxWidth: '200px', margin: '0 auto' }, onClick: function() {
    renderSurveyFormPage(document.getElementById('app'));
  } }, 'Back to Survey'));
  stepContainer.appendChild(errCard);
}

function renderSurveyResultsPage(appContainer) {
  renderPageLayout(appContainer, 'member', 'survey', function(container) {
    _memberHeader(container, 'Survey Results');
    var content = el('div', { className: 'content' });
    showLoading(content);
    container.appendChild(content);

    google.script.run.withSuccessHandler(function(data) {
      content.innerHTML = '';
      if (!data) {
        content.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'Survey data unavailable.'));
        return;
      }

      if (!data.available) {
        // Below threshold
        var pct = data.threshold > 0 ? Math.round((data.count / data.threshold) * 100) : 0;
        var card = el('div', { className: 'card card-glass', style: { padding: '22px', textAlign: 'center' } });
        card.appendChild(el('div', { style: { fontSize: '32px', marginBottom: '10px' } }, '\uD83D\uDCCA'));
        card.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '16px', fontWeight: '600', color: 'var(--text)', marginBottom: '6px' } }, 'Not enough responses yet'));
        card.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '14px' } }, data.count + ' of ' + data.threshold + ' needed'));
        var track = el('div', { className: 'bar-chart-track', style: { height: '10px', margin: '0 auto', maxWidth: '240px' } });
        var fill = el('div', { className: 'bar-chart-fill', style: { width: pct + '%', background: 'var(--accent)' } });
        track.appendChild(fill);
        card.appendChild(track);
        content.appendChild(card);
        return;
      }

      // Render section charts
      content.appendChild(el('div', { className: 'privacy-badge', style: { marginBottom: '10px' } }, '\uD83D\uDD12 Your responses are fully anonymous via one-way encryption'));
      content.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--muted)', marginBottom: '14px' } }, data.count + ' responses'));

      // Chart.js horizontal bar — all sections
      var secLabels = [];
      var secData = [];
      var secColors = [];
      (data.sections || []).forEach(function(sec) {
        secLabels.push(sec.name);
        secData.push(sec.avg || 0);
        var avg = sec.avg || 0;
        secColors.push(avg < 4 ? '#ef4444' : avg < 6 ? '#facc15' : avg < 8 ? '#4ade80' : '#22c55e');
      });

      if (secLabels.length > 0 && typeof ChartHelper !== 'undefined') {
        var chartCard = el('div', { className: 'card card-glass', style: { padding: '16px', marginBottom: '10px' } });
        chartCard.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)', marginBottom: '10px' } }, 'Section Averages'));
        ChartHelper.createHorizontalBarChart(chartCard, 'survey-sections-chart', secLabels, secData, secColors);
        content.appendChild(chartCard);
      }

      // Individual section cards with question breakout
      (data.sections || []).forEach(function(sec) {
        var secCard = el('div', { className: 'card card-glass card-accent-border', style: { padding: '16px', marginBottom: '10px' } });
        var avg = sec.avg || 0;
        var color = avg < 4 ? 'var(--danger)' : avg < 6 ? 'var(--warning)' : avg < 8 ? 'var(--success)' : '#22c55e';

        // Section header row with overall average
        var headerRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: (sec.questions && sec.questions.length) ? '10px' : '0' } });
        headerRow.appendChild(el('div', { style: { fontFamily: 'var(--fontDisplay)', fontSize: '14px', fontWeight: '600', color: 'var(--text)' } }, sec.name));
        headerRow.appendChild(el('div', { style: { fontFamily: 'var(--fontBody)', fontSize: '20px', fontWeight: '700', color: color } }, avg.toFixed(1)));
        secCard.appendChild(headerRow);

        // Individual question breakout
        if (sec.questions && sec.questions.length > 0) {
          sec.questions.forEach(function(q) {
            if (!q.text) return;
            var qAvg = q.avg || 0;
            var qColor = qAvg < 4 ? 'var(--danger)' : qAvg < 6 ? 'var(--warning)' : qAvg < 8 ? 'var(--success)' : '#22c55e';
            var qRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0', borderTop: '1px solid rgba(255,255,255,0.05)' } });
            qRow.appendChild(el('div', { style: { fontSize: '12px', color: 'var(--muted)', flex: '1' } }, q.text));
            qRow.appendChild(el('div', { style: { fontSize: '14px', fontWeight: '600', color: qColor, marginLeft: '12px', minWidth: '32px', textAlign: 'right' } }, qAvg.toFixed(1)));
            secCard.appendChild(qRow);
          });
        }

        content.appendChild(secCard);
      });
    }).dataGetSurveyResults();
  });
}

function renderWorkloadTracker(appContainer) {
  renderPageLayout(appContainer, 'member', 'workload', function(container) {

    var activeSubTab = 'submit';

    function refreshSubTabs() {
      subTabBar.innerHTML = '';
      ['submit', 'history', 'stats', 'reminders'].forEach(function(tab) {
        subTabBar.appendChild(el('button', {
          className: 'sub-tab' + (activeSubTab === tab ? ' active' : ''),
          onClick: function() { activeSubTab = tab; refreshSubTabs(); renderSubContent(); }
        }, tab.charAt(0).toUpperCase() + tab.slice(1)));
      });
    }
    function renderSubContent() {
      subContent.innerHTML = '';
      if (activeSubTab === 'submit') _renderWTSubmit(subContent);
      else if (activeSubTab === 'history') _renderWTHistory(subContent);
      else if (activeSubTab === 'stats') _renderWTStats(subContent);
      else if (activeSubTab === 'reminders') _renderWTReminders(subContent);
    }

    refreshSubTabs();
    renderSubContent();
    content.appendChild(subTabBar);
    content.appendChild(subContent);
    container.appendChild(content);
  });
}

// Helpers for leave row rendering
function _wlRow(label, input) {

// Collect all form data into object
function _wtCollectFormData(inputs, subData, privacy) {
  var fd = {};
  for (var i = 1; i <= 8; i++) fd['t' + i] = parseInt(inputs['t' + i].value) || 0;
  fd.weekly_cases = inputs.weeklySelect.value === 'manual' ? '15' : inputs.weeklySelect.value;
  fd.weekly_cases_option = inputs.weeklySelect.value;
  fd.weekly_cases_manual = inputs.weeklyManual.value;
  fd.employment_type = inputs.empSelect.value;
  fd.part_time_hours = inputs.ptInput.value;
  fd.on_plan = inputs.planCheck.checked;
  fd.overtime_enabled = inputs.otCheck.checked;
  fd.overtime_hours = inputs.otInput.value;
  fd.leave_type = inputs.leaveType.value;
  fd.leave_planned = inputs.leavePlanned.value;
  fd.leave_start = inputs.leaveStart.value;
  fd.leave_end = inputs.leaveEnd.value;
  fd.no_intake_choice = inputs.noIntake.value;
  fd.half_day = inputs.halfDay.checked;
  fd.privacy = privacy;
  // Sub-categories
  for (var ci = 0; ci < WT_CAT_KEYS.length; ci++) {
    var catKey = WT_CAT_KEYS[ci];
    var subs = WT_SUB_CATS[catKey];
    for (var si = 0; si < subs.length; si++) {
      fd['sub_' + (ci + 1) + '_' + si] = (subData[catKey] && subData[catKey][si]) || 0;
    }
  }
  return fd;
}

// Clear form
function _wtClearForm(inputs, subData) {
  for (var i = 1; i <= 8; i++) { inputs['t' + i].value = '0'; inputs['t' + i].parentElement.parentElement.classList.remove('warn'); }
  inputs.weeklySelect.value = '15';
  inputs.weeklyManual.value = '';
  inputs.weeklyManual.style.display = 'none';
  inputs.empSelect.value = 'Full-time';
  inputs.ptInput.value = '';
  inputs.ptInput.style.display = 'none';
  inputs.planCheck.checked = false;
  inputs.otCheck.checked = false;
  inputs.otInput.value = '';
  inputs.otInput.style.display = 'none';
  inputs.leaveType.value = '';
  inputs.leavePlanned.value = '';
  inputs.leaveStart.value = '';
  inputs.leaveEnd.value = '';
  inputs.noIntake.value = '';
  inputs.halfDay.checked = false;
  for (var k in subData) delete subData[k];
}

// Restore form from backup
function _wtRestoreForm(inputs, backup) {
  for (var i = 1; i <= 8; i++) inputs['t' + i].value = backup['t' + i] || 0;
  inputs.weeklySelect.value = backup.weekly_cases_option || '15';
  inputs.weeklyManual.value = backup.weekly_cases_manual || '';
  inputs.weeklyManual.style.display = inputs.weeklySelect.value === 'manual' ? '' : 'none';
  inputs.empSelect.value = backup.employment_type || 'Full-time';
  inputs.ptInput.value = backup.part_time_hours || '';
  inputs.ptInput.style.display = inputs.empSelect.value === 'Part-time' ? '' : 'none';
  inputs.planCheck.checked = !!backup.on_plan;
  inputs.otCheck.checked = !!backup.overtime_enabled;
  inputs.otInput.value = backup.overtime_hours || '';
  inputs.otInput.style.display = inputs.otCheck.checked ? '' : 'none';
  inputs.leaveType.value = backup.leave_type || '';
  inputs.leavePlanned.value = backup.leave_planned || '';
  inputs.leaveStart.value = backup.leave_start || '';
  inputs.leaveEnd.value = backup.leave_end || '';
  inputs.noIntake.value = backup.no_intake_choice || '';
  inputs.halfDay.checked = !!backup.half_day;
}

// Sub-category modal
function _openSubModal(cat, catIdx, mainInput, subData) {
  var subs = WT_SUB_CATS[cat.key];
  if (!subData[cat.key]) subData[cat.key] = {};

  var overlay = el('div', { className: 'wt-modal-overlay' });
  var modal = el('div', { className: 'wt-modal' });
  modal.appendChild(el('div', { className: 'wt-modal-title' }, cat.label + ' \u2014 Breakdown'));

  var subInputs = [];
  var totalEl = el('span', {}, '0');

  function updateTotal() {
    var sum = 0;
    for (var s = 0; s < subInputs.length; s++) sum += parseInt(subInputs[s].value) || 0;
    totalEl.textContent = String(sum);
  }

  subs.forEach(function(name, si) {
    var row = el('div', { className: 'wt-sub-row' });
    row.appendChild(el('span', {}, name));
    var inp = el('input', { type: 'number', min: '0', max: '999', value: String(subData[cat.key][si] || 0) });
    inp.addEventListener('input', updateTotal);
    subInputs.push(inp);
    row.appendChild(inp);
    modal.appendChild(row);
  });

  var totalRow = el('div', { className: 'wt-modal-total' });
  totalRow.appendChild(el('span', {}, 'Total'));
  totalRow.appendChild(totalEl);
  modal.appendChild(totalRow);
  updateTotal();

  var btnRow = el('div', { style: { display: 'flex', gap: '8px', marginTop: '14px', justifyContent: 'flex-end' } });
  btnRow.appendChild(el('button', { className: 'btn btn-secondary',
    onClick: function() { overlay.remove(); }
  }, 'Cancel'));
  btnRow.appendChild(el('button', { className: 'btn btn-primary',
    onClick: function() {
      var sum = 0;
      for (var s = 0; s < subInputs.length; s++) {
        var v = parseInt(subInputs[s].value) || 0;
        subData[cat.key][s] = v;
        sum += v;
      }
      mainInput.value = String(sum);
      mainInput.dispatchEvent(new Event('input'));
      overlay.remove();
    }
  }, 'Apply'));
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── History Tab ─────────────────────────────────────────────────────────────

function _renderWTHistory(container) {
  showLoading(container);
  google.script.run.withSuccessHandler(function(result) {
    container.innerHTML = '';
    if (!result || !result.success || !result.history || result.history.length === 0) {
      container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No submissions yet.'));
      return;
    }

    // Export CSV button
    var exportBtn = el('button', { className: 'btn btn-secondary', style: { marginBottom: '12px', fontSize: '12px' },
      onClick: function() {
        exportBtn.textContent = 'Exporting...';
        google.script.run.withSuccessHandler(function(csv) {
          if (!csv) { exportBtn.textContent = 'No data'; return; }
          var blob = new Blob([csv], { type: 'text/csv' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'workload_history.csv'; a.click();
          URL.revokeObjectURL(url);
          exportBtn.textContent = 'Export CSV';
        }).exportWorkloadHistoryCSV(CURRENT_USER.email);
      }
    }, 'Export CSV');
    container.appendChild(exportBtn);

    // Summary
    if (result.summary) {
      var s = result.summary;
      var summaryCard = el('div', { className: 'wt-history-card', style: { marginBottom: '14px' } });
      summaryCard.appendChild(el('div', { style: { fontWeight: '600', fontSize: '13px', marginBottom: '6px' } }, 'Summary'));
      summaryCard.appendChild(el('div', { className: 'wt-history-meta' },
        s.totalSubmissions + ' submissions \u00B7 ' + (s.firstSubmission || '?') + ' \u2013 ' + (s.lastSubmission || '?')));
      if (s.overtime && s.overtime.totalHours > 0) {
        summaryCard.appendChild(el('div', { className: 'wt-history-meta' },
          'Overtime: ' + s.overtime.totalHours + ' hrs total, ' + s.overtime.averagePerSubmission + ' avg/submission'));
      }
      container.appendChild(summaryCard);
    }

    var labels = ['Pri', 'Pend', 'Doc', 'ToDo', 'Ref', 'CE', 'Asst', 'Aged'];
    result.history.forEach(function(entry) {
      var card = el('div', { className: 'wt-history-card' });
      card.appendChild(el('div', { className: 'wt-history-date' }, entry.dateDisplay || (entry.date ? new Date(entry.date).toLocaleDateString() : 'Unknown')));
      var grid = el('div', { className: 'wt-history-grid' });
      for (var i = 0; i < 8; i++) {
        var cell = el('div', { className: 'wt-history-cell' });
        cell.appendChild(el('div', { className: 'wt-history-cell-label' }, labels[i]));
        cell.appendChild(el('div', { className: 'wt-history-cell-val' }, String(entry['t' + (i + 1)] || 0)));
        grid.appendChild(cell);
      }
      card.appendChild(grid);

      // Meta row
      var meta = [];
      if (entry.weeklyCases) meta.push('Weekly: ' + entry.weeklyCases);
      if (entry.employment && entry.employment !== 'Full-time') meta.push(entry.employment + (entry.ptHours ? ' (' + entry.ptHours + 'h)' : ''));
      if (entry.leaveType) meta.push('Leave: ' + entry.leaveType);
      if (entry.overtime !== '' && entry.overtime !== null && entry.overtime !== undefined) meta.push('OT: ' + entry.overtime + 'h');
      if (entry.privacy) meta.push(entry.privacy);
      if (entry.onPlan === 'Yes') meta.push('On Plan');
      if (meta.length > 0) {
        card.appendChild(el('div', { className: 'wt-history-meta' }, meta.join(' \u00B7 ')));
      }

      // Expandable sub-categories
      if (entry.subCategories && Object.keys(entry.subCategories).length > 0) {
        var subDiv = el('div', { style: { display: 'none', marginTop: '8px', fontSize: '12px', color: 'var(--muted)' } });
        for (var ck in entry.subCategories) {
          var catSubs = entry.subCategories[ck];
          if (catSubs && typeof catSubs === 'object') {
            for (var sk in catSubs) {
              if (Number(catSubs[sk]) > 0) subDiv.appendChild(el('div', {}, ck + ' > ' + sk + ': ' + catSubs[sk]));
            }
          }
        }
        if (subDiv.children.length > 0) {
          card.appendChild(el('button', { className: 'wt-history-expand-btn',
            onClick: function() {
              var vis = subDiv.style.display === 'none';
              subDiv.style.display = vis ? '' : 'none';
              this.textContent = vis ? '\u25B2 Hide details' : '\u25BC Show details';
            }
          }, '\u25BC Show details'));
          card.appendChild(subDiv);
        }
      }

      container.appendChild(card);
    });
  }).getWorkloadHistorySSO(CURRENT_USER.email);
}

function _renderWTStats(container) {
  showLoading(container);
  google.script.run.withSuccessHandler(function(result) {

    if (result && result.reciprocityBlocked) {

        result.message || 'You must share your data to view collective statistics. Change your privacy setting to Unit or Agency Anonymized.'));

    }

    if (!result || !result.success || !result.data) {
      container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'No data available.'));
      return;
    }

    if (d.overtime) {
      statGrid.appendChild(_wtStatCard(d.overtime.totalHours, 'OT Hours'));

      statGrid.appendChild(_wtStatCard(d.overtime.averagePerSubmission, 'Avg OT/Sub'));
    }
    container.appendChild(statGrid);

    // Category averages bar chart
    var avgs = d.averages || {};
    container.appendChild(el('div', { className: 'wt-section-title' }, 'Category Averages'));

      var row = el('div', { className: 'bar-chart-row' });

      row.appendChild(track);
      row.appendChild(el('div', { className: 'bar-chart-value' }, avgs[cat]));
      container.appendChild(row);

    // Employment breakdown
    if (d.employment) {
      container.appendChild(el('div', { className: 'wt-section-title', style: { marginTop: '16px' } }, 'Employment'));
      var empText = 'Full-time: ' + (d.employment['Full-time'] || 0) + ' \u00B7 Part-time: ' + (d.employment['Part-time'] || 0);
      container.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)' } }, empText));
    }

    // Workflow plan breakdown
    if (d.workflowPlan) {
      container.appendChild(el('div', { className: 'wt-section-title', style: { marginTop: '12px' } }, 'Workflow Plan'));
      var planText = 'On Plan: ' + (d.workflowPlan.Yes || 0) + ' \u00B7 Not on Plan: ' + (d.workflowPlan.No || 0);
      container.appendChild(el('div', { style: { fontSize: '13px', color: 'var(--text)' } }, planText));
    }

    // Sub-category totals
    if (d.subCategoryTotals && Object.keys(d.subCategoryTotals).length > 0) {
      container.appendChild(el('div', { className: 'wt-section-title', style: { marginTop: '16px' } }, 'Sub-Category Totals'));
      for (var sck in d.subCategoryTotals) {
        var scData = d.subCategoryTotals[sck];
        if (!scData || Object.keys(scData).length === 0) continue;
        var scDiv = el('div', { style: { marginBottom: '8px' } });
        scDiv.appendChild(el('div', { style: { fontSize: '12px', fontWeight: '600', color: 'var(--text)', marginBottom: '4px' } },

    container.innerHTML = '';
    container.appendChild(el('div', { style: { color: 'var(--muted)', padding: '20px 0', textAlign: 'center' } }, 'Unable to load statistics.'));
  }).getWorkloadDashboardDataSSO(CURRENT_USER.email);
}
