<style>
/* ─── POMS TOKENS (Light default) ─────────────────────────── */
.poms-root{
  --pr-bg:#f5f6f8;--pr-surface:#fff;--pr-surface-alt:#fafafa;--pr-surface-raised:#f5f6f8;
  --pr-text:#1a1a2e;--pr-text-secondary:#666;--pr-muted:#888;--pr-dim:#aaa;--pr-faint:#bbb;--pr-border:#eee;--pr-border-strong:#ddd;
  --pr-card-shadow:0 1px 3px rgba(0,0,0,.05);--pr-hover-bg:#f0f0f0;
  --pr-alert-bg:#FFF3CD;--pr-alert-border:#FFCA2C;--pr-alert-text:#664D03;
  --pr-remind-bg:linear-gradient(to bottom,#fffdf7,#fef9f0);--pr-remind-border:#f0e0c0;--pr-remind-bullet:#e67e22;
  --pr-related-bg:#eef2f7;--pr-related-text:#2c3e50;
  --pr-chip-bg:#fff;--pr-chip-text:#333;--pr-chip-border:#ddd;
  --pr-wf-bg:#f0f0f0;--pr-wf-text:#777;
  --pr-stat-bg:#fff;--pr-stat-shadow:0 1px 3px rgba(0,0,0,.05);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--pr-bg);color:var(--pr-text);height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
/* ─── POMS DARK MODE ──────────────────────────────────────── */
.poms-root.poms-dark{
  --pr-bg:#0a0a12;--pr-surface:#141420;--pr-surface-alt:#111118;--pr-surface-raised:#1a1a28;
  --pr-text:#e0e0ec;--pr-text-secondary:#a0a0b8;--pr-muted:#8888a0;--pr-dim:#6b6b80;--pr-faint:#555568;--pr-border:#222233;--pr-border-strong:#2a2a3d;
  --pr-card-shadow:0 1px 6px rgba(0,0,0,.3);--pr-hover-bg:#1e1e2e;
  --pr-alert-bg:rgba(255,243,205,.08);--pr-alert-border:rgba(255,202,44,.25);--pr-alert-text:#f0c040;
  --pr-remind-bg:linear-gradient(to bottom,rgba(255,253,247,.04),rgba(254,249,240,.02));--pr-remind-border:rgba(240,224,192,.15);--pr-remind-bullet:#f0a040;
  --pr-related-bg:rgba(255,255,255,.06);--pr-related-text:#a0b0c8;
  --pr-chip-bg:rgba(255,255,255,.05);--pr-chip-text:#c0c0d0;--pr-chip-border:#2a2a3d;
  --pr-wf-bg:rgba(255,255,255,.06);--pr-wf-text:#8888a0;
  --pr-stat-bg:#141420;--pr-stat-shadow:0 1px 6px rgba(0,0,0,.3)}
.poms-root *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.poms-hdr{background:linear-gradient(135deg,#0a0a1a,#1a1a2e 50%,#0f3460);padding:12px 16px 10px;flex-shrink:0;z-index:10}
.poms-hdr h2{font-size:16px;font-weight:700;color:#fff;margin:0}
.poms-hdr .p-sub{font-size:9px;color:rgba(255,255,255,.45)}
.p-search{width:100%;height:44px;padding:0 40px 0 38px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:15px;outline:none;font-family:inherit;margin:8px 0}
.p-search::placeholder{color:rgba(255,255,255,.35)}
.p-swrap{position:relative}
.p-sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4}
.p-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center}
.p-clear.vis{display:flex}
.p-pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.p-pills::-webkit-scrollbar{display:none}
.p-pill{padding:6px 14px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);white-space:nowrap;flex-shrink:0;min-height:32px}
.p-pill.on{background:#e94560;color:#fff}
.poms-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 20px}
.p-card{background:var(--pr-surface);border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer;border-left:4px solid #2E75B6;box-shadow:var(--pr-card-shadow);min-height:60px;display:flex;align-items:flex-start;gap:10px}
.p-card:active{transform:scale(.985);background:var(--pr-surface-alt)}
.p-card.p-si{border-left-color:#548235}.p-card.p-ce{border-left-color:#8B0000}
.p-card-body{flex:1;min-width:0}
.p-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.p-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;color:#fff}
.p-b-di{background:#2E75B6}.p-b-si{background:#548235}.p-b-ce{background:#8B0000}
.p-sec{font-family:'SF Mono',Menlo,monospace;font-weight:700;font-size:11px;color:var(--pr-text)}
.p-ctitle{font-size:14px;font-weight:600;color:var(--pr-text);line-height:1.3}
.p-ccat{font-size:11px;color:var(--pr-muted);margin-top:1px}
.p-cdesc{font-size:12px;color:var(--pr-text-secondary);margin-top:4px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-calert{background:var(--pr-alert-bg);border-radius:5px;padding:4px 8px;margin-top:4px;font-size:10px;color:var(--pr-alert-text);font-weight:600}
.p-stars{color:#BF8F00;font-size:10px;flex-shrink:0;padding-top:2px}
/* Detail overlay */
.p-detail{position:absolute;inset:0;background:var(--pr-bg);z-index:20;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.p-detail.open{transform:translateX(0)}
.p-det-hdr{display:flex;align-items:center;padding:10px 12px;background:var(--pr-surface);border-bottom:1px solid var(--pr-border);flex-shrink:0;min-height:48px;gap:10px}
.p-det-back{width:40px;height:40px;border-radius:50%;background:none;border:none;font-size:20px;cursor:pointer;color:var(--pr-text);display:flex;align-items:center;justify-content:center}
.p-det-back:active{background:var(--pr-hover-bg)}
.p-det-hdr-t{flex:1;min-width:0}
.p-det-sec{font-family:'SF Mono',Menlo,monospace;font-size:14px;font-weight:700;color:var(--pr-text)}
.p-det-name{font-size:12px;color:var(--pr-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-det-bm{width:44px;height:44px;border-radius:50%;background:none;border:none;font-size:24px;cursor:pointer;color:var(--pr-faint);display:flex;align-items:center;justify-content:center}
.p-det-bm.on{color:#e94560}
.p-det-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.p-det-sf{font-family:'SF Mono',Menlo,monospace;font-size:22px;font-weight:700;color:var(--pr-text)}
.p-det-tf{font-size:18px;font-weight:600;color:var(--pr-text);margin:4px 0 6px;line-height:1.3}
.p-det-alert{background:var(--pr-alert-bg);border:1px solid var(--pr-alert-border);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--pr-alert-text);font-weight:600;line-height:1.4}
.p-block{margin-bottom:16px}
.p-block-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.p-ex{font-size:14px;line-height:1.7;background:var(--pr-surface);border-radius:10px;padding:14px;border:1px solid var(--pr-border);color:var(--pr-text-secondary)}
.p-rate{display:flex;gap:4px;align-items:center}
.p-rate .lbl{font-size:10px;color:var(--pr-dim);margin-right:4px}
.p-rstar{width:32px;height:32px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--pr-border-strong);display:flex;align-items:center;justify-content:center;border-radius:6px}
.p-rstar:active{background:var(--pr-hover-bg)}
.p-rstar.on{color:#f39c12}.p-rstar.fon{color:#e94560}
.p-flow{background:var(--pr-surface);border-radius:10px;padding:14px;border:1px solid var(--pr-border);margin-bottom:12px}
.p-flow-title{font-size:13px;font-weight:700;color:var(--pr-text);margin-bottom:10px}
.p-fstep{display:flex;margin-bottom:2px}
.p-fbar{width:6px;flex-shrink:0;border-radius:1px}
.p-fc{flex:1;padding:10px 14px;background:var(--pr-surface-raised);border-bottom:1px solid var(--pr-border)}
.p-flbl{font-size:12px;font-weight:700}
.p-fdesc{font-size:13px;color:var(--pr-text-secondary);line-height:1.35;margin-top:2px}
.p-fbranch{font-size:11px;margin-top:3px}
.p-fyes{color:#2d8a4e;font-weight:700}.p-fno{color:#c0392b;font-weight:700}
.poms-root.poms-dark .p-fyes{color:#4ade80}.poms-root.poms-dark .p-fno{color:#f87171}
.p-rm{background:var(--pr-remind-bg);border-radius:10px;padding:14px;border:1px solid var(--pr-remind-border)}
.p-rmi{display:flex;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.4;color:var(--pr-text-secondary)}
.p-rmi:last-child{margin-bottom:0}
.p-related{display:flex;flex-wrap:wrap;gap:6px}
.p-rel{background:var(--pr-related-bg);padding:6px 12px;border-radius:8px;font-size:12px;font-family:'SF Mono',Menlo,monospace;font-weight:600;color:var(--pr-related-text);min-height:32px;display:flex;align-items:center;cursor:pointer}
.p-rel:active{background:var(--pr-text);color:var(--pr-bg)}
.p-notes textarea{width:100%;min-height:80px;padding:12px;border-radius:10px;border:1px solid var(--pr-border-strong);background:var(--pr-surface);color:var(--pr-text);font-size:14px;font-family:inherit;resize:vertical;line-height:1.5}
.p-plink{display:block;text-align:center;padding:14px;border-radius:10px;color:#fff;text-decoration:none;font-size:14px;font-weight:700;margin-top:12px;min-height:48px}
.p-plink:active{opacity:.85}
.p-ql{margin-bottom:12px}
.p-ql-label{font-size:10px;font-weight:700;color:var(--pr-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.p-ql-scroll{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.p-ql-scroll::-webkit-scrollbar{display:none}
.p-ql-chip{padding:8px 14px;border-radius:16px;border:1px solid var(--pr-chip-border);background:var(--pr-chip-bg);cursor:pointer;font-size:11px;color:var(--pr-chip-text);white-space:nowrap;flex-shrink:0;min-height:36px;display:flex;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.p-ql-chip:active{background:var(--pr-text);color:var(--pr-bg);border-color:var(--pr-text);transform:scale(.97)}
.p-empty{text-align:center;padding:40px 20px;color:var(--pr-faint)}
.p-count{font-size:10px;color:var(--pr-dim);margin-bottom:6px;padding-left:2px}
</style>

<div class="poms-root" id="poms-root">
  <div class="poms-hdr" id="poms-hdr"></div>
  <div class="poms-body" id="poms-body"></div>
  <div class="p-detail" id="poms-detail">
    <div class="p-det-hdr" id="poms-det-hdr"></div>
    <div class="p-det-body" id="poms-det-body"></div>
  </div>
</div>

const FLOWS = {

  "listing-1": {title:"1.00 Musculoskeletal (Adult)",steps:[
    {label:"1.15",desc:"Disorders of skeletal spine — compromise of nerve root or spinal cord",color:"#8B4513"},
    {label:"1.16",desc:"Lumbar spinal stenosis — narrowing of spinal canal",color:"#8B4513"},

    {label:"Category",desc:"12.02 Neurocognitive · 12.03 Schizophrenia · 12.04 Depressive/Bipolar · 12.06 Anxiety · 12.07 Somatic · 12.08 Personality · 12.10 Autism · 12.11 Neurodevelopmental · 12.13 Eating · 12.15 Trauma",color:"#4B0082"},

    {label:"2.09",desc:"Loss of speech — inability to produce speech by any means (including non-oral)",color:"#9B59B6"},

// Search
function psc(item,terms){var s=0;var all=(item.s+' '+item.t+' '+item.c+' '+item.tp+' '+(item.ct||'')+' '+(item.al||'')+' '+(item.ex||'')).toLowerCase();
  for(var i=0;i<terms.length;i++){var t=terms[i].toLowerCase();if(item.s.toLowerCase()===t)s+=100;if(item.s.toLowerCase().indexOf(t)>-1)s+=50;
    if(item.t.toLowerCase().indexOf(t)>-1)s+=40;if((item.al||'').toLowerCase().indexOf(t)>-1)s+=30;
    if(item.c.toLowerCase().indexOf(t)>-1)s+=20;if(item.tp.toLowerCase().indexOf(t)>-1)s+=15;
    if((item.ex||'').toLowerCase().indexOf(t)>-1)s+=8;if(all.indexOf(t)>-1)s+=3;}return s;}

function psearch(){var r=POMS_DATA.slice();if(P.sh!=='All')r=r.filter(function(x){return x.sh===P.sh;});
  if(P.ca)r=r.filter(function(x){return x.c===P.ca;});if(!P.q.trim())return r;
  var t=P.q.trim().split(/\s+/);return r.map(function(x){x._sc=psc(x,t);return x;}).filter(function(x){return x._sc>0;}).sort(function(a,b){return b._sc-a._sc;});}

function pel(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

// Export CSV
function pexportCSV(){
  var rows=[["Section","Title","Category","Sheet","ExRating","FlowRating","Bookmarked","Notes"]];
  POMS_DATA.forEach(function(d){var er=P.ratings['ex:'+d.id]||0;var fr=d.fl?(P.ratings['flow:'+d.fl]||0):"";
    var bm=P.bookmarks.indexOf(d.id)>-1?"Yes":"";var n=P.notes[d.id]||"";
    if(er||fr||bm||n)rows.push([d.s,d.t,d.c,d.sh,er||"",fr,bm,'"'+(n||"").replace(/"/g,'""')+'"']);});
  var blob=new Blob([rows.map(function(r){return r.join(",");}).join("\n")],{type:"text/csv"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="POMS_Ratings_"+new Date().toISOString().slice(0,10)+".csv";a.click();}

// Card
function prenderCard(item){
  var card=pel('div','p-card'+(item.sh==='SI'?' p-si':item.sh==='CE'?' p-ce':''));
  var body=pel('div','p-card-body');
  var meta=pel('div','p-meta');
  meta.innerHTML='<span class="p-badge p-b-'+item.sh.toLowerCase()+'">'+item.sh+'</span><span class="p-sec">'+item.s+'</span>'
    +(item.fl?'<span style="font-size:9px">📊</span>':'')
    +(P.bookmarks.indexOf(item.id)>-1?'<span style="font-size:10px;color:#e94560">♥</span>':'')
    +(P.notes[item.id]?'<span style="font-size:9px;color:#16a085">📝</span>':'');
  body.appendChild(meta);
  body.appendChild(pel('div','p-ctitle',item.t));
  body.appendChild(pel('div','p-ccat',item.c+(item.ct?' · '+item.ct:'')));
  if(item.ex)body.appendChild(pel('div','p-cdesc',item.ex));
  if(item.al)body.appendChild(pel('div','p-calert','⚠️ '+item.al));
  card.appendChild(body);
  card.appendChild(pel('span','p-stars','★'.repeat(item.r||0)));
  card.onclick=function(){popenDetail(item);};
  return card;
}

  for(var n=1;n<=5;n++){(function(n){var btn=pel('button','p-rstar'+(n<=myR?' fon':''),'★');

    rr.appendChild(btn);})(n);}
  hdr.appendChild(rr);div.appendChild(hdr);
  f.steps.forEach(function(s,i){
    var row=pel('div','p-fstep');
    var bar=pel('div','p-fbar');bar.style.background=s.color;
    if(i===0)bar.style.borderRadius='3px 0 0 0';if(i===f.steps.length-1)bar.style.borderRadius='0 0 0 3px';
    row.appendChild(bar);
    var c=pel('div','p-fc');
    c.appendChild(pel('div','p-flbl',s.label));c.firstChild.style.color=s.color;
    c.appendChild(pel('div','p-fdesc',s.desc));
    if(s.yes)c.appendChild(pel('div','p-fbranch','<span class="p-fyes">Yes→</span> '+s.yes+' <span class="p-fno" style="margin-left:8px">No→</span> '+s.no));
    row.appendChild(c);div.appendChild(row);
  });
  container.appendChild(div);
}

// Detail
function popenDetail(item){
  P.viewHistory[item.id]=(P.viewHistory[item.id]||0)+1;psv('views',P.viewHistory);
  P._detItem=item;var col=pcol(item.sh);
  var hdr=$('poms-det-hdr');hdr.innerHTML='';
  var back=pel('button','p-det-back','←');back.setAttribute('aria-label','Go back');back.onclick=pcloseDetail;hdr.appendChild(back);
  var td=pel('div','p-det-hdr-t');td.innerHTML='<div class="p-det-sec">'+item.s+'</div><div class="p-det-name">'+item.t+'</div>';hdr.appendChild(td);
  var bm=pel('button','p-det-bm'+(P.bookmarks.indexOf(item.id)>-1?' on':''),P.bookmarks.indexOf(item.id)>-1?'♥':'♡');
  bm.setAttribute('aria-label',P.bookmarks.indexOf(item.id)>-1?'Remove bookmark':'Add bookmark');
  bm.onclick=function(){var i=P.bookmarks.indexOf(item.id);if(i>-1)P.bookmarks.splice(i,1);else P.bookmarks.push(item.id);
    psv('bookmarks',P.bookmarks);bm.className='p-det-bm'+(P.bookmarks.indexOf(item.id)>-1?' on':'');bm.textContent=P.bookmarks.indexOf(item.id)>-1?'♥':'♡';
    bm.setAttribute('aria-label',P.bookmarks.indexOf(item.id)>-1?'Remove bookmark':'Add bookmark');};
  hdr.appendChild(bm);
  var body=$('poms-det-body');body.innerHTML='';body.scrollTop=0;
  body.appendChild(pel('div','p-det-sf',item.s));
  body.appendChild(pel('div','p-det-tf',item.t));
  var meta=pel('div','p-meta');meta.style.marginBottom='10px';
  meta.innerHTML='<span class="p-badge p-b-'+item.sh.toLowerCase()+'">'+item.sh+'</span>'
    +(item.wf?'<span style="background:var(--pr-wf-bg);padding:3px 8px;border-radius:6px;font-size:10px;color:var(--pr-wf-text)">'+item.wf+'</span>':'')
    +'<span style="color:#BF8F00;font-size:12px">'+'★'.repeat(item.r||0)+'</span>'
    +'<span style="font-size:10px;color:var(--pr-muted)">'+item.c+(item.ct?' · '+item.ct:'')+'</span>';
  body.appendChild(meta);
  if(item.al)body.appendChild(pel('div','p-det-alert','⚠️ '+item.al));
  // Explanation + rating
  if(item.ex){
    var block=pel('div','p-block');
    var lr=pel('div','');lr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:6px';
    var lbl=pel('div','p-block-lbl','📖 Explanation');lbl.style.color=col;
    var rr=pel('div','p-rate');rr.appendChild(pel('span','lbl','Rate:'));
    var exR=P.ratings['ex:'+item.id]||0;
    for(var n=1;n<=5;n++){(function(n){var btn=pel('button','p-rstar'+(n<=exR?' on':''),'★');
      btn.setAttribute('aria-label','Rate '+n+' of 5 stars');
      btn.onclick=function(){P.ratings['ex:'+item.id]=P.ratings['ex:'+item.id]===n?0:n;psv('ratings',P.ratings);
        rr.querySelectorAll('.p-rstar').forEach(function(b,j){b.className='p-rstar'+(j+1<=P.ratings['ex:'+item.id]?' on':'');});};
      rr.appendChild(btn);})(n);}
    lr.appendChild(lbl);lr.appendChild(rr);block.appendChild(lr);
    block.appendChild(pel('div','p-ex',item.ex));body.appendChild(block);
  }
  if(item.fl)prenderFlow(item.fl,body);
  if(item.rm&&item.rm.length){
    var block=pel('div','p-block');
    var lbl=pel('div','p-block-lbl','🔔 Reminders');lbl.style.color='#ef4444';block.appendChild(lbl);
    var box=pel('div','p-rm');
    item.rm.forEach(function(r){var row=pel('div','p-rmi');row.innerHTML='<span style="color:var(--pr-remind-bullet);flex-shrink:0;margin-top:2px">●</span><span>'+r+'</span>';box.appendChild(row);});
    block.appendChild(box);body.appendChild(block);
  }
  if(item.rl&&item.rl.length){
    var block=pel('div','p-block');block.appendChild(pel('div','p-block-lbl','🔗 Related'));block.lastChild.style.color='var(--pr-muted)';
    var row=pel('div','p-related');
    item.rl.forEach(function(r){var tag=pel('span','p-rel',r);tag.onclick=function(){pcloseDetail();P.q=r;prender();};row.appendChild(tag);});
    block.appendChild(row);body.appendChild(block);
  }
  // Notes
  var nb=pel('div','p-block p-notes');nb.appendChild(pel('div','p-block-lbl','📝 My Notes'));nb.lastChild.style.color='#2dd4bf';
  var ta=document.createElement('textarea');ta.value=P.notes[item.id]||'';ta.placeholder='Add personal notes...';
  ta.addEventListener('input',function(e){P.notes[item.id]=e.target.value;psv('notes',P.notes);});
  nb.appendChild(ta);body.appendChild(nb);
  // Keywords
  var kb=pel('div','p-block');kb.appendChild(pel('div','p-block-lbl','🏷️ Keywords'));kb.lastChild.style.color='var(--pr-dim)';
  kb.appendChild(pel('div','',item.tp));kb.lastChild.style.cssText='font-size:12px;color:var(--pr-dim);line-height:1.4';body.appendChild(kb);
  var link=pel('a','p-plink','Open in POMS →');link.href=item.url;link.target='_blank';link.style.background=col;body.appendChild(link);
  $('poms-detail').classList.add('open');
}
function pcloseDetail(){$('poms-detail').classList.remove('open');P._detItem=null;}
function prender(){prenderHdr();prenderBody();}

// Swipe back
var ptsx=0;
$('poms-detail').addEventListener('touchstart',function(e){ptsx=e.touches[0].clientX;},{passive:true});
$('poms-detail').addEventListener('touchend',function(e){if(e.changedTouches[0].clientX-ptsx>80&&ptsx<50)pcloseDetail();},{passive:true});

// Sync dark/light mode with global AppState
function _pomsSyncTheme() {
  var root = document.getElementById('poms-root');
  if (!root) return;
  var isDark = true; // default dark
  try {
    if (typeof AppState !== 'undefined') { isDark = AppState.isDark; }
    else { var v = localStorage.getItem('dds_isDark'); isDark = v === null ? true : v === 'true'; }
  } catch(e) {}
  root.classList.toggle('poms-dark', isDark);
}
// Observe AppState changes (dark/light toggle re-renders tabs, so this also runs on re-inject)
_pomsSyncTheme();

// Init
P.ratings=pld('ratings',{});P.notes=pld('notes',{});P.bookmarks=pld('bookmarks',[]);
P.searchHistory=pld('searches',[]);P.viewHistory=pld('views',{});
prender();
})();
</script>
